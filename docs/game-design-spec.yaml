# ============================================================================
# ナゾトキ探偵団 ノベルゲーム — ゲームデザイン原則spec
# ============================================================================
# 桜井政博「ゲーム作るには」全9シリーズのNotebookLMレポートを統合。
# 約100の原則を教育VN文脈で再構成し、設計判断・UXレビューの基準とする。
#
# 使い方:
#   - 新機能設計時: 該当カテゴリの原則を確認し「どの原則に基づくか」を明示
#   - UXレビュー時: review-game-ux スキルがチェックリストとして参照
#   - 迷ったとき: philosophy カテゴリに立ち返る
#
# Source: game/docs/桜井/ 内の9レポート
#   A: 仕事の姿勢 / B: ゲーム性 / C: 企画・ゲーム設計 / D: 仕様
#   FG: グラフィック / H: エフェクト / I: サウンド / J: UI / N: 企画コンセプト
# ============================================================================

meta:
  title: ナゾトキ探偵団 ゲームデザイン原則
  version: "1.0"
  created: "2026-03-26"
  last_updated: "2026-03-26"
  source: 桜井政博「ゲーム作るには」全260本（NotebookLMレポート9本）
  game_context: |
    教育マダミス（マーダーミステリー）をノベルゲーム化したWebアプリ。
    対象: 小学4年〜中学3年。1プレイ15-30分。
    構成: テキスト表示 + キャラスプライト + 背景 + BGM/SE + 犯人当て選択肢。
    技術: Preact + TypeScript + Vite。ブラウザ動作（Chromebook対応）。

# ============================================================================
# 1. DESIGN PHILOSOPHY — 全判断の土台
# ============================================================================
philosophy:
  description: |
    すべての設計判断に先立つメタ原則。
    迷ったらここに戻る。

  principles:
    - id: PH-01
      name: プレイヤー視点の絶対化
      summary: |
        「お客さんに説明できるのか？」——作り手の事情を言い訳にせず、
        遊ぶ側にとって親切かどうかを唯一の基準にする。
      source: [A-1]
      vn_application: |
        プレイヤーは小学生〜中学生。大人の都合（実装コスト、技術的制約）は
        子どもには関係ない。「なぜこの画面でこの操作が必要か」を
        10歳の生徒に説明できるか常に自問する。
      priority: critical

    - id: PH-02
      name: コンセプトの灯台
      summary: |
        開発途中で迷っても、最初に定めた核は曲げない。
        偶発的な面白さに依存せず、目的地へ真っ直ぐ進む。
      source: [A-2]
      vn_application: |
        本ゲームのコンセプトは「教室で使える推理体験」。
        派手な演出やゲーミフィケーションを追加する際、
        「教室の45分授業で使えるか」に反するなら切り捨てる。
      priority: critical

    - id: PH-03
      name: 即時実行・手数で最適化
      summary: |
        完璧を待たず、まず動くものを作る。
        洗練は大量の試行錯誤の結果としてのみ得られる。
      source: [A-3]
      vn_application: |
        機能は最小実装→テストプレイ→改善のサイクルで磨く。
        仕様書を完璧にしてから実装するのではなく、
        プロトタイプを子どもに触らせてフィードバックを得る。
      priority: important

    - id: PH-04
      name: 責任ある単一案
      summary: |
        「A案とB案がある」は決断の放棄。
        最高と信じる単一の解を提示し、責任を負う。
      source: [A-6]
      vn_application: |
        設計レビューで複数案を並べず、推奨案を1つ提示する。
        修正はテストプレイの結果を受けてから。
      priority: important

    - id: PH-05
      name: 苦労は忘れるが作品は残る
      summary: |
        妥協の結果は永遠に残る。
        30年後の自分が見ても悔いを残さない品質を基準に。
      source: [A-8]
      vn_application: |
        「とりあえず動くからOK」で妥協しない。
        特にテキスト表示・操作感・結果画面は
        子どもの記憶に残る部分。ここは磨き切る。
      priority: important

# ============================================================================
# 2. GAME MECHANICS — 「読むだけ」から「遊ぶ」へ
# ============================================================================
game_mechanics:
  description: |
    ノベルゲームに「ゲーム性」を付与するための原則。
    現状の課題: テキストを読むだけで緊張もご褒美もない。

  principles:
    - id: GM-01
      name: リスクとリターンの構造
      summary: |
        ゲーム性の本質は、プレイヤーが自発的にリスクを冒して
        リターンを得る「駆け引き」の構造。
        リスクのない報酬は作業、リターンのない危険は苦行。
      source: [B-1, B-2]
      vn_application: |
        推理フェーズで「犯人を選ぶ」行為にリスク（間違える可能性）と
        リターン（正解時の達成感・高スコア）を設計する。
        - ヒントを見ると正答率は上がるがスコアが下がる（リスク/リターン）
        - 早い段階で犯人を当てると高得点（時間リスク）
        - 証拠カードの選択で推理の根拠を問う（思考リスク）
      priority: critical
      status: partial
      features:
        - 推理スコアシステム（正答+根拠+ヒント使用回数で算出）
        - ヒント閲覧ペナルティ（段階的ヒント、見るほどスコア低下）
        - 犯人当て失敗→再挑戦ループ（即ゲームオーバーにしない）

    - id: GM-02
      name: ストレスと解放のリズム
      summary: |
        「ギュッとしてパッと解消」——ストレスは快感を最大化するための投資。
        負荷をかけ、乗り越えた瞬間の解放感が面白さの核。
      source: [B-7]
      vn_application: |
        シナリオの緊張曲線を意識した演出設計:
        - 情報収集フェーズ: 謎が深まる緊張（BGM・画面演出で増幅）
        - 推理フェーズ: 考える負荷（制限時間のプレッシャー）
        - 解決フェーズ: 真相が明かされる解放（BGM転換・演出）
        テキスト表示だけでなく、音と映像で緊張→解放を演出する。
      priority: critical
      status: not_implemented
      features:
        - フェーズ別BGM切り替え（緊張→思考→解放）
        - 真相解明時の演出強化（フラッシュ+SE+BGM転換）
        - 証拠発見時の「発見SE」+画面エフェクト

    - id: GM-03
      name: 「先を見たい」欲求
      summary: |
        高難易度に耐えられるのは、その先に「見たことのない景色」が
        待っているという期待があるから。魅力的な動機付けが必須。
      source: [B-11]
      vn_application: |
        シナリオの「真相」を見たい欲求がプレイの原動力。
        - 途中で投げ出さないよう、各フェーズ末に次への引きを用意
        - 「次の証拠を見つけたら何がわかるのか」の期待感を維持
        - クリア後にのみ見れるエピローグや裏話（ご褒美）
      priority: important
      status: not_implemented
      features:
        - クリア後限定コンテンツ（後日談・設計裏話）
        - シリーズ通しプレイ時のメタストーリー的要素

    - id: GM-04
      name: プレイヤー自身によるリスク設定
      summary: |
        難易度を「押し付けられた壁」ではなく
        「自ら挑む壁」にする。選ばせることで納得感を生む。
      source: [B-12, B-13]
      vn_application: |
        難易度選択を明示的に設けるのではなく、
        プレイヤーの行動で自然に難易度が変わる設計:
        - ヒントを見る/見ないはプレイヤーの自由
        - 全証拠を読んでから推理するか、途中で推理するかも自由
        - 失敗しても「恥ずかしい」と思わせない設計（屈辱感の排除）
      priority: important
      status: not_implemented
      features:
        - 段階的ヒントシステム（自分で選んで見る）
        - 失敗時の自動難易度調整（追加ヒント表示）
        - ミス時の演出を「残念」ではなく「もう一度考えよう」に

    - id: GM-05
      name: デコボコなバランス
      summary: |
        常に同じ難易度の右肩上がりは作業感を生む。
        苦戦する場面と楽に進める場面を交互に配置する。
      source: [B-14, B-15]
      vn_application: |
        シナリオ内のテンション管理:
        - 重い証拠の後に軽い会話シーンを挟む
        - 全証拠を一気に出さず、休息的なシーンを挟む
        - シリーズ内でも難易度の波を作る（Vol.1は易しく、Vol.5は難しく）
      priority: important
      status: partial

    - id: GM-06
      name: 負の要素のリフレーミング
      summary: |
        プレイヤーが回避したい「負の要素」を
        「正のリソース」へ再定義する。ピンチをチャンスに変える設計。
      source: [N-6]
      vn_application: |
        「間違えた推理」を単なるペナルティではなく学びに変換:
        - 間違えた犯人候補の「なぜ犯人ではないか」の解説が見れる
        - 失敗から得た情報が次の推理を助ける
        - 「消去法」としての失敗を肯定する演出
      priority: important
      status: not_implemented
      features:
        - 不正解時の解説表示（なぜその人物は犯人でないか）
        - 推理プロセスの可視化（消去法の視覚的サポート）

# ============================================================================
# 3. ONBOARDING & ACCESSIBILITY — 間口を広く
# ============================================================================
onboarding:
  description: |
    初めてゲームを触る生徒が迷わず遊べるようにする。
    「間口を広く、奥を深く」の実現。

  principles:
    - id: OB-01
      name: 最初の3分間ルール
      summary: |
        冒頭で長い説明を流さず、速やかに「このゲームで何をするか」を
        体験させる。見所からスタート。
      source: [C-1, C-2]
      vn_application: |
        タイトル画面→シナリオ選択→ゲーム開始まで3タップ以内。
        ゲーム冒頭は事件発生シーンから始める（日常描写は最小限）。
        現状のtitle_cardフェーズは簡潔に保つ。
      priority: critical
      status: implemented
      notes: |
        現在のYAMLスクリプト構造は title_card → 事件発生 の流れで
        すでにこの原則に沿っている。

    - id: OB-02
      name: 実践型チュートリアル
      summary: |
        無機質な説明ではなく、本編の流れの中で操作を学ばせる。
        「やりながら覚える」設計。
      source: [C-4, C-5, D-8]
      vn_application: |
        初回プレイ時のみ、操作ガイドをゲーム内に自然に表示:
        - 「タップで次へ」を最初の数テキストで表示
        - メニューボタンの説明は初回アクセス時にツールチップで
        - 推理フェーズ初回時に「証拠カードをタップして確認」を表示
        2回目以降は表示しない。
      priority: important
      status: not_implemented
      features:
        - 初回プレイ検出（localStorage）
        - コンテキスト型ツールチップ（初回のみ表示）
        - 操作ガイドのスキップ機能

    - id: OB-03
      name: 初心者の敷居を下げる
      summary: |
        初心者が触れた瞬間に「自分にもできる」と思わせる。
        KOF '95の教訓——初心者に慈悲を見せないのはサービスの敗北。
      source: [C-6, N-1, N-2]
      vn_application: |
        - マダミス未経験の生徒でも迷わないUI
        - 推理に失敗しても「ゲームオーバー」にしない
        - ふりがなトグルで漢字の壁を除去（実装済み）
        - 難しい用語にはインライン説明を付与
      priority: critical
      status: partial
      notes: ふりがなトグルは実装済み。推理失敗時のフローは未実装。

    - id: OB-04
      name: アクセシビリティの懐深さ
      summary: |
        色覚多様性、操作の制約、視力の差異を考慮した設計。
        あらゆる生徒を歓迎する。
      source: [C-16, J-4]
      vn_application: |
        - フォントサイズ調整機能
        - 高コントラストモード（色覚多様性対応）
        - キーボード操作対応（実装済み）
        - タッチ・マウス・キーボードすべてで同等の操作性
      priority: important
      status: partial
      notes: キーボード操作は実装済み。フォントサイズ・コントラスト設定は未実装。

    - id: OB-05
      name: 非操作時間のスキップ保証
      summary: |
        プレイヤーが操作していない瞬間（ムービー、会話、ロゴ）は
        例外なくスキップまたはポーズ可能にする。
      source: [J-6, C-3]
      vn_application: |
        - 既読テキストのスキップ機能（実装済み: オートモード）
        - タイトルカード・トランジションのスキップ
        - バックログで読み返し可能（実装済み）
        - ゲーム中いつでもポーズ可能
      priority: important
      status: partial
      notes: オートモード・バックログは実装済み。既読スキップは未実装。

# ============================================================================
# 4. NARRATIVE PACING — テキストで緊張と解放を作る
# ============================================================================
pacing:
  description: |
    テキスト主体のゲームにおけるペーシングの原則。
    「読ませる」のではなく「体験させる」。

  principles:
    - id: NP-01
      name: ブランク時間の徹底排除
      summary: |
        フェード、暗転、ロードなどプレイに関与しない時間を極限まで短縮。
        「短気なぐらいがちょうど良い」。
      source: [D-7, J-9]
      vn_application: |
        - シーン遷移のフェード時間を最短に（300ms以下）
        - ローディング状態を必ず表示（スピナーやプログレス）
        - 証拠カード表示の遷移も瞬時に
        - 「何も起きていない」時間を0にする
      priority: critical
      status: partial
      features:
        - トランジション速度の最適化
        - プリロード戦略（次シーンの先読み）

    - id: NP-02
      name: テキスト表示のリズム設計
      summary: |
        テキストの表示速度・間合いが感情のリズムを作る。
        爆発の三段階構造（先行光→爆炎→煙）をテキスト演出に応用。
      source: [H-応用, D-4]
      vn_application: |
        - 重要な台詞の前に短い間（ウェイト）を入れる
        - 衝撃的な事実の表示時: フラッシュ→テキスト表示→余韻の間
        - テキスト速度をシーンの緊張度に連動させる
        - 「……」や「！」の後の自然な間合い
      priority: important
      status: not_implemented
      features:
        - YAML内のwait命令による間合い制御
        - テキスト表示速度の動的変更
        - 衝撃テキスト用の特殊表示モード

    - id: NP-03
      name: 目標の可視化
      summary: |
        「あと少し」という感覚を常に示し、プレイの止め時を奪う。
        進捗が見えないと絶望を与える。
      source: [C-10]
      vn_application: |
        - プログレスバーで全体の進行度を表示（実装済み）
        - 証拠カード収集の進捗（3/5枚発見 等）
        - 「あと1人に話を聞けば推理フェーズ」の予告
      priority: important
      status: partial
      notes: プログレスバーは実装済み。証拠収集進捗は未実装。

    - id: NP-04
      name: 情報の段階的開示
      summary: |
        一度に全てを教えず、その瞬間に必要な情報だけを提示する。
        ジャストインタイムの情報設計。
      source: [C-5]
      vn_application: |
        - 証拠カードは発見順に1枚ずつ開示
        - 全証拠を見てから初めて推理フェーズに移行
        - 各キャラの証言は会話の流れで自然に出す
        - メタ情報（操作方法等）は必要な瞬間にだけ表示
      priority: important
      status: implemented
      notes: YAMLスクリプトの構造上、すでに段階的開示になっている。

# ============================================================================
# 5. UI/UX — 迷わせない、ストレスを与えない
# ============================================================================
ui_ux:
  description: |
    UIは「世界をパッケージングするもの」。
    複雑な機械を操作している自覚を忘れさせる。

  principles:
    - id: UI-01
      name: 重要度に応じたレイアウト
      summary: |
        全要素を均一に並べるのは不親切。
        頻繁に使うものを大きく、たまにしか触れないものを小さく。
      source: [J-1]
      vn_application: |
        - メインの「次へ」タップ領域を最大化（画面全体）
        - メニューボタンは小さく画面端に
        - 推理フェーズの選択肢は大きく中央に
        - 設定画面へのアクセスは控えめに
      priority: important
      status: partial

    - id: UI-02
      name: 色とイメージによる直感的ナビゲーション
      summary: |
        テキストを読ませる「左脳処理」より、
        色や形で瞬時に判断させる「右脳処理」を優先。
      source: [J-2]
      vn_application: |
        - 教科ごとのカラーコード（シナリオ選択画面で実装済み）
        - フェーズごとの色調変化（情報収集=青系、推理=赤系、解決=金系）
        - ボタンの色で機能を区別（決定=強調色、キャンセル=灰色）
      priority: important
      status: partial

    - id: UI-03
      name: 子どもに伝わるテキスト
      summary: |
        ヘルプテキストで「メニュー項目と同じ言葉を使わない」。
        専門用語を避け、ひらがなを開く。
      source: [J-7, J-3]
      vn_application: |
        - 「セーブ」→「つづきを保存する」
        - 「バックログ」→「前の文を見る」
        - 「オートモード」→「自動で読み進める」
        - フォントサイズは携帯端末でも読みやすいサイズを確保
        - ふりがな表示（実装済み）
      priority: critical
      status: partial
      features:
        - UIラベルの平易化
        - ツールチップによる補足説明

    - id: UI-04
      name: 没入感を削がないHUD
      summary: |
        情報表示は必要な時だけ。不要な時は世界観の邪魔をしない。
        情報のフル出しと最小表示を状況で使い分ける。
      source: [J-8]
      vn_application: |
        - テキスト読み進め中はUIボタンを半透明化
        - 推理フェーズではUIを全表示
        - プログレスバーは常時表示だが控えめに
        - メニューは必要時のみ展開
      priority: important
      status: not_implemented
      features:
        - 状況適応型UI透明度
        - テキスト表示中のUIフェードアウト

    - id: UI-05
      name: ローディングの透明化
      summary: |
        画面が暗転したまま「フリーズしたか？」と不安にさせない。
        ロード中であることを素直に示す。
      source: [J-9]
      vn_application: |
        - 画像プリロード中にスピナー表示
        - シーン遷移時にプログレスインジケータ
        - 「読み込み中」のテキストを世界観に合わせる
      priority: important
      status: partial
      notes: 基本的な画像ロードは実装済みだが、明示的なローディング表示は不足。

    - id: UI-06
      name: マップ依存の回避
      summary: |
        プレイヤーの視線を常にメイン画面に留める。
        別画面への遷移を最小化し、必要情報はメイン画面に統合。
      source: [D-10]
      vn_application: |
        - 証拠カードは別画面ではなくオーバーレイで表示
        - キャラ情報もゲーム画面上で確認可能に
        - 推理フェーズの選択肢もゲーム画面内に統合
      priority: important
      status: partial

# ============================================================================
# 6. FEEDBACK & EFFECTS — テキストゲームでも「手応え」を
# ============================================================================
feedback:
  description: |
    エフェクトは「内部の計算結果」を「プレイヤーの確信」に変換する架け橋。
    テキストゲームでも手応えは設計できる。

  principles:
    - id: FE-01
      name: 全入力にリアクション
      summary: |
        どのボタンを押しても、必ず何らかの反応を返す。
        ノーリアクションは契約違反。
      source: [C-7]
      vn_application: |
        - タップ/クリック時に必ずSEを鳴らす
        - ボタンホバー時にビジュアルフィードバック
        - 選択肢タップ時にハイライト+SE
        - 操作不能時間でもタップに反応（「まだ読み込み中です」等）
      priority: critical
      status: partial
      features:
        - 操作SE（テキスト送り音、選択音、決定音）
        - ボタンのホバー/アクティブ状態のビジュアル

    - id: FE-02
      name: 成功時の過剰な褒め演出
      summary: |
        プレイヤーの成功に対し、演出を総動員して褒める。
        努力と演出の報酬が釣り合うこと。
      source: [C-8]
      vn_application: |
        - 犯人正解時: ファンファーレSE + 画面フラッシュ + 称賛テキスト
        - 高スコア達成時: 特別な演出（紙吹雪エフェクト等）
        - 証拠カード発見時: 「発見！」SE + カード登場アニメーション
        - 結果画面の演出を豪華に（現在のResultScreenを強化）
      priority: critical
      status: partial
      notes: ResultScreenは実装済みだが、演出が淡白。

    - id: FE-03
      name: 衝撃の三段階演出
      summary: |
        重要な瞬間は「先行光（注目）→ 爆炎（衝撃）→ 煙（余韻）」の
        三段階で構成する。テキストゲームにも応用可能。
      source: [H-7, H-応用]
      vn_application: |
        真相解明の瞬間:
        1. 先行光: 画面フラッシュ + 一瞬の静寂（BGM停止）
        2. 爆炎: 犯人名テキストの強調表示 + 衝撃SE + 画面振動
        3. 煙: BGM再開（解決テーマ）+ 余韻のテキスト
        証拠発見時も同様の三段階を軽めに適用。
      priority: important
      status: not_implemented
      features:
        - 画面フラッシュコマンド（YAML対応）
        - 画面振動コマンド（CSS animation）
        - BGM即時切り替え+フェード

    - id: FE-04
      name: 明暗混合による視認性
      summary: |
        エフェクトは明るい色だけでなく、暗い色を混ぜることで
        どんな背景でも視認性を確保する。
      source: [H-1, H-2]
      vn_application: |
        - テキストウィンドウは半透明+影付きで背景に依存しない視認性
        - 強調テキストは明暗のコントラストで（白文字+黒縁取り）
        - エフェクト（フラッシュ等）も明暗を交互に
      priority: important
      status: partial

    - id: FE-05
      name: 画面振動の多層設計
      summary: |
        振動は大・中・小を状況で使い分ける。
        一律ではなく、衝撃の大きさに応じた段階的な演出。
      source: [H-4]
      vn_application: |
        - 大振動: 真相解明、衝撃的事実の判明
        - 中振動: 重要証拠の発見、犯人の反論
        - 小振動/微振動: 不穏な雰囲気の演出
        CSS animationで実装。振動方向も使い分ける。
      priority: nice_to_have
      status: not_implemented
      features:
        - shake-large / shake-medium / shake-small の3段階CSS
        - YAMLコマンドで振動指定

# ============================================================================
# 7. SOUND DESIGN — 音で感情を操る
# ============================================================================
sound:
  description: |
    「名作に音の悪いものなし」。
    音はプレイヤーの心理にダイレクトに介入する。

  principles:
    - id: SD-01
      name: フェーズ別BGMとBPM同期
      summary: |
        ゲーム内容に即したBPMを選定し、操作リズムを補助する。
        フェーズの感情に合わせてBGMを切り替える。
      source: [I-1]
      vn_application: |
        - 情報収集フェーズ: 穏やかだが不穏なBGM（BPM 80-100）
        - 推理フェーズ: 緊張感のあるBGM（BPM 120-140）
        - 真相解明: 劇的なBGM（BPM 100-120、メロディアス）
        - 日常シーン: 軽快なBGM（BPM 100-120）
        ループポイントはフェーズの平均所要時間に合わせる。
      priority: important
      status: not_implemented
      notes: BGMファイルは未調達。フリー素材から選定予定。

    - id: SD-02
      name: SEのアタック重視設計
      summary: |
        効果音の立ち上がりを最速・最強に。
        残響は次のアクションを阻害しない程度に抑える。
      source: [I-3]
      vn_application: |
        - テキスト送りSE: 短く鋭い「カチッ」
        - 選択肢決定SE: 明確な「ポン」
        - 証拠発見SE: 鮮明な「キラリン」
        - 正解SE: 華やかだが短い「ファンファーレ」
        - 不正解SE: 重すぎない「ブブー」（屈辱を与えない）
      priority: important
      status: not_implemented
      notes: SEファイルは未調達。

    - id: SD-03
      name: 音量プライオリティの階層化
      summary: |
        音量は「プレイヤーの判断への影響度」で決定する。
        演出の派手さではなく、情報の重要度で音量を設定。
      source: [I-5]
      vn_application: |
        優先度順:
        1. 操作SE（タップ、選択）— 最も手前
        2. 重要イベントSE（証拠発見、正解/不正解）
        3. BGM — 環境音として背景に
        4. 環境SE（風、雨など）— 最も奥
        BGMは操作SEと被らない音量バランスに。
      priority: important
      status: not_implemented

    - id: SD-04
      name: 沈黙の戦略的活用
      summary: |
        完全な無音は世界の存在感を消す。
        しかし、意図的な一瞬の沈黙は最大の演出になる。
      source: [I-6]
      vn_application: |
        - 真相解明直前にBGMをフェードアウト→沈黙→衝撃SE
        - 重要な選択の直前にBGMを一瞬止める
        - 通常時は環境音（微かな音）を常に流し、無音にしない
      priority: important
      status: not_implemented

    - id: SD-05
      name: メロディのブランド化
      summary: |
        曲数を増やすよりメインテーマの変奏で統一感を出す。
        「あの曲だ」と口ずさめる認識の一貫性を最優先。
      source: [I-2]
      vn_application: |
        - ナゾトキ探偵団のメインテーマを1つ定める
        - 各フェーズBGMはメインテーマのアレンジ
        - シリーズごとの個別テーマは不要（メインテーマの変奏で対応）
        - 結果画面はメインテーマの勝利アレンジ
      priority: nice_to_have
      status: not_implemented

# ============================================================================
# 8. VISUAL DESIGN — 限られたアセットで最大の表現を
# ============================================================================
visual:
  description: |
    汎用スプライト+フリー背景という制約下で、
    最大の没入感と情報伝達を実現する。

  principles:
    - id: VD-01
      name: 情報の優先度に基づく描画
      summary: |
        画面内の全要素を均等に扱わない。
        プレイヤーが注視すべきものを強調し、それ以外は控えめに。
      source: [FG-2]
      vn_application: |
        - 話している（アクティブな）キャラを明るく、他を暗く
        - テキストウィンドウが最も前面に
        - 背景は雰囲気を出すが主張しすぎない
        - 証拠カード表示時は背景を暗転させて集中させる
      priority: important
      status: partial
      notes: スプライトのshow/hideは実装済み。明暗制御は未実装。

    - id: VD-02
      name: シルエットの明確さ
      summary: |
        真っ黒に塗り潰しても「誰か」が分かるデザイン。
        キャラクターの個性はシルエットで伝わるべき。
      source: [FG-6]
      vn_application: |
        - 犯人当てフェーズでシルエット表示を使う演出に活用
        - 各キャラの髪型・体格・ポーズで識別可能なスプライト設計
        - Gemini画像生成プロンプトにシルエット明確性を指定
      priority: nice_to_have
      status: not_implemented

    - id: VD-03
      name: スタイルの統合
      summary: |
        異なるソースのアセットが同一画面で違和感なく共存するよう、
        彩度・タッチ・環境光を調整する。
      source: [FG-5]
      vn_application: |
        - 汎用スプライト（Gemini生成）と背景画像のスタイル統一
        - 全スプライトの彩度・線の太さを揃える
        - 背景画像にフィルター処理で統一感を出す
      priority: important
      status: partial
      notes: スプライトはGemini統一プロンプトで生成中。背景との調和は課題。

    - id: VD-04
      name: アクティブキャラの視線誘導
      summary: |
        発話中のキャラクターに視線を誘導する。
        非アクティブキャラは視覚的に退かせる。
      source: [FG-3, H-3]
      vn_application: |
        - 発話キャラのスプライトを少し拡大 or 明るく
        - 非発話キャラのスプライトを暗くする or 彩度を下げる
        - キャラ名表示の色を発話者に合わせる
      priority: important
      status: not_implemented
      features:
        - アクティブスプライトのハイライト処理
        - 非アクティブスプライトの減光CSS

# ============================================================================
# 9. REWARD & PROGRESSION — やめられない、達成感の連鎖
# ============================================================================
progression:
  description: |
    「つい遊んでしまう」状況は、目先の報酬と長期目標が
    計算通りに配置された時にのみ発生する。

  principles:
    - id: RP-01
      name: 推理スコアの文脈化
      summary: |
        抽象的な数字ではなく、プレイヤーが価値を直感できる尺度にする。
        「脳年齢」「世界戦闘力」のように。
      source: [C-12]
      vn_application: |
        スコアを「探偵ランク」として文脈化:
        - S: 名探偵（全問正解+ノーヒント+高速）
        - A: 熟練探偵
        - B: 見習い探偵
        - C: 探偵助手
        点数そのものより、ランク名で達成感を演出する。
      priority: critical
      status: partial
      notes: ResultScreenにスコア表示はあるが、ランク制は未実装。
      features:
        - 探偵ランクシステム（S/A/B/C）
        - ランクに応じた称号テキストと演出
        - ランク判定ロジック（正答率+ヒント使用+所要時間）

    - id: RP-02
      name: クリア済みバッジ
      summary: |
        達成状況を可視化し、「隣接する未達成」で行動を誘導する。
        クリアチェッカーの原理。
      source: [N-9]
      vn_application: |
        - シナリオ選択画面にクリア済みバッジ表示
        - ランク別のバッジカラー（S=金、A=銀、B=銅、C=無色）
        - 未プレイシナリオが目立つデザイン
        - 「あと3本でシリーズコンプリート」の表示
      priority: critical
      status: not_implemented
      features:
        - localStorage でクリア履歴管理
        - シナリオ選択画面にバッジUI
        - シリーズ完了率の表示

    - id: RP-03
      name: シリーズコンプリート報酬
      summary: |
        収集は「使い道」と「達成感」があって初めて肯定される。
        コンプリートした瞬間の特別な演出。
      source: [B-9, N-9]
      vn_application: |
        - シリーズ全10本クリアで「シリーズマスター」称号
        - コンプリート時の特別演出（ファンファーレ+称号カード）
        - 全シリーズコンプリートで「名探偵マスター」（究極の目標）
        - コンプリート状況をシナリオ選択画面で可視化
      priority: important
      status: not_implemented
      features:
        - シリーズコンプリート判定
        - コンプリート演出コンポーネント
        - 称号システム（localStorage）

    - id: RP-04
      name: 累積探偵ランク
      summary: |
        1回のプレイだけでなく、全プレイを通じた累積的な成長実感。
        「上達している」と感じさせる。
      source: [B-8, C-10]
      vn_application: |
        - 累積クリア数に応じた「探偵レベル」
        - レベルアップ時の演出
        - プロフィール画面で累積成績を確認可能
        - 「前回よりスコアが上がった」の表示
      priority: important
      status: not_implemented
      features:
        - 累積探偵レベルシステム
        - レベルアップ演出
        - プロフィール/成績画面

    - id: RP-05
      name: 迅速な再挑戦
      summary: |
        ミスから再開までの時間はデッドタイム。
        熱が冷める前に操作を手渡す。
      source: [B-21, B-22]
      vn_application: |
        - 犯人当て失敗→即座に再挑戦ボタン（長い演出を挟まない）
        - リトライ時は推理フェーズの直前から（最初からやり直しにしない）
        - 「もう一度考えてみよう」の1行テキスト+選択肢再表示
      priority: critical
      status: not_implemented
      features:
        - 犯人当て失敗→再挑戦フロー
        - リトライ時のスキップ（既読部分を飛ばす）

    - id: RP-06
      name: 許容される発見の喜び
      summary: |
        効率的な攻略法や隠し要素をプレイヤーが「発見」する喜び。
        開発側が全てを管理しすぎない余白を残す。
      source: [B-16]
      vn_application: |
        - 特定の選択肢の組み合わせで隠しテキストが表示される
        - 全シナリオSランククリアで隠し要素解放
        - 証拠カードを特定の順番で確認すると追加情報が出る（将来）
      priority: nice_to_have
      status: not_implemented

# ============================================================================
# 実装優先度マトリクス
# ============================================================================
implementation_priority:
  description: |
    原則を「影響度 × 実装コスト」で分類。
    Phase 3（ゲーム改善）の実装順序の指針。

  immediate:
    description: 次のスプリントで実装すべき（高影響・低コスト）
    items:
      - id: RP-01
        feature: 探偵ランクシステム（S/A/B/C）
        effort: small
        reason: ResultScreenに追加するだけ。スコア計算ロジック+表示。

      - id: RP-02
        feature: クリア済みバッジ（シナリオ選択画面）
        effort: small
        reason: localStorage + CSSバッジ。選択画面のUX向上に直結。

      - id: FE-01
        feature: 操作SE（テキスト送り、選択、決定）
        effort: small
        reason: フリーSE素材 + Audio API。手応えの劇的改善。

      - id: RP-05
        feature: 犯人当て失敗→再挑戦フロー
        effort: medium
        reason: ゲームオーバーの排除。教育ゲームとして必須。

      - id: UI-03
        feature: UIラベルの平易化
        effort: small
        reason: テキスト変更のみ。子ども向けの基本。

  short_term:
    description: 1-2週間以内に実装（高影響・中コスト）
    items:
      - id: GM-01
        feature: 推理スコアシステム（正答+根拠+ヒント）
        effort: medium

      - id: GM-04
        feature: 段階的ヒントシステム
        effort: medium

      - id: FE-02
        feature: 正解/不正解の演出強化
        effort: medium

      - id: FE-03
        feature: 真相解明の三段階演出
        effort: medium

      - id: VD-04
        feature: アクティブキャラのハイライト
        effort: small

  medium_term:
    description: 1ヶ月以内に実装（中影響・中〜高コスト）
    items:
      - id: SD-01
        feature: フェーズ別BGM
        effort: large
        blocker: BGM素材の調達が必要

      - id: RP-03
        feature: シリーズコンプリート報酬
        effort: medium

      - id: RP-04
        feature: 累積探偵レベル
        effort: medium

      - id: OB-02
        feature: 初回プレイチュートリアル
        effort: medium

      - id: GM-06
        feature: 不正解時の解説表示
        effort: medium

  long_term:
    description: 将来的に検討（低〜中影響 or 高コスト）
    items:
      - id: OB-04
        feature: フォントサイズ・コントラスト設定
      - id: NP-02
        feature: テキスト表示リズムの動的制御
      - id: FE-05
        feature: 画面振動の多層設計
      - id: SD-05
        feature: メインテーマの変奏BGM体系
      - id: VD-02
        feature: シルエット演出
      - id: RP-06
        feature: 隠し要素・イースターエッグ
      - id: GM-03
        feature: クリア後限定コンテンツ
