meta:
  id: security-07
  title: "みんなで帰ろう"
  series: "防犯探偵団"
  volume: 7
  estimatedMinutes: 18

characters:
  mamori:
    name: "マモリ"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  kagiru:
    name: "カギル"
    color: "#FF4444"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  mihari:
    name: "ミハリ"
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  anzen:
    name: "アンゼン"
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "学校で「集団下校強化週間」が始まった。"
      - type: narration
        text: "マモリは防犯リーダーとして下級生の集団下校を任された。"
      - type: narration
        text: "「みんなを安全に帰すんだ」と張り切り、2年生4人を集めて集合場所を指定した。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: mamori
        expression: worried
        position: center
      - type: dialog
        character: mamori
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: mamori
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: mamori, expression: determined }
          - { id: kagiru, expression: thinking }
          - { id: mihari, expression: thinking }
          - { id: anzen, expression: worried }
      - type: narration
        text: "「防犯探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: mamori
        action: hide
      - type: sprite
        character: kagiru
        action: hide
      - type: sprite
        character: mihari
        action: hide
      - type: sprite
        character: anzen
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "防犯探偵団"
        subtitle: "Vol.7 みんなで帰ろう"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "事件報告: 集団下校強化週間中にヒヤリハット発生。2年生が集合場所から先に帰ろうとして自転車と接触しそうに"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、①導入ためのヒントはどこにありそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "「安全な集合場所の条件」カード: ①人目につく ②大通りから見える ③死角がない ④明るい ⑤すぐに助けを求められる"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、①導入ためのヒントはどこにありそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "マモリの計画書"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、②探索ためのヒントはどこにありそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "2年生の証言: 「15時半に空き地に行った。誰もいなかった。暗くなってきて怖くて帰ろうとした」+ ヒヤリハットの状況"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、②探索ためのヒントはどこにありそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "校門裏の空き地の上空写真と大通りからの写真: 大通りから完全に死角。屋根はあるが周囲の壁で囲まれ、外から中が見えない"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、③反転ためのヒントはどこにありそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: mamori
        expression: worried
        position: left
      - type: dialog
        character: mamori
        text: "条件付き公開後、「屋根のことは考えた。でも\"大通りから見えるか\"は考えなかった」と自分の盲点を認める"
      - type: sprite
        character: mamori
        action: hide
      - type: sprite
        character: kagiru
        expression: thinking
        position: right
      - type: dialog
        character: kagiru
        text: "空き地の出口は狭くて見通しが悪い。2年生が飛び出したら自転車から見えない」と現場検証"
      - type: sprite
        character: kagiru
        action: hide
      - type: sprite
        character: mihari
        expression: thinking
        position: left
      - type: dialog
        character: mihari
        text: "計画書を見てください。\"屋根\"\"広さ\"\"近さ\"はあるけど、\"見通し\"がない。一番大事なことが抜けてる」と情報欠落を発見"
      - type: sprite
        character: mihari
        action: hide
      - type: sprite
        character: anzen
        expression: thinking
        position: right
      - type: dialog
        character: anzen
        text: "安全\"のために集めたのに、\"怖い\"場所に待たせた。2年生の気持ちを考えると…」と問いかける"
      - type: sprite
        character: anzen
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「集合場所の選定ミスをしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: mamori, expression: normal }
          - { id: kagiru, expression: normal }
          - { id: mihari, expression: normal }
          - { id: anzen, expression: worried }
      - type: choice
        id: q1
        text: "集合場所の選定ミスをしたのは誰？"
        options:
          - text: "マモリ"
            value: mamori
            correct: true
            feedback: "マモリは\"みんなのために\"と本気で計画した。でも集合場所の選定基準に\"見通し\"\"人目\"が抜けていた。屋根や広さだけでなく、\"大通りから見えるか\"\"死角がないか\"が安全の鉄則。良い計画には安全チェックリストが必要なんだ"
          - text: "カギル"
            value: kagiru
            correct: false
            feedback: "カギルはヒヤリハットの現場を調査した側"
          - text: "ミハリ"
            value: mihari
            correct: false
            feedback: "ミハリは計画書の欠落項目を発見した側"
          - text: "アンゼン"
            value: anzen
            correct: false
            feedback: "アンゼンは2年生の気持ちを代弁した側"
      - type: sprite
        character: mamori
        action: hide
      - type: sprite
        character: kagiru
        action: hide
      - type: sprite
        character: mihari
        action: hide
      - type: sprite
        character: anzen
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、マモリ（守）"
      - type: dialog
        character: sensei
        text: "動機は、#8 みんなのために — マモリは「防犯リーダーとしてみんなを守りたい」と本気で思っていた。集合場所を校門裏の空き地にしたのは「雨でも屋根があるから」。集合時間をずらしたのは「学年ごとに終わる時間が違うから」。全て善意の判断だった。しかし「大通りから見えるか」「待っている間の安全」という視点が欠落していた。結果として、見通しの悪い場所で子どもが1人で待つ状態を作ってしまった。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: mamori
        expression: worried
        position: center
      - type: dialog
        character: mamori
        text: "条件付き公開後、「屋根のことは考えた。でも\"大通りから見えるか\"は考えなかった」と自分の盲点を認める"
      - type: sprite
        character: mamori
        expression: determined
      - type: dialog
        character: mamori
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: mamori
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・集団下校の安全設計: 集合場所は「人目につく」「大通りから見える」「死角がない」場所を選ぶ。善意の計画にも安全確認が必要\n・情報欠落: 計画書に「書いてあること」だけでなく「書いていないこと」（欠落情報）に気づく推理スキル"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: mamori, expression: happy }
          - { id: kagiru, expression: happy }
          - { id: mihari, expression: happy }
          - { id: anzen, expression: happy }
      - type: narration
        text: "防犯探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: mamori
        action: hide
      - type: sprite
        character: kagiru
        action: hide
      - type: sprite
        character: mihari
        action: hide
      - type: sprite
        character: anzen
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
