scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "パレットの4{人|にん}が{共同|きょうどう}{制作|せいさく}した{大型|おおがた}モザイクアート「{四季|しき}の{窓|まど}」。{春|はる}・{夏|なつ}・{秋|あき}・{冬|ふゆ}の4{枚|まい}のパネルを{並|なら}べると1つの{風景画|ふうけいが}になる{設計|せっけい}。"
      - type: narration
        text: "ところが{展示|てんじ}{当日|とうじつ}、{完成品|かんせいひん}を{見|み}ると——**{全体|ぜんたい}のバランスが{崩|くず}れている**。{春|はる}パネルだけ{浮|う}いて{見|み}える。"
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "\"{全員|ぜんいん}が「{設計図|せっけいず}{通|どお}りに{作|つく}った」と{言|い}う。でも{全体|ぜんたい}を{見|み}ると{何|なに}かがおかしい。"
      - type: narration
        text: "\"{大事|だいじ}な{知識|ちしき}——モザイクアートの{接続|せつぞく}ルール。{隣|となり}り{合|あ}うパネルの{辺|へん}のタイルの{色|いろ}が{一致|いっち}するように{設計|せっけい}されている。1{枚|まい}でもタイルの{配置|はいち}が{変|か}わると、{隣|となり}との{接続|せつぞく}が{崩|くず}れる。"
      - type: effect
        name: fade-out
      - type: title_card
        text: "モザイクの謎"
        subtitle: "美術探偵団 Vol.6"

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1"
        subtitle: "全体の印象と接続ルール"
      - type: narration
        text: "{冬|ふゆ}→{秋|あき}→{夏|なつ}はスムーズに{色|いろ}がつながっている。**{夏|なつ}→{春|はる}の{接続|せつぞく}だけ{不自然|ふしぜん}**。{色|いろ}の{流|なが}れが{途切|とぎ}れている。"
      - type: narration
        text: "{設計図|せっけいず}の{接続|せつぞく}ルール——{春|はる}の{右辺|うへん}＝{黄緑|きみどり}、{夏|なつ}の{左辺|さへん}＝{黄緑|きみどり}（{一致|いっち}する{設計|せっけい}）。{夏|なつ}-{秋|あき}＝{緑|みどり}。{秋|あき}-{冬|ふゆ}＝{赤紫|あかむらさき}。"
      - type: narration
        text: "{実際|じっさい}の{状態|じょうたい}——{春|はる}-{夏|なつ}: {春|はる}の{右辺|うへん}＝**ピンク** vs {夏|なつ}の{左辺|さへん}＝{黄緑|きみどり} → **❌ {不一致|ふいっち}**。{夏|なつ}-{秋|あき}: ✅。{秋|あき}-{冬|ふゆ}: ✅。"
      - type: narration
        text: "**{春|はる}パネルの{右辺|うへん}だけ{設計図|せっけいず}と{違|ちが}う**。{黄緑|きみどり}→ピンクに{変|か}わっている。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: "ステップ2"
        subtitle: "証言と行動記録"
      - type: narration
        text: "4{人|にん}{全員|ぜんいん}が「{設計図|せっけいず}{通|どお}りに{作|つく}った」と{言|い}っている。でも{春|はる}パネルの{右辺|うへん}は{設計図|せっけいず}と{違|ちが}う。**{誰|だれ}かが{嘘|うそ}をついている**。{春|はる}パネルの{担当|たんとう}は**サクラ**。"
      - type: narration
        text: "{昨日|きのう}の{放課後|ほうかご}——16:00タクミ・ニジカ{退室|たいしつ}。16:05ユウ{退室|たいしつ}。**16:20サクラ{退室|たいしつ}（{最後|さいご}。「ちょっと{仕上|しあ}げしてから{帰|かえ}る」）**。"
      - type: sprite
        character: nijika
        expression: thinking
        position: left
      - type: dialog
        character: nijika
        text: "サクラが{先週|せんしゅう}「この{配色|はいしょく}、もっと{良|い}い{組|く}み{合|あ}わせがあるんだけどな」って{言|い}ってたよ。「{設計図|せっけいず}{通|どお}りでいいじゃん」って{返|かえ}したら、{渋|しぶ}い{顔|かお}してた。"
        expression: thinking
      - type: sprite
        character: nijika
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "決定的証拠"
        subtitle: "全探索照合の結果"
      - type: effect
        name: fade-in
      - type: sprite
        character: takumi
        expression: determined
        position: left
      - type: dialog
        character: takumi
        text: "{設計図|せっけいず}と{全|ぜん}パネルを**1タイルずつ{照合|しょうごう}**した。{夏|なつ}パネル: {全一致|ぜんいっち} ✅。{秋|あき}パネル: {全一致|ぜんいっち} ✅。{冬|ふゆ}パネル: {全一致|ぜんいっち} ✅。"
        expression: determined
      - type: dialog
        character: takumi
        text: "**{春|はる}パネル（サクラ{担当|たんとう}）の{右辺列|うへんれつ}だけ{不一致|ふいっち} ❌**。{設計図|せっけいず}では{黄緑|きみどり}→ピンク→{黄緑|きみどり}→ピンク（{交互|こうご}）。{実物|じつぶつ}は{黄緑|きみどり}→ピンク→**ピンク→{黄緑|きみどり}**（グラデーション）。3{番目|ばんめ}と4{番目|ばんめ}が{入|い}れ{替|か}わっている。"
        expression: surprised
      - type: sprite
        character: takumi
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "サクラが{交互|こうご}パターンをグラデーションに{変更|へんこう}した。サクラのパネル{単体|たんたい}では{美|うつく}しい。でも{右辺|うへん}の{色|いろ}が{変|か}わったため{夏|なつ}パネルとの{接続|せつぞく}が{崩|くず}れ、{全体|ぜんたい}のバランスが{壊|こわ}れた。"
      - type: effect
        name: shake
        duration: 300
      - type: sprite
        character: yuu
        expression: thinking
        position: right
      - type: dialog
        character: yuu
        text: "サクラのパネル、{単体|たんたい}では{確|たし}かに{美|うつく}しいよ。グラデーションの{方|ほう}が{繊細|せんさい}。でも{全体|ぜんたい}の{中|なか}では{浮|う}いている。**{部分|ぶぶん}が{美|うつく}しい＝{全体|ぜんたい}が{美|うつく}しい**とは{限|かぎ}らないんだ。"
        expression: thinking
      - type: sprite
        character: yuu
        action: hide

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: "推理タイム"
        subtitle: "犯人は誰だ？"
      - type: narration
        text: "{証拠|しょうこ}をまとめよう。{春|はる}パネルの{右辺列|うへんれつ}だけ{設計図|せっけいず}と{不一致|ふいっち}。{春|はる}パネルの{担当|たんとう}はサクラ。サクラが{最後|さいご}に15{分間|ふんかん}1{人|り}で{残|のこ}った。「もっと{良|い}い{配色|はいしょく}がある」と{発言|はつげん}。"
      - type: choice
        id: q1
        question: "モザイクのタイル配置を変えた犯人は？"
        options:
          - text: サクラ（春パネル担当＋右辺列が不一致＋最後に退室＋「もっと良い配色」発言）
            value: sakura
            correct: true
            feedback: "{正解|せいかい}！ サクラは「こっちの{方|ほう}が{美|うつく}しい」と{交互|こうご}パターンをグラデーションに{変|か}えた。{単体|たんたい}では{美|うつく}しいが、{全体|ぜんたい}の{接続|せつぞく}が{崩|くず}れた。**{部分|ぶぶん}{最適|さいてき}≠{全体|ぜんたい}{最適|さいてき}**。"
          - text: タクミ（全探索照合をした人）
            value: takumi
            feedback: "タクミは{設計図|せっけいず}との{照合|しょうごう}で{不一致|ふいっち}を{発見|はっけん}した{側|がわ}。{夏|なつ}パネルは{全一致|ぜんいっち}だよ。"
          - text: ニジカ（サクラの発言を知っていた人）
            value: nijika
            feedback: "ニジカは{動機|どうき}{情報|じょうほう}を{持|も}っている{側|がわ}。{秋|あき}パネルは{全一致|ぜんいっち}だよ。"
          - text: ユウ（全体の印象を分析した人）
            value: yuu
            feedback: "ユウは{全体|ぜんたい}と{部分|ぶぶん}の{違|ちが}いに{気|き}づいた{側|がわ}。{冬|ふゆ}パネルは{全一致|ぜんいっち}だよ。"

  # ==================== 真実：サクラ ====================
  - id: truth-sakura
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
        subtitle: "サクラの告白"
      - type: effect
        name: fade-in
      - type: sprite
        character: sakura
        expression: worried
        position: center
      - type: dialog
        character: sakura
        text: "……ごめんなさい。{春|はる}パネルの{右辺列|うへんれつ}のタイルを{並|なら}べ{替|か}えたのはわたしです。"
        expression: worried
      - type: dialog
        character: sakura
        text: "{交互|こうご}パターンよりグラデーションの{方|ほう}が{美|うつく}しいって{確信|かくしん}があった。「こっちの{方|ほう}が{絶対|ぜったい}きれい」って。"
        expression: thinking
      - type: dialog
        character: sakura
        text: "でも{自分|じぶん}のパネルだけ{見|み}ていた。{全体|ぜんたい}を{見|み}たら{夏|なつ}パネルとの{接続|せつぞく}が{崩|くず}れてた……。{相談|そうだん}すればよかった。ごめんなさい。"
        expression: worried
      - type: sprite
        character: sakura
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: yuu
        expression: normal
        position: center
      - type: dialog
        character: yuu
        text: "サクラのこだわりは{素晴|すば}らしい。でも{共同|きょうどう}{制作|せいさく}は{全体|ぜんたい}の{調和|ちょうわ}が{大事|だいじ}。1{人|り}が{変|か}えると{全体|ぜんたい}が{崩|くず}れる。{相談|そうだん}してから{変|か}えれば、みんなで「もっと{良|い}い{設計図|せっけいず}」を{作|つく}れたかもしれない。"
        expression: happy
      - type: sprite
        character: yuu
        action: hide
      - type: narration
        text: "\"{構成|こうせい}の4{原則|げんそく}——バランス・リズム・{対称|たいしょう}・{統一感|とういつかん}。モザイクアートは{全|ぜん}パネルの{関係|かんけい}で{成|な}り{立|た}つ。"
      - type: narration
        text: "\"{全探索|ぜんたんさく}——{全|すべ}てのタイルを1つずつ{確認|かくにん}して、たった1{箇所|かしょ}の{変更|へんこう}を{発見|はっけん}した。{地道|じみち}に1つずつ{確|たし}かめる{力|ちから}が{真実|しんじつ}に{導|みちび}く。"
      - type: narration
        text: "\"**{部分|ぶぶん}{最適|さいてき}≠{全体|ぜんたい}{最適|さいてき}**。{自分|じぶん}のパートが{完璧|かんぺき}でも、{全体|ぜんたい}の{中|なか}で{合|あ}わなければ{意味|いみ}がない。{美術|びじゅつ}も{音楽|おんがく}もチームワークも{同|おな}じ。"
      - type: effect
        name: fade-out
