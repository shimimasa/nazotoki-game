meta:
  id: money-01
  title: 消えたお小遣い
  series: お金の探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  yuta:
    name: ユウタ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  sakura:
    name: サクラ
    color: "#FF6B9D"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  kaito:
    name: カイト
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  nanoha:
    name: ナノハ
    color: "#2E8B57"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: money-01/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}の「お{小遣|こづか}い{管理|かんり}プロジェクト」。4人がそれぞれ500円のお{小遣|こづか}いをもらい、1{週間|しゅうかん}の使い方をお{小遣|こづか}い{帳|ちょう}に{記録|きろく}する。"
      - type: narration
        text: "月曜日から木曜日まで、みんなは{文房具|ぶんぼうぐ}やおやつを買って、お{小遣|こづか}い{帳|ちょう}に{記録|きろく}した。"
      - type: narration
        text: "そして金曜日——{発表|はっぴょう}の時間。"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "では、お{小遣|こづか}い{帳|ちょう}の{残金|ざんきん}と{財布|さいふ}の中身を{確認|かくにん}しましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: yuta, expression: normal }
          - { id: sakura, expression: happy }
          - { id: kaito, expression: normal }
          - { id: nanoha, expression: normal }
      - type: narration
        text: "サクラのお{小遣|こづか}い{帳|ちょう}は{完璧|かんぺき}。ユウタとナノハにはちょっとしたズレ。ところが——"
      - type: sprite
        character: yuta
        action: hide
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: kaito
        action: hide
      - type: sprite
        character: nanoha
        action: hide
      - type: bgm
        action: stop
      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "カイトくん、お{小遣|こづか}い{帳|ちょう}には{残金|ざんきん}230円と{書|か}いてあるのに、{財布|さいふ}には110円しかないよ。"
      - type: dialog
        character: sensei
        text: "120円はどこに{消|き}えたの？"
      - type: sprite
        character: sensei
        action: hide
      - type: bgm
        track: money-01/investigation
      - type: sprite
        character: kaito
        expression: surprised
        position: center
      - type: dialog
        character: kaito
        text: "え……おかしいなぁ。ちゃんと{記録|きろく}したはずなんだけど……。"
        expression: worried
      - type: sprite
        character: kaito
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: お金の探偵団 Vol.1
        subtitle: 消えたお小遣い

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: classroom
    bgm: money-01/investigation
    steps:
      - type: narration
        text: "4人のお{小遣|こづか}い{帳|ちょう}を{確認|かくにん}しよう。{全員|ぜんいん}500円からスタート。"
      - type: sprite
        character: yuta
        expression: normal
        position: left
      - type: dialog
        character: yuta
        text: "ぼくは{計算|けいさん}が{得意|とくい}。お{小遣|こづか}い{帳|ちょう}は{正確|せいかく}につけたつもりだよ。"
      - type: dialog
        character: yuta
        text: "月曜にノート180円、木曜に{鉛筆|えんぴつ}セット……えっと、110円を買いました。"
        expression: thinking
      - type: sprite
        character: yuta
        action: hide
      - type: sprite
        character: sakura
        expression: happy
        position: right
      - type: dialog
        character: sakura
        text: "わたしはお買い物が大好き！ でも今週はがまんして、{文房具|ぶんぼうぐ}だけにしたよ。"
      - type: dialog
        character: sakura
        text: "火曜にかわいいメモ{帳|ちょう}200円、水曜にシール80円。{帳簿|ちょうぼ}と{財布|さいふ}はぴったり！"
        expression: normal
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: kaito
        expression: normal
        position: left
      - type: dialog
        character: kaito
        text: "おれは月曜にノート150円、火曜に{消|け}しゴム70円、木曜に{鉛筆|えんぴつ}50円を買ったよ。"
      - type: dialog
        character: kaito
        text: "{合計|ごうけい}270円だから、{残|のこ}りは230円のはずなのに……{財布|さいふ}には110円しかない。なんで？"
        expression: worried
      - type: sprite
        character: kaito
        action: hide
      - type: sprite
        character: nanoha
        expression: normal
        position: right
      - type: dialog
        character: nanoha
        text: "わたしは{倹約家|けんやくか}だから、水曜に{消|け}しゴム40円だけ。{残|のこ}りは460円のはず……"
      - type: dialog
        character: nanoha
        text: "あれ、{財布|さいふ}は450円。10円だけ合わないや。"
        expression: thinking
      - type: sprite
        character: nanoha
        action: hide

  # ===== 証拠カード1: お小遣い帳サマリー =====
  - id: evidence-1
    bg: classroom
    bgm: money-01/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: 4人のお小遣い帳を比べよう
      - type: narration
        text: "4人の{帳簿|ちょうぼ}{残金|ざんきん}と{実際|じっさい}の{残金|ざんきん}を{比|くら}べてみよう。"
      - type: narration
        text: "ユウタ：{帳簿|ちょうぼ}210円 vs {財布|さいふ}200円 → 10円のズレ"
      - type: narration
        text: "サクラ：{帳簿|ちょうぼ}220円 vs {財布|さいふ}220円 → ぴったり{一致|いっち}！"
      - type: narration
        text: "ナノハ：{帳簿|ちょうぼ}460円 vs {財布|さいふ}450円 → 10円のズレ"
      - type: narration
        text: "そして——"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "カイト：{帳簿|ちょうぼ}230円 vs {財布|さいふ}110円 → 120円のズレ！"
      - type: narration
        text: "ユウタとナノハの10円は「ちょっとした書き{間違|まちが}い」で{説明|せつめい}できるかもしれない。"
      - type: narration
        text: "でもカイトの120円は——1回分の買い物がまるごと{消|き}えている{金額|きんがく}だ。"

  # ===== 証拠カード2: レシート照合 =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: レシートと帳簿を照合しよう
      - type: narration
        text: "レシートとお{小遣|こづか}い{帳|ちょう}を{比|くら}べて、ズレの{原因|げんいん}を{調|しら}べよう。"
      - type: narration
        text: "ユウタ：レシートでは{鉛筆|えんぴつ}セット120円。でも{帳簿|ちょうぼ}には110円と{記録|きろく}。→ {値段|ねだん}の書き{間違|まちが}い（10円）"
      - type: narration
        text: "ナノハ：レシートでは{消|け}しゴム50円。でも{帳簿|ちょうぼ}には40円と{記録|きろく}。→ {値段|ねだん}の書き{間違|まちが}い（10円）"
      - type: narration
        text: "サクラ：{全|ぜん}レシートあり。{帳簿|ちょうぼ}と{完全|かんぜん}{一致|いっち}。→ {問題|もんだい}なし"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "カイト：月曜・火曜・木曜のレシートはある。でも水曜のレシートがない。{帳簿|ちょうぼ}にも水曜の{記録|きろく}がない。"
      - type: narration
        text: "ユウタとナノハは「{値段|ねだん}の書き{間違|まちが}い」。レシートがあるからすぐ{直|なお}せる。"
      - type: narration
        text: "でもカイトは「レシートそのものがない」——{支出|ししゅつ}がまるごと{記録|きろく}されていない。これは「書き{間違|まちが}い」じゃない。"

  # ===== 証拠カード3: 駄菓子屋の価格表 =====
  - id: evidence-3
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 120円で買えるもの
      - type: narration
        text: "学校の近くにあるお店を{確認|かくにん}しよう。"
      - type: narration
        text: "「あおば{文具|ぶんぐ}」——ノート、{鉛筆|えんぴつ}、{消|け}しゴム{等|など}。50円～300円。"
      - type: narration
        text: "「にこにこ{堂|どう}」（{駄菓子屋|だがしや}）——お{菓子|かし}いろいろ。10円～200円。"
      - type: narration
        text: "120円の組み合わせ——"
      - type: narration
        text: "ガムシロップ{飴|あめ}30円×2 + チョコバー60円 = 120円"
      - type: narration
        text: "グミ40円×3 = 120円"
      - type: narration
        text: "チョコバー60円×2 = 120円"
      - type: se
        sound: common/discover
      - type: narration
        text: "120円分の買い物ができるお店は{駄菓子屋|だがしや}かコンビニ。カイトはどこで何を買った？"

  # ===== 証拠カード4: 水曜放課後の行動 =====
  - id: evidence-4
    bgm: money-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: 水曜日の放課後、何があった？
      - type: narration
        text: "4人の水曜日の{放課後|ほうかご}の{行動|こうどう}——"
      - type: narration
        text: "ユウタ：{塾|じゅく}に{直行|ちょっこう}。買い物なし。"
      - type: narration
        text: "サクラとナノハ：{一緒|いっしょ}にあおば{文具|ぶんぐ}へ。{帰|かえ}り道で{駄菓子屋|だがしや}の前を{通|とお}った。"
      - type: narration
        text: "カイト：「友達と{遊|あそ}んだ」と言っている。それ{以上|いじょう}は話さない。"
      - type: sprite
        character: sakura
        expression: thinking
        position: left
      - type: dialog
        character: sakura
        text: "水曜の{放課後|ほうかご}、{文房具|ぶんぼうぐ}店に行く{途中|とちゅう}で……カイトくんが{駄菓子屋|だがしや}に入っていくのを見たよ。"
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: nanoha
        expression: determined
        position: right
      - type: dialog
        character: nanoha
        text: "わたしも見ました。{文房具|ぶんぼうぐ}店の{帰|かえ}りに{駄菓子屋|だがしや}の前を{通|とお}ったら、カイトくんが店から出てきた。"
      - type: dialog
        character: nanoha
        text: "ポケットにお{菓子|かし}の{袋|ふくろ}を入れてて、わたしを見て{驚|おどろ}いた顔してた。"
        expression: thinking
      - type: sprite
        character: nanoha
        action: hide
      - type: narration
        text: "サクラとナノハの2人が、水曜にカイトが{駄菓子屋|だがしや}にいたのを{目撃|もくげき}している。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: money-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "さて、120円の{行方|ゆくえ}が見えてきたね。きみの{推理|すいり}を{聞|き}かせて。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: 記録されていない120円の支出をしたのは誰？
        options:
          - text: ユウタ（帳簿に10円のズレがある）
            value: yuta
            feedback: ユウタの10円のズレはレシートと比べたら「値段の書き間違い」だと分かる。120円のズレとは質が違うよ。
          - text: サクラ（帳簿は完璧だった）
            value: sakura
            feedback: サクラの帳簿はぴったり一致。220円＝220円。完璧だから犯人ではないね。
          - text: カイト（帳簿に120円のズレがある）
            value: kaito
            feedback: 正解！ 120円は「1回分の買い物がまるごと消えている」金額。10円の書き間違いとは全然違う。
          - text: ナノハ（帳簿に10円のズレがある）
            value: nanoha
            feedback: ナノハの10円のズレもレシートで確認すると「書き間違い」。カイトの120円とは質が違うよ。
      - type: choice
        id: q2
        question: なぜ記録しなかったと思う？
        options:
          - text: 忘れただけ（うっかり）
            value: forgot
            feedback: うっかりの可能性もあるけど、レシートもないのは「意識的に記録しなかった」ようにも見えるね。
          - text: 禁止されている買い物をしたから隠したかった
            value: hide-rule
            feedback: その通り！ カイトの家では「お菓子にお小遣いを使うのは禁止」。記録したらバレてしまうから書かなかった。
          - text: レシートをもらわなかったから
            value: no-receipt
            feedback: レシートがないのは結果であって原因ではない。「なぜレシートをもらわなかったか」を考えてみよう。
          - text: 金額が小さいから記録しなくてもいいと思った
            value: small-amount
            feedback: 120円は「小さい」かな？ お小遣い500円の24%だよ。金額に関係なく全て記録するのがルールだよね。

  # ===== 証拠カード5: 店長の証言 =====
  - id: evidence-5
    bgm: money-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: 駄菓子屋の店長の証言
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "先生が{駄菓子屋|だがしや}「にこにこ{堂|どう}」の{店長|てんちょう}に{確認|かくにん}しました。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "{店長|てんちょう}の{証言|しょうげん}——"
      - type: narration
        text: "「水曜の16時ごろ、カイトくんが来たよ。友達のケンタくんと{一緒|いっしょ}だった」"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "「カイトくんはガムシロップ{飴|あめ}2個（60円）とチョコバー1個（60円）で{合計|ごうけい}120円を買っていったよ」"
      - type: effect
        name: flash
        duration: 400
      - type: narration
        text: "「カイトくんは"お{母|かあ}さんには{内緒|ないしょ}ね"って言ってたけど……大丈夫かな？」"
      - type: narration
        text: "これで{確定|かくてい}——"
      - type: narration
        text: "{帳簿|ちょうぼ}{残金|ざんきん}230円 − {記録|きろく}していない120円 = {実際|じっさい}の{残金|ざんきん}110円。{計算|けいさん}ぴったり。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: classroom
    bgm: money-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: 120円の行方
      - type: effect
        name: fade-in
        duration: 600

  # ユウタの秘密
  - id: truth-yuta
    bg: classroom
    steps:
      - type: sprite
        character: yuta
        expression: worried
        position: left
      - type: dialog
        character: yuta
        text: "ぼくも言わなきゃいけないことがある。"
      - type: dialog
        character: yuta
        text: "金曜の朝、{発表|はっぴょう}の前にカイトのお{小遣|こづか}い{帳|ちょう}をチラッと見ちゃったんだ。{計算|けいさん}したら120円合わないって気づいてた。"
        expression: worried
      - type: dialog
        character: yuta
        text: "でもカイトに{直接|ちょくせつ}{聞|き}くのは気が{引|ひ}けて……{覗|のぞ}き見したことも{恥|は}ずかしかった。"
        expression: determined
      - type: sprite
        character: yuta
        action: hide

  # サクラの秘密
  - id: truth-sakura
    steps:
      - type: sprite
        character: sakura
        expression: worried
        position: right
      - type: dialog
        character: sakura
        text: "わたしも……水曜にカイトくんが{駄菓子屋|だがしや}に入るの見たのに、そのとき何も言わなかった。"
      - type: dialog
        character: sakura
        text: "「言ったらチクリみたいで{嫌|いや}だな」って思っちゃって。"
        expression: worried
      - type: dialog
        character: sakura
        text: "でも、あのとき「{記録|きろく}した方がいいよ」って言ってあげればよかった。"
        expression: determined
      - type: sprite
        character: sakura
        action: hide

  # ナノハの秘密
  - id: truth-nanoha
    steps:
      - type: sprite
        character: nanoha
        expression: worried
        position: left
      - type: dialog
        character: nanoha
        text: "わたしはカイトくんが{駄菓子屋|だがしや}から出てくるのを見て、お{菓子|かし}を買ったんだなって分かった。"
      - type: dialog
        character: nanoha
        text: "カイトくんの家でお{菓子|かし}が{禁止|きんし}なのも知ってたから、{内緒|ないしょ}にしてあげようと思ったの。"
        expression: worried
      - type: dialog
        character: nanoha
        text: "でもお{小遣|こづか}い{帳|ちょう}が合わない{原因|げんいん}がこれだったとしたら、{黙|だま}ってるのは{正|ただ}しかったのかな……。"
        expression: determined
      - type: sprite
        character: nanoha
        action: hide

  # カイトの真実（クライマックス）
  - id: truth-kaito
    bgm: money-01/truth
    steps:
      - type: sprite
        character: kaito
        expression: worried
        position: center
      - type: dialog
        character: kaito
        text: "……おれが{記録|きろく}してなかった。120円分、お{菓子|かし}を買ったのを{隠|かく}してた。"
      - type: narration
        speed: slow
        text: "カイトがゆっくりと話し{始|はじ}めた。"
      - type: dialog
        character: kaito
        text: "水曜の{放課後|ほうかご}、ケンタに「{駄菓子屋|だがしや}行こうぜ」って{誘|さそ}われて、つい行っちゃったんだ。"
        expression: worried
      - type: dialog
        character: kaito
        text: "ガムシロップ{飴|あめ}2個とチョコバー1個で120円。おいしかったけど……"
      - type: dialog
        character: kaito
