        text: "ところが——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{誰|だれ}かが{水|みず}そうに{毒|どく}を{入|い}れたのか。それとも、よいと{思|おも}ってしたことが{原因|げんいん}なのか。{金魚|きんぎょ}が{弱|よわ}った{原因|げんいん}を{突|つ}き{止|と}めなければならない。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{水|みず}そうの{金魚|きんぎょ}たちが1{週間|しゅうかん}ほどで{急|きゅう}に{元気|げんき}をなくしています。{水質|すいしつ}データも{変化|へんか}しています。{原因|げんいん}を{作|つく}った{人|ひと}を{突|つ}き{止|と}めて、{金魚|きんぎょ}を{助|たす}けてください。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: inori
            expression: worried
          - character: kakeru
            expression: surprised
          - character: shizuku
            expression: thinking
          - character: mikoto
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{水質|すいしつ}データを{分析|ぶんせき}し、{変更|へんこう}{記録|きろく}を{照|て}らし{合|あ}わせれば——{原因|げんいん}が{見|み}えてくるはずだ。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 弱っていく魚
        subtitle: 生命探偵団 Vol.8

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 金魚の様子を確認しよう
      - type: narration
        text: "{先週|せんしゅう}{前半|ぜんはん}から{今週|こんしゅう}{月曜日|げつようび}にかけての{金魚|きんぎょ}の{様子|ようす}を{記録|きろく}でたどった。"
      - type: se
        sound: discover
      - type: narration
        text: "{先週|せんしゅう}{前半|ぜんはん} —— {金魚|きんぎょ}は{元気|げんき}よく{泳|およ}いでいた。エサもすぐに{食|た}べていた。"
      - type: narration
        text: "{先週|せんしゅう}{後半|こうはん} —— {動|うご}きが{鈍|にぶ}くなってきた。エサを{残|のこ}すことが{増|ふ}えた。"
      - type: narration
        text: "{月曜日|げつようび}{朝|あさ} —— 3{匹|ひき}とも{底|そこ}の{方|ほう}でじっとしている。{様子|ようす}が{明|あき}らかにおかしい。"
      - type: sprite
        character: inori
        expression: thinking
        position: left
      - type: dialog
        character: inori
        text: "{先週|せんしゅう}{前半|ぜんはん}は{元気|げんき}だったのに、{後半|こうはん}から{急|きゅう}に{悪|わる}くなっている。{急|きゅう}に{変|か}わったなら、{何|なに}か{原因|げんいん}があるはず。{先週|せんしゅう}{中|なか}ごろに{何|なに}か{変化|へんか}があったんじゃないかな。"
        expression: determined
      - type: sprite
        character: inori
        action: hide
      - type: narration
        text: "「だんだん{悪|わる}くなった」——{徐々|じょじょ}に{進|すす}む{変化|へんか}は、{慢性的|まんせいてき}な{原因|げんいん}を{示|しめ}している。{急性|きゅうせい}の{毒|どく}ではなく、{継続的|けいぞくてき}に{水|みず}に{影響|えいきょう}を{与|あた}えているものがあるのかもしれない。"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 水質データを調べよう
      - type: narration
        text: "{毎日|まいにち}{記録|きろく}していた{水質|すいしつ}データを{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "{水温|すいおん} —— ほぼ{一定|いってい}（{異常|いじょう}なし）。"
      - type: narration
        text: "pH —— {先週|せんしゅう}{前半|ぜんはん}は7.0{前後|ぜんご}（{正常|せいじょう}）。{先週|せんしゅう}{中|なか}ごろから{上|あが}り{始|はじ}め、{先週|せんしゅう}{後半|こうはん}には8.5を{超|こ}えた（{高|たか}すぎる）。"
      - type: narration
        text: "アンモニア{濃度|のうど} —— {先週|せんしゅう}{後半|こうはん}から{増|ふ}え{始|はじ}め、{現在|げんざい}は{危険|きけん}{水準|すいじゅん}に{達|たっ}している。"
      - type: sprite
        character: shizuku
        expression: thinking
        position: right
      - type: dialog
        character: shizuku
        text: "pHとアンモニアが{同|おな}じ{時期|じき}に{悪化|あっか}している。{水温|すいおん}は{問題|もんだい}ないから、{熱|ねつ}が{原因|げんいん}じゃない。{水|みず}の{中|なか}に{何|なに}か{別|べつ}のものが{入|い}って、pHもアンモニアも{変|か}えているんじゃないかな。"
        expression: thinking
      - type: sprite
        character: shizuku
        action: hide
      - type: narration
        text: "pHとアンモニアの{変化|へんか}のタイミングが{一致|いっち}している——{先週|せんしゅう}{中|なか}ごろから{変|か}わった。この「{中|なか}ごろ」に{何|なに}があったのか、{変更|へんこう}{記録|きろく}と{照合|しょうごう}する{必要|ひつよう}がある。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 変更記録を調べよう
      - type: narration
        text: "{水|みず}そうの{変更|へんこう}{記録|きろく}ノートをひらいた。{水|みず}そうに{何|なに}かを{加|くわ}えたり{変|か}えたりしたときに{書|か}くルールになっている。"
      - type: se
        sound: discover
      - type: narration
        text: "{先週|せんしゅう}{前半|ぜんはん} —— {記録|きろく}なし（{特|とく}に{変更|へんこう}なし）。"
      - type: narration
        text: "{先週|せんしゅう}{中|なか}ごろ —— 「{石|いし}・{葉|は}を{追加|ついか}」と{書|か}いてある。{名前|なまえ}の{欄|らん}は{空白|くうはく}。"
      - type: narration
        text: "{先週|せんしゅう}{後半|こうはん}〜{今週|こんしゅう} —— {記録|きろく}なし。"
      - type: sprite
        character: kakeru
        expression: surprised
        position: right
      - type: dialog
        character: kakeru
        text: "{石|いし}と{葉|は}を{追加|ついか}した{日|ひ}と、pHが{変|か}わり{始|はじ}めた{日|ひ}が{同|おな}じ「{先週|せんしゅう}{中|なか}ごろ」だ！ これは{偶然|ぐうぜん}じゃない。{石|いし}と{葉|は}が{原因|げんいん}を{作|つく}っている——でも{誰|だれ}が{入|い}れたの？ {名前|なまえ}が{書|か}いてない。"
