        expression: worried
      - type: narration
        text: "ミコトは{下|した}を{向|む}きながら、{小|ちい}さな{声|こえ}で{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: mikoto
        text: "{金魚|きんぎょ}たちが{水|みず}そうの{中|なか}だけで{暮|く}らしているのが、{何|なん}だかかわいそうで……「{自然|しぜん}に{近|ちか}い{環境|かんきょう}にしてあげたい」って{思|おも}った。"
        expression: thinking
      - type: dialog
        character: mikoto
        text: "{校庭|こうてい}の{石|いし}は{川|かわ}でも{使|つか}われているから{安全|あんぜん}だって{思|おも}った。{落|お}ち{葉|は}も{自然|しぜん}のものだから{大丈夫|だいじょうぶ}だって……{毒|どく}になるなんて{思|おも}わなかったの。"
        expression: worried
      - type: dialog
        character: mikoto
        text: "{金魚|きんぎょ}のためにしたのに、{逆|ぎゃく}に{苦|くる}しめてしまった。{自然|しぜん}のものが{悪|わる}いなんて、{考|かんが}えもしなかった……ごめんなさい。"
        expression: determined
      - type: sprite
