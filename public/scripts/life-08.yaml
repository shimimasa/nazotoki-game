        text: "{教室|きょうしつ}の{水|みず}そうで{飼|か}っている{金魚|きんぎょ}3{匹|ひき}が、ここ1{週間|しゅうかん}でだんだん{元気|げんき}をなくしていた。{泳|およ}ぎがのろくなり、エサも{残|のこ}すようになった。"
