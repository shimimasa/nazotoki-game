      - type: sprite
        character: kakeru
        action: hide
      - type: narration
        text: "{変更|へんこう}{記録|きろく}のタイミングと{水質|すいしつ}データの{変化|へんか}が{完全|かんぜん}に{一致|いっち}した。{問題|もんだい}の{原因|げんいん}は「{先週|せんしゅう}{中|なか}ごろに{入|い}れられた{石|いし}と{落|お}ち{葉|は}」だ。{誰|だれ}が、どんな{理由|りゆう}で{入|い}れたのか——。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 水そうは閉じた環境だ
      - type: narration
        text: "{図書室|としょしつ}で{理科|りか}の{参考書|さんこうしょ}を{調|しら}べた。{水|みず}そうと{自然|しぜん}の{川|かわ}の{違|ちが}いについてのページがあった。"
      - type: se
        sound: discover
      - type: narration
        text: "「{川|かわ}や{池|いけ}は{水|みず}が{流|なが}れて{広|ひろ}い{空間|くうかん}があるため、{石|いし}や{落|お}ち{葉|は}の{影響|えいきょう}が{分散|ぶんさん}される。」"
      - type: narration
        text: "「{水|みず}そうは{閉|と}じた{環境|かんきょう}で{水量|すいりょう}が{少|すく}ないため、{同|おな}じものを{入|い}れても{影響|えいきょう}が{何倍|なんばい}にも{大|おお}きく{出|で}る。{自然|しぜん}のものでも{水|みず}そうでは{毒|どく}になることがある。」"
      - type: sprite
        character: shizuku
        expression: determined
        position: right
      - type: dialog
        character: shizuku
        text: "「{自然|しぜん}のものなら{安全|あんぜん}」は{間違|まちが}いだった。{水|みず}そうは{閉|と}じた{環境|かんきょう}だから、{同|おな}じ{石|いし}でも{影響|えいきょう}が{全然|ぜんぜん}{違|ちが}う。{川|かわ}で{普通|ふつう}に{使|つか}われている{石|いし}でも、{水|みず}そうでは{水|みず}を{大|おお}きく{変|か}えてしまうかもしれない。"
        expression: determined
      - type: sprite
        character: shizuku
        action: hide
      - type: narration
        text: "「{自然|しぜん}＝{安全|あんぜん}」という{思|おも}い{込|こ}みが{崩|くず}れた。{石|いし}と{葉|は}を{入|い}れた{人|ひと}は、{悪意|あくい}ではなく「{良|よ}いことをしている」と{信|しん}じていたのではないか——。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 点検結果メモ
      - type: effect
        name: fade-in
      - type: narration
        text: "{山田先生|やまだせんせい}が{水|みず}そうから{石|いし}と{葉|は}を{取|と}り{出|だ}して{調|しら}べた{結果|けっか}が{届|とど}いた。"
      - type: se
        sound: discover
      - type: narration
        text: "「{石|いし}は{石灰岩|せっかいがん}らしい。{水|みず}に{溶|と}けてアルカリ{性|せい}に{近|ちか}づける{性質|せいしつ}がある。」"
      - type: narration
        text: "「{落|お}ち{葉|は}は{腐敗|ふはい}が{始|はじ}まっている。{分解|ぶんかい}でアンモニアが{発生|はっせい}する。」"
      - type: narration
        text: "「{先生|せんせい}メモ: {石灰岩|せっかいがん}は{水|みず}をアルカリ{性|せい}へ{近|ちか}づける。{金魚|きんぎょ}に{適|てき}したpHは6.5〜7.5。{現在|げんざい}の8.5は{危険|きけん}{水準|すいじゅん}。」"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "{石灰岩|せっかいがん}がpHを{上|あ}げ、{腐|くさ}った{落|お}ち{葉|は}がアンモニアを{増|ふ}やした——{水質|すいしつ}データの{変化|へんか}と{完全|かんぜん}に{一致|いっち}する！ では{誰|だれ}がこの{石|いし}と{落|お}ち{葉|は}を「{自然|しぜん}に{近|ちか}い{環境|かんきょう}のため」と{信|しん}じて{入|い}れたのか——。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 原因を作ったのは誰だ？
      - type: sprite
        character: kakeru
        expression: thinking
        position: right
      - type: dialog
        character: kakeru
        text: "「{自然|しぜん}に{近|ちか}い{環境|かんきょう}が{良|よ}い」と{言|い}っていたのを{聞|き}いたことがある。{石|いし}を{洗|あら}って{持|も}ってきていたのも{見|み}た。{金魚|きんぎょ}のためを{思|おも}ってしていたんだろうけど——"
        expression: thinking
      - type: sprite
        character: kakeru
        action: hide
      - type: sprite
        character: shizuku
        expression: determined
        position: right
      - type: dialog
        character: shizuku
        text: "{変更|へんこう}{記録|きろく}に「{石|いし}・{葉|は}を{追加|ついか}」とある。{名前|なまえ}がないのは{書|か}き{忘|わす}れたか、{書|か}きたくなかったか。{石灰岩|せっかいがん}を{校庭|こうてい}で{拾|ひろ}って{水|みず}そうに{入|い}れた{人|ひと}は1{人|ひと}だけだよ。"
