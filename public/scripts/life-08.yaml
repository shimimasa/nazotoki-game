      - type: choice
        id: q1
        question: 原因を作ったのは誰？
        options:
          - text: ミコト（自然に近づけたいと思い石と落ち葉を入れた）
            value: mikoto
            correct: true
            feedback: "{正解|せいかい}！ ミコトは「{金魚|きんぎょ}がかわいそう、{自然|しぜん}に{近|ちか}い{環境|かんきょう}にしてあげたい」と{思|おも}い、{校庭|こうてい}で{拾|ひろ}った{石|いし}と{落|お}ち{葉|は}を{水|みず}そうに{入|い}れた。「{自然|しぜん}のものなら{安全|あんぜん}」という{思|おも}い{込|こ}みが、{閉|と}じた{環境|かんきょう}では{逆効果|ぎゃくこうか}になってしまった。"
          - text: イノリ（水質データを読んでいて怪しい）
            value: inori
            feedback: "イノリは{水質|すいしつ}データの{変化|へんか}を{分析|ぶんせき}した{情報型|じょうほうがた}。{変更|へんこう}{記録|きろく}のタイミングを{特定|とくてい}したのもイノリ。{石|いし}を{持|も}ち{込|こ}んだのはイノリではないよ。"
          - text: カケル（石を洗っているのを見た本人が怪しい）
            value: kakeru
            feedback: "カケルは「{石|いし}を{洗|あら}って{持|も}ってきているのを{見|み}た」と{言|い}った{目撃者|もくげきしゃ}の{立場|たちば}。{行動型|こうどうがた}で{議論|ぎろん}が{得意|とくい}だけど、{石|いし}を{水|みず}そうに{入|い}れたのはカケルではないよ。"
          - text: シズク（石灰岩の性質を知っていた）
            value: shizuku
            feedback: "シズクは{石灰岩|せっかいがん}の{性質|せいしつ}を{読|よ}み{解|と}いた{観察型|かんさつがた}。「{自然|しぜん}のものでも{害|がい}になる」を{説明|せつめい}できたのはシズクの{知識|ちしき}があるから。{水|みず}そうに{石|いし}を{入|い}れたのはシズクではないよ。"

  # ==================== 真実：ミコト ====================
  - id: truth
