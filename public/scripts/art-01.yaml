scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{美術|びじゅつ}クラブ『パレットの4{人|にん}』。{今週|こんしゅう}の{図工|ずこう}の{時間|じかん}に「{自由画|じゆうが}」を{描|か}く{予定|よてい}。クラスで{共有|きょうゆう}している{特別|とくべつ}な{絵|え}の{具|ぐ}セット（プロ{用|よう}の{赤|あか}・{青|あお}・{黄|き}の{三原色|さんげんしょく}チューブ）を{使|つか}って、{色|いろ}を{自分|じぶん}で{混|ま}ぜて{作|つく}る{授業|じゅぎょう}だ。"
      - type: narration
        text: "ところが{今朝|けさ}、{図工室|ずこうしつ}に{来|く}ると——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "**{黄色|きいろ}のチューブだけ**がなくなっていた。"
      - type: narration
        text: "{赤|あか}と{青|あお}はある。でも{黄色|きいろ}がないと、**オレンジも{緑|みどり}も{作|つく}れない**。"
      - type: sprite
        character: sensei
        expression: worried
        position: center
      - type: dialog
        character: sensei
        text: "{絵|え}の{具|ぐ}の{三原色|さんげんしょく}は{赤|あか}・{青|あお}・{黄|き}。{赤|あか}+{黄|き}=オレンジ、{青|あお}+{黄|き}={緑|みどり}、{赤|あか}+{青|あお}={紫|むらさき}。{黄色|きいろ}がないとオレンジも{緑|みどり}も{作|つく}れないのよ。"
        expression: thinking
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - character: sakura
            expression: thinking
          - character: takumi
            expression: thinking
          - character: nijika
            expression: surprised
          - character: yuu
            expression: worried
      - type: narration
        text: "\"{昨日|きのう}の{放課後|ほうかご}、4{人|にん}はそれぞれ{図工室|ずこうしつ}で{絵|え}を{描|か}いていた。でも{全員|ぜんいん}が「{黄色|きいろ}は{使|つか}っていない」と{言|い}う。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: "盗まれた色"
        subtitle: "美術探偵団 Vol.1"

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1"
        subtitle: "絵の具棚と出入りノート"
      - type: narration
        text: "{今朝|けさ}の{絵|え}の{具|ぐ}{棚|だな}——{赤|あか}チューブ ✅ あり。{青|あお}チューブ ✅ あり。**{黄|き}チューブ ❌ なし**。"
      - type: narration
        text: "先生は14:50に3{本|ぽん}とも{確認|かくにん}している。{昨日|きのう}の{放課後|ほうかご}〜{今朝|けさ}の{間|あいだ}に{黄色|きいろ}が{消|き}えた。"
      - type: narration
        text: "{出入|でい}りノート——15:00サクラ{入室|にゅうしつ}。15:05ニジカ{入室|にゅうしつ}。15:10ユウ{入室|にゅうしつ}。15:20タクミ{入室|にゅうしつ}。"
      - type: narration
        text: "16:00タクミ{退室|たいしつ}。16:05ユウ{退室|たいしつ}。16:15サクラ{退室|たいしつ}。**16:30ニジカ{退室|たいしつ}（{最後|さいご}）**。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: "ステップ2"
        subtitle: "4人の証言と使った色"
      - type: sprite
        character: sakura
        expression: normal
        position: left
      - type: dialog
        character: sakura
        text: "{星空|ほしぞら}の{絵|え}を{描|か}いた。{青|あお}と{赤|あか}で{紫|むらさき}を{混|ま}ぜたの。{黄色|きいろ}は{使|つか}ってないよ。"
        expression: normal
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: takumi
        expression: normal
        position: right
      - type: dialog
        character: takumi
        text: "{山|やま}の{絵|え}を{描|か}いた。{青|あお}と**{黄色|きいろ}**で{緑|みどり}を{混|ま}ぜた。{黄色|きいろ}は{使|つか}ったけど、ちゃんと{棚|たな}に{戻|もど}したよ。"
        expression: normal
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: nijika
        expression: normal
        position: left
      - type: dialog
        character: nijika
        text: "{海|うみ}の{絵|え}を{描|か}いた。{赤|あか}と{青|あお}で{紫|むらさき}を{混|ま}ぜたよ。{黄色|きいろ}は{使|つか}ってない。"
        expression: normal
      - type: sprite
        character: nijika
        action: hide
      - type: sprite
        character: yuu
        expression: normal
        position: right
      - type: dialog
        character: yuu
        text: "{花畑|はなばたけ}の{絵|え}を{描|か}いた。{赤|あか}と{青|あお}で{紫|むらさき}の{花|はな}。{黄色|きいろ}は{使|つか}ってないよ。"
        expression: normal
      - type: sprite
        character: yuu
        action: hide
      - type: narration
        text: "タクミは{黄色|きいろ}を{使|つか}ったと{正直|しょうじき}に{言|い}っている。ニジカは「{使|つか}っていない」と{言|い}っている。この{証言|しょうげん}が{正|ただ}しいか、{絵|え}を{見|み}て{確認|かくにん}できる？"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: "ステップ3"
        subtitle: "乾燥棚の絵を観察"
      - type: narration
        text: "{乾燥棚|かんそうだな}に{並|なら}んでいる4{人|にん}の{絵|え}を{観察|かんさつ}した{結果|けっか}——"
      - type: narration
        text: "サクラの{星空|ほしぞら}: {青|あお}、{紫|むらさき}（{赤|あか}+{青|あお}）、{白|しろ} ✅"
      - type: narration
        text: "タクミの{山|やま}: {青|あお}、{緑|みどり}（{青|あお}+{黄|き}）、{茶色|ちゃいろ} ✅"
      - type: narration
        text: "ニジカの{海|うみ}: {青|あお}、{紫|むらさき}（{赤|あか}+{青|あお}）、**{右下|みぎした}にオレンジっぽい{色|いろ}** ❓"
      - type: narration
        text: "ユウの{花畑|はなばたけ}: {赤|あか}、{紫|むらさき}（{赤|あか}+{青|あお}） ✅"
      - type: se
        sound: discover
      - type: narration
        text: "ニジカの{絵|え}の**{右下|みぎした}に{夕焼|ゆうや}けのオレンジ{色|いろ}**が{見|み}える。ニジカは「{赤|あか}と{青|あお}だけ」と{言|い}った。でも{絵|え}にオレンジがある。**オレンジ＝{赤|あか}+{黄|き}**。ということは……{黄色|きいろ}を{使|つか}っていたのでは？"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "決定的証拠"
        subtitle: "パレットと棚の記録"
      - type: effect
        name: fade-in
      - type: sprite
        character: takumi
        expression: determined
        position: left
      - type: dialog
        character: takumi
        text: "{昨日|きのう}{帰|かえ}り{際|ぎわ}にニジカのパレットをチラッと{見|み}たんだ。{赤|あか}・{青|あお}・{紫|むらさき}に{加|くわ}えて、**パレットの{端|はし}に{黄色|きいろ}の{絵|え}の{具|ぐ}の{跡|あと}**が{残|のこ}っていた。"
        expression: determined
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: sakura
        expression: determined
        position: right
      - type: dialog
        character: sakura
        text: "わたしが{帰|かえ}った16:15の{時点|じてん}で{黄色|きいろ}チューブは**まだ{棚|たな}にあった**。{黄色|きいろ}が{消|き}えたのは**16:15〜16:30**。この{時間帯|じかんたい}に{図工室|ずこうしつ}にいたのは**ニジカだけ**。"
        expression: determined
      - type: sprite
        character: sakura
        action: hide
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "ニジカの{絵|え}にオレンジがある → オレンジ＝{赤|あか}+{黄|き} → ニジカは{黄色|きいろ}を{使|つか}った → 「{黄色|きいろ}は{使|つか}っていない」は{嘘|うそ} → パレットにも{黄色|きいろ}の{跡|あと} → 16:15〜16:30にニジカだけが{在室|ざいしつ} → **ニジカが{黄色|きいろ}チューブを{持|も}ち{出|だ}した**。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: "推理タイム"
        subtitle: "犯人は誰だ？"
      - type: sprite
        character: yuu
        expression: worried
        position: right
      - type: dialog
        character: yuu
        text: "ニジカが{先週|せんしゅう}「{家|いえ}でひまわりの{絵|え}を{描|か}いてるんだ。でも{黄色|きいろ}がなくなっちゃって……」って{言|い}ってた。お{小遣|こづか}いが{足|た}りないって。"
        expression: worried
      - type: sprite
        character: yuu
        action: hide
      - type: narration
        text: "{証拠|しょうこ}をまとめよう。{絵|え}にオレンジ（{赤|あか}+{黄|き}）。パレットに{黄色|きいろ}の{跡|あと}。16:15以降に1{人|り}で{在室|ざいしつ}。{家|いえ}のひまわりの{絵|え}に{黄色|きいろ}が{必要|ひつよう}。お{小遣|こづか}い{不足|ふそく}。"
      - type: choice
        id: q1
        question: "黄色の絵の具チューブを持ち出した犯人は？"
        options:
          - text: ニジカ（絵にオレンジ＋パレットに黄色＋最後に退室＋ひまわりの絵に黄色が必要）
            value: nijika
            correct: true
            feedback: "{正解|せいかい}！ ニジカは{家|いえ}でひまわりの{絵|え}を{描|か}くために{黄色|きいろ}が{欲|ほ}しかった。「ちょっと{借|か}りるだけ」のつもりで{持|も}ち{帰|かえ}った。オレンジ＝{赤|あか}+{黄|き}——この{混色|こんしょく}の{知識|ちしき}が{嘘|うそ}を{見破|みやぶ}る{鍵|かぎ}だった。"
          - text: タクミ（黄色を使ったと言った人）
            value: takumi
            feedback: "タクミは{黄色|きいろ}を{使|つか}ったと{正直|しょうじき}に{言|い}い、{棚|たな}に{戻|もど}した（サクラの{記録|きろく}で{確認|かくにん}{済|ず}み）。16:00に{帰|かえ}っているよ。"
          - text: サクラ（棚の記録をつけていた人）
            value: sakura
            feedback: "サクラは{黄色|きいろ}を{使|つか}っていない。16:15に{帰|かえ}った{時点|じてん}で{黄色|きいろ}は{棚|たな}にあった{記録者|きろくしゃ}の{側|がわ}だよ。"
          - text: ユウ（ニジカの家庭事情を知っていた人）
            value: yuu
            feedback: "ユウは{動機|どうき}の{情報|じょうほう}を{持|も}っている{側|がわ}。16:05に{帰|かえ}っていて{機会|きかい}がないよ。"

  # ==================== 真実：ニジカ ====================
  - id: truth-nijika
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
        subtitle: "ニジカの告白"
      - type: effect
        name: fade-in
      - type: sprite
        character: nijika
        expression: worried
        position: center
      - type: dialog
        character: nijika
        text: "……ごめんなさい。{黄色|きいろ}の{絵|え}の{具|ぐ}チューブを{持|も}ち{出|だ}したのは、わたしです。"
        expression: worried
      - type: dialog
        character: nijika
        text: "{家|いえ}でひまわりの{絵|え}を{描|か}いてる{途中|とちゅう}で、{黄色|きいろ}の{絵|え}の{具|ぐ}がなくなっちゃって。お{小遣|こづか}いが{足|た}りなくて{新|あたら}しいチューブを{買|か}えなかった。"
        expression: thinking
      - type: dialog
        character: nijika
        text: "「ちょっと{借|か}りるだけ」のつもりだったの。でもみんなが{困|こま}ることになっちゃった……ごめんなさい。"
        expression: worried
      - type: sprite
        character: nijika
        action: hide

  # ==================== 真実：他のメンバー ====================
  - id: truth-others
    bg: classroom
    steps:
      - type: sprite
        character: takumi
        expression: thinking
        position: left
      - type: dialog
        character: takumi
        text: "ニジカのパレットに{黄色|きいろ}の{跡|あと}があったから{気|き}づいたんだ。「{使|つか}ってない」って{言|い}ってたのに。"
        expression: thinking
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: yuu
        expression: worried
        position: right
      - type: dialog
        character: yuu
        text: "ニジカが{困|こま}ってたの{知|し}ってた。もっと{早|はや}く{気|き}づいてあげればよかった。"
        expression: worried
      - type: sprite
        character: yuu
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{三原色|さんげんしょく}——{赤|あか}・{青|あお}・{黄|き}。この3{色|しょく}を{混|ま}ぜると{他|ほか}の{色|いろ}が{作|つく}れるわ。{赤|あか}+{黄|き}=オレンジ。この{知識|ちしき}がなければ、ニジカの{嘘|うそ}には{気|き}づけなかった。{色|いろ}の{知識|ちしき}は{推理|すいり}の{武器|ぶき}にもなるのよ。"
        expression: happy
      - type: dialog
        character: sensei
        text: "{欲|ほ}しいものがあるときは、先生に{相談|そうだん}してね。きっと{一緒|いっしょ}に{方法|ほうほう}を{考|かんが}えられるわ。"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "「ちょっと{借|か}りるだけ」でも、みんなが{困|こま}る{結果|けっか}に。{使|つか}いたいときは{相談|そうだん}しよう。"
      - type: narration
        text: "\"{三原色|さんげんしょく}と{混色|こんしょく}——{絵|え}を{描|か}くためだけじゃなく、{真実|しんじつ}を{見抜|みぬ}く{力|ちから}にもなる。"
      - type: effect
        name: fade-out
