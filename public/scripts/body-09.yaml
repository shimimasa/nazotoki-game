scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "スポーツクラブの『からだ{探偵|たんてい}{団|だん}』。カラダは{熱心|ねっしん}にスポーツクラブに{通|かよ}っていた。コーチのサトウさんのことを「いいコーチだよ」と{友達|ともだち}に{話|はな}していた。"
      - type: narration
        text: "でも、さいきんカラダの{様子|ようす}がおかしい。{表情|ひょうじょう}が{暗|くら}く、クラブに{行|い}くのをいやがるようになった。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "3つの{出来事|できごと}を{時系列|じけいれつ}に{並|なら}べると、パターンが{見|み}えてくる——。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "今日は「グルーミング{的|てき}{構造|こうぞう}」という{考|かんが}え{方|かた}を{使|つか}って{考|かんが}えます。{段階的|だんかいてき}にパターンが{重|かさ}なるとき、{人|ひと}はなかなか「おかしい」と{気|き}づきにくいのです。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: karada
            expression: worried
          - character: mamoru
            expression: thinking
          - character: kokochi
            expression: surprised
          - character: kizuna
            expression: worried
      - type: narration
        text: "4{人|にん}の{探偵|たんてい}たちが、3つの{出来事|できごと}の{真相|しんそう}を{追|お}う。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 信頼のわな
        subtitle: からだ探偵団 Vol.9

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 最初の違和感
      - type: narration
        text: "{証拠|しょうこ}カード①——カラダが{最近|さいきん}{元気|げんき}がない。スポーツクラブのサトウコーチとの{間|あいだ}で「{何|なに}か」があったらしい。"
      - type: narration
        text: "カラダは「いいコーチだよ」と{言|い}うが{表情|ひょうじょう}が{暗|くら}い。この{違和感|いわかん}——{言葉|ことば}と{表情|ひょうじょう}のズレが{最初|さいしょ}の{手|て}がかりだ。"

  # ==================== 調査：証拠カード2+3 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 段階的パターンと出来事の詳細
      - type: narration
        text: "{証拠|しょうこ}カード②——「{段階的|だんかいてき}パターン」の{解説|かいせつ}: ①やさしくする ②{少|すこ}しずつ{境界|きょうかい}を{越|こ}える ③「{秘密|ひみつ}にして」で{口|くち}を{封|ふう}じる。この3ステップは{危険|きけん}のサイン。"
      - type: sprite
        character: kokochi
        expression: thinking
        position: left
      - type: dialog
        character: kokochi
        text: "3{回|かい}とも「{特別|とくべつ}」「お{前|まえ}だけ」「{秘密|ひみつ}」というキーワードが{使|つか}われてる。これはパターンだ。"
        expression: determined
      - type: sprite
        character: kokochi
        action: hide
      - type: narration
        text: "{証拠|しょうこ}カード③——{出来事|できごと}1と2の{詳細|しょうさい}: 1か{月前|げつまえ}、サトウさんが「{特別|とくべつ}レッスンしてあげる。お{前|まえ}だけ{特別|とくべつ}だ」とカラダだけ{残|のこ}した。2{週間前|しゅうかんまえ}、「フォームを{直|なお}すから」と{体|からだ}に{触|ふ}れた。"
      - type: sprite
        character: mamoru
        expression: thinking
        position: right
      - type: dialog
        character: mamoru
        text: "カラダの{気持|きも}ちを{見|み}て。1{回目|かいめ}は{平気|へいき}、2{回目|かいめ}でモヤモヤ、3{回目|かいめ}で{嫌|いや}。{体|からだ}は{正直|しょうじき}にサインを{出|だ}してた。"
        expression: worried
      - type: sprite
        character: mamoru
        action: hide

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 境界侵害のエスカレート
      - type: narration
        text: "{証拠|しょうこ}カード④——{出来事|できごと}3の{詳細|しょうさい}: {先週|せんしゅう}、「これは2{人|にん}だけの{秘密|ひみつ}ね。お{母|かあ}さんに{言|い}ったら{特別|とくべつ}レッスンなしだよ」。カラダの{境界線|きょうかいせん}の{変化|へんか}({平気|へいき}→モヤモヤ→{嫌|いや})。"
      - type: se
        sound: discover
      - type: narration
        text: "{出来事|できごと}が3つ{揃|そろ}った。①「{特別|とくべつ}」で{信頼|しんらい}を{作|つく}る → ②もっともらしい{理由|りゆう}で{境界|きょうかい}を{越|こ}える → ③「{秘密|ひみつ}にして」で{口|くち}を{封|ふう}じる。これが**グルーミング{的|てき}{構造|こうぞう}**の{段階的|だんかいてき}パターンだ。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: カラダの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: karada
        expression: worried
        position: center
      - type: dialog
        character: karada
        text: "{最初|さいしょ}は{嬉|うれ}しかった。でも2{回目|かいめ}でモヤモヤ。3{回目|かいめ}で「{秘密|ひみつ}にして」って{言|い}われた。{言|い}えなくなった……。"
        expression: worried
      - type: dialog
        character: karada
        text: "お{父|とう}さんが{単身赴任|たんしんふにん}でいなくて、{寂|さび}しかった。「{特別|とくべつ}だよ」って{言|い}ってもらえて、{嬉|うれ}しかったんだ。"
        expression: thinking
      - type: sprite
        character: karada
        action: hide
      - type: sprite
        character: kizuna
        expression: worried
        position: left
      - type: dialog
        character: kizuna
        text: "カラダは{寂|さび}しかったんだよ。「{特別|とくべつ}だよ」って{言|い}ってもらえて{嬉|うれ}しかった。それを{利用|りよう}されたんだ。カラダは{何|なに}も{悪|わる}くない。"
        expression: determined
      - type: sprite
        character: kizuna
        action: hide
      - type: narration
        text: "{山田|やまだ}{先生|せんせい}がカラダと{話|はな}した{記録|きろく}: 「{最初|さいしょ}は{嬉|うれ}しかった。でも2{回目|かいめ}でモヤモヤ。3{回目|かいめ}で\"{秘密|ひみつ}にして\"って{言|い}われた。{言|い}えなくなった」。**「いいコーチだよ」→「{信頼|しんらい}を{利用|りよう}した{段階的|だんかいてき}{境界|きょうかい}{侵害|しんがい}」**——{前提|ぜんてい}がひっくり{返|かえ}った。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: パターンの中心にいたのは誰だ？
      - type: sprite
        character: kokochi
        expression: determined
        position: left
      - type: dialog
        character: kokochi
        text: "3{回|かい}の{出来事|できごと}に{共通|きょうつう}のパターンが{見|み}える。①「{特別|とくべつ}だよ」で{信頼|しんらい}を{作|つく}る ②もっともらしい{理由|りゆう}で{境界|きょうかい}を{越|こ}える ③「{秘密|ひみつ}にして」で{口|くち}を{封|ふう}じる。これが{帰納法|きのうほう}で{見|み}えた{構造|こうぞう}だ。"
        expression: determined
      - type: sprite
        character: kokochi
        action: hide
      - type: sprite
        character: mamoru
        expression: thinking
        position: right
      - type: dialog
        character: mamoru
        text: "カラダの{境界線|きょうかいせん}は{段階的|だんかいてき}に{侵害|しんがい}されていった。1{回目|かいめ}={平気|へいき} → 2{回目|かいめ}=モヤモヤ → 3{回目|かいめ}=はっきり{嫌|いや}。{体|からだ}は{正直|しょうじき}にサインを{出|だ}していた。"
        expression: worried
      - type: sprite
        character: mamoru
        action: hide
      - type: narration
        text: "{証拠|しょうこ}をまとめよう。{繰|く}り{返|かえ}す「{特別|とくべつ}」の{言葉|ことば}。{段階的|だんかいてき}に{悪化|あっか}するカラダの{境界線|きょうかいせん}。{孤独|こどく}さを{利用|りよう}した{信頼|しんらい}{獲得|かくとく}。そして「{秘密|ひみつ}」による{口封|くちふう}じ。"
      - type: choice
        id: q1
        question: この事件でグルーミング的パターンを実行したのは誰？
        options:
          - text: サトウコーチ（特別→境界侵害→秘密の3段階パターンを意図的に行った）
            value: sato
            correct: true
            feedback: "{正解|せいかい}！ サトウさんは「{特別|とくべつ}→{境界|きょうかい}{侵害|しんがい}→{秘密|ひみつ}」の{段階的|だんかいてき}パターンを{意図|いと}{的|てき}に{行|おこな}った。カラダの{寂|さび}しさを{知|し}ってやさしくして{信頼|しんらい}を{得|え}てから、{少|すこ}しずつ{境界|きょうかい}を{越|こ}えていった。カラダに{一切|いっさい}の{非|ひ}はない。"
          - text: カラダ（黙っていたから）
            value: karada
            feedback: "カラダは{被害|ひがい}を{受|う}けた{当事者|とうじしゃ}。「{言|い}えなかった」のは{秘密|ひみつ}を{強要|きょうよう}されたから。{黙|だま}っていたことはカラダの{責任|せきにん}では{絶対|ぜったい}にない。"
          - text: キズナ（カラダの寂しさを知っていたから）
            value: kizuna
            feedback: "キズナはカラダの{気持|きも}ちを{理解|りかい}していた{側|がわ}。{事件|じけん}の{構造|こうぞう}を{説明|せつめい}する{情報|じょうほう}を{持|も}っていたけれど、{行為|こうい}を{実行|じっこう}したわけではないよ。"
          - text: マモル（カラダの変化に気づいていたから）
            value: mamoru
            feedback: "マモルは{境界線|きょうかいせん}の{変化|へんか}を{追|お}っていた{観察者|かんさつしゃ}。{変化|へんか}に{気|き}づいていたことは{問題|もんだい}の{構造|こうぞう}を{理解|りかい}する{手|て}がかりであって、{行為者|こういしゃ}ではないよ。"

  # ==================== 真実：サトウコーチ ====================
  - id: truth-sato
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: 信頼を利用した段階的境界侵害
      - type: effect
        name: fade-in
      - type: sprite
        character: karada
        expression: worried
        position: center
      - type: dialog
        character: karada
        text: "お{父|とう}さんがいなくて、{寂|さび}しかった。サトウさんが「{特別|とくべつ}だよ」「お{前|まえ}だけだよ」って{言|い}ってくれて……{嬉|うれ}しかったんだ。"
        expression: worried
      - type: dialog
        character: karada
        text: "でも2{回目|かいめ}からモヤモヤしてた。3{回目|かいめ}に「{秘密|ひみつ}にして」って{言|い}われて、{言|い}えなくなった。ぼくが{悪|わる}かったの？"
        expression: thinking
      - type: sprite
        character: karada
        action: hide
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "カラダは{何|なに}も{悪|わる}くない。サトウさんが{意図|いと}{的|てき}に「{特別|とくべつ}→{境界|きょうかい}{侵害|しんがい}→{秘密|ひみつ}」の3{段階|だんかい}パターンを{繰|く}り{返|かえ}したの。これはグルーミング{的|てき}{構造|こうぞう}といって、{大人|おとな}による{権力|けんりょく}の{悪用|あくよう}よ。"
        expression: determined
      - type: dialog
        character: yamada
        text: "「モヤモヤ」した{感覚|かんかく}は{正|ただ}しいサイン。「{嫌|いや}だな」と{感|かん}じたら、{信頼|しんらい}できる{大人|おとな}に{話|はな}していい。{秘密|ひみつ}を{守|まも}る{必要|ひつよう}はないのよ。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide

  # ==================== 真実：他のメンバー ====================
  - id: truth-others
    bg: classroom
    steps:
      - type: sprite
        character: kokochi
        expression: thinking
        position: left
      - type: dialog
        character: kokochi
        text: "3{回|かい}とも「{特別|とくべつ}」「お{前|まえ}だけ」「{秘密|ひみつ}」——{言葉|ことば}のパターンが{見|み}えたとき、{確信|かくしん}した。これは{偶然|ぐうぜん}じゃない。"
        expression: determined
      - type: sprite
        character: kokochi
        action: hide
      - type: sprite
        character: mamoru
        expression: worried
        position: right
      - type: dialog
        character: mamoru
        text: "カラダのモヤモヤは{正|ただ}しいサインだった。{体|からだ}は{嫌|いや}だと{感|かん}じていた。その{感覚|かんかく}を{信|しん}じてよかったんだよ。"
        expression: normal
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: kizuna
        expression: worried
        position: left
      - type: dialog
        character: kizuna
        text: "{寂|さび}しいときにやさしくされたら、{信|しん}じちゃうよ……それは{普通|ふつう}の{気持|きも}ち。{利用|りよう}したサトウさんが{悪|わる}いんだ。"
        expression: normal
      - type: sprite
        character: kizuna
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "今日{学|まな}んだグルーミング{的|てき}{構造|こうぞう}は「{特別|とくべつ}→{境界|きょうかい}{侵害|しんがい}→{秘密|ひみつ}」の3{段階|だんかい}パターン。この{順番|じゅんばん}が{見|み}えたとき、「おかしい」と{気|き}づく{力|ちから}がついたわね。"
        expression: happy
      - type: dialog
        character: yamada
        text: "「モヤモヤ」「{嫌|いや}だな」という{感覚|かんかく}は{体|からだ}からのSOSサイン。{秘密|ひみつ}にしなくていい。{信頼|しんらい}できる{大人|おとな}に{話|はな}してほしい。みんなで{守|まも}り{合|あ}おうね。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{帰納法|きのうほう}——3つの{出来事|できごと}から{共通|きょうつう}パターンを{見|み}つける{力|ちから}。カラダの{物語|ものがたり}は、そのパターンに{気|き}づく{大切|たいせつ}さを{教|おし}えてくれた。"
      - type: narration
        text: "「{特別|とくべつ}」「{秘密|ひみつ}」——この{言葉|ことば}が{重|かさ}なったとき、{立|た}ち{止|と}まって{考|かんが}えよう。{体|からだ}のサインを{信|しん}じる{勇気|ゆうき}を、いつも{持|も}っていてほしい。"
      - type: effect
        name: fade-out
