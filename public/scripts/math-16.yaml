meta:
  id: math-16
  title: おつりが合わない駄菓子屋
  series: 数字の迷宮
  volume: 16
  estimatedMinutes: 20

characters:
  misaki:
    name: ミサキ
    color: "#E07BAD"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  takumi:
    name: タクミ
    color: "#4A6FA5"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  yuuki:
    name: ユウキ
    color: "#FF6B35"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  haruka:
    name: ハルカ
    color: "#2E8B57"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: おばあちゃん
    color: "#6A5ACD"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{商店街|しょうてんがい}の{駄菓子屋|だがしや}『にじいろ{堂|どう}』。おばあちゃんが{大好|だいす}きなお{店|みせ}。"

      - type: bgm
        action: stop

      - type: sprite
        character: sensei
        expression: worried
        position: center

      - type: bgm
        track: tension-quiet

      - type: dialog
        character: sensei
        text: "レジのお{金|かね}を{数|かぞ}えたら、**350{円|えん}{足|た}りない**の。{今日|きょう}の{午前中|ごぜんちゅう}に{買|か}いに{来|き}た{子|こ}どもは4人だけ。{誰|だれ}かがおつりを{多|おお}くもらったのかしら……。"
        expression: worried

      - type: sprite
        character: sensei
        action: hide

      - type: narration
        text: "おばあちゃんは{目|め}が{悪|わる}く、『{自分|じぶん}で{計算|けいさん}して、おつりはレジから{取|と}ってね』と{子|こ}どもたちに{任|まか}せていた。"

      - type: sprite_group
        characters:
          - id: misaki
            expression: normal
          - id: takumi
            expression: normal
          - id: yuuki
            expression: normal
          - id: haruka
            expression: thinking

      - type: narration
        text: "4人の{証言|しょうげん}を{計算|けいさん}で{検算|けんざん}して、350{円|えん}の{行方|ゆくえ}を{突|つ}き{止|と}めろ！"

      - type: sprite
        character: misaki
        action: hide
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: yuuki
        action: hide
      - type: sprite
        character: haruka
        action: hide

      - type: effect
        name: fade-out

      - type: title_card
        text: "数字の迷宮 Vol.16"
        subtitle: "おつりが合わない駄菓子屋"

  # ========================================
  # 証拠1: 値段表
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1：調査"

      - type: narration
        text: "にじいろ{堂|どう}の{値段表|ねだんひょう}：\nガム：30{円|えん}\nチョコ{棒|ぼう}：40{円|えん}\nラムネ：50{円|えん}\nあめ：20{円|えん}"

  # ========================================
  # 証拠2: 4人の証言と検算
  # ========================================
  - id: evidence-2
    steps:
      - type: sprite
        character: misaki
        expression: normal
        position: left

      - type: dialog
        character: misaki
        text: "ガムを3{個|こ}とあめを4{個|こ}{買|か}ったよ。200{円|えん}{払|はら}って、おつりは30{円|えん}もらった。"
        expression: normal

      - type: sprite
        character: misaki
        action: hide

      - type: narration
        text: "ミサキを{検算|けんざん}：ガム30×3=90{円|えん} + あめ20×4=80{円|えん} = {代金|だいきん}170{円|えん}\nおつり：200−170=**30{円|えん}** ✅ {合|あ}っている"

      - type: sprite
        character: takumi
        expression: normal
        position: right

      - type: dialog
        character: takumi
        text: "チョコ{棒|ぼう}を2{本|ぽん}とガムを2{個|こ}{買|か}った。200{円|えん}{払|はら}って、おつりは60{円|えん}。"
        expression: normal

      - type: sprite
        character: takumi
        action: hide

      - type: narration
        text: "タクミを{検算|けんざん}：チョコ{棒|ぼう}40×2=80{円|えん} + ガム30×2=60{円|えん} = {代金|だいきん}140{円|えん}\nおつり：200−140=**60{円|えん}** ✅ {合|あ}っている"

      - type: sprite
        character: yuuki
        expression: normal
        position: left

      - type: dialog
        character: yuuki
        text: "ラムネを1{個|こ}とチョコ{棒|ぼう}を1{本|ぽん}{買|か}った。500{円|えん}{払|はら}って、おつりは410{円|えん}もらった。"
        expression: normal

      - type: sprite
        character: yuuki
        action: hide

      - type: narration
        text: "ユウキを{検算|けんざん}：ラムネ50×1=50{円|えん} + チョコ{棒|ぼう}40×1=40{円|えん} = {代金|だいきん}90{円|えん}\nおつり：500−90=**410{円|えん}** ✅ {合|あ}っている"

      - type: sprite
        character: haruka
        expression: normal
        position: right

      - type: dialog
        character: haruka
        text: "あめを3{個|こ}とラムネを2{個|こ}{買|か}った。200{円|えん}{払|はら}って、おつりは40{円|えん}。"
        expression: normal

      - type: sprite
        character: haruka
        action: hide

      - type: narration
        text: "ハルカを{検算|けんざん}：あめ20×3=60{円|えん} + ラムネ50×2=100{円|えん} = {代金|だいきん}160{円|えん}\nおつり：200−160=**40{円|えん}** ✅ {合|あ}っている"

      - type: narration
        text: "{全員|ぜんいん}{合|あ}っている！ なのに350{円|えん}{足|た}りない……なぜ？"

  # ========================================
  # 証拠3: ハルカの目撃情報
  # ========================================
  - id: evidence-3
    steps:
      - type: sprite
        character: haruka
        expression: thinking
        position: center

      - type: dialog
        character: haruka
        text: "{帰|かえ}るとき、ユウキくんとすれ{違|ちが}ったの。ユウキくんの{袋|ふくろ}、すごく**{重|おも}そう**だった。ラムネ1{個|こ}とチョコ{棒|ぼう}1{本|ぽん}だけなのに、あんなに{膨|ふく}らむかなあ……？"
        expression: thinking

      - type: sprite
        character: haruka
        action: hide

      - type: narration
        text: "ユウキの{袋|ふくろ}が{重|おも}かった……{証言|しょうげん}の{個数|こすう}と{合|あ}っていない？"

  # ========================================
  # 証拠4: 在庫帳簿（反転フェーズ）
  # ========================================
  - id: evidence-4
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "ステップ2：在庫と突き合わせ"
      - type: effect
        name: fade-in

      - type: narration
        text: "おばあちゃんが{朝|あさ}と{今|いま}の{在庫|ざいこ}を{数|かぞ}えてくれた！"

      - type: narration
        text: "ガム：{朝|あさ}20{個|こ}→{今|いま}15{個|こ}={減|へ}った**5{個|こ}**\n{証言|しょうげん}{合計|ごうけい}：ミサキ3+タクミ2=**5{個|こ}** ✅"

      - type: narration
        text: "あめ：{朝|あさ}30{個|こ}→{今|いま}23{個|こ}={減|へ}った**7{個|こ}**\n{証言|しょうげん}{合計|ごうけい}：ミサキ4+ハルカ3=**7{個|こ}** ✅"

      - type: se
        sound: discover

      - type: narration
        text: "**チョコ{棒|ぼう}**：{朝|あさ}15{本|ぽん}→{今|いま}7{本|ぽん}={減|へ}った**8{本|ぽん}**\n{証言|しょうげん}{合計|ごうけい}：タクミ2+ユウキ1=**3{本|ぽん}** ❌ **5{本|ぽん}{多|おお}い！**"
        speed: slow

      - type: narration
        text: "**ラムネ**：{朝|あさ}25{個|こ}→{今|いま}19{個|こ}={減|へ}った**6{個|こ}**\n{証言|しょうげん}{合計|ごうけい}：ユウキ1+ハルカ2=**3{個|こ}** ❌ **3{個|こ}{多|おお}い！**"
        speed: slow

      - type: effect
        name: flash

      - type: narration
        text: "チョコ{棒|ぼう}が5{本|ぽん}、ラムネが3{個|こ}{余分|よぶん}に{減|へ}っている！ チョコ{棒|ぼう}とラムネの**{両方|りょうほう}**を{買|か}ったと{証言|しょうげん}しているのは——**ユウキだけ**！"
        speed: slow

      - type: narration
        text: "ユウキの{本当|ほんとう}の{購入|こうにゅう}：ラムネ1+3=**4{個|こ}**(200{円|えん}) + チョコ{棒|ぼう}1+5=**6{本|ぽん}**(240{円|えん}) = {代金|だいきん}**440{円|えん}**\n{本当|ほんとう}のおつり：500−440 = **60{円|えん}**\nユウキがもらったおつり：**410{円|えん}**\n{差額|さがく}：410−60 = **350{円|えん}** = レジ{不足額|ふそくがく}と{一致|いっち}！"

  # ========================================
  # 質問フェーズ
  # ========================================
  - id: questions
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "ステップ3：推理しよう"
      - type: effect
        name: fade-in

      - type: choice
        id: q1
        question: "おつりを{多|おお}くもらった{犯人|はんにん}は{誰|だれ}？"
        options:
          - text: "ミサキ"
            value: misaki
            feedback: "ミサキが{買|か}ったのはガムとあめ。{在庫|ざいこ}と{一致|いっち}している。"
          - text: "タクミ"
            value: takumi
            feedback: "タクミが{買|か}ったのはチョコ{棒|ぼう}とガム。ガムの{在庫|ざいこ}は{合|あ}っている。"
          - text: "ユウキ"
            value: yuuki
            correct: true
            feedback: "{正解|せいかい}！ チョコ{棒|ぼう}とラムネの**{両方|りょうほう}**が{在庫|ざいこ}と{合|あ}わない。{両方|りょうほう}{買|か}ったのはユウキだけ。ラムネ4{個|こ}+チョコ{棒|ぼう}6{本|ぽん}={代金|だいきん}440{円|えん}。{本当|ほんとう}のおつりは60{円|えん}なのに410{円|えん}もらった。{差額|さがく}**350{円|えん}**！"
          - text: "ハルカ"
            value: haruka
            feedback: "ハルカが{買|か}ったのはあめとラムネ。あめの{在庫|ざいこ}は{合|あ}っている。"

      - type: choice
        id: q2
        question: "{決定的|けっていてき}な{証拠|しょうこ}は何？"
        options:
          - text: "{個別|こべつ}{検算|けんざん}で{全員|ぜんいん}{合|あ}っていること"
            value: individual
            feedback: "{個別|こべつ}ではバレない。でも{在庫|ざいこ}と{突|つ}き{合|あ}わせると{矛盾|むじゅん}が{見|み}える。1つの{視点|してん}だけでは{足|た}りない！"
          - text: "{在庫|ざいこ}{帳簿|ちょうぼ}との{突|つ}き{合|あ}わせで{個数|こすう}が{合|あ}わない"
            value: inventory
            correct: true
            feedback: "{完璧|かんぺき}！ {個別|こべつ}{検算|けんざん}（{第|だい}1{層|そう}）では{全員|ぜんいん}{合|あ}う。{在庫|ざいこ}との{突|つ}き{合|あ}わせ（{第|だい}2{層|そう}）で{矛盾|むじゅん}{発見|はっけん}。{交差|こうさ}{分析|ぶんせき}（{第|だい}3{層|そう}）で{犯人|はんにん}{特定|とくてい}。**3{層|そう}の{計算|けいさん}**で{嘘|うそ}を{暴|あば}いた！"
          - text: "ハルカの{目撃|もくげき}（{袋|ふくろ}が{重|おも}かった）"
            value: witness
            feedback: "{状況|じょうきょう}{証拠|しょうこ}としては{重要|じゅうよう}。でも{決定的|けっていてき}なのは{在庫|ざいこ}の{数字|すうじ}との{突|つ}き{合|あ}わせ。"

  # ========================================
  # 真相
  # ========================================
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真相"
      - type: effect
        name: fade-in

      - type: sprite
        character: yuuki
        expression: worried
        position: center

      - type: dialog
        character: yuuki
        text: "……{僕|ぼく}がやった。{本当|ほんとう}はラムネを4{個|こ}、チョコ{棒|ぼう}を6{本|ぽん}{取|と}った。でも『ラムネ1{個|こ}、チョコ{棒|ぼう}1{本|ぽん}』って{申告|しんこく}した。"
        expression: worried

      - type: dialog
        character: yuuki
        text: "{来週|らいしゅう}で{販売|はんばい}{終了|しゅうりょう}になるラムネとチョコ{棒|ぼう}を、{友達|ともだち}みんなに{配|くば}りたかったんだ。でもお{小遣|こづか}いは500{円|えん}しかなくて……。おばあちゃん、ごめんなさい。"
        expression: worried

      - type: sprite
        character: yuuki
        action: hide

  # ========================================
  # エピローグ
  # ========================================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center

      - type: dialog
        character: sensei
        text: "ユウキくんは{友達|ともだち}に{配|くば}りたかったのね。その{気持|きもち}は{分|わ}かるよ。でもおばあちゃんのお{店|みせ}から{盗|ぬす}むのは{間違|まちが}い。{正直|しょうじき}に『もっと{欲|ほ}しい』と{言|い}ってくれたら、おまけしてあげたのに。"
        expression: normal

      - type: dialog
        character: sensei
        text: "ところで{探偵|たんてい}たち——{今回|こんかい}は**3{層|そう}の{計算|けいさん}**がカギだった。{第|だい}1{層|そう}：{個別|こべつ}{検算|けんざん}（{全員|ぜんいん}{合|あ}う）。{第|だい}2{層|そう}：{在庫|ざいこ}との{突|つ}き{合|あ}わせ（{矛盾|むじゅん}{発見|はっけん}）。{第|だい}3{層|そう}：{交差|こうさ}{分析|ぶんせき}（{犯人|はんにん}{特定|とくてい}）。"
        expression: thinking

      - type: dialog
        character: sensei
        text: "1つの{計算|けいさん}だけでは{見|み}えない{嘘|うそ}も、{別|べつ}の{角度|かくど}から{計算|けいさん}すると{見|み}えてくる。**かけ{算|ざん}と{引|ひ}き{算|ざん}で、おつりの{嘘|うそ}を{暴|あば}いた！**"
        expression: determined

      - type: dialog
        character: sensei
        text: "——{数字|すうじ}は{嘘|うそ}をつかない。でも{計算|けいさん}しなければ{見|み}えないこともある。"
        expression: happy

      - type: sprite
        character: sensei
        action: hide

      - type: narration
        text: "{個別|こべつ}の{検算|けんざん}では{分|わ}からなくても、{在庫|ざいこ}と{突|つ}き{合|あ}わせれば{矛盾|むじゅん}が{浮|う}かぶ。{視点|してん}を{変|か}えて{計算|けいさん}する——それが3{層|そう}の{力|ちから}。"

      - type: narration
        text: "——それが、おつりが{合|あ}わない{駄菓子屋|だがしや}が{教|おし}えてくれたこと。"

      - type: effect
        name: fade-out
