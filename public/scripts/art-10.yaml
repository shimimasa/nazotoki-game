scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校|がっこう}の{美術|びじゅつ}{展覧会|てんらんかい}。{審査|しんさ}の{結果|けっか}、**ニジカの{絵|え}「{情熱|じょうねつ}の{花|はな}」が{最優秀|さいゆうしゅう}{作品|さくひん}**に{選|えら}ばれた。"
      - type: narration
        text: "ところが{翌朝|よくあさ}、{展示|てんじ}スペースのニジカの{絵|え}が**タクミの{彫刻|ちょうこく}「{静寂|せいじゃく}の{塔|とう}」に{差|さ}し{替|か}えられていた**。{展示|てんじ}カードの{名前|なまえ}は「ニジカ」のまま。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{誰|だれ}が、なぜ{作品|さくひん}をすり{替|か}えたのか。そして——「{上手|うま}い{作品|さくひん}＝{良|い}い{作品|さくひん}」は{本当|ほんとう}？ {美術|びじゅつ}の{価値|かち}とは{何|なに}？"
      - type: narration
        text: "{今日|きょう}は{最終回|さいしゅうかい}。{投票|とうひょう}は**2{回|かい}**ある。1{回|かい}{目|め}は{犯人|はんにん}。2{回|かい}{目|め}は——{後|あと}で{分|わ}かる。"
      - type: effect
        name: fade-out
      - type: title_card
        text: 傑作の真実
        subtitle: 美術探偵団 Vol.10（最終巻）

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: すり替えの状況とタイムライン
      - type: narration
        text: "{元|もと}の{展示|てんじ}: ニジカの{絵|え}「{情熱|じょうねつ}の{花|はな}」（{最優秀賞|さいゆうしゅうしょう}）。すり{替|か}え{後|ご}: タクミの{彫刻|ちょうこく}「{静寂|せいじゃく}の{塔|とう}」。ニジカの{絵|え}は{準備室|じゅんびしつ}の{棚|たな}に{隠|かく}されていた。"
      - type: narration
        text: "タイムライン——16:05タクミ{退室|たいしつ}。16:10ニジカ{退室|たいしつ}。16:15ユウ{退室|たいしつ}。**16:30サクラ{退室|たいしつ}（{最後|さいご}）**。20:00ごろ{窓|まど}が{開|あ}いていた（{警備員|けいびいん}{報告|ほうこく}）。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 審査結果と4人の考え
      - type: narration
        text: "{審査員|しんさいん}の{講評|こうひょう}: 「ニジカの{絵|え}は{技術的|ぎじゅつてき}には{荒|あら}い{部分|ぶぶん}もある。でも**{見|み}た{瞬間|しゅんかん}に{心|こころ}を{奪|うば}われる{力|ちから}**がある。{美術|びじゅつ}は{上手|うま}さだけじゃない。{心|こころ}に{響|ひび}くかどうかが{大切|たいせつ}」"
      - type: narration
        text: "4{人|にん}の「{美術|びじゅつ}で{一番|いちばん}{大切|たいせつ}なこと」——"
      - type: narration
        text: "**サクラ: 「{技術力|ぎじゅつりょく}。{正確|せいかく}に{描|か}ける{力|ちから}こそ{美術|びじゅつ}の{基本|きほん}」**"
      - type: narration
        text: "タクミ: 「{技術|ぎじゅつ}も{大事|だいじ}だけど、{作品|さくひん}に{込|こ}めた{気持|きも}ちも{大切|たいせつ}」"
      - type: narration
        text: "ニジカ: 「{自分|じぶん}らしく{表現|ひょうげん}すること。{上手|うま}くなくても{心|こころ}を{込|こ}めて」"
      - type: narration
        text: "ユウ: 「{見|み}る{人|ひと}の{心|こころ}を{動|うご}かす{力|ちから}。{技術|ぎじゅつ}は{手段|しゅだん}」"
      - type: narration
        text: "サクラだけ「{技術力|ぎじゅつりょく}が{一番|いちばん}」。{他|ほか}の3{人|にん}は{技術|ぎじゅつ}{以外|いがい}の{価値|かち}も{認|みと}めている。サクラにとって「{技術|ぎじゅつ}が{低|ひく}い{作品|さくひん}が{最優秀|さいゆうしゅう}」は**{受|う}け{入|い}れがたい**こと？"

  # ==================== 1回目投票 ====================
  - id: vote-1
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 1回目の投票
        subtitle: 犯人は誰だ？
      - type: sprite
        character: takumi
        expression: thinking
        position: left
      - type: dialog
        character: takumi
        text: "{審査後|しんさご}、サクラが「ニジカの{絵|え}は{技術的|ぎじゅつてき}に{足|た}りない。タクミの{方|ほう}が{上手|うま}いのに」って{不満|ふまん}そうに{言|い}ってた。{僕|ぼく}は「{審査|しんさ}は{審査|しんさ}。いろんな{価値|かち}があるよ」って{返|かえ}したけど、{納得|なっとく}していない{顔|かお}だった。"
        expression: thinking
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: nijika
        expression: worried
        position: right
      - type: dialog
        character: nijika
        text: "サクラが「おめでとう」って{言|い}ってくれたけど、{声|こえ}に{力|ちから}がなかった。{笑顔|えがお}もぎこちなくて……。すり{替|か}えで{得|とく}をするのは「{技術|ぎじゅつ}＝{価値|かち}」と{信|しん}じる{人|ひと}……"
        expression: thinking
      - type: sprite
        character: nijika
        action: hide
      - type: narration
        text: "{証拠|しょうこ}——{最後|さいご}に{退室|たいしつ}したサクラ。20:00の{窓|まど}。「{技術力|ぎじゅつりょく}が{一番|いちばん}」の{信念|しんねん}。タクミの{彫刻|ちょうこく}を「{正|ただ}しい{最優秀賞|さいゆうしゅうしょう}」にしたい{動機|どうき}。"
      - type: choice
        id: q1
        question: 作品をすり替えたのは誰？（1回目投票）
        options:
          - text: サクラ（「技術＝価値」の信念＋最後に退室＋タクミを庇いたかった）
            value: sakura
            correct: true
            feedback: "{正解|せいかい}。サクラが{作品|さくひん}をすり{替|か}えた。でも——**なぜ「すり{替|か}え」という{方法|ほうほう}を{選|えら}んだの？** まだ{終|お}わりじゃない。"
          - text: タクミ（自分の彫刻を展示したかった人）
            value: takumi
            feedback: "タクミは{自分|じぶん}で「いろんな{価値|かち}がある」と{言|い}っている。{庇|かば}われることを{望|のぞ}んでいなかったよ。16:05に{帰|かえ}っている。"
          - text: ニジカ（被害者）
            value: nijika
            feedback: "ニジカは{被害者|ひがいしゃ}。{自分|じぶん}の{最優秀|さいゆうしゅう}{作品|さくひん}を{外|はず}す{理由|りゆう}がないよ。"
          - text: ユウ（「技術は手段」と言った人）
            value: yuu
            feedback: "ユウは{多角的|たかくてき}な{価値|かち}を{認|みと}めている{側|がわ}。すり{替|か}えの{動機|どうき}がないよ。"

  # ==================== Card 5：サクラの手紙 ====================
  - id: card-5
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: サクラの手紙
        subtitle: 本当の理由
      - type: effect
        name: fade-in
      - type: narration
        text: "{準備室|じゅんびしつ}の{棚|たな}（ニジカの{絵|え}が{隠|かく}されていた{場所|ばしょ}）からサクラの{手紙|てがみ}が{見|み}つかった——"
      - type: sprite
        character: sakura
        expression: worried
        position: center
      - type: dialog
        character: sakura
        text: "{作品|さくひん}をすり{替|か}えたのはわたしです。ごめんなさい。"
        expression: worried
      - type: dialog
        character: sakura
        text: "タクミの{彫刻|ちょうこく}は{完璧|かんぺき}だった。{繊細|せんさい}で、{正確|せいかく}で、{技術的|ぎじゅつてき}に{非|ひ}の{打|う}ちどころがない。なのに{最優秀賞|さいゆうしゅうしょう}に{選|えら}ばれなかった。**{技術|ぎじゅつ}が{高|たか}い{作品|さくひん}が{評価|ひょうか}されないなんて、おかしくないですか？**"
        expression: determined
      - type: dialog
        character: sakura
        text: "わたしは{信|しん}じていた。**「{上手|うま}い{作品|さくひん}＝{良|い}い{作品|さくひん}」**だと。でも……もしかしたら{間違|まちが}っていたのかもしれない。"
        expression: thinking
      - type: dialog
        character: sakura
        text: "タクミは「{大丈夫|だいじょうぶ}、いろんな{価値|かち}があるよ」と{言|い}った。タクミの{方|ほう}が{大人|おとな}だった。わたしがタクミを『{庇|かば}った』つもりが、**タクミは{庇|かば}われることを{望|のぞ}んでいなかった**。"
        expression: worried
      - type: sprite
        character: sakura
        action: hide
      - type: wait
        duration: 2000
      - type: narration
        text: "「{上手|うま}い{作品|さくひん}＝{良|い}い{作品|さくひん}」→ でも{審査員|しんさいん}は「{心|こころ}に{響|ひび}く{力|ちから}」を{評価|ひょうか}した。{美術|びじゅつ}の{価値|かち}は1つの{軸|じく}では{測|はか}れない。"

  # ==================== 議論 + 2回目投票 ====================
  - id: discussion
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: takumi
        expression: thinking
        position: left
      - type: dialog
        character: takumi
        text: "{自分|じぶん}の{彫刻|ちょうこく}が{展示|てんじ}されてるのを{見|み}てショックだった。{頼|たの}んだわけじゃない。ニジカの{絵|え}が{選|えら}ばれた{結果|けっか}を{尊重|そんちょう}したいのに。"
        expression: worried
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: yuu
        expression: determined
        position: right
      - type: dialog
        character: yuu
        text: "{美術|びじゅつ}の{価値|かち}は1つじゃない。{技術|ぎじゅつ}も{大事|だいじ}。{表現|ひょうげん}の{独自性|どくじせい}も{大事|だいじ}。{心|こころ}に{訴|うった}える{力|ちから}も{大事|だいじ}。**どれか1つだけが{正|ただ}しいわけじゃない**。"
        expression: determined
      - type: sprite
        character: yuu
        action: hide
      - type: title_card
        text: 2回目の投票
        subtitle: 美術作品で一番大切なことは？
      - type: choice
        id: q2
        question: 美術作品で一番大切なことは何？
        feedback_default: "どれを{選|えら}んでも{間違|まちが}いじゃない。{大事|だいじ}なのは**なぜそれを{選|えら}んだか**。{美術|びじゅつ}の{価値|かち}は{多面的|ためんてき}。{技術|ぎじゅつ}も、{表現|ひょうげん}も、{心|こころ}も——{全部|ぜんぶ}が{美術|びじゅつ}を{作|つく}る。1つの{軸|じく}だけで{判断|はんだん}すると、{大切|たいせつ}なものを{見落|みお}とす。"
        options:
          - text: 技術の高さ（正確に描ける力）
            value: technique
            feedback: "{大切|たいせつ}なこと。でもそれだけでは「{心|こころ}を{動|うご}かす{力|ちから}」が{足|た}りないことも。"
          - text: 表現の独自性（その人にしかできない表現）
            value: originality
            feedback: "ニジカの{強|つよ}み。{大胆|だいたん}で{独自|どくじ}の{表現|ひょうげん}が{審査員|しんさいん}の{心|こころ}を{奪|うば}った。"
          - text: 心に訴える力（見た人の感情を動かす）
            value: emotion
            feedback: "{審査員|しんさいん}が{評価|ひょうか}したもの。{技術|ぎじゅつ}は{荒|あら}くても「{心|こころ}を{奪|うば}われる{力|ちから}」があった。"
          - text: 全部が大切（技術・表現・心のバランス）
            value: all
            feedback: "{最|もっと}も{包括的|ほうかつてき}な{答|こた}え。{美術|びじゅつ}の{価値|かち}は{多面的|ためんてき}。どれか1つに{偏|かたよ}らないことが{大切|たいせつ}。"

  # ==================== 真実 ====================
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: サクラの信念
      - type: effect
        name: fade-in
      - type: sprite
        character: sakura
        expression: worried
        position: center
      - type: dialog
        character: sakura
        text: "「{技術|ぎじゅつ}が{高|たか}い{作品|さくひん}が{最優秀賞|さいゆうしゅうしょう}にふさわしい」——それがわたしの{信念|しんねん}だった。タクミの{彫刻|ちょうこく}が{選|えら}ばれなかったことが{悔|くや}しくて。タクミが{庇|かば}いたくて、すり{替|か}えた。"
        expression: worried
      - type: dialog
        character: sakura
        text: "でもタクミは{庇|かば}われることを{望|のぞ}んでいなかった。「いろんな{価値|かち}がある」ってタクミの{方|ほう}が{分|わ}かっていた。わたしは{自分|じぶん}の{価値観|かちかん}を{押|お}し{付|つ}けてしまった……ごめんなさい。"
        expression: worried
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: nijika
        expression: thinking
        position: left
      - type: dialog
        character: nijika
        text: "わたしの{絵|え}は{技術的|ぎじゅつてき}に{荒|あら}い。{分|わ}かってる。でも{審査員|しんさいん}が「{心|こころ}を{奪|うば}う{力|ちから}」って{言|い}ってくれた。それが{嬉|うれ}しかったんだ。"
        expression: happy
      - type: sprite
        character: nijika
        action: hide
      - type: sprite
        character: takumi
        expression: happy
        position: right
      - type: dialog
        character: takumi
        text: "{悔|くや}しかったけど、ニジカの{絵|え}には「{心|こころ}を{動|うご}かす{何|なに}か」がある。それは{僕|ぼく}の{彫刻|ちょうこく}にはないもの。{美術|びじゅつ}には{色々|いろいろ}な「{良|よ}さ」がある。"
        expression: happy
      - type: sprite
        character: takumi
        action: hide

  # ==================== エピローグ + シリーズ振り返り ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "サクラの{目的|もくてき}は{善意|ぜんい}——タクミを{庇|かば}いたかった。でも{方法|ほうほう}が{独善的|どくぜんてき}だった。「{上手|うま}い＝{良|い}い」は{認知|にんち}バイアス。{美術|びじゅつ}の{価値|かち}は{技術|ぎじゅつ}だけでなく、{表現力|ひょうげんりょく}・{独自性|どくじせい}・{心|こころ}への{訴求力|そきゅうりょく}も{含|ふく}む。"
        expression: normal
      - type: dialog
        character: sensei
        text: "Vol.1から10{本|ぽん}、お{疲|つか}れさまでした。{消去法|しょうきょほう}から{始|はじ}まって、{視点|してん}{切|き}り{替|か}え、タイムライン、{因果|いんが}{連鎖|れんさ}、{仮説|かせつ}{検証|けんしょう}、{全探索|ぜんたんさく}、{情報|じょうほう}{欠落|けつらく}、{認知|にんち}バイアス、{帰納法|きのうほう}、そしてメタ{認知|にんち}。10の「{見|み}る{力|ちから}」を{身|み}につけたわね。"
        expression: happy
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "{最後|さいご}の{問|と}い——「Vol.1の{自分|じぶん}と{今|いま}の{自分|じぶん}。『{見|み}る{力|ちから}』はどう{変|か}わった？」"
      - type: narration
        text: "{美術|びじゅつ}も{推理|すいり}も、{大切|たいせつ}なのは「{多角的|たかくてき}に{見|み}る{力|ちから}」。1つの{角度|かくど}だけでは{見|み}えないものが、{複数|ふくすう}の{角度|かくど}から{見|み}ると{見|み}えてくる。これからもその{目|め}で{世界|せかい}を{見|み}てください。
      - type: effect
        name: fade-out
