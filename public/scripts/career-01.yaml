meta:
  id: career-01
  title: まちがえた注文
  series: キャリア探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  haruto:
    name: ハルト
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  mina:
    name: ミナ
    color: "#E91E63"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  kei:
    name: ケイ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  saki:
    name: サキ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  tencho:
    name: 店長
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: street
    bgm: career-01/opening
    steps:
      - type: narration
        text: "{商店街|しょうてんがい}のパン屋さん「あさひベーカリー」。{毎朝|まいあさ}おいしいパンを{焼|や}いて、みんなに{届|とど}けている。"
      - type: narration
        text: "ところが{今日|きょう}、こまったことが起きた。"
      - type: bgm
        action: stop
      - type: se
        sound: career-01/phone
      - type: effect
        name: shake
        duration: 400
      - type: sprite
        character: tencho
        expression: normal
        position: center
      - type: dialog
        character: tencho
        text: "え？ さとうさんから「{注文|ちゅうもん}したパンと{違|ちが}うものが{届|とど}いた」ってクレームの{電話|でんわ}だ！"
        expression: thinking
      - type: bgm
        track: career-01/investigation
      - type: dialog
        character: tencho
        text: "さとうさんが{注文|ちゅうもん}したのはクリームパン6個。でも{届|とど}いたのはクロワッサン6個。"
      - type: dialog
        character: tencho
        text: "{注文|ちゅうもん}→{製造|せいぞう}→{配達|はいたつ}、どこかで{間違|まちが}いが起きた。キャリア{探偵団|たんていだん}、{調|しら}べてくれ！"
        expression: normal
      - type: sprite
        character: tencho
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: キャリア探偵団 Vol.1
        subtitle: まちがえた注文

  # ===== 担当紹介 =====
  - id: suspects
    bg: street
    bgm: career-01/investigation
    steps:
      - type: narration
        text: "パン屋の{仕事|しごと}の{流|なが}れ——{注文|ちゅうもん}を{受|う}ける→パンを作る→{届|とど}ける。{各|かく}{工程|こうてい}の{担当者|たんとうしゃ}に話を{聞|き}こう。"
      - type: sprite
        character: mina
        expression: normal
        position: left
      - type: dialog
        character: mina
        text: "わたしはミナ。{注文|ちゅうもん}の{電話|でんわ}を{受|う}けて、{注文票|ちゅうもんひょう}に書く{担当|たんとう}だよ。さとうさんから「クリームパン6個」って{聞|き}いて、ちゃんと書いたよ。"
      - type: sprite
        character: mina
        action: hide
      - type: sprite
        character: haruto
        expression: normal
        position: right
      - type: dialog
        character: haruto
        text: "ぼくはハルト。{製造|せいぞう}{台帳|だいちょう}に{注文|ちゅうもん}を{記録|きろく}して、パンを{焼|や}く{担当|たんとう}。{注文票|ちゅうもんひょう}を見て、ちゃんとクリームパン6個って書いた。"
      - type: sprite
        character: haruto
        action: hide
      - type: sprite
        character: kei
        expression: happy
        position: left
      - type: dialog
        character: kei
        text: "おれはケイ。{配達|はいたつ}{担当|たんとう}！ {今日|きょう}は4{件|けん}の{配達|はいたつ}があってバタバタだったけど、ちゃんと{届|とど}けたよ。"
        expression: normal
      - type: sprite
        character: kei
        action: hide
      - type: sprite
        character: saki
        expression: normal
        position: right
      - type: dialog
        character: saki
        text: "わたしはサキ。{配達|はいたつ}ルートの{記録|きろく}{係|がかり}。{数字|すうじ}の{間違|まちが}いに気づくのが{得意|とくい}。"
      - type: sprite
        character: saki
        action: hide

  # ===== 証拠カード1: 注文票 =====
  - id: evidence-1
    bg: street
    bgm: career-01/experiment
    evidence:
      title: "さとうさんの注文票"
      description: "注文票にはクリームパン6個と正しく記録されていた"
    steps:
      - type: title_card
        text: 証拠①
        subtitle: お客さんの注文票
      - type: narration
        text: "{注文票|ちゅうもんひょう}（ミナが9:00に{記入|きにゅう}）——"
      - type: narration
        text: お客様名：さとうさん
      - type: narration
        text: "{注文|ちゅうもん}{内容|ないよう}：クリームパン × 6個"
      - type: narration
        text: "{配達|はいたつ}{希望|きぼう}：11:30まで"
      - type: narration
        text: "{注文票|ちゅうもんひょう}は{正確|せいかく}。「クリームパン6個」と書いてある。{問題|もんだい}はここではない。"

  # ===== 証拠カード2: 製造台帳 =====
  - id: evidence-2
    evidence:
      title: "製造台帳の並び"
      description: "台帳でも注文は正確だがクで始まる商品名が並んでいた"
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 製造台帳
      - type: narration
        text: "{製造|せいぞう}{台帳|だいちょう}（ハルトが9:15に{記録|きろく}）——"
      - type: narration
        text: "①クリームパン × 6　{配達先|はいたつさき}：さとうさん{宅|たく}"
      - type: narration
        text: "②クロワッサン × 4　{店頭|てんとう}{販売|はんばい}{用|よう}"
      - type: narration
        text: "③あんぱん × 8　　　{店頭|てんとう}{販売|はんばい}{用|よう}"
      - type: choice
        id: obs-1
        question: "{見間違|みまちが}えやすそうなのはどこ？"
        options:
          - text: "クリームパンとクロワッサン"
            value: ku
            reaction:
              character: tencho
              expression: happy
              text: "{商品名|しょうひんめい}の{頭|あたま}が{似|に}ているね。"
          - text: "あんぱんの{数|かず}"
            value: anpan
            reaction:
              character: tencho
              expression: thinking
              text: "{数|かず}より{名前|なまえ}の{並|なら}びに{注目|ちゅうもく}だ。"
          - text: "{配達先|はいたつさき}の{名前|なまえ}"
            value: customer
            reaction:
              character: tencho
              expression: thinking
              text: "{住所|じゅうしょ}より{商品欄|しょうひんらん}があやしい。"
      - type: se
        sound: common/discover
      - type: narration
        text: "{台帳|だいちょう}も{正確|せいかく}。{注文票|ちゅうもんひょう}と{一致|いっち}。でも——{注目|ちゅうもく}！"
      - type: narration
        speed: slow
        text: "「クリームパン」と「クロワッサン」。{両方|りょうほう}とも「ク」から{始|はじ}まる{商品名|しょうひんめい}が{並|なら}んで書いてある。"

  # ===== 証拠カード3: 配達伝票 =====
  - id: evidence-3
    bgm: career-01/investigation
    evidence:
      title: "配達伝票の内容"
      description: "伝票は正しいが商品違いで選ぶ段階のミスが疑われる"
    steps:
      - type: title_card
        text: 証拠③
        subtitle: ケイの配達伝票
      - type: narration
        text: "{配達|はいたつ}{伝票|でんぴょう}（{製造|せいぞう}{台帳|だいちょう}から{転記|てんき}）——"
      - type: narration
        text: "1. たなかさん{宅|たく}：あんぱん×2"
      - type: narration
        text: "2. やまもとさん{宅|たく}：クリームパン×3"
      - type: narration
        text: "3. さとうさん{宅|たく}：クリームパン×6"
      - type: narration
        text: "4. きむらさん{宅|たく}：あんぱん×4"
      - type: narration
        text: "{伝票|でんぴょう}にはちゃんと「クリームパン×6」と書いてある。{転記|てんき}も{正確|せいかく}。"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "でも待って——きむらさんの{注文票|ちゅうもんひょう}を{確認|かくにん}すると「あんぱん×3」のはず。{伝票|でんぴょう}には×4と書いてある。{数量|すうりょう}の書き{間違|まちが}いがある！"
      - type: choice
        id: obs-2
        question: "さとうさんの{問題|もんだい}で、いちばん{変|へん}なのは？"
        options:
          - text: "{数量|すうりょう}がちがう"
            value: amount
            reaction:
              character: tencho
              expression: thinking
              text: "そこは{伝票|でんぴょう}どおり6{個|こ}だよ。"
          - text: "{商品|しょうひん}がちがう"
            value: item
            reaction:
              character: tencho
              expression: happy
              text: "{選|えら}ぶ{段階|だんかい}を{疑|うたが}えそうだ。"
          - text: "{配達先|はいたつさき}がちがう"
            value: destination
            reaction:
              character: tencho
              expression: thinking
              text: "さとうさん{宅|たく}には{届|とど}いているんだ。"
      - type: narration
        text: "でもさとうさんの{問題|もんだい}は「{数量|すうりょう}」じゃなくて「{商品|しょうひん}そのもの」が{違|ちが}う。{伝票|でんぴょう}は正しいのに{届|とど}いたのはクロワッサン——"
      - type: narration
        speed: slow
        text: "{問題|もんだい}は{伝票|でんぴょう}じゃなく、「{商品|しょうひん}を{選|えら}ぶとき」に起きた？"

  # ===== 証拠カード4: スタッフメモ =====
  - id: evidence-4
    bgm: career-01/tension
    evidence:
      title: "急いだ出発メモ"
      description: "ケイは伝票を見ず台帳を一瞬確認しただけで出発した"
    steps:
      - type: title_card
        text: 証拠④
        subtitle: ケイの出発前の様子
      - type: narration
        text: スタッフメモ——
      - type: narration
        text: "「{今日|きょう}は{配達|はいたつ}が4{件|けん}でいつもより多め」"
      - type: narration
        text: "「ケイが『{急|いそ}いで出ないと{遅|おそ}くなる！』と言いながら{出発|しゅっぱつ}した」"
      - type: se
        sound: common/discover
      - type: narration
        text: "「{出発|しゅっぱつ}時に{製造|せいぞう}{台帳|だいちょう}をパッと見てバッグに{商品|しょうひん}を入れていたのが{印象的|いんしょうてき}だった」"
      - type: narration
        speed: slow
        text: "「{配達|はいたつ}{伝票|でんぴょう}を{最後|さいご}まで{確認|かくにん}したかどうかは{不明|ふめい}」"
      - type: narration
        text: "{注文票|ちゅうもんひょう}→{製造|せいぞう}{台帳|だいちょう}→{配達|はいたつ}{伝票|でんぴょう}、{全部|ぜんぶ}正しく書いてある。でもケイは「{伝票|でんぴょう}を見ずに{台帳|だいちょう}をパッと見ただけ」で{出発|しゅっぱつ}した。"

  # ===== 投票 =====
  - id: questions
    bg: street
    bgm: career-01/tension
    steps:
      - type: sprite
        character: tencho
        expression: thinking
        position: center
      - type: dialog
        character: tencho
        text: "{注文|ちゅうもん}→{製造|せいぞう}→{配達|はいたつ}、どの{工程|こうてい}でミスが起きた？ {誰|だれ}の{担当|たんとう}だった？"
      - type: sprite
        character: tencho
        action: hide
      - type: choice
        id: q1
        question: ミスが起きたのはどの工程？
        options:
          - text: 注文の受付（ミナが注文票に書き間違えた）
            value: order
            feedback: 注文票を確認すると「クリームパン×6」と正しく書いてある。ミナのミスではないよ。
          - text: 製造の記録（ハルトが台帳に書き間違えた）
            value: production
            feedback: 製造台帳も「クリームパン×6」と正しい。ハルトの記録にミスはないよ。
          - text: 配達の実行（ケイが商品を取り違えた）
            value: delivery
            feedback: 正解！ 注文票→台帳→伝票は全て正しい。ケイが伝票を確認せず、台帳を「パッと見ただけ」で商品を選んだのが原因。
          - text: 転記のミス（伝票の書き写しで間違えた）
            value: copy
            feedback: 伝票にもちゃんと「クリームパン×6」と書いてある。転記は正確だった。問題は「伝票を見なかった」こと。
      - type: choice
        id: q2
        question: なぜクリームパンとクロワッサンが入れ替わった？
        options:
          - text: 「ク」から始まる商品名が似ていて、急いで見間違えた
            value: similar-name
            feedback: 正解！ 台帳で「クリームパン」と「クロワッサン」が並んでいて、急いでいたケイが「ク」の先だけで判断してしまった。
          - text: クロワッサンの方がおいしいと思って入れ替えた
            value: intentional
            feedback: ケイに悪意はなかった。わざとではなく「急いでいたから確認しなかった」というミスだよ。
          - text: 製造台帳が間違っていた
            value: ledger-error
            feedback: 台帳は正しく「クリームパン×6」と書いてある。台帳の問題ではなく、読み方の問題だよ。
          - text: お客さんが注文を変更した
            value: changed
            feedback: お客さんの注文票はずっと「クリームパン×6」のまま。注文の変更はなかったよ。

  # ===== 証拠カード5: 配達ルート記録 =====
  - id: evidence-5
    bgm: career-01/tension
    evidence:
      title: "玄関先の確認抜け"
      description: "さとうさん宅で商品確認をせず置いた記録が残っていた"
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: さとうさん宅での行動
      - type: sprite
        character: saki
        expression: determined
        position: center
      - type: dialog
        character: saki
        text: "わたし、ケイの{配達|はいたつ}ルートを{記録|きろく}してたの。気になることがある。"
      - type: sprite
        character: saki
        action: hide
      - type: narration
        text: "{配達|はいたつ}時間{記録|きろく}——"
      - type: narration
        text: "10:55 たなかさん{宅|たく} {配達|はいたつ}{完了|かんりょう}"
      - type: narration
        text: "11:05 やまもとさん{宅|たく} {配達|はいたつ}{完了|かんりょう}"
      - type: narration
        text: "11:15 さとうさん{宅|たく} {到着|とうちゃく}"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "さとうさん{宅|たく}で「{商品|しょうひん}{確認|かくにん}せずに{置|お}いた」——サキのメモより。"
      - type: narration
        text: "{通常|つうじょう}、{玄関先|げんかんさき}で{商品|しょうひん}と{伝票|でんぴょう}を{照合|しょうごう}してからお{客|きゃく}さんに{渡|わた}す{決|き}まりがある。ケイはこの{確認|かくにん}をスキップした。"
      - type: narration
        text: "{伝票|でんぴょう}には「クリームパン×6」と正しく書いてある。でも{急|いそ}いでいたケイは{伝票|でんぴょう}を{確認|かくにん}せず、{台帳|だいちょう}の{記憶|きおく}だけで{商品|しょうひん}を{選|えら}んだ。「ク」から{始|はじ}まる{商品名|しょうひんめい}を見{間違|まちが}えたまま。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: street
    bgm: career-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: 急いでいたから確認しなかった
      - type: effect
        name: fade-in
        duration: 600

  # ハルトの秘密
  - id: truth-haruto
    bg: street
    steps:
      - type: sprite
        character: haruto
        expression: worried
        position: left
      - type: dialog
        character: haruto
        text: "ぼくも気づいてた。{製造|せいぞう}{台帳|だいちょう}に「クリームパン」と「クロワッサン」が{並|なら}んで書いてあること。"
      - type: dialog
        character: haruto
        text: "「ク」から{始|はじ}まる名前が{隣|とな}り{合|あ}ってるのは{紛|まぎ}らわしいって思ったけど、ケイに言わなかった。"
        expression: determined
      - type: sprite
        character: haruto
        action: hide

  # ミナの秘密
  - id: truth-mina
    steps:
      - type: sprite
        character: mina
        expression: worried
        position: right
      - type: dialog
        character: mina
        text: "{実|じつ}は、さとうさんの{注文|ちゅうもん}は子どもの{誕生日|たんじょうび}パーティー{用|よう}だったの。"
      - type: dialog
        character: mina
        text: "クリームパンが{届|とど}かなくて、パーティーが{台無|だいな}しに……。お{客|きゃく}さんの気持ちを{考|かんが}えると{悲|かな}しい。"
        expression: determined
      - type: sprite
        character: mina
        action: hide

  # サキの秘密
  - id: truth-saki
    steps:
      - type: sprite
        character: saki
        expression: thinking
        position: left
      - type: dialog
        character: saki
        text: "わたし、ケイが{出発|しゅっぱつ}前に{急|いそ}いでるのを見てた。「{伝票|でんぴょう}ちゃんと見た？」って{聞|き}こうとしたけど、言えなかった。"
      - type: dialog
        character: saki
        text: "さとうさん{宅|たく}で{商品|しょうひん}{確認|かくにん}しなかったのも見てた。もっと早く{声|こえ}をかけていれば。"
        expression: determined
      - type: sprite
        character: saki
        action: hide

  # ケイの真実（クライマックス）
  - id: truth-kei
    bgm: career-01/truth
    steps:
      - type: sprite
        character: kei
        expression: worried
        position: center
      - type: dialog
        character: kei
        text: "……おれのミスだ。さとうさんにクロワッサンを{届|とど}けちゃったのは、おれが{伝票|でんぴょう}を{確認|かくにん}しなかったから。"
      - type: narration
        speed: slow
        text: "ケイがゆっくりと話し{始|はじ}めた。"
      - type: dialog
        character: kei
        text: "{今日|きょう}は{配達|はいたつ}が4{件|けん}もあって、{急|いそ}いでた。{出発|しゅっぱつ}するとき{製造|せいぞう}{台帳|だいちょう}をパッと見ただけで{商品|しょうひん}をバッグに入れた。"
        expression: worried
      - type: dialog
        character: kei
        text: "{台帳|だいちょう}に「クリームパン」と「クロワッサン」が{並|なら}んでて、「ク……クロワッサン6個がさとうさんか」って{記憶|きおく}しちゃった。"
      - type: dialog
        character: kei
