meta:
  id: logic-01
  title: "犯人は一人だけ"
  series: "論理ミステリー"
  volume: 1
  estimatedMinutes: 18

characters:
  ron:
    name: "ロン"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  rika:
    name: "リカ"
    color: "#E86B8A"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  koto:
    name: "コト"
    color: "#2E8B57"
    sprites:
      normal: boy-c-normal.webp
      happy: boy-c-happy.webp
      thinking: boy-c-thinking.webp
      worried: boy-c-worried.webp
      surprised: boy-c-surprised.webp
      determined: boy-c-determined.webp
  kana:
    name: "カナ"
    color: "#E8943A"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#6A5ACD"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "論理ミステリー Vol.1"
        subtitle: "犯人は一人だけ"
      - type: sprite_group
        characters:
          - id: ron
            expression: normal
          - id: rika
            expression: normal
          - id: koto
            expression: normal
          - id: kana
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: ron
        expression: normal
        position: left
      - type: dialog
        character: ron
        text: "犯人を考えるには、なんとなくではなく条件でしぼるのがよいと思っている。"
      - type: dialog
        character: ron
        text: "犯人を考えるには、なんとなくではなく条件でしぼるのがよいと思っている。"
        expression: thinking
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        expression: normal
        position: right
      - type: dialog
        character: rika
        text: "時刻の記録を見ると、だれがいつ図書室にいたかが分かる。"
      - type: dialog
        character: rika
        text: "時刻の記録を見ると、だれがいつ図書室にいたかが分かる。"
        expression: thinking
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        expression: normal
        position: left
      - type: dialog
        character: koto
        text: "あなたは返却期限を1日勘違いしていた。"
      - type: dialog
        character: koto
        text: "あなたは返却期限を1日勘違いしていた。"
        expression: thinking
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        expression: normal
        position: right
      - type: dialog
        character: kana
        text: "もしコトがやったなら、ただのいたずらではなく、何か理由があったのではと思っている。"
      - type: dialog
        character: kana
        text: "もしコトがやったなら、ただのいたずらではなく、何か理由があったのではと思っている。"
        expression: thinking
      - type: sprite
        character: kana
        action: hide
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠1"
        subtitle: "### タイトル"
      - type: narration
        text: "まずは{書|か}き{換|か}えが{見|み}つかった{場所|ばしょ}と、{使|つか}われた{文房具|ぶんぼうぐ}を{整理|せいり}しよう。"
      - type: narration
        text: "{消|け}した{跡|あと}のそばには、こまかい{消|け}しゴムのカスが{残|のこ}っていた。"
      - type: choice
        id: obs-1
        question: "{最初|さいしょ}に{注目|ちゅうもく}したいのはどれ？"
        options:
          - text: "{消|け}しゴムのカス"
            value: eraser
            reaction:
              character: sensei
              expression: happy
              text: "{道具|どうぐ}の{痕跡|こんせき}は{大事|だいじ}な{証拠|しょうこ}だね。"
          - text: "{机|つくえ}の{色|いろ}"
            value: desk
            reaction:
              character: sensei
              expression: thinking
              text: "{今|いま}は{書|か}き{換|か}えの{跡|あと}が{先|さき}かな。"
          - text: "{窓|まど}の{外|そと}"
            value: window
            reaction:
              character: sensei
              expression: thinking
              text: "{室内|しつない}の{手|て}がかりから{始|はじ}めよう。"
  - id: evidence-2
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠2"
        subtitle: "### タイトル"
      - type: narration
        text: "ロン: 15:30〜15:40"
      - type: narration
        text: "リカ: 15:35〜15:55"
      - type: narration
        text: "コト: 15:45〜16:00"
      - type: narration
        text: "カナ: 15:20〜15:30"
      - type: choice
        id: timeline-key
        question: "{書|か}き{換|か}えがあった{時刻|じこく}に、いちばん{動|うご}きやすそうなのは{誰|だれ}？"
        options:
          - text: "ロン"
            value: ron
            reaction:
              character: sensei
              expression: thinking
              text: "{時間帯|じかんたい}は{近|ちか}いけれど{決|き}め{手|て}がないね。"
          - text: "リカ"
            value: rika
            reaction:
              character: sensei
              expression: thinking
              text: "{少|すこ}しおそめに{現|あらわ}れているね。"
          - text: "コト"
            value: koto
            reaction:
              character: sensei
              expression: thinking
              text: "{時刻|じこく}だけではまだ{絞|しぼ}れないかな。"
          - text: "カナ"
            value: kana
            reaction:
              character: sensei
              expression: happy
              text: "{早|はや}い{時間|じかん}の{空白|くうはく}が{気|き}になるね。"
  - id: evidence-3
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠3"
        subtitle: "### タイトル"
      - type: narration
        text: "ロン: えんぴつ、定規"
      - type: narration
        text: "リカ: ペン、しおり"
      - type: narration
        text: "コト: 消しゴムつき筆箱"
      - type: narration
        text: "カナ: 色えんぴつ、メモ帳"
      - type: choice
        id: hunch
        question: "{直感|ちょっかん}で、いちばん{怪|あや}しいのは{誰|だれ}？"
        options:
          - text: "ロン"
            value: ron
            reaction:
              character: sensei
              expression: thinking
              text: "{持|も}ち{物|もの}だけではまだ{弱|よわ}いかな。"
          - text: "リカ"
            value: rika
            reaction:
              character: sensei
              expression: thinking
              text: "{別|べつ}の{証拠|しょうこ}ともつなげたいね。"
          - text: "コト"
            value: koto
            reaction:
              character: sensei
              expression: thinking
              text: "{消|け}しゴムの{情報|じょうほう}は{気|き}になるね。"
          - text: "カナ"
            value: kana
            reaction:
              character: sensei
              expression: happy
              text: "{時間|じかん}と{持|も}ち{物|もの}がつながるかな。"
          - text: "{全員|ぜんいん}{怪|あや}しい"
            value: all
            reaction:
              character: sensei
              expression: thinking
              text: "{次|つぎ}の{証拠|しょうこ}で{決|き}めよう。"
  - id: evidence-4
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠4"
        subtitle: "### タイトル"
      - type: narration
        text: "ロン: 宿題の本を探しに来た"
      - type: narration
        text: "リカ: 新しい本の棚を見に来た"
      - type: narration
        text: "コト: 返却だけして急いでいた"
      - type: narration
        text: "カナ: 読みたい本の予約をしに来た"
  - id: evidence-5
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠5"
        subtitle: "### タイトル"
      - type: narration
        text: "書き換え部分の近くに、青いケースの消しゴムの細かいカスが残っていた"
      - type: narration
        text: "コトの筆箱には、同じ青いケースの消しゴムが入っていた"
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: ron
            expression: thinking
          - id: rika
            expression: thinking
          - id: koto
            expression: thinking
          - id: kana
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ロン"
            value: ron
            correct: false
            feedback: "ロンは手がかりを持っているが、決め手は足りない。"
            reaction:
              character: sensei
              expression: thinking
              text: "{決|き}め{手|て}がまだ{足|た}りないね。"
          - text: "リカ"
            value: rika
            correct: false
            feedback: "リカは手がかりを持っているが、決め手は足りない。"
            reaction:
              character: sensei
              expression: thinking
              text: "{証拠|しょうこ}がもう{一歩|いっぽ}ほしいね。"
          - text: "コト"
            value: koto
            correct: false
            feedback: "コトは手がかりを持っているが、決め手は足りない。"
            reaction:
              character: sensei
              expression: thinking
              text: "{近|ちか}いけれど{断定|だんてい}はまだかな。"
          - text: "カナ"
            value: kana
            correct: true
            feedback: "カナの行動が、証拠といちばん一致している。"
            reaction:
              character: sensei
              expression: happy
              text: "{証拠|しょうこ}のつながりをよく{見抜|みぬ}いたね。"
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "カナ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kana
        expression: worried
        position: center
      - type: dialog
        character: kana
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: kana
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: ron
            expression: happy
          - id: rika
            expression: happy
          - id: koto
            expression: happy
          - id: kana
            expression: happy
      - type: narration
        text: "論理ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
