      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "論理ミステリー Vol.1"
        subtitle: "犯人は一人だけ"
      - type: sprite_group
        characters:
          - id: ron
            expression: normal
          - id: rika
            expression: normal
          - id: koto
            expression: normal
          - id: kana
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: ron
        expression: normal
        position: left
      - type: dialog
        character: ron
        text: "犯人を考えるには、なんとなくではなく条件でしぼるのがよいと思っている。"
      - type: dialog
        character: ron
        text: "犯人を考えるには、なんとなくではなく条件でしぼるのがよいと思っている。"
        expression: thinking
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        expression: normal
        position: right
      - type: dialog
        character: rika
        text: "時刻の記録を見ると、だれがいつ図書室にいたかが分かる。"
      - type: dialog
        character: rika
        text: "時刻の記録を見ると、だれがいつ図書室にいたかが分かる。"
        expression: thinking
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        expression: normal
        position: left
      - type: dialog
        character: koto
        text: "あなたは返却期限を1日勘違いしていた。"
      - type: dialog
        character: koto
        text: "あなたは返却期限を1日勘違いしていた。"
        expression: thinking
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        expression: normal
        position: right
      - type: dialog
        character: kana
        text: "もしコトがやったなら、ただのいたずらではなく、何か理由があったのではと思っている。"
      - type: dialog
        character: kana
        text: "もしコトがやったなら、ただのいたずらではなく、何か理由があったのではと思っている。"
        expression: thinking
      - type: sprite
        character: kana
        action: hide
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠1"
        subtitle: "### タイトル"
  - id: evidence-2
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠2"
        subtitle: "### タイトル"
      - type: narration
        text: "ロン: 15:30〜15:40"
      - type: narration
        text: "リカ: 15:35〜15:55"
      - type: narration
        text: "コト: 15:45〜16:00"
      - type: narration
        text: "カナ: 15:20〜15:30"
  - id: evidence-3
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠3"
        subtitle: "### タイトル"
      - type: narration
        text: "ロン: えんぴつ、定規"
      - type: narration
        text: "リカ: ペン、しおり"
      - type: narration
        text: "コト: 消しゴムつき筆箱"
      - type: narration
        text: "カナ: 色えんぴつ、メモ帳"
  - id: evidence-4
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠4"
        subtitle: "### タイトル"
      - type: narration
        text: "ロン: 宿題の本を探しに来た"
      - type: narration
        text: "リカ: 新しい本の棚を見に来た"
      - type: narration
        text: "コト: 返却だけして急いでいた"
      - type: narration
        text: "カナ: 読みたい本の予約をしに来た"
  - id: evidence-5
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠5"
        subtitle: "### タイトル"
      - type: narration
        text: "書き換え部分の近くに、青いケースの消しゴムの細かいカスが残っていた"
      - type: narration
        text: "コトの筆箱には、同じ青いケースの消しゴムが入っていた"
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: ron
            expression: thinking
          - id: rika
            expression: thinking
          - id: koto
            expression: thinking
          - id: kana
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ロン"
            value: ron
            correct: false
            feedback: "ロンは手がかりを持っているが、決め手は足りない。"
          - text: "リカ"
            value: rika
            correct: false
            feedback: "リカは手がかりを持っているが、決め手は足りない。"
          - text: "コト"
            value: koto
            correct: false
            feedback: "コトは手がかりを持っているが、決め手は足りない。"
          - text: "カナ"
            value: kana
            correct: true
            feedback: "カナの行動が、証拠といちばん一致している。"
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "カナ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kana
        expression: worried
        position: center
      - type: dialog
        character: kana
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: kana
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: ron
            expression: happy
          - id: rika
            expression: happy
          - id: koto
            expression: happy
          - id: kana
            expression: happy
      - type: narration
        text: "論理ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
