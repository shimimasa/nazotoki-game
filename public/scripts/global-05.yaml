scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{国際理解探偵団|こくさいりかいたんていだん}の4{人|にん}は、「{世界|せかい}のお{祭|まつ}り{紹介|しょうかい}フェスティバル」の{展示|てんじ}ブースを{準備|じゅんび}していた。"
      - type: narration
        text: "{日本|にほん}・タイ・{韓国|かんこく}・インドの{祭|まつ}りを{調|しら}べて、それぞれ{手作|てづく}りの{飾|かざ}りを{展示台|てんじだい}に{並|なら}べた。{月曜日|げつようび}の{放課後|ほうかご}、4{人|にん}で{最終確認|さいしゅうかくにん}をした。"
      - type: narration
        text: "ところが——{火曜日|かようび}の{朝|あさ}。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: manabu
        expression: worried
        position: center
      - type: dialog
        character: manabu
        text: "ぼくの……クラトンが……。3{日|にち}かけて{作|つく}ったのに……バナナの{葉|は}が{折|お}れて、{花|はな}が{散|ち}らばってる！"
        expression: worried
      - type: sprite
        character: manabu
        action: hide
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "タイのブースの{灯籠|とうろう}——クラトンが{壊|こわ}れているわ！ {展示台|てんじだい}の{隣|となり}には**お{供|そな}え{物|もの}のお{菓子|かし}**が{置|お}いてある。お{菓子|かし}を{取|と}ろうとして{落|お}としたの……？"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: hiromu
            expression: surprised
          - character: manabu
            expression: worried
          - character: koeru
            expression: surprised
          - character: tsumugi
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{放課後|ほうかご}、{教室|きょうしつ}には{鍵|かぎ}がかかっていなかった。{誰|だれ}でも{入|はい}れた。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: お祭りの秘密
        subtitle: 国際理解探偵団 Vol.5

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: クラトンの状況を調べよう
      - type: narration
        text: "タイのブースの{灯籠|とうろう}（クラトン）を{詳|くわ}しく{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "バナナの{葉|は}の**{上部|じょうぶ}が{折|お}れている**。{葉|は}の{折|お}り{目|め}に{力|ちから}がかかったような{跡|あと}がある。"
      - type: narration
        text: "{花|はな}びらが3{枚|まい}、{展示台|てんじだい}の{上|うえ}に{散|ち}らばっている。{展示台|てんじだい}（{高|たか}さ{約|やく}1メートル）から{落|お}ちた{形跡|けいせき}がある。"
      - type: narration
        text: "そして——{展示台|てんじだい}の{隣|となり}にある**お{供|そな}え{物|もの}のお{菓子|かし}は{手|て}つかず**だった。{数|かず}も{包|つつ}みも{変|か}わっていない。"
      - type: narration
        text: "「お{菓子|かし}を{取|と}ろうとして{壊|こわ}した」——この{仮説|かせつ}は{本当|ほんとう}に{正|ただ}しい？"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 世界のお祭りの作法を確認しよう
      - type: narration
        text: "{世界|せかい}のお{祭|まつ}りには、それぞれ{大切|たいせつ}な{作法|さほう}がある。"
      - type: se
        sound: discover
      - type: narration
        text: "**{日本|にほん}のお{盆|ぼん}**: {提灯|ちょうちん}は**{上|うえ}の{持|も}ち{手|て}を{持|も}つ**。これが{正|ただ}しい{持|も}ち{方|かた}。"
      - type: narration
        text: "**タイのロイクラトン**: クラトン（{灯籠|とうろう}）は**{底|そこ}を{支|ささ}えて{持|も}つ**。{上|うえ}から{握|にぎ}るとバナナの{葉|は}が{折|お}れる。"
      - type: narration
        text: "**{重要|じゅうよう}**: {日本|にほん}の{提灯|ちょうちん}は「{上|うえ}から{持|も}つ」。タイのクラトンは「{底|そこ}を{支|ささ}える」。**{持|も}ち{方|かた}が{逆|ぎゃく}！**"
      - type: narration
        text: "クラトンの{葉|は}が「{上|うえ}から{折|お}れている」なら……{上|うえ}から{握|にぎ}った{人|ひと}がいる。クラトンの{正|ただ}しい{持|も}ち{方|かた}を{知|し}っている{人|ひと}なら、{上|うえ}から{握|にぎ}らないはずだ。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 放課後の行動を確認しよう
      - type: narration
        text: "{月曜日|げつようび}の{放課後|ほうかご}、4{人|にん}はそれぞれどこにいたのか{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "ヒロム —— {委員会|いいんかい}{活動|かつどう}で{職員室|しょくいんしつ}へ（15:30ごろ・{担任|たんにん}の{先生|せんせい}{確認|かくにん}{済|ず}み）"
      - type: narration
        text: "マナブ —— {図書室|としょしつ}でタイの{追加調査|ついかちょうさ}（15:30・{図書|としょ}の{先生|せんせい}{確認|かくにん}{済|ず}み）"
      - type: narration
        text: "コエル —— 15:20に{下校|げこう}（{正門|せいもん}の{先生|せんせい}{確認|かくにん}{済|ず}み）"
      - type: narration
        text: "ツムギ —— 15:35に{音楽室|おんがくしつ}でリコーダー{練習|れんしゅう}（{音楽|おんがく}の{先生|せんせい}{確認|かくにん}{済|ず}み）"
      - type: narration
        text: "{仮説|かせつ}{検証|けんしょう}してみよう: 「もしコエルが{犯人|はんにん}なら、15:20{以降|いこう}に{教室|きょうしつ}にいるはず」→ でも15:20に{下校|げこう}。{仮説|かせつ}{棄却|ききゃく}！ {他|ほか}の{人|ひと}も{同|おな}じように{検証|けんしょう}してみよう。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: コエルの発言を確認しよう
      - type: narration
        text: "{月曜日|げつようび}14:45の{確認|かくにん}{時|じ}、こんな{会話|かいわ}があった。"
      - type: sprite
        character: koeru
        expression: happy
        position: left
      - type: dialog
        character: koeru
        text: "タイのお{供|そな}え{物|もの}のお{菓子|かし}、おいしそう！ {食|た}べていい？"
        expression: happy
      - type: sprite
        character: koeru
        action: hide
      - type: sprite
        character: manabu
        expression: determined
        position: right
      - type: dialog
        character: manabu
        text: "ダメだよ！ お{供|そな}え{物|もの}は{飾|かざ}りだから{触|さわ}っちゃダメ。"
        expression: determined
      - type: sprite
        character: manabu
        action: hide
      - type: sprite
        character: koeru
        expression: normal
        position: left
      - type: dialog
        character: koeru
        text: "えー、{残念|ざんねん}。じゃあ{見|み}るだけ〜。"
        expression: normal
      - type: sprite
        character: koeru
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "でも——①お{菓子|かし}は{手|て}つかず、②コエルは15:20に{下校|げこう}済み。**コエルが{犯人|はんにん}という{仮説|かせつ}は、2つの{証拠|しょうこ}と{矛盾|むじゅん}する → {棄却|ききゃく}！**"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 担任の先生の証言
      - type: effect
        name: fade-in
      - type: narration
        text: "{担任|たんにん}の{先生|せんせい}に{直接|ちょくせつ}{聞|き}いてみた。"
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "ヒロムくんが{職員室|しょくいんしつ}に{来|き}たのは**15:40**でした。15:30ではありません。"
        expression: thinking
      - type: dialog
        character: yamada
        text: "{委員会|いいんかい}は15:30{開始|かいし}だったので、『ヒロムくん、10{分|ぷん}{遅刻|ちこく}だよ』と{言|い}いました。"
        expression: normal
      - type: dialog
        character: yamada
        text: "ヒロムくんは『すみません、ちょっと{教室|きょうしつ}に{忘|わす}れ{物|もの}を{取|と}りに{行|い}ってました』と{言|い}っていました。**{少|すこ}し{息|いき}が{上|あ}がっていて、{急|いそ}いで{来|き}たみたい**でした。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "ヒロムは「15:30から{職員室|しょくいんしつ}」と{言|い}っていた。でも{担任|たんにん}の{先生|せんせい}は「15:40に{来|き}た」と{言|い}っている。"
      - type: narration
        text: "**15:25〜15:40の15{分間|ふんかん}**、ヒロムはどこにいた？ 「{教室|きょうしつ}に{忘|わす}れ{物|もの}を{取|と}りに{行|い}った」と{言|い}っている——{教室|きょうしつ}にはタイのブースがある……。"

  # ==================== 証言：ツムギの目撃 ====================
  - id: witness-tsumugi
    bg: hallway-sunset
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 目撃証言
        subtitle: ツムギが見たもの
      - type: sprite
        character: tsumugi
        expression: worried
        position: left
      - type: dialog
        character: tsumugi
        text: "あの……{言|い}いにくいんだけど。15:25ごろ、{音楽室|おんがくしつ}に{向|む}かう{途中|とちゅう}で{教室|きょうしつ}の{前|まえ}を{通|とお}ったとき——"
        expression: worried
      - type: dialog
        character: tsumugi
        text: "**ヒロムがタイのブースの{前|まえ}に{立|た}って、{灯籠|とうろう}をじっと{見|み}つめていた**。{灯籠|とうろう}に{手|て}を{伸|の}ばしているように{見|み}えた……。"
        expression: thinking
      - type: dialog
        character: tsumugi
        text: "「きれいだなあって{見|み}てるのかな」と{思|おも}って、そのまま{音楽室|おんがくしつ}に{行|い}ったんだ。{壊|こわ}れたと{聞|き}いて……もしかして、って。"
        expression: worried
      - type: sprite
        character: tsumugi
        action: hide
      - type: narration
        text: "15:25に{教室|きょうしつ}でヒロムが{灯籠|とうろう}を{見|み}ていた。タイムラインと{合|あ}わせると——"

  # ==================== 追加HO：壊れ方分析 ====================
  - id: analysis
    bg: classroom-blackboard
    bgm: exploration
    steps:
      - type: title_card
        text: 追加情報
        subtitle: マナブの分析
      - type: sprite
        character: manabu
        expression: determined
        position: right
      - type: dialog
        character: manabu
        text: "クラトンの{壊|こわ}れ{方|かた}を{分析|ぶんせき}した。バナナの{葉|は}の**{上部|じょうぶ}に「{握|にぎ}った{跡|あと}」**がある。"
        expression: determined
      - type: dialog
        character: manabu
        text: "{花|はな}は**{持|も}ち{上|あ}げた{状態|じょうたい}から{落|お}ちた**ように{散|ち}っている。そして——**お{菓子|かし}に{手|て}を{伸|の}ばしたなら、クラトンに{触|さわ}る{必要|ひつよう}はない**。お{菓子|かし}はクラトンの{隣|となり}で、{直接|ちょくせつ}{取|と}れる。"
        expression: thinking
      - type: dialog
        character: manabu
        text: "つまり——**お{菓子|かし}{目当|めあ}てじゃなく、{灯籠|とうろう}{自体|じたい}を{持|も}ち{上|あ}げた{人|ひと}がいる**。そして**{底|そこ}を{支|ささ}えずに{上|うえ}から{握|にぎ}った**。{日本|にほん}の{提灯|ちょうちん}みたいに。"
        expression: determined
      - type: sprite
        character: manabu
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "{日本|にほん}{式|しき}の{持|も}ち{方|かた}（{上|うえ}から{握|にぎ}る）でクラトンを{持|も}ったら、こうなる。{日本|にほん}の{祭|まつ}りに{詳|くわ}しくて、{灯籠|とうろう}に{興味|きょうみ}がある{人|ひと}は……？"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。"
      - type: narration
        text: "①クラトンは「{上|うえ}から{握|にぎ}った{跡|あと}」で{壊|こわ}れた。②お{菓子|かし}には{手|て}がついていない。③{担任|たんにん}の{先生|せんせい}によると、ヒロムは15:40まで{職員室|しょくいんしつ}にいなかった。④ツムギは15:25にヒロムが{灯籠|とうろう}の{前|まえ}にいるのを{目撃|もくげき}した。"
      - type: sprite
        character: koeru
        expression: thinking
        position: left
      - type: dialog
        character: koeru
        text: "コエルは15:20に{下校|げこう}してるから、{私|わたし}はアリバイ{完璧|かんぺき}。マナブは{図書室|としょしつ}にいた。ツムギは{音楽室|おんがくしつ}にいた。{残|のこ}るのは——"
        expression: thinking
      - type: sprite
        character: koeru
        action: hide
      - type: sprite
        character: tsumugi
        expression: worried
        position: right
      - type: dialog
        character: tsumugi
        text: "{日本|にほん}のお{盆|ぼん}の{提灯|ちょうちん}は「{上|うえ}から{持|も}つ」。{日本|にほん}{担当|たんとう}の{人|ひと}は……{無意識|むいしき}にその{持|も}ち{方|かた}をしてしまうかも。"
        expression: worried
      - type: sprite
        character: tsumugi
        action: hide
      - type: choice
        id: q1
        question: クラトンを壊したのは誰？
        options:
          - text: ヒロム（15:25に灯籠を見ていた。15:40まで職員室に着かなかった。日本式の持ち方で壊した）
            value: hiromu
            correct: true
            feedback: "{正解|せいかい}！ ヒロムは{日本|にほん}{担当|たんとう}。{提灯|ちょうちん}を「{上|うえ}から{持|も}つ」{日本|にほん}{式|しき}でクラトンを{握|にぎ}り、{壊|こわ}してしまった。お{菓子|かし}{目当|めあ}てではなく、{灯籠|とうろう}の{美|うつく}しさに{惹|ひ}かれて{触|さわ}ったのだ。"
          - text: コエル（お菓子がほしいと言っていた）
            value: koeru
            feedback: "コエルは15:20に{下校|げこう}している。{先生|せんせい}が{確認|かくにん}ずみ。しかもお{菓子|かし}は{手|て}つかず——「お{菓子|かし}{目当|めあ}て」の{仮説|かせつ}は{証拠|しょうこ}と{矛盾|むじゅん}するよ。"
          - text: マナブ（クラトンを作った本人）
            value: manabu
            feedback: "マナブは15:30に{図書室|としょしつ}にいたことを{図書|としょ}の{先生|せんせい}が{確認|かくにん}している。それに{正|ただ}しい{持|も}ち{方|かた}を{知|し}っているマナブは「{底|そこ}を{支|ささ}える」はず。{上|うえ}から{握|にぎ}らない。"
          - text: ツムギ（廊下でヒロムを見た）
            value: tsumugi
            feedback: "ツムギは15:25に{廊下|ろうか}でヒロムを{見|み}た{後|あと}、{音楽室|おんがくしつ}に{向|む}かっている。15:35には{先生|せんせい}が{確認|かくにん}。タイムライン{的|てき}にクラトンに{触|さわ}る{時間|じかん}はなかった。"

  # ==================== 真実：ヒロムの告白 ====================
  - id: truth-hiromu
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ヒロムの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: hiromu
        expression: worried
        position: center
      - type: dialog
        character: hiromu
        text: "……ごめんなさい。クラトンを{壊|こわ}したのは、{僕|ぼく}です。"
        expression: worried
      - type: dialog
        character: hiromu
        text: "{放課後|ほうかご}、{教室|きょうしつ}に{戻|もど}ったとき——タイのブースのクラトンが、すごくきれいで。「バナナの{葉|は}でこんなきれいなものが{作|つく}れるんだ」って、どうしてもじっくり{見|み}たくなって……"
        expression: thinking
      - type: dialog
        character: hiromu
