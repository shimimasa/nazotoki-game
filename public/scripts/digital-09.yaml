scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: digital-09/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}の{作文|さくぶん}コンクール。テーマは「わたしの{夢|ゆめ}」。クラス28{人|にん}が{作文|さくぶん}を{提出|ていしゅつ}した。"
      - type: narration
        text: "{結果|けっか}{発表|はっぴょう}——{最優秀賞|さいゆうしゅうしょう}はソラの「ぼくの{夢|ゆめ}」！ クラスから{拍手|はくしゅ}が{起|お}きた。"
      - type: bgm
        action: stop
      - type: sprite
        character: haruto
        expression: thinking
        position: left
      - type: dialog
        character: haruto
        text: "ソラ、この{作文|さくぶん}すごいけど……ソラの{普段|ふだん}の{文章|ぶんしょう}とぜんぜん{違|ちが}わない？ もしかして……AIに{書|か}いてもらった？"
      - type: sprite
        character: haruto
        action: hide
      - type: sprite
        character: sora
        expression: surprised
        position: right
      - type: bgm
        file: digital-09/tension
      - type: dialog
        character: sora
        text: "{自分|じぶん}で{書|か}いたよ！ ……{書|か}いたんだよ。"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{確認|かくにん}が{必要|ひつよう}ですね。{情報|じょうほう}モラル{探偵|たんてい}のみなさん、ソラの{作文|さくぶん}がAIで{書|か}かれたかどうか、{調査|ちょうさ}してください。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - character: haruto
            expression: determined
          - character: mio
            expression: thinking
          - character: sora
            expression: worried
          - character: riko
            expression: normal
      - type: narration
        text: "ソラの{過去|かこ}の{作文|さくぶん}とコンクール{作文|さくぶん}を{比較|ひかく}して、{帰納法|きのうほう}でパターンの{違|ちが}いを見つける{調査|ちょうさ}が{始|はじ}まった。"
      - type: sprite
        character: haruto
        action: hide
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: riko
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "情報モラル探偵団 Vol.9"
        subtitle: "AIが書いた作文"

  # ===== 証拠カード1: コンクール作文 =====
  - id: evidence-1
    bg: classroom
    bgm: digital-09/investigation
    steps:
      - type: title_card
        text: "ステップ1：調査"
      - type: narration
        text: "まずはソラの{最優秀賞|さいゆうしゅうしょう}{作文|さくぶん}「ぼくの{夢|ゆめ}」を{読|よ}んでみよう。"
      - type: narration
        text: "『{将来|しょうらい}、{社会|しゃかい}に{貢献|こうけん}できる{人間|にんげん}になることが、ぼくの{最大|さいだい}の{夢|ゆめ}です。{具体的|ぐたいてき}には、プロのサッカー{選手|せんしゅ}になり、その{影響力|えいきょうりょく}を{活|い}かして{子|こ}どもたちにスポーツの{素晴|すば}らしさを{伝|つた}えたいと{考|かんが}えています』"
      - type: narration
        text: "『スポーツには{人々|ひとびと}を{結|むす}びつける{力|ちから}があります。{国際的|こくさいてき}な{大会|たいかい}では、{言葉|ことば}や{文化|ぶんか}の{壁|かべ}を{超|こ}えて{感動|かんどう}を{共有|きょうゆう}することができます』"
      - type: narration
        text: "800{字|じ}。{文法|ぶんぽう}{完璧|かんぺき}。{語彙|ごい}が{豊富|ほうふ}——「{貢献|こうけん}」「{影響力|えいきょうりょく}」「{国際的|こくさいてき}」。{構成|こうせい}も{整|ととの}っている。"
      - type: narration
        text: "すごい{作文|さくぶん}だ。でも——{小学|しょうがく}4{年生|ねんせい}が「{社会|しゃかい}に{貢献|こうけん}」「{影響力|えいきょうりょく}を{活|い}かして」と{書|か}くのは{普通|ふつう}だろうか？"

  # ===== 証拠カード2: 過去の作文3本 =====
  - id: evidence-2
    bg: classroom
    bgm: digital-09/investigation
    steps:
      - type: narration
        text: "ソラの{過去|かこ}の{作文|さくぶん}3{本|ぽん}を{読|よ}み{比|くら}べよう。{帰納法|きのうほう}でパターンを見つけるのだ。"
      - type: narration
        text: "{作文|さくぶん}A「{遠足|えんそく}の{思|おも}い{出|で}」——「{遠足|えんそく}たのしかったぜ！ お{弁当|べんとう}がめっちゃうまかった。おにぎり3こ{食|た}べた」"
      - type: narration
        text: "{特徴|とくちょう}：{文|ぶん}の{長|なが}さ{平均|へいきん}12{字|じ}。「〜だぜ」{口調|くちょう}。{誤字|ごじ}1{個|こ}。{自分|じぶん}の{体験|たいけん}が{中心|ちゅうしん}。"
      - type: narration
        text: "{作文|さくぶん}B「{好|す}きな{教科|きょうか}」——「ぼくは{体育|たいいく}がすきだ。とくにサッカーがすきだぜ。シュートをきめたときがいちばんうれしい」"
      - type: narration
        text: "{特徴|とくちょう}：{平均|へいきん}14{字|じ}。「〜だぜ」{口調|くちょう}。{漢字|かんじ}を使わない（「にがて」「すきだ」）。{自分|じぶん}の{気持|きも}ち。"
      - type: narration
        text: "{作文|さくぶん}C「{冬休|ふゆやす}みの{出来事|できごと}」——「{冬休|ふゆやす}みにおじいちゃんの{家|いえ}にいった。おもちをたくさん{食|た}べた。いとことサッカーした。たのしかたぜ！」"
      - type: narration
        text: "{特徴|とくちょう}：{平均|へいきん}13{字|じ}。「〜だぜ」{口調|くちょう}。{誤字|ごじ}2{個|こ}（「たのしかた」）。{体験|たいけん}{中心|ちゅうしん}。"
      - type: se
        file: common/discover
      - type: narration
        text: "{帰納法|きのうほう}で見つけたソラのパターン——{平均|へいきん}13{字|じ}の{短|みじか}い{文|ぶん}、「〜だぜ」の{口語|こうご}、{誤字|ごじ}あり、{自分|じぶん}の{体験|たいけん}{中心|ちゅうしん}。"
      - type: narration
        text: "コンクール{作文|さくぶん}と{比較|ひかく}すると——{文|ぶん}の{長|なが}さ：{平均|へいきん}13{字|じ}→35{字|じ} ❌ / {口調|くちょう}：「〜だぜ」→「〜と{考|かんが}えます」❌ / {誤字|ごじ}：あり→ゼロ ❌ / {内容|ないよう}：{体験|たいけん}→{一般論|いっぱんろん} ❌"
      - type: narration
        text: "4つの{特徴|とくちょう}が{全部|ぜんぶ}{不一致|ふいっち}。{同|おな}じ{人|ひと}が{書|か}いたとは{思|おも}えない。"

  # ===== 証拠カード3: AIの出力比較 =====
  - id: evidence-3
    bg: classroom
    bgm: digital-09/experiment
    steps:
      - type: sprite
        character: haruto
        expression: determined
        position: left
      - type: dialog
        character: haruto
        text: "{試|ため}しにAIチャットに{同|おな}じテーマを{入力|にゅうりょく}してみたんだ。『{小学|しょうがく}4{年生|ねんせい}が{書|か}く『ぼくの{夢|ゆめ}』を800{字|じ}で。{夢|ゆめ}はサッカー{選手|せんしゅ}』って。"
      - type: sprite
        character: haruto
        expression: surprised
      - type: dialog
        character: haruto
        text: "AIの{出力|しゅつりょく}の{冒頭|ぼうとう}——『{将来|しょうらい}、{社会|しゃかい}に{貢献|こうけん}できる{人間|にんげん}になることが、ぼくの{夢|ゆめ}です』。ソラのコンクール{作文|さくぶん}と……ほぼ{同|おな}じ。"
      - type: sprite
        character: haruto
        expression: thinking
      - type: dialog
        character: haruto
        text: "「{社会|しゃかい}に{貢献|こうけん}」「{影響力|えいきょうりょく}」「{国際的|こくさいてき}」——{語彙|ごい}も{構成|こうせい}も{酷似|こくじ}してる。{偶然|ぐうぜん}にしては{出来|でき}すぎだ。"
      - type: sprite
        character: haruto
        action: hide
      - type: narration
        text: "ハルトが{疑問|ぎもん}を{投|な}げかけた{水曜日|すいようび}、ソラは{顔|かお}が{真|ま}っ{赤|か}になって『{自分|じぶん}で{書|か}いたよ！』と{強|つよ}く{否定|ひてい}した。"

  # ===== 証拠カード4: 制作過程 =====
  - id: evidence-4
    bg: classroom
    bgm: digital-09/experiment
    steps:
      - type: sprite
        character: mio
        expression: thinking
        position: right
      - type: dialog
        character: mio
        text: "{提出|ていしゅつ}{期限|きげん}の{月曜|げつよう}の{放課後|ほうかご}、ソラが{教室|きょうしつ}でパソコンの{画面|がめん}を見ながら{作文|さくぶん}{用紙|ようし}に{写|うつ}していたのを見たの。{画面|がめん}には{長|なが}い{文章|ぶんしょう}が{表示|ひょうじ}されてた。"
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: riko
        expression: normal
        position: left
      - type: dialog
        character: riko
        text: "ソラは2{週間|しゅうかん}{前|まえ}に{課題|かだい}が{出|で}たとき、『{作文|さくぶん}ムリ〜』って{言|い}ってた。{先週|せんしゅう}の{水曜|すいよう}にも『まだ1{行|ぎょう}も{書|か}けてない』って。"
      - type: sprite
        character: riko
        expression: thinking
      - type: dialog
        character: riko
        text: "なのに{月曜|げつよう}に800{字|じ}の{完璧|かんぺき}な{作文|さくぶん}が{出|で}てきた。2{日|か}で{書|か}いたにしては{出来|でき}すぎ。しかも{下|した}{書|が}きの{提出|ていしゅつ}もなかった。"
      - type: sprite
        character: riko
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "『1{行|ぎょう}も{書|か}けてない』{状態|じょうたい}から2{日|か}で800{字|じ}の{完璧|かんぺき}な{作文|さくぶん}。{下|した}{書|が}きなし。パソコンから{写|うつ}していた。これらの{事実|じじつ}をつなげると——。"

  # ===== 証拠カード5: AI検出結果 =====
  - id: card-5
    bg: classroom
    bgm: digital-09/tension
    steps:
      - type: effect
        name: fade-out
      - type: effect
        name: fade-in
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "ソラの{作文|さくぶん}をAI{検出|けんしゅつ}ツールにかけました。{結果|けっか}は——AI{生成|せいせい}{確率|かくりつ}92%。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "「この{文章|ぶんしょう}は{高|たか}い{確率|かくりつ}でAIによって{生成|せいせい}されたものです。{小学|しょうがく}4{年生|ねんせい}の{作文|さくぶん}としては、{語彙|ごい}レベル・{文法|ぶんぽう}{精度|せいど}・{構成|こうせい}の{整合性|せいごうせい}が{不自然|ふしぜん}に{高|たか}い」"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "ここで{考|かんが}えてほしい。ソラは「ずるをした」のか？ それとも「{助|たす}けを{求|もと}めた」のか？"
      - type: narration
        text: "AIに{書|か}かせて{提出|ていしゅつ}＝ルール{違反|いはん}。コンクールの{公平性|こうへいせい}を{壊|こわ}した。{他|ほか}の{子|こ}が{自力|じりき}で{書|か}いたのに{不公平|ふこうへい}。"
      - type: narration
        text: "でもソラは{作文|さくぶん}が{苦手|にがて}で2{週間|しゅうかん}{悩|なや}んだ。{助|たす}けが{必要|ひつよう}だった。ただしAI「{丸投|まるな}げ」は{自分|じぶん}の{力|ちから}にならない。"
      - type: narration
        text: "AIの{正|ただ}しい使い{方|かた}——アイデア{出|だ}しを{手伝|てつだ}ってもらう→{自分|じぶん}の{言葉|ことば}で{書|か}き{直|なお}す。{丸投|まるな}げではなく、{道具|どうぐ}として使う{方法|ほうほう}がある。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: digital-09/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}が{出|で}そろいました。{考|かんが}えてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        text: "ソラの作文はAIが書いた？"
        options:
          - text: "AIが書いた（帰納法でパターンが全く違う）"
            feedback: "{過去|かこ}3{本|ぽん}のパターン（{短文|たんぶん}・{口語|こうご}・{誤字|ごじ}あり・{体験|たいけん}）とコンクール{作文|さくぶん}（{長文|ちょうぶん}・{文語|ぶんご}・{誤字|ごじ}ゼロ・{一般論|いっぱんろん}）が4{項目|こうもく}{全|すべ}て{不一致|ふいっち}。AI{検出|けんしゅつ}も92%。"
          - text: "自分で書いた（成長したのかも）"
            feedback: "2{週間|しゅうかん}で{文体|ぶんたい}がここまで{変|か}わるのは{不自然|ふしぜん}。「{社会|しゃかい}に{貢献|こうけん}」「{影響力|えいきょうりょく}」は{小|しょう}4の{成長|せいちょう}では{説明|せつめい}しにくい。"
          - text: "誰かに手伝ってもらった（AIではなく人間）"
            feedback: "{可能性|かのうせい}はあるけど、AIの{出力|しゅつりょく}と{構成|こうせい}が{酷似|こくじ}している。{人間|にんげん}が{手伝|てつだ}ったなら、もっとソラらしさが{残|のこ}るはず。"
          - text: "判断できない（もっと証拠が必要）"
            feedback: "{帰納法|きのうほう}のパターン{不一致|ふいっち}＋AI{出力|しゅつりょく}との{酷似|こくじ}＋{制作|せいさく}{過程|かてい}の{矛盾|むじゅん}＋AI{検出|けんしゅつ}92%——{複数|ふくすう}の{証拠|しょうこ}が{同|おな}じ{結論|けつろん}を{指|さ}している。"
      - type: choice
        id: q2
        text: "ソラがAIに頼ったのは「ずるい」？"
        options:
          - text: "ずるい。ルール違反だし、他の子に不公平"
            feedback: "コンクールは「{自分|じぶん}で{書|か}く」ルール。AIに{書|か}かせるのは{確|たし}かにルール{違反|いはん}。{自力|じりき}で{書|か}いた{子|こ}にとっては{不公平|ふこうへい}だよね。"
          - text: "仕方ない。作文が苦手で助けが必要だった"
            feedback: "{苦手|にがて}なことに{助|たす}けを{求|もと}めるのは{悪|わる}くない。でも「{助|たす}け」の{求|もと}め{方|かた}が{間違|まちが}っていた。AIに{丸投|まるな}げではなく、{先生|せんせい}に{相談|そうだん}すべきだった。"
          - text: "使い方の問題。丸投げがダメ"
            feedback: "AIは{道具|どうぐ}。アイデアを{出|だ}してもらったり、{構成|こうせい}を{教|おし}えてもらうのはOK。でも{丸投|まるな}げして{自分|じぶん}の{言葉|ことば}で{書|か}き{直|なお}さないのは、{自分|じぶん}の{力|ちから}にならない。"
          - text: "ソラの気持ちも分かるけど、結果的に間違いだった"
            feedback: "{作文|さくぶん}が{苦手|にがて}で2{週間|しゅうかん}{悩|なや}んだ。その{気持|きも}ちは{本物|ほんもの}。でもAI{丸投|まるな}げは{自分|じぶん}の{成長|せいちょう}にならないし、ルールにも{反|はん}する。"
      - type: choice
        id: q3
        text: "AIとの正しい付き合い方は？"
        options:
          - text: "全部自分で書く。AIは使わない"
            feedback: "それも1つの{考|かんが}え。でもAIは{便利|べんり}な{道具|どうぐ}。「{使|つか}わない」より「{正|ただ}しく使う」{方|ほう}が{大事|だいじ}かも。"
          - text: "アイデア出しや構成の相談に使い、最終版は自分で書く"
            feedback: "これがAIの{正|ただ}しい使い{方|かた}。{考|かんが}えるきっかけをもらって、{自分|じぶん}の{言葉|ことば}で{仕上|しあ}げる。{道具|どうぐ}として{賢|かしこ}く使う。"
          - text: "先生や友達に聞く方がいい"
            feedback: "{人間|にんげん}に{相談|そうだん}するのも{大切|たいせつ}。{先生|せんせい}なら{書|か}き{方|かた}を{教|おし}えてくれるし、{友達|ともだち}なら{一緒|いっしょ}に{考|かんが}えてくれる。AIにはできない「{寄|よ}り{添|そ}い」がある。"
          - text: "苦手なことこそ自分でやることに意味がある"
            feedback: "ソラの{過去|かこ}の{作文|さくぶん}——{短|みじか}くて{誤字|ごじ}があるけど、{体験|たいけん}が{詰|つ}まった「ソラの{言葉|ことば}」。AIの{完璧|かんぺき}な{文章|ぶんしょう}より、ずっと{価値|かち}がある。"

  # ===== 真実: ハルト =====
  - id: truth-haruto
    bg: classroom
    bgm: digital-09/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: sprite
        character: haruto
        expression: normal
