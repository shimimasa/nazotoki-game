scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: schoolyard
    bgm: science-11/opening
    steps:
      - type: narration
        text: "5{年|ねん}3{組|くみ}が{理科|りか}の{授業|じゅぎょう}で{育|そだ}てていたヒマワリの{花壇|かだん}。{来週|らいしゅう}の{花壇|かだん}コンクールに{向|む}けて、ぐんぐん{育|そだ}っていた。"
      - type: narration
        text: "4{人|にん}の{花壇|かだん}{当番|とうばん}が{日曜|にちよう}から{水曜|すいよう}まで{交代|こうたい}で{世話|せわ}をしてきた。"
      - type: sprite_group
        characters:
          - { id: haruka, expression: normal }
          - { id: riku, expression: normal }
          - { id: sora, expression: normal }
          - { id: midori, expression: normal }
      - type: bgm
        action: stop
      - type: se
        sound: common/tension
      - type: narration
        speed: slow
        text: "ところが{木曜日|もくようび}の{朝|あさ}——{花壇|かだん}のヒマワリがしおれて{枯|か}れ{始|はじ}めている！"
      - type: sprite_group
        characters:
          - { id: haruka, expression: surprised }
          - { id: riku, expression: thinking }
          - { id: sora, expression: worried }
          - { id: midori, expression: worried }
      - type: narration
        text: "{葉|は}はしなびて、{茎|くき}はぐったり。{毎日|まいにち}ちゃんと{水|みず}をやっていたのに。{日当|ひあ}たりも{良好|りょうこう}なのに。{何|なに}がいけなかったの？"
      - type: sprite
        id: haruka
        action: hide
      - type: sprite
        id: riku
        action: hide
      - type: sprite
        id: sora
        action: hide
      - type: sprite
        id: midori
        action: hide
      - type: sprite
        id: sensei
        position: center
        expression: thinking
      - type: bgm
        track: science-11/tension
      - type: dialog
        character: sensei
        text: "{植物|しょくぶつ}の{成長|せいちょう}に{必要|ひつよう}な5つの{条件|じょうけん}を1つずつ{調|しら}べて、{枯|か}れた{原因|げんいん}を{突|つ}き{止|と}めてください。{原因|げんいん}を{作|つく}ったのは{誰|だれ}？"
      - type: sprite
        id: sensei
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "枯れた花壇の犯人"
        subtitle: "サイエンス捜査班 Vol.11"

  # ===== 証拠カード1: 5つの成長条件 =====
  - id: evidence-1
    bg: schoolyard
    bgm: science-11/investigation
    steps:
      - type: effect
        name: fade-in
      - type: title_card
        text: "ステップ1：調査"
        subtitle: "証拠カード1 — 5つの成長条件"
      - type: narration
        text: "{植物|しょくぶつ}が{元気|げんき}に{育|そだ}つための5つの{条件|じょうけん}。①{日光|にっこう}（{光合成|こうごうせい}に{必要|ひつよう}）。②{水|みず}（{栄養|えいよう}を{運|はこ}ぶ）。③{肥料|ひりょう}（{成長|せいちょう}の{栄養|えいよう}）。④{温度|おんど}（{暑|あつ}すぎも{寒|さむ}すぎもダメ）。⑤{空気|くうき}（{呼吸|こきゅう}に{必要|ひつよう}）。"
      - type: narration
        text: "{枯|か}れた{原因|げんいん}を{見|み}つけるには、この5つを1つずつチェックして「{異常|いじょう}のある{条件|じょうけん}」を{見|み}つけ{出|だ}そう！"

  # ===== 証拠カード2: 花壇の観察記録 =====
  - id: evidence-2
    bg: schoolyard
    steps:
      - type: title_card
        text: "証拠カード2 — 花壇の観察"
      - type: narration
        text: "{木曜日|もくようび}の{朝|あさ}の{観察|かんさつ}{結果|けっか}。{葉|は}：しなびて{色|いろ}が{薄|うす}い。{葉|は}のふちが{茶色|ちゃいろ}く{焼|や}けたようになっている。{茎|くき}：ぐったり。{根|ね}：{先端|せんたん}が{茶色|ちゃいろ}に{変色|へんしょく}。"
      - type: se
        sound: common/discover
      - type: narration
        text: "{土|つち}：{適度|てきど}に{湿|しめ}っている（{乾|かわ}きすぎていない）。{土|つち}の{表面|ひょうめん}：{白|しろ}い{粒|つぶ}つぶがたくさん{見|み}える！"
      - type: narration
        text: "2つの{異常|いじょう}に{注目|ちゅうもく}——「{水|みず}はあるのにしおれている」（{根|ね}が{水|みず}を{吸|す}えない？）と「{葉|は}のふちが{茶色|ちゃいろ}く{焼|や}けている」（{濃|こ}すぎる{成分|せいぶん}が{葉|は}に{届|とど}いた？）。この2つを{同時|どうじ}に{説明|せつめい}できる{原因|げんいん}は？"

  # ===== 証拠カード3: 環境データ =====
  - id: evidence-3
    bg: schoolyard
    steps:
      - type: title_card
        text: "証拠カード3 — 環境データ"
      - type: narration
        text: "{日照|にっしょう}{時間|じかん}——{日曜|にちよう}〜{水曜|すいよう}すべて6{時間|じかん}{以上|いじょう}。✅{十分|じゅうぶん}。{気温|きおん}——15〜30℃の{範囲内|はんいない}。✅{適温|てきおん}。{空気|くうき}——{屋外|おくがい}で{循環|じゅんかん}{正常|せいじょう}。✅OK。"
      - type: narration
        text: "{水|みず}やり{記録|きろく}。{日曜|にちよう}（ハルカ）：じょうろ2{杯|はい}✅。{月曜|げつよう}（リク）：ホース1{分|ぷん}✅。{火曜|かよう}（ソラ）：じょうろ1{杯|はい}だけ⚠️{少|すく}なめ。{水曜|すいよう}（ミドリ）：じょうろ2{杯|はい}✅。"
      - type: se
        sound: common/discover
      - type: narration
        text: "5{条件|じょうけん}チェック——{日光|にっこう}✅、{温度|おんど}✅、{空気|くうき}✅。{水|みず}⚠️（{火曜|かよう}だけ{少|すく}なめ）。{肥料|ひりょう}❓（データなし！ {要調査|ようちょうさ}！）。{水|みず}が1{日|にち}{少|すく}ないだけでは{枯|か}れない。でも——{水|みず}が{少|すく}ない{日|ひ}に{肥料|ひりょう}が{多|おお}すぎたら？"

  # ===== 証拠カード4: 化学肥料の説明書 =====
  - id: evidence-4
    bg: science-lab
    bgm: science-11/experiment
    steps:
      - type: title_card
        text: "証拠カード4 — 化学肥料の説明書"
      - type: narration
        text: "{化学肥料|かがくひりょう}の{袋|ふくろ}の{説明|せつめい}——{使|つか}い{方|かた}：{花壇|かだん}{全体|ぜんたい}に「ひとつかみ（{約|やく}30g）」をまく。{週|しゅう}に1{回|かい}が{目安|めやす}。"
      - type: se
        sound: common/discover
      - type: narration
        text: "★{注意|ちゅうい}★ あげすぎに{注意|ちゅうい}！ {規定量|きていりょう}の2{倍|ばい}{以上|いじょう}で「{肥料|ひりょう}やけ」が{起|お}きることがある。{肥料|ひりょう}やけ＝{根|ね}を{傷|いた}める。"
      - type: narration
        text: "{肥料|ひりょう}{記録|きろく}——{前|まえ}の{週|しゅう}の{金曜|きんよう}にリク{先生|せんせい}が{規定量|きていりょう}をあげた（✅{正常|せいじょう}）。{火曜日|かようび}に{誰|だれ}かが{肥料|ひりょう}をあげた{形跡|けいせき}がある——{記録|きろく}がない！"
      - type: narration
        text: "{土|つち}に{見|み}えた「{白|しろ}い{粒|つぶ}」＝{溶|と}け{残|のこ}った{化学肥料|かがくひりょう}では？ {火曜|かよう}に{肥料|ひりょう}をあげたのは{誰|だれ}？ {火曜|かよう}の{当番|とうばん}はソラ。ソラは{水|みず}やりも{少|すく}なめだった——{肥料|ひりょう}が{多|おお}くて{水|みず}が{少|すく}ない……この{組|く}み{合|あ}わせが{重要|じゅうよう}かも！"

  # ===== 証言パート =====
  - id: testimony
    bg: schoolyard
    bgm: science-11/investigation
    steps:
      - type: title_card
        text: "ステップ2：聞き取り"
      - type: sprite
        id: haruka
        position: left
        expression: worried
      - type: dialog
        character: haruka
        text: "わたしは{日曜|にちよう}{当番|とうばん}で{水|みず}やりと{記録|きろく}をしたよ。でも……{実|じつ}は{記録|きろく}をつけ{忘|わす}れちゃって。それが{原因|げんいん}かもって{心配|しんぱい}で……。"
      - type: sprite
        id: haruka
        action: hide
      - type: sprite
        id: riku
        position: right
        expression: thinking
      - type: dialog
        character: riku
        text: "ぼくは{月曜|げつよう}{当番|とうばん}。{水|みず}やりと{観察|かんさつ}をした。{実|じつ}はアブラムシを{数匹|すうひき}{見|み}つけたんだけど、{少|すく}しだったから{報告|ほうこく}しなかった。それが{原因|げんいん}？"
      - type: sprite
        id: riku
        action: hide
      - type: sprite
        id: sora
        position: left
        expression: normal
      - type: dialog
        character: sora
        text: "{火曜|かよう}{当番|とうばん}で{水|みず}やりをしたぜ。{急|いそ}いでたからじょうろ1{杯|はい}だけにしちゃった。{肥料|ひりょう}は……えっと……あげてない、と{思|おも}うけど。"
      - type: sprite
        id: sora
        action: hide
      - type: sprite
        id: midori
        position: right
        expression: worried
      - type: dialog
        character: midori
        text: "わたしは{水曜|すいよう}{当番|とうばん}。ヒマワリたちのこと「ひまちゃん」って{呼|よ}んでるの。{心配|しんぱい}で{水|みず}やりを2{回|かい}しちゃった……それがダメだった？"
      - type: sprite
        id: midori
        action: hide

  # ===== 証拠カード5: 肥料やけのメカニズム（ゲームチェンジャー） =====
  - id: evidence-5
    bg: science-lab
    bgm: science-11/tension
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "★新事実★"
        subtitle: "証拠カード5 — 肥料やけの因果連鎖"
      - type: effect
        name: fade-in
      - type: narration
        text: "「{肥料|ひりょう}やけ」とは——{肥料|ひりょう}をあげすぎると{起|お}きる{現象|げんしょう}。"
      - type: narration
        text: "{通常|つうじょう}は{根|ね}の{中|なか}の{濃度|のうど}が{土|つち}より{高|たか}いから、{水|みず}は{土|つち}→{根|ね}へ{移動|いどう}する。でも{肥料|ひりょう}が{多|おお}すぎると{土|つち}の{濃度|のうど}が{高|たか}くなりすぎて、{逆|ぎゃく}に{根|ね}→{土|つち}へ{水|みず}が{出|で}ていく（{浸透圧|しんとうあつ}）。"
      - type: se
        sound: common/discover
      - type: narration
        text: "{因果連鎖|いんがれんさ}——①{誰|だれ}かが{化学肥料|かがくひりょう}を{大量|たいりょう}にまいた→②{土|つち}の{肥料|ひりょう}{濃度|のうど}が{高|たか}くなった→②b{同|おな}じ{日|ひ}、{水|みず}やりが{少|すく}なくて{肥料|ひりょう}が{薄|うす}まらなかった→③{浸透圧|しんとうあつ}で{根|ね}から{水分|すいぶん}が{奪|うば}われた→④{根|ね}が{傷|いた}み{水|みず}を{吸|す}えなくなった→⑤{枯|か}れた。"
      - type: se
        sound: common/tension
      - type: narration
        speed: slow
        text: "{肥料|ひりょう}が{多|おお}いだけでも、{水|みず}が{少|すく}ないだけでも、ここまで{枯|か}れなかった。2つが{同|おな}じ{日|ひ}に{重|かさ}なったから{花壇|かだん}{全体|ぜんたい}が{枯|か}れた。{火曜日|かようび}に{肥料|ひりょう}を{追加|ついか}して{水|みず}やりも{少|すく}なめだったのは——{火曜|かよう}{当番|とうばん}のソラだけ！"

  # ===== 推理・投票 =====
  - id: questions
    bg: schoolyard
    bgm: science-11/tension
    steps:
      - type: title_card
        text: "ステップ3：推理"
      - type: choice
        id: q1
        text: "{花壇|かだん}が{枯|か}れた{原因|げんいん}は？"
        options:
          - text: "水不足"
            value: water_shortage
            feedback: "{土|つち}は{湿|しめ}っていたよ。{水|みず}はあるのに{植物|しょくぶつ}がしおれている——{水不足|みずぶそく}だけでは{説明|せつめい}できない。"
          - text: "日照不足"
            value: sunlight_shortage
            feedback: "{毎日|まいにち}6{時間|じかん}{以上|いじょう}の{日照|にっしょう}があった。{日光|にっこう}は{十分|じゅうぶん}だよ。"
          - text: "肥料やけ（肥料の多すぎ＋水の少なさ）"
            value: fertilizer_burn
            feedback: "そのとおり！ {肥料|ひりょう}が{多|おお}すぎて{水|みず}が{少|すく}なかったから、{肥料|ひりょう}が{薄|うす}まらず「{肥料|ひりょう}やけ」が{起|お}きた。2つの{条件|じょうけん}の{組|く}み{合|あ}わせが{原因|げんいん}だね。"
          - text: "虫の被害"
            value: insect_damage
            feedback: "アブラムシは{数匹|すうひき}だけ。{花壇|かだん}{全体|ぜんたい}を{枯|か}らすほどではないよ。{根|ね}の{変色|へんしょく}や{葉|は}の{焼|や}けは{虫|むし}の{被害|ひがい}とは{違|ちが}う{症状|しょうじょう}だね。"
      - type: choice
        id: q2
        text: "{花壇|かだん}を{枯|か}らした{原因|げんいん}を{作|つく}ったのは{誰|だれ}？"
        options:
          - text: "ハルカ"
            value: haruka
            feedback: "ハルカは{記録|きろく}をつけ{忘|わす}れたけど、{水|みず}やりは{適量|てきりょう}。{記録|きろく}のサボりは{枯死|こし}の{原因|げんいん}ではないよ。"
          - text: "リク"
            value: riku
            feedback: "アブラムシは{数匹|すうひき}だけで{花壇|かだん}{全体|ぜんたい}は{枯|か}れない。リクの{観察|かんさつ}は{正確|せいかく}だった。"
          - text: "ソラ"
            value: sora
            feedback: "{火曜日|かようび}に{記録|きろく}のない{肥料|ひりょう}を{追加|ついか}し、{水|みず}やりも{少|すく}なめ。{肥料|ひりょう}{過多|かた}＋{水不足|みずぶそく}の{両方|りょうほう}を{同時|どうじ}に{引|ひ}き{起|お}こせたのはソラだけ。"
          - text: "ミドリ"
            value: midori
            feedback: "ミドリは{水|みず}やりを2{回|かい}したけど、1{日|にち}の{水|みず}の{過多|かた}で{花壇|かだん}{全体|ぜんたい}は{枯|か}れないよ。"

  # ===== 真実: ソラの告白 =====
  - id: truth-sora
    bg: schoolyard
    bgm: science-11/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: narration
        speed: slow
        text: "{花壇|かだん}を{枯|か}らしてしまった{原因|げんいん}を{作|つく}ったのは——ソラだった。"
      - type: sprite
        id: sora
        position: center
        expression: worried
      - type: dialog
        character: sora
        text: "ごめん……{花壇|かだん}コンクールで{優勝|ゆうしょう}させたくて、「たくさんあげた{方|ほう}がもっと{育|そだ}つ」って{思|おも}って、{化学肥料|かがくひりょう}を3つかみ（{約|やく}90g）まいちゃったんだ。{規定量|きていりょう}の3{倍|ばい}。"
      - type: dialog
        character: sora
        expression: worried
        text: "しかも{急|いそ}いでたから{水|みず}やりはじょうろ1{杯|はい}だけにした。{肥料|ひりょう}が{多|おお}くて{水|みず}が{少|すく}なかったから、{肥料|ひりょう}が{薄|うす}まらなくて「{肥料|ひりょう}やけ」が{起|お}きたんだね……。"
      - type: dialog
        character: sora
        text: "みんなのためにやったのに、みんなの{花壇|かだん}を{枯|か}らしちゃった。{本当|ほんとう}にごめんなさい。"
      - type: sprite
        id: sora
        action: hide

  # ===== みんなの秘密 =====
  - id: truth-others
    bg: schoolyard
    steps:
      - type: narration
        text: "みんなにも{隠|かく}していたことがあった。"
      - type: sprite
        id: haruka
        position: left
        expression: thinking
      - type: dialog
        character: haruka
        text: "{日曜日|にちようび}に{記録|きろく}をつけ{忘|わす}れちゃった。でも{水|みず}やりは{適量|てきりょう}だったし、{枯|か}れた{原因|げんいん}とは{関係|かんけい}なかったんだね。"
      - type: sprite
        id: haruka
        action: hide
      - type: sprite
        id: riku
        position: right
        expression: thinking
      - type: dialog
        character: riku
        text: "アブラムシを{見|み}つけたのに{報告|ほうこく}しなかった。でも{数匹|すうひき}のアブラムシで{花壇|かだん}{全体|ぜんたい}は{枯|か}れない。{原因|げんいん}は{別|べつ}だった。"
      - type: sprite
        id: riku
        action: hide
      - type: sprite
        id: midori
        position: left
        expression: happy
      - type: dialog
        character: midori
