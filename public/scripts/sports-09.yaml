scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: 年に1{回|かい}の{体力|たいりょく}テスト。5{種目|しゅもく}の{測定|そくてい}を{終|お}えた{翌日|よくじつ}、{廊下|ろうか}に{集計表|しゅうけいひょう}が{掲示|けいじ}された。
      - type: narration
        text: 「{記録|きろく}がかり」のハヤテが、{先生|せんせい}の{測定|そくてい}メモを{見|み}ながら{書|か}き{写|うつ}したものだ。
      - type: sprite
        character: minori
        expression: surprised
        position: right
      - type: dialog
        character: minori
        text: ねえ、ハヤテの{記録|きろく}を{見|み}て！ 50m{走|そう}が8.0{秒|びょう}、{反復横跳|はんぷくよことび}びが52{回|かい}……{全部|ぜんぶ}すごく{伸|の}びてる！
        expression: surprised
      - type: sprite
        character: minori
        action: hide
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: ハヤテの{記録|きろく}が{全|ぜん}5{種目|しゅもく}で{去年|きょねん}より+4〜10も{伸|の}びている——ほかの3{人|にん}は+1〜3なのに。
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{測定|そくてい}メモと{集計表|しゅうけいひょう}を{比較|ひかく}しました。ツバサ・カケル・ミノリの3{人|にん}は{完全|かんぜん}に{一致|いっち}。でもハヤテの{分|ぶん}だけ——{全|ぜん}5{種目|しゅもく}で{数字|すうじ}が{違|ちが}います。"
        expression: worried
      - type: dialog
        character: yamada
        text: "{集計表|しゅうけいひょう}を{書|か}いたのはハヤテだけ。{先生|せんせい}の{測定|そくてい}メモは{私|わたし}が{持|も}っていました。いったい{何|なに}が……？"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: hayate
            expression: worried
          - character: tsubasa
            expression: thinking
          - character: kakeru
            expression: surprised
          - character: minori
            expression: worried
      - type: narration
        text: 4{人|にん}は{顔|かお}を{見合|みあ}わせた。{集計表|しゅうけいひょう}の{数字|すうじ}を{書|か}き{換|か}えたのは{誰|だれ}なのか。そして——なぜ？
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 記録の矛盾
        subtitle: 体育探偵団 Vol.9

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 4人の成長量を比べよう
      - type: narration
        text: 4{人|にん}の{体力|たいりょく}テストの{成長量|せいちょうりょう}——{去年|きょねん}との{差|さ}——をまとめた{表|ひょう}を{確認|かくにん}した。
      - type: se
        sound: discover
      - type: narration
        text: "50m{走|そう}: ツバサ −0.3{秒|びょう}、カケル −0.5{秒|びょう}、ミノリ −0.3{秒|びょう}、ハヤテ —— <b>−1.5{秒|びょう}</b>"
      - type: narration
        text: "{反復横跳|はんぷくよことび}び: ツバサ +3{回|かい}、カケル +3{回|かい}、ミノリ +2{回|かい}、ハヤテ —— <b>+10{回|かい}</b>"
      - type: narration
        text: "{握力|あくりょく}: ツバサ +1kg、カケル +1kg、ミノリ +1kg、ハヤテ —— <b>+4kg</b>"
      - type: narration
        text: "ソフトボール{投|な}げ: ツバサ +2m、カケル +2m、ミノリ +1m、ハヤテ —— <b>+6m</b>"
      - type: narration
        text: "シャトルラン: ツバサ +3{回|かい}、カケル +3{回|かい}、ミノリ +2{回|かい}、ハヤテ —— <b>+10{回|かい}</b>"
      - type: sprite
        character: tsubasa
        expression: thinking
        position: left
      - type: dialog
        character: tsubasa
        text: ツバサ・カケル・ミノリは{全|すべ}ての{種目|しゅもく}で+1〜3{程度|ていど}。でもハヤテだけ+4〜10——3{人|にん}の{約|やく}3〜5{倍|ばい}だ。
        expression: thinking
      - type: sprite
        character: tsubasa
        action: hide
      - type: narration
        text: 3{人|にん}のデータを{並|なら}べると「1{年間|ねんかん}の{成長|せいちょう}は+1〜3」という{傾向|けいこう}が{見|み}えてくる。ハヤテだけが{大|おお}きくパターンから{外|はず}れている——なぜ？

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 平均的な成長量を確認しよう
      - type: narration
        text: "{先生|せんせい}が「{小学|しょうがく}5{年|ねん}→6{年|ねん}の{平均的|へいきんてき}な{成長量|せいちょうりょう}」を{教|おし}えてくれた。"
      - type: se
        sound: discover
      - type: narration
        text: "50m{走|そう}: {約|やく}0.3〜0.5{秒|びょう}{速|はや}くなる / {反復横跳|はんぷくよことび}び: {約|やく}2〜4{回|かい}{増|ふ}える"
      - type: narration
        text: "{握力|あくりょく}: {約|やく}1〜2kg{増|ふ}える / ソフトボール{投|な}げ: {約|やく}1〜3m{伸|の}びる / シャトルラン: {約|やく}2〜5{回|かい}{増|ふ}える"
      - type: narration
        text: ツバサ・カケル・ミノリの{成長|せいちょう}は{全|すべ}て{平均的|へいきんてき}な{範囲|はんい}の{中|なか}。しかしハヤテの{成長|せいちょう}は{平均|へいきん}の{約|やく}3〜5{倍|ばい}——{ふつう}の{成長|せいちょう}ではあり{得|え}ない。
      - type: sprite
        character: kakeru
        expression: thinking
        position: right
      - type: dialog
        character: kakeru
        text: もし{本当|ほんとう}にこれだけ{伸|の}びたなら……{毎日|まいにち}の{自主練習|じしゅれんしゅう}や、{体|からだ}の{使|つか}い{方|かた}——フォームが{大|おお}きく{変|か}わっているはず。
        expression: thinking
      - type: sprite
        character: kakeru
        action: hide
      - type: narration
        text: フォームが{変|か}わっていないのに{全|ぜん}5{種目|しゅもく}が{同|おな}じ{割合|わりあい}で{伸|の}びるのも{不自然|ふしぜん}だ。「{本当|ほんとう}に{伸|の}びた」のか、「{記録|きろく}が{間違|まちが}っている」のか——どちらだろう？

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: テスト当日の行動を調べよう
      - type: narration
        text: "{体力|たいりょく}テスト{当日|とうじつ}（{火曜日|かようび}）の4{人|にん}の{行動|こうどう}と、{集計表|しゅうけいひょう}の{記入|きにゅう}プロセスを{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "ハヤテ: {記録|きろく}がかり。{先生|せんせい}の{横|よこ}で{測定|そくてい}メモの{補助|ほじょ}をした。11:15に{先生|せんせい}から「{集計表|しゅうけいひょう}にまとめて」と{頼|たの}まれ、11:20に{記入|きにゅう}{開始|かいし}。"
      - type: narration
        text: "ツバサ: テストに{参加|さんか}。ハヤテの{種目|しゅもく}も{観察|かんさつ}。テスト{後|ご}はストレッチ。ハヤテが{集計表|しゅうけいひょう}を{書|か}いているのを{見|み}ていた。"
      - type: narration
        text: "カケル・ミノリ: テストに{参加|さんか}。テスト{後|ご}は{片付|かたづ}けを{手伝|てつだ}った。"
      - type: narration
        text: "{重要|じゅうよう}な{記入|きにゅう}プロセス: ①{先生|せんせい}がハヤテに{測定|そくてい}メモ（{原本|げんぽん}）を{渡|わた}す → ②ハヤテがメモを{見|み}ながら{集計表|しゅうけいひょう}に{書|か}き{写|うつ}す → ③ハヤテが{集計表|しゅうけいひょう}を{先生|せんせい}に{提出|ていしゅつ}（11:30）"
      - type: sprite
        character: minori
        expression: thinking
        position: right
      - type: dialog
        character: minori
        text: "{集計表|しゅうけいひょう}を{書|か}いたのはハヤテだけ。{先生|せんせい}は{測定|そくてい}メモを{持|も}っている——もし{数字|すうじ}が{違|ちが}うなら、{書|か}き{写|うつ}すときに{変|か}えた？"
        expression: thinking
      - type: sprite
        character: minori
        action: hide

  # ==================== 調査：証拠カード4（条件付き）====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 条件付き情報——3つの証言
      - type: narration
        text: "GMの{質問|しつもん}に{答|こた}えるかたちで、3{人|にん}の「{条件付|じょうけんつ}き{情報|じょうほう}」が{明|あ}かされた。"
      - type: se
        sound: click
      - type: sprite
        character: tsubasa
        expression: thinking
        position: left
      - type: dialog
        character: tsubasa
        text: ハヤテの50m{走|そう}のスタートフォーム——{去年|きょねん}と{全|まった}く{同|おな}じだった。{腕振|うでふ}りも{前傾|ぜんけい}{角度|かくど}も{変|か}わっていない。ソフトボール{投|な}げのフォームも{同|おな}じ。
        expression: thinking
      - type: dialog
        character: tsubasa
        text: フォームが{変|か}わっていないのに、{記録|きろく}だけ{大幅|おおはば}に{伸|の}びるのは——{体育|たいいく}的|てきに{考|かんが}えて、{変|おか}しい。
        expression: determined
      - type: sprite
        character: tsubasa
        action: hide
      - type: sprite
        character: kakeru
        expression: worried
        position: right
      - type: dialog
        character: kakeru
        text: ハヤテと{放課後|ほうかご}に{公園|こうえん}で{遊|あそ}ぶことが{多|おお}いけど——ハヤテが{自主練習|じしゅれんしゅう}しているのを{見|み}たことがない。
        expression: worried
      - type: dialog
        character: kakeru
        text: "{毎日|まいにち}{一緒|いっしょ}にいるから、もし{練習|れんしゅう}していたら{絶対|ぜったい}に{知|し}っているはず……「{毎日|まいにち}{自主練|じしゅれん}した」は……。"
        expression: thinking
      - type: sprite
        character: kakeru
        action: hide
      - type: sprite
        character: minori
        expression: worried
        position: left
      - type: dialog
        character: minori
        text: ハヤテが{最近|さいきん}、「{クラス|くらす}の{平均|へいきん}が{去年|きょねん}より{下|さ}がりそうで{心配|しんぱい}」って{言|い}っていた。
        expression: worried
      - type: dialog
        character: minori
        text: 「{体力向上委員|たいりょくこうじょういいん}なのに{平均|へいきん}が{下|さ}がったら、{ぼく}のせいだ」って——すごく{プレッシャー|ぷれっしゃー}を{感|かん}じていたみたい。
        expression: thinking
      - type: sprite
        character: minori
        action: hide
      - type: narration
        text: フォームは{変|か}わっていない。{自主練|じしゅれん}もしていない。でもハヤテは「{クラスのため|くらすのため}」に{強|つよ}い{プレッシャー|ぷれっしゃー}を{感|かん}じていた——これらの{情報|じょうほう}をつなぎ{合|あ}わせると？

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 先生の測定メモ（原本）
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "{測定|そくてい}メモ（{原本|げんぽん}）と{集計表|しゅうけいひょう}を{種目|しゅもく}ごとに{比較|ひかく}しました。ツバサ・カケル・ミノリの3{人|にん}は{完全|かんぜん}に{一致|いっち}。でもハヤテの{分|ぶん}だけ——"
        expression: determined
      - type: dialog
        character: yamada
        text: "50m{走|そう}: {集計表|しゅうけいひょう}8.0{秒|びょう} → メモ9.2{秒|びょう}（1.2{秒|びょう}サバ{読|よ}み）。{反復横跳|はんぷくよことび}び: {集計表|しゅうけいひょう}52{回|かい} → メモ44{回|かい}（+8{回|かい}{水増|みずま}し）。"
        expression: worried
      - type: dialog
        character: yamada
        text: "{握力|あくりょく}: {集計表|しゅうけいひょう}22kg → メモ19kg。ソフトボール{投|な}げ: {集計表|しゅうけいひょう}31m → メモ26m。シャトルラン: {集計表|しゅうけいひょう}55{回|かい} → メモ48{回|かい}——{全|ぜん}5{種目|しゅもく}が{違|ちが}います。"
        expression: determined
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: ハヤテの{実際|じっさい}の{成長量|せいちょうりょう}は——50m{走|そう}−0.3{秒|びょう}、{反復横跳|はんぷくよことび}び+2{回|かい}、{握力|あくりょく}+1kg、ソフトボール+1m、シャトルラン+3{回|かい}。
      - type: narration
        text: ほかの3{人|にん}と{全|まった}く{同|おな}じ——{ふつう}の{成長|せいちょう}範囲|はんいだった。{集計表|しゅうけいひょう}の「+4〜10」は{すべ}て{書|か}き{換|か}えられた{数字|すうじ}だったのだ。

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: sprite
        character: tsubasa
        expression: determined
        position: left
      - type: dialog
        character: tsubasa
        text: "{証拠|しょうこ}カード①②を{見|み}て——3{人|にん}のデータから「1{年間|ねんかん}の{ふつう}の{成長|せいちょう}は+1〜3」という{法則|ほうそく}が{見|み}えてくる。ハヤテだけ+4〜10でその{法則|ほうそく}から{外|はず}れている。{帰納法|きのうほう}で「{記録|きろく}が{不自然|ふしぜん}」と{判断|はんだん}できる。"
        expression: determined
      - type: sprite
        character: tsubasa
        action: hide
      - type: sprite
        character: kakeru
        expression: thinking
        position: right
      - type: dialog
        character: kakeru
        text: フォームが{変|か}わっていない。{自主練|じしゅれん}もしていない。でも{全|ぜん}5{種目|しゅもく}で「+4〜10」はあり{得|え}ない——{記録|きろく}の{方|ほう}が{間違|まちが}っているんだ。
        expression: thinking
      - type: sprite
        character: kakeru
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう——{集計表|しゅうけいひょう}を{書|か}いたのはハヤテだけ。メモとの{差異|さい}はハヤテの{分|ぶん}だけ{全|ぜん}5{種目|しゅもく}で{発生|はっせい}。ハヤテは{体力向上委員|たいりょくこうじょういいん}で{クラスの平均|くらすのへいきん}を{上|あ}げる{プレッシャー|ぷれっしゃー}を{感|かん}じていた——"
      - type: choice
        id: q1
        question: 集計表の数字を書き換えたのは誰？
        options:
          - text: ハヤテ（集計表を書いたのはハヤテだけ。全5種目でメモと差異がある）
            value: hayate
            correct: true
            feedback: "{正解|せいかい}！ {集計表|しゅうけいひょう}を{書|か}いたのはハヤテだけ。{先生|せんせい}の{測定|そくてい}メモ{原本|げんぽん}との{差異|さい}もハヤテの{分|ぶん}だけ{全|ぜん}5{種目|しゅもく}で{発生|はっせい}している。{帰納法|きのうほう}で「{記録|きろく}が{不自然|ふしぜん}」と{判断|はんだん}でき、{書|か}き{換|か}えの{機会|きかい}があったのはハヤテだけだ。"
          - text: ツバサ（フォームを観察していた人）
            value: tsubasa
            feedback: "ツバサは{テスト|てすと}{後|ご}にストレッチをしていて、ハヤテが{集計表|しゅうけいひょう}を{書|か}くのを{遠|とお}くから{見|み}ていた。{集計表|しゅうけいひょう}を{記入|きにゅう}する{機会|きかい}はなかったよ。ツバサの{数字|すうじ}はメモと{一致|いっち}している。"
          - text: カケル（ハヤテの友達）
            value: kakeru
            feedback: "カケルは{テスト|てすと}{後|ご}に{片付|かたづ}けを{手伝|てつだ}っていた。{集計表|しゅうけいひょう}を{書|か}いたのはハヤテだけで、カケルには{記入|きにゅう}する{機会|きかい}がない。カケルの{数字|すうじ}もメモと{一致|いっち}している。"
