meta:
  id: moral-04
  title: 届かなかったプレゼントと4つのやさしさ
  series: 答えのない法廷
  volume: 4
  estimatedMinutes: 20

characters:
  hinata:
    name: ヒナタ
    color: "#E91E63"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  riku:
    name: リク
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  mio:
    name: ミオ
    color: "#7B68EE"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  kaito:
    name: カイト
    color: "#2E8B57"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      worried: teacher-f-worried.webp
      kind: teacher-f-happy.webp

scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: moral-04/opening
    steps:
      - type: narration
        text: "{放課後|ほうかご}クラブ「スマイルクラブ」。{絵|え}を{描|か}いたり、{工作|こうさく}をしたり——メンバーは5{人|にん}。ヒナタ、リク、ミオ、カイト、そしてHaruka。"

      - type: narration
        text: "でも、Harukaが{来月|らいげつ}{転校|てんこう}することになった。みんなはHarukaのためにお{別|わか}れプレゼントをこっそり{準備|じゅんび}していた。"

      - type: narration
        text: "{写真立|しゃしんた}て、{似顔絵|にがおえ}、{思|おも}い{出|で}アルバム——それぞれが{心|こころ}をこめて{作|つく}ったものだ。プレゼントはクラブ{室|しつ}の{棚|たな}に{入|い}れて、{明日|あした}のお{別|わか}れ{会|かい}まで{保管|ほかん}していた。"

      - type: bgm
        action: stop

      - type: se
        sound: common/tension

      - type: narration
        speed: slow
        text: "ところが{今朝|けさ}、カイトが{一番|いちばん}のりでクラブ{室|しつ}に{来|く}ると——{棚|たな}の{中|なか}が{空|から}っぽだった。プレゼントが4つとも{消|き}えている。"

      - type: bgm
        track: moral-04/tension

      - type: narration
        text: "{明日|あした}はもうお{別|わか}れ{会|かい}なのに。{誰|だれ}かが{持|も}ち{出|だ}したのか？ なぜ？"

      - type: sprite
        character: sensei
        expression: kind
        position: center

      - type: dialog
        character: sensei
        text: "まず、きみたちで{話|はな}し{合|あ}ってごらん。{誰|だれ}が{何|なに}を{知|し}っているか、{整理|せいり}してみよう。きっと{理由|りゆう}があるはずだよ。"

      - type: sprite
        character: sensei
        action: hide

      - type: sprite_group
        characters:
          - { id: hinata, expression: worried }
          - { id: riku, expression: thinking }
          - { id: mio, expression: worried }
          - { id: kaito, expression: surprised }

      - type: narration
        text: "ヒナタ、リク、ミオ、カイト——4{人|にん}がクラブ{室|しつ}に{集|あつ}まった。"

      - type: sprite
        character: hinata
        action: hide
      - type: sprite
        character: riku
        action: hide
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: kaito
        action: hide

      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        text: 届かなかったプレゼントと4つのやさしさ
        subtitle: 答えのない法廷 Vol.4

  # ========================================
  # 証拠カード1: クラブ室の見取り図と棚のしくみ
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: moral-04/investigation
    steps:
      - type: effect
        name: fade-in
        duration: 500

      - type: title_card
        text: ステップ1：調査
        subtitle: 消えたプレゼントを追おう

      - type: narration
        text: "スマイルクラブのクラブ{室|しつ}。{部屋|へや}の{奥|おく}に{大|おお}きな{木製|もくせい}の{棚|たな}がある。プレゼントはここに{保管|ほかん}されていた。"

      - type: narration
        text: "{棚|たな}には{鍵|かぎ}がついている。でもよく{見|み}ると、{鍵|かぎ}の{爪|つめ}（{金具|かなぐ}のひっかかる{部分|ぶぶん}）が{曲|ま}がっている。"

      - type: se
        sound: common/discover

      - type: narration
        text: "ドアを{閉|し}めると{見|み}た{目|め}は「{鍵|かぎ}がかかっている」ように{見|み}える。でも{実際|じっさい}は——{押|お}せば{開|あ}く。"

      - type: narration
        speed: slow
        text: "{掃除|そうじ}{当番|とうばん}なら{棚|たな}に{触|さわ}る{機会|きかい}が{多|おお}い。{鍵|かぎ}が{壊|こわ}れていることに{気|き}づきやすい。"

  # ========================================
  # 証拠カード2: 掃除当番の記録とタイムライン
  # ========================================
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 掃除当番の記録とタイムライン

      - type: narration
        text: "{昨日|きのう}の{掃除|そうじ}{当番|とうばん}は——ヒナタ。17:15〜17:30にクラブ{室|しつ}で{掃除|そうじ}をした。{最後|さいご}にクラブ{室|しつ}を{出|で}たのもヒナタ。"

      - type: narration
        text: "タイムライン——16:30、ミオが{棚|たな}を{確認|かくにん}。{棚|たな}は{開|あ}いていた。{似顔絵|にがおえ}の{位置|いち}を{直|なお}した。"

      - type: narration
        text: "16:40、リクが{掃除|そうじ}ロッカーの{整理|せいり}で{棚|たな}の{横|よこ}を{通|とお}った。17:00、リクが{写真立|しゃしんた}てを{確認|かくにん}しに{来|き}た。{棚|たな}は{閉|し}まっているように{見|み}えた。"

      - type: narration
        text: "17:15〜17:30、ヒナタが{掃除|そうじ}。クラブ{室|しつ}に1{人|り}。"

      - type: effect
        name: flash
        duration: 300

      - type: narration
        speed: slow
        text: "{今朝|けさ}8:00、カイトが{一番|いちばん}のりで{来|き}て{発見|はっけん}——{棚|たな}が{空|から}っぽ。プレゼントが{消|き}えたのは17:00〜8:00の{間|あいだ}。{最後|さいご}にクラブ{室|しつ}にいたのはヒナタ。"

  # ========================================
  # 証拠カード3: Harukaの電話の断片
  # ========================================
  - id: evidence-3
    bgm: moral-04/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: Harukaの電話

      - type: narration
        text: "{昨日|きのう}の16:45ごろ、ミオが{廊下|ろうか}でHarukaが{電話|でんわ}しているのを{見|み}かけた。"

      - type: sprite
        character: mio
        expression: thinking
        position: left

      - type: dialog
        character: mio
        text: "Harukaの{声|こえ}が{聞|き}こえたの。「……ありがとう、でも{本当|ほんとう}にいらないから……{新|あたら}しいところでもらっても……」って。"

      - type: dialog
        character: mio
        text: "「{新|あたら}しいところ」って{何|なん}のことだろう？ よく{分|わ}からなかった……。"

      - type: sprite
        character: mio
        action: hide

      - type: narration
        text: "「{新|あたら}しいところ」＝{転校先|てんこうさき}のこと？ つまり、Harukaが「いらない」と{言|い}ったのは{転校先|てんこうさき}からの{何|なに}かであって、みんなのお{別|わか}れプレゼントではない{可能性|かのうせい}がある。"

      - type: narration
        speed: slow
        text: "もし{誰|だれ}かがこの{電話|でんわ}の{前半|ぜんはん}だけを{聞|き}いていたら——「プレゼント？ いらないよ」だけが{聞|き}こえて、{文脈|ぶんみゃく}を{間違|まちが}えるかもしれない。"

  # ========================================
  # 証拠カード4: 転校先からの案内状
  # ========================================
  - id: evidence-4
    bgm: moral-04/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: 転校先の学校からの案内状

      - type: narration
        text: "Harukaがクラブ{室|しつ}の{近|ちか}くで{落|お}とした{紙|かみ}を、カイトが{拾|ひろ}った。"

      - type: sprite
        character: kaito
        expression: surprised
        position: right

      - type: dialog
        character: kaito
        text: "これ、Harukaが{落|お}としてた。{転校先|てんこうさき}の「みなみ{小学校|しょうがっこう}」からの{手紙|てがみ}だよ。"

      - type: sprite
        character: kaito
        action: hide

      - type: narration
        text: "「{転入|てんにゅう}{予定|よてい}のHarukaさんへ。{入学|にゅうがく}おめでとうプレゼントとして、{校章|こうしょう}入りキーホルダー、オリジナルノート、クラスメイトからのメッセージカードをご{用意|ようい}しました」"

      - type: narration
        text: "「お{返|かえ}しは{不要|ふよう}です。お{気軽|きがる}にお{受|う}け{取|と}りください」"

      - type: se
        sound: common/discover

      - type: effect
        name: flash
        duration: 400

      - type: narration
        speed: slow
        text: "Harukaの{電話|でんわ}での「いらないよ」は、この{案内状|あんないじょう}のプレゼントに{対|たい}するものだった。みんなのお{別|わか}れプレゼントのことではなかった！"

  # ========================================
  # 投票（犯人投票）
  # ========================================
  - id: questions
    bg: classroom
    bgm: moral-04/tension
    steps:
      - type: sprite
        character: sensei
        expression: worried
        position: center

      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}を{整理|せいり}してみよう。{棚|たな}の{鍵|かぎ}のしくみ、タイムライン、Harukaの{電話|でんわ}——{誰|だれ}がプレゼントを{持|も}ち{出|だ}した？"

      - type: sprite
        character: sensei
        action: hide

      - type: choice
        id: q1
        question: プレゼントを持ち出したのは誰？
        options:
          - text: "ヒナタ（{掃除|そうじ}{当番|とうばん}で{最後|さいご}にクラブ{室|しつ}にいた）"
            value: hinata
            feedback: "{鍵|かぎ}が{壊|こわ}れていることを{知|し}っていた＋{最後|さいご}に1{人|り}でクラブ{室|しつ}にいた＋Harukaの{電話|でんわ}の{前半|ぜんはん}を{聞|き}いた{可能性|かのうせい}。{動機|どうき}と{機会|きかい}が{揃|そろ}っている！"
          - text: "リク（17:00に{棚|たな}を{確認|かくにん}した）"
            value: riku
            feedback: "リクは17:00に{棚|たな}を{確認|かくにん}したけど、{鍵|かぎ}を{実際|じっさい}に{触|さわ}っていない。{見|み}た{目|め}で{判断|はんだん}しただけ。その{後|あと}{帰|かえ}っているよ。"
          - text: "ミオ（16:30に{棚|たな}を{開|あ}けた）"
            value: mio
            feedback: "ミオは{似顔絵|にがおえ}の{位置|いち}を{直|なお}しただけで、プレゼントは{全部|ぜんぶ}あった。その{後|あと}{棚|たな}を{閉|し}めずに{帰|かえ}っている。"
          - text: "カイト（{今朝|けさ}{最初|さいしょ}に{発見|はっけん}した）"
            value: kaito
            feedback: "カイトは{今朝|けさ}8:00に{来|き}たとき{空|から}っぽを{発見|はっけん}して、すぐに{先生|せんせい}に{報告|ほうこく}した。{昨日|きのう}のクラブ{室|しつ}にはいなかったよ。"

  # ========================================
  # 証拠カード5: Harukaの手紙（視点カード）
  # ========================================
  - id: evidence-5
    bg: classroom
    bgm: moral-04/emotional
    steps:
      - type: effect
        name: fade-out
        duration: 500

      - type: effect
        name: fade-in
        duration: 500

      - type: sprite
        character: sensei
        expression: kind
        position: center

      - type: dialog
        character: sensei
        text: "ここで、Harukaから{預|あず}かっていた{手紙|てがみ}を{読|よ}みます。"

      - type: sprite
        character: sensei
        action: hide

      - type: narration
        speed: slow
        text: "「みんなへ。{転校|てんこう}するのは{正直|しょうじき}さびしい。でも、スマイルクラブで{過|す}ごした{時間|じかん}は{宝物|たからもの}だよ。」"

      - type: narration
        text: "「みんなが{何|なに}かしてくれてるって{聞|き}いたとき、うれしくて{泣|な}いちゃった。」"

      - type: narration
        text: "「リクが{写真立|しゃしんた}て{作|つく}ってるって{聞|き}いた。あの{不器用|ぶきよう}なリクが！ ミオの{絵|え}、どんな{絵|え}だろう。{楽|たの}しみ。カイトのアルバム、{絶対|ぜったい}{面白|おもしろ}いんだろうな。ヒナタは{何|なに}を{作|つく}ってるんだろう？」"

      - type: narration
        speed: slow
        text: "「{本当|ほんとう}のプレゼントは、みんなと{過|す}ごした{時間|じかん}だと{思|おも}う。ありがとう。——Haruka」"

      - type: wait
        duration: 2000

      - type: narration
        speed: slow
        text: "Harukaはプレゼントを{嬉|うれし}いと{思|おも}っていた。{嬉|うれし}くて{泣|な}いていた——{感動|かんどう}の{涙|なみだ}だった。「いらないよ」はお{別|わか}れプレゼントのことではなかったのだ。"

  # ========================================
  # 真実 — ヒナタ
  # ========================================
  - id: truth-hinata
    bg: classroom
    bgm: moral-04/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        text: 真実

      - type: effect
        name: fade-in
        duration: 500

      - type: sprite
        character: hinata
        expression: worried
        position: left

      - type: dialog
        character: hinata
        text: "……わたしが{持|も}ち{出|だ}しました。プレゼントは、わたしのロッカーにあります。"

      - type: dialog
        character: hinata
        text: "{昨日|きのう}の{夕方|ゆうがた}、{廊下|ろうか}でHarukaが{電話|でんわ}してるのが{聞|き}こえて……「プレゼント？ いらないよ{本当|ほんとう}に」って。"

      - type: dialog
        character: hinata
        text: "Harukaがプレゼントを{嫌|いや}がってると{思|おも}った。{嫌|いや}な{気持|きも}ちにさせるくらいなら、ない{方|ほう}がいいって……。{掃除|そうじ}の{後|あと}、{誰|だれ}もいなくなったクラブ{室|しつ}で{全部|ぜんぶ}{持|も}ち{出|だ}した。"

      - type: dialog
        character: hinata
        expression: determined
        text: "Harukaを{守|まも}りたかった。でも……Harukaは{嬉|うれし}くて{泣|な}いてたんだ。わたしの{勘違|かんちが}いだった。{確|たし}かめもしないで……ごめんなさい。"

      - type: sprite
        character: hinata
        action: hide

      - type: narration
        text: "ヒナタは{電話|でんわ}の{前半|ぜんはん}だけを{聞|き}いて、{文脈|ぶんみゃく}を{間違|まちが}えた。「{守|まも}りたい」という{気持|きも}ちは{本物|ほんもの}。でも{確|たし}かめずに{行動|こうどう}してしまった。"

  # ========================================
  # 真実 — リク
  # ========================================
  - id: truth-riku
    steps:
      - type: sprite
        character: riku
        expression: worried
        position: right

      - type: dialog
        character: riku
        text: "……おれ、Harukaへの{手紙|てがみ}を3{回|かい}{書|か}き{直|なお}した。1{回目|かいめ}は{短|みじか}すぎて。2{回目|かいめ}はダサくて。"

      - type: dialog
        character: riku
        text: "{結局|けっきょく}「ありがとう。リクより」しか{書|か}けなかった。{本当|ほんとう}は「いなくなるのが{寂|さび}しい」「{喧嘩|けんか}できる{相手|あいて}がいなくなる」って……{全部|ぜんぶ}{言葉|ことば}にできなかった。"

      - type: dialog
        character: riku
        expression: determined
        text: "だから{写真立|しゃしんた}てだけでもちゃんと{渡|わた}したい。{不器用|ぶきよう}でも、{気持|きも}ちは{本物|ほんもの}だから。"

      - type: sprite
        character: riku
        action: hide

      - type: narration
        text: "リクのやさしさ——{言葉|ことば}にできないけど、{手|て}を{動|うご}かして{伝|つた}えようとした。{不器用|ぶきよう}な{写真立|しゃしんた}てに、リクの{気持|きも}ちが{全部|ぜんぶ}{詰|つ}まっている。"

  # ========================================
  # 真実 — ミオ
  # ========================================
  - id: truth-mio
    steps:
      - type: sprite
        character: mio
        expression: worried
        position: left

      - type: dialog
        character: mio
        text: "わたしの{似顔絵|にがおえ}、Harukaにあんまり{似|に}てないの。{何回|なんかい}も{描|か}き{直|なお}したけど、{目|め}がうまくいかなくて……。"

      - type: dialog
        character: mio
        text: "「{下手|へた}な{絵|え}をもらって、Harukaは{嬉|うれし}いのかな」って。{一瞬|いっしゅん}、{棚|たな}から{取|と}り{出|だ}して{捨|す}てようかと{思|おも}った。でもやめた。"

      - type: dialog
        character: mio
        expression: determined
        text: "Harukaの{手紙|てがみ}に「ミオの{絵|え}、{楽|たの}しみ」って{書|か}いてあった。……わたしの{絵|え}を{待|ま}っててくれたんだ。"

      - type: sprite
        character: mio
        action: hide

      - type: narration
        text: "ミオのやさしさ——{自信|じしん}がなくても、{心|こころ}をこめて{描|か}いた{絵|え}。「{上手|じょうず}かどうか」じゃなくて「{気持|きも}ちがこもっているか」が{大事|だいじ}。"

  # ========================================
  # 真実 — カイト
  # ========================================
  - id: truth-kaito
    steps:
      - type: sprite
        character: kaito
        expression: thinking
        position: right

      - type: dialog
        character: kaito
        text: "{昨日|きのう}の{夕方|ゆうがた}、{帰|かえ}り{道|みち}で{校門|こうもん}の{前|まえ}にいるHarukaを{見|み}かけた。{泣|な}いてたんだ。"

      - type: dialog
        character: kaito
        text: "「{引|ひ}っ{越|こ}したくないんだ。{転校|てんこう}が{嫌|いや}なんだ」って{思|おも}った。{声|こえ}をかけようか{迷|まよ}ったけど、{泣|な}いてるところを{見|み}られたくないだろうって{思|おも}って、そっと{通|とお}り{過|す}ぎた。"

      - type: dialog
        character: kaito
        expression: determined
        text: "でもHarukaの{手紙|てがみ}を{読|よ}んだら……あれは「{嬉|うれし}くて{泣|な}いてた」んだ。{悲|かな}しいんじゃなくて、{感動|かんどう}の{涙|なみだ}だった。おれ、{決|き}めつけてたんだな……。"

      - type: sprite
        character: kaito
        action: hide

      - type: wait
        duration: 1500

      - type: bgm
        track: moral-04/resolution

      - type: narration
