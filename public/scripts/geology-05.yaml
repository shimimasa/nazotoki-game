scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "地学ミステリー Vol.5"
        subtitle: "鉱物の正体"
      - type: sprite_group
        characters:
          - id: chisou
            expression: normal
          - id: ishikawa
            expression: normal
          - id: magumu
            expression: normal
          - id: sunako
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: chisou
        expression: normal
        position: left
      - type: dialog
        character: chisou
        text: "最初は「本物のダイヤモンドかも」と聞いて、とてもワクワクした"
      - type: dialog
        character: chisou
        text: "最初は「本物のダイヤモンドかも」と聞いて、とてもワクワクした"
        expression: thinking
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        expression: normal
        position: right
      - type: dialog
        character: ishikawa
        text: "自分が石を机に入れていたことは認める"
      - type: dialog
        character: ishikawa
        text: "自分が石を机に入れていたことは認める"
        expression: thinking
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        expression: normal
        position: left
      - type: dialog
        character: magumu
        text: "キラキラしているだけでは、ダイヤモンドとは言えないと思っている"
      - type: dialog
        character: magumu
        text: "キラキラしているだけでは、ダイヤモンドとは言えないと思っている"
        expression: thinking
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        expression: normal
        position: right
      - type: dialog
        character: sunako
        text: "イシカワの机から見つかった石は、透明だけど少し白くにごって見える"
      - type: dialog
        character: sunako
        text: "イシカワの机から見つかった石は、透明だけど少し白くにごって見える"
        expression: thinking
      - type: sprite
        character: sunako
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: chisou
            expression: thinking
          - id: ishikawa
            expression: thinking
          - id: magumu
            expression: thinking
          - id: sunako
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "チソウ"
            value: chisou
            correct: false
            feedback: "チソウは手がかりを持っているが、決め手は足りない。"
          - text: "イシカワ"
            value: ishikawa
            correct: false
            feedback: "イシカワは手がかりを持っているが、決め手は足りない。"
          - text: "マグム"
            value: magumu
            correct: false
            feedback: "マグムは手がかりを持っているが、決め手は足りない。"
          - text: "スナコ"
            value: sunako
            correct: true
            feedback: "スナコの行動が、証拠といちばん一致している。"
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "スナコ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: sunako
        expression: worried
        position: center
      - type: dialog
        character: sunako
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: sunako
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: chisou
            expression: happy
          - id: ishikawa
            expression: happy
          - id: magumu
            expression: happy
          - id: sunako
            expression: happy
      - type: narration
        text: "地学ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
