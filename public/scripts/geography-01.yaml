        text: "{東|ひがし}エリア：{公園|こうえん}{前|まえ}の{花屋|はなや}さん → マップ{表示|ひょうじ}{正|ただ}しい"
      - type: narration
        text: "{南|みなみ}エリア：{商店街|しょうてんがい}の{本屋|ほんや}さん → マップ{表示|ひょうじ}{正|ただ}しい"
      - type: narration
        text: "{西|にし}エリア：{住宅街|じゅうたくがい}の{田中|たなか}さんの{家|いえ} → マップ{表示|ひょうじ}{正|ただ}しい"
      - type: narration
        text: "{子|こ}ども110{番|ばん}の{家|いえ}は{全|すべ}て{正|ただ}しいまま。{犯人|はんにん}が{変|か}えたのは「{危|あぶ}ない{場所|ばしょ}」のマークだけ。"
      - type: narration
        speed: slow
        text: "「{危|あぶ}ない{場所|ばしょ}」だけ{消|け}したかった{理由|りゆう}は？ その{場所|ばしょ}が「{危|あぶ}ない」と{知|し}られると{困|こま}る{人|ひと}がいる？"

  # ===== 証拠カード4: 放課後の行動 =====
  - id: evidence-4
    bgm: geography-01/tension
    steps:
      - type: title_card
        text: "{証拠|しょうこ}④"
        subtitle: "{木曜|もくよう}{放課後|ほうかご}の{行動|こうどう}"
      - type: narration
        text: "マップが{書|か}きかえられたのは{木曜|もくよう}の{放課後|ほうかご}。4{人|にん}はどこにいた？"
      - type: narration
        text: "リク：15:00～16:00 {校庭|こうてい}でサッカー（{体育|たいいく}の{先生|せんせい}が{証人|しょうにん}）→ {教室|きょうしつ}に{戻|もど}れない → {除外|じょがい}！"
      - type: narration
        text: "アオイ：15:00～15:15 {保健室|ほけんしつ}（{保健|ほけん}の{先生|せんせい}が{証人|しょうにん}）、15:20 {下校|げこう} → {除外|じょがい}！"
      - type: narration
        text: "ソラ：15:00～15:15 {教室|きょうしつ}（{日直|にっちょく}）。15:15に{教室|きょうしつ}を{出|で}た。15:30から{図書室|としょしつ}（{図書|としょ}の{先生|せんせい}が{証人|しょうにん}）"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "ソラに15:15～15:30の15{分間|ふんかん}、{証人|しょうにん}がいない{空白|くうはく}がある"
      - type: narration
        speed: slow
        text: "ヒナタ：15:00に「すぐ{帰|かえ}った」と{言|い}っているが、{誰|だれ}も{確認|かくにん}していない。{証人|しょうにん}なし！"
      - type: narration
        text: "{容疑者|ようぎしゃ}は2{人|り}——ソラとヒナタ。どちらかを{決定的|けっていてき}{証拠|しょうこ}で{絞|しぼ}り{込|こ}もう。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: geography-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{消|け}された3か{所|しょ}は{全|すべ}て{西|にし}エリア。{犯人|はんにん}は{西|にし}に{関係|かんけい}がある{人|ひと}。{証拠|しょうこ}を{整理|せいり}して{推理|すいり}しよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: "{安全|あんぜん}マップを{書|か}きかえたのは{誰|だれ}？"
        options:
          - text: "ソラ（マップのリーダー・{北|きた}ルート）"
            value: sora
            feedback: "ソラの{通学路|つうがくろ}は{北|きた}ルート。{消|け}された3か{所|しょ}は{全|すべ}て{西|にし}エリア——ソラが{西|にし}エリアを{変|か}える{動機|どうき}がないよ。"
          - text: "ヒナタ（{東|ひがし}ルートと{主張|しゅちょう}・{証人|しょうにん}なし）"
            value: hinata
            feedback: "{鋭|するど}い！ ヒナタは「{東|ひがし}ルート」と{言|い}っているが{証人|しょうにん}がいない。{西|にし}エリアだけ{消|け}された{理由|りゆう}とヒナタの{行動|こうどう}を{結|むす}びつけてみよう。"
          - text: "リク（{東|ひがし}ルート・{校庭|こうてい}にいた）"
            value: riku
            feedback: "リクは15:00～16:00まで{校庭|こうてい}でサッカー（{先生|せんせい}が{証人|しょうにん}）。{教室|きょうしつ}に{戻|もど}ってマップを{触|さわ}る{時間|じかん}がないよ。"
          - text: "アオイ（{南|みなみ}ルート・{保健室|ほけんしつ}にいた）"
            value: aoi
            feedback: "アオイは15:00～15:15に{保健室|ほけんしつ}（{先生|せんせい}が{証人|しょうにん}）。その{後|あと}すぐ{下校|げこう}しているよ。"
      - type: choice
        id: q2
        question: "なぜ{西|にし}エリアの「{危|あぶ}ない{場所|ばしょ}」だけ{消|け}した？"
        options:
          - text: "{西|にし}エリアを{毎日|まいにち}{通|とお}っていることを{隠|かく}したかったから"
            value: hide-route
            feedback: "{正解|せいかい}！ ヒナタは{本当|ほんとう}は{西|にし}ルートの{近道|ちかみち}を{通学|つうがく}に{使|つか}っていた。「{危|あぶ}ない{場所|ばしょ}」がマップに{載|の}ると、{自分|じぶん}の{通学路|つうがくろ}がバレてしまう。"
          - text: "{西|にし}エリアが{本当|ほんとう}は{安全|あんぜん}だと{思|おも}ったから"
            value: safe
            feedback: "{暗|くら}い{路地|ろじ}、{見通|みとお}しの{悪|わる}い{曲|ま}がり{角|かど}、{交通量|こうつうりょう}の{多|おお}い{交差点|こうさてん}——{町|まち}たんけんで{確認|かくにん}した「{危|あぶ}ない{場所|ばしょ}」だよ。{安全|あんぜん}ではない。"
          - text: "マップの{見|み}た{目|め}をきれいにしたかったから"
            value: clean
            feedback: "{見|み}た{目|め}のためなら{西|にし}エリアだけでなく{他|ほか}のエリアも{変|か}えるはず。{西|にし}だけ{消|け}したのには{理由|りゆう}がある。"
          - text: いたずらがしたかったから
            value: prank
            feedback: "{安全|あんぜん}マップは{命|いのち}に{関|かか}わるもの。いたずらで{変|か}えるには{重|おも}すぎる。もっと{切実|せつじつ}な{理由|りゆう}があるはず。"

  # ===== 証拠カード5: ご近所さんの証言 =====
  - id: evidence-5
    bgm: geography-01/tension
    steps:
      - type: title_card
        text: "{決定的|けっていてき}{証拠|しょうこ}"
        subtitle: "{西|にし}エリアの{田中|たなか}さんの{証言|しょうげん}"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{町|まち}たんけんのときに{話|はなし}を{聞|き}いた、{西|にし}エリアの{田中|たなか}さん（{子|こ}ども110{番|ばん}の{家|いえ}）から{情報|じょうほう}が{来|き}ました。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "{田中|たなか}さんの{証言|しょうげん}——"
      - type: narration
        text: "「{毎朝|まいあさ}7{時|じ}50{分|ぷん}ごろ、あおば{小学校|しょうがっこう}の{制服|せいふく}を{着|き}た{子|こ}が、{西|にし}の{暗|くら}い{路地|ろじ}を{通|とお}って{学校|がっこう}のほうに{歩|ある}いていくのを{見|み}ますよ」"
      - type: se
        sound: common/discover
      - type: narration
        text: "「1{人|り}で{歩|ある}いているから{心配|しんぱい}していたんです。ランドセルは{黄色|きいろ}いカバーがついていました」"
      - type: narration
        text: "あおば{小学校|しょうがっこう}で{黄色|きいろ}いランドセルカバーは3{年生|ねんせい}。4{人|にん}とも3{年生|ねんせい}で{全員|ぜんいん}{黄色|きいろ}。カバーの{色|いろ}だけでは{特定|とくてい}できない。"
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "でも——「{西|にし}の{暗|くら}い{路地|ろじ}を{毎朝|まいあさ}{通|とお}っている3{年生|ねんせい}がいる」ということは{確定|かくてい}した。"
      - type: narration
        text: "4{人|にん}の{通学路|つうがくろ}は{北|きた}・{東|ひがし}・{東|ひがし}・{南|みなみ}。{西|にし}ルートを{使|つか}っている{人|ひと}は——いないはず。"
      - type: sprite
        character: riku
        expression: thinking
        position: left
      - type: dialog
        character: riku
        text: "{待|ま}って。おれはヒナタと{同|おな}じ{東|ひがし}ルートのはずなのに、{朝|あさ}ヒナタに{会|あ}ったことがないんだよね。"
      - type: sprite
