        action: hide
      - type: narration
        speed: slow
        text: "ヒナタは「{東|ひがし}ルート」と{言|い}っているが、{本当|ほんとう}は{西|にし}ルートを{使|つか}っている？ {西|にし}の{危|あぶ}ない{場所|ばしょ}を「{安全|あんぜん}」に{変|か}えたかった{理由|りゆう}——それは{自分|じぶん}の{通学路|つうがくろ}だったから。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: classroom
    bgm: geography-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: "{真実|しんじつ}"
        subtitle: "{近道|ちかみち}と{安全|あんぜん}のはざまで"
      - type: effect
        name: fade-in
        duration: 600

  # ソラの秘密
  - id: truth-sora
    bg: classroom
    steps:
      - type: sprite
        character: sora
        expression: worried
        position: left
      - type: dialog
        character: sora
        text: "ぼくも{言|い}わなきゃいけないことがある。15:15に{教室|きょうしつ}を{出|で}たとき、ゴミ{箱|ばこ}に{赤|あか}いシールの{剥|は}がしカスを{見|み}つけたんだ。"
      - type: dialog
        character: sora
        text: "「{誰|だれ}かがシールを{剥|は}がした？」と{思|おも}ったけど、{図書室|としょしつ}に{行|い}く{時間|じかん}だったから{確認|かくにん}しなかった。"
        expression: determined
      - type: sprite
        character: sora
