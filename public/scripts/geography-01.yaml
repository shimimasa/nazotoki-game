scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: geography-01/opening
    steps:
      - type: narration
        text: あおば{小学校|しょうがっこう}3{年|ねん}1{組|くみ}。{先週|せんしゅう}の{社会科|しゃかいか}「{町|まち}たんけん」で、みんなで{学校|がっこう}のまわりの{安全|あんぜん}マップを{作|つく}った。
      - type: narration
        text: "{危|あぶ}ない{場所|ばしょ}には{赤|あか}いシール。{子|こ}ども110{番|ばん}の{家|いえ}には{青|あお}いシール。{安全|あんぜん}な{道|みち}には{緑|みどり}の{矢印|やじるし}。"
      - type: narration
        text: "{発表会|はっぴょうかい}は{明日|あした}。{教室|きょうしつ}の{壁|かべ}にはった{安全|あんぜん}マップをソラが{確認|かくにん}すると——"
      - type: bgm
        action: stop
      - type: sprite
        character: sora
        expression: surprised
        position: center
      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: dialog
        character: sora
        text: "あれ？ マップが{変|か}わってる！ {赤|あか}い「{危|あぶ}ない{場所|ばしょ}」のシールが3つも{消|き}えてて、{代|か}わりに{緑|みどり}の「{安全|あんぜん}」マークがついてる！"
      - type: sprite
        character: sora
        action: hide
      - type: bgm
        track: geography-01/investigation
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{危|あぶ}ない{場所|ばしょ}が「{安全|あんぜん}」になっていたら、みんなが{危|あぶ}ない{道|みち}を{通|とお}ってしまうかもしれない。"
      - type: dialog
        character: sensei
        text: "{地図|ちず}{探偵|たんてい}{団|だん}、{誰|だれ}がなぜマップを{書|か}きかえたのか{調|しら}べよう！"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: "{地図|ちず}{探偵|たんてい}{団|だん} Vol.1"
        subtitle: "{書|か}きかえられた{安全|あんぜん}マップと4つの{通学路|つうがくろ}"

  # ===== メンバー紹介 =====
  - id: suspects
    bg: classroom
    bgm: geography-01/investigation
    steps:
      - type: narration
        text: "{安全|あんぜん}マップを{作|つく}った4{人|にん}の{地図|ちず}{探偵|たんてい}に{話|はなし}を{聞|き}こう。"
      - type: sprite
        character: sora
        expression: normal
        position: left
      - type: dialog
        character: sora
        text: "ぼくはソラ。マップ{作|づく}りのリーダーだよ。{通学路|つうがくろ}は{北|きた}ルート（{大通|おおどお}り{沿|ぞ}い）。15{分|ぷん}くらいかかるけど、{歩道|ほどう}があって{安全|あんぜん}だよ。"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: hinata
        expression: normal
        position: right
      - type: dialog
        character: hinata
        text: "わたしはヒナタ。{通学路|つうがくろ}は{東|ひがし}ルート（{公園|こうえん}{前|まえ}の{道|みち}）。10{分|ぷん}で{着|つ}くの。"
        expression: thinking
      - type: sprite
        character: hinata
        action: hide
      - type: sprite
        character: riku
        expression: happy
        position: left
      - type: dialog
        character: riku
        text: "おれはリク！ {通学路|つうがくろ}は{東|ひがし}ルート（{公園|こうえん}{前|まえ}の{道|みち}）。ヒナタと{同|おな}じだよ。{明|あか}るくて{見通|みとお}しのいい{道|みち}！"
      - type: sprite
        character: riku
        action: hide
      - type: sprite
        character: aoi
        expression: normal
        position: right
      - type: dialog
        character: aoi
        text: "わたしはアオイ。{通学路|つうがくろ}は{南|みなみ}ルート（{商店街|しょうてんがい}）。お{店|みせ}がたくさんあって、{人通|ひとどお}りが{多|おお}い{道|みち}だよ。"
      - type: sprite
        character: aoi
        action: hide

  # ===== 証拠カード1: 書きかえられた場所 =====
  - id: evidence-1
    bg: classroom
    bgm: geography-01/experiment
    steps:
      - type: title_card
        text: "{証拠|しょうこ}①"
        subtitle: "{書|か}きかえられた3か{所|しょ}"
      - type: narration
        text: "{安全|あんぜん}マップの{変|か}わった{場所|ばしょ}を{調|しら}べた——"
      - type: narration
        text: "①{暗|くら}い{路地|ろじ} → 「{危|あぶ}ない」が「{安全|あんぜん}」に{変|か}わっている → {西|にし}エリア"
      - type: narration
        text: "②{見通|みとお}しの{悪|わる}い{曲|ま}がり{角|かど} → 「{危|あぶ}ない」が「{安全|あんぜん}」に{変|か}わっている → {西|にし}エリア"
      - type: narration
        text: "③{交通量|こうつうりょう}の{多|おお}い{交差点|こうさてん} → 「{危|あぶ}ない」が「{安全|あんぜん}」に{変|か}わっている → {西|にし}エリア"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "3つとも{西|にし}エリア！ {偶然|ぐうぜん}じゃない。{犯人|はんにん}は{西|にし}エリアに{関係|かんけい}がある{人|ひと}だ。"

  # ===== 証拠カード2: 4人の通学路 =====
  - id: evidence-2
    steps:
      - type: title_card
        text: "{証拠|しょうこ}②"
        subtitle: "4{人|にん}の{通学路|つうがくろ}マップ"
      - type: narration
        text: "4{人|にん}の{通学路|つうがくろ}——"
      - type: narration
        text: "ソラ：{北|きた}ルート（{大通|おおどお}り{沿|ぞ}い）→ {北|きた}エリア"
      - type: narration
        text: "ヒナタ：{東|ひがし}ルート（{公園|こうえん}{前|まえ}の{道|みち}）→ {東|ひがし}エリア"
      - type: narration
        text: "リク：{東|ひがし}ルート（{公園|こうえん}{前|まえ}の{道|みち}）→ {東|ひがし}エリア"
      - type: narration
        text: "アオイ：{南|みなみ}ルート（{商店街|しょうてんがい}）→ {南|みなみ}エリア"
      - type: se
        sound: common/discover
      - type: narration
        text: "{書|か}きかえられたのは{西|にし}エリアだけ。でも——"
      - type: narration
        speed: slow
        text: "{西|にし}ルートを{通学路|つうがくろ}にしている{人|ひと}は{誰|だれ}もいない。なぜ{西|にし}エリアだけ{変|か}えた？"

  # ===== 証拠カード3: 子ども110番の家 =====
  - id: evidence-3
    bgm: geography-01/investigation
    steps:
      - type: title_card
        text: "{証拠|しょうこ}③"
        subtitle: "{子|こ}ども110{番|ばん}の{家|いえ}リスト"
      - type: narration
        text: "{町|まち}の「{子|こ}ども110{番|ばん}の{家|いえ}」を{確認|かくにん}——"
      - type: narration
        text: "{北|きた}エリア：{大通|おおどお}りのパン{屋|や}さん → マップ{表示|ひょうじ}{正|ただ}しい"
