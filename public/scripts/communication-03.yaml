      determined: teacher-f-determined.webp

scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway
    bgm: daily-life
    steps:
      - type: narration
        text: "{放課後|ほうかご}の{廊下|ろうか}。コトバが{悩|なや}みを{相談|そうだん}した——でも{相談|そうだん}のあと、コトバの{顔|かお}は{晴|は}れなかった。"
      - type: sprite
        character: kotoba
        expression: worried
        position: left
      - type: dialog
        character: kotoba
        text: "マナブに{相談|そうだん}したのに……{全然|ぜんぜん}{聴|き}いてもらえなかった。"
        expression: worried
      - type: sprite
        character: kotoba
        action: hide
      - type: se
        sound: whisper
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: manabu
        expression: surprised
        position: right
      - type: dialog
        character: manabu
        text: "え？　ぼく、ちゃんと{聴|き}いてたよ！　{相談|そうだん}の{内容|ないよう}だって、{全部|ぜんぶ}{分|わ}かってる。"
        expression: surprised
      - type: sprite
        character: manabu
        action: hide
      - type: narration
        text: "**「{聴|き}いた」と「{聴|き}いてもらえた」——なぜ{同|おな}じ{場面|ばめん}でふたりの{感|かん}じ{方|かた}は{違|ちが}うのか。**"
      - type: sprite_group
        characters:
          - character: kiku
            expression: thinking
          - character: kotoba
            expression: worried
          - character: tsutae
            expression: normal
          - character: manabu
            expression: surprised
      - type: narration
        text: "コミュニケーション{探偵団|たんていだん}は{調査|ちょうさ}を{始|はじ}めた。{聞|き}くと{聴|き}くの{違|ちが}い——そこに{謎|なぞ}の{核心|かくしん}がある。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 聴けなかった理由
        subtitle: コミュニケーション探偵団 Vol.3

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: hallway
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 相談場面の記録と「聴く」の定義
      - type: narration
        text: "{相談|そうだん}の{日時|にちじ}・{場所|ばしょ}・{内容|ないよう}——コトバは{廊下|ろうか}のベンチでマナブに{悩|なや}みを{話|はな}した。マナブは{途中|とちゅう}でアドバイスを{始|はじ}めた。{相談|そうだん}が{終|お}わったあと、コトバは「{全然|ぜんぜん}{聴|き}いてもらえなかった」と{言|い}った。"
      - type: evidence
        id: card-1
        title: 相談場面の概要記録
        content: "【{日時|にちじ}】{放課後|ほうかご}・{廊下|ろうか}のベンチ。【コトバの{悩|なや}み】クラスの{友達|ともだち}との{関係|かんけい}で{困|こま}っていること。【マナブの{行動|こうどう}】コトバの{話|はなし}の{途中|とちゅう}でアドバイスを{話|はな}し{始|はじ}めた。【{相談後|そうだんご}のコトバの{発言|はつげん}】「{全然|ぜんぜん}{聴|き}いてもらえなかった」"
      - type: sprite
        character: kotoba
        expression: worried
        position: left
      - type: dialog
        character: kotoba
        text: "{話|はな}してる{途中|とちゅう}で「こうすればいいじゃん」って{言|い}われると……「もう{話|はな}を{続|つづ}けなくていいんだ」ってなっちゃった。"
        expression: worried
      - type: sprite
        character: kotoba
        action: hide
      - type: narration
        text: "「{聴|き}く」には3つの{段階|だんかい}がある——①{音|おと}として{受|う}け{取|と}る（{聞|き}く）　②{意味|いみ}を{受|う}け{取|と}る　③{感情|かんじょう}まで{受|う}け{取|と}る（{聴|き}く）。マナブが「{聴|き}いた」のはどの{段階|だんかい}だったのか。"
      - type: evidence
        id: card-2
        title: 相談場面のタイムライン＋「聴く」の定義
        content: "【タイムライン】コトバが{話|はな}し{始|はじ}めて{約|やく}2{文後|ぶんご}にマナブが{話|はな}し{始|はじ}めた。コトバはその{後|あと}{話|はな}すのをやめた。【「{聴|き}く」の3{段階|だんかい}】①{音|おと}として{受|う}け{取|と}る（{聞|き}く）→②{意味|いみ}を{受|う}け{取|と}る→③{感情|かんじょう}まで{受|う}け{取|と}る（{聴|き}く）"
      - type: sprite
        character: manabu
        expression: thinking
        position: right
      - type: dialog
        character: manabu
        text: "{相談|そうだん}の{内容|ないよう}はぜんぶ{分|わ}かってる。{要約|ようやく}もできる。それって「{聴|き}いてた」ってことじゃないの……？"
        expression: thinking
      - type: sprite
        character: manabu
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: hallway
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: キクの観察記録とツタエの情報
      - type: sprite
        character: kiku
        expression: thinking
        position: left
      - type: dialog
        character: kiku
        text: "ぼく、{廊下|ろうか}の{少|すこ}し{離|はな}れたところで{見|み}てたんだ。マナブがコトバの{話|はなし}を{聴|き}きながら……{体|からだ}が{前|まえ}のめりになっていったのに{気|き}がついた。"
        expression: thinking
      - type: sprite
        character: kiku
        action: hide
      - type: evidence
        id: card-3
        title: キクの観察記録（聴いていたの定義のズレ）
        content: "マナブはコトバの2{文目|ぶんめ}が{終|お}わった{時点|じてん}でアドバイスを{準備|じゅんび}し{始|はじ}めた（{体|からだ}が{前|まえ}のめりになった）。マナブがアドバイスを{言|い}い{始|はじ}めたとき、コトバの{表情|ひょうじょう}がすっと{変|か}わった。{話|はな}すのをやめた。"
      - type: sprite
        character: kiku
        expression: determined
        position: left
      - type: dialog
        character: kiku
        text: "マナブがアドバイスを{言|い}い{始|はじ}めたとき、コトバの{表情|ひょうじょう}がすっと{変|か}わった。{話|はな}すのをやめたんだ。"
        expression: determined
      - type: sprite
        character: kiku
        action: hide
      - type: sprite
        character: tsutae
        expression: thinking
        position: right
      - type: dialog
        character: tsutae
        text: "コトバから{後|あと}で{聞|き}いたんだけど……マナブって{相談|そうだん}の{内容|ないよう}は{覚|おぼ}えてるのに、コトバが「どうしてほしかったか」は{分|わ}からないって{言|い}ってたって。"
        expression: thinking
      - type: sprite
        character: tsutae
        action: hide
      - type: evidence
        id: card-4
        title: ツタエが聞いた情報（内容理解と感情理解のズレ）
        content: "マナブは{相談|そうだん}の{内容|ないよう}を{正確|せいかく}に{要約|ようやく}できる。でもコトバが「どうしてほしかったのか」は{分|わ}からないという。→{内容|ないよう}の{理解|りかい}（②）はあった。{感情|かんじょう}の{受|う}け{取|と}り（③）はなかった。"

  # ==================== 中間点 ====================
  - id: midpoint
    bg: hallway
    bgm: thinking-time
    steps:
      - type: narration
        text: "{証拠|しょうこ}が{揃|そろ}ってきた。マナブは{相談|そうだん}の{内容|ないよう}を{理解|りかい}していた——でも{感情|かんじょう}を{受|う}け{取|と}る{前|まえ}にアドバイスを{始|はじ}めてしまった。キクの{観察|かんさつ}では、マナブはコトバの2{文目|ぶんめ}で{体|からだ}を{前|まえ}のめりにした。"
      - type: sprite
        character: tsutae
        expression: thinking
        position: right
      - type: dialog
        character: tsutae
        text: "マナブは{役|やく}に{立|た}ちたかったんじゃないの？　{悪|わる}い{人|ひと}じゃないと{思|おも}うけど……でも、どこかで{何|なに}かが{違|ちが}ってた。"
        expression: thinking
      - type: sprite
        character: tsutae
        action: hide
      - type: sprite
        character: kiku
        expression: worried
        position: left
      - type: dialog
        character: kiku
        text: "マナブは{聴|き}きたかったはずなのに。なのに、なぜコトバは「{聴|き}いてもらえなかった」と{感|かん}じたんだろう……。"
        expression: worried
      - type: sprite
        character: kiku
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: hallway
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: マナブのノートに書かれたメモ
      - type: effect
        name: fade-in
      - type: narration
        text: "マナブのノートに、あの{日|ひ}のことが{書|か}かれていた——"
      - type: sprite
        character: manabu
        expression: worried
        position: center
      - type: dialog
        character: manabu
        text: "……{正直|しょうじき}に{言|い}う。コトバの{話|はなし}を{聴|き}いてたとき、「この{問題|もんだい}ならこう{解決|かいけつ}できる」って{答|こた}えが{浮|う}かんで……{早|はや}く{言|い}いたかった。"
        expression: worried
      - type: dialog
        character: manabu
        text: "{話|はなし}が{終|お}わるのを{待|ま}ってたんじゃなくて——{言|い}う{機会|きかい}を{待|ま}ってたんだ。それが{問題|もんだい}だったのか……。"
        expression: thinking
      - type: sprite
        character: manabu
        action: hide
      - type: evidence
        id: card-5
        title: マナブのノートのメモ＋傾聴の5要素
        content: "【マナブのメモ】コトバの{話|はなし}を{聴|き}いたとき、「この{問題|もんだい}ならこう{解決|かいけつ}できる」という{答|こた}えが{浮|う}かんで、{早|はや}く{言|い}いたかった。【{傾聴|けいちょう}の5{要素|ようそ}】①{相手|あいて}の{話|はなし}を{最後|さいご}まで{聴|き}く　②{共感|きょうかん}的な{相槌|あいづち}　③{相手|あいて}の{言葉|ことば}の{繰|く}り{返|かえ}し（リフレクション）　④{評価|ひょうか}や{解決策|かいけつさく}を{急|いそ}がない　⑤「そういうことか」という{要約|ようやく}{確認|かくにん}"
      - type: se
        sound: reveal
      - type: narration
        text: "**{承認|しょうにん}{欲求|よっきゅう}——「{自分|じぶん}も{解決策|かいけつさく}を{知|し}っている」という{気持|きも}ちが、マナブに「{話|はなし}が{終|お}わるのを{待|ま}つ」のではなく「{言|い}う{機会|きかい}を{待|ま}つ」{行動|こうどう}をとらせた。**　{内容|ないよう}は{聞|き}いた——でも{感情|かんじょう}は{受|う}け{取|と}っていなかった。"
      - type: sprite
        character: kotoba
        expression: surprised
        position: left
      - type: dialog
        character: kotoba
        text: "……マナブは{悪意|あくい}じゃなかったんだ。{役|やく}に{立|た}ちたかっただけなんだ。でも……{話|はな}してる{途中|とちゅう}で「こうすればいい」って{言|い}われると、「もう{続|つづ}けなくていいんだ」ってなっちゃう。"
        expression: thinking
      - type: sprite
        character: kotoba
        action: hide

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: confrontation
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: コトバが「聴いてもらえなかった」と感じた原因を作った人は誰？
      - type: sprite
        character: kiku
        expression: determined
        position: left
      - type: dialog
        character: kiku
        text: "{証拠|しょうこ}を{整理|せいり}すると——コトバは{普通|ふつう}に{相談|そうだん}していた。ツタエは{後|あと}から{話|はな}を{聞|き}いた{側|がわ}。ぼくは{外|そと}から{観察|かんさつ}しただけ。{直接|ちょくせつ}の{原因|げんいん}を{作|つく}ったのは——"
        expression: determined
      - type: sprite
        character: kiku
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①コトバは{普通|ふつう}に{相談|そうだん}していた（{問題|もんだい}なし）。②キクは{第三者|だいさんしゃ}として{観察|かんさつ}していた（{直接|ちょくせつ}の{原因|げんいん}ではない）。③ツタエは{後|あと}から{話|はな}を{聞|き}いた（{原因|げんいん}ではない）。④マナブは{内容|ないよう}は{理解|りかい}したが、{感情|かんじょう}を{受|う}け{取|と}る{前|まえ}にアドバイスを{始|はじ}めた——ノートに「{早|はや}く{言|い}いたかった」と{書|か}いてある。"
      - type: choice
        id: q1
        question: コトバが「聴いてもらえなかった」と感じた原因を作った人は誰？
        options:
          - text: コトバ（相談の仕方が悪かった）
            value: kotoba
            correct: false
            feedback: "コトバは{普通|ふつう}に{相談|そうだん}していたよ。{問題|もんだい}は{受|う}け{取|と}り{方|かた}にある。{相談|そうだん}することは{勇気|ゆうき}のいること——コトバが{悪|わる}いわけじゃないよ。"
          - text: キク（観察だけで何もしなかった）
            value: kiku
            correct: false
            feedback: "キクは{第三者|だいさんしゃ}として{観察|かんさつ}していただけ。{直接|ちょくせつ}の{原因|げんいん}ではないよ。キクの{観察|かんさつ}があったから{真相|しんそう}に{近|ちか}づけたんだ。"
          - text: ツタエ（後から問題にした）
            value: tsutae
            correct: false
            feedback: "ツタエはコトバから{話|はなし}を{聞|き}いた{側|がわ}。{原因|げんいん}ではないよ。ツタエが「{役|やく}に{立|た}ちたかったんじゃないの？」と{仮説|かせつ}を{出|だ}したことで、{因果|いんが}の{連鎖|れんさ}が{見|み}えてきたね。"
          - text: マナブ（話の途中でアドバイスを始めた）
            value: manabu
            correct: true
            feedback: "{正解|せいかい}！　マナブは{内容|ないよう}は{理解|りかい}したが、{感情|かんじょう}を{受|う}け{取|と}る{前|まえ}にアドバイスを{始|はじ}めた。**{承認|しょうにん}{欲求|よっきゅう}（A）→{話|はなし}の{途中|とちゅう}でアドバイス（B）→コトバが「{聴|き}いてもらえなかった」と{感|かん}じた（C）**——これが{因果|いんが}の{連鎖|れんさ}。{傾聴|けいちょう}には5つの{要素|ようそ}がある：①{最後|さいご}まで{聴|き}く　②{共感|きょうかん}的な{相槌|あいづち}　③{言葉|ことば}の{繰|く}り{返|かえ}し　④{解決策|かいけつさく}を{急|いそ}がない　⑤{要約|ようやく}{確認|かくにん}。マナブは④を{欠|か}いていた。"

  # ==================== 真相：マナブの内省 ====================
  - id: truth-manabu
    bg: hallway
    bgm: emotional
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真相
        subtitle: 承認欲求という因果連鎖
      - type: effect
        name: fade-in
      - type: sprite
        character: manabu
        expression: worried
        position: center
      - type: dialog
        character: manabu
        text: "……{正直|しょうじき}に{言|い}う。コトバの{話|はなし}を{聴|き}きながら、「{答|こた}え{分|わ}かった！」って{思|おも}った{瞬間|しゅんかん}——{早|はや}く{言|い}いたくなった。"
        expression: worried
      - type: dialog
        character: manabu
        text: "{話|はなし}が{終|お}わるのを{待|ま}ってたんじゃなくて——{言|い}う{機会|きかい}を{待|ま}ってたんだ。コトバの{気持|きも}ちより、{自分|じぶん}の{答|こた}えの{方|ほう}が{先|さき}に{来|き}てた。"
        expression: thinking
      - type: dialog
        character: manabu
        text: "「{聴|き}いてた」つもりだったのに……{内容|ないよう}を{聞|き}いてたけど、{感情|かんじょう}は{受|う}け{取|と}ってなかったのか。"
        expression: worried
      - type: sprite
        character: manabu
        action: hide

  # ==================== 真相：他のメンバーの反応 ====================
  - id: truth-others
    bg: hallway
    bgm: emotional
    steps:
      - type: sprite
        character: kotoba
        expression: thinking
        position: left
      - type: dialog
        character: kotoba
        text: "マナブが{悪意|あくい}じゃなかったのは、{分|わ}かった。{役|やく}に{立|た}ちたかっただけなんだよね。でも……{話|はな}してる{途中|とちゅう}で「こうすればいい」って{言|い}われると、「もう{話|はな}を{続|つづ}けなくていいんだ」ってなっちゃうんだ。"
        expression: thinking
      - type: sprite
        character: kotoba
        action: hide
      - type: sprite
        character: kiku
        expression: thinking
        position: right
      - type: dialog
        character: kiku
        text: "マナブは{聴|き}きたかったはずなのに……{承認|しょうにん}{欲求|よっきゅう}が「{言|い}う{機会|きかい}を{待|ま}つ」に{変|か}えちゃったんだね。{悪|わる}い{意味|いみ}じゃないけど、{結果|けっか}としてコトバの{気持|きも}ちが{届|とど}かなかった。"
        expression: thinking
      - type: sprite
        character: kiku
        action: hide
      - type: sprite
        character: tsutae
        expression: normal
        position: center
      - type: dialog
        character: tsutae
        text: "マナブは{役|やく}に{立|た}ちたかった。それは{本当|ほんとう}だと{思|おも}う。でも「{相手|あいて}を{助|たす}ける」より「{自分|じぶん}の{答|こた}えを{言|い}う」が{先|さき}に{来|き}てた——それが{因果|いんが}の{始|はじ}まりだったんだね。"
        expression: normal
      - type: sprite
        character: tsutae
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: resolution
    steps:
      - type: sprite
        character: yamada
