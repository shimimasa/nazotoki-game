scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "もうすぐ{学芸会|がくげいかい}だ。5{年|ねん}1{組|くみ}は{劇|げき}「{銀河鉄道|ぎんがてつどう}の{夜|よる}」をやることになった。{演出係|えんしゅつがかり}のツムギが{金曜日|きんようび}に{配役表|はいやくひょう}の{案|あん}を{書|か}いた。"
      - type: narration
        text: "「カンパネルラ＝ハルカ」——ハルカは{役|やく}をとても{楽|たの}しみにしていた。でも{金曜日|きんようび}の{リハーサル|りはーさる}で、ハルカはセリフを2{回|かい}まちがえてしまった。"
      - type: narration
        text: "そして——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{月曜日|げつようび}の{朝|あさ}、{教室|きょうしつ}の{配役表|はいやくひょう}が{書|か}きかわっていた！ 「カンパネルラ＝リョウ」——ハルカの{名前|なまえ}が{消|き}えていた。ハルカは{大|おお}きなショックを{受|う}けている。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{金曜日|きんようび}の{配役表|はいやくひょう}では「カンパネルラ＝ハルカ」でした。でも{今朝|けさ}の{表|ひょう}では「カンパネルラ＝リョウ」に{変|か}わっています。{修正|しゅうせい}テープのあとがあります。だれが、いつ、どうして{書|か}きかえたのでしょうか。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: tsumugi
            expression: surprised
          - character: ayumu
            expression: worried
          - character: mamoru
            expression: thinking
          - character: nozomi
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{配役表|はいやくひょう}を{書|か}きかえたのはだれか。それは「{全体|ぜんたい}のため」で{許|ゆる}されることなのか。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 入れ替わった役
        subtitle: 特別活動探偵団 Vol.7

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 金曜日の配役表を確認しよう
      - type: narration
        text: "{金曜日|きんようび}にツムギが{作|つく}った{配役表|はいやくひょう}の{案|あん}を{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "ジョバンニ ＝ リョウ。カンパネルラ ＝ ハルカ。{先生|せんせい}{役|やく} ＝ ほかの{人|ひと}。"
      - type: narration
        text: "{演出係|えんしゅつがかり}のツムギが{作|つく}った{案|あん}だ。{金曜日|きんようび}の{時点|じてん}では、「カンパネルラ」はハルカの{役|やく}だった。"
      - type: narration
        text: "{配役|はいやく}を{変|か}えるルールがある。①{演出係|えんしゅつがかり}が{案|あん}を{作|つく}る。②{本人|ほんにん}へ{確認|かくにん}する。③{必要|ひつよう}なら{話|はな}し{合|あ}って{決|き}め{直|なお}す——この{手順|てじゅん}が{必要|ひつよう}だ。"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 月曜日の配役表を調べよう
      - type: narration
        text: "{月曜日|げつようび}の{朝|あさ}{発見|はっけん}された{配役表|はいやくひょう}を{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "ジョバンニ ＝ ハルカ。カンパネルラ ＝ リョウ。{表|ひょう}の「カンパネルラ」のところに、{修正|しゅうせい}テープのあとがある。"
      - type: narration
        text: "{金曜日|きんようび}の{案|あん}と{比|くら}べると——ハルカとリョウの{役|やく}が{入|い}れ{替|か}わっている。{修正|しゅうせい}テープのあとがあるということは、いったん{書|か}いてから{消|け}して{書|か}きかえたということだ。"
      - type: narration
        text: "{書|か}きかえは{金曜日|きんようび}15:35（{配役表|はいやくひょう}{作成|さくせい}）から{月曜日|げつようび}8:00（{発見|はっけん}）の{間|あいだ}に{起|お}きた。{週末|しゅうまつ}に{学校|がっこう}は{入|はい}れない。つまり{月曜日|げつようび}の{朝|あさ}に{書|か}きかえられた{可能性|かのうせい}が{高|たか}い。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: リハーサル記録を読もう
      - type: narration
        text: "{金曜日|きんようび}の{リハーサル|りはーさる}の{記録|きろく}が{残|のこ}っていた。"
      - type: se
        sound: discover
      - type: narration
        text: "ハルカ —— カンパネルラのセリフを2{回|かい}まちがえた。"
      - type: narration
        text: "リョウ —— セリフは{安定|あんてい}している。"
      - type: narration
        text: "ツムギ —— 「このままだと{不安|ふあん}」と{話|はな}す。"
      - type: narration
        text: "{配役|はいやく}を{変|か}えたくなる{理由|りゆう}があるのはだれか。ツムギは「{不安|ふあん}」を{口|くち}にしていた。{演出係|えんしゅつがかり}として「{劇|げき}を{成功|せいこう}させたい」というプレッシャーがあったのかもしれない。でも{理由|りゆう}があるだけでは、{誰|だれ}が{書|か}きかえたとは{決|き}められない。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 朝の教室メモを調べよう
      - type: narration
        text: "{月曜日|げつようび}の{朝|あさ}、{教室|きょうしつ}に{着|つ}いた{順番|じゅんばん}のメモが{見|み}つかった。"
      - type: se
        sound: discover
      - type: narration
        text: "7:40 マモル{登校|とうこう} —— {教室|きょうしつ}の{電気|でんき}はすでについていた。"
      - type: narration
        text: "7:50 アユム{登校|とうこう}。7:55 ノゾミ{登校|とうこう}。"
      - type: narration
        text: "マモルが7:40に{教室|きょうしつ}に{来|き}たとき、すでに{電気|でんき}がついていた。つまり7:40より{前|まえ}に{教室|きょうしつ}へ{入|はい}った{人|ひと}がいる！ しかし、その{人|ひと}のことがこのメモには{書|か}かれていない。「まだ{分|わ}かっていない{情報|じょうほう}がある」——それが{重要|じゅうよう}なヒントだ。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: げた箱前の登校記録
      - type: effect
        name: fade-in
      - type: sprite
        character: mamoru
        expression: determined
        position: center
      - type: dialog
        character: mamoru
        text: "{学校|がっこう}のげた{箱|ばこ}{前|まえ}に、{月曜日|げつようび}{早朝|そうちょう}の{記録|きろく}が{残|のこ}っていた。"
        expression: determined
      - type: sprite
        character: mamoru
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "7:28 ——ツムギ。7:40 ——マモル。7:50 ——アユム。7:55 ——ノゾミ。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "ツムギは7:28に{登校|とうこう}していた！ マモルより12{分|ふん}も{早|はや}い。{教室|きょうしつ}の{電気|でんき}がついていたのはツムギが{先|さき}に{入|はい}ったからだ。"
      - type: narration
        text: "{書|か}きかえたい{理由|りゆう}（{リハーサル|りはーさる}の{不安|ふあん}）と、{書|か}きかえられた{時刻|じこく}（7:28）の{両方|りょうほう}がそろう{人物|じんぶつ}は1{人|にん}だけ——ツムギだ。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 配役表を書きかえたのは誰だ？
      - type: sprite
        character: ayumu
        expression: thinking
        position: left
      - type: dialog
        character: ayumu
        text: "{金曜日|きんようび}の{帰|かえ}り、ツムギが「このままだと{不安|ふあん}」ってつぶやいてた。{俺|おれ}は「{本人|ほんにん}に{聞|き}かなきゃだめでしょ」って{返|かえ}したんだ。ツムギは{黙|だま}ってうなずいてたけど……"
        expression: thinking
      - type: sprite
        character: ayumu
        action: hide
      - type: sprite
        character: nozomi
        expression: worried
        position: right
      - type: dialog
        character: nozomi
        text: "ハルカは{金曜日|きんようび}の{帰|かえ}りに「がんばっておぼえる」って{話|はな}してた。あんなに{楽|たの}しみにしてたのに……"
        expression: worried
      - type: sprite
        character: nozomi
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①{金曜日|きんようび}はカンパネルラ＝ハルカだった。②{月曜日|げつようび}{朝|あさ}{修正|しゅうせい}テープで{書|か}きかえられた。③ツムギだけが「{不安|ふあん}」を{持|も}ち7:28に{最初|さいしょ}に{登校|とうこう}した。"
      - type: choice
        id: q1
        question: 配役表を書きかえたのは誰？
        options:
          - text: ツムギ（7:28登校。演出係として不安を持っていた）
            value: tsumugi
            correct: true
            feedback: "{正解|せいかい}！ ツムギは{金曜日|きんようび}の{リハーサル|りはーさる}で{劇|げき}{失敗|しっぱい}への{不安|ふあん}を{感|かん}じ、{月曜日|げつようび}7:28に{誰|だれ}より{早|はや}く{登校|とうこう}して{配役表|はいやくひょう}を{書|か}きかえた。「{全体|ぜんたい}のため」と{思|おも}い{込|こ}んでいたが、ハルカに{相談|そうだん}せずに1{人|ひと}で{決|き}めたことが{問題|もんだい}だった。"
          - text: マモル（7:40登校で電気がついているのを確認した）
            value: mamoru
            feedback: "マモルは7:40に{来|き}たとき{電気|でんき}がすでについていた。つまり{書|か}きかえた{人|ひと}はもっと{前|まえ}に{来|き}ていたはず。マモルには{書|か}きかえる{理由|りゆう}もなかったよ。"
          - text: アユム（7:50登校。「合理的な変更」に引かれていた）
            value: ayumu
            feedback: "アユムは7:50に{来|き}た。でも{書|か}きかえは7:40より{前|まえ}に{行|おこな}われた。アユムには{時刻|じこく}のうえで{不可能|ふかのう}だね。"
          - text: ノゾミ（7:55登校。ハルカの気持ちを知っていた）
            value: nozomi
            feedback: "ノゾミは7:55に{来|き}た。{全員|ぜんいん}の{中|なか}で{一番|いちばん}{遅|おそ}い。{書|か}きかえは7:40より{前|まえ}のことだから、ノゾミには{不可能|ふかのう}だよ。"

  # ==================== 真実：ツムギの告白 ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ツムギの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: tsumugi
        expression: worried
        position: center
      - type: dialog
        character: tsumugi
        text: "……{私|わたし}が{配役表|はいやくひょう}を{書|か}きかえました。"
        expression: worried
      - type: narration
        text: "ツムギは{下|した}を{向|む}いて、{小|ちい}さな{声|こえ}で{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: tsumugi
        text: "{金曜日|きんようび}のリハーサルで、ハルカがセリフをまちがえるのを{見|み}て……「このままだと{劇|げき}が{失敗|しっぱい}する」って{強|つよ}く{不安|ふあん}になった。リョウのほうがセリフが{安定|あんてい}してるから、{変|か}えればうまくいくって{思|おも}ったんだ。"
        expression: thinking
      - type: dialog
        character: tsumugi
        text: "{月曜日|げつようび}の{朝|あさ}、7:28に{教室|きょうしつ}に{来|き}て、{配役表|はいやくひょう}を{修正|しゅうせい}テープで{直|なお}した。{演出係|えんしゅつがかり}として「{全体|ぜんたい}のため」だと{思|おも}い{込|こ}んでた。でも——ハルカに{相談|そうだん}しなかったことは、{間違|まちが}いだったと{思|おも}う。"
        expression: worried
      - type: sprite
        character: tsumugi
        action: hide

  # ==================== 真実：ほかのメンバー ====================
  - id: truth-others
    bg: classroom-blackboard
    steps:
      - type: sprite
        character: ayumu
        expression: worried
        position: left
      - type: dialog
        character: ayumu
        text: "{金曜日|きんようび}の{帰|かえ}りに「{本人|ほんにん}に{聞|き}かなきゃ」って{返|かえ}したのに、もっと{強|つよ}く{言|い}えばよかった。{俺|おれ}も「リョウのほうがうまい」って{気持|きも}ちが{少|すこ}しあって、{言|い}いにくかったんだ……"
        expression: worried
      - type: sprite
        character: ayumu
        action: hide
      - type: sprite
        character: mamoru
        expression: thinking
        position: right
      - type: dialog
        character: mamoru
        text: "7:40に{来|き}たとき{電気|でんき}がついてたのが{引|ひ}っかかってた。「まだ{誰|だれ}が{来|き}たか{分|わ}からない{情報|じょうほう}がある」って{気|き}づいたのに、もっと{早|はや}く{言|い}えばよかった。"
        expression: thinking
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: nozomi
        expression: worried
        position: left
      - type: dialog
        character: nozomi
        text: "ハルカが「がんばっておぼえる」って{言|い}ってたの、ツムギにも{伝|つた}えたかった。{間|あいだ}に{入|はい}れなかったのが{悔|くや}しい。"
        expression: worried
      - type: dialog
        character: nozomi
        text: "ツムギは{劇|げき}を{守|まも}ろうとしてたんだよね。でも、ハルカの{気持|きも}ちも{同|おな}じくらい{大切|たいせつ}だったよ。"
        expression: determined
      - type: sprite
        character: nozomi
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: hallway-sunset
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "ツムギの「{最高|さいこう}の{劇|げき}にしたい」という{気持|きも}ちは{素晴|すば}らしい。{演出係|えんしゅつがかり}として{責任感|せきにんかん}があるのもいい。"
        expression: happy
      - type: dialog
        character: yamada
        text: "でも、{配役|はいやく}を{変|か}えるときは{本人|ほんにん}に{相談|そうだん}することが{必要|ひつよう}。「{全体|ぜんたい}のため」でも、{当事者|とうじしゃ}の{納得|なっとく}なしには{進|すす}められないの。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{学芸会|がくげいかい}の{劇|げき}は{全員|ぜんいん}で{作|つく}るもの。リーダーや{係|かかり}には{責任|せきにん}があるけれど、だからといって1{人|ひと}で{全部|ぜんぶ}{決|き}めていいわけではない。"
      - type: narration
        text: "「{合理的|ごうりてき}な{判断|はんだん}」と「{本人|ほんにん}の{納得|なっとく}」——どちらも{大切|たいせつ}。{うまい人|うまいひと}に{変|か}えることが{合理的|ごうりてき}でも、{相談|そうだん}なしでは{公平|こうへい}ではない。"
      - type: narration
        text: "ツムギが{気|き}づいたこと——リーダーが1{人|ひと}で{決|き}めていいことと、{相談|そうだん}すべきことのちがいを、これからの{班活動|はんかつどう}でも{忘|わす}れないでいよう。"
      - type: effect
        name: fade-out
