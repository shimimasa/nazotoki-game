scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{国際理解探偵団|こくさいりかいたんていだん}の4{人|にん}は、「{世界|せかい}の{時間感覚|じかんかんかく}クイズ{大会|たいかい}」を{準備|じゅんび}していた。"
      - type: narration
        text: "それぞれ1カ{国|こく}の「{時間|じかん}の{使|つか}い{方|かた}」を{調|しら}べて、クイズを5{問|もん}ずつ{作|つく}った。{完成|かんせい}したクイズ{用紙|ようし}は{準備室|じゅんびしつ}に{保管|ほかん}してある。"
      - type: narration
        text: "ところが——{火曜|かよう}{朝|あさ}8{時|じ}30{分|ぷん}。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: tsumugi
        expression: surprised
        position: center
      - type: dialog
        character: tsumugi
        text: "わたしのクイズ……{問|もん}5の{解答|かいとう}が{変|か}わってる！ 「3{時|じ}〜3{時|じ}半（はん）ごろ」って{書|か}いたのに、「2{時|じ}55{分|ぷん}。5{分前行動|ふんまえこうどう}が{常識|じょうしき}」になってる！"
        expression: surprised
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "ツムギさんのブラジルクイズの{解答|かいとう}が{書|か}き{換|か}えられているわ。「5{分前行動|ふんまえこうどう}が{常識|じょうしき}」——それは{本当|ほんとう}に{世界共通|せかいきょうつう}の{常識|じょうしき}なの？"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: hiromu
            expression: surprised
          - character: manabu
            expression: worried
          - character: koeru
            expression: surprised
          - character: tsumugi
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{準備室|じゅんびしつ}に{鍵|かぎ}はかかっていなかった。{誰|だれ}でも{入|はい}れた。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 時間のものさし
        subtitle: 国際理解探偵団 Vol.6

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 書き換えられたクイズを調べよう
      - type: narration
        text: "ツムギのクイズ{用紙|ようし}を{詳|くわ}しく{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "{問|もん}5「ブラジルで{友達|ともだち}と3{時|じ}に{会|あ}う{約束|やくそく}をしたら、{何時|なんじ}に{行|い}くのが{普通|ふつう}？」"
      - type: narration
        text: "ツムギの{元|もと}の{解答|かいとう}（{黒|くろ}ペン）: 「3{時|じ}〜3{時|じ}半（はん）ごろ。ブラジルでは{約束|やくそく}の{時間|じかん}はだいたいの{目安|めやす}」"
      - type: narration
        text: "{書|か}き{換|か}え{後|ご}（{別|べつ}の{黒|くろ}ペン）: 「2{時|じ}55{分|ぷん}。5{分前行動|ふんまえこうどう}が{常識|じょうしき}」"
      - type: narration
        text: "{元|もと}の{解答|かいとう}に{線|せん}を{引|ひ}いて{消|け}し、{新|あたら}しい{解答|かいとう}が{書|か}かれている。{問|もん}1〜4は{変|か}わっていない。"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 4カ国の時間感覚を全部比べよう
      - type: narration
        text: "{先生|せんせい}が{作|つく}った{正|ただ}しい{比較表|ひかくひょう}がある。4カ{国|こく}の「{時間|じかん}のものさし」を{全部|ぜんぶ}{比|くら}べてみよう。"
      - type: se
        sound: discover
      - type: narration
        text: "{日本|にほん}: 5{分前|ふんまえ}{到着|とうちゃく}が{理想|りそう}。1{分|ぷん}{遅|おく}れたら{遅刻|ちこく}。タイプ: きっちり"
      - type: narration
        text: "ドイツ: ぴったり{到着|とうちゃく}。5{分|ぷん}{遅|おく}れたら{遅刻|ちこく}。タイプ: きっちり"
      - type: narration
        text: "メキシコ: 15〜30{分|ぷん}の{幅|はば}。30{分|ぷん}{遅|おく}れでもOK。タイプ: ゆったり"
      - type: narration
        text: "ブラジル: 15〜30{分|ぷん}の{幅|はば}。30{分|ぷん}までは{普通|ふつう}。タイプ: ゆったり"
      - type: narration
        text: "ツムギの{元|もと}の{解答|かいとう}「3{時|じ}〜3{時|じ}半（はん）ごろ」はブラジルの{文化|ぶんか}として{正|ただ}しい。「5{分前行動|ふんまえこうどう}が{常識|じょうしき}」は——きっちりタイプの{国|くに}だけの{感覚|かんかく}だ。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 放課後の行動を確認しよう
      - type: narration
        text: "{月曜日|げつようび}の{放課後|ほうかご}、4{人|にん}はどこにいたか{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "ヒロム —— 15:15に{準備室|じゅんびしつ}でクイズ{用紙|ようし}を{確認|かくにん} → 15:20{下校|げこう}（{正門|せいもん}の{先生|せんせい}{確認|かくにん}{済|ず}み）"
      - type: narration
        text: "マナブ —— 15:30ごろから{理科室|りかしつ}で{実験|じっけん}{片付|かたづ}け（{理科|りか}の{先生|せんせい}{確認|かくにん}{済|ず}み）"
      - type: narration
        text: "コエル —— 15:20に{体育館|たいいくかん}でバドミントン（{体育|たいいく}の{先生|せんせい}{確認|かくにん}{済|ず}み）"
      - type: narration
        text: "ツムギ —— 15:30に{図書室|としょしつ}で{追加調査|ついかちょうさ}（{図書|としょ}の{先生|せんせい}{確認|かくにん}{済|ず}み）"
      - type: narration
        text: "15:15にヒロムが{確認|かくにん}した{時点|じてん}では、クイズは{正常|せいじょう}だった。{書|か}き{換|か}えは15:15{以降|いこう}に{起|お}きた——"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: マナブの「焦り」発言を確認しよう
      - type: narration
        text: "{月曜|げつよう}の{昼休|ひるやす}みに、こんな{会話|かいわ}があった。"
      - type: sprite
        character: manabu
        expression: worried
        position: left
      - type: dialog
        character: manabu
        text: "イベントの{準備|じゅんび}、1{日|にち}{遅|おく}れてるよ。もっと{早|はや}くやらないと{間|ま}に{合|あ}わない。"
        expression: worried
      - type: sprite
        character: manabu
        action: hide
      - type: sprite
        character: hiromu
        expression: normal
        position: right
      - type: dialog
        character: hiromu
        text: "{大丈夫|だいじょうぶ}だよ、まだ3{日|にち}あるし。"
        expression: normal
      - type: sprite
        character: hiromu
        action: hide
      - type: sprite
        character: manabu
        expression: determined
        position: left
      - type: dialog
        character: manabu
        text: "ドイツだったら1{日|にち}{遅|おく}れは{大問題|だいもんだい}だよ。{時間|じかん}を{守|まも}らないと……それにツムギのブラジルの{答|こた}え、ありえないと{思|おも}わない？ 3{時半|じはん}でいいなんて、{遅刻|ちこく}じゃん。{直|なお}してあげたほうがいいんじゃない？"
        expression: determined
      - type: sprite
        character: manabu
        action: hide
      - type: sprite
        character: koeru
        expression: thinking
        position: right
      - type: dialog
        character: koeru
        text: "えー、メキシコだって30{分|ぷん}{遅|おく}れOKだよ？ {文化|ぶんか}の{違|ちが}いでしょ。"
        expression: thinking
      - type: sprite
        character: koeru
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "マナブは「{直|なお}してあげたほうがいい」と{言|い}っていた——{動機|どうき}がありそう？"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 理科の先生の証言
      - type: effect
        name: fade-in
      - type: narration
        text: "{理科|りか}の{先生|せんせい}に{直接|ちょくせつ}{聞|き}いてみた。"
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "マナブくんが{理科室|りかしつ}に{来|き}たのは15:35でした。15:30ではありません。"
        expression: thinking
      - type: dialog
        character: yamada
        text: "{実験|じっけん}の{片付|かたづ}けは15:30から{始|はじ}める{予定|よてい}だったので、『マナブくん、5{分|ぷん}{遅刻|ちこく}だよ』と{言|い}いました。"
        expression: normal
      - type: dialog
        character: yamada
        text: "マナブくんは『すみません、{準備室|じゅんびしつ}に{忘|わす}れ{物|もの}を{取|と}りに{行|い}ってました』と{言|い}っていました。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "マナブは「15:30から{理科室|りかしつ}」と{言|い}っていた。でも{先生|せんせい}は「15:35に{来|き}た」と{言|い}っている。"
      - type: narration
        text: "15:25〜15:35の10{分間|ふんかん}——マナブは{準備室|じゅんびしつ}にいた。しかも{自分|じぶん}で「{準備室|じゅんびしつ}に{行|い}ってました」と{先生|せんせい}に{言|い}っている！"
      - type: narration
        text: "Card②の{全探索|ぜんたんさく}{結果|けっか}: 「5{分前行動|ふんまえこうどう}が{常識|じょうしき}」と{思|おも}っているのはきっちりタイプの{国|くに}（{日本|にほん}・ドイツ）の{担当者|たんとうしゃ}。ヒロム（{日本|にほん}）は15:20{下校済|げこうず}み——{残|のこ}るのは……"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。"
      - type: sprite
        character: hiromu
        expression: thinking
        position: left
      - type: dialog
        character: hiromu
        text: "Card②の4カ{国|こく}を{全部|ぜんぶ}{比|くら}べると——きっちりタイプは{日本|にほん}とドイツ。「5{分前行動|ふんまえこうどう}が{常識|じょうしき}」と{書|か}いたのは、この2カ{国|こく}を{調|しら}べた{人|ひと}だけのはず。"
        expression: thinking
      - type: sprite
        character: hiromu
        action: hide
      - type: sprite
        character: koeru
        expression: determined
        position: right
      - type: dialog
        character: koeru
        text: "{日本担当|にほんたんとう}がヒロムで、ドイツ{担当|たんとう}がマナブ。ヒロムは15:20に{下校|げこう}してる。{正門|せいもん}の{先生|せんせい}が{確認|かくにん}{済|ず}み。{残|のこ}るのは……"
        expression: determined
      - type: sprite
        character: koeru
        action: hide
      - type: sprite
        character: tsumugi
        expression: worried
        position: left
      - type: dialog
        character: tsumugi
        text: "マナブは「{直|なお}してあげたほうがいい」って{言|い}ってた。しかもCard⑤で——15:25〜15:35に{準備室|じゅんびしつ}にいたって{分|わ}かった。"
        expression: worried
      - type: sprite
        character: tsumugi
        action: hide
      - type: choice
        id: q1
        question: クイズの解答を書き換えたのは誰？
        options:
          - text: マナブ（ドイツ担当。15:25〜15:35に準備室にいた。昼休みに「直してあげたほうがいい」と発言）
            value: manabu
            correct: true
            feedback: "{正解|せいかい}！ Card②の{全探索|ぜんたんさく}で「5{分前行動|ふんまえこうどう}が{常識|じょうしき}」はきっちりタイプ（{日本|にほん}・ドイツ）の{感覚|かんかく}と{判明|はんめい}。ヒロム（{日本|にほん}）は15:20{下校済|げこうず}み。マナブ（ドイツ）は15:25〜15:35の{空白|くうはく}{時間|じかん}に{準備室|じゅんびしつ}にいた。"
          - text: ヒロム（15:15に準備室を確認した。日本担当でもある）
            value: hiromu
            feedback: "ヒロムは15:15に{確認|かくにん}した{時点|じてん}では{正常|せいじょう}だったと{証言|しょうげん}している。しかも15:20に{下校|げこう}——{正門|せいもん}の{先生|せんせい}が{確認|かくにん}{済|ず}み。15:15{以降|いこう}に{準備室|じゅんびしつ}にいられない。"
          - text: コエル（メキシコ担当。「文化の違いでしょ」と言っていた）
            value: koeru
            feedback: "コエルは15:20に{体育館|たいいくかん}にいたことを{体育|たいいく}の{先生|せんせい}が{確認|かくにん}している。しかもCard②の{全探索|ぜんたんさく}で、メキシコはゆったりタイプ——「5{分前行動|ふんまえこうどう}が{常識|じょうしき}」と{書|か}く{理由|りゆう}がない。"
          - text: ツムギ（自分のクイズを書き換えた？）
            value: tsumugi
            feedback: "ツムギは{被害者|ひがいしゃ}。しかも15:30に{図書室|としょしつ}にいたことを{図書|としょ}の{先生|せんせい}が{確認|かくにん}している。ブラジル{担当|たんとう}のツムギが「5{分前行動|ふんまえこうどう}が{常識|じょうしき}」と{書|か}き{換|か}える{理由|りゆう}はない。"

  # ==================== 真実：マナブの告白 ====================
  - id: truth-manabu
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: マナブの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: manabu
        expression: worried
        position: center
      - type: dialog
        character: manabu
        text: "……{書|か}き{換|か}えたのは、{僕|ぼく}です。"
        expression: worried
      - type: narration
        text: "マナブはうつむきながら、{小|ちい}さな{声|こえ}で{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: manabu
        text: "ドイツを{調|しら}べてたら——「Pünktlichkeit（プンクトリッヒカイト）、{時間厳守|じかんげんしゅ}はドイツ{人|じん}にとって{最|もっと}も{大切|たいせつ}な{美徳|びとく}」って{書|か}いてあって。{時間|じかん}を{守|まも}るのは{相手|あいて}への{敬意|けいい}なんだって、{深|ふか}く{共感|きょうかん}した。"
        expression: thinking
      - type: dialog
        character: manabu
        text: "それで……ツムギの{解答|かいとう}「3{時|じ}〜3{時半|じはん}ごろ」を{見|み}て、「{遅刻|ちこく}じゃないか！ こんな{答|こた}えを{出|だ}したら、みんなが{時間|じかん}を{守|まも}らなくなる」って{思|おも}ったんだ。"
        expression: worried
      - type: dialog
        character: manabu
        text: "15:25に{準備室|じゅんびしつ}に{行|い}って、「5{分前行動|ふんまえこうどう}が{常識|じょうしき}」に{直|なお}した。{悪|わる}いことをしてるつもりはなかった。{正|ただ}しいことをしてると{思|おも}ってた……"
        expression: determined
      - type: sprite
        character: manabu
        action: hide

  # ==================== 真実：他のメンバー ====================
  - id: truth-others
    bg: classroom
    steps:
      - type: sprite
        character: tsumugi
        expression: worried
        position: right
      - type: dialog
        character: tsumugi
        text: "ショックだった。3{冊|さつ}の{本|ほん}で{確認|かくにん}したのに、「{間違|まちが}い」って{書|か}き{換|か}えられて……でも、マナブが{悪意|あくい}でやったんじゃないって、{分|わ}かった。"
        expression: worried
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: hiromu
        expression: thinking
        position: left
      - type: dialog
        character: hiromu
        text: "{実|じつ}は{僕|ぼく}も、15:15に{見|み}たとき「3{時半|じはん}でいいの？ {遅刻|ちこく}じゃない？」って{思|おも}ったんだ。でもツムギの{資料|しりょう}を{読|よ}んで、「そういう{文化|ぶんか}なんだ」って{納得|なっとく}した。マナブも、もう{少|すこ}し{読|よ}んでみれば……"
        expression: thinking
      - type: sprite
        character: hiromu
        action: hide
      - type: sprite
        character: koeru
        expression: thinking
        position: right
      - type: dialog
        character: koeru
        text: "マナブが「{直|なお}してあげたほうがいい」って{言|い}ってたの、{本気|ほんき}だったんだ。{冗談|じょうだん}かと{思|おも}って{聞|き}き{流|なが}しちゃった。もっと{早|はや}く{言|い}えばよかった。"
        expression: thinking
      - type: sprite
        character: koeru
        action: hide

