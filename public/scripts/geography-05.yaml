meta:
  id: geography-05
  title: うその天気レポートと気候のアリバイ
  series: 地図探偵団
  volume: 5
  estimatedMinutes: 20

characters:
  kouta:
    name: コウタ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  kanade:
    name: カナデ
    color: "#E91E63"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  ayane:
    name: アヤネ
    color: "#FF8C00"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  shou:
    name: ショウ
    color: "#2E8B57"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: geography-05/opening
    steps:
      - type: narration
        text: "あおば{小学校|しょうがっこう}5{年|ねん}1{組|くみ}。{夏休|なつやす}みの「{天気|てんき}と{気候|きこう}レポート」の{発表|はっぴょう}{授業|じゅぎょう}。"
      - type: narration
        text: "4人がそれぞれ{日本|にほん}の{異|こと}なる{気候|きこう}区分の{町|まち}を{訪|おとず}れたと{報告|ほうこく}した。"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: dialog
        character: sensei
        text: "ちょっと{待|ま}ってくれ。1人のレポートの{天気|てんき}の{記述|きじゅつ}が、その{気候|きこう}区分の{特徴|とくちょう}と{合|あ}っていない。"
      - type: dialog
        character: sensei
        text: "{地図|ちず}{探偵団|たんていだん}、{気候|きこう}区分の{知識|ちしき}で「{嘘|うそ}のレポート」を{見破|みやぶ}ってくれ！"
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 地図探偵団 Vol.5
        subtitle: うその天気レポートと気候のアリバイ

  # ===== メンバー紹介 =====
  - id: suspects
    bg: classroom
    bgm: geography-05/investigation
    steps:
      - type: narration
        text: "{地図|ちず}{探偵団|たんていだん}の4人に話を{聞|き}こう。"
      - type: sprite
        character: kouta
        expression: normal
        position: left
      - type: dialog
        character: kouta
        text: "ぼくはコウタ。{高知|こうち}（{太平洋|たいへいよう}側）に{行|い}ったよ。{蒸|む}し{暑|あつ}くて3{日|にち}のうち2{日|にち}は{雨|あめ}。{台風|たいふう}の{影響|えいきょう}で{風|かぜ}も{強|つよ}かった。"
      - type: dialog
        character: kouta
        text: "カナデの「カラッとして{涼|すず}しい」って{記述|きじゅつ}、{日本海側|にほんかいがわ}の{特徴|とくちょう}と{合|あ}わない気がするんだけど……。"
        expression: thinking
      - type: sprite
        character: kouta
        action: hide
      - type: sprite
        character: kanade
        expression: normal
        position: right
      - type: dialog
        character: kanade
        text: "わたしはカナデ。{新潟|にいがた}（{日本海側|にほんかいがわ}）のおばあちゃんの{家|いえ}に{行|い}ったよ。カラッとしていて、{朝晩|あさばん}は{涼|すず}しくて{過|す}ごしやすかった。"
      - type: dialog
        character: kanade
        text: "……{本当|ほんとう}だよ？ {楽|たの}しかったし。"
        expression: worried
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ayane
        expression: normal
        position: left
      - type: dialog
        character: ayane
        text: "わたしはアヤネ。{岡山|おかやま}（{瀬戸内|せとうち}）に{行|い}ったよ。{晴|は}れの{日|ひ}が{多|おお}くて{雨|あめ}はほとんど{降|ふ}らなかった。「{晴|は}れの{国|くに}おかやま」の{通|とお}り！"
      - type: dialog
        character: ayane
        text: "カナデから{夏休|なつやす}み{前|まえ}に「{旅行|りょこう}に{行|い}けなくなった」ってLINEが来てたんだけど……。"
        expression: thinking
      - type: sprite
        character: ayane
        action: hide
      - type: sprite
        character: shou
        expression: normal
        position: right
      - type: dialog
        character: shou
        text: "ぼくはショウ。{長野|ながの}（{中央|ちゅうおう}{高地|こうち}）に{行|い}った。{昼間|ひるま}は{暑|あつ}いけど{朝晩|あさばん}は{涼|すず}しくてカラッとしていた。{気温|きおん}の{差|さ}が大きかったよ。"
      - type: dialog
        character: shou
        text: "カナデの{記述|きじゅつ}、ぼくの{長野|ながの}の{体験|たいけん}とそっくりなんだよな……{新潟|にいがた}じゃなくて{長野|ながの}の{話|はなし}みたいだ。"
        expression: thinking
      - type: sprite
        character: shou
        action: hide

  # ===== 証拠カード1: 4人のレポート =====
  - id: evidence-1
    bg: classroom
    bgm: geography-05/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: 4人の天気レポート
      - type: narration
        text: "4人のレポートの{天気|てんき}{記述|きじゅつ}——"
      - type: narration
        text: "コウタ（{高知|こうち}・{太平洋|たいへいよう}側）：「{蒸|む}し{暑|あつ}くて3{日|にち}のうち2{日|にち}は{雨|あめ}。{台風|たいふう}の{影響|えいきょう}で{風|かぜ}も{強|つよ}かった」"
      - type: narration
        text: "カナデ（{新潟|にいがた}・{日本海側|にほんかいがわ}）：「カラッとしていて{朝晩|あさばん}は{涼|すず}しくて{過|す}ごしやすかった」"
      - type: narration
        text: "アヤネ（{岡山|おかやま}・{瀬戸内|せとうち}）：「{晴|は}れの{日|ひ}が{多|おお}くて{雨|あめ}はほとんど{降|ふ}らなかった」"
      - type: narration
        text: "ショウ（{長野|ながの}・{中央|ちゅうおう}{高地|こうち}）：「{昼間|ひるま}は{暑|あつ}いけど{朝晩|あさばん}は{涼|すず}しくてカラッと。{気温|きおん}の{差|さ}が大きい」"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "カナデの「カラッと{涼|すず}しい」と、ショウの「カラッと{涼|すず}しい」——{同|おな}じ{表現|ひょうげん}。{新潟|にいがた}と{長野|ながの}は{気候|きこう}が{違|ちが}うはずなのに？"

  # ===== 証拠カード2: 気候区分表 =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 気候区分の夏の特徴
      - type: narration
        text: "{日本|にほん}の{気候|きこう}区分の夏の{特徴|とくちょう}——"
      - type: narration
        text: "{太平洋|たいへいよう}側：{蒸|む}し{暑|あつ}い。{雨|あめ}が{多|おお}い（{梅雨|つゆ}・{台風|たいふう}）→ コウタの{記述|きじゅつ}と{一致|いっち} ✓"
      - type: narration
        text: "{日本海側|にほんかいがわ}：フェーン{現象|げんしょう}で{猛暑|もうしょ}。{湿気|しっけ}が{多|おお}い → カナデの「カラッと{涼|すず}しい」と{矛盾|むじゅん} ✗"
      - type: narration
        text: "{瀬戸内|せとうち}：{晴|は}れが{多|おお}い。{雨|あめ}が{少|すく}ない → アヤネの{記述|きじゅつ}と{一致|いっち} ✓"
      - type: effect
        name: flash
        duration: 400
      - type: narration
        text: "{中央|ちゅうおう}{高地|こうち}：{昼|ひる}は{暑|あつ}いが{朝晩|あさばん}{涼|すず}しい。カラッとしている → ショウの{記述|きじゅつ}と{一致|いっち} ✓"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "カナデの「カラッとして{朝晩|あさばん}{涼|すず}しい」は{日本海側|にほんかいがわ}ではなく{中央|ちゅうおう}{高地|こうち}の{特徴|とくちょう}！ {気候|きこう}区分が{合|あ}っていない。"

  # ===== 証拠カード3: 旅行写真の特徴 =====
  - id: evidence-3
    bgm: geography-05/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 旅行写真の特徴
      - type: narration
        text: "4人がレポートに{貼|は}った{写真|しゃしん}——"
      - type: narration
        text: "コウタ：{高知|こうち}の{桂浜|かつらはま}。{雨雲|あまぐも}が{写|うつ}っている。{日付|ひづけ}入り ✓"
      - type: narration
        text: "アヤネ：{岡山|おかやま}の{後楽園|こうらくえん}。{快晴|かいせい}。{日付|ひづけ}入り ✓"
      - type: narration
        text: "ショウ：{長野|ながの}の{高原|こうげん}。{朝|あさ}の{霧|きり}。{気温|きおん}データつき ✓"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "カナデ：{新潟|にいがた}の{田|た}んぼの{風景|ふうけい}。{美|うつく}しい{青空|あおぞら}——だが{本人|ほんにん}が{写|うつ}っていない。{日付|ひづけ}もない。"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "コウタ・アヤネ・ショウの{写真|しゃしん}は{本人|ほんにん}や{日付|ひづけ}がある{本物|ほんもの}。カナデの{写真|しゃしん}は{風景|ふうけい}だけ——インターネットの{画像|がぞう}かもしれない。"

  # ===== 証拠カード4: 旅行スケジュール =====
  - id: evidence-4
    bgm: geography-05/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: 夏休みの旅行日程
      - type: narration
        text: "4人の{旅行|りょこう}{日程|にってい}——"
      - type: narration
        text: "コウタ：8/3〜8/5 {家族|かぞく}と{飛行機|ひこうき}。{家族|かぞく}が{証人|しょうにん} ✓"
      - type: narration
        text: "アヤネ：8/7〜8/9 {家族|かぞく}と{車|くるま}。{家族|かぞく}が{証人|しょうにん} ✓"
      - type: narration
        text: "ショウ：8/15〜8/17 {家族|かぞく}と{車|くるま}。{家族|かぞく}が{証人|しょうにん} ✓"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "カナデ：8/10〜8/12 「おばあちゃんの{家|いえ}に1人で{行|い}った」——{証人|しょうにん}なし ✗"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "3人は{家族|かぞく}が{証人|しょうにん}。カナデだけ{証人|しょうにん}がいない。{本当|ほんとう}に{行|い}った？"

  # ===== 証拠カード5: おばあちゃんの証言 =====
  - id: evidence-5
    bgm: geography-05/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: おばあちゃんからの電話
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "カナデのおばあちゃんに{確認|かくにん}の{電話|でんわ}をした。"
      - type: dialog
        character: sensei
        text: "おばあちゃんの{話|はなし}：「カナデちゃんは8{月|がつ}は来ていませんよ。{私|わたし}が{体調|たいちょう}を{崩|くず}して、{旅行|りょこう}はキャンセルになったんです」"
      - type: sprite
        character: sensei
        action: hide
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "カナデは{新潟|にいがた}に{行|い}っていなかった！ レポートはインターネットで{調|しら}べて{作|つく}った。"
      - type: narration
        text: "{気候|きこう}区分を{間違|まちが}えて「{日本海側|にほんかいがわ}」ではなく「{中央|ちゅうおう}{高地|こうち}」の{特徴|とくちょう}を書いてしまった——{本当|ほんとう}に{行|い}った人は{気候|きこう}を{体|からだ}で{感|かん}じているから{間違|まちが}えない。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: geography-05/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{気候|きこう}区分の{知識|ちしき}で{嘘|うそ}が{見|み}えたな。{嘘|うそ}のレポートを書いたのは{誰|だれ}だ？"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: 嘘のレポートを書いたのは誰？
        options:
          - text: コウタ（高知・太平洋側）
            value: kouta
            feedback: コウタの「蒸し暑くて雨が多い」は太平洋側の特徴と完全に一致。家族が証人で本物の写真もある。
          - text: カナデ（新潟・日本海側）
            value: kanade
            feedback: 正解！ カナデは新潟に行っていなかった。ネットで調べたレポートに中央高地の特徴（カラッと涼しい）を書いてしまった。日本海側の夏は猛暑で湿気が多い。
          - text: アヤネ（岡山・瀬戸内）
            value: ayane
            feedback: アヤネの「晴れが多く雨が少ない」は瀬戸内の特徴と一致。家族が証人で日付入りの写真もある。
          - text: ショウ（長野・中央高地）
            value: shou
            feedback: ショウの「カラッとして朝晩涼しい」は中央高地の特徴と一致。むしろカナデの記述がショウの体験と同じだった——カナデが中央高地の特徴を間違えて書いた証拠。
      - type: choice
        id: q2
        question: 「仮説検証」でどうやって嘘を見破った？
        options:
          - text: 「本当に日本海側に行ったなら猛暑で湿気が多いはず」→カナデの記述と矛盾
            value: hypothesis
            feedback: 正解！ 「もし本当に行ったなら、天気はこうなるはず」→実際の記述と比較。日本海側の夏はフェーン現象で猛暑・湿気が多いのに、カナデは「カラッと涼しい」と書いた。仮説と矛盾する＝嘘の可能性。
          - text: 写真に本人が写っていなかったから
            value: photo
            feedback: 写真の証拠も大事だけど、決め手は「気候区分の特徴との矛盾」。仮説検証＝「もし本当なら○○のはず」→実際と比較する力。
          - text: 証人がいなかったから
            value: no-witness
            feedback: 証人がいないのは状況証拠だけど、「なぜ嘘だと分かるか」の決め手は気候区分の知識。日本海側の特徴と記述の矛盾が仮説検証の核心。
          - text: おばあちゃんが「来ていない」と言ったから
            value: grandma
            feedback: おばあちゃんの証言は確定証拠だけど、それ以前に「気候区分の矛盾」で嘘を疑えたのがポイント。仮説検証は証言がなくても使える推理スキル。

  # ===== 真実パート =====
  - id: truth-intro
    bg: classroom
    bgm: geography-05/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: 行けなかったことが恥ずかしかった
      - type: effect
        name: fade-in
        duration: 600

  # コウタの後ろめたさ
  - id: truth-kouta
    bg: classroom
    steps:
      - type: sprite
        character: kouta
        expression: worried
        position: left
      - type: dialog
        character: kouta
        text: "ぼく、カナデの{記述|きじゅつ}に{違和感|いわかん}があったのに{授業|じゅぎょう}で{言|い}い{出|だ}せなかった。「{間違|まちが}ってるよ」って{言|い}うのが{失礼|しつれい}かと思って。"
      - type: dialog
        character: kouta
        text: "{違和感|いわかん}を{感|かん}じたら{確認|かくにん}する——それが{仮説|かせつ}{検証|けんしょう}の{第一歩|だいいっぽ}だった。"
        expression: determined
      - type: sprite
        character: kouta
        action: hide

  # アヤネの後ろめたさ
  - id: truth-ayane
    steps:
      - type: sprite
        character: ayane
        expression: worried
        position: right
      - type: dialog
        character: ayane
        text: "カナデから「{旅行|りょこう}に{行|い}けなくなった」ってLINEが来てたのに、{夏休|なつやす}み{明|あ}けに{確認|かくにん}しなかった。"
      - type: dialog
        character: ayane
        text: "「{大丈夫|だいじょうぶ}？ {話|はな}してみて」って{聞|き}いてあげればよかった。"
        expression: determined
      - type: sprite
        character: ayane
        action: hide

  # ショウの後ろめたさ
  - id: truth-shou
    steps:
      - type: sprite
        character: shou
        expression: worried
        position: left
      - type: dialog
        character: shou
        text: "カナデの{記述|きじゅつ}がぼくの{長野|ながの}の{体験|たいけん}とそっくりだって気づいてた。でも「{気|き}のせいかな」って{流|なが}しちゃった。"
      - type: dialog
        character: shou
        text: "{気候|きこう}区分の{違|ちが}いを{知|し}ってるなら、「それ{日本海側|にほんかいがわ}の{特徴|とくちょう}じゃないよ」って{言|い}えたはずなのに。"
        expression: determined
      - type: sprite
        character: shou
        action: hide

  # カナデの真実（クライマックス）
  - id: truth-kanade
    bgm: geography-05/truth
    steps:
      - type: sprite
        character: kanade
        expression: worried
        position: center
      - type: dialog
        character: kanade
        text: "……{嘘|うそ}ついてた。{新潟|にいがた}には{行|い}ってないの。"
      - type: narration
        speed: slow
        text: "カナデがゆっくりと話し{始|はじ}めた。"
      - type: dialog
        character: kanade
        text: "おばあちゃんが{体調|たいちょう}を{崩|くず}して、{旅行|りょこう}がキャンセルになった。みんなが{旅行|りょこう}の{話|はなし}で{盛|も}り{上|あ}がってるのに、わたしだけ{行|い}けなかった。"
        expression: worried
      - type: dialog
        character: kanade
        text: "{恥|は}ずかしくて「{行|い}けなかった」って{言|い}えなくて。インターネットで{調|しら}べて{嘘|うそ}のレポートを{作|つく}った。"
      - type: dialog
        character: kanade
