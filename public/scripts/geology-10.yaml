meta:
  id: geology-10
  title: "46億年の証言"
  series: "地学ミステリー"
  volume: 10
  estimatedMinutes: 18

characters:
  chisou:
    name: "チソウ"
    color: "#8D6E63"
    sprites:
      normal: boy-c-normal.webp
      happy: boy-c-happy.webp
      thinking: boy-c-thinking.webp
      worried: boy-c-worried.webp
      surprised: boy-c-surprised.webp
      determined: boy-c-determined.webp
  ishikawa:
    name: "イシカワ"
    color: "#4A90D9"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  magumu:
    name: "マグム"
    color: "#E74C3C"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  sunako:
    name: "スナコ"
    color: "#C49A6C"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "地学ミステリー Vol.10"
        subtitle: "46億年の証言"
      - type: narration
        text: "地学クラブは、これまで学んできた地球の歴史をまとめた"
      - type: narration
        text: "「46億年年表パネル」を展示することになった。"
      - type: narration
        text: "ところが完成した年表には、"
      - type: sprite_group
        characters:
          - id: chisou
            expression: normal
          - id: ishikawa
            expression: normal
          - id: magumu
            expression: normal
          - id: sunako
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: chisou
        expression: normal
        position: left
      - type: dialog
        character: chisou
        text: "あなたは展示を見る人の気持ちを考える役。 不安を抱える人にどう伝えるかを重視している。"
      - type: dialog
        character: chisou
        text: "未来が不安なとき、はっきりした数字にすがりたくなる気持ちはわかる"
        expression: thinking
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        expression: normal
        position: right
      - type: dialog
        character: ishikawa
        text: "あなたは資料の数字を確認する担当。 今回も元の年代表と展示パネルの差に気づいた。"
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        expression: normal
        position: left
      - type: dialog
        character: magumu
        text: "あなたは年表づくりの中心だった。 でも今回は、わかりやすさを優先しすぎた。"
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        expression: normal
        position: right
      - type: dialog
        character: sunako
        text: "あなたは歴史の流れ全体を見るのが得意。 今回も、地球史は数字だけではなく変化の連なりで読むべきだと考えている。"
      - type: sprite
        character: sunako
        action: hide
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠1"
        subtitle: "展示パネルの年表"
      - type: narration
        text: "地球誕生から現在までが、きりのよい数字で並んでいる"
      - type: narration
        text: "いくつかの区分で「約」や幅が消えている"
      - type: se
        sound: discover
      - type: narration
        text: "見やすいが、資料の出し方として不自然に整いすぎている。"
  - id: evidence-2
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠2"
        subtitle: "マグムのメモ"
      - type: narration
        text: "「数字がぐらつくと伝わりにくい」"
      - type: narration
        text: "「未来が不安な子に、安心できる流れとして見せたい」"
      - type: se
        sound: discover
      - type: narration
        text: "改変の意図が「わかりやすさ」と「安心」にあったと読める。"
  - id: evidence-3
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠3"
        subtitle: "地質時代まとめカード"
      - type: narration
        text: "地球の歴史は約46億年"
      - type: narration
        text: "各時代区分は証拠に基づいて定められるが、表現には幅が残ることがある"
      - type: se
        sound: discover
      - type: narration
        text: "年表は証拠にもとづくが、ぴったり一言で言い切れるわけではない。"
  - id: evidence-4
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠4"
        subtitle: "大量絶滅と回復の記録"
      - type: narration
        text: "地球史には5回の大きな大量絶滅があった"
      - type: narration
        text: "そのたびに環境は変わり、生命は回復しながら新しい姿へ広がった"
      - type: se
        sound: discover
      - type: narration
        text: "希望は「全部確定している」ことではなく、長い変化の証拠から語れる。"
  - id: evidence-5
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠5"
        subtitle: "最古の岩石と科学の説明カード"
      - type: narration
        text: "最古級の岩石や地層、化石などから地球史を読み取っている"
      - type: narration
        text: "科学では、わからない幅を残して説明すること自体が誠実さにつながる"
      - type: narration
        text: "マグムはこの説明を読んだうえで、年表の数字を丸めていた"
      - type: se
        sound: discover
      - type: narration
        text: "犯人はマグム。 問題は数字の丸めそのものより、不確実さを消してしまったことにある。"
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: chisou
            expression: thinking
          - id: ishikawa
            expression: thinking
          - id: magumu
            expression: thinking
          - id: sunako
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "チソウ"
            value: chisou
            correct: false
            feedback: "チソウは手がかりを持っているが、決め手は足りない。"
          - text: "イシカワ"
            value: ishikawa
            correct: false
            feedback: "イシカワは手がかりを持っているが、決め手は足りない。"
          - text: "マグム"
            value: magumu
            correct: true
            feedback: "マグムの行動が、証拠といちばん一致している。"
          - text: "スナコ"
            value: sunako
            correct: false
            feedback: "スナコは手がかりを持っているが、決め手は足りない。"
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "マグム"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "マグムは、展示用の地球史年表で、"
      - type: dialog
        character: sensei
        text: "本来は「約」や幅をもって示すべき年代を"
      - type: dialog
        character: sensei
        text: "きりのよい数字に丸めた。"
      - type: dialog
        character: sensei
        text: "理由は、未来を不安に思う友だちに"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: magumu
        expression: worried
        position: center
      - type: dialog
        character: magumu
        text: "不安な気持ちを少しでもやわらげたかった"
      - type: dialog
        character: magumu
        text: "ぐらつきのある表現より、断言のほうが安心できると思った"
        expression: thinking
      - type: sprite
        character: magumu
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "Card 1 で年表の数字が不自然に整っているとわかる"
      - type: narration
        text: "Card 2 でマグムが「安心できる流れ」にしたかったと読める"
      - type: narration
        text: "Card 3 で地球史の年代には証拠に基づく幅があると整理する"
      - type: narration
        text: "Card 4 で、希望は長い変化の記録から語れると確認する"
      - type: sprite_group
        characters:
          - id: chisou
            expression: happy
          - id: ishikawa
            expression: happy
          - id: magumu
            expression: happy
          - id: sunako
            expression: happy
      - type: narration
        text: "地学ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide
