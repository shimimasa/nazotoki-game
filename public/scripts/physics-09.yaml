      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "科学部のグループ実験で「同じ実験を3回繰り返したのに、全く違う結果が出た」という問題が発生した。"
      - type: narration
        text: "チカラは「誰かがデータを改ざんした！"
      - type: narration
        text: "」と締切ギリギリに騒ぎ出した。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: omori
        expression: worried
        position: center
      - type: dialog
        character: omori
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: omori
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: chikara, expression: determined }
          - { id: nami, expression: thinking }
          - { id: hikaru, expression: thinking }
          - { id: omori, expression: worried }
      - type: narration
        text: "「物理探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "物理探偵団"
        subtitle: "Vol.9 データの衝突"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: chikara
        expression: thinking
        position: left
      - type: dialog
        character: chikara
        text: "締切が明日だったから……測定器の位置を変えたことが原因だったとは思ってなかった"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        expression: thinking
        position: right
      - type: dialog
        character: nami
        text: "3回の実験、条件が全部微妙に違う。室温・水平度・測定位置——これが結果の差を作ってる"
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        expression: thinking
        position: left
      - type: dialog
        character: hikaru
        text: "温度が3℃も違う。台も3回目は少し傾いてた。これ全部が結果に影響してる"
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        expression: worried
        position: right
      - type: dialog
        character: omori
        text: "同じ実験って思ってたけど……条件が全部同じじゃなかったんだね"
      - type: sprite
        character: omori
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「事件のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: chikara, expression: normal }
          - { id: nami, expression: normal }
          - { id: hikaru, expression: normal }
          - { id: omori, expression: worried }
      - type: choice
        id: q1
        text: "事件のきっかけになった行動をしたのは誰？"
        options:
          - label: "チカラ"
            value: chikara
            correct: false
            feedback: "チカラは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "ナミ"
            value: nami
            correct: false
            feedback: "ナミは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "ヒカル"
            value: hikaru
            correct: false
            feedback: "ヒカルは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "オモリ"
            value: omori
            correct: true
            feedback: "オモリの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "チカラは締切前日に3回分のデータを見て、数値が大幅に異なることに気づいた。"
      - type: dialog
        character: sensei
        text: "「誰かが故意にデータを変えた」という結論を先に立て、犯人探しを始めた。"
      - type: dialog
        character: sensei
        text: "しかし3回の実験は同じ人間（チカラ・ナミ・ヒカルが順番に担当）が行ったが、室温・実験台の水平・測定器の向きが各回でわずかに異なっていた。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: omori
        expression: worried
        position: center
      - type: dialog
        character: omori
        text: "同じ実験って思ってたけど……条件が全部同じじゃなかったんだね"
      - type: sprite
        character: omori
        expression: determined
      - type: dialog
        character: omori
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: omori
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・実験の条件統制: 科学実験では「変える条件」と「変えない条件」を分けることが大切。条件が変わると結果が変わることを理解する\n・帰納法: 複数のデータから共通点・差異点を見つけ、一般的な結論を導く推理スキル"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: chikara, expression: happy }
          - { id: nami, expression: happy }
          - { id: hikaru, expression: happy }
          - { id: omori, expression: happy }
      - type: narration
        text: "物理探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
