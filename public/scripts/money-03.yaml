scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: money-03/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}の「お{買|か}い{物|もの}シミュレーション」{授業|じゅぎょう}。{教室|きょうしつ}に{架空|かくう}のお{店|みせ}「あおばマート」を{作|つく}って、{値札|ねふだ}{付|つ}きの{商品|しょうひん}を{並|なら}べ、{予算|よさん}1000{円|えん}で{買|か}い{物|もの}をする{練習|れんしゅう}だ。"
      - type: narration
        text: "{買|か}い{物|もの}が{終|お}わり、ユウタが{嬉|うれ}しそうに{発表|はっぴょう}した。"
      - type: sprite
        character: yuta
        expression: happy
        position: left
      - type: dialog
        character: yuta
        text: "{定価|ていか}800{円|えん}のペンケースが、50%オフでさらにレジで20%オフ！ 50+20＝70%オフだから、800×0.3＝240{円|えん}で{買|か}えたぜ！ めっちゃお{得|とく}！"
      - type: sprite
        character: yuta
        action: hide
      - type: bgm
        action: stop
      - type: sprite
        character: sakura
        expression: thinking
        position: right
      - type: dialog
        character: sakura
        text: "ちょっと{待|ま}って。50%オフ→さらに20%オフって、70%オフじゃないよね……？"
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: bgm
        file: money-03/tension
      - type: dialog
        character: sensei
        text: "サクラさんの{疑問|ぎもん}は{大事|だいじ}ですね。ユウタくんの{計算|けいさん}は{正|ただ}しいでしょうか。そしてもう1つ——{値札|ねふだ}にも{秘密|ひみつ}があるかもしれません。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - character: yuta
            expression: determined
          - character: sakura
            expression: thinking
          - character: kaito
            expression: determined
          - character: nanoha
            expression: normal
      - type: narration
        text: "{割引|わりびき}の{計算|けいさん}を{検証|けんしょう}し、{値札|ねふだ}の{秘密|ひみつ}を{暴|あば}く{調査|ちょうさ}が{始|はじ}まった。"
      - type: sprite
        character: yuta
        action: hide
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: kaito
        action: hide
      - type: sprite
        character: nanoha
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "お金の探偵団 Vol.3"
        subtitle: "値下げのトリック"

  # ===== 証拠カード1: ユウタの計算 =====
  - id: evidence-1
    bg: classroom
    bgm: money-03/investigation
    steps:
      - type: title_card
        text: "ステップ1：調査"
      - type: narration
        text: "ユウタの{計算|けいさん}を{検算|けんざん}してみよう。"
      - type: narration
        text: "ユウタの{計算|けいさん}（{間違|まちが}い）——50%+20%＝70%オフ。800×0.3＝240{円|えん}。"
      - type: narration
        text: "{正|ただ}しい{計算|けいさん}（{因果|いんが}{連鎖|れんさ}）——①まず50%オフ：800×0.5＝400{円|えん}。"
      - type: narration
        text: "②400{円|えん}からさらに20%オフ：400×0.8＝320{円|えん}。"
      - type: se
        file: common/discover
      - type: narration
        text: "{正|ただ}しい{答|こた}えは320{円|えん}。ユウタの240{円|えん}は80{円|えん}も{安|やす}い。50%と20%は{足|た}し{算|ざん}ではなく、{段階的|だんかいてき}にかけ{算|ざん}するのが{正|ただ}しい。"

  # ===== 証拠カード2: 4人の比較表 =====
  - id: evidence-2
    bg: classroom
    bgm: money-03/investigation
    steps:
      - type: narration
        text: "4{人|にん}の{買|か}い{物|もの}{結果|けっか}を{表|ひょう}にまとめて{比較|ひかく}しよう。"
      - type: narration
        text: "ユウタ——ペンケース{定価|ていか}800{円|えん}。50%オフ→400{円|えん}。さらに20%オフ→320{円|えん}。でもユウタは240{円|えん}と{主張|しゅちょう}。❌ 80{円|えん}{安|やす}い。"
      - type: narration
        text: "サクラ——{定規|じょうぎ}{定価|ていか}500{円|えん}。50%オフ→250{円|えん}。20%オフ→200{円|えん}。{支払|しはら}い200{円|えん}。✅"
      - type: narration
        text: "カイト——ノート{定価|ていか}400{円|えん}。50%オフ→200{円|えん}。20%オフ→160{円|えん}。{支払|しはら}い160{円|えん}。✅"
      - type: narration
        text: "ナノハ——{色鉛筆|いろえんぴつ}{定価|ていか}300{円|えん}。50%オフ→150{円|えん}。20%オフ→120{円|えん}。{支払|しはら}い120{円|えん}。✅"
      - type: se
        file: common/discover
      - type: narration
        text: "{他|ほか}の3{人|にん}は{全員|ぜんいん}{正|ただ}しく{計算|けいさん}できている。ユウタだけ{間違|まちが}い。でも80{円|えん}の{差|さ}は{大|おお}きい。{本当|ほんとう}に{計算|けいさん}ミスだけだろうか？"

  # ===== 証拠カード3: 先生の商品リスト =====
  - id: evidence-3
    bg: classroom
    bgm: money-03/experiment
    steps:
      - type: narration
        text: "{先生|せんせい}が{授業|じゅぎょう}{前|まえ}に{作|つく}った{商品|しょうひん}リスト（{原本|げんぽん}）と、ユウタが{書|か}いた{値札|ねふだ}を{比|くら}べてみよう。"
      - type: narration
        text: "ペンケース——{原本|げんぽん}：600{円|えん}。{値札|ねふだ}：800{円|えん}。❌ 200{円|えん}の{差|さ}！"
      - type: narration
        text: "{定規|じょうぎ}——{原本|げんぽん}：500{円|えん}。{値札|ねふだ}：500{円|えん}。✅"
      - type: narration
        text: "ノート——{原本|げんぽん}：400{円|えん}。{値札|ねふだ}：400{円|えん}。✅"
      - type: narration
        text: "{色鉛筆|いろえんぴつ}——{原本|げんぽん}：300{円|えん}。{値札|ねふだ}：300{円|えん}。✅"
      - type: se
        file: common/discover
      - type: narration
        text: "ペンケースだけ{原本|げんぽん}と{値札|ねふだ}が200{円|えん}も{違|ちが}う。{値札|ねふだ}を{書|か}いたのはユウタ。"
      - type: sprite
        character: kaito
        expression: thinking
        position: right
      - type: dialog
        character: kaito
        text: "{月曜|げつよう}の{放課後|ほうかご}、ユウタが{教室|きょうしつ}で{値札|ねふだ}を{消|け}しゴムで{消|け}して{書|か}き{直|なお}してるのを見たぜ。{何回|なんかい}も{書|か}き{直|なお}してた。"
      - type: sprite
        character: kaito
        action: hide

  # ===== 証拠カード4: 値札の消し跡 =====
  - id: evidence-4
    bg: classroom
    bgm: money-03/experiment
    steps:
      - type: sprite
        character: sakura
        expression: surprised
        position: left
      - type: dialog
        character: sakura
        text: "ペンケースの{値札|ねふだ}をよく見たら、『800』の{数字|すうじ}の{下|した}にうっすら『600』が{透|す}けて見えるの。{消|け}しゴムで{消|け}した{跡|あと}がある！"
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: nanoha
        expression: determined
        position: right
      - type: dialog
        character: nanoha
        text: "{先生|せんせい}の{商品|しょうひん}リストではペンケースは600{円|えん}。でも{値札|ねふだ}は800{円|えん}。ユウタが{定価|ていか}を600{円|えん}から800{円|えん}に{書|か}き{換|か}えたってこと。"
      - type: sprite
        character: nanoha
        expression: thinking
      - type: dialog
        character: nanoha
        text: "ここで{面白|おもしろ}いことに{気|き}づいた。もし{本物|ほんもの}の{定価|ていか}600{円|えん}で{正|ただ}しく{計算|けいさん}すると——600→300→240{円|えん}。ユウタの『240{円|えん}』と{一致|いっち}する！"
      - type: sprite
        character: nanoha
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "ユウタの{計算|けいさん}ミス（50%+20%＝70%）で{出|だ}した240{円|えん}が、{偶然|ぐうぜん}にも{本物|ほんもの}の{定価|ていか}600{円|えん}で{正|ただ}しく{計算|けいさん}した{答|こた}えと{同|おな}じ。2つの{間違|まちが}いが{偶然|ぐうぜん}ぶつかった。"

  # ===== 証拠カード5: ユウタの動機 =====
  - id: card-5
    bg: classroom
    bgm: money-03/tension
    steps:
      - type: effect
        name: fade-out
      - type: effect
        name: fade-in
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "ユウタくんに{聞|き}きました。「{値札|ねふだ}の{定価|ていか}を{書|か}き{換|か}えた？」"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "ユウタくんの{答|こた}え——「うん。800{円|えん}に{変|か}えた。{定価|ていか}が{高|たか}い{方|ほう}が『すごく{安|やす}くなった！』って{感|かん}じるでしょ？ {面白|おもしろ}そうだと{思|おも}って」"
      - type: dialog
        character: sensei
        text: "これは『{二重|にじゅう}{価格|かかく}{表示|ひょうじ}』と{言|い}って、{本当|ほんとう}のお{店|みせ}でも{問題|もんだい}になるトリックです。{定価|ていか}をつり{上|あ}げてから{大幅|おおはば}に{値下|ねさ}げすると『すごくお{得|とく}！』に見えますが、{実際|じっさい}の{割引|わりびき}は{小|ちい}さい。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "ユウタの2つの{問題|もんだい}——①{計算|けいさん}ミス（50%+20%≠70%）。②{定価|ていか}の{書|か}き{換|か}え（600→800{円|えん}）。{好奇心|こうきしん}でやったことだが、{値段|ねだん}の{嘘|うそ}は{人|ひと}をだますこと。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: money-03/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}が{出|で}そろいました。{考|かんが}えてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        text: "値札をいじって計算をごまかしたのは誰？"
        options:
          - text: "ユウタ（値札担当で定価を書き換えた）"
            value: yuta
            feedback: "{値札|ねふだ}の{消|け}し{跡|あと}、{先生|せんせい}の{商品|しょうひん}リストとの200{円|えん}の{差|さ}、カイトの{目撃|もくげき}——{証拠|しょうこ}がそろっている。{計算|けいさん}ミスと{定価|ていか}{改|かい}ざんの{二重|にじゅう}の{問題|もんだい}。"
          - text: "サクラ（計算が間違っているのはサクラの方？）"
            value: sakura
            feedback: "サクラの{計算|けいさん}（500→250→200{円|えん}）は{正|ただ}しい。むしろ{最初|さいしょ}に{疑問|ぎもん}を{投|な}げかけた{側|がわ}だよ。"
          - text: "カイト（値札を見て何か細工した？）"
            value: kaito
            feedback: "カイトはユウタが{値札|ねふだ}を{書|か}き{直|なお}しているのを{目撃|もくげき}した{側|がわ}。カイトの{計算|けいさん}（400→200→160{円|えん}）も{正|ただ}しい。"
          - text: "ナノハ（商品リストを先に見ていたから怪しい）"
            value: nanoha
            feedback: "ナノハが{商品|しょうひん}リストを見ていたのは{情報|じょうほう}{収集|しゅうしゅう}。{値札|ねふだ}を{書|か}いたのはユウタであり、ナノハには{書|か}き{換|か}える{機会|きかい}がない。"
      - type: choice
        id: q2
        text: "50%オフ→さらに20%オフの正しい計算方法は？"
        options:
          - text: "50+20＝70%オフ（足し算）"
            value: addition
            feedback: "これがユウタの{間違|まちが}い。{割引|わりびき}は{足|た}し{算|ざん}ではない。{段階的|だんかいてき}にかけ{算|ざん}するのが{正|ただ}しい。"
          - text: "まず50%オフ→その金額から20%オフ（因果連鎖）"
            value: chain
            feedback: "{正解|せいかい}！ 800→400（50%オフ）→320（20%オフ）。{因果|いんが}{連鎖|れんさ}で{段階的|だんかいてき}に{計算|けいさん}する。「AだからB、BだからC」。"
          - text: "50%×20%＝10%オフ（かけ算）"
            value: multiplication
            feedback: "50%×20%は{違|ちが}うよ。{正|ただ}しくは「50%オフした{金額|きんがく}に、さらに20%オフ」。{順番|じゅんばん}にかけ{算|ざん}していく。"
          - text: "分からない。計算が難しい"
            value: unknown
            feedback: "{大丈夫|だいじょうぶ}。{覚|おぼ}えよう——まず{定価|ていか}を{半分|はんぶん}にする（50%オフ）。{次|つぎ}にその{金額|きんがく}の2{割|わり}を{引|ひ}く（20%オフ）。{順番|じゅんばん}に{計算|けいさん}すれば{大丈夫|だいじょうぶ}。"
      - type: choice
        id: q3
        text: "お店のセールで「お得！」を見たら、どうすべき？"
        options:
          - text: "割引率が大きければすぐ買う"
            value: big_discount_buy
            feedback: "{割引|わりびき}{率|りつ}だけで{判断|はんだん}すると、{今回|こんかい}のユウタのように{間違|まちが}える。{定価|ていか}が{本物|ほんもの}か、{計算|けいさん}が{合|あ}っているか{確認|かくにん}しよう。"
          - text: "定価が本物か確認する"
            value: verify_price
            feedback: "{定価|ていか}をつり{上|あ}げてから{値下|ねさ}げする「{二重|にじゅう}{価格|かかく}{表示|ひょうじ}」はよくあるトリック。{他|ほか}のお{店|みせ}の{値段|ねだん}と{比|くら}べてみよう。"
          - text: "自分で計算して確認する"
            value: self_calculate
            feedback: "{感覚|かんかく}ではなく{計算|けいさん}で{確認|かくにん}。「{本当|ほんとう}にいくら{安|やす}くなった？」を{数字|すうじ}で{出|だ}す{習慣|しゅうかん}が{大事|だいじ}。"
          - text: "全部やる（定価確認＋計算＋他店比較）"
            value: all_three
            feedback: "{完璧|かんぺき}。{定価|ていか}を{疑|うたが}い、{自分|じぶん}で{計算|けいさん}し、{他|ほか}のお{店|みせ}と{比|くら}べる。この3つで「{本当|ほんとう}のお{得|とく}」が{分|わ}かる。"

  # ===== 真実: サクラ =====
  - id: truth-sakura
    bg: classroom
    bgm: money-03/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: sprite
        character: sakura
        expression: normal
        position: right
      - type: dialog
        character: sakura
        text: "ペンケースの{値札|ねふだ}、『800』の{下|した}にうっすら『600』が{透|す}けて見えたの。{消|け}しゴムで{消|け}した{跡|あと}がはっきり{残|のこ}ってた。"
      - type: sprite
        character: sakura
        expression: determined
      - type: dialog
        character: sakura
        text: "『お{得|とく}！』に{飛|と}びつく{前|まえ}に{計算|けいさん}すること。{今回|こんかい}それを{学|まな}んだ。50%+20%は70%じゃないって、{最初|さいしょ}に{気|き}づけてよかった。"
      - type: sprite
        character: sakura
        action: hide

  # ===== 真実: カイト =====
  - id: truth-kaito
    bg: classroom
    steps:
      - type: sprite
        character: kaito
        expression: thinking
        position: left
      - type: dialog
        character: kaito
        text: "{月曜|げつよう}にユウタが{値札|ねふだ}を{消|け}しゴムで{何回|なんかい}も{書|か}き{直|なお}してるのを見たんだ。あのとき「{丁寧|ていねい}に{書|か}いてるな」って{思|おも}ったけど、{定価|ていか}を{変|か}えてたんだ。"
      - type: sprite
        character: kaito
        expression: determined
      - type: dialog
        character: kaito
        text: "{値段|ねだん}をいじるのはズルだ。でもユウタは{悪気|わるぎ}なく『{面白|おもしろ}そう』って{思|おも}っただけなんだよな。{本当|ほんとう}のお{店|みせ}でも{同|おな}じことが{起|お}きてるって{聞|き}いて、びっくりだぜ。"
      - type: sprite
        character: kaito
        action: hide

  # ===== 真実: ナノハ =====
  - id: truth-nanoha
    bg: classroom
    steps:
      - type: sprite
        character: nanoha
        expression: normal
        position: right
      - type: dialog
        character: nanoha
        text: "{先生|せんせい}の{商品|しょうひん}リストでペンケースの{定価|ていか}は600{円|えん}。{値札|ねふだ}は800{円|えん}。200{円|えん}の{差|さ}。ユウタが{書|か}き{換|か}えた。"
      - type: sprite
        character: nanoha
        expression: thinking
      - type: dialog
        character: nanoha
