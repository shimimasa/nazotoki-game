scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{音楽|おんがく}{発表会|はっぴょうかい}の{審査|しんさ}は「{録音|ろくおん}{提出|ていしゅつ}」{方式|ほうしき}。ハーモニーズは{昨日|きのう}の{放課後|ほうかご}、{音楽室|おんがくしつ}で{合奏|がっそう}を{録音|ろくおん}し、パソコンに{保存|ほぞん}した。"
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "{素晴|すば}らしい{演奏|えんそう}！ ほぼ{完璧|かんぺき}ね。フルートが{特|とく}にきれいだったわ。{音|おと}の{揺|ゆ}れもなく{安定|あんてい}していた。"
        expression: happy
      - type: sprite
        character: yamada
        action: hide
      - type: sprite
        character: kaori
        expression: thinking
        position: left
      - type: dialog
        character: kaori
        text: "あれ？ {昨日|きのう}の{録音|ろくおん}と{何|なに}か{違|ちが}う{気|き}がする……。"
        expression: thinking
      - type: sprite
        character: kaori
        action: hide
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "\"{録音|ろくおん}データを{詳|くわ}しく{調|しら}べると、**フルートパートだけ**{音|おと}の{響|ひび}きが{他|ほか}のパートと{微妙|びみょう}に{違|ちが}う。まるで**{別|べつ}の{場所|ばしょ}で{録音|ろくおん}されたような{音|おと}**。"
      - type: narration
        text: "「{録音|ろくおん}だから{正|ただ}しい」——{本当|ほんとう}にそう？"
      - type: narration
        text: "\"{大事|だいじ}な{知識|ちしき}——{残響|ざんきょう}。{音|おと}を{出|だ}した{後|あと}に{壁|かべ}や{天井|てんじょう}に{反射|はんしゃ}して{返|かえ}ってくる{音|おと}のこと。{広|ひろ}い{部屋|へや}＝{残響|ざんきょう}が{長|なが}い。{狭|せま}い{部屋|へや}＝{残響|ざんきょう}が{短|みじか}い。"
      - type: effect
        name: fade-out
      - type: title_card
        text: "録音の嘘"
        subtitle: "音楽探偵団 Vol.8"

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1"
        subtitle: "先生の評価と出入りノート"
      - type: narration
        text: "先生は「{完璧|かんぺき}。フルートが{特|とく}にきれい。{音|おと}の{揺|ゆ}れもない」と{絶賛|ぜっさん}。でも{昨日|きのう}の{録音|ろくおん}{時|じ}、コトネのフルートに{高|たか}い{音|おと}で{少|すこ}し{音|おと}が{揺|ゆ}れた{瞬間|しゅんかん}があったはず。なのに「{揺|ゆ}れもない」？"
      - type: narration
        text: "{出入|でい}りノート——15:32にカオリが{保存|ほぞん}。15:35ヒビキ{退室|たいしつ}。15:40ソウタ{退室|たいしつ}。15:50カオリ{退室|たいしつ}。**16:10コトネ{退室|たいしつ}（{最後|さいご}）**。"
      - type: narration
        text: "15:50〜16:10にパソコンを{操作|そうさ}できたのは**コトネだけ**。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: "ステップ2"
        subtitle: "タイムスタンプと直感"
      - type: sprite
        character: kaori
        expression: determined
        position: left
      - type: dialog
        character: kaori
        text: "{録音|ろくおん}ファイルのタイムスタンプを{確認|かくにん}したの。{作成|さくせい}は15:32（わたしが{保存|ほぞん}した{時刻|じこく}）。でも**{最終|さいしゅう}{更新|こうしん}が15:55**。わたしは15:50に{帰|かえ}った。15:55に{操作|そうさ}したのは{誰|だれ}？"
        expression: determined
      - type: sprite
        character: kaori
        action: hide
      - type: narration
        text: "ファイルサイズも{作成|さくせい}{時|じ}より**{少|すこ}し{大|おお}きくなっている**。{何|なに}かが{追加|ついか}された？"
      - type: sprite
        character: kaori
        expression: thinking
        position: right
      - type: dialog
        character: kaori
        text: "それと、{今朝|けさ}{録音|ろくおん}を{聴|き}いたとき、{全体的|ぜんたいてき}にいいんだけど、**フルートだけ{音|おと}の『{雰囲気|ふんいき}』が{違|ちが}う{気|き}がする**。クリアすぎる？ {響|ひび}きが{違|ちが}う？ うまく{言|い}えないけど……"
        expression: thinking
      - type: sprite
        character: kaori
        action: hide
      - type: narration
        text: "「{雰囲気|ふんいき}が{違|ちが}う」「クリアすぎる」——{同|おな}じ{部屋|へや}で{録音|ろくおん}したなら、{全|ぜん}パートの{響|ひび}きは{同|おな}じはず。1パートだけ{違|ちが}うなら……？"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "決定的証拠"
        subtitle: "残響分析"
      - type: effect
        name: fade-in
      - type: sprite
        character: souta
        expression: determined
        position: left
      - type: dialog
        character: souta
        text: "{録音|ろくおん}を{注意深|ちゅういぶか}く{聴|き}いて{分析|ぶんせき}した。ピアノ・トランペット・パーカッションの{残響|ざんきょう}は{約|やく}1.5{秒|びょう}。{音楽室|おんがくしつ}の{広|ひろ}い{響|ひび}きだ。"
        expression: determined
      - type: dialog
        character: souta
        text: "でも**フルート（コトネ）の{残響|ざんきょう}は{約|やく}0.3{秒|びょう}**。{乾|かわ}いた{音|おと}。{反射|はんしゃ}がない。これは{音楽室|おんがくしつ}の{音|おと}じゃない——**{狭|せま}い{部屋|へや}**で{録音|ろくおん}された{音|おと}だ。"
        expression: surprised
      - type: sprite
        character: souta
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "**フルートだけ{残響|ざんきょう}が{短|みじか}い**。{音楽室|おんがくしつ}（{約|やく}1.5{秒|びょう}）と{全|まった}く{違|ちが}う。{狭|せま}い{部屋|へや}（{自宅|じたく}の{個室|こしつ}など）で{録音|ろくおん}された{音|おと}の{特徴|とくちょう}。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "さらに——{昨日|きのう}あったフルートの{音揺|おとゆ}れが、{今朝|けさ}の{録音|ろくおん}では**{完全|かんぜん}に{消|き}えている**。{他|ほか}の3パートには{小|ちい}さなミスがそのまま{残|のこ}っているのに、**フルートだけ『{完璧|かんぺき}』**。{不自然|ふしぜん}。"
      - type: sprite
        character: hibiki
        expression: thinking
        position: right
      - type: dialog
        character: hibiki
        text: "「{完璧|かんぺき}な{録音|ろくおん}」は{怪|あや}しいんじゃないか？ {昨日|きのう}のリハで{完璧|かんぺき}だったとは{思|おも}えない。{誰|だれ}かが{録音|ろくおん}を「{良|よ}く」した？"
        expression: thinking
      - type: sprite
        character: hibiki
        action: hide
      - type: narration
        text: "\"{因果|いんが}の{連鎖|れんさ}——コトネのフルートにミスがあった → コトネは{自宅|じたく}で{完璧|かんぺき}なフルートを{録|と}り{直|なお}した → 15:55にパソコンでフルート{部分|ぶぶん}を{上書|うわが}きした → フルートだけ{残響|ざんきょう}が{違|ちが}う。"
      - type: narration
        text: "「{録音|ろくおん}だから{正|ただ}しい」と{信|しん}じていたら、この{改|かい}ざんには{気|き}づけなかった。**「〜だから{正|ただ}しい」という{思|おも}い{込|こ}み**を{疑|うたが}うことが、{真実|しんじつ}にたどり{着|つ}く{鍵|かぎ}。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: "推理タイム"
        subtitle: "犯人は誰だ？"
      - type: narration
        text: "{証拠|しょうこ}をまとめよう。タイムスタンプ15:55に{更新|こうしん}（コトネだけ{在室|ざいしつ}）。フルートだけ{残響|ざんきょう}が{短|みじか}い（{自宅|じたく}{録音|ろくおん}）。ミスが{消|き}えている（{録|と}り{直|なお}し）。「{録音|ろくおん}だから{正|ただ}しい」は{認知|にんち}バイアス。"
      - type: choice
        id: q1
        question: "録音データを改ざんした犯人は？"
        options:
          - text: コトネ（15:55に1人＋残響が違う＋ミスが消えた＋みんなの評価を守りたかった）
            value: kotone
            correct: true
            feedback: "{正解|せいかい}！ コトネは{自分|じぶん}のフルートのミスを{消|け}すため、{自宅|じたく}で{録|と}り{直|なお}した{完璧|かんぺき}なフルートで{上書|うわが}きした。でも{自宅|じたく}と{音楽室|おんがくしつ}の{残響|ざんきょう}が{違|ちが}い、{改|かい}ざんがバレた。"
          - text: カオリ（タイムスタンプの異常に気づいた人）
            value: kaori
            feedback: "カオリはタイムスタンプで{異常|いじょう}を{発見|はっけん}した{側|がわ}。15:50に{帰|かえ}っているから15:55の{操作|そうさ}は{不可能|ふかのう}だよ。"
          - text: ソウタ（残響分析をした人）
            value: souta
            feedback: "ソウタは{残響|ざんきょう}の{違|ちが}いを{発見|はっけん}した{側|がわ}。15:40に{帰|かえ}っているよ。"
          - text: ヒビキ（「完璧は怪しい」と気づいた人）
            value: hibiki
            feedback: "ヒビキは「{完璧|かんぺき}すぎる」に{気|き}づいた{側|がわ}。15:35に{帰|かえ}った{最初|さいしょ}の{退室者|たいしつしゃ}だよ。"

  # ==================== 真実：コトネ ====================
  - id: truth-kotone
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
        subtitle: "コトネの告白"
      - type: effect
        name: fade-in
      - type: sprite
        character: kotone
        expression: worried
        position: center
      - type: dialog
        character: kotone
        text: "……ごめんなさい。{録音|ろくおん}を{上書|うわが}きしたのは、わたしです。"
        expression: worried
      - type: dialog
        character: kotone
        text: "{昨日|きのう}の{録音|ろくおん}で、わたしのフルートに{高|たか}い{音|おと}で{音|おと}が{揺|ゆ}れるミスがあったの。「みんなの{評価|ひょうか}が{下|さ}がる。{足|あし}を{引|ひ}っ{張|ぱ}りたくない」って。"
        expression: thinking
      - type: dialog
        character: kotone
        text: "{昨夜|さくや}、{自宅|じたく}でミスのない{完璧|かんぺき}なフルートパートを{録音|ろくおん}して、USBメモリで{持|も}ってきて、{合奏|がっそう}データのフルート{部分|ぶぶん}だけ{上書|うわが}きした。"
        expression: worried
      - type: dialog
        character: kotone
        text: "でも{自宅|じたく}の{部屋|へや}は{狭|せま}くて{残響|ざんきょう}が{短|みじか}い。{音楽室|おんがくしつ}の{残響|ざんきょう}とは{全然|ぜんぜん}{違|ちが}ったんだ……ごめんなさい。"
        expression: worried
      - type: sprite
        character: kotone
        action: hide

  # ==================== 真実：他のメンバー ====================
  - id: truth-others
    bg: classroom
    steps:
      - type: sprite
        character: souta
        expression: thinking
        position: left
      - type: dialog
        character: souta
        text: "{残響|ざんきょう}の{違|ちが}い——{音楽室|おんがくしつ}は1.5{秒|びょう}、コトネの{部屋|へや}は0.3{秒|びょう}。{同|おな}じフルートでも{録音|ろくおん}した{場所|ばしょ}で{全然|ぜんぜん}{音|おと}が{変|か}わるんだ。"
        expression: thinking
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: kaori
        expression: determined
        position: right
      - type: dialog
        character: kaori
        text: "「{何|なに}か{違|ちが}う」っていう{直感|ちょっかん}は{正|ただ}しかった。{直感|ちょっかん}も{大事|だいじ}な{情報源|じょうほうげん}なんだね。"
        expression: determined
      - type: sprite
        character: kaori
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "{残響|ざんきょう}——{音|おと}が{壁|かべ}や{天井|てんじょう}に{反射|はんしゃ}して{返|かえ}ってくる{響|ひび}き。{同|おな}じフルートでも{録音|ろくおん}した{場所|ばしょ}で{響|ひび}きが{変|か}わる。この{知識|ちしき}が{改|かい}ざんを{見抜|みぬ}いたのよ。"
        expression: happy
      - type: dialog
        character: yamada
        text: "「{録音|ろくおん}だから{正|ただ}しい」は{思|おも}い{込|こ}み——{認知|にんち}バイアス。データでも、ニュースでも、「〜だから{正|ただ}しい」と{思|おも}ったとき、{一度|いちど}{立|た}ち{止|ど}まって{疑|うたが}ってみて。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "ミスも{含|ふく}めてみんなの{演奏|えんそう}。{完璧|かんぺき}じゃなくても、みんなで{作|つく}った{音楽|おんがく}には{価値|かち}がある。"
      - type: narration
        text: "「〜だから{正|ただ}しい」と{思|おも}い{込|こ}んだとき、{立|た}ち{止|ど}まって{疑|うたが}う。それが{認知|にんち}バイアスを{克服|こくふく}する{力|ちから}。"
      - type: effect
        name: fade-out
