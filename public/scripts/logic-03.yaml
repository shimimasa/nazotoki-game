scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "論理ミステリー Vol.3"
        subtitle: "アイスがとけたせい?"
      - type: sprite_group
        characters:
          - id: ron
            expression: normal
          - id: rika
            expression: normal
          - id: koto
            expression: normal
          - id: kana
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: ron
        expression: normal
        position: left
      - type: dialog
        character: ron
        text: "保冷剤はしばらく置かれていたが、長時間ではなかった"
      - type: dialog
        character: ron
        text: "保冷剤はしばらく置かれていたが、長時間ではなかった"
        expression: thinking
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        expression: normal
        position: right
      - type: dialog
        character: rika
        text: "金曜日の放課後、保冷剤が観察コーナーの近くにしばらく置かれていた"
      - type: dialog
        character: rika
        text: "金曜日の放課後、保冷剤が観察コーナーの近くにしばらく置かれていた"
        expression: thinking
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        expression: normal
        position: left
      - type: dialog
        character: koto
        text: "木曜日の時点で、土の表面が少し乾いているという記録がある"
      - type: dialog
        character: koto
        text: "木曜日の時点で、土の表面が少し乾いているという記録がある"
        expression: thinking
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        expression: normal
        position: right
      - type: dialog
        character: kana
        text: "土曜日の水やり当番はリカだった"
      - type: dialog
        character: kana
        text: "土曜日の水やり当番はリカだった"
        expression: thinking
      - type: sprite
        character: kana
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: ron
            expression: thinking
          - id: rika
            expression: thinking
          - id: koto
            expression: thinking
          - id: kana
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ロン"
            value: ron
            correct: false
            feedback: "ロンは手がかりを持っているが、決め手は足りない。"
          - text: "リカ"
            value: rika
            correct: true
            feedback: "リカの行動が、証拠といちばん一致している。"
          - text: "コト"
            value: koto
            correct: false
            feedback: "コトは手がかりを持っているが、決め手は足りない。"
          - text: "カナ"
            value: kana
            correct: false
            feedback: "カナは手がかりを持っているが、決め手は足りない。"
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "リカ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: rika
        expression: worried
        position: center
      - type: dialog
        character: rika
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: rika
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "AのあとにBが起きても、AがBの原因とは限らない"
      - type: narration
        text: "原因を考えるときは、変化の始まりと継続条件を見る必要がある"
      - type: narration
        text: "目立つ出来事に引っぱられず、記録で確かめることが論理的思考につながる"
      - type: sprite_group
        characters:
          - id: ron
            expression: happy
          - id: rika
            expression: happy
          - id: koto
            expression: happy
          - id: kana
            expression: happy
      - type: narration
        text: "論理ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
