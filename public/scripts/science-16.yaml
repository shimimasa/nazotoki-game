scenes:
  - id: prologue
    bg: nature-outdoor
    bgm: science-16/opening
    steps:
      - type: narration
        text: "{学校|がっこう}の{裏|うら}を{流|なが}れる{小川|おがわ}で、みんなで{作|つく}った「{流|なが}れる{水|みず}の{実験|じっけん}モデル」——{小石|こいし}のダムと{水路|すいろ}。"
      - type: sprite_group
        characters:
          - { id: aoi, expression: surprised }
          - { id: sakura, expression: thinking }
          - { id: kouta, expression: worried }
          - { id: mizuki, expression: worried }
      - type: bgm
        action: stop
      - type: se
        sound: common/tension
      - type: narration
        speed: slow
        text: "{昼休|ひるやす}みのあと、{上流|じょうりゅう}の{実験|じっけん}モデルが{壊|こわ}されていた！ ダムがバラバラ、{水路|すいろ}は{埋|う}められている。"
      - type: narration
        text: "4{人|にん}とも「{自分|じぶん}じゃない」と{言|い}う。でも{川|かわ}は{嘘|うそ}をつかない。{壊|こわ}された{痕跡|こんせき}は{水|みず}の{流|なが}れに{乗|の}って{下流|かりゅう}に{証拠|しょうこ}を{残|のこ}していた。"
      - type: sprite
        id: aoi
        action: hide
      - type: sprite
        id: sakura
        action: hide
      - type: sprite
        id: kouta
        action: hide
      - type: sprite
        id: mizuki
        action: hide
      - type: sprite
        id: sensei
        position: center
        expression: thinking
      - type: bgm
        track: science-16/tension
      - type: dialog
        character: sensei
        text: "{流|なが}れる{水|みず}の3つの{働|はたら}き——{侵食|しんしょく}・{運搬|うんぱん}・{堆積|たいせき}——の{知識|ちしき}で{証拠|しょうこ}を{読|よ}み{解|と}き、{犯人|はんにん}を{突|つ}き{止|と}めてください。"
      - type: sprite
        id: sensei
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "川が運んだ証拠"
        subtitle: "サイエンス捜査班 Vol.16"

  - id: evidence-1
    bg: nature-outdoor
    bgm: science-16/investigation
    steps:
      - type: effect
        name: fade-in
      - type: title_card
        text: "ステップ1：調査"
        subtitle: "証拠カード1 — 流れる水の3つの働き"
      - type: narration
        text: "{侵食|しんしょく}：{水|みず}が{地面|じめん}を{削|けず}る。{流|なが}れが{速|はや}いところほど{強|つよ}い。{上流|じょうりゅう}で{特|とく}に{強|つよ}い。"
      - type: narration
        text: "{運搬|うんぱん}：{水|みず}が{土砂|どしゃ}（{砂|すな}や{石|いし}）を{運|はこ}ぶ。{上流|じょうりゅう}→{下流|かりゅう}に{向|む}かって{運|はこ}ぶ。{堆積|たいせき}：{流|なが}れがゆるやかな{場所|ばしょ}に{土砂|どしゃ}が{溜|た}まる。{下流|かりゅう}やカーブの{内側|うちがわ}。"
      - type: se
        sound: common/discover
      - type: narration
        text: "{上流|じょうりゅう}の{石|いし}は{大|おお}きくて{角|かく}ばっている。{下流|かりゅう}の{石|いし}は{小|ちい}さくて{丸|まる}い。もし{下流|かりゅう}で「{角|かく}ばった{石|いし}」が{見|み}つかったら——{最近|さいきん}{上流|じょうりゅう}から{来|き}た{石|いし}！"

  - id: evidence-2
    bg: nature-outdoor
    steps:
      - type: title_card
        text: "証拠カード2 — 上流の現場"
      - type: narration
        text: "{上流|じょうりゅう}の{実験|じっけん}モデルの{跡|あと}。{小石|こいし}のダムがバラバラに{崩|くず}されている。{石|いし}がほとんどない——{川|かわ}に{流|なが}された。"
      - type: se
        sound: common/discover
      - type: narration
        text: "ダムの{跡|あと}の{地面|じめん}がV{字|じ}に{深|ふか}く{削|けず}られている——{侵食|しんしょく}。{小石|こいし}が{下流|かりゅう}{方向|ほうこう}に{流|なが}れた{跡|あと}——{運搬|うんぱん}。ぬかるみにスニーカーの{足跡|あしあと}（{約|やく}23cm）。"

  - id: evidence-3
    bg: nature-outdoor
    steps:
      - type: title_card
        text: "証拠カード3 — 下流のカーブ"
      - type: narration
        text: "{下流|かりゅう}のカーブの{内側|うちがわ}を{観察|かんさつ}。{角|かく}ばった{小石|こいし}がたくさん{溜|た}まっている。{下流|かりゅう}の{石|いし}は{普通|ふつう}{丸|まる}いのに、{角|かく}ばっている——{上流|じょうりゅう}から{最近|さいきん}{来|き}た{石|いし}。"
      - type: se
        sound: common/discover
      - type: narration
        text: "{石|いし}の{種類|しゅるい}は{実験|じっけん}モデルのダムに{使|つか}った{石|いし}と{同|おな}じ！ {新|あたら}しい{砂|すな}が{石|いし}の{上|うえ}に{薄|うす}く{被|かぶ}っている→{最近|さいきん}{流|なが}れてきた。{川|かわ}が{証拠|しょうこ}を{運|はこ}んでくれた！"

  - id: evidence-4
    bg: nature-outdoor
    bgm: science-16/experiment
    steps:
      - type: title_card
        text: "証拠カード4 — アリバイと目撃"
      - type: narration
        text: "{昼休|ひるやす}み（12:15〜13:00）の4{人|にん}。アオイ：{図書室|としょしつ}。サクラ：{下流|かりゅう}で{観察|かんさつ}（12:40ごろ{角|かく}ばった{石|いし}を{発見|はっけん}）。コウタ：「{中流|ちゅうりゅう}で{観察|かんさつ}」と{主張|しゅちょう}。ミズキ：{岸辺|きしべ}で{観察|かんさつ}。"
      - type: se
        sound: common/discover
      - type: narration
        text: "ミズキの{目撃|もくげき}：12:30ごろ{上流|じょうりゅう}で{水|みず}しぶき。{青|あお}い{上着|うわぎ}の{人|ひと}がしゃがんでいた。コウタの{証言|しょうげん}は{曖昧|あいまい}——{中流|ちゅうりゅう}で{何|なに}を{観察|かんさつ}したか{具体的|ぐたいてき}に{言|い}えない。コウタは{今日|きょう}{何色|なにいろ}の{上着|うわぎ}を{着|き}ている？"

  - id: testimony
    bg: nature-outdoor
    bgm: science-16/investigation
    steps:
      - type: title_card
        text: "ステップ2：聞き取り"
      - type: sprite
        id: aoi
        position: left
        expression: determined
      - type: dialog
        character: aoi
        text: "{昼休|ひるやす}みのあとに{上流|じょうりゅう}を{確認|かくにん}したら、ダムが{壊|こわ}されてた！ V{字|じ}に{削|けず}れた{跡|あと}と、{石|いし}が{下流|かりゅう}に{流|なが}れた{跡|あと}があった。{侵食|しんしょく}と{運搬|うんぱん}の{証拠|しょうこ}だよ。"
      - type: sprite
        id: aoi
        action: hide
      - type: sprite
        id: sakura
        position: right
        expression: thinking
      - type: dialog
        character: sakura
        text: "わたしは{下流|かりゅう}のカーブの{内側|うちがわ}にいた。12:40ごろ、{角|かく}ばった{石|いし}がたくさん{溜|た}まっているのに{気|き}づいた。{下流|かりゅう}の{石|いし}は{普通|ふつう}{丸|まる}いはず——{上流|じょうりゅう}から{最近|さいきん}{来|き}た{石|いし}。ダムの{石|いし}と{同|おな}じ{種類|しゅるい}。"
      - type: sprite
        id: sakura
        action: hide
      - type: sprite
        id: kouta
        position: left
        expression: normal
      - type: dialog
        character: kouta
        text: "おれは{中流|ちゅうりゅう}で{観察|かんさつ}してたぜ。{川|かわ}の{流|なが}れを{見|み}てた……{特|とく}に{変|か}わったことはなかった。ダムは{壊|こわ}してないよ。"
      - type: sprite
        id: kouta
        action: hide
      - type: sprite
        id: mizuki
        position: right
        expression: worried
      - type: dialog
        character: mizuki
        text: "ぼくは{岸辺|きしべ}から{川|かわ}{全体|ぜんたい}を{見|み}てた。12:30ごろ、{上流|じょうりゅう}で{水|みず}しぶきが{上|あ}がったのが{見|み}えた。{青|あお}い{上着|うわぎ}の{人|ひと}がしゃがんでいたみたい。"
      - type: sprite
        id: mizuki
        action: hide

  - id: evidence-5
    bg: nature-outdoor
    bgm: science-16/tension
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "★新事実★"
        subtitle: "証拠カード5 — 視点切替で真相を繋げ"
      - type: effect
        name: fade-in
      - type: narration
        text: "4つの{視点|してん}を{統合|とうごう}しよう。①{上流|じょうりゅう}（アオイ）：ダム{破壊|はかい}、{侵食|しんしょく}{痕|こん}、{石|いし}が{下流|かりゅう}へ{流|なが}れた{跡|あと}。②{下流|かりゅう}（サクラ）：カーブ{内側|うちがわ}にダムの{石|いし}が{堆積|たいせき}。{角|かく}ばった{石|いし}＝{上流|じょうりゅう}から{来|き}た。"
      - type: narration
        text: "③{岸辺|きしべ}（ミズキ）：12:30に{上流|じょうりゅう}で{水|みず}しぶき。{青|あお}い{上着|うわぎ}の{人|ひと}。④{中流|ちゅうりゅう}（コウタ）：「{中流|ちゅうりゅう}にいた」と{主張|しゅちょう}。でも{具体的|ぐたいてき}な{観察|かんさつ}{内容|ないよう}がない。"
      - type: se
        sound: common/discover
      - type: narration
        text: "{川|かわ}が{運|はこ}んだ{証拠|しょうこ}の{道|みち}——12:30に{上流|じょうりゅう}でダムが{壊|こわ}される→{侵食|しんしょく}でV{字|じ}に{削|けず}れる→{運搬|うんぱん}で{小石|こいし}が{下流|かりゅう}へ→12:40に{下流|かりゅう}カーブ{内側|うちがわ}に{堆積|たいせき}。"
      - type: se
        sound: common/tension
      - type: narration
        speed: slow
        text: "コウタは{青|あお}い{上着|うわぎ}を{着|き}ている。ミズキが{上流|じょうりゅう}で{見|み}た{人物|じんぶつ}と{一致|いっち}。「{中流|ちゅうりゅう}にいた」{証言|しょうげん}は{曖昧|あいまい}。4つの{視点|してん}を{統合|とうごう}すると——{犯人|はんにん}はコウタ！"

  - id: questions
    bg: nature-outdoor
    bgm: science-16/tension
    steps:
      - type: title_card
        text: "ステップ3：推理"
      - type: choice
        id: q1
        text: "ダムの{小石|こいし}が{下流|かりゅう}のカーブ{内側|うちがわ}に{溜|た}まっていたのはなぜ？"
        options:
          - text: "誰かが運んだ"
            value: someone_carried
            feedback: "{人|ひと}が{運|はこ}んだのではなく、{川|かわ}の{水|みず}が{運|はこ}んだんだ。{運搬|うんぱん}（{水|みず}が{土砂|どしゃ}を{運|はこ}ぶ）と{堆積|たいせき}（{流|なが}れがゆるやかな{場所|ばしょ}に{溜|た}まる）の{働|はたら}き。"
          - text: "川の運搬と堆積の働き"
            value: river_deposition
            feedback: "そのとおり！ {上流|じょうりゅう}で{壊|こわ}された{石|いし}が{水流|すいりゅう}で{運搬|うんぱん}され、{流|なが}れがゆるやかなカーブ{内側|うちがわ}に{堆積|たいせき}した。{川|かわ}が{証拠|しょうこ}を{運|はこ}んだんだ。"
          - text: "もともとそこにあった"
            value: originally_there
            feedback: "{下流|かりゅう}の{石|いし}は{普通|ふつう}{丸|まる}い。でも{見|み}つかったのは{角|かく}ばった{石|いし}。{上流|じょうりゅう}から{最近|さいきん}{来|き}た{証拠|しょうこ}。"
      - type: choice
        id: q2
        text: "{実験|じっけん}モデルを{壊|こわ}したのは{誰|だれ}？"
        options:
          - text: "アオイ"
            value: aoi
            feedback: "アオイは{図書室|としょしつ}にいて、{昼休|ひるやす}み{後|ご}に{上流|じょうりゅう}を{確認|かくにん}した。{壊|こわ}したのではなく{発見|はっけん}した{側|がわ}。"
          - text: "サクラ"
            value: sakura
            feedback: "サクラは{下流|かりゅう}で{観察|かんさつ}していた。{堆積物|たいせきぶつ}を{発見|はっけん}した{証人|しょうにん}。"
          - text: "コウタ"
            value: kouta
            feedback: "「{中流|ちゅうりゅう}にいた」と{言|い}うが{具体的|ぐたいてき}な{観察|かんさつ}{内容|ないよう}がない。{青|あお}い{上着|うわぎ}がミズキの{目撃|もくげき}と{一致|いっち}。4つの{視点|してん}がすべてコウタを{指|さ}している。"
          - text: "ミズキ"
            value: mizuki
            feedback: "ミズキは{岸辺|きしべ}から{全体|ぜんたい}を{見|み}ていた。{上流|じょうりゅう}の{人影|ひとかげ}を{目撃|もくげき}した{証人|しょうにん}。"

  - id: truth-kouta
    bg: nature-outdoor
    bgm: science-16/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: narration
        speed: slow
        text: "{実験|じっけん}モデルのダムを{壊|こわ}したのは——コウタだった。"
      - type: sprite
        id: kouta
        position: center
        expression: worried
      - type: dialog
        character: kouta
        text: "ごめん。{隣|となり}のクラスの{友|とも}だちのタクヤが{困|こま}ってたんだ。「おまえらのダムのせいで{川|かわ}の{流|なが}れが{変|か}わって、おれたちの{観察|かんさつ}ポイントの{水量|すいりょう}が{減|へ}った」って。"
      - type: dialog
        character: kouta
        expression: worried
        text: "12:30に{上流|じょうりゅう}に{行|い}ってダムの{小石|こいし}を{手|て}で{崩|くず}した。{壊|こわ}せば{水|みず}の{流|なが}れが{元|もと}に{戻|もど}ると{思|おも}った。でも{壊|こわ}したとき{小石|こいし}がどんどん{川|かわ}に{流|なが}れていって、{止|と}められなかった……。"
      - type: dialog
        character: kouta
        text: "{友|とも}だちを{守|まも}りたかった。でもみんなが{何日|なんにち}もかけて{作|つく}った{実験|じっけん}モデルを{壊|こわ}してしまった。{先|さき}に{先生|せんせい}に{相談|そうだん}すればよかった。ごめんなさい。"
      - type: sprite
        id: kouta
        action: hide

  - id: truth-others
    bg: nature-outdoor
    steps:
      - type: narration
        text: "みんなが{知|し}っていたことも{明|あ}かされた。"
      - type: sprite
        id: aoi
        position: left
        expression: determined
      - type: dialog
        character: aoi
        text: "{上流|じょうりゅう}の{侵食|しんしょく}{痕|こん}と{運搬|うんぱん}の{跡|あと}を{見|み}つけた。{川|かわ}が{証拠|しょうこ}を{運|はこ}んだんだって{気|き}づいたの。"
      - type: sprite
        id: aoi
        action: hide
      - type: sprite
        id: sakura
        position: right
        expression: determined
      - type: dialog
        character: sakura
        text: "{下流|かりゅう}のカーブ{内側|うちがわ}にダムと{同|おな}じ{角|かく}ばった{石|いし}が{堆積|たいせき}してた。{最近|さいきん}{来|き}た{石|いし}だって{分析|ぶんせき}できた。{侵食|しんしょく}・{運搬|うんぱん}・{堆積|たいせき}の3つが{繋|つな}がったね。"
      - type: sprite
        id: sakura
        action: hide
      - type: sprite
        id: mizuki
        position: left
        expression: thinking
      - type: dialog
        character: mizuki
        text: "12:30に{上流|じょうりゅう}で{水|みず}しぶきと{青|あお}い{上着|うわぎ}の{人|ひと}を{見|み}た。コウタだったんだね。タクヤとの{会話|かいわ}も{聞|き}いてたんだ。"
      - type: sprite
        id: mizuki
        action: hide

  - id: learning
    bg: nature-outdoor
    steps:
      - type: title_card
        text: "学習ポイント"
      - type: sprite
        id: sensei
        position: center
        expression: normal
      - type: dialog
        character: sensei
        text: "{流|なが}れる{水|みず}の3つの{働|はたら}き——{侵食|しんしょく}（{削|けず}る）、{運搬|うんぱん}（{運|はこ}ぶ）、{堆積|たいせき}（{溜|た}まる）。{上流|じょうりゅう}で{壊|こわ}された{証拠|しょうこ}を{川|かわ}が{下流|かりゅう}に{運|はこ}んでくれましたね。"
      - type: dialog
        character: sensei
        expression: happy
        text: "{下流|かりゅう}で{角|かく}ばった{石|いし}＝{最近|さいきん}{上流|じょうりゅう}から{来|き}た{石|いし}。カーブの{内側|うちがわ}に{溜|た}まるのは{堆積|たいせき}の{法則|ほうそく}どおり。4つの{視点|してん}を{統合|とうごう}して{全体像|ぜんたいぞう}が{見|み}えました。"
      - type: dialog
