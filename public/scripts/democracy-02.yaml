scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{先週|せんしゅう}の{学級会|がっきゅうかい}で、{運動会|うんどうかい}の{出|だ}し{物|もの}を{多数決|たすうけつ}で{決|き}めた。"
      - type: narration
        text: "{結果|けっか}は{賛成|さんせい}18{票|ひょう}・{反対|はんたい}5{票|ひょう}・{棄権|きけん}2{票|ひょう}——「リレー」に{決定|けってい}した。"
      - type: se
        sound: whisper
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "**{翌朝|よくあさ}、{黒板|こくばん}に{大|おお}きな{文字|もじ}で{落書|らくが}きが{見|み}つかった。**"
      - type: narration
        text: "「リレーは{差別|さべつ}だ！　{反対|はんたい}！」——そして{クラス{全員|ぜんいん}の{名前|なまえ}が{書|か}かれた{署名|しょめい}リストが{添|そ}えられていた。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{朝|あさ}{登校|とうこう}したら、{黒板|こくばん}にこんなものが……。{署名|しょめい}リストには23{名|めい}の{名前|なまえ}があるけれど、{本当|ほんとう}にみんなが{書|か}いたのかしら。{誰|だれ}が、なぜこんなことをしたの？"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: hyou
            expression: worried
          - character: gikai
            expression: surprised
          - character: tami
            expression: worried
          - character: nozomi
            expression: surprised
      - type: narration
        text: "{偽|にせ}の{署名|しょめい}リストを{作|つく}ったのは{誰|だれ}か——{選挙|せんきょ}{探偵団|たんていだん}の{調査|ちょうさ}が{始|はじ}まった。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 少数派の叫び
        subtitle: 選挙探偵団 Vol.2

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 学級会の記録と署名リストの矛盾
      - type: narration
        text: "{学級会|がっきゅうかい}で{反対|はんたい}した{子|こ}は5{人|にん}だった。でも{黒板|こくばん}の{署名|しょめい}リストには23{名|めい}の{名前|なまえ}がある。"
      - type: evidence
        id: card-1
        title: 学級会の議事録＋黒板の写真
        content: "【{学級会|がっきゅうかい}{議事録|ぎじろく}】{賛成|さんせい}18{票|ひょう}・{反対|はんたい}5{票|ひょう}・{棄権|きけん}2{票|ひょう}→「リレー」{決定|けってい}。【{黒板|こくばん}の{落書|らくが}き】「リレーは{差別|さべつ}だ！　{反対|はんたい}！」という{文字|もじ}と、23{名|めい}の{名前|なまえ}が{記|き}された{署名|しょめい}リスト。"
      - type: sprite
        character: gikai
        expression: thinking
        position: left
      - type: dialog
        character: gikai
        text: "{議事録|ぎじろく}によると、{反対|はんたい}は5{票|ひょう}だった。でも{署名|しょめい}リストには23{名|めい}の{名前|なまえ}がある。{数|かず}が{合|あ}わない——これはおかしい。"
        expression: thinking
      - type: sprite
        character: gikai
        action: hide
      - type: narration
        text: "さらに{署名|しょめい}リストをよく{見|み}ると、{賛成|さんせい}{票|ひょう}を{入|い}れた{子|こ}の{名前|なまえ}まで{含|ふく}まれていることがわかった。"
      - type: evidence
        id: card-2
        title: 署名リスト分析
        content: "23{名|めい}の{署名|しょめい}リストを{照合|しょうごう}した{結果|けっか}：{学級会|がっきゅうかい}で「{賛成|さんせい}」に{投票|とうひょう}した{子|こ}の{名前|なまえ}が{複数|ふくすう}{含|ふく}まれている。{反対|はんたい}5{票|ひょう}の{子|こ}だけでは{説明|せつめい}がつかない{人数|にんずう}。"
      - type: sprite
        character: nozomi
        expression: surprised
        position: right
      - type: dialog
        character: nozomi
        text: "この{署名|しょめい}、カズキさんの{名前|なまえ}があるけど、カズキさんはリレー{大賛成|だいさんせい}って{言|い}ってたよ？　{反対|はんたい}じゃない{人|ひと}の{名前|なまえ}まで{入|はい}ってる……これ、{本物|ほんもの}の{署名|しょめい}じゃないよ。"
        expression: surprised
      - type: sprite
        character: nozomi
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 密談の証言と筆跡の手がかり
      - type: sprite
        character: tami
        expression: worried
        position: left
      - type: dialog
        character: tami
        text: "……{実|じつ}は、{昨日|きのう}ヒョウさんから{話|はな}しかけられて。「このまま{黙|だま}っていられない、{何|なに}かしないといけない」って{言|い}ってた。{関係|かんけい}ある……かな。"
        expression: worried
      - type: sprite
        character: tami
        action: hide
      - type: evidence
        id: card-3
        title: タミの密談メモ＋署名の筆跡の特徴
        content: "【タミの{証言|しょうげん}】{学級会|がっきゅうかい}の{翌日|よくじつ}、ヒョウが「{黙|だま}っていられない、{何|なに}かしないといけない」と{発言|はつげん}。【{署名|しょめい}の{筆跡|ひっせき}】{複数|ふくすう}の{名前|なまえ}が{似|に}た{筆跡|ひっせき}で{書|か}かれている。{一人|ひとり}が{短時間|たんじかん}に{書|か}いた{可能性|かのうせい}あり。"
      - type: sprite
        character: gikai
        expression: determined
        position: right
      - type: dialog
        character: gikai
        text: "{署名|しょめい}の{筆跡|ひっせき}を{比較|ひかく}したんだ。23{名|めい}の{名前|なまえ}のうち、かなりの{部分|ぶぶん}が{同|おな}じような{筆|ふで}の{使|つか}い{方|かた}をしている。{本当|ほんとう}に23{人|にん}が{別々|べつべつ}に{書|か}いたなら、もっとバラバラになるはずだよ。"
        expression: determined
      - type: sprite
        character: gikai
        action: hide
      - type: evidence
        id: card-4
        title: ヒョウの連絡帳との筆跡比較＋時間的不可能性
        content: "【{筆跡|ひっせき}{比較|ひかく}】{署名|しょめい}リストの{文字|もじ}とヒョウの{連絡帳|れんらくちょう}の{文字|もじ}に{共通|きょうつう}の{特徴|とくちょう}あり（「さ」の{書|か}き{方|かた}、「の」の{結|むす}び{方|かた}）。【{時間|じかん}の{問題|もんだい}】23{人|にん}が{放課後|ほうかご}にバラバラ{署名|しょめい}するには{時間|じかん}が{足|た}りない。{一人|ひとり}が{書|か}いた{可能性|かのうせい}が{高|たか}い。"

  # ==================== 中間点 ====================
  - id: midpoint
    bg: classroom
    bgm: thinking-time
    steps:
      - type: narration
        text: "{証拠|しょうこ}が{積|つ}み{重|かさ}なってきた。{議事録|ぎじろく}との{数|かず}の{矛盾|むじゅん}、{賛成|さんせい}した{子|こ}の{名前|なまえ}の{混入|こんにゅう}、{似|に}た{筆跡|ひっせき}——{誰|だれ}かが{一人|ひとり}で{偽|にせ}の{署名|しょめい}を{作|つく}ったのか？"
      - type: sprite
        character: nozomi
        expression: thinking
        position: right
      - type: dialog
        character: nozomi
        text: "{賛成|さんせい}した{人|ひと}の{名前|なまえ}まで{使|つか}われてる……{本人|ほんにん}たちは{知|し}らないまま{利用|りよう}されてるんだよね。たとえ{良|よ}い{目的|もくてき}のためだったとしても、{人|ひと}の{名前|なまえ}を{勝手|かって}に{使|つか}うのはおかしいと{思|おも}う。"
        expression: thinking
      - type: sprite
        character: nozomi
        action: hide
      - type: sprite
        character: hyou
        expression: worried
        position: left
      - type: dialog
        character: hyou
        text: "……{多数決|たすうけつ}で{決|き}まったことが{全部|ぜんぶ}{正|ただ}しいわけじゃない。{少数派|しょうすうは}の{声|こえ}は{無視|むし}されていいの？　{誰|だれ}かが{声|こえ}を{上|あ}げないといけなかった……"
        expression: worried
      - type: sprite
        character: hyou
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 再審議の手続きとヒョウの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "{学級会|がっきゅうかい}の{決定|けってい}に{異議|いぎ}がある{場合|ばあい}は、{次回|じかい}の{学級会|がっきゅうかい}に{議題|ぎだい}として{提出|ていしゅつ}できます。{手続|てつづ}きを{踏|ふ}めば、もう{一度|いちど}みんなで{話|はな}し{合|あ}うことができるのよ。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: evidence
        id: card-5
        title: 先生の補足＋ヒョウの告白
        content: "【{山田先生|やまだせんせい}の{補足|ほそく}】{学級会|がっきゅうかい}の{決定|けってい}に{異議|いぎ}がある{場合|ばあい}、{次回|じかい}の{学級会|がっきゅうかい}に{議題|ぎだい}として{提出|ていしゅつ}できる{正式|せいしき}な{手続|てつづ}きがある。【ヒョウの{告白|こくはく}】{正規|せいき}の{手続|てつづ}きを{知|し}らず、{署名|しょめい}を{偽造|ぎぞう}することで{問題|もんだい}を{大|おお}きくしようとした。"
      - type: se
        sound: reveal
      - type: sprite
        character: hyou
        expression: worried
        position: center
      - type: dialog
        character: hyou
        text: "……{僕|ぼく}が{作|つく}った。{多数決|たすうけつ}で{負|ま}けた5{人|にん}の{声|こえ}を、{誰|だれ}も{聞|き}いてくれないから。{問題|もんだい}を{大|おお}きくしたら、みんな{気|き}づいてくれると{思|おも}って……"
        expression: worried
      - type: dialog
        character: hyou
        text: "{多数決|たすうけつ}で{決|き}まったことが{全部|ぜんぶ}{正|ただ}しいわけじゃない。{誰|だれ}かが{声|こえ}を{上|あ}げないといけなかった。でも……{人|ひと}の{名前|なまえ}を{勝手|かって}に{使|つか}うのは、{間違|まちが}いだったって、{分|わ}かってる。"
        expression: determined
      - type: sprite
        character: hyou
        action: hide
      - type: narration
        text: "**{正義感|せいぎかん}があっても、{間違|まちが}った{方法|ほうほう}を{使|つか}えば、{本当|ほんとう}に{伝|つた}えたいことが{届|とど}かなくなる。——{民主主義|みんしゅしゅぎ}には、{正規|せいき}の「{声|こえ}の{上|あ}げ{方|かた}」がある。**"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: confrontation
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 偽の署名リストを作ったのは誰？
      - type: sprite
        character: gikai
        expression: determined
        position: left
      - type: dialog
        character: gikai
        text: "{証拠|しょうこ}を{整理|せいり}しよう。{議事録|ぎじろく}では{反対|はんたい}5{票|ひょう}なのに{署名|しょめい}は23{名|めい}——{数|かず}が{合|あ}わない。{賛成|さんせい}した{人|ひと}の{名前|なまえ}も{混|ま}じってる。{署名|しょめい}の{筆跡|ひっせき}がヒョウの{連絡帳|れんらくちょう}と{一致|いっち}する。そして——"
        expression: determined
      - type: sprite
        character: gikai
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①{議事録|ぎじろく}の{反対|はんたい}5{票|ひょう}と{署名|しょめい}23{名|めい}——{数|かず}の{大|おお}きな{矛盾|むじゅん}。②{賛成|さんせい}した{子|こ}の{名前|なまえ}が{含|ふく}まれている。③{短時間|たんじかん}での{署名|しょめい}{収集|しゅうしゅう}は{時間的|じかんてき}に{不可能|ふかのう}。④{筆跡|ひっせき}がヒョウの{連絡帳|れんらくちょう}と{一致|いっち}。⑤タミが「{何|なに}かしないといけない」というヒョウの{言葉|ことば}を{目撃|もくげき}した。"
      - type: choice
        id: q1
        question: 偽の署名リストを作ったのは誰？
        options:
          - text: ヒョウ（正義感から偽署名を作った）
            value: hyou
            correct: true
            feedback: "{正解|せいかい}！　ヒョウは{少数派|しょうすうは}の{声|こえ}を{届|とど}けたいという{正義感|せいぎかん}から{行動|こうどう}した。でも{人|ひと}の{名前|なまえ}を{無断|むだん}で{使|つか}うことは、{他者|たしゃ}の{権利|けんり}を{侵|おか}す{行為|こうい}。**{民主主義|みんしゅしゅぎ}には{正規|せいき}の「{声|こえ}の{上|あ}げ{方|かた}」がある——{次回|じかい}の{学級会|がっきゅうかい}に{議題|ぎだい}として{提出|ていしゅつ}するという{手続|てつづ}きを{使|つか}えばよかった。{多数決|たすうけつ}に{限界|げんかい}があることと、{不正|ふせい}な{方法|ほうほう}で{訴|うった}えることは{別|べつ}の{問題|もんだい}だ。**"
          - text: ギカイ（議事録を管理していた）
            value: gikai
            correct: false
            feedback: "{議事録|ぎじろく}を{管理|かんり}していたのはギカイだけど、{矛盾|むじゅん}を{指摘|してき}したのもギカイ。{偽造|ぎぞう}した{側|がわ}が{自分|じぶん}で{問題|もんだい}を{指摘|してき}するのは{不自然|ふしぜん}だよ。{証拠|しょうこ}をもう{一度|いちど}{確認|かくにん}してみよう。"
          - text: タミ（ヒョウの言葉を聞いていた）
            value: tami
            correct: false
            feedback: "タミはヒョウの{言葉|ことば}を{記憶|きおく}していたことを{正直|しょうじく}に{話|はな}してくれた{側|がわ}。{偽造|ぎぞう}には{無関係|むかんけい}だよ。{証言|しょうげん}した{勇気|ゆうき}は{大切|たいせつ}な{手|て}がかりになったね。"
          - text: ノゾミ（署名リストを最初に発見した）
            value: nozomi
            correct: false
            feedback: "ノゾミは{署名|しょめい}リストの{矛盾|むじゅん}に{最初|さいしょ}に{気|き}づいた{側|がわ}。{発見者|はっけんしゃ}と{犯人|はんにん}が{同|おな}じとは{限|かぎ}らないよ。{筆跡|ひっせき}の{証拠|しょうこ}とタミの{証言|しょうげん}をもう{一度|いちど}よく{見|み}てみよう。"

  # ==================== 真相：ヒョウの告白 ====================
  - id: truth-hyou
    bg: classroom
    bgm: emotional
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真相
        subtitle: 正義感と間違った方法
      - type: effect
        name: fade-in
      - type: sprite
        character: hyou
        expression: worried
        position: center
      - type: dialog
        character: hyou
        text: "……{僕|ぼく}が{作|つく}った。{認|みと}める。"
        expression: worried
      - type: dialog
        character: hyou
        text: "{学級会|がっきゅうかい}の{時|とき}、{反対|はんたい}する{気持|きも}ちをちゃんと{伝|つた}えたつもりだった。でも5{対|たい}18で{負|ま}けて——{先生|せんせい}は「{多数決|たすうけつ}で{決|き}まりました」って{言|い}って{終|お}わりにした。"
        expression: worried
      - type: dialog
        character: hyou
        text: "{多数決|たすうけつ}で{決|き}まったことが{全部|ぜんぶ}{正|ただ}しいわけじゃない。{足|あし}が{遅|おそ}い{子|こ}はリレーで{恥|は}ずかしい{思|おも}いをする。{誰|だれ}かが{声|こえ}を{上|あ}げないといけなかった……だから{署名|しょめい}を{作|つく}って、{問題|もんだい}を{大|おお}きくしようとした。"
        expression: determined
      - type: dialog
        character: hyou
        text: "でも……{人|ひと}の{名前|なまえ}を{勝手|かって}に{使|つか}ったのは{間違|まちが}いだったって、{自分|じぶん}でも{分|わ}かってる。{正|ただ}しい{目的|もくてき}でも、{間違|まちが}った{方法|ほうほう}を{使|つか}ったら——{本当|ほんとう}に{伝|つた}えたいことが{信|しん}じてもらえなくなる。"
        expression: worried
      - type: sprite
        character: hyou
        action: hide

  # ==================== 真相：他キャラの反応 ====================
  - id: truth-others
    bg: classroom
    bgm: emotional
    steps:
      - type: sprite
        character: tami
        expression: thinking
        position: left
      - type: dialog
