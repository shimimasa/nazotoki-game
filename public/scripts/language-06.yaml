scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "ことば探偵団 Vol.6"
        subtitle: "主語がない！"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: normal
          - id: fumi
            expression: normal
          - id: yomi
            expression: normal
          - id: tsuzuri
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: kotoha
        expression: normal
        position: left
      - type: dialog
        character: kotoha
        text: "指示が出たとき、机の上には紙の束、はさみ、テープ、マーカー、消しゴムがあった。"
      - type: dialog
        character: kotoha
        text: "指示が出たとき、机の上には紙の束、はさみ、テープ、マーカー、消しゴムがあった。"
        expression: thinking
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        expression: normal
        position: right
      - type: dialog
        character: fumi
        text: "指示が出る少し前、指示した人は飾りを切るためにはさみを使っていた。"
      - type: dialog
        character: fumi
        text: "指示が出る少し前、指示した人は飾りを切るためにはさみを使っていた。"
        expression: thinking
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        expression: normal
        position: left
      - type: dialog
        character: yomi
        text: "「あれを机の上に置いておいて」と言われたとき、あなたは紙の束を見ていた。"
      - type: dialog
        character: yomi
        text: "「あれを机の上に置いておいて」と言われたとき、あなたは紙の束を見ていた。"
        expression: thinking
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        expression: normal
        position: right
      - type: dialog
        character: tsuzuri
        text: "ヨミはさぼったわけでも、わざと別の物を置いたわけでもない。"
      - type: dialog
        character: tsuzuri
        text: "ヨミはさぼったわけでも、わざと別の物を置いたわけでもない。"
        expression: thinking
      - type: sprite
        character: tsuzuri
        action: hide
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠1"
        subtitle: "### タイトル"
      - type: narration
        text: "8:20ごろ、「あれを机の上に置いておいて」という声かけがあった"
      - type: narration
        text: "そのあとヨミが紙の束を机の上に置いた"
      - type: narration
        text: "8:28ごろ、「はさみがない！」と分かり、作業が止まった"
  - id: evidence-2
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠2"
        subtitle: "### タイトル"
      - type: narration
        text: "紙の束"
      - type: narration
        text: "はさみ"
      - type: narration
        text: "テープ"
      - type: narration
        text: "マーカー"
      - type: narration
        text: "消しゴム"
  - id: evidence-3
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠3"
        subtitle: "### タイトル"
      - type: narration
        text: "「“あれを置いて”と言われたとき、私は紙の束を見ていた」"
      - type: narration
        text: "「その前から台本をまとめる作業をしていて、次も紙を使う流れだと思っていた」"
      - type: narration
        text: "「だから、“あれ＝紙の束”だと自然に受け取った」"
  - id: evidence-4
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠4"
        subtitle: "### タイトル"
      - type: narration
        text: "指示した人は、「あれを置いて」と言う直前にはさみで飾りを切っていた"
      - type: narration
        text: "その作業の手を止めず、急いだ口調で声をかけていた"
      - type: narration
        text: "指示した人の中では、直前まで使っていたはさみが強く意識されていたと考えられる"
  - id: evidence-5
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠5"
        subtitle: "### タイトル"
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: kotoha
            expression: thinking
          - id: fumi
            expression: thinking
          - id: yomi
            expression: thinking
          - id: tsuzuri
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "コトハ"
            value: kotoha
            correct: false
            feedback: "コトハは手がかりを持っているが、決め手は足りない。"
          - text: "フミ"
            value: fumi
            correct: false
            feedback: "フミは手がかりを持っているが、決め手は足りない。"
          - text: "ヨミ"
            value: yomi
            correct: false
            feedback: "ヨミは手がかりを持っているが、決め手は足りない。"
          - text: "ツヅリ"
            value: tsuzuri
            correct: true
            feedback: "ツヅリの行動が、証拠といちばん一致している。"
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "ツヅリ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: tsuzuri
        expression: worried
        position: center
      - type: dialog
        character: tsuzuri
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: tsuzuri
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: happy
          - id: fumi
            expression: happy
          - id: yomi
            expression: happy
          - id: tsuzuri
            expression: happy
      - type: narration
        text: "ことば探偵団の学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
