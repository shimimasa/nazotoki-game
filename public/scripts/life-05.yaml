      - type: sprite
        character: kakeru
        action: hide
      - type: sprite
        character: mikoto
        expression: worried
        position: left
      - type: dialog
        character: mikoto
        text: "「{近|ちか}づきすぎないで」って{思|おも}ったのに、{言|い}えなかった。シズクを{悪|わる}く{思|おも}いたくなくて……でも{言|い}えていたら、{鳥|とり}を{守|まも}れたかもしれない。"
