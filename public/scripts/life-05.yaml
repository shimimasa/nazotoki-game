        subtitle: 原因を作ったのは誰だ？
      - type: sprite
        character: kakeru
        expression: thinking
        position: right
      - type: dialog
        character: kakeru
        text: "{水曜日|すいようび}{放課後|ほうかご}、シズクがケヤキの{木|き}のすぐ{下|した}にいたのを{見|み}た。そのあと{葉|は}が{少|すこ}しゆれた{気|き}がした——{何|なに}をしたかははっきり{見|み}えなかったけど。"
