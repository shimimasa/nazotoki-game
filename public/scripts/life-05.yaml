      - type: effect
        name: fade-in
      - type: sprite
        character: shizuku
        expression: worried
        position: center
      - type: dialog
        character: shizuku
        text: "……{私|わたし}が、{木|き}に{近|ちか}づいた。"
        expression: worried
      - type: narration
        text: "シズクは{下|した}を{向|む}きながら、{小|ちい}さな{声|こえ}で{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: shizuku
        text: "{巣|す}の{様子|ようす}をもっとよく{見|み}たくて、{木|き}のすぐそばまで{行|い}った。{枝|えだ}に{手|て}をかけたら、{少|すこ}しゆれて{巣材|すざい}が{落|お}ちてしまって——{あわ}てて{拾|ひろ}った。"
        expression: thinking
      - type: dialog
        character: shizuku
        text: "「{近|ちか}づいただけ」だから{壊|こわ}してはいないと{思|おも}ってた。でも{鳥|とり}が{巣|す}をやめたのを{見|み}て、{自分|じぶん}のせいかもって——{怖|こわ}くて{言|い}えなかった。"
        expression: worried
      - type: sprite
        character: shizuku
        action: hide

  # ==================== 真実：ほかのメンバー ====================
  - id: truth-others
    bg: classroom-blackboard
    steps:
      - type: sprite
        character: inori
        expression: worried
        position: left
      - type: dialog
        character: inori
        text: "{実|じつ}は……{水曜日|すいようび}{午後|ごご}に{巣材|すざい}が{落|お}ちているのに{気|き}づいてた。でも{風|かぜ}かもって{思|おも}って、{誰|だれ}かに{言|い}わなかった。{早|はや}く{声|こえ}をあげていたら、{調|しら}べ{直|なお}せたかもしれない——ごめん。"
