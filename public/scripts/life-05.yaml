        text: "「{見|み}たい{気持|きも}ち」と「{守|まも}りたい{気持|きも}ち」は、ときどきぶつかる。{今日|きょう}みたいに——どっちが{大切|たいせつ}か、{一緒|いっしょ}に{考|かんが}えたかった。"
