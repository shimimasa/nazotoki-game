scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "{校庭|こうてい}のケヤキの{木|き}に、シジュウカラが{巣|す}を{作|つく}り{始|はじ}めていた。{毎日|まいにち}{少|すこ}しずつ{巣材|すざい}が{増|ふ}えていって、4{人|にん}はそれを{楽|たの}しみに{見守|みまも}っていた。"
      - type: narration
        text: "ところが——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{木曜日|もくようび}の{朝|あさ}、ケヤキの{木|き}を{見|み}に{行|い}くと、{巣|す}が{跡形|あとかた}もなく{消|き}えていた。{月|げつ}〜{水曜日|すいようび}まで{確|たし}かに{増|ふ}えていた{巣材|すざい}が、{一夜|いちや}でなくなっている。「{誰|だれ}かが{壊|こわ}した！」という{声|こえ}も{上|あ}がった。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{水曜日|すいようび}の{放課後|ほうかご}、{木|き}の{近|ちか}くで{観察|かんさつ}していた{人|ひと}がいると{聞|き}きました。{巣|す}が「{壊|こわ}された」のか「{放棄|ほうき}された」のか——まずそこから{調|しら}べてみてください。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: inori
            expression: thinking
          - character: kakeru
            expression: worried
          - character: shizuku
            expression: worried
          - character: mikoto
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。「{壊|こわ}された」のか「{放棄|ほうき}された」のか。そして{原因|げんいん}を{作|つく}った{人|ひと}がいるとしたら——{誰|だれ}だ？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 巣のない鳥
        subtitle: 生命探偵団 Vol.5

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 観察記録を確認しよう
      - type: narration
        text: "イノリが{毎日|まいにち}つけていた{巣|す}の{観察記録|かんさつきろく}を{取|と}り{出|だ}した。"
      - type: se
        sound: discover
      - type: narration
        text: "{月曜日|げつようび} —— {巣材|すざい}が{少|すこ}しある。"
      - type: narration
        text: "{火曜日|かようび} —— {巣材|すざい}が{増|ふ}える。"
      - type: narration
        text: "{水曜日|すいようび} —— さらに{増|ふ}える。{巣|す}の{形|かたち}が{見|み}えてきた。"
      - type: narration
        text: "{木曜日|もくようび} —— {巣|す}がない。"
      - type: sprite
        character: inori
        expression: thinking
        position: left
      - type: dialog
        character: inori
        text: "{月|げつ}〜{水|すい}まで{順調|じゅんちょう}に{増|ふ}えていたのに、{木曜|もくよう}の{朝|あさ}にはゼロ。{急|きゅう}に{消|き}えてる。{何|なに}かが{水曜日|すいようび}の{午後|ごご}以降{いこう}に{起|お}きたと{考|かんが}えられる。"
        expression: thinking
      - type: sprite
        character: inori
        action: hide
      - type: narration
        text: "イノリの{分析|ぶんせき}は{正確|せいかく}だ。{変化|へんか}が{起|お}きたのは{水曜日|すいようび}の{放課後|ほうかご}。{次|つぎ}は{当日|とうじつ}の{天気|てんき}を{調|しら}べよう。"

