      - type: se
        sound: discover
      - type: narration
        text: "{落|お}ちた{巣材|すざい}には、{人|ひと}の{手|て}でつかんだような{乱|みだ}れがある。さらに——{鳥|とり}は{別|べつ}の{場所|ばしょ}で{巣材|すざい}を{運|はこ}んでいた。{巣|す}は{壊|こわ}されたのではなく、{別|べつ}の{場所|ばしょ}へ{移動|いどう}したのだ。"
      - type: effect
