      - type: sprite
        character: inori
        action: hide
      - type: sprite
        character: kakeru
        expression: thinking
        position: right
      - type: dialog
        character: kakeru
        text: "シズクが{木|き}の{近|ちか}くにいるのを{見|み}て、「{近|ちか}すぎるかな」と{思|おも}ったのに{言|い}えなかった。{見|み}ていたのに{動|うご}けなかった——{自分|じぶん}も{一緒|いっしょ}に{考|かんが}えていればよかった。"
