      - type: narration
        text: "そして{追加|ついか}の{点検|てんけん}で——{落|お}ちた{巣材|すざい}の{一部|いちぶ}に{人|ひと}の{皮脂|ひし}がついたあとがある。{人|ひと}がさわった{巣材|すざい}を{鳥|とり}がさけることがある——{先生|せんせい}メモ。{水曜日|すいようび}{放課後|ほうかご}に{木|き}へ{近|ちか}づいた{人物|じんぶつ}が、{巣|す}の{放棄|ほうき}の{原因|げんいん}を{作|つく}った。"
      - type: sprite
        character: inori
        expression: determined
        position: left
      - type: dialog
        character: inori
        text: "{水曜日|すいようび}{放課後|ほうかご}、{木|き}の{近|ちか}くにいた{人物|じんぶつ}は——{誰|だれ}だった？ そこまで{絞|しぼ}り{込|こ}めれば{答|こた}えが{出|で}る。"
        expression: determined
      - type: sprite
