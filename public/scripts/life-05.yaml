      - type: narration
        text: "{水曜日|すいようび}{夕方|ゆうがた}は{曇|くも}り。{風|かぜ}は{少|すこ}しあった。{木|き}を{大|おお}きくゆらすほどではない。"
      - type: sprite
        character: kakeru
        expression: thinking
        position: right
      - type: dialog
        character: kakeru
        text: "{弱|よわ}い{風|かぜ}で、{増|ふ}えていた{巣材|すざい}が{全部|ぜんぶ}なくなるかな。「{風|かぜ}で{飛|と}んだ」{仮説|かせつ}は{本当|ほんとう}に{合|あ}ってる？"
        expression: thinking
      - type: sprite
        character: kakeru
        action: hide
      - type: narration
        text: "カケルの{疑問|ぎもん}は{重要|じゅうよう}だ。もし{風|かぜ}が{原因|げんいん}なら、{巣材|すざい}は{遠|とお}くに{飛|と}び{散|ち}っているはずだ。{次|つぎ}は{木|き}の{下|した}のようすを{見|み}よう。"

