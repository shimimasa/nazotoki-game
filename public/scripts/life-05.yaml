        expression: thinking
      - type: sprite
        character: mikoto
        action: hide
      - type: narration
        text: "ミコトの{気|き}づきは{重要|じゅうよう}だ。「{壊|こわ}された」のではなく「{放棄|ほうき}された」——{近|ちか}づいた{人|ひと}が{原因|げんいん}になった{可能性|かのうせい}がある。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 木の下のようすを確認しよう
      - type: narration
        text: "{木曜日|もくようび}の{朝|あさ}、ケヤキの{木|き}の{下|した}を{詳|くわ}しく{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "{巣材|すざい}が{木|き}の{近|ちか}くに{少|すこ}し{落|お}ちていた。{遠|とお}くへ{飛|と}び{散|ち}ってはいない。"
      - type: narration
        text: "{枝|えだ}が1{本|ぽん}、ゆれていた{形|かたち}あとがある。{誰|だれ}かが{手|て}をかけたような{跡|あと}だ。"
      - type: sprite
        character: kakeru
        expression: determined
        position: right
      - type: dialog
        character: kakeru
        text: "{風|かぜ}の{仮説|かせつ}は{弱|よわ}い！ {強|つよ}い{風|かぜ}なら{巣材|すざい}は{広|ひろ}く{飛|と}び{散|ち}るはず。でも{近|ちか}くだけに{落|お}ちてる。それに{枝|えだ}に{手|て}をかけた{跡|あと}——{誰|だれ}かが{木|き}に{触|ふ}れた{証拠|しょうこ}だ。"
