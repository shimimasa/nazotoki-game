    bg: hallway-sunset
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "シズクの「{巣|す}を{近|ちか}くで{見|み}たい」という{好奇心|こうきしん}は{素晴|すば}らしい。{観察|かんさつ}しようとする{気持|きも}ちは、{理科|りか}の{大切|たいせつ}な{第一歩|だいいっぽ}よ。"
