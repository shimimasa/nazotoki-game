      - type: choice
        id: q1
        question: 巣の放棄の原因を作ったのは誰？
        options:
          - text: シズク（水曜放課後に木のすぐ下にいて、枝に触れた）
            value: shizuku
            correct: true
            feedback: "{正解|せいかい}！ シズクは{水曜日|すいようび}{放課後|ほうかご}、{巣|す}を{近|ちか}くで{見|み}たくて{枝|えだ}に{手|て}をかけた。{枝|えだ}がゆれて{巣材|すざい}の{一部|いちぶ}が{落|お}ち、{人|ひと}の{皮脂|ひし}がついた{巣材|すざい}にシジュウカラが{危険|きけん}を{感|かん}じてこの{巣|す}を{放棄|ほうき}した。シズクに{悪意|あくい}はなかったが、「{近|ちか}づいただけ」が{結果|けっか}として{巣|す}を{失|うしな}わせてしまった。"
          - text: イノリ（観察記録を持っていた）
            value: inori
            feedback: "イノリは{観察記録|かんさつきろく}で{変化|へんか}のタイミングを{特定|とくてい}した{情報型|じょうほうがた}。{水曜日|すいようび}{放課後|ほうかご}に{木|き}へ{近|ちか}づいた{記録|きろく}も{目撃|もくげき}もないよ。"
          - text: カケル（放課後に校庭を歩いていた）
            value: kakeru
            feedback: "カケルは{水曜日|すいようび}{放課後|ほうかご}にシズクが{木|き}の{近|ちか}くにいるのを{見|み}た{側|がわ}だよ。{木|き}に{近|ちか}づいた{証拠|しょうこ}はカケルにはない。"
          - text: ミコト（シズクのことを心配していた）
            value: mikoto
            feedback: "ミコトは「{近|ちか}づきすぎないで」と{思|おも}いながら{止|と}められなかった{感情型|かんじょうがた}。{木|き}に{近|ちか}づいたのはシズクで、ミコト{自身|じしん}は{遠|とお}くから{見|み}ていた。"

  # ==================== 真実：シズク ====================
  - id: truth
