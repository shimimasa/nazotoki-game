      - type: sprite
        character: kakeru
        action: hide
      - type: narration
        text: "カケルの{仮説検証|かせつけんしょう}で「{風|かぜ}だけが{原因|げんいん}」は{否定|ひてい}された。{人|ひと}が{木|き}に{近|ちか}づいて{枝|えだ}にふれた——その{人物|じんぶつ}を{特定|とくてい}する{必要|ひつよう}がある。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
