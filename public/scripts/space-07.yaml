      determined: girl-c-determined.webp
  yamada:
    name: 山田先生
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "天体観測会の夜、"

      - type: narration
        text: "ソラはお気に入りの星を見つけて、"

      - type: narration
        text: "うれしそうにたずねました。"

      - type: se
        sound: crash

      - type: effect
        name: shake
        duration: 400

      - type: bgm
        action: stop

      - type: sprite
        character: hoshino
        expression: worried
        position: center

      - type: dialog
        character: hoshino
        text: "大変だ！ みんな来て！"

      - type: sprite
        character: hoshino
        action: hide

      - type: bgm
        track: tension-quiet

      - type: sprite
        character: yamada
        expression: thinking
        position: center

      - type: dialog
        character: yamada
        text: "{落|お}ち{着|つ}いて。みんなで{証拠|しょうこ}を{集|あつ}めて{調|しら}べてみましょう。"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite_group
        characters:
          - { id: hikari, expression: determined }
          - { id: hoshino, expression: thinking }
          - { id: tsukimi, expression: thinking }
          - { id: sora, expression: worried }

      - type: narration
        text: "「{宇宙探偵団|うちゅうたんていだん}」として{調査|ちょうさ}を{始|はじ}める。"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        title: 宇宙探偵団
        subtitle: Vol.7 光の手紙

  # ========================================
  # 証拠カード1
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600

      - type: title_card
        title: ステップ1
        subtitle: 調査

      - type: narration
        text: "天体観測会の記録 + 理科の資料"

      - type: narration
        text: "理科の資料:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード2
  # ========================================
  - id: evidence-2
    steps:
      - type: narration
        text: "「光の速度」問いカード"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード3
  # ========================================
  - id: evidence-3
    steps:
      - type: narration
        text: "ヒカリの調査 + ツキミの記録"

      - type: narration
        text: "ツキミの記録:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード4
  # ========================================
  - id: evidence-4
    steps:
      - type: narration
        text: "ソラの証言 + 光の速度の計算"

      - type: narration
        text: "計算メモ:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード5
  # ========================================
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600

      - type: title_card
        title: ステップ2
        subtitle: 反転

      - type: effect
        name: fade-in
        duration: 600

      - type: narration
        text: "先生のメモ"

      - type: se
        sound: discover

      - type: sprite
        character: yamada
        expression: thinking
        position: center

      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"

      - type: sprite
        character: yamada
        action: hide

  # ========================================
  # 議論
  # ========================================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論

      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"

      - type: sprite
        character: tsukimi
        expression: thinking
        position: left

      - type: dialog
        character: tsukimi
        text: "資料と記録を照らし合わせ、ホシノの説明に足りない部分を見つけた"

      - type: sprite
        character: tsukimi
        action: hide

      - type: sprite
        character: hikari
        expression: thinking
        position: right

      - type: dialog
        character: hikari
        text: "ホシノが前日に資料を読んでいたことを知っていた"

      - type: sprite
        character: hikari
        action: hide

      - type: sprite
        character: sora
        expression: thinking
        position: left

      - type: dialog
        character: sora
        text: "ホシノの言葉で安心した"

      - type: sprite
        character: sora
        action: hide

      - type: sprite
        character: hoshino
        expression: worried
        position: right

      - type: dialog
        character: hoshino
        text: "640光年と、過去の光の意味を知っていた"

      - type: sprite
        character: hoshino
        action: hide

  # ========================================
  # 投票
  # ========================================
  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票

      - type: narration
        text: "「星について本当のことを伏せたのは誰？」"

      - type: sprite_group
        characters:
          - { id: hikari, expression: normal }
          - { id: hoshino, expression: normal }
          - { id: tsukimi, expression: normal }
          - { id: sora, expression: worried }

      - type: choice
        id: q1
        text: "星について本当のことを伏せたのは誰？"
        options:
          - label: ヒカリ
            value: hikari
            correct: false
            feedback: "ヒカリは観測会の行動を調べた側"
          - label: ホシノ
            value: hoshino
            correct: true
            feedback: "ホシノは640光年先の星が不安定だと知っていた。見えている光は640年前のもの——星はもう消えているかもしれない。でもソラが怖がると思って"大丈夫"と言った。嘘は問題だけど、ホシノの"守りたい気持ち"は本物だった。星の光は"過去からの手紙"。届くのに何百年もかかるけど、届いた光は確かに本物なんだ"
          - label: ツキミ
            value: tsukimi
            correct: false
            feedback: "ツキミは資料とデータを照合した側"
          - label: ソラ
            value: sora
            correct: false
            feedback: "ソラは嘘をつかれた側。でもホシノの気持ちも分かると言った"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

  # ========================================
  # 真相
  # ========================================
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600

      - type: title_card
        title: 真相

      - type: effect
        name: fade-in
        duration: 600

      - type: sprite
        character: yamada
        expression: normal
        position: center

      - type: dialog
        character: yamada
        text: "真相が明かされた。"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite
        character: hoshino
        expression: worried
        position: center

      - type: dialog
        character: hoshino
        text: "ソラを怖がらせたくなくて、本当のことをそのまま言えなかった"

      - type: sprite
        character: hoshino
        expression: determined

      - type: dialog
        character: hoshino
        text: "ごめんなさい。"

      - type: sprite
        character: hoshino
        action: hide

  # ========================================
  # エピローグ
  # ========================================
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center

      - type: dialog
        character: yamada
        text: "みんな、よく{調|しら}べたね。今日の{学|まな}びを{振|ふ}り{返|かえ}ろう。"

      - type: sprite
        character: yamada
        expression: thinking

      - type: dialog
        character: yamada
        text: "・証拠カード1で、ホシノは「今も輝いてるよ」と言ったが、資料には「消滅した可能性がある」とある\n・よって、ホシノの説明には、何か足りない情報があると分かる\n・証拠カード2で、遠い星の光は過去に出た光だと分かる"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite_group
        characters:
          - { id: hikari, expression: happy }
          - { id: hoshino, expression: happy }
          - { id: tsukimi, expression: happy }
          - { id: sora, expression: happy }

      - type: narration
        text: "{宇宙探偵団|うちゅうたんていだん}の{冒険|ぼうけん}はつづく——"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

      - type: effect
        name: fade-out
        duration: 1000
