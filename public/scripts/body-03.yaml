scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "からだ{探偵団|たんていだん}の3{人|にん}。{最近|さいきん}、ともだちのココチの{様子|ようす}がおかしい。{放課後|ほうかご}になると{急|いそ}いで{教室|きょうしつ}を{出|で}ていき、どこへ{行|い}くのか{教|おし}えてくれない。"
      - type: narration
        text: "ある{日|ひ}、ココチの{筆箱|ふでばこ}からタケル{先輩|せんぱい}の{手紙|てがみ}が{見|み}つかった——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "「これは2{人|ふた}だけのひみつだよ。{誰|だれ}かに{言|い}ったら{遊|あそ}ばないからね」"
      - type: narration
        text: "ひみつって、どんなひみつ？ **このひみつは{良|よ}いひみつ？ それとも{悪|わる}いひみつ？**"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{良|よ}いひみつと{悪|わる}いひみつがあります。サプライズパーティーの{秘密|ひみつ}は{楽|たの}しいひみつ。でも「{言|い}ったらダメ」と{脅|おど}されるひみつは{苦|くる}しいひみつ——{大人|おとな}に{話|はな}すべき{悪|わる}いひみつです。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: karada
            expression: worried
          - character: mamoru
            expression: thinking
          - character: kokochi
            expression: worried
          - character: kizuna
            expression: surprised
      - type: narration
        text: "からだ{探偵団|たんていだん}は「ココチに{何|なに}が{起|お}きているのか？」を{調|しら}べはじめた。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: ひみつの約束
        subtitle: からだ探偵団 Vol.3

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: ココチの行動とひみつの手紙
      - type: narration
        text: "【{証拠|しょうこ}カード1】ココチが{最近|さいきん}{元気|げんき}がない。「ひみつ」と{言|い}って{何|なに}も{教|おし}えてくれない。タケル{先輩|せんぱい}と{放課後|ほうかご}に{会|あ}っているらしい。"
      - type: sprite
        character: karada
        expression: worried
        position: left
      - type: dialog
        character: karada
        text: "ココチ、{前|まえ}は{一緒|いっしょ}に{帰|かえ}ってたのに{急|きゅう}に「{先|さき}に{行|い}って」って。{放課後|ほうかご}に{何|なに}かあるよ。"
        expression: worried
      - type: sprite
        character: karada
        action: hide
      - type: sprite
        character: kokochi
        expression: worried
        position: right
      - type: dialog
        character: kokochi
        text: "タケル{先輩|せんぱい}との{約束|やくそく}だから、{誰|だれ}にも{言|い}えない……。"
        expression: worried
      - type: sprite
        character: kokochi
        action: hide
      - type: narration
        text: "【{証拠|しょうこ}カード2】「{良|よ}いひみつと{悪|わる}いひみつ」カード: サプライズパーティーの{秘密|ひみつ}＝{楽|たの}しいひみつ（{良|よ}い）。「{言|い}ったらダメ」と{脅|おど}されるひみつ＝{苦|くる}しいひみつ（{悪|わる}い）。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 手紙の中身とパターンの発見
      - type: sprite
        character: mamoru
        expression: determined
        position: left
      - type: dialog
        character: mamoru
        text: "タケル{先輩|せんぱい}の{手紙|てがみ}に「{誰|だれ}かに{言|い}ったら{遊|あそ}ばないからね」って{書|か}いてある。カラダの{証言|しょうげん}でも、ココチが{放課後|ほうかご}{急|いそ}いで{出|で}てくのは{本当|ほんとう}だ。"
        expression: determined
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: kizuna
        expression: thinking
        position: right
      - type: dialog
        character: kizuna
        text: "ココチの{口|くち}は「タケル{先輩|せんぱい}はやさしいんだよ」って{言|い}ってるけど、{顔|かお}は{全然|ぜんぜん}やさしくないよ。"
        expression: thinking
      - type: sprite
        character: kizuna
        action: hide
      - type: sprite
        character: mamoru
        expression: surprised
        position: left
      - type: dialog
        character: mamoru
        text: "タケル{先輩|せんぱい}、{前|まえ}にも{別|べつ}の{子|こ}に{同|おな}じことしてた。「{特別|とくべつ}だよ」→「{秘密|ひみつ}にして」はパターンだ。"
        expression: surprised
      - type: sprite
        character: mamoru
        action: hide
      - type: narration
        text: "タケル{先輩|せんぱい}は{以前|いぜん}にも{別|べつ}の{子|こ}に「{特別|とくべつ}だよ」→「{秘密|ひみつ}にして」のパターンを{使|つか}っていた。これは{繰|く}り{返|かえ}す{行動|こうどう}だ。"

  # ==================== 調査：証拠カード4（カード交換後） ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: ココチの表情と矛盾
      - type: se
        sound: discover
      - type: sprite
        character: kokochi
        expression: worried
        position: center
      - type: dialog
        character: kokochi
        text: "ほんとは……{嫌|いや}なこともある。でも{約束|やくそく}だから{言|い}えない。"
        expression: worried
      - type: sprite
        character: kokochi
        action: hide
      - type: narration
        text: "キズナの{観察|かんさつ}: 「ココチが『タケル{先輩|せんぱい}はやさしいんだよ』と{言|い}うが、{表情|ひょうじょう}が{暗|くら}い{矛盾|むじゅん}に{気|き}づく」。{言葉|ことば}と{表情|ひょうじょう}が{合|あ}っていない——これは{重要|じゅうよう}なサインだ。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 山田先生とココチの会話記録
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: thinking
        position: left
      - type: dialog
        character: yamada
        text: "ココチと{話|はな}しました。「タケル{先輩|せんぱい}に『{特別|とくべつ}』って{言|い}われて{嬉|うれ}しかった。でも{持|も}ち{物|もの}を{勝手|かって}に{使|つか}われたり{嫌|いや}なあだ{名|な}をつけられたりした。『{秘密|ひみつ}にして』と{言|い}われて{言|い}えなかった」と。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "「{特別|とくべつ}だよ」→ ココチが{嬉|うれ}しくなる → {嫌|いや}なことをされる → 「{秘密|ひみつ}にして」と{言|い}われる → ココチが「{約束|やくそく}だから」と{誰|だれ}にも{言|い}えない → エスカレートする。"
      - type: narration
        text: "「{秘密|ひみつ}にして」という{言葉|ことば}が**{支配|しはい}の{道具|どうぐ}**として{使|つか}われていた——これが{視点|してん}{転換|てんかん}だ。「{約束|やくそく}を{守|まも}る＝{良|よ}いこと」ではなく、「『{秘密|ひみつ}にして』＝{支配|しはい}の{道具|どうぐ}」。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 誰が中心になって問題を起こした？
      - type: sprite
        character: kizuna
        expression: determined
        position: left
      - type: dialog
        character: kizuna
        text: "ココチの{気持|きも}ちを{整理|せいり}しよう。「{嬉|うれ}しかった」けど「{嫌|いや}なことが{増|ふ}えた」。「{言|い}えなかった」のは{約束|やくそく}を{破|やぶ}りたくなかったから。でも{本当|ほんとう}に{守|まも}るべき{約束|やくそく}だったのかな？"
        expression: determined
      - type: sprite
        character: kizuna
        action: hide
      - type: sprite
        character: mamoru
        expression: determined
        position: right
      - type: dialog
        character: mamoru
        text: "{証拠|しょうこ}をまとめよう。タケル{先輩|せんぱい}の{脅|おど}しの{手紙|てがみ}。{繰|く}り{返|かえ}すパターン。ココチの{表情|ひょうじょう}の{矛盾|むじゅん}。{先生|せんせい}への{告白|こくはく}。「{秘密|ひみつ}にして」が{支配|しはい}の{道具|どうぐ}になっていた。"
        expression: determined
      - type: sprite
        character: mamoru
        action: hide
      - type: choice
        id: q1
        question: 誰が中心になって問題を起こした？
        options:
          - text: ココチ（秘密を守り続けた当事者——「言ったら遊ばない」と脅されて誰にも言えなかった）
            value: kokochi
            correct: true
            feedback: "{正解|せいかい}！ ココチは「タケル{先輩|せんぱい}との{秘密|ひみつ}を{守|まも}らなきゃいけない」と{信|しん}じていた。でもそれは「{悪|わる}いひみつ」——{大人|おとな}に{話|はな}すべきひみつだった。「{秘密|ひみつ}にして」と{言|い}われる{秘密|ひみつ}は{大人|おとな}に{言|い}うべき{秘密|ひみつ}。"
          - text: カラダ（ココチの行動の変化を追跡していた人）
            value: karada
            feedback: "カラダはココチの{変化|へんか}に{気|き}づいた{観察者|かんさつしゃ}。{問題|もんだい}を{起|お}こした{側|がわ}ではないよ。"
          - text: マモル（タケル先輩のパターンを発見した人）
            value: mamoru
            feedback: "マモルはタケル{先輩|せんぱい}の{行動|こうどう}パターンを{調|しら}べた{分析者|ぶんせきしゃ}。{問題|もんだい}を{明|あき}らかにする{側|がわ}だよ。"
          - text: キズナ（ココチの気持ちに寄り添った人）
            value: kizuna
            feedback: "キズナはココチの{表情|ひょうじょう}の{矛盾|むじゅん}に{気|き}づいた{共感者|きょうかんしゃ}。ココチを{助|たす}けようとしていたよ。"

  # ==================== 真実：ココチ ====================
  - id: truth-kokochi
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ココチの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: kokochi
        expression: worried
        position: center
      - type: dialog
        character: kokochi
        text: "タケル{先輩|せんぱい}に「{特別|とくべつ}だよ」って{言|い}われて、{嬉|うれ}しかった。だから{約束|やくそく}を{守|まも}らなきゃって{思|おも}ってた。"
        expression: worried
      - type: dialog
        character: kokochi
        text: "でも……{持|も}ち{物|もの}を{勝手|かって}に{使|つか}われたり、{嫌|いや}なあだ{名|な}をつけられたり。「{言|い}ったら{遊|あそ}ばないよ」って{言|い}われると……{約束|やくそく}を{破|やぶ}れないって{思|おも}ってしまった。"
        expression: thinking
      - type: dialog
        character: kokochi
        text: "{先生|せんせい}に{話|はな}して……{楽|らく}になった。{話|はな}してよかった。"
        expression: happy
      - type: sprite
        character: kokochi
        action: hide

  # ==================== 真実：他のメンバー ====================
  - id: truth-others
    bg: classroom
    steps:
      - type: sprite
        character: karada
        expression: thinking
        position: left
      - type: dialog
        character: karada
        text: "ココチ、{前|まえ}から{様子|ようす}がおかしいって{気|き}づいてたよ。もっと{早|はや}く{声|こえ}をかければよかった。"
        expression: thinking
      - type: sprite
        character: karada
        action: hide
      - type: sprite
        character: mamoru
        expression: determined
        position: right
      - type: dialog
        character: mamoru
        text: "タケル{先輩|せんぱい}は{別|べつ}の{子|こ}にも{同|おな}じパターンを{使|つか}ってた。「{特別|とくべつ}だよ」→「{秘密|ひみつ}にして」——これは{操作|そうさ}だ。"
        expression: determined
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: kizuna
        expression: happy
        position: left
      - type: dialog
        character: kizuna
        text: "ココチ、{話|はな}してくれてよかった。「{悪|わる}いひみつ」は{一人|ひとり}で{抱|かか}えなくていいんだよ。"
        expression: happy
      - type: sprite
        character: kizuna
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "「{誰|だれ}にも{言|い}わないで」と{言|い}われる{秘密|ひみつ}——それは「{悪|わる}いひみつ」です。{楽|たの}しいひみつと{苦|くる}しいひみつは{違|ちが}います。{苦|くる}しいひみつは、{必|かなら}ず{大人|おとな}に{話|はな}してください。"
        expression: normal
      - type: dialog
        character: yamada
        text: "ココチは{勇気|ゆうき}を{出|だ}して{話|はな}してくれました。{悪|わる}いひみつを{守|まも}ることは、あなたを{守|まも}ることにはなりません。"
        expression: happy
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "「{秘密|ひみつ}にして」という{言葉|ことば}が{支配|しはい}の{道具|どうぐ}になることがある。{言葉|ことば}と{表情|ひょうじょう}の{矛盾|むじゅん}に{気|き}づくキズナの{力|ちから}、パターンを{分析|ぶんせき}するマモルの{力|ちから}、{変化|へんか}を{観察|かんさつ}するカラダの{力|ちから}——3{人|にん}の{気|き}づきがココチを{救|すく}った。"
      - type: narration
        text: "{良|よ}いひみつと{悪|わる}いひみつの{区別|くべつ}: 「{誰|だれ}にも{言|い}わないで」と{言|い}われる{秘密|ひみつ}は「{悪|わる}いひみつ」。{苦|くる}しいひみつは{大人|おとな}に{話|はな}そう。"
      - type: effect
        name: fade-out
