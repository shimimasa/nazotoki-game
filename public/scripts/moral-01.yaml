meta:
  id: moral-01
  title: われた花びんとだまった4人
  series: 答えのない法廷
  volume: 1
  estimatedMinutes: 18

characters:
  hayato:
    name: ハヤト
    color: "#FF6B35"
    sprites:
      normal: hayato-normal.webp
      anxious: hayato-anxious.webp
      crying: hayato-crying.webp
  miruku:
    name: ミルク
    color: "#7B68EE"
    sprites:
      normal: miruku-normal.webp
      scared: miruku-scared.webp
      determined: miruku-determined.webp
  mamoru:
    name: マモル
    color: "#2E8B57"
    sprites:
      normal: mamoru-normal.webp
      troubled: mamoru-troubled.webp
      sincere: mamoru-sincere.webp
  kotoha:
    name: コトハ
    color: "#CD853F"
    sprites:
      normal: kotoha-normal.webp
      calm: kotoha-calm.webp
      regretful: kotoha-regretful.webp
  nozomi:
    name: ノゾミ先生
    color: "#4169E1"
    sprites:
      worried: nozomi-worried.webp
      kind: nozomi-kind.webp

scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "{放課後|ほうかご}の{学校|がっこう}。いつもと{変|か}わらない、{静|しず}かな{時間|じかん}——"

      - type: se
        sound: crash

      - type: effect
        name: shake
        duration: 500

      - type: bgm
        action: stop

      - type: narration
        text: "{廊下|ろうか}に{飾|かざ}られていた「{夢|ゆめ}の花びん」が、{割|わ}れた。"

      - type: bg
        image: broken-vase-closeup

      - type: narration
        text: "{去年|きょねん}の6{年生|ねんせい}が{卒業記念|そつぎょうきねん}に{作|つく}った、{大切|たいせつ}なもの。"
        speed: slow

      - type: narration
        text: "クラスのみんなで{土|つち}をこねて、{色|いろ}を{塗|ぬ}って、{窯|かま}で{焼|や}いた。\n花びんの{表面|ひょうめん}には「{夢|ゆめ}」という{文字|もじ}と、みんなの{手形|てがた}が{入|はい}っている。"

      # ノゾミ先生 登場（1人だけ）
      - type: bg
        image: hallway-sunset

      - type: sprite
        character: nozomi
        expression: worried
        position: center

      - type: bgm
        track: tension-quiet

      - type: dialog
        character: nozomi
        text: "花びんが{割|わ}れている。{誰|だれ}か{知|し}っている{人|ひと}はいますか？"

      # ノゾミ先生を消してから4人を表示
      - type: sprite
        character: nozomi
        expression: worried
        action: hide

      - type: sprite_group
        characters:
          - { id: hayato, expression: anxious }
          - { id: miruku, expression: scared }
          - { id: mamoru, expression: troubled }
          - { id: kotoha, expression: calm }

      - type: narration
        text: "4{人|にん}とも、だまっている。"

      # 4人を消してからノゾミ先生を再表示
      - type: sprite
        character: hayato
        action: hide
      - type: sprite
        character: miruku
        action: hide
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: kotoha
        action: hide

      - type: sprite
        character: nozomi
        expression: worried
        position: center

      - type: dialog
        character: nozomi
        text: "{犯人探|はんにんさが}しをしたいわけじゃないの。\nでも、このまま{誰|だれ}も{何|なに}も{言|い}わないのは、もっと{悲|かな}しい。"

      - type: dialog
        character: nozomi
        text: "みんなで{話|はな}し{合|あ}って、これからどうするかを{考|かんが}えよう。"

      - type: sprite
        character: nozomi
        action: hide

      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        text: われた花びんとだまった4人
        subtitle: "{答|こた}えのない{法廷|ほうてい} Vol.1"

  # ========================================
  # Act 1: 調査 — 証拠カード①
  # ========================================
  - id: evidence-1
    bg: broken-vase-closeup
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 500

      - type: title_card
        text: "ステップ1：{調査|ちょうさ}"
        subtitle: "4{人|にん}の{事情|じじょう}を{調|しら}べよう"

      - type: narration
        text: "{割|わ}れた花びんを{調|しら}べてみよう。"

      - type: narration
        text: "花びんは3つの{大|おお}きな{破片|はへん}と、いくつかの{小|ちい}さなかけらに{割|わ}れている。"

      - type: narration
        text: "{破片|はへん}は{台|だい}の{右側|みぎがわ}に{散|ち}らばっている。"

      - type: narration
        text: "{散|ち}らばり{方|かた}から、{力|ちから}の{加|くわ}わった{方向|ほうこう}が{読|よ}み{取|と}れるはずだ。"

      - type: choice
        id: obs-direction
        question: "{破片|はへん}が{右側|みぎがわ}に{散|ち}らばっている。{力|ちから}はどこから{加|くわ}わった？"
        options:
          - text: "{左側|ひだりがわ}から"
            value: left
            reaction:
              character: nozomi
              expression: kind
              text: "そう！{破片|はへん}は{力|ちから}の{反対側|はんたいがわ}に{飛|と}ぶ。よく{気|き}づいたね。"
          - text: "{右側|みぎがわ}から"
            value: right
            reaction:
              character: nozomi
              expression: worried
              text: "{破片|はへん}が{飛|と}んだ{方向|ほうこう}と、{力|ちから}の{方向|ほうこう}……もう{一度|いちど}{考|かんが}えてみて。"
          - text: "{真上|まうえ}から"
            value: top
            reaction:
              character: nozomi
              expression: worried
              text: "{真上|まうえ}からなら{破片|はへん}は{均等|きんとう}に{散|ち}らばるはず。{片側|かたがわ}に{偏|かたよ}っているということは……？"

      - type: narration
        text: "そう——{左側|ひだりがわ}から{力|ちから}が{加|くわ}わったんだ。"

      - type: narration
        text: "{次|つぎ}に{台|だい}そのものを{調|しら}べてみよう。"

      - type: choice
        id: obs-stand
        question: "{台|だい}を{調|しら}べよう。{気|き}になるところは？"
        options:
          - text: "{台|だい}の{脚|あし}の{長|なが}さ"
            value: legs
            reaction:
              character: nozomi
              expression: kind
              text: "いい{着眼点|ちゃくがんてん}！{脚|あし}を{詳|くわ}しく{調|しら}べてみよう。"
          - text: "{台|だい}の{表面|ひょうめん}のキズ"
            value: surface
            reaction:
              character: nozomi
              expression: kind
              text: "{表面|ひょうめん}も{大事|だいじ}な{手|て}がかり。でも、もっと{根本的|こんぽんてき}な{部分|ぶぶん}に{注目|ちゅうもく}してみて。"
          - text: "{台|だい}の{位置|いち}"
            value: position
            reaction:
              character: nozomi
              expression: kind
              text: "{位置|いち}も{気|き}になるね。{台|だい}の{構造|こうぞう}そのものも{見|み}てみよう。"

      - type: se
        sound: discover

      - type: narration
        text: "{調|しら}べていくと——{台|だい}の{左前|ひだりまえ}の{脚|あし}が1{本|ぽん}、{他|ほか}の3{本|ぼん}より{約|やく}5mm{短|みじか}いことに{気|き}づく。"

      - type: narration
        text: "そのせいで{台|だい}がわずかにグラグラしていた。\n花びんは{元々|もともと}【{不安定|ふあんてい}】な{状態|じょうたい}だった。{小|ちい}さな{衝撃|しょうげき}でも{落|お}ちる{可能性|かのうせい}があった。"

  # ========================================
  # Act 1: 調査 — 証拠カード②
  # ========================================
  - id: evidence-2
    bg: hallway-sunset
    steps:
      - type: narration
        text: "ノゾミ{先生|せんせい}が{他|ほか}の{生徒|せいと}にも{聞|き}き{取|と}りをした。{放課後|ほうかご}の{時間|じかん}を{整理|せいり}すると——"

      - type: narration
        text: "15:22　コトハが{廊下|ろうか}を{通過|つうか}。{飼育小屋|しいくごや}へ{向|む}かう。"

      - type: narration
        text: "15:24　マモルが{見回|みまわ}り{当番|とうばん}を{開始|かいし}。"

      - type: narration
        text: "15:25　マモルが{廊下|ろうか}から{姿|すがた}を{消|け}す。"

      - type: narration
        text: "15:28　ハヤトが{校庭|こうてい}{方向|ほうこう}から{全速力|ぜんそくりょく}で{走|はし}ってくる。"

      - type: se
        sound: crash

      - type: effect
        name: shake
        duration: 300

      - type: narration
        text: "15:30ごろ——「ガシャーン！」という{大|おお}きな{音|おと}。{複数|ふくすう}の{生徒|せいと}が{聞|き}いた。"

      - type: narration
        text: "15:30すぎ　ミルクが{図書室|としょしつ}に{到着|とうちゃく}。いつもより{少|すこ}し{遅|おそ}かった。"

      - type: narration
        text: "15:35　マモルが{廊下|ろうか}に{戻|もど}り、{割|わ}れた花びんを{発見|はっけん}。"

      - type: choice
        id: timeline-key
        question: "15:30 の{音|おと}に{一番|いちばん}{近|ちか}くにいた{可能性|かのうせい}があるのは？"
        options:
          - text: "ハヤト（15:28 に{走|はし}ってきた）"
            value: hayato
            reaction:
              character: nozomi
              expression: worried
              text: "15:28に{全速力|ぜんそくりょく}で{走|はし}ってきた……{確|たし}かに{時間的|じかんてき}には{一番|いちばん}{近|ちか}いね。でも、なぜ{走|はし}っていたのか——それも{大事|だいじ}だよ。"
          - text: "ミルク（15:30 すぎに{図書室|としょしつ}{到着|とうちゃく}）"
            value: miruku
            reaction:
              character: nozomi
              expression: worried
              text: "ミルクは15:30すぎに{図書室|としょしつ}に{着|つ}いた。でも、{図書室|としょしつ}に{行|い}く{途中|とちゅう}の{道|みち}は……花びんの{前|まえ}を{通|とお}るんだよね。"
          - text: "マモル（15:25 から{姿|すがた}が{見|み}えない）"
            value: mamoru
            reaction:
              character: nozomi
              expression: worried
              text: "マモルは{見回|みまわ}り{当番|とうばん}だったのに、15:25から{廊下|ろうか}にいない……{気|き}になるね。"
          - text: "コトハ（15:22 に{飼育小屋|しいくごや}へ）"
            value: kotoha
            reaction:
              character: nozomi
              expression: kind
              text: "コトハは15:22に{飼育小屋|しいくごや}へ{向|む}かった。{音|おと}が{聞|き}こえない{距離|きょり}だけど……それだけで「{関係|かんけい}ない」と{言|い}えるかな？"

  # ========================================
  # Act 1: 調査 — 証拠カード③（4人の証言）
  # 各キャラを left/right 交互に配置
  # ========================================
  - id: evidence-3
    bg: classroom
    steps:
      - type: narration
        text: "ノゾミ{先生|せんせい}が1{人|り}ずつ{話|はなし}を{聞|き}いた。\n4{人|にん}とも花びんのことは{言|い}わなかったが、{放課後|ほうかご}に{何|なに}をしていたかは{話|はな}した。"

      # ハヤト: 左
      - type: sprite
        character: hayato
        expression: anxious
        position: left

      - type: dialog
        character: hayato
        text: "友だちのユウキが{校庭|こうてい}で{転|ころ}んで、ひざを{擦|す}りむいたって{聞|き}いた。\nばんそうこうを{取|と}りに{保健室|ほけんしつ}に{走|はし}ったんだ。"

      - type: narration
        text: "【{確認済|かくにんず}み】ユウキは{実際|じっさい}に{校庭|こうてい}で{転|ころ}んでいた。{保健室|ほけんしつ}でばんそうこうをもらったのも{事実|じじつ}。"

      - type: sprite
        character: hayato
        action: hide

      # ミルク: 右
      - type: sprite
        character: miruku
        expression: scared
        position: right

      - type: dialog
        character: miruku
        text: "{図書室|としょしつ}に{行|い}く{途中|とちゅう}でした。いつもの{道|みち}です。"

      - type: narration
        text: "【{確認済|かくにんず}み】ミルクが{図書室|としょしつ}に{向|む}かう{道|みち}は、花びんの{前|まえ}を{通|とお}る{廊下|ろうか}を{通|とお}る。"

      - type: sprite
        character: miruku
        action: hide

      # マモル: 左
      - type: sprite
        character: mamoru
        expression: troubled
        position: left

      - type: dialog
        character: mamoru
        text: "{見回|みまわ}り{当番|とうばん}だったけど、1{年生|ねんせい}のリコちゃんが{泣|な}いていて……。\n{教室|きょうしつ}まで{送|おく}っていったんだ。"

      - type: narration
        text: "【{確認済|かくにんず}み】1{年生|ねんせい}{担任|たんにん}が{確認|かくにん}。リコちゃんは{迷子|まいご}になっていた。"

      - type: sprite
        character: mamoru
        action: hide

      # コトハ: 右
      - type: sprite
        character: kotoha
        expression: calm
        position: right

      - type: dialog
        character: kotoha
        text: "{飼育委員会|しいくいいんかい}の{仕事|しごと}です。ウサギのエサやりと{掃除|そうじ}。"

      - type: narration
        text: "【{確認済|かくにんず}み】15:22に{飼育小屋|しいくごや}{方向|ほうこう}へ{向|む}かった。花びんの{音|おと}は{聞|き}こえない{距離|きょり}。"

      - type: sprite
        character: kotoha
        action: hide

      - type: narration
        text: "4{人|にん}とも、ウソはついていない。\nでも——{何|なに}かを{言|い}っていない{気|き}がする。"

      - type: choice
        id: hunch
        question: "{直感|ちょっかん}で、{誰|だれ}が{何|なに}か{隠|かく}していると{感|かん}じる？"
        options:
          - text: "ハヤト"
            value: hayato
            reaction:
              character: nozomi
              expression: worried
              text: "ハヤトは{走|はし}っていた{理由|りゆう}を{話|はな}したけど……それだけかな。"
          - text: "ミルク"
            value: miruku
            reaction:
              character: nozomi
              expression: worried
              text: "ミルクは{少|すこ}し{怯|おび}えた{表情|ひょうじょう}をしていたね……{何|なに}を{見|み}たのかな。"
          - text: "マモル"
            value: mamoru
            reaction:
              character: nozomi
              expression: worried
              text: "マモルは{当番|とうばん}を{離|はな}れていた。{自分|じぶん}を{責|せ}めているのかもしれない。"
          - text: "コトハ"
            value: kotoha
            reaction:
              character: nozomi
              expression: worried
              text: "コトハは{落|お}ち{着|つ}いて{見|み}えるけど……{落|お}ち{着|つ}きすぎていない？"
          - text: "{全員|ぜんいん}{何|なに}か{隠|かく}している{気|き}がする"
            value: all
            reaction:
              character: nozomi
              expression: kind
              text: "……そうかもしれない。{誰|だれ}もが{何|なに}かを{抱|かか}えているんだ。それを{聞|き}いていこう。"

  # ========================================
  # Act 2: 深掘り — 証拠カード④（卒業生の手紙）
  # ========================================
  - id: letter
    bg: broken-vase-closeup
    bgm: emotional
    steps:
      - type: effect
        name: fade-out
        duration: 500

      - type: effect
        name: fade-in
        duration: 500

      - type: narration
        text: "花びんの{台|だい}の{裏|うら}に、{手紙|てがみ}が{貼|は}ってあった。\n{去年|きょねん}の6{年生|ねんせい}が{残|のこ}したものだ。"

      - type: narration
        text: "「この花びんは『{失敗|しっぱい}しても、やり{直|なお}せる』の{証|あかし}です。」"
        speed: slow

      - type: narration
        text: "「{作|つく}っている{途中|とちゅう}、{何度|なんど}もヒビが{入|はい}りました。\n　でも、みんなで{粘土|ねんど}を{足|た}して、もう{一度|いちど}{焼|や}きました。」"
        speed: slow

      - type: narration
        text: "「{完璧|かんぺき}じゃないけど、みんなの{気持|きも}ちが{詰|つ}まってる。」"
        speed: slow

      - type: narration
        text: "「花びんに{込|こ}めた{気持|きも}ちは、{壊|こわ}れないよ。」"
        speed: slow

      - type: wait
        duration: 2000

  # ========================================
  # Act 2: 深掘り — 証拠カード⑤（問いかけ）
  # ========================================
  - id: questions
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: sprite
        character: nozomi
        expression: kind
        position: center

      - type: dialog
        character: nozomi
        text: "みんなに、{考|かんが}えてほしいことがあるの。"

      - type: sprite
        character: nozomi
        action: hide

      - type: choice
        id: q1
        question: "友だちを{助|たす}けに{行|い}く{途中|とちゅう}だったら、{走|はし}ったことは「{悪|わる}いこと」？"
        feedback_default: "きみの{考|かんが}えを{大切|たいせつ}にしよう。この{問|と}いに{正解|せいかい}はないんだ。"
        options:
          - text: "{悪|わる}くない。友だちを{助|たす}けるためだから"
            value: not-bad
          - text: "{悪|わる}い。ルールはルールだから"
            value: bad
          - text: "{分|わ}からない。どっちの{気持|きも}ちも{分|わ}かる"
            value: unsure

      - type: narration
        text: "{正解|せいかい}はないよ。{大事|だいじ}なのは「なぜそう{思|おも}ったか」を{考|かんが}えること。"

      - type: choice
        id: q2
        question: "{本当|ほんとう}のことを{知|し}っているのに{黙|だま}っているのは、「やさしさ」？ それとも「ずるさ」？"
        feedback_default: "どの{答|こた}えにも{理由|りゆう}がある。「{黙|だま}る」ことの{意味|いみ}を{考|かんが}えてみよう。"
        options:
          - text: "やさしさ。{言|い}ったら{誰|だれ}かが{傷|きず}つくから"
            value: kind
          - text: "ずるさ。{本当|ほんとう}のことを{言|い}うべきだから"
            value: coward
          - text: "どちらでもない。{黙|だま}る{理由|りゆう}による"
            value: depends

      - type: narration
        text: "「{黙|だま}る」にも、いろんな{理由|りゆう}がある。{怖|こわ}いから。{優|やさ}しいから。{迷|まよ}っているから。"

      - type: choice
        id: q3
        question: "やるべきことがあったのに、{別|べつ}の{大事|だいじ}なことをしていた。これは「サボり」？"
        feedback_default: "「{正|ただ}しいこと」が2つあるとき、どちらを{選|えら}ぶかは{難|むずか}しい{問題|もんだい}だね。"
        options:
          - text: "サボりじゃない。もっと{大事|だいじ}なことがあった"
            value: not-slacking
          - text: "サボり。{当番|とうばん}は{当番|とうばん}だから"
            value: slacking
          - text: "{場合|ばあい}による。{何|なに}を{優先|ゆうせん}したかで{変|か}わる"
            value: depends

      - type: narration
        text: "「{正|ただ}しいこと」がふたつあって、{両方|りょうほう}はできないとき——どっちを{選|えら}ぶかは、その{人|ひと}の{心|こころ}が{決|き}める。"

      - type: choice
        id: q4
        question: "{危険|きけん}に{気|き}づいていたのに「{誰|だれ}かがやるだろう」と{放置|ほうち}した。これは「{関係|かんけい}ない」って{言|い}える？"
        feedback_default: "「{気|き}づいた」ということは、もう{無関係|むかんけい}ではいられない。でも、{全部|ぜんぶ}{背負|せお}う{必要|ひつよう}もない。"
        options:
