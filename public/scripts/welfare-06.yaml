scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "ひまわり{小学校|しょうがっこう}に、ベトナムからの{転入生|てんにゅうせい}・リンさんがやってきた。リンさんは{日本語|にほんご}を{勉強中|べんきょうちゅう}で、ひらがなと{簡単|かんたん}な{漢字|かんじ}は{読|よ}めるが、{敬語|けいご}や{外来語|がいらいご}はまだ{難|むずか}しい。"
      - type: narration
        text: "{福祉|ふくし}{探偵|たんてい}{団|だん}の4{人|にん}が「{学校|がっこう}{案内係|あんないがかり}」に{立候補|りっこうほ}した。{代表|だいひょう}として、コハルが{案内文|あんないぶん}を{書|か}くことになった。"
      - type: narration
        text: "ところが{翌日|よくじつ}——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "リンさんが{学校|がっこう}の{中|なか}で{迷子|まいご}になってしまった。{案内文|あんないぶん}を{持|も}っていたが、{読|よ}めない{部分|ぶぶん}が{多|おお}くて{道|みち}が{分|わ}からなかったのだ。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "リンさんが{迷子|まいご}になりました。{案内文|あんないぶん}には{問題|もんだい}が8{カ所|かしょ}ありました。どこが{問題|もんだい}だったか、{調|しら}べてくれますか？"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: yuzuru
            expression: thinking
          - character: ibuki
            expression: worried
          - character: wakana
            expression: surprised
          - character: koharu
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{案内文|あんないぶん}のどこに{問題|もんだい}があったのか。{誰|だれ}が{案内文|あんないぶん}を{書|か}いたのか——。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: ことばの壁
        subtitle: 福祉探偵団 Vol.6

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: リンさんの困りごとを確認しよう
      - type: narration
        text: "リンさんが{迷子|まいご}になった{翌日|よくじつ}、{山田|やまだ}{先生|せんせい}がリンさんに{話|はなし}を{聞|き}いた。"
      - type: se
        sound: discover
      - type: narration
        text: "リンさんの{証言|しょうげん}: 「{案内文|あんないぶん}、もらいました。がんばって{読|よ}みました。でも、{分|わ}からないことばが{多|おお}くて……どこに{行|い}けばいいか{分|わ}かりませんでした。はずかしくて、だれにも{聞|き}けませんでした」"
      - type: narration
        text: "リンさんの{日本語|にほんご}レベル: ひらがな○、{簡単|かんたん}な{漢字|かんじ}（{小|しょう}2{程度|ていど}）○。でも{敬語|けいご}（〜いただく、〜でございます）は×、{長|なが}い{文|ぶん}は×、{外来語|がいらいご}（カタカナ{英語|えいご}）は×。"
      - type: narration
        text: "リンさんは「はずかしくて{聞|き}けなかった」と{言|い}っている。{案内文|あんないぶん}が{分|わ}からないとき、どんな{気持|きも}ちになるだろう？"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 学校案内係の役割分担を確認しよう
      - type: narration
        text: "{山田|やまだ}{先生|せんせい}が{福祉|ふくし}{探偵|たんてい}{団|だん}4{人|にん}の{役割|やくわり}を{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "ユズル ——「{学校|がっこう}の{地図|ちず}（{日本語|にほんご}{版|ばん}）」{担当|たんとう}。{校内地図|こうないちず}に{教室名|きょうしつめい}を{書|か}き{込|こ}んだ。{先生|せんせい}に{確認|かくにん}{済|す}み。"
      - type: narration
        text: "イブキ ——「リンさんの{付|つ}き{添|そ}い{係|がかり}」{担当|たんとう}。{当日|とうじつ}{委員会|いいんかい}{活動|かつどう}と{重|かさ}なり{不参加|ふさんか}になった。"
      - type: narration
        text: "ワカナ ——「{案内|あんない}ルート{計画|けいかく}」{担当|たんとう}。{給食室|きゅうしょくしつ}→{図書室|としょしつ}→{保健室|ほけんしつ}の{順|じゅん}を{設計|せっけい}した。{先生|せんせい}に{確認|かくにん}{済|す}み。"
      - type: narration
        text: "コハル ——「{案内文|あんないぶん}の{作成|さくせい}」{担当|たんとう}。リンさんに{渡|わた}す{案内文|あんないぶん}を{書|か}いた。**{誰|だれ}にも{見|み}せていない（リンさんにも{確認|かくにん}していない）**。"
      - type: narration
        text: "ユズルとワカナは{先生|せんせい}に{確認|かくにん}した。イブキはリンさん{本人|ほんにん}に{話|はな}した。コハルだけ、{誰|だれ}にも{見|み}せずに{完成|かんせい}させた。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: コハルが書いた案内文を確認しよう
      - type: narration
        text: "これがリンさんに{渡|わた}された{案内文|あんないぶん}の{全文|ぜんぶん}だ。{丸数字|まるすうじ}①〜⑧がついた{箇所|かしょ}が{問題点|もんだいてん}だ。"
      - type: se
        sound: discover
      - type: narration
        text: "①「ひまわり{小学校|しょうがっこう}へのご{転入|てんにゅう}、{誠|まこと}におめでとうございます。②{本校|ほんこう}にはさまざまな{施設|しせつ}がございますので、{以下|いか}のご{案内|あんない}を{参考|さんこう}にしていただき、{学校|がっこう}{生活|せいかつ}をエンジョイしていただければ{幸|さいわ}いです。」"
      - type: narration
        text: "③「{給食|きゅうしょく}は、ランチルームにて12{時|じ}15{分|ふん}よりいただくことができますので、お{時間|じかん}になりましたらお{越|こ}しください。④アレルギー{等|とう}のご{心配|しんぱい}がおありの{場合|ばあい}は、{担任|たんにん}の{先生|せんせい}にお{申|もう}し{付|つ}けくださいますようお{願|ねが}いいたします。」"
      - type: narration
        text: "⑤「{図書室|としょしつ}は2{階|かい}のエレベーターホール{付近|ふきん}にございます。⑥リーディングやスタディに{最適|さいてき}なスペースとなっておりますので、ぜひご{利用|りよう}ください。」"
      - type: narration
        text: "⑦「{体調|たいちょう}がすぐれない{場合|ばあい}やケガをされた{場合|ばあい}は、1{階|かい}の{保健室|ほけんしつ}にて{養護教諭|ようごきょうゆ}がカウンセリングを{行|おこな}っておりますので、お{気軽|きがる}にお{越|こ}しください。⑧その{他|た}ご{不明|ふめい}な{点|てん}がございましたら、{職員室|しょくいんしつ}までお{問|と}い{合|あ}わせくださいますようお{願|ねが}い{申|もう}し{上|あ}げます。」"
      - type: narration
        text: "①〜⑧のうち、いくつ{問題|もんだい}{箇所|かしょ}を{見|み}つけられる？ {敬語|けいご}？ {長|なが}い{文|ぶん}？ {外来語|がいらいご}？ それとも{別|べつ}の{問題|もんだい}？"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 4人の作業スタイルを比べよう
      - type: narration
        text: "{山田|やまだ}{先生|せんせい}が4{人|にん}に「どうやって{担当|たんとう}を{準備|じゅんび}したか」を{聞|き}いた。"
      - type: se
        sound: discover
      - type: sprite
        character: yuzuru
        expression: normal
        position: left
      - type: dialog
        character: yuzuru
        text: "学校の地図をコピーして、{教室名|きょうしつめい}を書き込みました。先生に「合っていますか」と{確認|かくにん}しました。"
        expression: normal
      - type: sprite
        character: yuzuru
        action: hide
      - type: sprite
        character: ibuki
        expression: worried
        position: right
      - type: dialog
        character: ibuki
        text: "リンさんに「一緒に回ろうね」と声をかけていました。でも{当日|とうじつ}は{委員会|いいんかい}{活動|かつどう}と{重|かさ}なって……{付|つ}き{添|そ}えなかったんです。"
        expression: worried
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: wakana
        expression: normal
        position: left
      - type: dialog
        character: wakana
        text: "{校内|こうない}を歩いてルートの順番を決めました。先生に「この順番でいいですか」と{確認|かくにん}しました。"
        expression: normal
      - type: sprite
        character: wakana
        action: hide
      - type: sprite
        character: koharu
        expression: thinking
        position: right
      - type: dialog
        character: koharu
        text: "{辞書|じしょ}を引きながら2時間かけて{案内文|あんないぶん}を書きました。リンさんのために、きちんとした{案内文|あんないぶん}を書きたかったから……"
        expression: thinking
      - type: sprite
        character: koharu
        action: hide
      - type: narration
        text: "ユズルとワカナは{先生|せんせい}に{確認|かくにん}した。イブキはリンさん{本人|ほんにん}に{話|はな}した。コハルだけが{誰|だれ}にも{見|み}せず{完成|かんせい}させた——これが{決定的|けっていてき}な{違|ちが}いだ。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: リンさんからのメッセージ
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "{山田|やまだ}{先生|せんせい}がリンさんを{教室|きょうしつ}に{招|まね}きました。リンさんが{福祉|ふくし}{探偵|たんてい}{団|だん}に{直接|ちょくせつ}{話|はな}してくれます。"
        expression: determined
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "リンさん: 「{案内文|あんないぶん}、ありがとうございました。ていねいに{書|か}いてあるのは{分|わ}かりました。でも……ていねいな{日本語|にほんご}は、むずかしいです。『です』『ます』なら{読|よ}めます。でも『ございます』『いただく』は、{学校|がっこう}でまだならっていません」"
      - type: narration
        text: "リンさん: 「ここと、ここと……ここが、{分|わ}かりませんでした（{案内文|あんないぶん}の①〜⑧を{指|ゆび}さす）。わたしのために{書|か}いてくれたのはうれしいです。でも、**かんたんなことばで{書|か}いてもらえたら、もっとうれしいです**」"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "「やさしい{日本語|にほんご}」の5つのルール: ①1{文|ぶん}を{短|みじか}くする。②{敬語|けいご}を{使|つか}わない（です・ますだけ）。③{外来語|がいらいご}を{避|さ}ける。④{漢字|かんじ}にふりがなをつける。⑤{具体的|ぐたいてき}に{書|か}く。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 案内文を書いたのは誰だ？
      - type: sprite
        character: yuzuru
        expression: thinking
        position: left
      - type: dialog
        character: yuzuru
        text: "コハルが{放課後|ほうかご}の教室で{辞書|じしょ}を引きながら{案内文|あんないぶん}を書いているのを見ました。{難|むずか}しい言葉を選んでいたと思います……"
        expression: thinking
      - type: sprite
        character: yuzuru
        action: hide
      - type: sprite
        character: ibuki
        expression: worried
        position: right
      - type: dialog
        character: ibuki
        text: "リンさんが{迷子|まいご}になった後、{廊下|ろうか}でリンさんを見つけました。リンさんは{案内文|あんないぶん}を手に持っていて、赤ペンで分からない言葉に{印|しるし}をつけていました。{印|しるし}は8カ所でした。"
        expression: worried
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: wakana
        expression: determined
        position: left
      - type: dialog
        character: wakana
        text: "{文部科学省|もんぶかがくしょう}の{手引|てびき}では、学校の{配布物|はいふぶつ}は「やさしい日本語」で{作成|さくせい}することが{推奨|すいしょう}されています。{案内文|あんないぶん}には{敬語|けいご}・長文・{外来語|がいらいご}・{抽象表現|ちゅうしょうひょうげん}の4{カテゴリ}で各2カ所、{合計|ごうけい}8カ所の{問題|もんだい}があります。"
        expression: determined
      - type: sprite
        character: wakana
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。{案内文|あんないぶん}の{担当|たんとう}はコハル（Card 2）。ユズルはコハルが{辞書|じしょ}を{引|ひ}きながら{書|か}くのを{目撃|もくげき}。コハルだけ{誰|だれ}にも{確認|かくにん}させなかった（Card 4）——"
      - type: choice
        id: q1
        question: 読めない案内文を書いたのは誰？
        options:
          - text: コハル（案内文の担当で、誰にも確認させなかった）
            value: koharu
            correct: true
            feedback: "{正解|せいかい}！ コハルは{担当|たんとう}として{案内文|あんないぶん}を書き、誰にも{確認|かくにん}させなかった。「{丁寧|ていねい}に書く＝やさしく書く」と思い込み、{敬語|けいご}・{外来語|がいらいご}だらけの{案内文|あんないぶん}を作ってしまった。"
          - text: ユズル（コハルが書いているのを見ていた）
            value: yuzuru
            feedback: "ユズルは地図{担当|たんとう}。コハルの作業を{目撃|もくげき}しただけで、{案内文|あんないぶん}は書いていない。"
          - text: イブキ（付き添いができなかったことを後悔している）
            value: ibuki
            feedback: "イブキは{付|つ}き{添|そ}い{担当|たんとう}で、{案内文|あんないぶん}は{担当|たんとう}していない。リンさんを{廊下|ろうか}で助けたのはイブキだよ。"
          - text: ワカナ（ガイドラインを知っていて黙っていた）
            value: wakana
            feedback: "ワカナはルート{計画|けいかく}{担当|たんとう}で、{案内文|あんないぶん}は書いていない。ガイドラインを知っていたのに{確認|かくにん}しなかった{責任|せきにん}はあるが、作者ではない。"

  # ==================== 真実：コハルの告白 ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: コハルの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: koharu
        expression: worried
        position: center
      - type: dialog
        character: koharu
        text: "……{案内文|あんないぶん}を書いたのは、私です。リンさんのために「ちゃんとした{案内文|あんないぶん}」を書きたかった。失礼のない、{丁寧|ていねい}な文章を。"
        expression: worried
      - type: narration
        text: "コハルは{下|した}を{向|む}きながら、{小|ちい}さな{声|こえ}で{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: koharu
        text: "{辞書|じしょ}を引いて{丁寧|ていねい}な言葉を選んだ。{敬語|けいご}を使ったのは「{礼儀|れいぎ}だから」。詳しく書いたのは「分かりやすいから」。{外来語|がいらいご}を使ったのは「正式名称だから」。2時間かけて書き上げた。"
        expression: thinking
      - type: dialog
        character: koharu
        text: "でも……リンさんの赤ペンの{印|しるし}を見て、{胸|むね}が痛くなった。{丁寧|ていねい}に書いたつもりが、リンさんを困らせてしまった。「{丁寧|ていねい}＝やさしい」ではなかったんだ……"
        expression: worried
      - type: dialog
        character: koharu
        text: "誰かに見せていれば良かった。リンさんに「読める？」と聞くだけで良かった。"
        expression: determined
      - type: sprite
        character: koharu
        action: hide

  # ==================== 真実：ほかのメンバー ====================
  - id: truth-others
    bg: classroom-blackboard
    steps:
      - type: sprite
        character: yuzuru
        expression: worried
        position: left
      - type: dialog
        character: yuzuru
        text: "実は……コハルが{放課後|ほうかご}、{辞書|じしょ}を引きながら{難|むずか}しい言葉を選んでいるのを見ました。「がんばっているな」と思ったけど、声をかけなかった。リンさんの日本語テストの結果を知っていたのに……"
        expression: worried
      - type: sprite
        character: yuzuru
        action: hide
      - type: sprite
        character: ibuki
        expression: worried
        position: right
      - type: dialog
        character: ibuki
