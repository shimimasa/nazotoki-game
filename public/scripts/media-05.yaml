scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "5{年|ねん}2{組|くみ}で「{防災|ぼうさい}ポスターコンテスト」が{開催|かいさい}された。テーマは「{地震|じしん}に{備|そな}えよう」。{全員|ぜんいん}の{作品|さくひん}が{廊下|ろうか}に{掲示|けいじ}されている。"
      - type: narration
        text: "ところが、1{枚|まい}のポスターが{大|おお}きな{話題|わだい}になった。{提出|ていしゅつ}されたマコトの{作品|さくひん}——{避難経路|ひなんけいろ}と{備蓄品|びちくひん}を{組|く}み合わせた{構図|こうず}は、まるで{広告|こうこく}のようだ。"
      - type: narration
        text: "「こんなの{小学生|しょうがくせい}に{描|か}けるわけない。AIで{作|つく}ったんじゃないの？」——{噂|うわさ}は{瞬|またた}く{間|ま}に{広|ひろ}がった。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "マコトさんは「{自分|じぶん}で{描|か}いた」と{主張|しゅちょう}しています。でも{疑|うたが}いの{声|こえ}が{止|と}まりません。メディアリテラシー{探偵団|たんていだん}に{調査|ちょうさ}を{依頼|いらい}します。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: nozomu
            expression: surprised
          - character: shiori
            expression: thinking
          - character: akari
            expression: normal
          - character: makoto
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{上手|うま}すぎる{作品|さくひん}——これはAIが{作|つく}ったものなのか、それとも{人間|にんげん}が{描|か}いたものなのか。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: つくられた絵
        subtitle: メディアリテラシー探偵団 Vol.5

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 問題のポスターを観察しよう
      - type: narration
        text: "マコトが{提出|ていしゅつ}した「{地震|じしん}に{備|そな}えよう」{防災|ぼうさい}ポスターを{仔細|しさい}に{観察|かんさつ}する。"
      - type: se
        sound: discover
      - type: narration
        text: "{構図|こうず}: {画面|がめん}{左側|ひだりがわ}に{避難経路|ひなんけいろ}の{地図|ちず}、{右側|みぎがわ}に{備蓄品|びちくひん}（{水|みず}・{懐中電灯|かいちゅうでんとう}・{非常食|ひじょうしょく}）のイラスト。{中央|ちゅうおう}に「{備|そな}えよう！」の{大|おお}きな{文字|もじ}。グラデーションが{美|うつく}しい。"
      - type: narration
        text: "{重要|じゅうよう}な{観察|かんさつ}{結果|けっか}: {人物|じんぶつ}の{指|ゆび}は{全員|ぜんいん}{正|ただ}しく5{本|ほん}。「{備|そな}えよう！」などの{文字|もじ}は全て{読|よ}める{手書|てが}き{風|ふう}。よく見ると{絵|え}の{具|ぐ}の{塗|ぬ}りムラがある——{完全|かんぜん}に{均一|きんいつ}ではない。"
      - type: sprite
        character: nozomu
        expression: surprised
        position: right
      - type: dialog
        character: nozomu
        text: "これすごくない？ {構図|こうず}も{色使|いろづか}いもプロ{並|な}みだよ。{去年|きょねん}まで{棒人間|ぼうにんげん}しか{描|か}けなかったマコトが、1{年|ねん}でこんなに{上手|うま}くなるなんて、{絶対|ぜったい}AIだ！"
        expression: surprised
      - type: sprite
        character: nozomu
        action: hide
      - type: sprite
        character: shiori
        expression: thinking
        position: left
      - type: dialog
        character: shiori
        text: "ちょっと{待|ま}って。「{上手|うま}すぎる」は{証拠|しょうこ}になるの？ ソースは？ ちゃんと{調|しら}べてから{結論|けつろん}を出そう。"
        expression: thinking
      - type: sprite
        character: shiori
        action: hide

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: クラスメイトの証言を整理しよう
      - type: narration
        text: "クラスメイト3{人|にん}から{証言|しょうげん}が{集|あつ}まった。マコトの{絵|え}の{実力|じつりょく}をめぐって{証言|しょうげん}が{割|わ}れている。"
      - type: se
        sound: discover
      - type: narration
        text: "タカシの{証言|しょうげん}: 「マコトは4{年生|ねんせい}のとき、{図工|ずこう}の{時間|じかん}に{棒人間|ぼうにんげん}しか{描|か}けなかったよ。{色|いろ}を{塗|ぬ}るのも{雑|ざつ}だったし」——これは{過去|かこ}の{事実|じじつ}。"
      - type: narration
        text: "ミサキの{証言|しょうげん}: 「{最近|さいきん}のマコト、{休|やす}み{時間|じかん}にスケッチブックで{真剣|しんけん}に{何|なに}かを{描|か}いていたよ。お{姉|ねえ}ちゃんが{中学校|ちゅうがっこう}の{美術部|びじゅつぶ}って聞いた」——{成長|せいちょう}の{可能性|かのうせい}を{示|しめ}す。"
      - type: narration
        text: "ノゾムの{証言|しょうげん}: 「こんなの{小学生|しょうがくせい}が{描|か}けるわけない。{絶対|ぜったい}AIで{作|つく}って、そのまま{出|だ}したんだ」——これは{意見|いけん}で{事実|じじつ}ではない。"
      - type: sprite
        character: akari
        expression: thinking
        position: left
      - type: dialog
        character: akari
        text: "「{去年|きょねん}{上手|うま}くなかった」は{事実|じじつ}だよね。でも「だから今も{描|か}けないはず」は{事実|じじつ}？ 1{年間|ねんかん}{練習|れんしゅう}してたら{成長|せいちょう}するんじゃないかな。それ{読|よ}んだ人どう{思|おも}うかな……"
        expression: thinking
      - type: sprite
        character: akari
        action: hide

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: コンテストのルールを確認しよう
      - type: narration
        text: "山田先生がコンテストのルール{原文|げんぶん}を{持|も}ってきた。{防災|ぼうさい}ポスターコンテストの{規定|きてい}を{仔細|しさい}に{読|よ}む。"
      - type: se
        sound: discover
      - type: narration
        text: "ルールに{書|か}いてあること: テーマ「{地震|じしん}に{備|そな}えよう」、{用紙|ようし}はB3{画用紙|がようし}、{画材|がざい}は{自由|じゆう}、そして——「{自分|じぶん}で{描|か}いた{作品|さくひん}を{提出|ていしゅつ}すること」。"
      - type: narration
        text: "ルールに{書|か}いていないこと: AI{画像|がぞう}{生成|せいせい}の{使用|しよう}{禁止|きんし}、{参考|さんこう}にしたものの{申告|しんこく}{義務|ぎむ}、{下描|したが}きの{方法|ほうほう}に関するルール、デジタルツールの{使用|しよう}ルール。"
      - type: sprite
        character: akari
        expression: surprised
        position: right
      - type: dialog
        character: akari
        text: "「AI{禁止|きんし}」とは{書|か}いていないんだ！ 「{自分|じぶん}で{描|か}いた{作品|さくひん}」——AI{画像|がぞう}を{参考|さんこう}にして自分の手で{描|か}き直した{場合|ばあい}、それって「{自分|じぶん}で{描|か}いた」に入るのかな？ ルールが{曖昧|あいまい}じゃない？"
        expression: surprised
      - type: sprite
        character: akari
        action: hide

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: タブレットの使用履歴を調べよう
      - type: narration
        text: "山田先生が、メディアリテラシー{探偵団|たんていだん}4{人|にん}のタブレット{使用|しよう}{履歴|りれき}（{過去|かこ}2{週間|しゅうかん}分）を{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "ノゾム: ゲーム{攻略|こうりゃく}サイト・{動画|どうが}サイト・SNS。AI{画像|がぞう}{生成|せいせい}サイトへのアクセスなし。"
      - type: narration
        text: "シオリ: 図書{検索|けんさく}・AI{画像|がぞう}の{特徴|とくちょう}に関する{記事|きじ}。AI{画像|がぞう}{生成|せいせい}サイトへのアクセスなし——{調|しら}べていただけ。"
      - type: narration
        text: "アカリ: {防災|ぼうさい}{情報|じょうほう}サイト・{絵|え}の{描|か}き方{記事|きじ}。AI{画像|がぞう}{生成|せいせい}サイトへのアクセスなし。"
      - type: narration
        text: "マコト: {防災|ぼうさい}ポスターの{参考|さんこう}{画像|がぞう}{検索|けんさく}・{絵|え}の{描|か}き方{動画|どうが}——そして**AI{画像|がぞう}{生成|せいせい}サイトへのアクセスあり**（10日前に1{回|かい}、{約|やく}20{分間|ふんかん}）。"
      - type: sprite
        character: nozomu
        expression: determined
        position: right
      - type: dialog
        character: nozomu
        text: "やっぱり！ マコトだけAI{画像|がぞう}{生成|せいせい}サイトにアクセスしてる。これが{証拠|しょうこ}だ！"
        expression: determined
      - type: sprite
        character: nozomu
        action: hide
      - type: sprite
        character: shiori
        expression: thinking
        position: left
      - type: dialog
        character: shiori
        text: "ちょっと{待|ま}って。アクセスしたのは「AI{画像|がぞう}を{作|つく}った{証拠|しょうこ}」？ それとも「AIを{試|ため}しただけ」の{可能性|かのうせい}もある？ 20{分間|ふんかん}で{何|なに}ができる？ ソースがもっと{必要|ひつよう}だよ。"
        expression: thinking
      - type: sprite
        character: shiori
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: タブレットに残された2つの画像
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "マコトさんのタブレットの{保存|ほぞん}ファイルを{確認|かくにん}したところ、{重要|じゅうよう}な{画像|がぞう}が2{種類|しゅるい}見つかりました。"
        expression: determined
      - type: dialog
        character: yamada
        text: "1つ目はAI{生成|せいせい}{画像|がぞう}。「{防災|ぼうさい}ポスター」を{生成|せいせい}したもので、マコトの{作品|さくひん}と{似|に}た{構図|こうず}です。でも——{人物|じんぶつ}の{指|ゆび}が6{本|ほん}、{建物|たてもの}の{窓|まど}が{不揃|ふぞろ}い、{文字|もじ}が{一部|いちぶ}デタラメ。10日前に{保存|ほぞん}されています。"
        expression: thinking
      - type: dialog
        character: yamada
        text: "2つ目は{制作過程|せいさくかてい}の{写真|しゃしん}4{枚|まい}。9日前の{下描|したが}き、8日前のペン入れ、7日前の{色塗|いろぬ}り、7日前の{完成|かんせい}——{提出|ていしゅつ}{作品|さくひん}と{同|おな}じ{仕上|しあ}がりです。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "AI{画像|がぞう}には{指|ゆび}が6{本|ほん}、{文字|もじ}がデタラメ。でもマコトの{作品|さくひん}は{指|ゆび}5{本|ほん}、{文字|もじ}も{読|よ}める。そして{制作過程|せいさくかてい}の{写真|しゃしん}4{枚|まい}が{存在|そんざい}する——"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "「{上手|うま}すぎるからAI」という{前提|ぜんてい}が{崩|くず}れ{始|はじ}めた。マコトは「AI{画像|がぞう}を{参考|さんこう}にして、自分の手で{描|か}き直した」のではないか？"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: sprite
        character: nozomu
        expression: worried
        position: right
      - type: dialog
        character: nozomu
        text: "え……{制作過程|せいさくかてい}の{写真|しゃしん}があるの？ {下描|したが}きから{完成|かんせい}まで……それって、自分で{描|か}いた{証拠|しょうこ}じゃ……"
        expression: worried
      - type: sprite
        character: nozomu
        action: hide
      - type: sprite
        character: shiori
        expression: determined
        position: left
      - type: dialog
        character: shiori
        text: "AI{画像|がぞう}と{比|くら}べてみよう。AI{画像|がぞう}には{指|ゆび}6{本|ほん}・{窓|まど}の{形|かたち}が{不揃|ふぞろ}い・テクスチャが{均一|きんいつ}すぎる・{文字|もじ}がデタラメ。マコトの{作品|さくひん}はどれも{当|あ}てはまらない。これって手{描|が}きの{特徴|とくちょう}だよ！"
        expression: determined
      - type: sprite
        character: shiori
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。マコトだけがAI{画像|がぞう}{生成|せいせい}サイトにアクセスし、タブレットにAI{生成|せいせい}{画像|がぞう}が{残|のこ}っていた。しかし{作品|さくひん}の{特徴|とくちょう}はAI{画像|がぞう}と{一致|いっち}せず、{制作過程|せいさくかてい}の{写真|しゃしん}4{枚|まい}もある。「AI{参考|さんこう}＋手{描|が}き」——これが{真相|しんそう}か？"
      - type: choice
        id: q1
        question: AI画像を使って作品を作ったのは誰？
        options:
          - text: マコト（AI画像生成サイトにアクセスし、参考にして手描きで作った）
            value: makoto
            correct: true
            feedback: "{正解|せいかい}！ マコトはAI{画像|がぞう}の{構図|こうず}を{参考|さんこう}にして{防災|ぼうさい}ポスターを手で{描|か}き直した。{提出|ていしゅつ}{作品|さくひん}はAI{画像|がぞう}そのものではないが、AI{参考|さんこう}を{申告|しんこく}しなかったことが{問題|もんだい}の{核心|かくしん}だ。"
          - text: ノゾム（AI画像生成ツールを試したことがあると話していた）
            value: nozomu
            feedback: "ノゾムのタブレットにAI{画像|がぞう}{生成|せいせい}サイトへの{履歴|りれき}はなかったよ。「{遊|あそ}びで{使|つか}ったことある」は{過去|かこ}の{話|はなし}で、今回の{作品|さくひん}とは{関係|かんけい}ない。"
          - text: シオリ（AI画像の特徴を調べていた）
            value: shiori
            feedback: "シオリはAI{画像|がぞう}の{特徴|とくちょう}を「{調|しら}べていた」だけで、AI{生成|せいせい}サイトは{使|つか}っていない。タブレット{履歴|りれき}にもアクセスの{記録|きろく}はないよ。"
          - text: アカリ（防災情報サイトや絵の描き方を調べていた）
            value: akari
            feedback: "アカリのタブレットにもAI{画像|がぞう}{生成|せいせい}サイトへのアクセス{履歴|りれき}はなかった。アカリは{防災|ぼうさい}{情報|じょうほう}を{調|しら}べていただけだよ。"

  # ==================== 真実：マコト ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: マコトの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: makoto
        expression: worried
        position: center
      - type: dialog
        character: makoto
        text: "……{正直|しょうじき}に{話|はな}します。AI{画像|がぞう}{生成|せいせい}ツールを{使|つか}ったのは{僕|ぼく}です。"
        expression: worried
      - type: narration
        text: "マコトは{下|した}を{向|む}きながら、{静|しず}かに{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: makoto
        text: "{防災|ぼうさい}ポスターを{描|か}くとき、「AI{画像|がぞう}{生成|せいせい}ツールってどんな{絵|え}が作れるんだろう？」って{純粋|じゅんすい}に{気|き}になった。「{防災|ぼうさい}ポスター {地震|じしん} {避難|ひなん}」って{入力|にゅうりょく}したら、{見事|みごと}な{構図|こうず}の{画像|がぞう}が{生成|せいせい}された。"
        expression: thinking
      - type: dialog
        character: makoto
        text: "「この{構図|こうず}、いいな」と{思|おも}って——{下描|したが}きから{色塗|いろぬ}りまで、{全部|ぜんぶ}自分の手で{描|か}き直した。{図工室|ずこうしつ}で3日間かけて{仕上|しあ}げた。コンテストに{出|だ}したのはAI{画像|がぞう}そのものじゃない。"
        expression: determined
      - type: dialog
        character: makoto
