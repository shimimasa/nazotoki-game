      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "学級会で「昼休みの使い方」について話し合ったが、なぜか決裂してしまった。"
      - type: narration
        text: "議事録を見ると、会議の途中から雰囲気が一気に悪くなった。"
      - type: narration
        text: "平和探偵団は議事録を読み込み、「最初にNVC（非暴力コミュニケーション）のルール違反となる発言をしたのは誰か」を調査する。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: kotoha
        expression: worried
        position: center
      - type: dialog
        character: kotoha
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: kotoha
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: nagi, expression: determined }
          - { id: hibiki, expression: thinking }
          - { id: miwa, expression: thinking }
          - { id: kotoha, expression: worried }
      - type: narration
        text: "「平和探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "平和探偵団"
        subtitle: "Vol.2 話し合いのルール"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: nagi
        expression: thinking
        position: left
      - type: dialog
        character: nagi
        text: "Card 5後、「準備していたのに、怖くなって…」と告白する場面"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        expression: thinking
        position: right
      - type: dialog
        character: hibiki
        text: "密談でナギの恥ずかしさを引き出す聞き込み場面"
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        expression: thinking
        position: left
      - type: dialog
        character: miwa
        text: "議事録の「発言分類表」を完成させ、ナギの発言が「文脈的に最初」であることを証明"
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        expression: worried
        position: right
      - type: dialog
        character: kotoha
        text: "真相後、「失敗するのは当然。練習の場を作ることが大事」と気づきを語る場面"
      - type: sprite
        character: kotoha
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「事件のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: nagi, expression: normal }
          - { id: hibiki, expression: normal }
          - { id: miwa, expression: normal }
          - { id: kotoha, expression: worried }
      - type: choice
        id: q1
        text: "事件のきっかけになった行動をしたのは誰？"
        options:
          - text: "ナギ"
            value: nagi
            correct: false
            feedback: "ナギは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "ヒビキ"
            value: hibiki
            correct: false
            feedback: "ヒビキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "ミワ"
            value: miwa
            correct: false
            feedback: "ミワは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "コトハ"
            value: kotoha
            correct: true
            feedback: "コトハの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "動機は、#13 恥ずかしさ — ナギは事前に「Iメッセージで話そう」と決めていたが、いざ会議で自分の意見が否定されると、「あなたは〜」と相手を責める発言（Youメッセージ）をしてしまった。恥ずかしくて誰にも言えず、「話し合いのルールが不明確だった」と別の原因を主張している。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        expression: worried
        position: center
      - type: dialog
        character: kotoha
        text: "真相後、「失敗するのは当然。練習の場を作ることが大事」と気づきを語る場面"
      - type: sprite
        character: kotoha
        expression: determined
      - type: dialog
        character: kotoha
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: kotoha
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: Iメッセージ（「私は〜と感じた」）とYouメッセージ（「あなたが〜した」）の違いを理解し、なぜIメッセージが対立を減らすかを説明できる\n・**サブ**: 情報整理スキル——議事録から「問題のある発言」と「そうでない発言」を分類する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: nagi, expression: happy }
          - { id: hibiki, expression: happy }
          - { id: miwa, expression: happy }
          - { id: kotoha, expression: happy }
      - type: narration
        text: "平和探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
