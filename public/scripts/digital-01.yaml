meta:
  id: digital-01
  title: 消えたメッセージ
  series: 情報モラル探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  haruto:
    name: ハルト
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  mio:
    name: ミオ
    color: "#E91E63"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sora:
    name: ソラ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  riko:
    name: リコ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: digital-01/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}。クラスのタブレット{連絡|れんらく}アプリ「あおばトーク」で、来月のお{楽|たの}しみ会の出し物を決める{投票|とうひょう}が{行|おこな}われた。"
      - type: sprite
        character: mio
        expression: happy
        position: left
      - type: dialog
        character: mio
        text: "みんな{投票|とうひょう}ありがとう！ 月曜の朝に{結果|けっか}をアプリに{投稿|とうこう}したよ。"
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: sora
        expression: happy
        position: right
      - type: dialog
        character: sora
        text: "ドッジボール大会、{絶対|ぜったい}1位だよな！ みんな好きだもんな！"
      - type: sprite
        character: sora
        action: hide
      - type: narration
        text: "ところが——火曜日の朝。"
      - type: bgm
        action: stop
      - type: se
        sound: digital-01/notification
      - type: sprite
        character: mio
        expression: surprised
        position: center
      - type: dialog
        character: mio
        text: "え……{投票|とうひょう}{結果|けっか}のメッセージが{消|き}えてる！"
      - type: effect
        name: shake
        duration: 400
      - type: dialog
        character: mio
        text: "わたしが{投稿|とうこう}した大事なメッセージが、{誰|だれ}かに{削除|さくじょ}されてる！"
        expression: worried
      - type: sprite
        character: mio
        action: hide
      - type: bgm
        track: digital-01/investigation
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "アプリのログを{確認|かくにん}しました。メッセージが{削除|さくじょ}されたのは月曜日の12時15{分|ふん}です。"
      - type: dialog
        character: sensei
        text: "人のメッセージを{勝手|かって}に{消|け}してはいけない——これはクラスのルールです。{誰|だれ}がなぜ{消|け}したのか、{調|しら}べましょう。"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 情報モラル探偵団 Vol.1
        subtitle: 消えたメッセージ

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: classroom
    bgm: digital-01/investigation
    steps:
      - type: narration
        text: "4年1{組|くみ}の4人に話を{聞|き}こう。月曜の{昼休|ひるやす}み、みんなどこにいた？"
      - type: sprite
        character: haruto
        expression: normal
        position: left
      - type: dialog
        character: haruto
        text: "ぼくはIT{係|がかり}のハルト。{昼休|ひるやす}みは12:00から12:40まで{図書室|としょしつ}で本を読んでいました。"
      - type: dialog
        character: haruto
        text: "{図書室|としょしつ}はタブレット持ち{込|こ}み{禁止|きんし}なので、アプリは使ってません。"
        expression: thinking
      - type: sprite
        character: haruto
        action: hide
      - type: sprite
        character: mio
        expression: normal
        position: right
      - type: dialog
        character: mio
        text: "わたしは{実行|じっこう}{委員|いいん}のミオ。{昼休|ひるやす}みの{前半|ぜんはん}は{教室|きょうしつ}にいて、12:20から{職員室|しょくいんしつ}でお{楽|たの}しみ会の{相談|そうだん}をしていました。"
      - type: dialog
        character: mio
        text: "{教室|きょうしつ}にいたとき、タブレットで{確認|かくにん}したけどメッセージはまだあったよ。"
        expression: thinking
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: sora
        expression: happy
        position: left
      - type: dialog
        character: sora
        text: "おれはソラ。{昼休|ひるやす}みの{前半|ぜんはん}は{教室|きょうしつ}にいて、12:20から{校庭|こうてい}でドッジボールしてた！"
      - type: dialog
        character: sora
        text: "{校庭|こうてい}にタブレットは持ち出せないからね。"
        expression: normal
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: riko
        expression: normal
        position: right
      - type: dialog
        character: riko
        text: "わたしはリコ。{昼休|ひるやす}みは12:00から12:40までずっと{音楽室|おんがくしつ}で{合唱|がっしょう}{練習|れんしゅう}をしていました。"
      - type: dialog
        character: riko
        text: "{音楽室|おんがくしつ}はタブレット持ち{込|こ}み{禁止|きんし}だよ。"
        expression: thinking
      - type: sprite
        character: riko
        action: hide

  # ===== 証拠カード1: アプリのログ =====
  - id: evidence-1
    bg: classroom
    steps:
      - type: title_card
        text: 証拠①
        subtitle: アプリの操作ログ
      - type: narration
        text: "「あおばトーク」のログを{確認|かくにん}しよう。アプリには「いつ・何が起きたか」が{記録|きろく}されている。"
      - type: se
        sound: digital-01/notification
      - type: narration
        text: "ログ{記録|きろく}——"
      - type: narration
        text: "8:15　ミオがメッセージを{投稿|とうこう}"
      - type: narration
        text: "8:30　ハルトが{既読|きどく}"
      - type: narration
        text: "8:35　リコが{既読|きどく}"
      - type: narration
        text: "8:40　ソラが{既読|きどく}"
      - type: narration
        text: "————"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "12:15　メッセージが{削除|さくじょ}されました"
      - type: narration
        text: "ログには「いつ{削除|さくじょ}されたか」は{記録|きろく}されるが、「{誰|だれ}が{削除|さくじょ}したか」は{記録|きろく}されない。"
      - type: narration
        text: "ただし「{誰|だれ}がいつ読んだか（{既読|きどく}）」は{記録|きろく}されている——これがヒントだ。"

  # ===== 証拠カード2: 行動表 =====
  - id: evidence-2
    bgm: digital-01/investigation
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 昼休みの行動表
      - type: narration
        text: "月曜日の{昼休|ひるやす}み（12:00～12:40）、4人はどこにいた？ タブレットが使えたのは{教室|きょうしつ}だけ。"
      - type: narration
        text: "ハルト：12:00～12:40 {図書室|としょしつ}（タブレット持ち{込|こ}み{禁止|きんし}）"
      - type: narration
        text: "ミオ：12:00～12:20 {教室|きょうしつ} → 12:20～12:40 {職員室|しょくいんしつ}"
      - type: narration
        text: "ソラ：12:00～12:20 {教室|きょうしつ} → 12:20～12:40 {校庭|こうてい}"
      - type: narration
        text: "リコ：12:00～12:40 {音楽室|おんがくしつ}（タブレット持ち{込|こ}み{禁止|きんし}）"
      - type: se
        sound: common/discover
      - type: narration
        text: "メッセージが{削除|さくじょ}されたのは12:15。この{時刻|じこく}にタブレットを使えたのは——"
      - type: narration
        text: "ハルト → {図書室|としょしつ}（使えない）→ {除外|じょがい}！"
      - type: narration
        text: "リコ → {音楽室|おんがくしつ}（使えない）→ {除外|じょがい}！"
      - type: narration
        text: "ミオ → {教室|きょうしつ}（使える！）→ {容疑|ようぎ}あり"
      - type: narration
        text: "ソラ → {教室|きょうしつ}（使える！）→ {容疑|ようぎ}あり"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "12:15に{教室|きょうしつ}にいたのはミオとソラの2人。{消去法|しょうきょほう}で4人→2人に{絞|しぼ}れた！ でも、どちらが{消|け}した？"

  # ===== 証拠カード3: 投票結果 =====
  - id: evidence-3
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 消された投票結果の内容
      - type: sprite
        character: haruto
        expression: normal
        position: center
      - type: dialog
        character: haruto
        text: "ぼくは{消|け}される前に{投票|とうひょう}{結果|けっか}を読んでた。{内容|ないよう}を{覚|おぼ}えてるよ。"
      - type: sprite
        character: haruto
        action: hide
      - type: narration
        text: "お{楽|たの}しみ会 出し物 {投票|とうひょう}{結果|けっか}——"
      - type: narration
        text: "1位：{宝|たから}さがしゲーム……8{票|ひょう}"
      - type: narration
        text: "2位：クイズ大会……7{票|ひょう}"
      - type: narration
        text: "3位：お{笑|わら}い{発表会|はっぴょうかい}……6{票|ひょう}"
      - type: narration
        text: "4位：えいが{鑑賞|かんしょう}……4{票|ひょう}"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "5位：ドッジボール大会……3{票|ひょう}（{最下位|さいかい}）"
      - type: narration
        text: "ソラが{提案|ていあん}した「ドッジボール大会」が{最下位|さいかい}。ソラは朝の会で「{絶対|ぜったい}1位だよな！」と言っていた。"
      - type: sprite
        character: riko
        expression: determined
        position: right
      - type: dialog
        character: riko
        text: "そういえば……朝の会のあと、ソラがタブレットで{投票|とうひょう}{結果|けっか}を見て顔をしかめてたよ。「うそだろ…」って小さくつぶやいてた。"
      - type: sprite
        character: riko
        action: hide
      - type: narration
        text: "{投票|とうひょう}{結果|けっか}を見て一番ショックを受けたのは——ソラ。メッセージを{消|け}す{動機|どうき}がある。"

  # ===== 証拠カード4: アプリの仕組み =====
  - id: evidence-4
    bgm: digital-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: アプリの仕組みと目撃証言
      - type: sprite
        character: haruto
        expression: thinking
        position: left
      - type: dialog
        character: haruto
        text: "{実|じつ}は……「あおばトーク」の{設定|せってい}を{調|しら}べたら、{投稿|とうこう}した{本人|ほんにん}だけじゃなくて、クラスの{全員|ぜんいん}がメッセージを{消|け}せる{設定|せってい}になってたんだ。"
      - type: dialog
        character: haruto
        text: "前から気になってたけど、先生に{報告|ほうこく}してなかった……。"
        expression: worried
      - type: sprite
        character: haruto
        action: hide
      - type: sprite
        character: mio
        expression: worried
        position: right
      - type: dialog
        character: mio
        text: "{実|じつ}は、わたしも言ってなかったことがあるの。"
      - type: dialog
        character: mio
        text: "月曜の{昼休|ひるやす}み、12:10ごろ{教室|きょうしつ}でタブレットを開いたとき、ソラもタブレットを開いてた。{画面|がめん}を見て「えっ…」って小さく声を出してたの。"
        expression: worried
      - type: dialog
        character: mio
        text: "気になったけど、{職員室|しょくいんしつ}に行く時間だったから声をかけなかった。"
      - type: sprite
        character: mio
        action: hide
      - type: narration
        text: "ソラは朝に{投票|とうひょう}{結果|けっか}を見てショックを受け、{昼休|ひるやす}みにも{教室|きょうしつ}でタブレットを開いていた——。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: digital-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの{証拠|しょうこ}を{整理|せいり}しよう。{犯人|はんにん}は{誰|だれ}だと思う？"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: メッセージを消す動機があったのは誰？
        options:
          - text: ハルト（IT係で設定に詳しかった）
            value: haruto
            feedback: ハルトは設定に詳しいけど、12:00～12:40まで図書室にいた。タブレット持ち込み禁止だよ。
          - text: ミオ（メッセージを投稿した本人）
            value: mio
            feedback: ミオは自分が投稿したメッセージ。わざわざ消す動機がないよね。
          - text: ソラ（ドッジボールが最下位でショック）
            value: sora
            feedback: その通り！ ソラのドッジボール大会は最下位3票。「絶対1位」と思っていたのにショックだった。
          - text: リコ（投票結果に不満があった）
            value: riko
            feedback: リコのクイズ大会は2位で悪くない結果。それにリコは音楽室にいてタブレットを使えなかったよ。
      - type: choice
        id: q2
        question: メッセージを削除した犯人は誰だと思う？
        options:
          - text: ハルト（IT係だからアプリの操作に詳しい）
            value: haruto
            feedback: ハルトは図書室にいた（12:00～12:40）。タブレット持ち込み禁止だから、12:15に削除できないよ。
          - text: ミオ（教室にいてタブレットを使えた）
            value: mio
            feedback: ミオは12:00～12:20に教室にいたけど、自分が投稿したメッセージを消す理由がない。12:20には職員室に移動してるよ。
          - text: ソラ（教室にいて、投票結果に不満があった）
            value: sora
            feedback: 正解！ ソラは12:00～12:20に教室にいて、ドッジボール最下位にショック。動機も機会もソラだけにある。
          - text: リコ（記憶力がよく、情報を握っている）
            value: riko
            feedback: リコは音楽室にいた（12:00～12:40）。タブレット持ち込み禁止だから物理的にできないよ。

  # ===== 証拠カード5: 既読ログ =====
  - id: evidence-5
    bgm: digital-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: 既読ログが語る真実
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "先生がアプリの{既読|きどく}ログをさらに{詳|くわ}しく{調|しら}べました。{重要|じゅうよう}な{発見|はっけん}があります。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "月曜日の{既読|きどく}ログ（{投票|とうひょう}{結果|けっか}メッセージ）——"
      - type: narration
        text: "8:30　ハルト → {既読|きどく}"
      - type: narration
        text: "8:35　リコ → {既読|きどく}"
      - type: narration
        text: "8:40　ソラ → {既読|きどく}"
      - type: narration
        text: "12:10　ミオ → {再読|さいどく}（{昼休|ひるやす}みに{確認|かくにん}）"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "12:14　ソラ → {再読|さいどく}"
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "12:15　メッセージ{削除|さくじょ}"
      - type: narration
        text: "ソラが12:14にメッセージをもう一度読んでいる。その1{分後|ぷんご}に{削除|さくじょ}。"
      - type: narration
        text: "「読んでから1{分|ぷん}で{削除|さくじょ}」——じっくり{考|かんが}えて{消|け}したのではない。{衝動的|しょうどうてき}に{消|け}した。"
      - type: narration
        text: "朝にドッジボール{最下位|さいかい}を知ってショック → {昼休|ひるやす}みにもう一度{確認|かくにん} → やっぱり{最下位|さいかい} → {衝動的|しょうどうてき}に{削除|さくじょ}。"
      - type: narration
        speed: slow
        text: "{操作|そうさ}ログは「{誰|だれ}が{消|け}したか」を{記録|きろく}しない。でも「{誰|だれ}がいつ読んだか」は{記録|きろく}する——この{仕組|しく}みが{犯人|はんにん}を{指|さ}している。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: classroom
    bgm: digital-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: みんなの「言えなかったこと」
      - type: effect
        name: fade-in
        duration: 600

  # ハルトの秘密
  - id: truth-haruto
    bg: classroom
    steps:
      - type: sprite
        character: haruto
        expression: worried
        position: left
      - type: dialog
        character: haruto
        text: "ぼくも{正直|しょうじき}に言わなきゃいけないことがあります。"
      - type: dialog
        character: haruto
        text: "アプリの{削除|さくじょ}{権限|けんげん}がクラス{全員|ぜんいん}にあることに、前から気づいてたんです。「これは{問題|もんだい}じゃないかな」と思ってたのに、先生に{報告|ほうこく}しなかった。"
        expression: worried
      - type: dialog
        character: haruto
        text: "ぼくが{報告|ほうこく}していれば、{設定|せってい}を変えてもらえて、こんなことは起きなかったかもしれない。"
        expression: determined
      - type: sprite
        character: haruto
        action: hide

  # ミオの秘密
  - id: truth-mio
    steps:
      - type: sprite
        character: mio
        expression: worried
        position: right
      - type: dialog
        character: mio
        text: "わたしも……ソラがタブレットを見て「えっ…」って声を出してたのを見たのに、声をかけなかった。"
      - type: dialog
        character: mio
        text: "あのとき「どうしたの？」って{聞|き}いていれば、ソラの気持ちに気づけたかもしれない。"
        expression: worried
      - type: dialog
        character: mio
        text: "{職員室|しょくいんしつ}に行く時間だったからって、友達を{放|ほう}っておいた。それが{後悔|こうかい}です。"
        expression: determined
      - type: sprite
        character: mio
        action: hide

  # リコの秘密
  - id: truth-riko
    steps:
      - type: sprite
        character: riko
        expression: worried
        position: left
      - type: dialog
        character: riko
        text: "わたしも言わなきゃいけないことがあります。"
      - type: dialog
        character: riko
