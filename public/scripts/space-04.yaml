meta:
  id: space-04
  title: 惑星の順番
  series: 宇宙探偵団
  volume: 4
  estimatedMinutes: 18

characters:
  hikari:
    name: ヒカリ
    color: "#FF4444"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
