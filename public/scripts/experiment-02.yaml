scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "実験ミステリー Vol.2"
        subtitle: "まぜこぜの条件"
      - type: sprite_group
        characters:
          - id: jikken
            expression: normal
          - id: kansatsu
            expression: normal
          - id: kasetsu
            expression: normal
          - id: kenshou
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: jikken
        action: hide
      - type: sprite
        character: kansatsu
        action: hide
      - type: sprite
        character: kasetsu
        action: hide
      - type: sprite
        character: kenshou
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: jikken
        expression: normal
        position: left
      - type: dialog
        character: jikken
        text: "水を多めにあげたのは自分だ"
      - type: dialog
        character: jikken
        text: "水を多めにあげたのは自分だ"
        expression: thinking
      - type: sprite
        character: jikken
        action: hide
      - type: sprite
        character: kansatsu
        expression: normal
        position: right
      - type: dialog
        character: kansatsu
        text: "実験の途中で、植物の置き場所が変わっていたことを覚えている"
      - type: dialog
        character: kansatsu
        text: "実験の途中で、植物の置き場所が変わっていたことを覚えている"
        expression: thinking
      - type: sprite
        character: kansatsu
        action: hide
      - type: sprite
        character: kasetsu
        expression: normal
        position: left
      - type: dialog
        character: kasetsu
        text: "ジッケンは植物が育ったのを見て、とても喜んでいた"
      - type: dialog
        character: kasetsu
        text: "ジッケンは植物が育ったのを見て、とても喜んでいた"
        expression: thinking
      - type: sprite
        character: kasetsu
        action: hide
      - type: sprite
        character: kenshou
        expression: normal
        position: right
      - type: dialog
        character: kenshou
        text: "植物がよく育ったこと自体は本当だと思っている"
      - type: dialog
        character: kenshou
        text: "植物がよく育ったこと自体は本当だと思っている"
        expression: thinking
      - type: sprite
        character: kenshou
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: jikken
            expression: thinking
          - id: kansatsu
            expression: thinking
          - id: kasetsu
            expression: thinking
          - id: kenshou
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ジッケン"
            value: jikken
            correct: false
            feedback: "ジッケンは手がかりを持っているが、決め手は足りない。"
          - text: "カンサツ"
            value: kansatsu
            correct: false
            feedback: "カンサツは手がかりを持っているが、決め手は足りない。"
          - text: "カセツ"
            value: kasetsu
            correct: false
            feedback: "カセツは手がかりを持っているが、決め手は足りない。"
          - text: "ケンショウ"
            value: kenshou
            correct: true
            feedback: "ケンショウの行動が、証拠といちばん一致している。"
      - type: sprite
        character: jikken
        action: hide
      - type: sprite
        character: kansatsu
        action: hide
      - type: sprite
        character: kasetsu
        action: hide
      - type: sprite
        character: kenshou
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "ケンショウ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kenshou
        expression: worried
        position: center
      - type: dialog
        character: kenshou
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: kenshou
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: jikken
            expression: happy
          - id: kansatsu
            expression: happy
          - id: kasetsu
            expression: happy
          - id: kenshou
            expression: happy
      - type: narration
        text: "実験ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: jikken
        action: hide
      - type: sprite
        character: kansatsu
        action: hide
      - type: sprite
        character: kasetsu
        action: hide
      - type: sprite
        character: kenshou
        action: hide
