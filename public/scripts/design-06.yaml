scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: school
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校|がっこう}のシアター{発表会|はっぴょうかい}が{近|ちか}づいていた。{デザイン思考探偵団|でざいんしこうたんていだん}の4{人|にん}は{舞台|ぶたい}{装飾|そうしょく}プロジェクトに{取|と}り{組|く}んでいた。{制約|せいやく}は4つ——{予算|よさん}2000{円|えん}{以内|いない}・{作業|さぎょう}{時間|じかん}2{時間|じかん}{以内|いない}・{全員|ぜんいん}が{安全|あんぜん}に{使|つか}える{素材|そざい}・{環境|かんきょう}への{配慮|はいりょ}。"
      - type: narration
        text: "4{人|にん}は{力|ちから}を{合|あ}わせ、カラフルな{布|ぬの}と{紙|かみ}で{舞台|ぶたい}を{飾|かざ}り{上|あ}げた。{完成|かんせい}した{装飾|そうしょく}は{豪華|ごうか}で、{見|み}た{目|め}はとても{素晴|すば}らしかった。"
      - type: se
        sound: murmur
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{待|ま}ってください。この{素材|そざい}——{安全|あんぜん}チェックが{通|とお}っていないものが{使|つか}われています。{舞台|ぶたい}に{立|た}つ{子|こ}たちに{危険|きけん}が{及|およ}ぶかもしれません。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite_group
        characters:
          - character: tsukuru
            expression: surprised
          - character: hakaru
            expression: thinking
          - character: kanae
            expression: worried
          - character: minaosu
            expression: thinking
      - type: narration
        text: "{制約|せいやく}を{守|まも}ったはずなのに、{安全|あんぜん}チェックが{通|とお}らない。4つの{制約|せいやく}のうち、どの{制約|せいやく}が{無視|むし}されたのか。{誰|だれ}が「みんなのために」という{理由|りゆう}で{優先順位|ゆうせんじゅんい}を{間違|まちが}えたのか——{謎|なぞ}を{解|と}かなければならない。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 制約のぶつかり
        subtitle: デザイン思考探偵団 Vol.6

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: school
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: プロジェクト概要と購入素材リスト
      - type: narration
        text: "プロジェクトの{記録|きろく}が{残|のこ}されていた。4つの{制約|せいやく}{一覧|いちらん}と、{先生|せんせい}からの「{安全|あんぜん}チェック{不合格|ふごうかく}」{通知|つうち}——どの{制約|せいやく}が{問題|もんだい}になったのかを{確認|かくにん}する{必要|ひつよう}があった。"
      - type: evidence
        id: card-1
        title: プロジェクト概要（4つの制約一覧）＋先生からの通知
        content: "【4つの{制約|せいやく}】①{予算|よさん}:2000{円|えん}{以内|いない}　②{作業|さぎょう}{時間|じかん}:2{時間|じかん}{以内|いない}　③{安全|あんぜん}{素材|そざい}:{全員|ぜんいん}が{安全|あんぜん}に{使|つか}えるもの（アレルギー{成分|せいぶん}・{鋭利|えいり}な{部品|ぶひん}・{可燃性|かねんせい}{素材|そざい}は{使用禁止|しようきんし}）　④{環境|かんきょう}:{廃棄物|はいきぶつ}を{最小|さいしょう}{限|げん}に　【{先生|せんせい}からの{通知|つうち}】「{完成|かんせい}した{装飾|そうしょく}に、{安全|あんぜん}チェックが{通|とお}らない{素材|そざい}が{使用|しよう}されています。このまま{舞台|ぶたい}での{使用|しよう}はできません」"
      - type: sprite
        character: minaosu
        expression: thinking
        position: right
      - type: dialog
        character: minaosu
        text: "4つの{制約|せいやく}を{全部|ぜんぶ}チェックしないといけない。{予算|よさん}・{時間|じかん}・{安全|あんぜん}・{環境|かんきょう}——どれが{守|まも}られて、どれが{守|まも}られなかったのか、{全部|ぜんぶ}{確認|かくにん}しよう。"
        expression: thinking
      - type: sprite
        character: minaosu
        action: hide
      - type: narration
        text: "{次|つぎ}に、{購入|こうにゅう}した{素材|そざい}のリストと、それぞれが{担当|たんとう}した{作業|さぎょう}の{記録|きろく}が{見|み}つかった。"
      - type: evidence
        id: card-2
        title: 購入素材のリスト（レシート）＋各自の作業記録
        content: "【{購入|こうにゅう}{素材|そざい}リスト】{合計|ごうけい}1850{円|えん}（{予算|よさん}:{範囲内|はんいない}✅）{作業|さぎょう}{時間|じかん}:1{時間|じかん}45{分|ぷん}（{時間|じかん}:{範囲内|はんいない}✅）{廃棄物|はいきぶつ}:{少量|しょうりょう}のみ（{環境|かんきょう}:{範囲内|はんいない}✅）{使用|しよう}{素材|そざい}:{布|ぬの}・{紙|かみ}・{接着剤|せっちゃくざい}A{型|がた}・{スプレー塗料|すぷれーとりょう}Z{型|がた}　【{作業|さぎょう}{分担|ぶんたん}】ツクル:{素材|そざい}{購入|こうにゅう}・{制作|せいさく}　ハカル:{予算|よさん}と{時間|じかん}の{管理|かんり}　カナエ:{素材|そざい}{選択|せんたく}の{補助|ほじょ}　ミナオス:{チェックリスト|ちぇっくりすと}{管理|かんり}"
      - type: sprite
        character: tsukuru
        expression: surprised
        position: left
      - type: dialog
        character: tsukuru
        text: "{予算|よさん}も{時間|じかん}も{環境|かんきょう}も{大丈夫|だいじょうぶ}だったのに！　{安全|あんぜん}だけが……？　{スプレー塗料|すぷれーとりょう}Z{型|がた}が{問題|もんだい}なのかな。でも{誰|だれ}がそれを{確認|かくにん}する{担当|たんとう}だったんだろう。"
        expression: surprised
      - type: sprite
        character: tsukuru
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: school
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 優先順位メモと安全チェックリスト
      - type: narration
        text: "それぞれが{書|か}いた「4つの{制約|せいやく}の{優先順位|ゆうせんじゅんい}」メモが{見|み}つかった。そしてミナオスが{作|つく}った{全員|ぜんいん}{共通|きょうつう}のチェックリストにも{異変|いへん}があった。"
      - type: evidence
        id: card-3
        title: 各自の制約優先順位メモ＋チェックリスト（安全欄が空白）
        content: "【{各自|かくじ}の{優先順位|ゆうせんじゅんい}メモ】ツクル:①{安全|あんぜん}◎②{予算|よさん}○③{時間|じかん}○④{環境|かんきょう}○　カナエ:①{安全|あんぜん}◎②{環境|かんきょう}○③{予算|よさん}○④{時間|じかん}○　ミナオス:①{安全|あんぜん}◎②{環境|かんきょう}○③{時間|じかん}○④{予算|よさん}○　ハカル:①{予算|よさん}◎②{時間|じかん}○③{環境|かんきょう}○④{安全|あんぜん}は「{最後|さいご}に{確認|かくにん}する」と{記載|きさい}　【チェックリスト】{予算|よさん}欄:✅　{時間|じかん}欄:✅　{環境|かんきょう}欄:✅　{安全|あんぜん}欄:□（{空白|くうはく}）"
      - type: sprite
        character: minaosu
        expression: surprised
        position: left
      - type: dialog
        character: minaosu
        text: "{安全|あんぜん}チェックリストが{空白|くうはく}！　{他|ほか}の3つは{全部|ぜんぶ}チェックが{入|はい}っているのに、{安全|あんぜん}だけ{誰|だれ}も{確認|かくにん}していない。そして……ハカルのメモだけが「{安全|あんぜん}は{最後|さいご}に{確認|かくにん}」って{書|か}いてある。"
        expression: surprised
      - type: sprite
        character: minaosu
        action: hide
      - type: narration
        text: "3{人|にん}のメモには{安全|あんぜん}に◎がついていた。{安全|あんぜん}を{最優先|さいゆうせん}にしていたのに、{安全|あんぜん}チェックが{空白|くうはく}——なぜ？"
      - type: sprite
        character: kanae
        expression: thinking
        position: right
      - type: dialog
        character: kanae
        text: "{舞台|ぶたい}に{立|た}つ{子|こ}たちが{安全|あんぜん}な{素材|そざい}かどうか、{私|わたし}は{一番|いちばん}{気|き}にしていたの。でも{安全|あんぜん}チェック{担当|たんとう}はハカルだったはず——「{最後|さいご}に{確認|かくにん}する」って{言|い}っていたから、{任|まか}せていた。"
        expression: thinking
      - type: sprite
        character: kanae
        action: hide
      - type: narration
        text: "{条件付|じょうけんつ}き{公開|こうかい}——{安全|あんぜん}チェックリストの{詳細|しょうさい}が{確認|かくにん}された。"
      - type: evidence
        id: card-4
        title: 【条件付き公開】安全チェックリスト詳細＋ハカルのメモ
        content: "【{安全|あんぜん}チェックリスト{詳細|しょうさい}】アレルギー{成分|せいぶん}{確認|かくにん}:□{未確認|みかくにん}　{鋭利|えいり}な{部品|ぶひん}チェック:□{未確認|みかくにん}　{可燃性|かねんせい}{素材|そざい}{確認|かくにん}:□{未確認|みかくにん}　※{スプレー塗料|すぷれーとりょう}Z{型|がた}は{可燃性|かねんせい}あり・{密閉|みっぺい}{空間|くうかん}{使用禁止|しようきんし}　【ハカルのメモ（{裏|うら}ページ）】「{安全|あんぜん}は{最後|さいご}に{確認|かくにん}すればいい。{予算|よさん}と{時間|じかん}を{守|まも}れば{一番|いちばん}いいものができる。{豪華|ごうか}な{方|ほう}がみんな{喜|よろこ}ぶ」"
      - type: sprite
        character: hakaru
        expression: worried
        position: center
      - type: dialog
        character: hakaru
        text: "……{確認|かくにん}するつもりだったんだ。でも{予算|よさん}と{時間|じかん}の{管理|かんり}に{集中|しゅうちゅう}していたら、{安全|あんぜん}チェックを{後|あと}{回|まわ}しにしてしまって——{最後|さいご}まで{確認|かくにん}できなかった。"
        expression: worried
      - type: sprite
        character: hakaru
        action: hide

  # ==================== 中間点 ====================
  - id: midpoint
    bg: school
    bgm: thinking-time
    steps:
      - type: narration
        text: "{証拠|しょうこ}が{集|あつ}まってきた。{安全|あんぜん}チェックリストは{空白|くうはく}のまま。ハカルのメモには「{安全|あんぜん}は{最後|さいご}に{確認|かくにん}」と{書|か}かれていた。{誰|だれ}が{安全|あんぜん}という{制約|せいやく}を{後回|あとまわ}しにしたのか——"
      - type: sprite
        character: tsukuru
        expression: worried
        position: left
      - type: dialog
        character: tsukuru
        text: "こんなに{豪華|ごうか}に{作|つく}れたのに。{予算|よさん}も{時間|じかん}もちゃんと{守|まも}ったのに……{安全|あんぜん}がNGなら{使|つか}えないじゃないか。もし{舞台|ぶたい}で{誰|だれ}かに{何|なに}かあったら？"
        expression: worried
      - type: sprite
        character: tsukuru
        action: hide
      - type: sprite
        character: minaosu
        expression: thinking
        position: right
      - type: dialog
        character: minaosu
        text: "4つの{制約|せいやく}を{全部|ぜんぶ}{確認|かくにん}するチェックリストを{作|つく}ったのに。{予算|よさん}・{時間|じかん}・{環境|かんきょう}は{全|すべ}て✅——でも{安全|あんぜん}だけ□。{全探索|ぜんたんさく}すれば、どこが{欠|か}けているか{一目|ひとめ}で{分|わ}かるのよ。"
        expression: thinking
      - type: sprite
        character: minaosu
        action: hide
      - type: sprite
        character: kanae
        expression: thinking
        position: left
      - type: dialog
        character: kanae
        text: "{見|み}えないリスクって、{目|め}に{見|み}えないからこそ{怖|こわ}い。{予算|よさん}は{数字|すうじ}で{見|み}えるし、{時間|じかん}も{時計|とけい}で{見|み}える。でも{安全|あんぜん}の{問題|もんだい}は{後|あと}から{気|き}づくことが{多|おお}い——だから{最初|さいしょ}に{確認|かくにん}しなきゃいけないのよ。"
        expression: thinking
      - type: sprite
        character: kanae
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: school
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 山田先生の補足とハカルの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "ハカルに{直接|ちょくせつ}{確認|かくにん}したところ、こう{話|はな}していたわ。「{豪華|ごうか}な{方|ほう}がみんな{喜|よろこ}ぶと{思|おも}った。{予算|よさん}と{時間|じかん}を{守|まも}れば{安全|あんぜん}は{後|あと}で{確認|かくにん}できると{思|おも}っていた」——{善意|ぜんい}から{行動|こうどう}していたの。"
        expression: thinking
      - type: dialog
        character: yamada
        text: "でもね、{制約|せいやく}には{優先順位|ゆうせんじゅんい}がある。{予算|よさん}や{時間|じかん}はトレードオフで{選|えら}べる——でも「{安全|あんぜん}じゃない」は{選択肢|せんたくし}に{入|はい}らない。{安全|あんぜん}だけは{最初|さいしょ}に{確認|かくにん}すべき{絶対条件|ぜったいじょうけん}なのよ。"
        expression: determined
      - type: sprite
        character: yamada
        action: hide
      - type: evidence
        id: card-5
        title: 山田先生の補足＋制約条件の優先順位の考え方
        content: "【ハカルの{告白|こくはく}】「{豪華|ごうか}な{方|ほう}がみんな{喜|よろこ}ぶ。{安全|あんぜん}は{後|あと}で{確認|かくにん}すれば{間|ま}に{合|あ}うと{思|おも}った」　【{制約|せいやく}{条件|じょうけん}の{優先順位|ゆうせんじゅんい}】{制約|せいやく}には{重|おも}さがある。{予算|よさん}・{時間|じかん}・{環境|かんきょう}は{状況|じょうきょう}に{応|おう}じてトレードオフできる。しかし{安全|あんぜん}だけは{絶対条件|ぜったいじょうけん}——どんな{状況|じょうきょう}でも{最初|さいしょ}に{確認|かくにん}すべき{制約|せいやく}だ。「{安全|あんぜん}を{後|あと}で{確認|かくにん}すれば{間|ま}に{合|あ}う」という{発想|はっそう}が、{最大|さいだい}の{見落|みおと}としにつながる。"
      - type: sprite
        character: minaosu
        expression: determined
        position: right
      - type: dialog
        character: minaosu
        text: "{全探索|ぜんたんさく}で4つの{制約|せいやく}を{全部|ぜんぶ}チェックすれば、{安全|あんぜん}の{空白|くうはく}はすぐに{見|み}えた。「{後|あと}で{確認|かくにん}する」という{判断|はんだん}が、{見落|みおと}としを{生|う}んだのよ。"
        expression: determined
      - type: sprite
        character: minaosu
        action: hide
      - type: se
        sound: reveal
      - type: narration
        text: "**「みんなを{喜|よろこ}ばせたい」という{善意|ぜんい}→{安全|あんぜん}を{後回|あとまわ}し→{安全|あんぜん}チェック{未完了|みかんりょう}→{危険|きけん}な{素材|そざい}が{舞台|ぶたい}へ。**{豪華|ごうか}さを{追求|ついきゅう}しようとした{行動|こうどう}が、{舞台|ぶたい}に{立|た}つ{全員|ぜんいん}を{危険|きけん}にさらしていた。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: school
    bgm: confrontation
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 安全制約を見落として装飾を作ったのは誰？
      - type: sprite
        character: minaosu
        expression: determined
        position: right
      - type: dialog
        character: minaosu
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①ハカルのメモだけが「{安全|あんぜん}は{最後|さいご}に{確認|かくにん}」と{書|か}かれていた。②{安全|あんぜん}チェック{担当|たんとう}はハカルだった。③{安全|あんぜん}チェックリストは{空白|くうはく}のまま。④{可燃性|かねんせい}の{スプレー塗料|すぷれーとりょう}が{未確認|みかくにん}で{使用|しよう}されていた。"
        expression: determined
      - type: sprite
        character: minaosu
        action: hide
      - type: narration
