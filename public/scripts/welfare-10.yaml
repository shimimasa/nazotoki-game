      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "ひまわり{組|ぐみ}の{担任|たんにん}、{田中|たなか}{先生|せんせい}に{話|はなし}を{聞|き}きました。{大切|たいせつ}なことが{分|わ}かりました。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "{田中|たなか}{先生|せんせい}の{証言|しょうげん}——「{参加|さんか}{申請|しんせい}は{出|で}ていましたよ。{木曜日|もくようび}に{確認|かくにん}しました。ひまわり{組|ぐみ}としても、{合同|ごうどう}{劇|げき}への{参加|さんか}を{承認|しょうにん}していました」"
      - type: narration
        text: "「ところが{金曜日|きんようび}の{朝|あさ}、{申請|しんせい}が{取|と}り{下|さ}げられていると{知|し}りました。**ミユちゃんは{合同|ごうどう}{劇|げき}を{楽|たの}しみにしていたんです**。{木曜日|もくようび}の{合同|ごうどう}{練習|れんしゅう}でも、とても{楽|たの}しそうに{歌|うた}の{練習|れんしゅう}をしていました」"
      - type: narration
        text: "「ミユちゃんは{確|たし}かに{練習|れんしゅう}に{時間|じかん}がかかります。でも、**{本人|ほんにん}は『やりたい』と{言|い}っていた**んです。2{週間|しゅうかん}の{準備|じゅんび}{期間|きかん}があれば{十分|じゅうぶん}{練習|れんしゅう}できます」"
      - type: narration
        text: "「{差|さ}し{戻|もど}しについて、**ミユちゃんには{誰|だれ}も{相談|そうだん}していません**。{本人|ほんにん}の{意思|いし}を{確認|かくにん}せずに{決|き}めてしまった{人|ひと}がいる。それが{一番|いちばん}の{問題|もんだい}です」"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "ひまわり{組|ぐみ}は{参加|さんか}を{承認|しょうにん}していた。ミユちゃん{本人|ほんにん}は「やりたい」と{言|い}っていた。{誰|だれ}かが{本人|ほんにん}に{聞|き}かずに「{無理|むり}させないほうがいい」と{判断|はんだん}した——。"

  # ==================== キャラクター議論シーン ====================
  - id: discussion
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 証拠を整理しよう
      - type: sprite
        character: yuzuru
        expression: thinking
        position: left
      - type: dialog
        character: yuzuru
        text: "{金曜日|きんようび}の{朝|あさ}8:20ごろ、{職員室|しょくいんしつ}の{前|まえ}を{通|とお}ったとき……イブキが{職員室|しょくいんしつ}から{出|で}てくるのを{見|み}た。「ちょっと{先生|せんせい}に{用事|ようじ}があって」って{言|い}ってた。{差|さ}し{戻|もど}しの{記録|きろく}は8:15——{時間|じかん}が{一致|いっち}する。"
        expression: thinking
      - type: sprite
        character: yuzuru
        action: hide
      - type: sprite
        character: wakana
        expression: determined
        position: right
      - type: dialog
        character: wakana
        text: "{文化祭|ぶんかさい}のルールを{確認|かくにん}した。「{参加|さんか}{申請|しんせい}の{差|さ}し{戻|もど}しには{教師|きょうし}の{許可|きょか}か、{参加|さんか}{者|しゃ}{本人|ほんにん}の{同意|どうい}が{必要|ひつよう}」。ミユちゃんの{同意|どうい}は？ {記録|きろく}に{教師|きょうし}の{名前|なまえ}もない。これはルール{違反|いはん}だ。"
        expression: determined
      - type: sprite
        character: wakana
        action: hide
      - type: sprite
        character: koharu
        expression: worried
        position: left
      - type: dialog
        character: koharu
        text: "{木曜|もくよう}{放課後|ほうかご}の{練習|れんしゅう}でね……ミユちゃんが「{準備|じゅんび}、{間|ま}に{合|あ}うかな……」ってつぶやいた。でもすぐ「がんばる！」って{言|い}って{練習|れんしゅう}を{続|つづ}けた。「{心配|しんぱい}」と「{やりたくない}」は{違|ちが}う。そのとき——イブキが{心配|しんぱい}そうな{顔|かお}をしてた。"
        expression: worried
      - type: sprite
        character: koharu
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。{差|さ}し{戻|もど}しは{金曜|きんよう}{朝|あさ}8:15。ユズルが8:20にイブキを{職員室|しょくいんしつ}の{前|まえ}で{目撃|もくげき}。イブキは{唯一|ゆいいつ}「ひまわり{組|ぐみ}との{連絡|れんらく}{役|やく}」でミユちゃんの{状況|じょうきょう}を{知|し}り{得|え}た{人物|じんぶつ}。ワカナは{木曜日|もくようび}に{早退|そうたい}——{合同|ごうどう}{練習|れんしゅう}には{参加|さんか}していない。"

  # ==================== 推理・投票（2問） ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 第1の問い
        subtitle: 参加申請を差し戻したのは誰？
      - type: choice
        id: q1
        question: 参加申請を差し戻したのは誰？
        options:
          - text: イブキ（ひまわり組との連絡役。金曜朝に職員室で目撃）
            value: ibuki
            correct: true
            feedback: "{正解|せいかい}！ イブキは{木曜|もくよう}{放課後|ほうかご}にミユちゃんの「{準備|じゅんび}、{間|ま}に{合|あ}うかな……」という{言葉|ことば}を{聞|き}き、「{無理|むり}させたくない」と{考|かんが}えて{金曜日|きんようび}{朝|あさ}に{差|さ}し{戻|もど}した。ミユちゃん{本人|ほんにん}には{聞|き}かずに。"
          - text: ユズル（申請書を職員室に提出した人物）
            value: yuzuru
            feedback: "ユズルは{木曜|もくよう}{午後|ごご}に{申請書|しんせいしょ}を{提出|ていしゅつ}した{人物|じんぶつ}。{金曜|きんよう}{朝|あさ}8:30に{差|さ}し{戻|もど}しを{確認|かくにん}したのもユズル。でも8:20に{職員室|しょくいんしつ}から{出|で}てきたのはイブキだった。"
          - text: ワカナ（文化祭ルールに詳しい）
            value: wakana
            feedback: "ワカナは{木曜日|もくようび}に{早退|そうたい}して{合同|ごうどう}{練習|れんしゅう}には{参加|さんか}していない。ミユちゃんの「{間|ま}に{合|あ}うかな」を{聞|き}いた{可能性|かのうせい}がない。{証拠|しょうこ}と{合|あ}わないよ。"
          - text: コハル（ミユちゃんの様子を一番知っていた）
            value: koharu
            feedback: "コハルは{練習|れんしゅう}でミユちゃんが{楽|たの}しそうだったと{知|し}っている。「ミユちゃんの{気持|きも}ちを{聞|き}かないで{決|き}めるなんて」と{強|つよ}く{感|かん}じていた。{差|さ}し{戻|もど}す{動機|どうき}はない。"
      - type: title_card
        text: 第2の問い
        subtitle: みんなの学校をつくるために一番大切なことは？
      - type: narration
        text: "ここから{先|さき}は、{正解|せいかい}のない{問|と}いだ。4つの{選択肢|せんたくし}はどれも{大切|たいせつ}な{考|かんが}え{方|かた}。あなたが「{一番|いちばん}{大切|たいせつ}」と{思|おも}うものを{選|えら}ぼう。"
      - type: choice
        id: q2
        question: 「みんなの学校」をつくるために一番大切なことは？
        options:
          - text: "A: みんなが同じ場所で一緒に活動すること"
            value: option-a
            feedback: "「{一緒|いっしょ}にいること」の{大切|たいせつ}さ。{形|かたち}だけ{一緒|いっしょ}にしても{意味|いみ}がない{場合|ばあい}もある。でも「{一緒|いっしょ}にいたい」という{気持|きも}ちは{尊|とうと}いね。"
          - text: "B: 1人ひとりに合った方法でサポートすること"
            value: option-b
            feedback: "「{合理的|ごうりてき}{配慮|はいりょ}」の{視点|してん}。サポートの{内容|ないよう}は{本人|ほんにん}と{相談|そうだん}して{決|き}めることが{大切|たいせつ}。{一人|ひとり}で{決|き}めてはいけない。"
          - text: "C: 本人の気持ちを聞いてから決めること"
            value: option-c
            feedback: "「{当事者|とうじしゃ}{主体|しゅたい}」の{視点|してん}。今回のイブキに{最|もっと}も{欠|か}けていたもの。{本人|ほんにん}に{聞|き}くことが{全|すべ}ての{出発点|しゅっぱつてん}だね。"
