      - type: narration
        text: "ユズル —— 「{台本|だいほん}・スケジュール{管理|かんり}」。{木曜|もくよう}{午前|ごぜん}に{台本|だいほん}を{完成|かんせい}、{午後|ごご}に{参加|さんか}{申請書|しんせいしょ}を{職員室|しょくいんしつ}に{提出|ていしゅつ}した。"
      - type: narration
        text: "イブキ —— 「{舞台|ぶたい}・{小道具|こどうぐ}{係|がかり}」と「ひまわり{組|ぐみ}との{連絡|れんらく}{役|やく}」。{木曜|もくよう}{放課後|ほうかご}にひまわり{組|ぐみ}との{合同|ごうどう}{練習|れんしゅう}に{参加|さんか}した。"
      - type: narration
        text: "ワカナ —— 「ルール・{手続|てつづ}き{確認|かくにん}」。{水曜日|すいようび}に{申請書|しんせいしょ}の{書式|しょしき}を{確認|かくにん}{済|ず}み。{木曜日|もくようび}は{通院|つういん}のため14:00に{早退|そうたい}した。"
      - type: narration
        text: "コハル —— 「{出演者|しゅつえんしゃ}のケア」。{木曜|もくよう}{放課後|ほうかご}の{合同|ごうどう}{練習|れんしゅう}でミユちゃんと{一緒|いっしょ}に{歌|うた}の{練習|れんしゅう}をした。"
      - type: narration
        text: "{職員室|しょくいんしつ}の{書類|しょるい}にアクセスできたのは{誰|だれ}？ ひまわり{組|ぐみ}の{事情|じじょう}を{知|し}っていたのは{誰|だれ}？ ワカナは{木曜日|もくようび}に{早退|そうたい}している。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 差し戻しの経緯を調べよう
      - type: narration
        text: "{職員室|しょくいんしつ}の{文化祭|ぶんかさい}{実行|じっこう}{委員会|いいんかい}の{記録|きろく}に、{差|さ}し{戻|もど}しの{経緯|けいい}が{残|のこ}っていた。"
      - type: se
        sound: discover
      - type: narration
        text: "{差|さ}し{戻|もど}しの{記録|きろく}——{日時|にちじ}: {金曜日|きんようび}{朝|あさ}8:15。{理由|りゆう}:「{準備|じゅんび}{期間|きかん}が{足|た}りない。ひまわり{組|ぐみ}の{児童|じどう}に{負担|ふたん}がかかる{可能性|かのうせい}がある」。{記録者|きろくしゃ}: **{記載|きさい}なし**。"
      - type: narration
        text: "{申請書|しんせいしょ}には{付箋|ふせん}メモが{貼|は}ってあった——「ミユちゃんの{準備|じゅんび}が{間|ま}に{合|あ}わないと{思|おも}います。{無理|むり}させないほうがいいです」。"
      - type: narration
        text: "{差|さ}し{戻|もど}しは{金曜日|きんようび}{朝|あさ}8:15——{登校|とうこう}{直後|ちょくご}だ。{企画書|きかくしょ}には2{週間|しゅうかん}の{準備|じゅんび}{期間|きかん}が{明記|めいき}されているのに「{準備|じゅんび}{期間|きかん}が{足|た}りない」はおかしい。そして——**ミユちゃん{本人|ほんにん}に{確認|かくにん}した{記録|きろく}はない**。"

  # ==================== 反転：証拠カード4 ====================
  - id: evidence-4
