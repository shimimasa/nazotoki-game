scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "ひまわり{小学校|しょうがっこう}の{文化祭|ぶんかさい}が、2{週間後|しゅうかんご}にせまっていた。5{年|ねん}2{組|くみ}では、{特別|とくべつ}{支援|しえん}{学級|がっきゅう}「ひまわり{組|ぐみ}」との{合同|ごうどう}{劇|げき}を{企画|きかく}した。"
      - type: narration
        text: "ひまわり{組|ぐみ}のミユちゃんは、5{年|ねん}2{組|くみ}のみんなと{一緒|いっしょ}に{劇|げき}をやるのを{楽|たの}しみにしていた。{歌|うた}のパートを{担当|たんとう}する{予定|よてい}だった。"
      - type: narration
        text: "{企画書|きかくしょ}と{参加|さんか}{申請書|しんせいしょ}が{提出|ていしゅつ}された。ところが——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{山田|やまだ}{先生|せんせい}が{書類|しょるい}を{確認|かくにん}すると、{参加|さんか}{申請書|しんせいしょ}に**「{差|さ}し{戻|もど}し{済|ず}み」**の{印|しるし}がついていた。{差|さ}し{戻|もど}した{人|ひと}の{名前|なまえ}は{書|か}いてない。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{合同|ごうどう}{劇|げき}の{参加|さんか}{申請|しんせい}が{差|さ}し{戻|もど}されています。{誰|だれ}かが{取|と}り{下|さ}げたようです。ミユちゃんは{楽|たの}しみにしていたのに……{誰|だれ}が、なぜ{差|さ}し{戻|もど}したのでしょう？"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: ibuki
            expression: surprised
          - character: koharu
            expression: worried
          - character: wakana
            expression: thinking
          - character: yuzuru
            expression: surprised
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{誰|だれ}が{参加|さんか}{申請|しんせい}を{差|さ}し{戻|もど}したのか。{福祉|ふくし}{探偵|たんてい}{団|だん}の{調査|ちょうさ}が{始|はじ}まった。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: みんなの学校
        subtitle: 福祉探偵団 Vol.10

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 企画書と参加申請書を確認しよう
      - type: narration
        text: "{山田|やまだ}{先生|せんせい}が{書類|しょるい}を{見|み}せてくれた。{企画書|きかくしょ}「みんなの{文化祭|ぶんかさい}{劇|げき}」と、{参加|さんか}{申請書|しんせいしょ}だ。"
      - type: se
        sound: discover
      - type: narration
        text: "{企画書|きかくしょ}には——{演目|えんもく}「{虹|にじ}のかけはし」、{出演者|しゅつえんしゃ}は5{年|ねん}2{組|くみ}（20{人|にん}）とひまわり{組|ぐみ}（6{人|にん}）の{合計|ごうけい}26{人|にん}。ミユちゃんの{担当|たんとう}は{歌|うた}のパート。{準備|じゅんび}{期間|きかん}は2{週間|しゅうかん}。"
      - type: narration
        text: "{参加|さんか}{申請書|しんせいしょ}には——{提出日|ていしゅつび}{木曜日|もくようび}、{提出者|ていしゅつしゃ}は5{年|ねん}2{組|くみ}{文化祭|ぶんかさい}{実行|じっこう}{委員|いいん}。{状態|じょうたい}は「{提出|ていしゅつ}{済|ず}み」から**「{差|さ}し{戻|もど}し{済|ず}み」**に{変|か}わっている。{差|さ}し{戻|もど}し{理由|りゆう}は「{準備|じゅんび}{期間|きかん}が{足|た}りない」。{差|さ}し{戻|もど}した{人|ひと}の{名前|なまえ}は**{記載|きさい}なし**。"
      - type: narration
        text: "{企画書|きかくしょ}は{月曜日|げつようび}に{承認|しょうにん}されている。{企画|きかく}は{通|とお}ったのに、{参加|さんか}{申請|しんせい}だけが{差|さ}し{戻|もど}された。{誰|だれ}が{差|さ}し{戻|もど}した？"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 4人の役割分担を確認しよう
      - type: narration
        text: "{火曜日|かようび}の{企画|きかく}{会議|かいぎ}で{決|き}まった{役割|やくわり}{分担|ぶんたん}を{確認|かくにん}した。"
      - type: se
