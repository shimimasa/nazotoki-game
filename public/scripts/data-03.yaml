meta:
  id: data-03
  title: 平均のうそ
  series: データ探偵団
  volume: 3
  estimatedMinutes: 18

characters:
  hyou:
    name: ヒョウ
    color: "#4169E1"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  suu:
    name: スウ
    color: "#FF4444"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  graph:
    name: グラフ
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  matome:
    name: マトメ
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  yamada:
    name: 山田先生
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{体力|たいりょく}テストのあと、クラスにうれしいニュースがはられました。"
      - type: narration
        text: "「クラスの{平均点|へいきんてん}は72点！ {全国平均|ぜんこくへいきん}70点を上回りました！」"
      - type: narration
        text: "みんなは「すごい！」とよろこびました。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: hyou
        expression: worried
        position: center
      - type: dialog
        character: hyou
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: hyou
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "{{落|お}}ち{{着|つ}}いて。みんなで{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみよう。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: determined }
          - { id: suu, expression: thinking }
          - { id: graph, expression: thinking }
          - { id: matome, expression: worried }
      - type: narration
        text: "「データ探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: データ探偵団
        subtitle: Vol.3 平均のうそ

  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: ステップ1
        subtitle: 調査
      - type: narration
        text: "発表ポスター"
      - type: se
        sound: discover

  - id: evidence-2
    steps:
      - type: narration
        text: "代表値の説明カード"
      - type: se
        sound: discover

  - id: evidence-3
    steps:
      - type: narration
        text: "スウの計算メモ"
      - type: se
        sound: discover

  - id: evidence-4
    steps:
      - type: narration
        text: "ヒストグラムと声メモ"
      - type: se
        sound: discover

  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: ステップ2
        subtitle: 反転
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "先生のメモ"
      - type: se
        sound: discover
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: yamada
        action: hide

  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: suu
        expression: thinking
        position: left
      - type: dialog
        character: suu
        text: "スウの考えを述べる"
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        expression: thinking
        position: right
      - type: dialog
        character: graph
        text: "グラフの考えを述べる"
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        expression: thinking
        position: left
      - type: dialog
        character: matome
        text: "マトメの考えを述べる"
      - type: sprite
        character: matome
        action: hide
      - type: sprite
        character: hyou
        expression: worried
        position: right
      - type: dialog
        character: hyou
        text: "ヒョウの考えを述べる"
      - type: sprite
        character: hyou
        action: hide

  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票
      - type: narration
        text: "「"平均が上回った"という発表が実態とずれていた原因は誰にある？」"
      - type: sprite_group
        characters:
          - { id: hyou, expression: normal }
          - { id: suu, expression: normal }
          - { id: graph, expression: normal }
          - { id: matome, expression: worried }
      - type: choice
        id: q1
        text: ""平均が上回った"という発表が実態とずれていた原因は誰にある？"
        options:
          - label: ヒョウ
            value: hyou
            correct: true
            feedback: "ヒョウは嘘をついていない。平均は本当に72点。でも一部の高得点者が引き上げていただけで、半数以上は全国平均以下だった。平均だけでは全体像は見えない"
          - label: スウ
            value: suu
            correct: false
            feedback: "スウは分布の偏りに気づいた側"
          - label: グラフ
            value: graph
            correct: false
            feedback: "グラフはヒストグラムで偏りを可視化した側"
          - label: マトメ
            value: matome
            correct: false
            feedback: "マトメは実感のない子の声を集めた側"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide

  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: 真相
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "真相が明かされた。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite
        character: hyou
        expression: worried
        position: center
      - type: dialog
        character: hyou
        text: "ごめんなさい。"
      - type: sprite
        character: hyou
        expression: determined
      - type: dialog
        character: hyou
        text: "ごめんなさい。"
      - type: sprite
        character: hyou
        action: hide

  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: yamada
        expression: thinking
      - type: dialog
        character: yamada
        text: "・証拠カード1より、ヒョウの発表は「クラス平均点72点、全国平均70点を上回った」だったとわかる。\n・証拠カード2より、平均値は高い数に引っぱられることがあり、中央値など別の見方も必要だとわかる。\n・証拠カード3より、20人の点数一覧には90点以上が5人いて、ほかの15人は50点だいから60点だい後半に集まっているとわかる。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: happy }
          - { id: suu, expression: happy }
          - { id: graph, expression: happy }
          - { id: matome, expression: happy }
      - type: narration
        text: "データ探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 1000
