  # ==================== エピローグ ====================
  - id: epilogue
    bg: hallway-sunset
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "ユズルの「{良|よ}い{報告|ほうこく}を{出|だ}したい」「{褒|ほ}められたい」という{気持|きも}ちは{分|わ}かります。みんな{そう|そう}{思|おも}う。でも——"
        expression: normal
      - type: dialog
        character: yamada
        text: "データは{人|ひと}の{生活|せいかつ}に{直結|ちょっけつ}します。{数字|すうじ}をゆがめたら、{改善|かいぜん}が{必要|ひつよう}な{施設|しせつ}が{見過|みす}ごされ、シオリさんのような{人|ひと}が{取|と}り{残|のこ}される。**{悪|わる}い{結果|けっか}を{正直|しょうじき}に{報告|ほうこく}する{勇気|ゆうき}**——それがデータを{扱|あつか}う{人|ひと}の{責任|せきにん}です。"
        expression: determined
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{何|なに}を{測|はか}るかで{結果|けっか}が{変|か}わる。{全|ぜん}20{項目|こうもく}で{計算|けいさん}するか、12{項目|こうもく}だけで{計算|けいさん}するか——{同|おな}じ{施設|しせつ}でも「{合格|ごうかく}」と「{不合格|ふごうかく}」に{分|わ}かれる。これが**データリテラシー**の{核心|かくしん}だ。"
      - type: narration
        text: "{帰納法|きのうほう}で{見|み}つけたパターン——12{項目|こうもく}は「{達成|たっせい}しやすいもの」、8{項目|こうもく}は「コストが{高|たか}く{未設置|みせっち}が{多|おお}いもの」。5{施設|しせつ}{全部|ぜんぶ}で{同|おな}じ{傾向|けいこう}。**{複数|ふくすう}のデータに{共通|きょうつう}するパターンを{見|み}つければ、「{偶然|ぐうぜん}」と「{意図的|いとてき}」を{区別|くべつ}できる。**"
      - type: narration
        text: "その{数字|すうじ}の{向|む}こうに、{人|ひと}がいる。シオリさんの「{困|こま}っている{施設|しせつ}が{改善|かいぜん}されないまま」という{声|こえ}を、{忘|わす}れてはいけない。"
      - type: effect
        name: fade-out
