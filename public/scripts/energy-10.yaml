scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: school
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校|がっこう}のエネルギー{委員会|いいんかい}が「30{年後|ねんご}の{学校|がっこう}エネルギー{計画書|けいかくしょ}」を{発表|はっぴょう}した。Vol.1の{電気回路|でんきかいろ}から、Vol.9のエネルギーミックスまで——{積|つ}み{重|かさ}ねてきた{知識|ちしき}が、いま{一枚|いちまい}の{計画書|けいかくしょ}に{結実|けつじつ}しているはずだった。"
      - type: narration
        text: "ところが{発表|はっぴょう}の{直後|ちょくご}、ヒカルが{計画書|けいかくしょ}の{草稿版|そうこうばん}と{発表版|はっぴょうばん}を{見比|みくら}べ——{息|いき}をのんだ。"
      - type: se
        sound: murmur
      - type: sprite
        character: hikaru
        expression: surprised
        position: center
      - type: dialog
        character: hikaru
        text: "ちょっと{待|ま}って！　{再生可能|さいせいかのう}エネルギー100%の{草稿|そうこう}が——{化石燃料|かせきねんりょう}{混合案|こんごうあん}に{変|か}わってる。{誰|だれ}が{書|か}き{換|か}えたの？"
        expression: surprised
      - type: sprite
        character: hikaru
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite_group
        characters:
          - character: denta
            expression: worried
          - character: hikaru
            expression: thinking
          - character: netsumi
            expression: worried
          - character: chikara
            expression: surprised
      - type: narration
        text: "{委員会|いいんかい}の{計画書|けいかくしょ}が{書|か}き{換|か}えられていた。{再生可能|さいせいかのう}エネルギー{中心|ちゅうしん}の{案|あん}が、{低|てい}コストな{化石燃料|かせきねんりょう}{中心|ちゅうしん}の{案|あん}に{変|か}えられている。{誰|だれ}が、なぜ——4{人|にん}の{推理|すいり}が{始|はじ}まる。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 未来への選択
        subtitle: エネルギー探偵団 Vol.10

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: school
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 2つの計画書と書き換え箇所
      - type: narration
        text: "ヒカルが{草稿版|そうこうばん}と{発表版|はっぴょうばん}を{並|なら}べて{配|くば}った。{変更|へんこう}{箇所|かしょ}の{一覧|いちらん}が{目|め}に{飛|と}び{込|こ}んでくる。"
      - type: evidence
        id: card-1
        title: 計画書2バージョン比較（草稿版 vs 発表版）
        content: "【{草稿版|そうこうばん}：{再生可能|さいせいかのう}エネルギー100%{案|あん}】{太陽光|たいようこう}パネル60%・{風力|ふうりょく}20%・{地熱|ちねつ}20%。CO₂{排出|はいしゅつ}ゼロを{目標|もくひょう}。{初期|しょき}{費用|ひよう}は{高|たか}いが{長期|ちょうき}コストは{低|てい}い。　【{発表版|はっぴょうばん}：{化石燃料|かせきねんりょう}{混合案|こんごうあん}】{太陽光|たいようこう}30%・{天然|てんねん}ガス50%・その{他|た}20%。{電気代|でんきだい}を{現状|げんじょう}{維持|いじ}。CO₂{排出|はいしゅつ}は{現状|げんじょう}の70%。　【{変更|へんこう}{箇所|かしょ}の{傾向|けいこう}】{再生可能|さいせいかのう}エネルギーの{割合|わりあい}が{全|すべ}て{引|ひ}き{下|さ}げられ、{化石燃料|かせきねんりょう}の{割合|わりあい}が{引|ひ}き{上|あ}げられている"
      - type: sprite
        character: hikaru
        expression: determined
        position: right
      - type: dialog
        character: hikaru
        text: "{草稿|そうこう}から{発表版|はっぴょうばん}への{変更|へんこう}は{偶然|ぐうぜん}じゃない。{再生可能|さいせいかのう}エネルギーが{全部|ぜんぶ}{下|さ}げられてる——{意図的|いとてき}に{書|か}き{換|か}えた{人|ひと}がいる。"
        expression: determined
      - type: sprite
        character: hikaru
        action: hide
      - type: narration
        text: "では{誰|だれ}が{書|か}き{換|か}えられる{立場|たちば}にあったのか。ヒカルが{会議室|かいぎしつ}の{使用記録|しようきろく}を{調|しら}べていた——"
      - type: evidence
        id: card-2
        title: ヒカルの調査記録（タイムライン＋会議室使用ログ）
        content: "【{会議室|かいぎしつ}{使用|しよう}タイムライン】{草稿|そうこう}{完成日|かんせいび}の{翌日|よくじつ}{夜間|やかんに}（18:00〜20:00）に{会議室|かいぎしつ}が{使用|しよう}されている。{入室|にゅうしつ}カードの{記録|きろく}：デンタの{生徒証|せいとしょう}が{使用|しよう}された。　【{鍵|かぎ}の{管理|かんり}{記録|きろく}】{当日|とうじつ}のカギを{返却|へんきゃく}したのはデンタ。{他|ほか}のメンバーの{入室|にゅうしつ}ログはなし。　【デンタの{残業|ざんぎょう}{記録|きろく}】{当該|とうがい}{時間帯|じかんたい}に{委員会|いいんかい}{資料|しりょう}の{印刷|いんさつ}ログあり。"
      - type: sprite
        character: netsumi
        expression: thinking
        position: left
      - type: dialog
        character: netsumi
        text: "{当日|とうじつ}の{夜|よる}、{会議室|かいぎしつ}を{使|つか}ったのはデンタだけ——タイムライン{的|てき}にも、{鍵|かぎ}の{記録|きろく}でも{一致|いっち}している。{他|ほか}のメンバーが{入|はい}った{記録|きろく}はない。"
        expression: thinking
      - type: sprite
        character: netsumi
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: school
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: LCAデータと動機の深化
      - type: narration
        text: "ネツミが{持|も}っているLCA（ライフサイクルアセスメント）データが{配|くば}られた。{数値|すうち}が{並|なら}ぶ{表|ひょう}——それは「どちらの{案|あん}が{正|ただ}しいか」に{簡単|かんたん}に{答|こた}えられない{理由|りゆう}を{示|しめ}していた。"
      - type: evidence
        id: card-3
        title: ネツミのLCAデータ（各発電方法の多変数比較表）
        content: "【{発電|はつでん}{方法|ほうほう}ごとの{比較|ひかく}表】{太陽光|たいようこう}パネル：{製造|せいぞう}CO₂（{高|たか}）・{運用|うんよう}CO₂（ゼロ）・{寿命|じゅみょう}25〜30{年|ねん}・{廃棄|はいき}{費用|ひよう}（{中|ちゅう}）・{初期|しょき}{費用|ひよう}（{高|たか}）・{電気代|でんきだい}{長期|ちょうき}（{低|てい}）。{天然|てんねん}ガス：{製造|せいぞう}CO₂（{低|てい}）・{運用|うんよう}CO₂（{高|たか}）・{廃棄|はいき}（{低|てい}）・{初期|しょき}{費用|ひよう}（{低|てい}）・{電気代|でんきだい}{長期|ちょうき}（{変動|へんどう}{大|おお}）。　【{結論|けつろん}】{再生可能|さいせいかのう}エネルギーは{長期|ちょうき}でCO₂を{削減|さくげん}するが、{初期|しょき}{費用|ひよう}と{製造|せいぞう}{段階|だんかい}のCO₂が{課題|かだい}。{天然|てんねん}ガスは{初期|しょき}{費用|ひよう}が{低|てい}いが{長期|ちょうき}CO₂は{高|たか}い。「どちらが{正解|せいかい}」は{一概|いちがい}に{言|い}えない。"
      - type: sprite
        character: netsumi
        expression: thinking
        position: right
      - type: dialog
        character: netsumi
        text: "LCAで{見|み}ると、{太陽光|たいようこう}パネルは{製造|せいぞう}{段階|だんかい}でもCO₂が{出|で}る。{長期|ちょうき}では{削減|さくげん}になるけど、{初期|しょき}コストは{高|たか}い——{単純|たんじゅん}に「{再生可能|さいせいかのう}が{正解|せいかい}」とは{言|い}い{切|き}れないデータがある。"
        expression: thinking
      - type: sprite
        character: netsumi
        action: hide
      - type: narration
        text: "チカラが{静|しず}かに{口|くち}を{開|ひら}いた。デンタについて、{他|ほか}の{誰|だれ}も{知|し}らない{事情|じじょう}を——"
      - type: evidence
        id: card-4
        title: チカラの個人情報とデンタが見た電気代試算資料
        content: "【チカラだけが{知|し}る{個人|こじん}{情報|じょうほう}】デンタの{家|いえ}は{電気代|でんきだい}の{節約|せつやく}を{一生懸命|いっしょうけんめい}{頑張|がんば}っている。{毎月|まいつき}の{電気代|でんきだい}が{家族|かぞく}の{話題|わだい}に{上|のぼ}ることが{多|おお}く、「{電気代|でんきだい}が{上|あ}がったら{困|こま}る」という{言葉|ことば}を{聞|き}いたことがある。　【デンタが{見|み}た{電気代|でんきだい}{試算|しさん}{資料|しりょう}】{再生可能|さいせいかのう}エネルギー100%{案|あん}では、{移行|いこう}{期間|きかん}に{電気代|でんきだい}が{現在|げんざい}の1.5{倍|ばい}になる{試算|しさん}がある。デンタはこの{資料|しりょう}を{委員会|いいんかい}{外|そと}で{入手|にゅうしゅ}していた。"
      - type: sprite
        character: chikara
        expression: worried
        position: center
      - type: dialog
        character: chikara
        text: "デンタの{家|いえ}は{電気代|でんきだい}の{節約|せつやく}を{頑張|がんば}っているって{聞|き}いた。だから——{電気代|でんきだい}が1.5{倍|ばい}になるって{試算|しさん}を{見|み}たとき、{余計|よけい}に{気|き}になったんだと{思|おも}う。"
        expression: worried
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: denta
        expression: worried
        position: left
      - type: dialog
        character: denta
        text: "……{電気代|でんきだい}が{払|はら}えない{家庭|かてい}が{増|ふ}えたら{誰|だれ}が{助|たす}けるの。その{心配|しんぱい}は{間違|まちが}ってた？"
        expression: worried
      - type: sprite
        character: denta
        action: hide

  # ==================== 第1推理・投票（犯人特定） ====================
  - id: deduction
    bg: school
    bgm: confrontation
    steps:
      - type: title_card
        text: 第1推理タイム
        subtitle: 計画書を書き換えたのは誰？
      - type: sprite
        character: hikaru
        expression: determined
        position: right
      - type: dialog
        character: hikaru
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①{草稿|そうこう}から{発表版|はっぴょうばん}への{変更|へんこう}は{意図的|いとてき}——{再生可能|さいせいかのう}エネルギーが{全部|ぜんぶ}{下|さ}げられた。②{書|か}き{換|か}えられた{夜|よる}の{会議室|かいぎしつ}ログはデンタのみ。③デンタが{電気代|でんきだい}1.5{倍|ばい}の{試算|しさん}を{見|み}ていた。④チカラの{情報|じょうほう}からデンタの{個人的|こじんてき}な{事情|じじょう}も{分|わ}かった。"
        expression: determined
      - type: sprite
        character: hikaru
        action: hide
      - type: narration
        text: "{証拠|しょうこ}が{揃|そろ}ってきた——{誰|だれ}が{計画書|けいかくしょ}の{書|か}き{換|か}えの{中心|ちゅうしん}にいたか、{見|み}えてくる。{書|か}き{換|か}えたのは{誰|だれ}？"
      - type: choice
        id: q1
        question: 計画書を書き換えたのは誰？
        options:
          - text: デンタ（電気代が高くなることを心配して、再生可能エネルギー案を変えた）
            value: denta
            correct: true
            feedback: "{正解|せいかい}！　デンタの{心配|しんぱい}は{本物|ほんもの}です。{電気代|でんきだい}が{払|はら}えない{家庭|かてい}が{増|ふ}えることへの{配慮|はいりょ}——その{心|こころ}は{真剣|しんけん}でした。**でも、{本当|ほんとう}の{問|とい}いはまだ{終|お}わっていない。次の{問|とい}いへ{進|すす}もう。**"
          - text: ヒカル（書き換え箇所のタイムラインを調べた人）
            value: hikaru
            correct: false
            feedback: "ヒカルは{計画書|けいかくしょ}の2バージョンを{見比|みくら}べて{書|か}き{換|か}えを{発見|はっけん}した{側|がわ}だよ。{会議室|かいぎしつ}の{使用|しよう}ログを{調|しら}べ、{問題|もんだい}を{明|あき}らかにした{行動|こうどう}型のキャラクター。"
          - text: ネツミ（LCAデータを分析した人）
            value: netsumi
            correct: false
            feedback: "ネツミはLCA（ライフサイクルアセスメント）のデータを{分析|ぶんせき}した{側|がわ}だよ。{慎重|しんちょう}に{証拠|しょうこ}を{観察|かんさつ}し、「どちらが{正解|せいかい}か{一概|いちがい}に{言|い}えない」ことを{示|しめ}した。"
          - text: チカラ（デンタの事情を知っていた人）
            value: chikara
            correct: false
            feedback: "チカラはデンタの{個人的|こじんてき}な{事情|じじょう}を{知|し}っていた{側|がわ}だよ。{会議室|かいぎしつ}の{入室|にゅうしつ}ログにチカラの{記録|きろく}はなく、{書|か}き{換|か}えに{関|かか}わっていない。"

  # ==================== 反転：証拠カード5（パラダイムシフト） ====================
  - id: evidence-5
    bg: school
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 山田先生の補足と「エネルギー選択の本当の難しさ」
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "デンタが{書|か}き{換|か}えたことは{分|わ}かった。でも{新|あたら}しい{証拠|しょうこ}があります——デンタが{先生|せんせい}に{話|はな}してくれたことと、{先生|せんせい}からの{補足|ほそく}です。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: evidence
        id: card-5
        title: 先生の補足「エネルギー選択に唯一の正解はない」＋Vol.1-9知識の連鎖図
        content: "【デンタの{告白|こくはく}（{先生|せんせい}への{相談|そうだん}）】「{電気代|でんきだい}が1.5{倍|ばい}になると{試算|しさん}を{見|み}た。{困|こま}る{家庭|かてい}が{出|で}ると{思|おも}った。でも{委員会|いいんかい}で{言|い}えなかった——{賛成|さんせい}してもらえないと{思|おも}って。{一人|ひとり}で{変|か}えてしまった。ウソをついていた」と{話|はな}した。　【{先生|せんせい}の{補足|ほそく}】コスト・CO₂・{公平性|こうへいせい}は{全|すべ}て{大切|たいせつ}で、どれを{優先|ゆうせん}するかはトレードオフ。{唯一|ゆいいつ}の{正解|せいかい}はない——だから{委員会|いいんかい}が{存在|そんざい}する。みんなで{議論|ぎろん}して{選|えら}ぶために。　【Vol.1〜9の{振|ふ}り{返|かえ}り】Vol.1:{回路|かいろ}の{仕組|しく}み→Vol.3:{太陽光|たいようこう}{発電|はつでん}の{特性|とくせい}→Vol.4:{風力|ふうりょく}{発電|はつでん}→Vol.7:{節電|せつでん}の{考|かんが}え{方|かた}→Vol.9:エネルギーミックス・LCA——{全|すべ}ての{知識|ちしき}が「{未来|みらい}のエネルギーをどう{選|えら}ぶか」という{今日|きょう}の{問|とい}いにつながっている。"
      - type: se
        sound: reveal
      - type: sprite
        character: denta
        expression: worried
        position: center
      - type: dialog
        character: denta
        text: "……{全部|ぜんぶ}{話|はな}す。{電気代|でんきだい}が{払|はら}えない{家庭|かてい}が{増|ふ}えるかもしれないって——{本当|ほんとう}に{心配|しんぱい}してた。でも{一人|ひとり}で{変|か}えてしまった。{委員会|いいんかい}で「{電気代|でんきだい}の{心配|しんぱい}がある」って{言|い}えばよかったのに。"
        expression: worried
      - type: dialog
        character: denta
        text: "{嘘|うそ}をついて、{委員会|いいんかい}の{議論|ぎろん}を{消|け}してしまった——それが{一番|いちばん}の{問題|もんだい}だった。"
        expression: thinking
      - type: sprite
        character: denta
        action: hide
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "デンタの{心配|しんぱい}は{本物|ほんもの}だった。{電気代|でんきだい}の{公平性|こうへいせい}という{問|とい}いは{本当|ほんとう}に{大切|たいせつ}——でも{気|き}づいてほしいことがある。{再生可能|さいせいかのう}エネルギーにするかどうか、それは「{唯一|ゆいいつ}の{正解|せいかい}」がある{問題|もんだい}ではないの。"
