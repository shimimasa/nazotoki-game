scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "昆虫ミステリー Vol.10"
        subtitle: "みんなで読むシート"
      - type: sprite_group
        characters:
          - id: mushi
            expression: normal
          - id: hane
            expression: normal
          - id: mitsu
            expression: normal
          - id: sanagi
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: mushi
        expression: normal
        position: left
      - type: dialog
        character: mushi
        text: "虫が 受粉や分解、食う食われる関係などで 大切な役わりをもつのは本当"
      - type: dialog
        character: mushi
        text: "虫が 受粉や分解、食う食われる関係などで 大切な役わりをもつのは本当"
        expression: thinking
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        expression: normal
        position: right
      - type: dialog
        character: hane
        text: "あなたの図には 「受粉」「分解」「食う食われる」「人のくらし」 が入っていた"
      - type: dialog
        character: hane
        text: "あなたの図には 「受粉」「分解」「食う食われる」「人のくらし」 が入っていた"
        expression: thinking
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        expression: normal
        position: left
      - type: dialog
        character: mitsu
        text: "要点カードには 「体のつくり」「成長」「擬態」「役割分担」「受粉」「防御」「通信」「データの見方」 などが並んでいた"
      - type: dialog
        character: mitsu
        text: "要点カードには 「体のつくり」「成長」「擬態」「役割分担」「受粉」「防御」「通信」「データの見方」 などが並んでいた"
        expression: thinking
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        expression: normal
        position: right
      - type: dialog
        character: sanagi
        text: "虫が大切なのは 本当"
      - type: dialog
        character: sanagi
        text: "虫が大切なのは 本当"
        expression: thinking
      - type: sprite
        character: sanagi
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: mushi
            expression: thinking
          - id: hane
            expression: thinking
          - id: mitsu
            expression: thinking
          - id: sanagi
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ムシ"
            value: mushi
            correct: false
            feedback: "ムシは手がかりを持っているが、決め手は足りない。"
          - text: "ハネ"
            value: hane
            correct: false
            feedback: "ハネは手がかりを持っているが、決め手は足りない。"
          - text: "ミツ"
            value: mitsu
            correct: false
            feedback: "ミツは手がかりを持っているが、決め手は足りない。"
          - text: "サナギ"
            value: sanagi
            correct: true
            feedback: "サナギの行動が、証拠といちばん一致している。"
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "サナギ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: sanagi
        expression: worried
        position: center
      - type: dialog
        character: sanagi
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: sanagi
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "虫は 生態系で 大切な役わりをもつ"
      - type: narration
        text: "でも、大切さは 数だけではなく つながりやバランスで考える"
      - type: narration
        text: "好きな気持ちと、正しく見ることの両方が必要"
      - type: sprite_group
        characters:
          - id: mushi
            expression: happy
          - id: hane
            expression: happy
          - id: mitsu
            expression: happy
          - id: sanagi
            expression: happy
      - type: narration
        text: "昆虫ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
