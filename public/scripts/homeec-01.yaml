meta:
  id: homeec-01
  title: 消えた料理
  series: 家庭科探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  yui:
    name: ユイ
    color: "#4A90D9"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  hana:
    name: ハナ
    color: "#E91E63"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  souta:
    name: ソウタ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  aki:
    name: アキ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: cooking-room
    bgm: homeec-01/opening
    steps:
      - type: narration
        text: "さくら小学校5年1組、{調理|ちょうり}{実習|じっしゅう}の日。{今日|きょう}のメニューは「ゆでたまごとほうれん{草|そう}のサラダ」！"
      - type: sprite_group
        characters:
          - { id: yui, expression: happy }
          - { id: hana, expression: happy }
          - { id: souta, expression: happy }
          - { id: aki, expression: normal }
      - type: narration
        text: "4人のグループが{役割|やくわり}{分担|ぶんたん}して、楽しく{料理|りょうり}を作った。"
      - type: sprite
        character: yui
        action: hide
      - type: sprite
        character: hana
        action: hide
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: aki
        action: hide
      - type: narration
        text: "ところが{実習|じっしゅう}が終わって{片付|かたづ}けをしていると——"
      - type: bgm
        action: stop
      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: sprite
        character: sensei
        expression: surprised
        position: center
      - type: dialog
        character: sensei
        text: "このグループのゆでたまご、4個作ったはずなのに2個しかないわ。{残|のこ}りの2個はどこに{消|き}えたの？"
        expression: thinking
      - type: sprite
        character: sensei
        action: hide
      - type: bgm
        track: homeec-01/investigation
      - type: narration
        text: "ゆでたまご4個のうち、2個が{消|き}えた。{誰|だれ}が、いつ、どうして？"
      - type: narration
        text: "{家庭科|かていか}{探偵団|たんていだん}、{調理|ちょうり}{手順|てじゅん}を{追跡|ついせき}して{真相|しんそう}を{突|つ}き{止|と}めろ！"
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 家庭科探偵団 Vol.1
        subtitle: 消えた料理

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: cooking-room
    bgm: homeec-01/investigation
    steps:
      - type: narration
        text: "4人の{役割|やくわり}{分担|ぶんたん}を{確認|かくにん}しよう。"
      - type: sprite
        character: yui
        expression: normal
        position: left
      - type: dialog
        character: yui
        text: "わたしはユイ。{計量|けいりょう}とタイマー{管理|かんり}を{担当|たんとう}したよ。{分量|ぶんりょう}と時間は{正確|せいかく}に{計|はか}った。"
      - type: sprite
        character: yui
        action: hide
      - type: sprite
        character: hana
        expression: normal
        position: right
      - type: dialog
        character: hana
        text: "わたしはハナ。ほうれん{草|そう}を{洗|あら}って、{最後|さいご}に{盛|も}り{付|つ}けを{担当|たんとう}したの。{丁寧|ていねい}に{仕上|しあ}げたかったんだ。"
      - type: sprite
        character: hana
        action: hide
      - type: sprite
        character: souta
        expression: happy
        position: left
      - type: dialog
        character: souta
        text: "おれはソウタ！ ゆでたまご{担当|たんとう}。ゆでる・{冷|さ}ます・むくを{全部|ぜんぶ}やったよ。{料理|りょうり}大好きなんだ！"
      - type: dialog
        character: souta
        text: ……でも4個中2個しか持ってこなかったのは、えーと……。
        expression: thinking
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: aki
        expression: normal
        position: right
      - type: dialog
        character: aki
        text: "わたしはアキ。{片付|かたづ}け{記録|きろく}{係|がかり}。{食材|しょくざい}の{残量|ざんりょう}をチェックするのが{仕事|しごと}。"
      - type: sprite
        character: aki
        action: hide

  # ===== 証拠カード1: 役割分担表 =====
  - id: evidence-1
    bg: cooking-room
    bgm: homeec-01/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: 役割分担表
      - type: narration
        text: "グループの{役割|やくわり}{分担|ぶんたん}——"
      - type: narration
        text: "ユイ：{計量|けいりょう}・タイマー{管理|かんり}"
      - type: narration
        text: "ハナ：{野菜|やさい}{洗|あら}い・{盛|も}り{付|つ}け"
      - type: narration
        text: "ソウタ：ゆでたまご{担当|たんとう}（ゆでる・{冷|さ}ます・むく）"
      - type: narration
        text: "アキ：{片付|かたづ}け{記録|きろく}{係|がかり}"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "ゆでたまご（ゆでる→{冷|さ}ます→むく）は——ソウタ1人が{担当|たんとう}！"

  # ===== 証拠カード2: タイムシート =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 調理タイムシート
      - type: narration
        text: "ユイが{記録|きろく}した{時刻|じこく}メモ——"
      - type: narration
        text: "13:05 コンロ{点火|てんか}、タイマーセット（ソウタがたまご4個を{鍋|なべ}に）"
      - type: narration
        text: "13:19 タイマーが{鳴|な}る。ゆで10分{完了|かんりょう}。ソウタが{流|なが}し{台|だい}へ"
      - type: narration
        text: "13:26 ソウタが2個のたまごをきれいにむく（7分{経過|けいか}）"
      - type: narration
        text: "13:28 ユイが「たまごまだ？ {盛|も}り{付|つ}け{始|はじ}めるよ！」と{声|こえ}をかける"
      - type: narration
        text: "13:28～ ソウタが{残|のこ}り2個を{急|いそ}いでむこうとする"
      - type: narration
        text: "13:30 ソウタが{皿|さら}にたまご2個「だけ」を{持|も}ってくる"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "{最初|さいしょ}の2個は7分{冷|ひ}やしてきれいにむけた。でも{残|のこ}りの2個は2分{以下|いか}で{挑戦|ちょうせん}した。"
      - type: narration
        speed: slow
        text: "{成功|せいこう}した2個と{失敗|しっぱい}した2個——何が{違|ちが}った？ {調理|ちょうり}{手順|てじゅん}カードを{確認|かくにん}しよう。"

  # ===== 証拠カード3: 調理手順カード =====
  - id: evidence-3
    bgm: homeec-01/experiment
    steps:
      - type: title_card
        text: 証拠③
        subtitle: ゆでたまごの正しい手順
      - type: narration
        text: "先生が{渡|わた}した「ゆでたまごの作り方」——"
      - type: narration
        text: "①ゆでる：水から入れて{沸騰|ふっとう}{後|ご}10分ゆでる"
      - type: narration
        text: "②{冷|さ}ます（スキップ{禁止|きんし}！）：{冷水|れいすい}に5分{以上|いじょう}さらす。{殻|から}がむきやすくなる"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "★{熱|あつ}いままむこうとすると、{殻|から}が{白身|しろみ}にくっついてたまごが{崩|くず}れやすい！"
      - type: narration
        text: "③むく：{完全|かんぜん}に{冷|さ}めたら、{丁寧|ていねい}に{殻|から}をむく"
      - type: narration
        text: "④{盛|も}る：{半分|はんぶん}に{切|き}って{皿|さら}に{盛|も}る"
      - type: se
        sound: common/discover
      - type: narration
        text: "ソウタは{残|のこ}り2個を{冷|さ}ます時間を2分{以下|いか}で{切|き}り上げた。{手順|てじゅん}カードには「5分{以上|いじょう}」と書いてあるのに——。"

  # ===== 証拠カード4: 片付け記録と目撃 =====
  - id: evidence-4
    bgm: homeec-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: ゴミ箱に何がある？
      - type: sprite
        character: aki
        expression: thinking
        position: left
      - type: dialog
        character: aki
        text: "ゴミ{箱|ばこ}の中を{確認|かくにん}したら、キッチンペーパーが2{枚|まい}たたまれて{捨|す}てられてた。なんか{重|おも}かった。"
      - type: dialog
        character: aki
        text: "ソウタが{後|あと}で「ごめん…」って{顔|かお}してたのが気になった。"
        expression: determined
      - type: sprite
        character: aki
        action: hide
      - type: sprite
        character: hana
        expression: worried
        position: right
      - type: dialog
        character: hana
        text: "13:28ごろ、ソウタが{流|なが}し{台|だい}のそばで何かをキッチンペーパーに{包|つつ}んで、{急|いそ}いでゴミ{箱|ばこ}に入れるのを見たの。"
      - type: dialog
        character: hana
        text: "「何を{捨|す}てたの？」って{聞|き}こうとしたけど、ソウタが「もう{準備|じゅんび}できるよ」って言ったから……。"
        expression: thinking
      - type: sprite
        character: hana
        action: hide
      - type: narration
        text: "キッチンペーパーに何かを{包|つつ}んで{捨|す}てた。{重|おも}さがあった。ハナがソウタを{目撃|もくげき}——。"

  # ===== 投票 =====
  - id: questions
    bg: cooking-room
    bgm: homeec-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{消|き}えたゆでたまご2個の{行方|ゆくえ}。{証拠|しょうこ}を{整理|せいり}して{推理|すいり}しましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: ゆでたまご2個を捨てたのは誰？
        options:
          - text: ユイ（タイマー管理担当）
            value: yui
            feedback: ユイの担当は計量とタイマー。ゆでたまごには触っていないよ。
          - text: ハナ（盛り付け担当）
            value: hana
            feedback: ハナの担当は野菜洗いと盛り付け。ゆでたまごを触る工程ではないよ。
          - text: ソウタ（ゆでたまご担当）
            value: souta
            feedback: 正解！ ゆでる・冷ます・むくを全部ソウタが担当。消えた2個に関われたのはソウタだけ。
          - text: アキ（片付け記録係）
            value: aki
            feedback: アキの担当は片付け記録。ゆでたまごの調理工程には関わっていないよ。
      - type: choice
        id: q2
        question: なぜたまごが崩れたと思う？
        options:
          - text: 冷ます時間が足りなかったから（手順を省いた）
            value: skip-cooling
            feedback: 正解！ 手順カードに「5分以上冷やす」とある。ソウタは2分以下で挑戦して殻が白身にくっついた。成功した2個は7分冷やしていたよ。
          - text: ゆで時間が長すぎたから
            value: overcooked
            feedback: ゆで時間はユイがタイマーで正確に10分計っている。ゆで時間は問題ないよ。
          - text: 殻にヒビが入っていたから
            value: cracked
            feedback: 最初の2個は同じたまごなのにきれいにむけた。殻の問題ではなく「冷ます時間」の差だよ。
          - text: むき方が乱暴だったから
            value: rough
            feedback: 乱暴さではなく「熱いままむこうとした」のが原因。冷めていれば殻は自然に剥がれるよ。

  # ===== 証拠カード5: ゴミ箱の中身 =====
  - id: evidence-5
    bgm: homeec-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: ゴミ箱の中身
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "ゴミ{箱|ばこ}のキッチンペーパーを{広|ひろ}げてみました。"
      - type: sprite
        character: sensei
        action: hide
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "{崩|くず}れたゆでたまご2個分の{白身|しろみ}と{黄身|きみ}が、キッチンペーパーに{包|つつ}まれていた。"
      - type: narration
        text: "{殻|から}をむこうとした{痕跡|こんせき}があるが、{白身|しろみ}が{殻|から}にくっついたまま{崩|くず}れている。"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これは「{熱|あつ}いままむこうとした」ときの{典型的|てんけいてき}な{失敗|しっぱい}。{冷|さ}ます時間を{十分|じゅうぶん}に取らないと、こうなるんです。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "{成功|せいこう}した2個：7分{冷|ひ}やした → きれいにむけた"
      - type: narration
        text: "{失敗|しっぱい}した2個：2分{以下|いか} → {白身|しろみ}が{崩|くず}れた"
      - type: narration
        speed: slow
        text: "{違|ちが}いは「{冷|ひ}やした時間」だけ。同じ人が同じ{方法|ほうほう}でゆでたたまごなのに。{手順|てじゅん}には{理由|りゆう}がある。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: cooking-room
    bgm: homeec-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: なぜ「冷ます」を省いたのか
      - type: effect
        name: fade-in
        duration: 600

  # ユイの秘密
  - id: truth-yui
    bg: cooking-room
    steps:
      - type: sprite
        character: yui
        expression: worried
        position: left
      - type: dialog
        character: yui
        text: "わたしも{反省|はんせい}しなきゃ。13:28に「たまごまだ？」ってソウタを{急|せ}かしちゃった。"
      - type: dialog
        character: yui
        text: "タイマーは{正確|せいかく}に{計|はか}ったけど、ソウタの{作業|さぎょう}ペースまで{考|かんが}えてなかった。{急|せ}かさなければ、ソウタはちゃんと{冷|さ}ませたかもしれない。"
        expression: determined
      - type: sprite
        character: yui
        action: hide

  # ハナの秘密
  - id: truth-hana
    steps:
      - type: sprite
        character: hana
        expression: worried
        position: right
      - type: dialog
        character: hana
        text: "わたし、ソウタが何かをゴミ{箱|ばこ}に{捨|す}てるのを見てたのに、{聞|き}かなかった。"
      - type: dialog
        character: hana
        text: "「何を{捨|す}てたの？」って{聞|き}いていたら、すぐに先生に{相談|そうだん}できたかもしれない。"
        expression: determined
      - type: sprite
        character: hana
        action: hide

  # アキの秘密
  - id: truth-aki
    steps:
      - type: sprite
        character: aki
        expression: thinking
        position: left
      - type: dialog
        character: aki
        text: "わたしは{片付|かたづ}け{記録|きろく}{係|がかり}なのに、{実習|じっしゅう}中の{食材|しょくざい}の動きをリアルタイムでチェックしてなかった。"
      - type: dialog
        character: aki
        text: "「4個のうち2個しか{皿|さら}に来ない」って、その{時点|じてん}で気づけたはず。"
        expression: determined
      - type: sprite
        character: aki
        action: hide

  # ソウタの真実（クライマックス）
  - id: truth-souta
    bgm: homeec-01/truth
    steps:
      - type: sprite
        character: souta
        expression: worried
        position: center
      - type: dialog
        character: souta
        text: "……おれがやっちゃった。ゆでたまご2個、{崩|くず}れちゃって{捨|す}てちゃったんだ。"
      - type: narration
        speed: slow
        text: "ソウタがゆっくりと話し{始|はじ}めた。"
      - type: dialog
        character: souta
        text: "{最初|さいしょ}の2個はちゃんと{冷|さ}ましてうまくいった。でもユイに「まだ？」って言われて{焦|あせ}っちゃって。"
        expression: worried
      - type: dialog
        character: souta
        text: "{残|のこ}り2個を{冷|さ}まさずにむこうとしたら……{殻|から}が{白身|しろみ}にくっついて、ぐちゃぐちゃに{崩|くず}れた。"
      - type: dialog
        character: souta
        text: "「やってみればわかる」がおれの口ぐせなんだけど、{今回|こんかい}は「{手順|てじゅん}{通|どお}りにやらないとダメ」って分かった。"
        expression: worried
      - type: dialog
        character: souta
        text: "{失敗|しっぱい}が{恥|は}ずかしくて、キッチンペーパーに{包|つつ}んでゴミ{箱|ばこ}に{捨|す}てちゃった。ごめん……。"
        expression: determined
      - type: sprite
        character: souta
        action: hide
      - type: narration
        speed: slow
        text: "ソウタは{料理|りょうり}が大好きだった。だからこそ、{失敗|しっぱい}が{恥|は}ずかしかった。でも——{手順|てじゅん}を{省|はぶ}いたのはソウタだけの{責任|せきにん}だろうか？"

  # ===== エピローグ =====
  - id: epilogue
    bg: cooking-room
    bgm: homeec-01/resolution
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{今日|きょう}の{調理|ちょうり}{実習|じっしゅう}で大事なことが分かったわね。"
      - type: dialog
        character: sensei
        text: "{調理|ちょうり}{手順|てじゅん}には{順序|じゅんじょ}の{理由|りゆう}がある。「{冷|さ}ます」は「{殻|から}をむきやすくする」ための大切な{工程|こうてい}。{省|はぶ}くと{失敗|しっぱい}する。"
        expression: normal
      - type: dialog
        character: sensei
        text: "そしてもう1つ——{失敗|しっぱい}したとき、{隠|かく}さずに言えることが大事。{隠|かく}しても、{証拠|しょうこ}はちゃんと{残|のこ}っているから。"
        expression: thinking
      - type: dialog
        character: sensei
