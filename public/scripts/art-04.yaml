scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校|がっこう}の{廊下|ろうか}で「{光|ひかり}と{影|かげ}の{作品展|さくひんてん}」が{開催中|かいさいちゅう}。ニジカの{大型|おおがた}{水彩画|すいさいが}に**{水|みず}がかかってにじんでしまった**。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: takumi
        expression: normal
        position: center
      - type: dialog
        character: takumi
        text: "{昨日|きのう}16:00ごろ{廊下|ろうか}を{通|とお}ったとき、{窓|まど}から{光|ひかり}が{差|さ}していて、ニジカの{水彩画|すいさいが}の{影|かげ}が{右|みぎ}の{壁|かべ}に{映|うつ}っていた。{影|かげ}は{無傷|むきず}だったよ。だから16:00の{時点|じてん}では{絵|え}は{大丈夫|だいじょうぶ}だったはず。"
        expression: normal
      - type: sprite
        character: takumi
        action: hide
      - type: narration
        text: "この{証言|しょうげん}は{本当|ほんとう}だろうか？"
      - type: narration
        text: "{大事|だいじ}な{知識|ちしき}——{影|かげ}は{光|ひかり}の{反対側|はんたいがわ}にできる。そして{影|かげ}は{物体|ぶったい}の「{形|かたち}のシルエット」しか{映|うつ}さない。{色|いろ}やにじみは{影|かげ}には{映|うつ}らない。"
      - type: effect
        name: fade-out
      - type: title_card
        text: "影の証人"
        subtitle: "美術探偵団 Vol.4"

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1"
        subtitle: "にじんだ水彩画と通過記録"
      - type: narration
        text: "ニジカの{大型|おおがた}{水彩画|すいさいが}。{中央|ちゅうおう}から{右側|みぎがわ}にかけて{水|みず}がかかってにじんでいる。にじみは**{横|よこ}から{飛|と}び{散|ち}った**ような{染|し}み{方|かた}。{水滴|すいてき}が{左|ひだり}→{右|みぎ}に{走|はし}っている。"
      - type: narration
        text: "{廊下|ろうか}{通過|つうか}{記録|きろく}——15:30サクラ（{異常|いじょう}なし）。15:45ニジカ（{異常|いじょう}なし）。**16:00タクミ**（「{影|かげ}は{無傷|むきず}」と{証言|しょうげん}）。**16:15ユウ**（にじみを{発見|はっけん}し先生に{報告|ほうこく}）。"
      - type: narration
        text: "{犯行|はんこう}{時間|じかん}: 15:45〜16:15（ニジカ{確認|かくにん}→ユウ{発見|はっけん}の{間|あいだ}）。タクミが16:00に{通過|つうか}。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: "ステップ2"
        subtitle: "タクミの証言と現場の物証"
      - type: narration
        text: "タクミの{証言|しょうげん}: 「16:00ごろ{廊下|ろうか}を{通|とお}ったとき、{南|みなみ}の{窓|まど}から{夕方|ゆうがた}の{光|ひかり}が{差|さ}していて、ニジカの{水彩画|すいさいが}の{影|かげ}が{右|みぎ}の{壁|かべ}に{映|うつ}っていた。{影|かげ}はきれいな{形|かたち}で{無傷|むきず}だった」"
      - type: narration
        text: "16:00は{西日|にしび} → {影|かげ}は{右|みぎ}に{伸|の}びる → タクミの「{右|みぎ}の{壁|かべ}」は{方向|ほうこう}{自体|じたい}は{正|ただ}しい。でも「{影|かげ}が{無傷|むきず}＝{絵|え}が{無傷|むきず}」は{正|ただ}しい{推論|すいろん}？"
      - type: sprite
        character: yuu
        expression: thinking
        position: right
      - type: dialog
        character: yuu
        text: "にじみがまだ{乾|かわ}いていなかった → {水|みず}がかかったのはごく{最近|さいきん}（16:15{直前|ちょくぜん}）。それと{床|ゆか}に**{青|あお}い{水筒|すいとう}{柄|がら}のハンカチ**が{落|お}ちていた。{誰|だれ}かが{拭|ふ}こうとした{跡|あと}。"
        expression: thinking
      - type: sprite
        character: yuu
        action: hide
      - type: narration
        text: "\"{走|はし}りながらこぼした{水|みず}。{拭|ふ}こうとしたハンカチ。{青|あお}い{水筒|すいとう}{柄|がら}——この{柄|がら}に{見覚|みおぼ}えは？"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "決定的証拠"
        subtitle: "影の矛盾と物証の連鎖"
      - type: effect
        name: fade-in
      - type: sprite
        character: sakura
        expression: determined
        position: left
      - type: dialog
        character: sakura
        text: "{光源|こうげん}{分析|ぶんせき}の{結果|けっか}——16:00の{光|ひかり}で{影|かげ}が{右|みぎ}に{伸|の}びるのは{正|ただ}しい。でも**{致命的|ちめいてき}な{矛盾|むじゅん}**がある。"
        expression: determined
      - type: dialog
        character: sakura
        text: "**{影|かげ}は{物体|ぶったい}の「{形|かたち}のシルエット」しか{映|うつ}さない。{水彩|すいさい}の「にじみ」は{影|かげ}には{映|うつ}らない。**"
        expression: determined
      - type: sprite
        character: sakura
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "つまり「{影|かげ}が{無傷|むきず}」は{当|あ}たり{前|まえ}。{絵|え}が{無傷|むきず}であることの{証拠|しょうこ}には**{絶対|ぜったい}にならない**。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "タクミは{光|ひかり}と{影|かげ}に{詳|くわ}しい（{立体|りったい}{造形|ぞうけい}が{得意|とくい}）。{影|かげ}の{性質|せいしつ}を{知|し}っているのに{誤|あやま}った{推論|すいろん}を{使|つか}った＝**{意図的|いとてき}**。"
      - type: sprite
        character: nijika
        expression: determined
        position: right
      - type: dialog
        character: nijika
        text: "{水滴|すいてき}が{横|よこ}（{東|ひがし}→{西|にし}）に{飛|と}び{散|ち}っている。{走|はし}りながらこぼれた{証拠|しょうこ}。{青|あお}い{水筒|すいとう}{柄|がら}のハンカチ——それ、タクミがいつも{持|も}ってるやつだ！"
        expression: determined
      - type: sprite
        character: nijika
        action: hide
      - type: narration
        text: "{因果|いんが}の{連鎖|れんさ}——タクミが{廊下|ろうか}を{走|はし}る → {水筒|すいとう}のフタが{外|はず}れて{水|みず}が{飛|と}び{散|ち}る → ニジカの{水彩画|すいさいが}にかかる → {慌|あわ}ててハンカチで{拭|ふ}く → にじみは{消|き}えない → パニック → {嘘|うそ}の{証言|しょうげん}「{影|かげ}は{無傷|むきず}」を{作|つく}る。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: "推理タイム"
        subtitle: "犯人は誰だ？"
      - type: narration
        text: "{証拠|しょうこ}をまとめよう。「{影|かげ}が{無傷|むきず}＝{絵|え}が{無傷|むきず}」は{論理的|ろんりてき}に{正|ただ}しくない。{青|あお}い{水筒|すいとう}{柄|がら}のハンカチ＝タクミ。{水滴|すいてき}が{横|よこ}に{飛|と}び{散|ち}っている＝{走|はし}りながらこぼした。にじみが{乾|かわ}いていない＝16:00{前後|ぜんご}。タクミは{廊下|ろうか}を{走|はし}る{癖|くせ}がある。"
      - type: choice
        id: q1
        question: "ニジカの水彩画に水をかけた犯人は？"
        options:
          - text: タクミ（水筒の事故＋嘘の証言＋ハンカチ＋走る癖）
            value: takumi
            correct: true
            feedback: "{正解|せいかい}！ タクミは{廊下|ろうか}を{走|はし}っていたとき{水筒|すいとう}の{水|みず}が{飛|と}び{散|ち}り、{水彩画|すいさいが}にかかった。{事故|じこ}だけど、{嘘|うそ}の{証言|しょうげん}でごまかそうとした。「{影|かげ}は{無傷|むきず}」は{当|あ}たり{前|まえ}——{影|かげ}にはにじみは{映|うつ}らないから。"
          - text: サクラ（光源分析をした人）
            value: sakura
            feedback: "サクラは{影|かげ}の{論理的|ろんりてき}{矛盾|むじゅん}を{発見|はっけん}した{側|がわ}。15:30に{通過|つうか}して{異常|いじょう}なしだったよ。"
          - text: ニジカ（被害者）
            value: nijika
            feedback: "ニジカは{被害者|ひがいしゃ}。{自分|じぶん}の{水彩画|すいさいが}を{壊|こわ}す{理由|りゆう}がないよ。"
          - text: ユウ（発見者）
            value: yuu
            feedback: "ユウはにじみを{発見|はっけん}して先生に{報告|ほうこく}した{側|がわ}。16:15に{発見|はっけん}した{時点|じてん}で{事件|じけん}は{起|お}きた{後|あと}だったね。"

  # ==================== 真実：タクミ ====================
  - id: truth-takumi
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
        subtitle: "タクミの告白"
      - type: effect
        name: fade-in
      - type: sprite
        character: takumi
        expression: worried
        position: center
      - type: dialog
        character: takumi
        text: "……ごめん。{水彩画|すいさいが}に{水|みず}をかけたのは{僕|ぼく}だ。{事故|じこ}なんだ。"
        expression: worried
      - type: dialog
        character: takumi
        text: "{廊下|ろうか}を{走|はし}ってたとき、{水筒|すいとう}のフタが{外|はず}れて{水|みず}が{飛|と}び{散|ち}った。{水彩画|すいさいが}にかかって、すぐにじみ{始|はじ}めた。ハンカチで{拭|ふ}いたけど{消|き}えなくて……。"
        expression: thinking
      - type: dialog
        character: takumi
        text: "パニックになって、「{影|かげ}が{無傷|むきず}だった」って{嘘|うそ}の{証言|しょうげん}を{作|つく}った。{影|かげ}にはにじみが{映|うつ}らないのは{知|し}ってた。でも「{影|かげ}が{無傷|むきず}＝{絵|え}も{無傷|むきず}」って{言|い}えば、{僕|ぼく}じゃないって{思|おも}ってもらえると……ごめんなさい。"
        expression: worried
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: nijika
        expression: thinking
        position: right
      - type: dialog
        character: nijika
        text: "{事故|じこ}だったんだ。{怒|おこ}ってたけど……{正直|しょうじき}に{言|い}ってくれれば{一緒|いっしょ}に{考|かんが}えられたのに。"
        expression: thinking
      - type: sprite
        character: nijika
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{光|ひかり}と{影|かげ}の{関係|かんけい}——{光源|こうげん}の{位置|いち}で{影|かげ}の{方向|ほうこう}が{決|き}まる。そして{影|かげ}は{形|かたち}のシルエットだけを{映|うつ}す。{色|いろ}やにじみは{映|うつ}らない。この{知識|ちしき}でタクミの{嘘|うそ}を{見破|みやぶ}れたわね。"
        expression: happy
      - type: dialog
        character: sensei
        text: "{事故|じこ}は{仕方|しかた}ない。{大事|だいじ}なのは、{起|お}きたときに{正直|しょうじき}に{言|い}えるかどうか。{嘘|うそ}でごまかすと、もっと{大|おお}きな{問題|もんだい}になるわ。"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "\"{因果|いんが}の{連鎖|れんさ}——{走|はし}る→{水筒|すいとう}→{水|みず}→にじみ→{拭|ふ}く→{嘘|うそ}。{原因|げんいん}と{結果|けっか}の{鎖|くさり}を{追|お}うと{真相|しんそう}にたどり{着|つ}く。"
      - type: narration
        text: "「{影|かげ}が{無傷|むきず}だから{絵|え}も{無傷|むきず}」は{思|おも}い{込|こ}み。{影|かげ}は{形|かたち}しか{映|うつ}さない。{見|み}た{目|め}に{騙|だま}されず、{本質|ほんしつ}を{見抜|みぬ}く{力|ちから}が{大切|たいせつ}。"
      - type: effect
        name: fade-out
