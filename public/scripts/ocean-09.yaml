scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "海洋研究発表会で、シオルのデータが他の3組（ナミ班、ミナト班、カイ班）と大きくずれていた。"
      - type: narration
        text: "「シオルのデータが間違っている」か「他の3組が間違っている」か——帰納法で複数のデータを比較すると、シオルの観測時刻だけが問題の条件（潮の変化が激しい時間帯）と重なっていた。"
      - type: narration
        text: "時間切れの焦りから、潮位が安定しない時間帯に測定してしまっていた。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: shioru
        expression: worried
        position: center
      - type: dialog
        character: shioru
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: shioru
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: shioru, expression: determined }
          - { id: minato, expression: thinking }
          - { id: nami, expression: thinking }
          - { id: kai, expression: worried }
      - type: narration
        text: "「海洋探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "海洋探偵団"
        subtitle: "Vol.9 ずれた観測データ"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: shioru
        expression: worried
        position: left
      - type: dialog
        character: shioru
        text: "段階投票2回目後「締切前夜で焦ってた。でも\"早く終わらせたい\"と\"正確に測る\"は両立できたはず"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        expression: thinking
        position: right
      - type: dialog
        character: minato
        text: "マニュアルに書いてある。潮位が変化している時間帯は測らないって。シオルが測った時間はちょうど変化中だった"
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        expression: thinking
        position: left
      - type: dialog
        character: nami
        text: "3組の共通点が見つかった。シオルだけが\"潮が動いている最中\"に測っている。これが外れ値の原因だ"
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        expression: thinking
        position: right
      - type: dialog
        character: kai
        text: "締切は明日の朝だった。シオルは急いでいた。そういう状況で正確さを保つのは難しい"
      - type: sprite
        character: kai
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「事件のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: shioru, expression: normal }
          - { id: minato, expression: normal }
          - { id: nami, expression: normal }
          - { id: kai, expression: worried }
      - type: choice
        id: q1
        text: "事件のきっかけになった行動をしたのは誰？"
        options:
          - label: "シオル"
            value: shioru
            correct: true
            feedback: "シオルの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - label: "ミナト"
            value: minato
            correct: false
            feedback: "ミナトは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "ナミ"
            value: nami
            correct: false
            feedback: "ナミは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "カイ"
            value: kai
            correct: false
            feedback: "カイは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、シオル"
      - type: dialog
        character: sensei
        text: "動機は、#17 時間切れの焦り — シオルは発表の締切が迫っていて、「早く終わらせなければ」と焦り、観測マニュアルに書かれた「満潮または干潮の1時間後に測定」という条件を確認しないまま、変化の激しい時間帯に測定してしまった。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: shioru
        expression: worried
        position: center
      - type: dialog
        character: shioru
        text: "段階投票2回目後「締切前夜で焦ってた。でも\"早く終わらせたい\"と\"正確に測る\"は両立できたはず"
      - type: sprite
        character: shioru
        expression: determined
      - type: dialog
        character: shioru
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: shioru
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・海洋観測データの信頼性（測定条件の標準化・外れ値の扱い・複数データによる検証）を理解する\n・帰納法スキル — 複数の観測結果から共通パターンを見つけ、外れ値の原因を特定する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: shioru, expression: happy }
          - { id: minato, expression: happy }
          - { id: nami, expression: happy }
          - { id: kai, expression: happy }
      - type: narration
        text: "海洋探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
