scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "論理ミステリー Vol.10"
        subtitle: "心と理由"
      - type: narration
        text: "卒業前のクラスで、「一年をふり返るメッセージボード」を作ることになった。"
      - type: narration
        text: "みんなはそれぞれ、クラスの思い出や感謝の言葉を書いていた。"
      - type: narration
        text: "ところが、リカが用意していた代表メッセージの下書きが、途中で書きかわっていた。"
      - type: sprite_group
        characters:
          - id: ron
            expression: normal
          - id: rika
            expression: normal
          - id: koto
            expression: normal
          - id: kana
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: ron
        expression: normal
        position: left
      - type: dialog
        character: ron
        text: "最初の下書きには、「くやしかったこともあった」と書かれていた。"
      - type: dialog
        character: ron
        text: "最初の下書きには、「くやしかったこともあった」と書かれていた。"
        expression: thinking
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        expression: normal
        position: right
      - type: dialog
        character: rika
        text: "自分が書きかえたことは、まだみんなに話していない。"
      - type: dialog
        character: rika
        text: "自分が書きかえたことは、まだみんなに話していない。"
        expression: thinking
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        expression: normal
        position: left
      - type: dialog
        character: koto
        text: "話し合いでは、「前向きにしたい」と「本当のことを残したい」の二つの意見があった。"
      - type: dialog
        character: koto
        text: "話し合いでは、「前向きにしたい」と「本当のことを残したい」の二つの意見があった。"
        expression: thinking
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        expression: normal
        position: right
      - type: dialog
        character: kana
        text: "最初の文には、楽しかったこととくやしかったことの両方があった。"
      - type: dialog
        character: kana
        text: "最初の文には、楽しかったこととくやしかったことの両方があった。"
        expression: thinking
      - type: sprite
        character: kana
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: ron
            expression: thinking
          - id: rika
            expression: thinking
          - id: koto
            expression: thinking
          - id: kana
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "キャラクターシート: ロン"
            value: ron
            correct: false
            feedback: "キャラクターシート: ロンは手がかりを持っているが、決め手は足りない。"
          - text: "キャラクターシート: リカ"
            value: rika
            correct: false
            feedback: "キャラクターシート: リカは手がかりを持っているが、決め手は足りない。"
          - text: "キャラクターシート: コト"
            value: koto
            correct: false
            feedback: "キャラクターシート: コトは手がかりを持っているが、決め手は足りない。"
          - text: "キャラクターシート: カナ"
            value: kana
            correct: true
            feedback: "キャラクターシート: カナの行動が、証拠といちばん一致している。"
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "キャラクターシート: カナ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kana
        expression: worried
        position: center
      - type: dialog
        character: kana
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: kana
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: ron
            expression: happy
          - id: rika
            expression: happy
          - id: koto
            expression: happy
          - id: kana
            expression: happy
      - type: narration
        text: "論理ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
