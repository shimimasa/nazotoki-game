    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center

      - type: dialog
        character: sensei
        text: "4人とも、メダカのことを{大切|たいせつ}に{思|おも}っていた。{誰|だれ}も{悪|わる}いことをしようとはしていなかった。"
        expression: normal

      - type: dialog
        character: sensei
        text: "でもね——「{助|たす}けたい」「{元気|げんき}にしたい」という{気持|きもち}だけでは、{命|いのち}は{守|まも}れないことがある。{正|ただ}しい{知識|ちしき}がないと、{逆|ぎゃく}に{命|いのち}を{危|あや}うくしてしまうこともあるんだ。"
        expression: thinking

      - type: dialog
        character: sensei
        text: "そして、{困|こま}ったとき、{失敗|しっぱい}したとき——1人で{抱|かか}えないこと。{正直|しょうじき}に{伝|つた}えること。{相談|そうだん}すること。それが{命|いのち}を{守|まも}ることにつながるんだよ。"
        expression: determined

      - type: dialog
        character: sensei
        text: "ヒナの{家|いえ}のメダカは——{今|いま}も{元気|げんき}に{泳|およ}いでいます。みんなで{迎|むか}えに{行|い}こう。"
        expression: happy

      - type: sprite
        character: sensei
        action: hide

      - type: narration
        text: "{命|いのち}はひとつしかない。{取|と}り{返|かえ}しがつかない。だから——{気持|きもち}だけでなく、{知識|ちしき}と{勇気|ゆうき}で{守|まも}ろう。"

      - type: narration
        text: "——それが、4匹のメダカが{教|おし}えてくれたこと。"

      - type: effect
