scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "給食の「和食の日」献立を作る家庭科の授業で、各班が考えた献立を比べていると、1班の献立だけ「五色のうち1色が欠けている」ことに山田先生が気づいた。"
      - type: narration
        text: "しかも1班の献立は「途中で変更された」らしい。"
      - type: narration
        text: "誰が献立を変えて、なぜ五色が欠けることになったのか——和食の「五味五色五法」の知識がないと「何が欠けているか」すら分からない。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: kanade
        expression: worried
        position: center
      - type: dialog
        character: kanade
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: kanade
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: determined }
          - { id: kanade, expression: thinking }
          - { id: ibuki, expression: thinking }
          - { id: kotono, expression: worried }
      - type: narration
        text: "「伝統文化探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "伝統文化探偵団"
        subtitle: "Vol.6 和食の五色"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: tsumugi
        expression: thinking
        position: left
      - type: dialog
        character: tsumugi
        text: "五色それぞれの食材一覧を整理し、「黒が消えると何の栄養が減るか」を提示する場面"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        expression: worried
        position: right
      - type: dialog
        character: kanade
        text: "条件付き公開後、「ごまアレルギーかもって言われて、一人で献立を変えた」と打ち明ける瞬間"
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        expression: thinking
        position: left
      - type: dialog
        character: ibuki
        text: "献立用紙の書き直しの痕跡を観察し、「黒ごま豆腐から白豆腐への変更は最近行われた」を指摘する場面"
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        expression: thinking
        position: right
      - type: dialog
        character: kotono
        text: "条件付き公開後、「カナデが心配してくれた気持ちはよく分かる。でも一緒に考えることが大切だったね」と伝える場面"
      - type: sprite
        character: kotono
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「献立から黒ごま豆腐を白豆腐に変えたのは誰？」"
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: normal }
          - { id: kanade, expression: normal }
          - { id: ibuki, expression: normal }
          - { id: kotono, expression: worried }
      - type: choice
        id: q1
        text: "献立から黒ごま豆腐を白豆腐に変えたのは誰？"
        options:
          - text: "ツムギ"
            value: tsumugi
            correct: false
            feedback: "ツムギは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "カナデ"
            value: kanade
            correct: true
            feedback: "カナデの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - text: "イブキ"
            value: ibuki
            correct: false
            feedback: "イブキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "コトノ"
            value: kotono
            correct: false
            feedback: "コトノは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、カナデ（奏）"
      - type: dialog
        character: sensei
        text: "動機は、#8 みんなのために — カナデの班では「黒ごま豆腐」（黒の色担当）を予定していたが、班の1人が「ごまアレルギーかも」と言い出した。カナデは「みんなが安全に食べられる献立に変えなければ」と思い、黒ごま豆腐を普通の白豆腐に変更した。しかし変更を班のみんなに相談せず一人で書き直したため、五色の「黒」が消えたことに誰も気づかなかった。カナデの「みんなのため」という気持ちは正しかったが、一人で抱え込んだことが問題を生んだ。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kanade
        expression: worried
        position: center
      - type: dialog
        character: kanade
        text: "条件付き公開後、「ごまアレルギーかもって言われて、一人で献立を変えた」と打ち明ける瞬間"
      - type: sprite
        character: kanade
        expression: determined
      - type: dialog
        character: kanade
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: kanade
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 和食の「五色（白・黒・赤・緑・黄）」が栄養バランスと彩りの両方を表していることを理解する\n・**サブ**: 全探索スキル——5つの色のうちどれが欠けているかを体系的に確認する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: happy }
          - { id: kanade, expression: happy }
          - { id: ibuki, expression: happy }
          - { id: kotono, expression: happy }
      - type: narration
        text: "伝統文化探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
