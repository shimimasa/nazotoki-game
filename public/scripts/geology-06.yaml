meta:
  id: geology-06
  title: "けずられた真実"
  series: "地学ミステリー"
  volume: 6
  estimatedMinutes: 18

characters:
  chisou:
    name: "チソウ"
    color: "#8D6E63"
    sprites:
      normal: boy-c-normal.webp
      happy: boy-c-happy.webp
      thinking: boy-c-thinking.webp
      worried: boy-c-worried.webp
      surprised: boy-c-surprised.webp
      determined: boy-c-determined.webp
  ishikawa:
    name: "イシカワ"
    color: "#4A90D9"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  magumu:
    name: "マグム"
    color: "#E74C3C"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  sunako:
    name: "スナコ"
    color: "#C49A6C"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "地学ミステリー Vol.6"
        subtitle: "けずられた真実"
      - type: narration
        text: "町の石碑に、だれかがいたずらで文字をけずったらしい。"
      - type: narration
        text: "地学クラブの4人は、石碑の前で集めた情報をもとに、"
      - type: narration
        text: "本当に「だれかが悪意でけずった」のかを調べることになった。"
      - type: sprite_group
        characters:
          - id: chisou
            expression: normal
          - id: ishikawa
            expression: normal
          - id: magumu
            expression: normal
          - id: sunako
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: chisou
        expression: normal
        position: left
      - type: dialog
        character: chisou
        text: "あなたは地層や地形の変化に興味がある。 今日は校庭の石碑の件で話し合いに来たが、"
      - type: dialog
        character: chisou
        text: "昨日の夕方、石碑の黒ずみが気になっていた"
        expression: thinking
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        expression: normal
        position: right
      - type: dialog
        character: ishikawa
        text: "あなたは事実を順番に整理するのが得意。 「いつ、だれが、何をしたか」をまとめるのが今回の担当だ。"
      - type: dialog
        character: ishikawa
        text: "朝7時台にチソウが校庭にいた"
        expression: thinking
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        expression: normal
        position: left
      - type: dialog
        character: magumu
        text: "あなたは岩石の種類や性質を説明する担当。 今回は石碑の石が何かを手がかりに考えている。"
      - type: dialog
        character: magumu
        text: "石碑は見た目や学校の古い資料から、石灰岩の可能性が高い"
        expression: thinking
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        expression: normal
        position: right
      - type: dialog
        character: sunako
        text: "あなたは細かい観察が得意。 石碑の表面を見て、単なるいたずら跡ではないと思っている。"
      - type: dialog
        character: sunako
        text: "文字の一部だけでなく、その周りの平らな部分も薄く削れている"
        expression: thinking
      - type: sprite
        character: sunako
        action: hide
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠1"
        subtitle: "石碑表面の観察メモ"
      - type: narration
        text: "文字の深いみぞだけでなく、その周囲の平らな面も薄く削れている"
      - type: narration
        text: "強い力で1回だけ引っかいたような線ではなく、広い面が少しずつすり減った見え方をしている"
      - type: narration
        text: "右下の角には白い粉がわずかに残っている"
      - type: se
        sound: discover
      - type: narration
        text: "一点集中のいたずらではなく、広い面をこすった行動や、表面が弱ってから削れた可能性が高い。"
  - id: evidence-2
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠2"
        subtitle: "行動記録表"
      - type: narration
        text: "7:20 チソウが校庭へ"
      - type: narration
        text: "7:30 理科準備室前のブラシが持ち出される"
      - type: narration
        text: "7:45 チソウが水道の近くにいたのを目撃される"
      - type: narration
        text: "8:05 ブラシが元の場所に戻る"
      - type: narration
        text: "12:10 スナコが石碑の表面変化に気づく"
      - type: se
        sound: discover
      - type: narration
        text: "チソウが石碑と清掃道具に最も近い時間帯に行動していた。"
  - id: evidence-3
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠3"
        subtitle: "石の種類カード"
      - type: narration
        text: "石碑の石は石灰岩と考えられる"
      - type: narration
        text: "石灰岩は主に炭酸カルシウムでできている"
      - type: narration
        text: "水や弱い酸、こすれによって表面が弱くなることがある"
      - type: narration
        text: "表面が弱くなった石は、ブラシでもすり減りやすい"
      - type: se
        sound: discover
      - type: narration
        text: "石碑は「強くて何をしても平気な石」ではない。"
  - id: evidence-4
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠4"
        subtitle: "ブラシの付着物"
      - type: narration
        text: "理科準備室前の固いブラシから白っぽい粉末が見つかった"
      - type: narration
        text: "粉末は石灰質の成分を含むと考えられる"
      - type: narration
        text: "ブラシの毛先は先だけが少しすり減っていた"
      - type: se
        sound: discover
      - type: narration
        text: "石碑の表面をブラシでこすったことを裏づける。"
  - id: evidence-5
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠5"
        subtitle: "チソウの追加情報"
      - type: narration
        text: "チソウは「黒ずみを落としたかっただけだった」と話した"
      - type: narration
        text: "水をかけながら固いブラシで数回こすった"
      - type: narration
        text: "白い粉が出たが、汚れが落ちたのだと思っていた"
      - type: narration
        text: "石碑を壊すつもりはまったくなかった"
      - type: se
        sound: discover
      - type: narration
        text: "犯人はチソウ。 ただし、悪意のある破壊ではなく、石灰岩の性質を知らずに行った清掃が原因だった。"
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: chisou
            expression: thinking
          - id: ishikawa
            expression: thinking
          - id: magumu
            expression: thinking
          - id: sunako
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "チソウ"
            value: chisou
            correct: true
            feedback: "チソウの行動が、証拠といちばん一致している。"
          - text: "イシカワ"
            value: ishikawa
            correct: false
            feedback: "イシカワは手がかりを持っているが、決め手は足りない。"
          - text: "マグム"
            value: magumu
            correct: false
            feedback: "マグムは手がかりを持っているが、決め手は足りない。"
          - text: "スナコ"
            value: sunako
            correct: false
            feedback: "スナコは手がかりを持っているが、決め手は足りない。"
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "チソウ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "チソウは、黒ずんだ石碑をきれいにしたいと思い、"
      - type: dialog
        character: sensei
        text: "朝のうちに固いブラシと水で石碑をこすった。"
      - type: dialog
        character: sensei
        text: "石碑は石灰岩でできていたため、表面が弱くなりやすく、"
      - type: dialog
        character: sensei
        text: "みぞの周囲まで少しずつ削れてしまった。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: chisou
        expression: worried
        position: center
      - type: dialog
        character: chisou
        text: "石碑が汚れて見えて、きれいにしたかった"
      - type: dialog
        character: chisou
        text: "地域の大事なものを守るつもりだった"
        expression: thinking
      - type: sprite
        character: chisou
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "Card 1 で、一点だけではなく広い面が削れているとわかる"
      - type: narration
        text: "Card 2 で、朝にチソウが石碑と清掃道具の近くにいたとわかる"
      - type: narration
        text: "Card 3 で、石碑が石灰岩で、水とこすれに弱いとわかる"
      - type: narration
        text: "Card 4 で、ブラシが実際に石碑に使われたと裏づけられる"
      - type: sprite_group
        characters:
          - id: chisou
            expression: happy
          - id: ishikawa
            expression: happy
          - id: magumu
            expression: happy
          - id: sunako
            expression: happy
      - type: narration
        text: "地学ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: chisou
        action: hide
      - type: sprite
        character: ishikawa
        action: hide
      - type: sprite
        character: magumu
        action: hide
      - type: sprite
        character: sunako
        action: hide
