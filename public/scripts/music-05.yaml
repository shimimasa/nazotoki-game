scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{音楽室|おんがくしつ}のリコーダー{棚|だな}に{異変|いへん}が——{学校|がっこう}{備品|びひん}の{高級|こうきゅう}アルトリコーダー（{木製|もくせい}）が**{割|わ}れた{状態|じょうたい}**で{棚|たな}に{戻|もど}されていた。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{割|わ}れたリコーダーの{近|ちか}くに、**{白|しろ}い{粉|こな}**が{少|すこ}しだけ{落|お}ちていた。{調|しら}べてみると、それは**{松脂|まつやに}の{粉|こな}**——{弦楽器|げんがっき}の{弓|ゆみ}に{塗|ぬ}る{材料|ざいりょう}だ。
      - type: narration
        text: でも、{音楽室|おんがくしつ}に{弦楽器|げんがっき}はないはず。{松脂|まつやに}はどこから{来|き}た？
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{楽器|がっき}は3つに{分類|ぶんるい}されるわ。{弦楽器|げんがっき}（{弦|げん}をこする）、{管楽器|かんがっき}（{息|いき}を{吹|ふ}き{込|こ}む）、{打楽器|だがっき}（たたく）。**{松脂|まつやに}を{使|つか}うのは{弦楽器|げんがっき}だけ**よ。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: kaori
            expression: thinking
          - character: souta
            expression: thinking
          - character: hibiki
            expression: surprised
          - character: kotone
            expression: worried
      - type: narration
        text: "4{人|にん}の{楽器|がっき}——ピアノ・パーカッション・トランペット・フルート。{誰|だれ}の{楽器|がっき}にも{松脂|まつやに}は{使|つか}わない。なのに{松脂|まつやに}がある。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 楽器の声
        subtitle: 音楽探偵団 Vol.5

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 割れたリコーダーと白い粉
      - type: narration
        text: "{高級|こうきゅう}アルトリコーダーが{縦|たて}に{割|わ}れている。{高|たか}いところから{落|お}とした{跡|あと}がある。"
      - type: narration
        text: "{割|わ}れた{面|めん}に**{白|しろ}い{粉|こな}（{松脂|まつやに}）が{付着|ふちゃく}**している → リコーダーを{持|も}った{手|て}に{松脂|まつやに}がついていた。
      - type: narration
        text: つまり——**{松脂|まつやに}が{手|て}についた{状態|じょうたい}で、{棚|たな}の{一番|いちばん}{上|うえ}のリコーダーを{触|さわ}り、{手|て}が{滑|すべ}って{落|お}とした**。
      - type: narration
        text: "{松脂|まつやに}が{手|て}についていた{人|ひと}は{誰|だれ}？ {弦楽器|げんがっき}を{弾|ひ}いたばかりの{人|ひと}の{手|て}には{松脂|まつやに}がつく。"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 出入りノートと楽器分類
      - type: narration
        text: "カオリ（ピアノ）15:00〜16:30。{松脂|まつやに}を**{使|つか}わない**。{最後|さいご}に{退室|たいしつ}。"
      - type: narration
        text: "ヒビキ（トランペット）15:10〜16:10。{松脂|まつやに}を{使|つか}わない。"
      - type: narration
        text: "ソウタ（パーカッション）15:15〜16:15。{松脂|まつやに}を{使|つか}わない。"
      - type: narration
        text: "コトネ（フルート）15:20〜16:00。{松脂|まつやに}を{使|つか}わない。"
      - type: narration
        text: "**4{人|にん}とも、{自分|じぶん}の{楽器|がっき}では{松脂|まつやに}を{使|つか}わない。**でも{松脂|まつやに}がある。「{自分|じぶん}の{楽器|がっき}{以外|いがい}」の{楽器|がっき}を{弾|ひ}いた{人|ひと}がいる？"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: リコーダーの割れ方とカオリの発言
      - type: narration
        text: リコーダーは{縦|たて}に{割|わ}れ、{松脂|まつやに}の{粉|こな}が{付着|ふちゃく}。{高|たか}いところから{落|お}とした{跡|あと}。**{松脂|まつやに}が{手|て}について{滑|すべ}った**。
      - type: sprite
        character: hibiki
        expression: thinking
        position: left
      - type: dialog
        character: hibiki
        text: "そういえば、{昨日|きのう}の{合奏|がっそう}{練習中|れんしゅうちゅう}にカオリが1{回|かい}だけ『{指|ゆび}が{滑|すべ}る』って{言|い}ったんだ。ピアノで{指|ゆび}が{滑|すべ}るのは{珍|めずら}しいよね。"
        expression: thinking
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: hibiki
        expression: determined
        position: right
      - type: dialog
        character: hibiki
        text: "あと、{準備室|じゅんびしつ}のドアの{取|と}っ{手|て}に**{白|しろ}い{粉|こな}**がついてた。カオリは{最近|さいきん}1{人|り}で{残|のこ}ることが{増|ふ}えてるし……"
        expression: thinking
      - type: sprite
        character: hibiki
        action: hide
      - type: narration
        text: カオリの{手|て}に{何|なに}かがついていたら{指|ゆび}が{滑|すべ}る。{松脂|まつやに}の{粉|こな}は{手|て}に{残|のこ}ると{ザラザラ}して{指|ゆび}が{滑|すべ}ることがある。

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 前提の崩壊
      - type: effect
        name: fade-in
      - type: sprite
        character: souta
        expression: determined
        position: left
      - type: dialog
        character: souta
        text: "16:20ごろ、{廊下|ろうか}から{音楽室|おんがくしつ}の{方|ほう}を{聞|き}いたら……**{弦楽器|げんがっき}のような{音|おと}**がした。ヴァイオリン？ でも{音楽室|おんがくしつ}に{弦楽器|げんがっき}はないはず。"
        expression: surprised
      - type: dialog
        character: souta
        text: "それとカオリのカバンが{いつもより**{膨|ふく}らんでいた**。{帰|かえ}り{際|ぎわ}、ドアの{近|ちか}くで**{松|まつ}の{木|き}のような{甘|あま}い{匂|にお}い**がした。"
        expression: thinking
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: kotone
        expression: thinking
        position: right
      - type: dialog
        character: kotone
        text: "カオリの{左手|ひだりて}の{指先|ゆびさき}に{小|ちい}さな{硬|かた}いタコがある。ピアノにはあまりできないけど、ヴァイオリンを{弾|ひ}く{人|ひと}にはよくできるタコ。"
        expression: thinking
      - type: dialog
        character: kotone
        text: "それと{先週|せんしゅう}、カオリが{音楽|おんがく}{雑誌|ざっし}の**ヴァイオリン{特集|とくしゅう}**のページを{読|よ}んでたの。"
        expression: determined
      - type: sprite
        character: kotone
        action: hide
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "**「{音楽室|おんがくしつ}に{弦楽器|げんがっき}はない」は{間違|まちが}いだった。**"
      - type: narration
        text: "カオリがヴァイオリンを{持|も}ち{込|こ}んでいた{可能性|かのうせい}がある。"
      - type: narration
        text: "{仮説|かせつ}を{立|た}てて{検証|けんしょう}しよう——「カオリがヴァイオリンを{持|も}ち{込|こ}んで{練習|れんしゅう}していた」。{松脂|まつやに}の{粉|こな}→「{指|ゆび}が{滑|すべ}る」→リコーダーを{落|お}とした→カバンが{膨|ふく}らんでいた→{弦楽器|げんがっき}の{音|おと}→{指先|ゆびさき}のタコ。**すべて{一致|いっち}する**。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: narration
        text: "{仮説|かせつ}と{証拠|しょうこ}が{全部|ぜんぶ}{一致|いっち}した。{松脂|まつやに}→{弦楽器|げんがっき}→ヴァイオリン→カオリ。"
      - type: choice
        id: q1
        question: リコーダーを割ったのは誰？
        options:
          - text: カオリ（ヴァイオリンを持ち込んで練習。松脂で手が滑りリコーダーを落とした）
            value: kaori
            correct: true
            feedback: "{正解|せいかい}！ カオリはピアノだけでなくヴァイオリンも{密|ひそ}かに{練習|れんしゅう}していた。{弓|ゆみ}に{塗|ぬ}った{松脂|まつやに}が{手|て}について、リコーダーを{落|お}としてしまった。"
          - text: ソウタ（弦楽器の音を聞いた人）
            value: souta
            feedback: "ソウタは{帰|かえ}り{道|みち}で{音|おと}を{聞|き}いた{証人|しょうにん}。16:15に{退室|たいしつ}{済|ず}みだよ。"
          - text: ヒビキ（白い粉に気づいた人）
            value: hibiki
            feedback: "ヒビキはドア{取|と}っ{手|て}の{粉|こな}を{発見|はっけん}した{側|がわ}。トランペット{奏者|そうしゃ}に{松脂|まつやに}は{不要|ふよう}だね。"
          - text: コトネ（カオリのタコに気づいた人）
            value: kotone
            feedback: "コトネは{観察|かんさつ}{情報|じょうほう}を{持|も}っている{側|がわ}。16:00に{帰|かえ}っていて{機会|きかい}がないよ。"

  # ==================== 真実：カオリ ====================
  - id: truth-kaori
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: カオリの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: kaori
        expression: worried
        position: center
      - type: dialog
        character: kaori
        text: "……ごめんなさい。{実|じつ}はわたし、ピアノだけじゃなくて**ヴァイオリンも{練習|れんしゅう}してた**の。"
        expression: worried
      - type: dialog
        character: kaori
        text: "{来月|らいげつ}のコンクールにヴァイオリンで{個人|こじん}{参加|さんか}するつもりだった。でもみんなには{言|い}えなかった。『ピアノを{裏切|うらぎ}った』って{思|おも}われるのが{怖|こわ}くて。"
        expression: thinking
      - type: dialog
        character: kaori
        text: "{昨日|きのう}、みんなが{帰|かえ}った{後|あと}にカバンからヴァイオリンを{出|だ}して{練習|れんしゅう}した。{弓|ゆみ}に{松脂|まつやに}を{塗|ぬ}って{弾|ひ}いた。"
        expression: normal
      - type: dialog
        character: kaori
        text: "{練習後|れんしゅうご}、リコーダー{棚|だな}のそばを{通|とお}ったとき、{手|て}についていた{松脂|まつやに}の{粉|こな}で{手|て}が{滑|すべ}って、リコーダーを{落|お}としちゃった。{割|わ}れちゃって……パニックになって{棚|たな}に{戻|もど}して{知|し}らないふりをしたの。"
        expression: worried
      - type: sprite
        character: kaori
        action: hide

  # ==================== 真実：他のメンバー ====================
  - id: truth-others
    bg: classroom
    steps:
      - type: sprite
        character: hibiki
        expression: happy
        position: left
      - type: dialog
        character: hibiki
        text: "ヴァイオリンも{弾|ひ}けるの!? すごいじゃん！ {裏切|うらぎ}りなんかじゃないよ！"
        expression: happy
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: kotone
        expression: happy
        position: right
      - type: dialog
        character: kotone
        text: "{新|あたら}しい{楽器|がっき}に{挑戦|ちょうせん}するのは{素敵|すてき}なこと。{隠|かく}す{必要|ひつよう}なんてなかったのに。"
        expression: happy
      - type: sprite
        character: kotone
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "{楽器|がっき}の3{分類|ぶんるい}——{弦楽器|げんがっき}・{管楽器|かんがっき}・{打楽器|だがっき}。{分類|ぶんるい}によって{使|つか}う{道具|どうぐ}も{変|か}わるわ。{松脂|まつやに}は{弦楽器|げんがっき}だけ。この{知識|ちしき}が{推理|すいり}の{武器|ぶき}になったのよ。"
        expression: happy
      - type: dialog
        character: yamada
        text: "そして{今日|きょう}は「{仮説|かせつ}{検証|けんしょう}」を{学|まな}んだわね。「もし〜なら〜のはず」を{立|た}てて、{証拠|しょうこ}で1つずつ{確認|かくにん}する。すべて{一致|いっち}したら{仮説|かせつ}は{正|ただ}しい。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{新|あたら}しい{楽器|がっき}に{挑戦|ちょうせん}するのは{裏切|うらぎ}りじゃない。{素晴|すば}らしいこと。{隠|かく}す{必要|ひつよう}なんてなかった。
      - type: narration
        text: 「{音楽室|おんがくしつ}に{弦楽器|げんがっき}はない」——この{前提|ぜんてい}が{崩|くず}れたとき、{新|あたら}しい{推理|すいり}が{始|はじ}まった。{前提|ぜんてい}を{疑|うたが}うことも、{大切|たいせつ}な{力|ちから}なんだ。
      - type: effect
        name: fade-out
