scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: money-08/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}の「お{金|かね}の{授業|じゅぎょう}」。{先生|せんせい}が「{投資|とうし}シミュレーションゲーム」を{開催|かいさい}。4{人|にん}がそれぞれ{仮想|かそう}の1000ポイントを{元手|もとで}に、3つの{投資先|とうしさき}から{選|えら}んで3ラウンド{遊|あそ}ぶ。"
      - type: narration
        text: "3ラウンド{後|ご}の{結果|けっか}——ユウタ1200ポイント、カイト500ポイント、ナノハ1200ポイント。そして——"
      - type: sprite
        character: sakura
        expression: happy
        position: center
      - type: dialog
        character: sakura
        text: "わたしの{投資先|とうしさき}Aは{必|かなら}ず{儲|もう}かるの！ 1500ポイントで1{位|い}！ 3ラウンドとも{全部|ぜんぶ}プラスだったよ！"
      - type: sprite
        character: sakura
        action: hide
      - type: bgm
        action: stop
      - type: sprite
        character: nanoha
        expression: thinking
        position: right
      - type: dialog
        character: nanoha
        text: "『{必|かなら}ず{儲|もう}かる』{投資|とうし}なんてあるの？ ルールブックを見せてくれない？"
      - type: sprite
        character: nanoha
        action: hide
      - type: bgm
        file: money-08/tension
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ナノハさんの{疑問|ぎもん}は{大事|だいじ}です。{投資先|とうしさき}Aは{本当|ほんとう}に『{必|かなら}ず{儲|もう}かる』のでしょうか。ルールに{不正|ふせい}がないか{調|しら}べましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - character: yuta
            expression: thinking
          - character: sakura
            expression: happy
          - character: kaito
            expression: determined
          - character: nanoha
            expression: determined
      - type: narration
        text: "3つの{投資先|とうしさき}のルールを{比較|ひかく}して、「{必|かなら}ず{儲|もう}かる」の{嘘|うそ}を{暴|あば}く{調査|ちょうさ}が{始|はじ}まった。"
      - type: sprite
        character: yuta
        action: hide
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: kaito
        action: hide
      - type: sprite
        character: nanoha
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "お金の探偵団 Vol.8"
        subtitle: "必ず儲かるゲーム"

  # ===== 証拠カード1: ゲーム結果 =====
  - id: evidence-1
    bg: classroom
    bgm: money-08/investigation
    steps:
      - type: title_card
        text: "ステップ1：調査"
      - type: narration
        text: "3ラウンドのゲーム{結果|けっか}を{確認|かくにん}しよう。"
      - type: narration
        text: "ユウタ（B：バランス{型|がた}）——R1: +100、R2: −200、R3: +300。{最終|さいしゅう}1200ポイント。"
      - type: narration
        text: "サクラ（A：{安定|あんてい}{型|がた}）——R1: +200、R2: +100、R3: +200。{最終|さいしゅう}1500ポイント。★1{位|い}"
      - type: narration
        text: "カイト（C：ハイリスク{型|がた}）——R1: −500、R2: +500、R3: −500。{最終|さいしゅう}500ポイント。"
      - type: narration
        text: "ナノハ（B：バランス{型|がた}）——R1: +300、R2: −200、R3: +100。{最終|さいしゅう}1200ポイント。"
      - type: se
        file: common/discover
      - type: narration
        text: "サクラだけ3ラウンド{全|すべ}てプラス。マイナスが1{回|かい}もない。BとCにはマイナスがあるのに、Aだけ{損|そん}なし。これって{公平|こうへい}なゲーム？"

  # ===== 証拠カード2: ルール比較 =====
  - id: evidence-2
    bg: classroom
    bgm: money-08/investigation
    steps:
      - type: narration
        text: "3つの{投資先|とうしさき}のルール{表|ひょう}（{教室|きょうしつ}に{掲示|けいじ}されているもの）を{比較|ひかく}しよう。"
      - type: narration
        text: "A（{安定|あんてい}{型|がた}）——サイコロ1-2：±0 / 3-4：+100 / 5-6：+200"
      - type: narration
        text: "B（バランス{型|がた}）——サイコロ1-2：−200 / 3-4：+100 / 5-6：+300"
      - type: narration
        text: "C（ハイリスク{型|がた}）——サイコロ1-2：−500 / 3-4：±0 / 5-6：+500"
      - type: se
        file: common/discover
      - type: narration
        text: "BとCにはサイコロ1-2で「マイナス」がある。でもAの1-2は「±0」——{損|そん}する{可能性|かのうせい}がゼロ。"
      - type: narration
        text: "{先生|せんせい}が{公平|こうへい}なゲームを{設計|せっけい}したなら、{全|すべ}ての{投資先|とうしさき}にリスク（{損|そん}する{可能性|かのうせい}）があるはず。Aだけリスクゼロはおかしい。ルールが{書|か}き{換|か}えられた？"

  # ===== 証拠カード3: 期待値とルール表の観察 =====
  - id: evidence-3
    bg: classroom
    bgm: money-08/experiment
    steps:
      - type: sprite
        character: yuta
        expression: determined
        position: left
      - type: dialog
        character: yuta
        text: "{期待値|きたいち}を{計算|けいさん}した。Aは(0+100+200)÷3＝+100ポイント。BもCも{計算|けいさん}すると——Bは+67、Cは±0。"
      - type: sprite
        character: yuta
        expression: thinking
      - type: dialog
        character: yuta
        text: "Aだけ{圧倒的|あっとうてき}に{有利|ゆうり}。{損|そん}がゼロだから。でも{先生|せんせい}がそんな{不公平|ふこうへい}なルールを{作|つく}るはずがない。"
      - type: dialog
        character: yuta
        text: "ルール{表|ひょう}をよく見たら、{投資先|とうしさき}Aの「サイコロ1-2」の{欄|らん}にうっすら{消|け}しゴムの{跡|あと}がある。{元|もと}の{文字|もじ}が{消|け}されて{書|か}き{直|なお}されてる。"
      - type: sprite
        character: yuta
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "Aのルールが{書|か}き{換|か}えられた{物理的|ぶつりてき}{証拠|しょうこ}。{消|け}しゴムの{跡|あと}——{元|もと}は{何|なに}と{書|か}いてあった？"

  # ===== 証拠カード4: 火曜の行動と目撃 =====
  - id: evidence-4
    bg: classroom
    bgm: money-08/experiment
    steps:
      - type: narration
        text: "{火曜|かよう}の{昼休|ひるやす}み、4{人|にん}がルール{表|ひょう}を{確認|かくにん}した{後|あと}の{行動|こうどう}。"
      - type: narration
        text: "ユウタ——ルール{表|ひょう}を見て{図書室|としょしつ}へ。サクラ——ルール{表|ひょう}の{前|まえ}に{残|のこ}った。1{人|り}で{教室|きょうしつ}にいた。カイト——{校庭|こうてい}でサッカー。ナノハ——{教室|きょうしつ}を{出|で}た。"
      - type: sprite
        character: kaito
        expression: thinking
        position: right
      - type: dialog
        character: kaito
        text: "{火曜|かよう}の{昼休|ひるやす}み、みんなが{教室|きょうしつ}を{出|で}た{後|あと}、サクラだけ{残|のこ}ってた。{校庭|こうてい}に{行|い}く{前|まえ}にチラッと見たら、サクラがルール{表|ひょう}の{前|まえ}で{消|け}しゴムを{使|つか}ってたぜ。「{汚|よご}れを{消|け}してた」って{言|い}ってたけど……"
      - type: sprite
        character: kaito
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "サクラだけがルール{表|ひょう}と1{対|たい}1で{残|のこ}った。{消|け}しゴムを{使|つか}っていた。そしてAの「1-2」の{欄|らん}に{消|け}し{跡|あと}がある。"

  # ===== 証拠カード5: オリジナルルール =====
  - id: card-5
    bg: classroom
    bgm: money-08/tension
    steps:
      - type: effect
        name: fade-out
      - type: effect
        name: fade-in
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "パソコンに{保存|ほぞん}していたオリジナルのルール{表|ひょう}を{確認|かくにん}しました。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "{投資先|とうしさき}Aのサイコロ1-2——オリジナルでは「−100ポイント」。{掲示|けいじ}{版|ばん}では「±0ポイント」。{書|か}き{換|か}えられています。"
      - type: sprite
        character: sensei
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "オリジナルの{期待値|きたいち}——A: (−100+100+200)÷3＝+67。B: (−200+100+300)÷3＝+67。AとBの{期待値|きたいち}が{同|おな}じ！ {先生|せんせい}が{作|つく}ったルールは{公平|こうへい}だった。"
      - type: narration
        text: "サクラが「−100」を「±0」に{書|か}き{換|か}えた。これで{投資先|とうしさき}Aは{絶対|ぜったい}に{損|そん}をしない{設計|せっけい}になった。"
      - type: narration
        text: "「{損失|そんしつ}{回避|かいひ}バイアス」——{損|そん}をするのが{怖|こわ}すぎて、ルールを{書|か}き{換|か}えるという{不正|ふせい}をした。「{損|そん}が{怖|こわ}い」→「{損|そん}をゼロにする」→「ルール{改|かい}ざん」。"
      - type: narration
        text: "そして{皮肉|ひにく}なことに、サクラの3ラウンドではサイコロ1-2が{一度|いちど}も{出|で}なかった。{書|か}き{換|か}えなくても{結果|けっか}は{同|おな}じ1500ポイントで1{位|い}。ルール{改|かい}ざんは「{保険|ほけん}」にすぎなかった。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: money-08/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}が{出|で}そろいました。{考|かんが}えてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        text: "ルールを書き換えたのは誰？"
        options:
          - text: "サクラ（火曜に教室に残って消しゴムを使った）"
            value: sakura
            feedback: "サクラだけがルール{表|ひょう}と1{対|たい}1で{残|のこ}り、{消|け}しゴムを{使|つか}った。Aの「−100」を「±0」に{書|か}き{換|か}えた{証拠|しょうこ}がそろっている。"
          - text: "ユウタ（計算が得意で期待値を操作できる）"
            value: yuta
            feedback: "ユウタは{期待値|きたいち}の{不公平|ふこうへい}に{気|き}づいた{側|がわ}。{消|け}し{跡|あと}を{発見|はっけん}して{報告|ほうこく}した。ユウタは{犯人|はんにん}ではなく{探偵|たんてい}。"
          - text: "カイト（大損して怒っているのは自作自演？）"
            value: kaito
            feedback: "カイトは−500ポイントの{被害者|ひがいしゃ}。{自作自演|じさくじえん}なら{自分|じぶん}にCを{選|えら}ばせる{意味|いみ}がない。むしろサクラの{消|け}しゴム{使用|しよう}を{目撃|もくげき}した{証人|しょうにん}。"
          - text: "ナノハ（最初に疑った＝犯人を知っていた？）"
            value: nanoha
            feedback: "ナノハは「{必|かなら}ず{儲|もう}かるはずがない」という{論理|ろんり}で{疑|うたが}った。{先生|せんせい}にオリジナルを{確認|かくにん}して{証拠|しょうこ}を{出|だ}した{側|がわ}。"
      - type: choice
        id: q2
        text: "「必ず儲かる投資」は存在する？"
        options:
          - text: "存在する。安全な投資なら損しない"
            value: exists_safe
            feedback: "「{安全|あんぜん}な{投資|とうし}」はリターンも{小|ちい}さい。{銀行|ぎんこう}{預金|よきん}は{元本|がんぽん}{保証|ほしょう}だけど{利子|りし}はほぼゼロ。「{必|かなら}ず{大|おお}きく{儲|もう}かる」は{存在|そんざい}しない。"
          - text: "存在しない。リスクゼロでリターンがあるのはおかしい"
            value: not_exists
            feedback: "その{通|とお}り。リスクとリターンは{表裏一体|ひょうりいったい}。「{必|かなら}ず{儲|もう}かる」と{言|い}われたら、ルールが{歪|ゆが}められているか{嘘|うそ}の{可能性|かのうせい}。"
          - text: "分からない。投資のことはよく知らない"
            value: unknown
            feedback: "{今日|きょう}{覚|おぼ}えよう——「{必|かなら}ず{儲|もう}かる」は{赤信号|あかしんごう}。{大人|おとな}の{世界|せかい}でも{詐欺|さぎ}の{常套句|じょうとうく}。{疑|うたが}う{力|ちから}は{一生|いっしょう}の{武器|ぶき}。"
          - text: "サクラのように自分で有利なルールを作れば可能"
            value: unfair_rules
            feedback: "ルールを{変|か}えれば「{必|かなら}ず{儲|もう}かる」は{作|つく}れる。でもそれは{不正|ふせい}であり{公平|こうへい}ではない。{本物|ほんもの}の{投資|とうし}では{不可能|ふかのう}。"
      - type: choice
        id: q3
        text: "サクラの「損が怖い」気持ちについてどう思う？"
        options:
          - text: "気持ちは分かるけど不正はダメ"
            value: no_cheating
            feedback: "「{損|そん}が{怖|こわ}い」は{誰|だれ}にでもある{気持|きも}ち。でも{怖|こわ}いからルールを{変|か}えるのは{不正|ふせい}。{怖|こわ}さに{負|ま}けない{力|ちから}が{大事|だいじ}。"
          - text: "損を受け入れるのも投資の一部"
            value: accept_loss
            feedback: "{投資|とうし}は「{儲|もう}かるかもしれないし{損|そん}するかもしれない」。{損|そん}を{受|う}け{入|い}れられないなら{投資|とうし}しない{方|ほう}がいい。{無理|むり}をしないのも{賢|かしこ}い{選択|せんたく}。"
          - text: "書き換えなくても1位だった。保険のための不正は無駄だった"
            value: wasted
            feedback: "{皮肉|ひにく}なことに、サクラのサイコロでは1-2が{一度|いちど}も{出|で}なかった。{不正|ふせい}は「{保険|ほけん}」にすぎず、{結果|けっか}を{変|か}えなかった。{不正|ふせい}のリスクだけを{背負|せお}った。"
          - text: "損失回避バイアスは大人にもある"
            value: adults_too
            feedback: "{損失|そんしつ}{回避|かいひ}バイアスは{大人|おとな}でも{陥|おちい}る。「{損|そん}をしたくない」{気持|きも}ちが{強|つよ}すぎると、{冷静|れいせい}な{判断|はんだん}ができなくなる。{自分|じぶん}のバイアスに{気|き}づくことが{大事|だいじ}。"

  # ===== 真実: ユウタ =====
  - id: truth-yuta
    bg: classroom
    bgm: money-08/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: sprite
        character: yuta
        expression: normal
        position: left
      - type: dialog
        character: yuta
        text: "{期待値|きたいち}を{計算|けいさん}して、Aだけ{不公平|ふこうへい}に{有利|ゆうり}だと{分|わ}かった。{損|そん}がゼロなのは{数学的|すうがくてき}にありえない。ルール{表|ひょう}の{消|け}し{跡|あと}も{見|み}つけた。"
      - type: sprite
        character: yuta
        expression: determined
      - type: dialog
        character: yuta
        text: "オリジナルではAもBも{期待値|きたいち}+67。{公平|こうへい}なゲームだった。サクラの{書|か}き{換|か}えで{公平|こうへい}さが{壊|こわ}された。「{必|かなら}ず{儲|もう}かる」は{数学|すうがく}が{証明|しょうめい}する{嘘|うそ}。"
      - type: sprite
        character: yuta
        action: hide

  # ===== 真実: カイト =====
  - id: truth-kaito
    bg: classroom
    steps:
      - type: sprite
        character: kaito
        expression: worried
        position: right
      - type: dialog
        character: kaito
        text: "{火曜|かよう}の{昼休|ひるやす}み、サクラがルール{表|ひょう}の{前|まえ}で{消|け}しゴムを{使|つか}ってるのを見たんだ。あのとき「まさかルールを{変|か}えた？」って{思|おも}ったけど、{友達|ともだち}だから{深|ふか}く{疑|うたが}わなかった。"
      - type: sprite
        character: kaito
        expression: determined
      - type: dialog
        character: kaito
        text: "−500ポイントで{最下位|さいかい}だけど、{公平|こうへい}なルールでの{結果|けっか}なら{受|う}け{入|い}れるぜ。{不正|ふせい}で{負|ま}けるのは{受|う}け{入|い}れられないけど。"
      - type: sprite
        character: kaito
        action: hide

  # ===== 真実: ナノハ =====
  - id: truth-nanoha
    bg: classroom
    steps:
      - type: sprite
        character: nanoha
        expression: normal
        position: left
      - type: dialog
        character: nanoha
        text: "『{必|かなら}ず{儲|もう}かる{投資|とうし}なんてない』——これは{投資|とうし}の{大原則|だいげんそく}。Aだけ{損|そん}がないのは、ルールが{歪|ゆが}められている{証拠|しょうこ}だった。"
      - type: sprite
        character: nanoha
        expression: determined
      - type: dialog
        character: nanoha
