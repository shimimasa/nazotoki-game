  # ==================== 第2推理・投票（価値判断） ====================
  - id: deduction-2
    bg: school
    bgm: thinking-time
    steps:
      - type: title_card
        text: 第2推理タイム
        subtitle: このプロジェクトが本当の意味でうまくいかなかった原因は？
      - type: sprite
        character: kanae
        expression: thinking
        position: left
      - type: dialog
        character: kanae
        text: "このプロジェクトを{使|つか}う{子|こ}どもたちの{声|こえ}、{本当|ほんとう}に{十分|じゅうぶん}に{聞|き}いたのか——もし{足|た}りなかったなら、{今|いま}からでも{聞|き}きに{行|い}くべきだと{思|おも}う。{本当|ほんとう}のユーザーの{声|こえ}を{聞|き}くことが、このプロジェクトを{本物|ほんもの}にする。"
