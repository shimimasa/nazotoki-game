      - type: sprite
        character: kanae
        action: hide
      - type: narration
        text: "これは{正解|せいかい}と{不正解|ふせいかい}だけの{問|とい}いではない——{答|こた}えの{深|ふか}さを{自分|じぶん}で{考|かんが}えてほしい。"
      - type: choice
        id: q2
        question: このプロジェクトが「本当の意味で」うまくいかなかった原因は何？
        options:
          - text: データを書き換えたハカルが悪い
            value: option-a
            correct: false
            feedback: "ハカルの{行動|こうどう}は{確|たし}かに{問題|もんだい}だった。でも、それだけが{原因|げんいん}？　データを{書|か}き{換|か}えなければ、このプロジェクトは{成功|せいこう}していた？　インタビューが8{件|けん}のままでも「{受賞|じゅしょう}」という{目標|もくひょう}は{残|のこ}っていたはず——{問|とい}いをもう少し{深|ふか}く{掘|ほ}り{下|さ}げてみよう。"
          - text: 共感フェーズでインタビューが足りなかった
            value: option-b
            correct: false
            feedback: "{共感|きょうかん}フェーズの{問題|もんだい}は{確|たし}かにある。でも、なぜインタビューが{足|た}りなかったのか——「{賞|しょう}の{締|し}め{切|き}りが{先|さき}」になっていたのはなぜ？　{最初|さいしょ}から「{誰|だれ}のためのプロジェクトか」が{明確|めいかく}だったら、{締|し}め{切|き}りより{声|こえ}を{優先|ゆうせん}できたかもしれない。"
          - text: デザイン思考の5段階を省略した箇所があった
            value: option-c
            correct: false
            feedback: "5{段階|だんかい}の{欠陥|けっかん}は{証拠|しょうこ}に{示|しめ}されている。でも、なぜ{省略|しょうりゃく}が{起|お}きたのか——「{誰|だれ}のためのデザインか」という{問|とい}いが{最初|さいしょ}から{曖昧|あいまい}なまま、{外部|がいぶ}{評価|ひょうか}（{受賞|じゅしょう}）のために{進|すす}んでしまったから、{省略|しょうりゃく}が{起|お}きたのではないか？"
          - text: 全部が原因。「誰のためのデザインか」が曖昧なまま、外部評価（受賞）のために進んでしまった
            value: option-d
            correct: true
            feedback: "これが{本質的|ほんしつてき}な{答|こた}え。デザイン思考の{全|ぜん}5{段階|だんかい}に「{誰|だれ}のため？」という{問|とい}いを{貫|つらぬ}くことが{必要|ひつよう}だった。{共感|きょうかん}フェーズでユーザーの{声|こえ}を{聞|き}くのも、{問題|もんだい}を{正確|せいかく}に{定義|ていぎ}するのも、プロトタイプの{失敗|しっぱい}から{学|まな}ぶのも、テストを{正直|しょうじき}に{評価|ひょうか}するのも——{全部|ぜんぶ}、ユーザーのためにある。**Vol.1から{今日|きょう}まで、ずっと{同|おな}じことを{問|と}い{続|つづ}けていた。それが、デザイン思考の{心臓部|しんぞうぶ}。**"

