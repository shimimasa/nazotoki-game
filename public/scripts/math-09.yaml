      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{算数|さんすう}の{単元|たんげん}テスト{返却|へんきゃく}{日|び}。先生が{採点|さいてん}{済|ず}みの{答案|とうあん}を{並|なら}べていると——"

      - type: bgm
        action: stop

      - type: effect
        name: shake
        duration: 400

      - type: sprite
        character: sensei
        expression: surprised
        position: center

      - type: bgm
        track: tension-quiet

      - type: dialog
        character: sensei
        text: "1{枚|まい}だけ{点数|てんすう}が{書|か}き{換|か}えられた{形跡|けいせき}がある！ {元|もと}の{点数|てんすう}65{点|てん}が75{点|てん}に{直|なお}されている。"
        expression: surprised

      - type: dialog
        character: sensei
        text: "{休|やす}み{時間|じかん}に{教室|きょうしつ}にいた4人の{中|なか}に{犯人|はんにん}がいる。{平均点|へいきんてん}と{合計|ごうけい}を{計算|けいさん}すれば{矛盾|むじゅん}が{分|わ}かるはず。"
        expression: determined

      - type: sprite
        character: sensei
        action: hide

      - type: sprite_group
        characters:
          - id: makoto
            expression: worried
          - id: rina
            expression: thinking
          - id: shou
            expression: normal
          - id: yuki
            expression: normal

      - type: narration
        text: "{答案|とうあん}の{点数|てんすう}、{平均点|へいきんてん}、{合計|ごうけい}——{数字|すうじ}の{矛盾|むじゅん}から{犯人|はんにん}を{見|み}つけ{出|だ}せ！"

      - type: sprite
        character: makoto
        action: hide
      - type: sprite
        character: rina
        action: hide
      - type: sprite
        character: shou
        action: hide
      - type: sprite
        character: yuki
        action: hide

      - type: effect
        name: fade-out

      - type: title_card
        text: "数字の迷宮 Vol.9"
        subtitle: "消えた10点と割合のトリック"

  # ========================================
  # 証拠1: 先生の採点記録
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1：調査"

      - type: narration
        text: "先生の{採点|さいてん}{記録|きろく}（{書|か}き{換|か}えられる{前|まえ}）を{確認|かくにん}しよう。"

      - type: narration
        text: "クラス{人数|にんずう}：30人\n**クラス{合計|ごうけい}{点|てん}：1950{点|てん}**\n**クラス{平均点|へいきんてん}：65.0{点|てん}**\n{最高点|さいこうてん}：95{点|てん} / {最低点|さいていてん}：35{点|てん}"

      - type: narration
        text: "{平均|へいきん}65{点|てん} × 30{人|にん} = {合計|ごうけい}1950{点|てん}。もし1人の{点数|てんすう}が10{点|てん}{増|ふ}えたら、{合計|ごうけい}は**1960{点|てん}**になる。"

  # ========================================
  # 証拠2: 4人の自己申告点数
  # ========================================
  - id: evidence-2
    steps:
      - type: narration
        text: "4人がそれぞれ{言|い}っている{自分|じぶん}の{点数|てんすう}。"

      - type: sprite
        character: makoto
        expression: normal
        position: left

      - type: dialog
        character: makoto
        text: "{私|わたし}の{点数|てんすう}は**75{点|てん}**だよ。"
        expression: normal

      - type: sprite
        character: makoto
        action: hide

      - type: sprite
        character: rina
        expression: happy
        position: right

      - type: dialog
        character: rina
        text: "{私|わたし}は**85{点|てん}**。"
        expression: happy

      - type: sprite
        character: rina
        action: hide

      - type: sprite
        character: shou
        expression: normal
        position: left

      - type: dialog
        character: shou
        text: "{僕|ぼく}は**70{点|てん}**。"
        expression: normal

      - type: sprite
        character: shou
        action: hide

      - type: sprite
        character: yuki
        expression: normal
        position: right

      - type: dialog
        character: yuki
        text: "{僕|ぼく}は**72{点|てん}**。"
        expression: normal

      - type: sprite
        character: yuki
        action: hide

      - type: narration
        text: "4人の{合計|ごうけい}：75 + 85 + 70 + 72 = **302{点|てん}**。この{数字|すうじ}はあとで{大事|だいじ}になるよ。"

  # ========================================
  # 証拠3: お母さんのメッセージ + 教室にいた人
  # ========================================
  - id: evidence-3
    steps:
      - type: narration
        text: "マコトのお{母|かあ}さんから{連絡帳|れんらくちょう}にメッセージが{書|か}いてあった。"

      - type: narration
        text: "『マコトには「{次|つぎ}のテストは**70{点|てん}{以上|いじょう}を{目標|もくひょう}に**がんばろう」と{話|はな}しています。ご{指導|しどう}よろしくお{願|ねが}いします。』"

      - type: narration
        text: "70{点|てん}{以上|いじょう}が{目標|もくひょう}。もしマコトの{本当|ほんとう}の{点数|てんすう}が70{点|てん}{未満|みまん}だったら……？"

      - type: narration
        text: "{休|やす}み{時間|じかん}に{教室|きょうしつ}にいた人：\n2{時間目|じかんめ}の{休|やす}み：**マコト、ショウ**\n3{時間目|じかんめ}の{休|やす}み：**マコト、リナ、ユキ**\n→ **{両方|りょうほう}の{休|やす}み{時間|じかん}に{教室|きょうしつ}にいたのはマコトだけ**"

  # ========================================
  # 証拠4: 点数分布
  # ========================================
  - id: evidence-4
    steps:
      - type: narration
        text: "クラス30人の{点数|てんすう}{分布|ぶんぷ}を{確認|かくにん}しよう。"

      - type: narration
        text: "90〜100{点|てん}：3人\n80〜89{点|てん}：5人\n**70〜79{点|てん}：6人**\n60〜69{点|てん}：8人\n50〜59{点|てん}：5人\n35〜49{点|てん}：3人"

      - type: narration
        text: "{上位|じょうい}30%に{入|はい}るには：30人 × 0.3 = **{上位|じょうい}9人**。90{点|てん}{台|だい}3人 + 80{点|てん}{台|だい}5人 = 8人。あと1人で9{人目|にんめ} → **70{点|てん}{台|だい}**に{入|はい}ればいい。75{点|てん}なら{上位|じょうい}9人の{中|なか}に{入|はい}れる。"

  # ========================================
  # 証拠5: 先生の記録（4人分の詳細）（反転フェーズ）
  # ========================================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "ステップ2：決定的証拠"
      - type: effect
        name: fade-in

      - type: narration
        text: "先生が{採点|さいてん}のときに{別|べつ}の{紙|かみ}にも{記録|きろく}していた4人の{点数|てんすう}。"

      - type: narration
        text: "マコト：先生の{記録|きろく}**65{点|てん}** → {自己|じこ}{申告|しんこく}75{点|てん} → **+10{点|てん}**\nリナ：先生の{記録|きろく}85{点|てん} → {自己|じこ}{申告|しんこく}85{点|てん} → 0\nショウ：先生の{記録|きろく}70{点|てん} → {自己|じこ}{申告|しんこく}70{点|てん} → 0\nユキ：先生の{記録|きろく}72{点|てん} → {自己|じこ}{申告|しんこく}72{点|てん} → 0"

      - type: effect
        name: flash

      - type: se
        sound: discover

      - type: narration
        text: "**マコトだけ10{点|てん}のズレ！**\n先生の{記録|きろく}の4人{合計|ごうけい}：65+85+70+72 = **292{点|てん}**\n{自己|じこ}{申告|しんこく}の4人{合計|ごうけい}：75+85+70+72 = **302{点|てん}**\n{差|さ}：302 − 292 = **10{点|てん}** = マコトの{書|か}き{換|か}え{分|ぶん}"
        speed: slow

      - type: narration
        text: "マコトの{本当|ほんとう}の{点数|てんすう}は**65{点|てん}**。お{母|かあ}さんとの{約束|やくそく}は70{点|てん}{以上|いじょう}。65{点|てん}では{約束|やくそく}を{破|やぶ}ることになる。だから75{点|てん}に{書|か}き{換|か}えた。"

  # ========================================
  # 質問フェーズ
  # ========================================
  - id: questions
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "ステップ3：推理しよう"
      - type: effect
        name: fade-in

      - type: choice
        id: q1
        question: "{答案|とうあん}を{書|か}き{換|か}えた{犯人|はんにん}は{誰|だれ}？"
        options:
          - text: "リナ"
            value: rina
            feedback: "リナの{点数|てんすう}は先生の{記録|きろく}と{一致|いっち}（85{点|てん}）。{書|か}き{換|か}えていない。"
          - text: "ショウ"
            value: shou
            feedback: "ショウの{点数|てんすう}も{一致|いっち}（70{点|てん}）。{書|か}き{換|か}えていない。"
          - text: "マコト"
            value: makoto
            correct: true
            feedback: "{正解|せいかい}！ マコトだけ先生の{記録|きろく}（65{点|てん}）と{自己|じこ}{申告|しんこく}（75{点|てん}）に**10{点|てん}のズレ**がある。{合計|ごうけい}の{逆算|ぎゃくさん}で{証明|しょうめい}できた！"
          - text: "ユキ"
            value: yuki
            feedback: "ユキの{点数|てんすう}も{一致|いっち}（72{点|てん}）。{書|か}き{換|か}えていない。"

      - type: choice
        id: q2
        question: "なぜ75{点|てん}に{書|か}き{換|か}えた？ （70{点|てん}でも80{点|てん}でもなく）"
        options:
          - text: "お{母|かあ}さんとの{約束|やくそく}（70{点|てん}{以上|いじょう}）を{守|まも}るため"
            value: promise
            feedback: "{約束|やくそく}は{大事|だいじ}な{動機|どうき}。でもそれなら70{点|てん}でもよかったはず。なぜ**75{点|てん}**？"
          - text: "{上位|じょうい}30%に{入|はい}るため（75{点|てん}なら{上位|じょうい}9人に{入|はい}れる）"
            value: top30
            correct: true
            feedback: "{素晴|すば}らしい{推理|すいり}！ 30人×0.3＝{上位|じょうい}9人。90{点|てん}{台|だい}3人+80{点|てん}{台|だい}5人＝8人。75{点|てん}なら9{人目|にんめ}に{入|はい}れる。{割合|わりあい}の{計算|けいさん}が{動機|どうき}を{暴|あば}いた！"
          - text: "6を7に{書|か}き{換|か}えやすかったから"
            value: easy-change
            feedback: "6→7は{確|たし}かに{書|か}き{換|か}えやすい。でも75{点|てん}を{選|えら}んだ{理由|りゆう}には{割合|わりあい}の{計算|けいさん}も{関|かか}わっているかも。"

  # ========================================
  # 真相
  # ========================================
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真相"
      - type: effect
        name: fade-in

      - type: sprite
        character: makoto
        expression: worried
        position: center

      - type: dialog
        character: makoto
        text: "……{私|わたし}がやった。65{点|てん}を75{点|てん}に{書|か}き{換|か}えた。"
        expression: worried

      - type: dialog
        character: makoto
        text: "お{母|かあ}さんに『70{点|てん}{以上|いじょう}を{取|と}る』って{約束|やくそく}していた。65{点|てん}では{約束|やくそく}を{破|やぶ}ることになって、{叱|しか}られるのが{怖|こわ}くて。"
        expression: thinking

      - type: dialog
        character: makoto
        text: "でも——{合計|ごうけい}で{計算|けいさん}すれば{分|わ}かっちゃうんだね。{数字|すうじ}は{嘘|うそ}をつけない……。ごめんなさい。"
        expression: worried

      - type: sprite
        character: makoto
        action: hide

  # ========================================
  # エピローグ
  # ========================================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center

      - type: dialog
        character: sensei
        text: "マコトは{叱|しか}られるのが{怖|こわ}かった。{気持|きもち}は{分|わ}かる。でも{嘘|うそ}をつくと、もっと{大|おお}きな{問題|もんだい}になる。65{点|てん}でもがんばった{証|あかし}だよ。"
        expression: normal

      - type: dialog
        character: sensei
        text: "ところで{探偵|たんてい}たち——{今回|こんかい}のカギは**{平均|へいきん}と{合計|ごうけい}の{関係|かんけい}**。{平均|へいきん}×{人数|にんずう}={合計|ごうけい}。{合計|ごうけい}がズレれば{誰|だれ}かの{点数|てんすう}が{変|か}わっている{証拠|しょうこ}。"
        expression: thinking

      - type: dialog
        character: sensei
        text: "そして75{点|てん}を{選|えら}んだ{理由|りゆう}——{上位|じょうい}30%に{入|はい}るための{割合|わりあい}の{計算|けいさん}。{犯人|はんにん}の{動機|どうき}まで{算数|さんすう}で{見|み}つけた！"
        expression: determined

      - type: dialog
        character: sensei
        text: "——{次|つぎ}のテストは{正直|しょうじき}にがんばろう。{数字|すうじ}は{嘘|うそ}をつけないからね。"
        expression: happy

      - type: sprite
        character: sensei
        action: hide

      - type: narration
        text: "{平均|へいきん} × {人数|にんずう} = {合計|ごうけい}。{合計|ごうけい}のズレが{改|かい}ざんの{証拠|しょうこ}。{割合|わりあい}の{計算|けいさん}が{動機|どうき}を{暴|あば}く。"

      - type: narration
        text: "——それが、{消|き}えた10{点|てん}が{教|おし}えてくれたこと。"

      - type: effect
        name: fade-out
