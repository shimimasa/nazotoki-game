scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "図書委員会の選考で、ある子（カガミくん）が毎年「なんとなく」落選し続けている。"
      - type: narration
        text: "誰もカガミくんをいじめていないし、明確に断ったわけでもない。"
      - type: narration
        text: "でも「自然に」委員会に入れない状況が続いている。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: kotoha
        expression: worried
        position: center
      - type: dialog
        character: kotoha
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: kotoha
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: nagi, expression: determined }
          - { id: hibiki, expression: thinking }
          - { id: miwa, expression: thinking }
          - { id: kotoha, expression: worried }
      - type: narration
        text: "「平和探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "平和探偵団"
        subtitle: "Vol.7 見えない壁"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: nagi
        expression: thinking
        position: left
      - type: dialog
        character: nagi
        text: "Card 5後、「構造を変えなければ誰かが入ってきても同じことが起きる」と気づく場面"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        expression: thinking
        position: right
      - type: dialog
        character: hibiki
        text: "直接的暴力を探す」から「構造を探す」に思考が転換する場面"
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        expression: thinking
        position: left
      - type: dialog
        character: miwa
        text: "いつ・誰が・何をしたか」のデータがなく、「ない情報」が証拠だと気づかせる場面"
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        expression: worried
        position: right
      - type: dialog
        character: kotoha
        text: "誰かのせいにできない痛みの方が消えにくい」と構造的暴力の感情的側面を語る場面"
      - type: sprite
        character: kotoha
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「事件のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: nagi, expression: normal }
          - { id: hibiki, expression: normal }
          - { id: miwa, expression: normal }
          - { id: kotoha, expression: worried }
      - type: choice
        id: q1
        text: "事件のきっかけになった行動をしたのは誰？"
        options:
          - label: "ナギ"
            value: nagi
            correct: false
            feedback: "ナギは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "ヒビキ"
            value: hibiki
            correct: false
            feedback: "ヒビキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "ミワ"
            value: miwa
            correct: false
            feedback: "ミワは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "コトハ"
            value: kotoha
            correct: true
            feedback: "コトハの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "動機は、#16 責任を背負いすぎた — ナギは「自分がカガミくんを助けなければ」と思い、委員会メンバーに「カガミくんを入れよう」と個別に働きかけた。しかし「なぜカガミくんが落ちるか」の根本（慣習・暗黙のルール）を変えず、「今回だけ例外的に通す」という方法を試みた。それがかえって「例外的に入れてもらった」という印象を作り、カガミくんを「正規ではない」扱いにしてしまった。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        expression: worried
        position: center
      - type: dialog
        character: kotoha
        text: "誰かのせいにできない痛みの方が消えにくい」と構造的暴力の感情的側面を語る場面"
      - type: sprite
        character: kotoha
        expression: determined
      - type: dialog
        character: kotoha
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: kotoha
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 直接的暴力と構造的暴力の違いを理解し、「誰も悪くないのに排除が起きる」仕組みを説明できる\n・**サブ**: 情報欠落スキル——「情報がないこと」自体が手がかりになる（誰も「排除した」という記録がないこと自体が構造的問題の証拠）"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: nagi, expression: happy }
          - { id: hibiki, expression: happy }
          - { id: miwa, expression: happy }
          - { id: kotoha, expression: happy }
      - type: narration
        text: "平和探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
