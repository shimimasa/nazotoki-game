      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "学校の文化展示に飾られた着物の帯に、「季節に合わない柄の刺繍」が足されていた痕跡がある。"
      - type: narration
        text: "本来の着物は秋の柄（菊・紅葉）のはずなのに、夏の柄（朝顔）が一か所だけ追加されていた。"
      - type: narration
        text: "誰が、なぜ「季節外れの柄」を足したのか——着物の季節と格式の知識がないと「何が問題か」すら分からない。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: ibuki
        expression: worried
        position: center
      - type: dialog
        character: ibuki
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: ibuki
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: determined }
          - { id: kanade, expression: thinking }
          - { id: ibuki, expression: thinking }
          - { id: kotono, expression: worried }
      - type: narration
        text: "「伝統文化探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "伝統文化探偵団"
        subtitle: "Vol.5 着物のひみつ"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: tsumugi
        expression: thinking
        position: left
      - type: dialog
        character: tsumugi
        text: "着物の季節柄の対応表を整理し、「朝顔は夏の柄。秋の着物には本来入らない」を証明する場面"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        expression: thinking
        position: right
      - type: dialog
        character: kanade
        text: "仮説を検証しよう。もし最初からあった朝顔なら、糸の色が違うはずだ」と仮説を立てる場面"
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        expression: worried
        position: left
      - type: dialog
        character: ibuki
        text: "追加HO発見後、「糸くずは私のです。帯が少し破れてしまって、直そうとして…」と打ち明ける瞬間"
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        expression: thinking
        position: right
      - type: dialog
        character: kotono
        text: "真相後、「直そうとした気持ちは分かる。でも着物の柄には職人さんの思いが込められているんだね」と学びを言語化する場面"
      - type: sprite
        character: kotono
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「着物の帯に朝顔の刺繍を足したのは誰？」"
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: normal }
          - { id: kanade, expression: normal }
          - { id: ibuki, expression: normal }
          - { id: kotono, expression: worried }
      - type: choice
        id: q1
        text: "着物の帯に朝顔の刺繍を足したのは誰？"
        options:
          - label: "ツムギ"
            value: tsumugi
            correct: false
            feedback: "ツムギは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "カナデ"
            value: kanade
            correct: false
            feedback: "カナデは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "イブキ"
            value: ibuki
            correct: true
            feedback: "イブキの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - label: "コトノ"
            value: kotono
            correct: false
            feedback: "コトノは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、イブキ（息吹）"
      - type: dialog
        character: sensei
        text: "動機は、#4 自分を守りたかった — イブキは着物の展示準備中、誤って帯の一部を破いてしまった。慌てて修復しようとしたが、手元にあった刺繍糸の色と柄が秋の着物に「似ているようで違う」朝顔の刺繍だった。イブキは「目立たないように」という気持ちから、似た色の糸で急いで補修した。しかし着物の柄には季節の規則があり、朝顔（夏）を菊・紅葉（秋）の着物に入れることは「季節のまちがい」になると知らなかった。「隠したかった」気持ちが「まちがいを増やした」形になった。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ibuki
        expression: worried
        position: center
      - type: dialog
        character: ibuki
        text: "追加HO発見後、「糸くずは私のです。帯が少し破れてしまって、直そうとして…」と打ち明ける瞬間"
      - type: sprite
        character: ibuki
        expression: determined
      - type: dialog
        character: ibuki
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: ibuki
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 着物の柄には季節の意味があること（梅=冬/早春、藤=春、朝顔=夏、菊=秋/冬など）と、季節の柄を守ることが着物文化の礼儀であることを理解する\n・**サブ**: 仮説検証スキル——「朝顔の刺繍は最初からあったのか、後から足されたのか」を仮説立てて検証する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: happy }
          - { id: kanade, expression: happy }
          - { id: ibuki, expression: happy }
          - { id: kotono, expression: happy }
      - type: narration
        text: "伝統文化探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
