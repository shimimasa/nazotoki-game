meta:
  id: data-07
  title: さそう質問
  series: データ探偵団
  volume: 7
  estimatedMinutes: 18

characters:
  hyou:
    name: ヒョウ
    color: "#4169E1"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  suu:
    name: スウ
    color: "#FF4444"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  graph:
    name: グラフ
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  matome:
    name: マトメ
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  yamada:
    name: 山田先生
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{給食委員会|きゅうしょくいいんかい}が、「好きな{給食|きゅうしょく}ランキング」を作るためにアンケートをしました。"
      - type: narration
        text: "その結果は、なんと「カレーが好き 97%！」でした。"
      - type: narration
        text: "みんなは「そんなに人気なんだ！」とびっくりしました。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: hyou
        expression: worried
        position: center
      - type: dialog
        character: hyou
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: hyou
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "{{落|お}}ち{{着|つ}}いて。みんなで{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみよう。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: determined }
          - { id: suu, expression: thinking }
          - { id: graph, expression: thinking }
          - { id: matome, expression: worried }
      - type: narration
        text: "「データ探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: データ探偵団
        subtitle: Vol.7 さそう質問

  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: ステップ1
        subtitle: 調査
      - type: narration
        text: "アンケート結果"
      - type: se
        sound: discover

  - id: evidence-2
    steps:
      - type: narration
        text: "質問の作り方カード"
      - type: se
        sound: discover

  - id: evidence-3
    steps:
      - type: narration
        text: "元の質問文と再調査結果"
      - type: se
        sound: discover

  - id: evidence-4
    steps:
      - type: narration
        text: "構造分析と証言"
      - type: se
        sound: discover

  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: ステップ2
        subtitle: 反転
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "先生のメモ"
      - type: se
        sound: discover
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: yamada
        action: hide

  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: suu
        expression: thinking
        position: left
      - type: dialog
        character: suu
        text: "スウの考えを述べる"
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        expression: thinking
        position: right
      - type: dialog
        character: graph
        text: "グラフの考えを述べる"
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        expression: thinking
        position: left
      - type: dialog
        character: matome
        text: "マトメの考えを述べる"
      - type: sprite
        character: matome
        action: hide
      - type: sprite
        character: hyou
        expression: worried
        position: right
      - type: dialog
        character: hyou
        text: "ヒョウの考えを述べる"
      - type: sprite
        character: hyou
        action: hide

  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票
      - type: narration
        text: "「アンケート結果を歪ませた質問を作ったのは誰？」"
      - type: sprite_group
        characters:
          - { id: hyou, expression: normal }
          - { id: suu, expression: normal }
          - { id: graph, expression: normal }
          - { id: matome, expression: worried }
      - type: choice
        id: q1
        text: "アンケート結果を歪ませた質問を作ったのは誰？"
        options:
          - text: ヒョウ
            value: hyou
            correct: true
            feedback: "ヒョウは悪意なく\"分かりやすい質問\"のつもりだった。でも\"好きですよね？\"と聞くと\"好きじゃない\"と言いにくい。質問は中立でないと信頼できる結果にならない"
          - text: スウ
            value: suu
            correct: false
            feedback: "スウは{調査|ちょうさ}をした{側|がわ}だよ。"
          - text: グラフ
            value: graph
            correct: false
            feedback: "グラフは{調査|ちょうさ}をした{側|がわ}だよ。"
          - text: マトメ
            value: matome
            correct: false
            feedback: "マトメは{調査|ちょうさ}をした{側|がわ}だよ。"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide

  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: 真相
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "真相が明かされた。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite
        character: hyou
        expression: worried
        position: center
      - type: dialog
        character: hyou
        text: "ごめんなさい。"
      - type: sprite
        character: hyou
        expression: determined
      - type: dialog
        character: hyou
        text: "ごめんなさい。"
      - type: sprite
        character: hyou
        action: hide

  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: yamada
        expression: thinking
      - type: dialog
        character: yamada
        text: "・証拠カード1より、アンケート結果は「カレーが好き 97%」だったとわかる。\n・証拠カード3より、元の質問文は「みんな大好きなカレー、あなたも好きですよね？」であり、聞き直しではカレーは30人中8人で3位くらいだったとわかる。\n・つまり、同じ人に聞いても、聞き方が変わると結果が大きく変わるとわかる。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: happy }
          - { id: suu, expression: happy }
          - { id: graph, expression: happy }
          - { id: matome, expression: happy }
      - type: narration
        text: "データ探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 1000
