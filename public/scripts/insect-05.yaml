scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "昆虫ミステリー Vol.5"
        subtitle: "みんなで読むシート"
      - type: sprite_group
        characters:
          - id: mushi
            expression: normal
          - id: hane
            expression: normal
          - id: mitsu
            expression: normal
          - id: sanagi
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: mushi
        expression: normal
        position: left
      - type: dialog
        character: mushi
        text: "カブトムシのかたい前ばねは、やわらかい後ろばねを守る役目がある"
      - type: dialog
        character: mushi
        text: "カブトムシのかたい前ばねは、やわらかい後ろばねを守る役目がある"
        expression: thinking
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        expression: normal
        position: right
      - type: dialog
        character: hane
        text: "あなたの図には 「守る羽」と「飛ぶ羽」を分けて書いていた"
      - type: dialog
        character: hane
        text: "あなたの図には 「守る羽」と「飛ぶ羽」を分けて書いていた"
        expression: thinking
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        expression: normal
        position: left
      - type: dialog
        character: mitsu
        text: "もとのカードには 「羽が見えたら すぐ飛べる」という文はなかった"
      - type: dialog
        character: mitsu
        text: "もとのカードには 「羽が見えたら すぐ飛べる」という文はなかった"
        expression: thinking
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        expression: normal
        position: right
      - type: dialog
        character: sanagi
        text: "あなたは 「羽が見えてきたら もう飛べそう」と思っていた"
      - type: dialog
        character: sanagi
        text: "あなたは 「羽が見えてきたら もう飛べそう」と思っていた"
        expression: thinking
      - type: sprite
        character: sanagi
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: mushi
            expression: thinking
          - id: hane
            expression: thinking
          - id: mitsu
            expression: thinking
          - id: sanagi
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ムシ"
            value: mushi
            correct: false
            feedback: "ムシは手がかりを持っているが、決め手は足りない。"
          - text: "ハネ"
            value: hane
            correct: false
            feedback: "ハネは手がかりを持っているが、決め手は足りない。"
          - text: "ミツ"
            value: mitsu
            correct: false
            feedback: "ミツは手がかりを持っているが、決め手は足りない。"
          - text: "サナギ"
            value: sanagi
            correct: true
            feedback: "サナギの行動が、証拠といちばん一致している。"
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "サナギ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: sanagi
        expression: worried
        position: center
      - type: dialog
        character: sanagi
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: sanagi
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "カブトムシの羽には、守る羽と飛ぶ羽がある"
      - type: narration
        text: "羽が見えていることと、すぐ飛べることは同じではない"
      - type: narration
        text: "成長の途中を説明するときは、見えた変化と最終結果を分けて考える"
      - type: sprite_group
        characters:
          - id: mushi
            expression: happy
          - id: hane
            expression: happy
          - id: mitsu
            expression: happy
          - id: sanagi
            expression: happy
      - type: narration
        text: "昆虫ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
