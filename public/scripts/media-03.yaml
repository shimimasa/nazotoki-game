scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "5{年|ねん}2{組|くみ}の「{遠足|えんそく}{写真|しゃしん}コンテスト」で{問題|もんだい}が{起|お}きた。{掲示板|けいじばん}に{貼|は}り{出|だ}された1{枚|まい}の{写真|しゃしん}、タイトルは「{友情|ゆうじょう}の{崩壊|ほうかい}」。"
      - type: narration
        text: "タケシとリョウが{取|と}っ{組|く}み{合|あ}っている{迫力|はくりょく}{満点|まんてん}の{写真|しゃしん}だ。{低|ひく}い{角度|かくど}から{撮|と}られ、{背景|はいけい}には{空|そら}しか{写|うつ}っていない。"
      - type: narration
        text: "「タケシとリョウがケンカした！」——クラス中が{大騒|おおさわ}ぎになった。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "ところが——タケシとリョウ{本人|ほんにん}に{聞|き}くと、「ケンカなんかしてないよ。{遠足|えんそく}で{相撲|すもう}ごっこして{遊|あそ}んでただけ」と{笑|わら}っている。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "同じ{瞬間|しゅんかん}を{別|べつ}の{角度|かくど}から{撮|と}った{写真|しゃしん}を{見|み}ると、{周|まわ}りで友だちが{笑|わら}って{応援|おうえん}している{楽|たの}しい{場面|ばめん}でした。なぜ同じ{瞬間|しゅんかん}なのに、まったく{違|ちが}う{印象|いんしょう}の{写真|しゃしん}が{生|う}まれたのでしょう？"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: akari
            expression: worried
          - character: makoto
            expression: thinking
          - character: nozomu
            expression: surprised
          - character: shiori
            expression: thinking
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{写真|しゃしん}を{撮|と}って{出品|しゅっぴん}したのは{誰|だれ}か——メディアリテラシー{探偵団|たんていだん}の{出番|でばん}だ。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 写真のウソ
        subtitle: メディアリテラシー探偵団 Vol.3

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 問題の写真を確認しよう
      - type: narration
        text: "コンテストに{出品|しゅっぴん}された{問題|もんだい}の{写真|しゃしん}を{調|しら}べた。タイトルは「{友情|ゆうじょう}の{崩壊|ほうかい}」。"
      - type: se
        sound: discover
      - type: narration
        text: "{低|ひく}い{角度|かくど}から{撮|と}られていて、タケシとリョウが{大|おお}きく{迫力|はくりょく}のある{姿|すがた}に{写|うつ}っている。2{人|にん}の{表情|ひょうじょう}は{力|ちから}が{入|はい}っていて{険|けわ}しく{見|み}える。"
      - type: narration
        text: "{背景|はいけい}には{空|そら}しか{写|うつ}っておらず、{周|まわ}りに{他|ほか}の{人|ひと}は1{人|にん}も{写|うつ}っていない。{写真|しゃしん}の{範囲|はんい}は2{人|にん}の{上半身|じょうはんしん}だけでとても{狭|せま}い。"
      - type: sprite
        character: shiori
        expression: thinking
        position: right
      - type: dialog
        character: shiori
        text: "カメラはどこの{高|たか}さから{撮|と}っているんだろう。それに——{周|まわ}りに{誰|だれ}もいないって{本当|ほんとう}かな？ ソースは？"
        expression: thinking
      - type: sprite
        character: shiori
        action: hide
      - type: narration
        text: "{遠足|えんそく}のとき、{相撲|すもう}ごっこの{場面|ばめん}には5〜6{人|にん}の友だちが{笑|わら}って{応援|おうえん}していたはずだ。なぜ{写真|しゃしん}には{周|まわ}りの{人|ひと}が{写|うつ}っていないのか？"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: タケシ・リョウ・目撃者の証言を聞こう
      - type: narration
        text: "山田{先生|せんせい}がタケシ、リョウ、そして{周|まわ}りにいた友だちに{聞|き}き{取|と}りをした。"
      - type: se
        sound: discover
      - type: sprite
        character: makoto
        expression: normal
        position: left
      - type: dialog
        character: makoto
        text: "タケシの{証言|しょうげん}——「ケンカなんてしてないよ！ {遠足|えんそく}で{相撲|すもう}ごっこしてただけ。みんなで{盛|も}り{上|あ}がってて{楽|たの}しかったのに。あの{写真|しゃしん}を{見|み}て{悲|かな}しくなった」"
        expression: normal
      - type: dialog
        character: makoto
        text: "リョウの{証言|しょうげん}——「{相撲|すもう}ごっこはタケシと{毎日|まいにち}やってるよ。{遠足|えんそく}ではみんなが{笑|わら}って{応援|おうえん}してくれた。ケンカじゃないよ」"
        expression: thinking
      - type: sprite
        character: makoto
        action: hide
      - type: sprite
        character: akari
        expression: worried
        position: left
      - type: dialog
        character: akari
        text: "ユキちゃんも{証言|しょうげん}してくれたの。「5〜6{人|にん}で{周|まわ}りを{囲|かこ}んで『がんばれ〜！』って{応援|おうえん}してた。みんな{笑|わら}ってたし{楽|たの}しかった。あの{写真|しゃしん}、なんであんなに{怖|こわ}く{見|み}えるんだろう」って。"
        expression: worried
      - type: sprite
        character: akari
        action: hide
      - type: narration
        text: "3{人|にん}とも「ケンカではなく{楽|たの}しい{相撲|すもう}ごっこ」「{周|まわ}りに5〜6{人|にん}いた」と{証言|しょうげん}している。{写真|しゃしん}と{証言|しょうげん}が{矛盾|むじゅん}している——{写真|しゃしん}は{現実|げんじつ}を{正確|せいかく}に{写|うつ}していない！"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 写真のファイル情報を調べよう
      - type: narration
        text: "マコトがパソコン{室|しつ}で「{友情|ゆうじょう}の{崩壊|ほうかい}」のファイル{情報|じょうほう}（メタデータ）を{調|しら}べた。"
      - type: se
        sound: discover
      - type: sprite
        character: makoto
        expression: determined
        position: left
      - type: dialog
        character: makoto
        text: "{撮影|さつえい}{日時|にちじ}は{先週|せんしゅう}{木曜日|もくようび}13:24。{遠足|えんそく}の{自由|じゆう}{時間|じかん}だね。{元|もと}の{画像|がぞう}サイズは4032×3024ピクセルなのに、コンテスト{応募|おうぼ}{写真|しゃしん}のサイズは2016×1512ピクセルだ。"
        expression: determined
      - type: dialog
        character: makoto
        text: "{面積|めんせき}にすると{約|やく}4{分|ぶん}の1！ {元|もと}の{写真|しゃしん}の{大|おお}きな{範囲|はんい}がトリミング（{切|き}り{取|と}り）で{削|けず}られている。トリミングで{消|き}された{部分|ぶぶん}には、いったい{何|なに}が{写|うつ}っていたんだろう？"
        expression: thinking
      - type: sprite
        character: makoto
        action: hide
      - type: narration
        text: "{元|もと}の{写真|しゃしん}の4{分|ぶん}の3がトリミングで{消|き}されている。{撮影|さつえい}{角度|かくど}は{低|ひく}い。この{写真|しゃしん}は「ありのまま」を{写|うつ}しているのか、それとも「{作|つく}られた」ものなのか？"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 別の角度から撮った写真と並べよう
      - type: narration
        text: "山田{先生|せんせい}がクラス{全員|ぜんいん}に「{遠足|えんそく}で{相撲|すもう}ごっこの{写真|しゃしん}を{撮|と}った{人|ひと}はいる？」と{聞|き}いたところ、ユキが{撮|と}った{写真|しゃしん}が{見|み}つかった。"
      - type: se
        sound: discover
      - type: sprite
        character: shiori
        expression: surprised
        position: right
      - type: dialog
        character: shiori
        text: "ユキちゃんの{写真|しゃしん}は{普通|ふつう}の{立|た}った{高|たか}さ（{目|め}の{高|たか}さ）から{撮|と}られていて、タケシとリョウが{笑顔|えがお}で{楽|たの}しそう。{周|まわ}りに5〜6{人|にん}の友だちが{笑|わら}いながら{応援|おうえん}しているのがはっきり{写|うつ}っている。"
        expression: surprised
      - type: dialog
        character: shiori
        text: "「{友情|ゆうじょう}の{崩壊|ほうかい}」と{同|おな}じ{瞬間|しゅんかん}なのに、まったく{違|ちが}う{印象|いんしょう}！ {撮影|さつえい}{角度|かくど}と{写|うつ}っている{範囲|はんい}——この2つが{印象|いんしょう}を{変|か}えているんだ。"
        expression: determined
      - type: sprite
        character: shiori
        action: hide
      - type: narration
        text: "2{枚|まい}を{横|よこ}に{並|なら}べると——「{友情|ゆうじょう}の{崩壊|ほうかい}」は{低|ひく}い{角度|かくど}＋{狭|せま}い{範囲|はんい}で「ケンカ・{暴力|ぼうりょく}」に{見|み}え、ユキの{写真|しゃしん}は{普通|ふつう}の{高|たか}さ＋{広|ひろ}い{範囲|はんい}で「{楽|たの}しい{遊|あそ}び」に{見|み}える。{同|おな}じ{瞬間|しゅんかん}なのに——"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: ノゾムのタブレットから元の写真が発見
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "「{遠足|えんそく}の{写真|しゃしん}を{確認|かくにん}させてほしい」と4{人|にん}のタブレットを{調|しら}べました。すると——ノゾムのタブレットから「{友情|ゆうじょう}の{崩壊|ほうかい}」のトリミング{前|まえ}の{元|もと}{写真|しゃしん}が{見|み}つかりました。"
        expression: determined
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "{元|もと}の{写真|しゃしん}——タケシとリョウが{相撲|すもう}ごっこで{組|く}み{合|あ}っている{中央|ちゅうおう}に、{左右|さゆう}で友だちが{笑|わら}いながら{応援|おうえん}しているのがはっきり{写|うつ}っている！ タケシもリョウも{口元|くちもと}が{笑|わら}っている。"
      - type: narration
        text: "トリミングで{消|き}された{部分|ぶぶん}——{左側|ひだりがわ}に{笑|わら}って{応援|おうえん}する友だち3{人|にん}、{右側|みぎがわ}に{笑|わら}って{応援|おうえん}する友だち2{人|にん}と「ハッケヨイ！」と{叫|さけ}んでいる{人|ひと}。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "パソコン{室|しつ}の{使用|しよう}{記録|きろく}——{金曜日|きんようび}15:30〜16:00: ノゾム（{写真|しゃしん}{編集|へんしゅう}・{印刷|いんさつ}）。ノゾムが{撮影|さつえい}し、{周囲|しゅうい}の{笑顔|えがお}をトリミングで{削|けず}り、「ケンカ{写真|しゃしん}」を{意図的|いとてき}に{作|つく}り{出|だ}したのだ！"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 写真を撮って出品したのは誰だ？
      - type: sprite
        character: akari
        expression: determined
        position: left
      - type: dialog
        character: akari
        text: "{遠足|えんそく}の{広場|ひろば}で、ノゾムが「いい{瞬間|しゅんかん}！ {迫力|はくりょく}ある{写真|しゃしん}{撮|と}れそう！」って{言|い}いながらしゃがんで{撮影|さつえい}してたのを{見|み}かけたの。{何|なに}を{撮|と}っていたかまでは{確認|かくにん}できなかったけど……"
        expression: determined
      - type: sprite
        character: akari
        action: hide
      - type: sprite
        character: shiori
        expression: thinking
        position: right
      - type: dialog
        character: shiori
        text: "{相撲|すもう}ごっこの{最中|さいちゅう}に、{誰|だれ}かが{地面|じめん}に{近|ちか}い{低|ひく}い{位置|いち}から{撮影|さつえい}しているのを{見|み}た。しゃがみこんで下から{見上|みあ}げるような{角度|かくど}でタブレットを{構|かま}えていた。{顔|かお}は{見|み}えなかったけど……"
        expression: thinking
      - type: sprite
        character: shiori
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。ノゾムのタブレットに{元|もと}{写真|しゃしん}あり。パソコン{室|しつ}{記録|きろく}でノゾムが{金曜日|きんようび}に{写真|しゃしん}{編集|へんしゅう}。{遠足|えんそく}で{低|ひく}い{角度|かくど}で{撮影|さつえい}する{人物|じんぶつ}を{目撃|もくげき}。ノゾムは「コンテストに{入賞|にゅうしょう}したい」と{言|い}っていた——"
      - type: choice
        id: q1
        question: 写真を撮って出品したのは誰？
        options:
          - text: ノゾム（タブレットに元写真・パソコン室記録・低い角度で撮影）
            value: nozomu
            correct: true
            feedback: "{正解|せいかい}！ ノゾムは{入賞|にゅうしょう}したくて、{低|ひく}い{角度|かくど}で{撮影|さつえい}し{周囲|しゅうい}の{笑顔|えがお}をトリミングで{削|けず}ることで「ケンカ{写真|しゃしん}」を{意図的|いとてき}に{作|つく}り{出|だ}した。{撮影|さつえい}{角度|かくど}とトリミングが{印象|いんしょう}をまったく{変|か}えてしまったのだ。"
          - text: マコト（写真のデータを調べていた）
            value: makoto
            feedback: "マコトは{植物|しょくぶつ}{観察|かんさつ}グループにいて{相撲|すもう}ごっこの{写真|しゃしん}は{撮|と}っていない。パソコン{室|しつ}でメタデータを{確認|かくにん}したのは{捜査|そうさ}のためだよ。"
          - text: シオリ（相撲ごっこを近くで見ていた）
            value: shiori
            feedback: "シオリはコンテストに{応募|おうぼ}していない。{相撲|すもう}ごっこを{観察|かんさつ}する{側|がわ}にいて、{撮影|さつえい}はしていないよ。{低|ひく}い{角度|かくど}で{撮|と}っていた{人物|じんぶつ}の{顔|かお}も{見|み}えなかったと{言|い}っていたね。"
          - text: アカリ（ノゾムの撮影を目撃していた）
            value: akari
            feedback: "アカリは{花|はな}の{写真|しゃしん}で{応募|おうぼ}している。{相撲|すもう}ごっこの{写真|しゃしん}は{撮|と}っていないよ。ノゾムが{撮影|さつえい}していたのを{見|み}かけていた{側|がわ}だ。"

  # ==================== 真実：ノゾム ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ノゾムの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: nozomu
        expression: worried
        position: center
      - type: dialog
        character: nozomu
        text: "……あの{写真|しゃしん}、{撮|と}ったのは{僕|ぼく}です。コンテストに{出品|しゅっぴん}したのも{僕|ぼく}。"
        expression: worried
      - type: narration
        text: "ノゾムはうつむきながら、ゆっくりと{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: nozomu
        text: "{遠足|えんそく}の{自由|じゆう}{時間|じかん}、タケシとリョウの{相撲|すもう}ごっこがすごく{盛|も}り{上|あ}がってた。「すごい{瞬間|しゅんかん}だ！ {迫力|はくりょく}のある{写真|しゃしん}が{撮|と}れそう！」って{思|おも}って——{地面|じめん}に{近|ちか}い{低|ひく}い{角度|かくど}から{撮影|さつえい}したんだ。"
        expression: thinking
      - type: dialog
        character: nozomu
        text: "{低|ひく}い{角度|かくど}から{撮|と}ると{人|ひと}が{大|おお}きく{迫力|はくりょく}があるように{写|うつ}ることは{知|し}ってた。{撮|と}った{写真|しゃしん}を{見返|みかえ}したら{周|まわ}りの{笑|わら}ってる友だちが{写|うつ}ってて——タケシとリョウだけに{注目|ちゅうもく}させたくて、{周囲|しゅうい}をトリミングした。"
        expression: worried
      - type: dialog
        character: nozomu
