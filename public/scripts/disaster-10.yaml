      - type: sprite
        character: nana
        action: hide
      - type: sprite
        character: kei
        action: hide
      - type: sprite
        character: ai
        action: hide
      - type: narration
        speed: slow
        text: "{防災|ぼうさい}{探偵|たんてい}団——Vol.1からVol.10、{全|ぜん}10{巻|かん}の{旅|たび}、{完結|かんけつ}。"
      - type: effect
