scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: digital-05/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}には、{学級|がっきゅう}新聞「あおばタイムズ」がある。4{人|にん}の{情報|じょうほう}モラル{探偵|たんてい}が{交代|こうたい}で{記事|きじ}を{書|か}き、{毎週|まいしゅう}{金曜|きんよう}に「あおばトーク」に{投稿|とうこう}するルールだ。"
      - type: narration
        text: "{金曜|きんよう}の{朝|あさ}。{投稿|とうこう}された{記事|きじ}を見て、クラス{中|じゅう}が{大騒|おおさわ}ぎになった。"
      - type: bgm
        action: stop
      - type: se
        file: digital-05/notification
      - type: narration
        text: "『{速報|そくほう}！ {給食|きゅうしょく}のカレーに{虫|むし}が{入|はい}っていた！ {給食室|きゅうしょくしつ}は{先週|せんしゅう}の{衛生|えいせい}{検査|けんさ}で{不合格|ふごうかく}になっていたそうです。{学校|がっこう}は{保護者|ほごしゃ}への{連絡|れんらく}を{検討|けんとう}{中|ちゅう}です。』"
      - type: sprite
        character: mio
        expression: worried
        position: left
      - type: dialog
        character: mio
        text: "え……{本当|ほんとう}？ {給食|きゅうしょく}、{大丈夫|だいじょうぶ}なの……？"
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: bgm
        file: digital-05/tension
      - type: dialog
        character: sensei
        text: "{給食|きゅうしょく}の{先生|せんせい}に{確認|かくにん}しました。「そんな{事実|じじつ}はありません」——この{記事|きじ}は{嘘|うそ}です。フェイクニュースです。"
      - type: dialog
        character: sensei
        text: "{誰|だれ}がこの{嘘|うそ}の{記事|きじ}を{書|か}いたのか。{情報|じょうほう}モラル{探偵|たんてい}のみなさん、{調査|ちょうさ}してください。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - character: haruto
            expression: thinking
          - character: mio
            expression: worried
          - character: sora
            expression: worried
          - character: riko
            expression: determined
      - type: narration
        text: "{記事|きじ}の{内容|ないよう}は{事実|じじつ}と{合|あ}っているのか。{誰|だれ}が{書|か}いたのか。ファクトチェックが{始|はじ}まる。"
      - type: sprite
        character: haruto
        action: hide
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: riko
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "情報モラル探偵団 Vol.5"
        subtitle: "フェイクニュース"

  # ===== 証拠カード1: 問題の記事 =====
  - id: evidence-1
    bg: classroom
    bgm: digital-05/investigation
    steps:
      - type: title_card
        text: "ステップ1：調査"
      - type: narration
        text: "まずは{問題|もんだい}の{記事|きじ}を{詳|くわ}しく見てみよう。あおばタイムズ{第|だい}12{号|ごう}。"
      - type: narration
        text: "『{速報|そくほう}！ {給食|きゅうしょく}のカレーに{虫|むし}が{入|はい}っていた！ {給食室|きゅうしょくしつ}は{先週|せんしゅう}の{衛生|えいせい}{検査|けんさ}で{不合格|ふごうかく}になっていた』"
      - type: narration
        text: "フェイクニュースを見{抜|ぬ}くための3つの{質問|しつもん}でチェックしよう。"
      - type: narration
        text: "①{出典|しゅってん}はどこ？——{記載|きさい}なし。『{誰|だれ}に{聞|き}いたか』『どこで{確認|かくにん}したか』が{一切|いっさい}{書|か}かれていない。"
      - type: narration
        text: "②{事実|じじつ}と{合|あ}っている？——{未確認|みかくにん}。{木曜|もくよう}のメニューは{本当|ほんとう}にカレーだった？ {衛生|えいせい}{検査|けんさ}は{先週|せんしゅう}あった？"
      - type: narration
        text: "③{裏取|うらど}りできる？——{未確認|みかくにん}。{給食|きゅうしょく}の{先生|せんせい}に{確認|かくにん}すれば{分|わ}かるはず。"
      - type: se
        file: common/discover
      - type: narration
        text: "{出典|しゅってん}がない{記事|きじ}——これは{最初|さいしょ}の{警告|けいこく}サインだ。"

  # ===== 証拠カード2: 事実の確認 =====
  - id: evidence-2
    bg: classroom
    bgm: digital-05/investigation
    steps:
      - type: narration
        text: "{記事|きじ}の{内容|ないよう}を1つずつ{事実|じじつ}と{照合|しょうごう}してみよう。"
      - type: narration
        text: "{記事|きじ}：『{木曜|もくよう}の{給食|きゅうしょく}のカレー』→ {事実|じじつ}：{木曜|もくよう}のメニューは{焼|や}き{魚|さかな}{定食|ていしょく}。カレーではない。❌"
      - type: narration
        text: "{記事|きじ}：『{先週|せんしゅう}の{衛生|えいせい}{検査|けんさ}で{不合格|ふごうかく}』→ {事実|じじつ}：{衛生|えいせい}{検査|けんさ}は{毎月|まいつき}1{日|にち}。{先月|せんげつ}{合格|ごうかく}。{先週|せんしゅう}に{検査|けんさ}はなし。❌"
      - type: narration
        text: "{記事|きじ}：『{保護者|ほごしゃ}への{連絡|れんらく}を{検討|けんとう}{中|ちゅう}』→ {事実|じじつ}：そのような{連絡|れんらく}の{予定|よてい}なし。❌"
      - type: se
        file: common/discover
      - type: narration
        text: "4つ{全部|ぜんぶ}が{事実|じじつ}と{合|あ}わない。これは『{間違|まちが}えた』のではなく、{取材|しゅざい}をしていない{人|ひと}が{想像|そうぞう}で{書|か}いたということだ。"
      - type: narration
        text: "{仮説|かせつ}{検証|けんしょう}をしてみよう。「もしカレーに{虫|むし}が{入|はい}っていたなら、{木曜|もくよう}のメニューはカレーのはず」——{事実|じじつ}は{焼|や}き{魚|さかな}{定食|ていしょく}。{仮説|かせつ}と{事実|じじつ}が{矛盾|むじゅん}。{記事|きじ}は{嘘|うそ}だ。"

  # ===== 証拠カード3: 投稿ログ =====
  - id: evidence-3
    bg: classroom
    bgm: digital-05/experiment
    steps:
      - type: narration
        text: "ハルトがIT{係|がかり}として、「あおばトーク」の{投稿|とうこう}ログを{確認|かくにん}した。"
      - type: sprite
        character: haruto
        expression: determined
        position: left
      - type: dialog
        character: haruto
        text: "{記事|きじ}の{投稿|とうこう}ログです。{投稿|とうこう}{時刻|じこく}は{木曜|もくよう}22:30。{学校|がっこう}のルールでは21:00{以降|いこう}タブレット{使用|しよう}{禁止|きんし}なので、ルール{違反|いはん}です。"
      - type: sprite
        character: haruto
        expression: thinking
      - type: dialog
        character: haruto
        text: "{投稿|とうこう}アカウントは——ソラ。ただし、アカウントを{乗|の}っ{取|と}られた{可能性|かのうせい}もあるので、{断定|だんてい}はできません。"
      - type: sprite
        character: haruto
        action: hide
      - type: narration
        text: "あおばタイムズの{担当表|たんとうひょう}を{確認|かくにん}しよう。"
      - type: narration
        text: "{第|だい}1{週|しゅう}：ハルト——{取材|しゅざい}{済|ず}み、{先生|せんせい}{確認|かくにん}{済|ず}み。✅"
      - type: narration
        text: "{第|だい}2{週|しゅう}：リコ——{取材|しゅざい}{済|ず}み、{先生|せんせい}{確認|かくにん}{済|ず}み。✅"
      - type: narration
        text: "{第|だい}3{週|しゅう}：ミオ——{取材|しゅざい}{済|ず}み、{先生|せんせい}{確認|かくにん}{済|ず}み。✅"
      - type: narration
        text: "{第|だい}4{週|しゅう}：ソラ——{先生|せんせい}{確認|かくにん}なしで{投稿|とうこう}。❓"
      - type: se
        file: common/discover
      - type: narration
        text: "{今週|こんしゅう}の{担当|たんとう}はソラ。{先生|せんせい}の{事前|じぜん}{確認|かくにん}を{受|う}けずに{投稿|とうこう}されている。{他|ほか}の3{人|にん}は{全員|ぜんいん}{確認|かくにん}{済|ず}みだ。"

  # ===== 証拠カード4: 取材状況 =====
  - id: evidence-4
    bg: classroom
    bgm: digital-05/experiment
    steps:
      - type: narration
        text: "ソラの{取材|しゅざい}{状況|じょうきょう}について、2{人|り}が{証言|しょうげん}している。"
      - type: sprite
        character: riko
        expression: normal
        position: right
      - type: dialog
        character: riko
        text: "{水曜|すいよう}の{放課後|ほうかご}にソラに『{記事|きじ}の{取材|しゅざい}どう？』って{聞|き}いたの。そしたら『まだ{全然|ぜんぜん}できてない。やばいんだよね』って{焦|あせ}ってた。"
      - type: sprite
        character: riko
        action: hide
      - type: sprite
        character: mio
        expression: thinking
        position: left
      - type: dialog
        character: mio
        text: "{火|か}〜{水曜日|すいようび}、ソラが{取材|しゅざい}してる{姿|すがた}を{一度|いちど}も見かけなかった。{休|やす}み{時間|じかん}はいつもサッカーの{話|はなし}をしてたよ。"
      - type: sprite
        character: mio
        action: hide
      - type: narration
        text: "さらに、リコが{木曜|もくよう}22:00に「あおばトーク」を{確認|かくにん}したとき、まだ{記事|きじ}は{未投稿|みとうこう}だった。{投稿|とうこう}は22:30。"
      - type: se
        file: common/discover
      - type: narration
        text: "ソラは22:00〜22:30の{間|あいだ}に{記事|きじ}を{書|か}いた——{約|やく}30{分|ぷん}。ハルト・リコ・ミオの{記事|きじ}は3{日間|にちかん}{取材|しゅざい}して{書|か}いている。30{分|ぷん}で{書|か}けるのはなぜか？"

  # ===== 証拠カード5: 給食の先生の証言 =====
  - id: card-5
    bg: classroom
    bgm: digital-05/tension
    steps:
      - type: effect
        name: fade-out
      - type: effect
        name: fade-in
      - type: narration
        text: "{先生|せんせい}が{給食|きゅうしょく}の{先生|せんせい}に{正式|せいしき}に{確認|かくにん}した{結果|けっか}が{届|とど}いた。"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{給食|きゅうしょく}の{先生|せんせい}の{証言|しょうげん}です。「{木曜|もくよう}のメニューは{焼|や}き{魚|さかな}{定食|ていしょく}。カレーは{来週|らいしゅう}の{水曜|すいよう}の{予定|よてい}です」"
      - type: dialog
        character: sensei
        text: "「{衛生|えいせい}{検査|けんさ}は{毎月|まいつき}1{日|にち}に{実施|じっし}。{先月|せんげつ}は{合格|ごうかく}でした。{先週|せんしゅう}に{検査|けんさ}は{行|おこな}われていません」"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "「{虫|むし}の{混入|こんにゅう}も、{不合格|ふごうかく}も、{保護者|ほごしゃ}{連絡|れんらく}も、すべて{事実|じじつ}ではありません。ここまで{事実|じじつ}と{違|ちが}う{記事|きじ}は、{取材|しゅざい}をしていない{人|ひと}にしか{書|か}けません」"
      - type: sprite
        character: sensei
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "ファクトチェック{結果|けっか}——3つの{主張|しゅちょう}が{全部|ぜんぶ}{嘘|うそ}。{取材|しゅざい}していれば{絶対|ぜったい}に{間違|まちが}えないこと（メニュー・{検査|けんさ}{日|び}）を{間違|まちが}えている。"
      - type: narration
        text: "さらに、ソラの{友達|ともだち}ケンタの{証言|しょうげん}——「ソラは{木曜|もくよう}の{夜|よる}、『{記事|きじ}やばい、{何|なに}も{書|か}いてない』って{言|い}ってた。10{時|じ}{半|はん}すぎに『なんとか{書|か}いた！』って」"
      - type: narration
        text: "ソラは{木曜|もくよう}の{夜|よる}まで{記事|きじ}が{書|か}けていなかった。{締|し}め{切|き}りに{追|お}われて、{取材|しゅざい}なしの{嘘|うそ}の{記事|きじ}を{書|か}いたのだ。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: digital-05/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}が{出|で}そろいました。{考|かんが}えてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        text: "嘘の記事を書いたのは誰？"
        options:
          - text: "ハルト（IT係で投稿ログを操作できる？）"
            value: a
            feedback: "ハルトは{先週|せんしゅう}の{担当|たんとう}で、ちゃんと{取材|しゅざい}して{書|か}いた。{投稿|とうこう}ログを{読|よ}めることと{嘘|うそ}を{書|か}くことは{別|べつ}だよ。"
          - text: "ミオ（記事を読んで一番心配していた）"
            value: b
            feedback: "ミオはむしろ{記事|きじ}の{矛盾|むじゅん}に{気|き}づいていた{側|がわ}。{自分|じぶん}で{書|か}いた{嘘|うそ}に{自分|じぶん}で{心配|しんぱい}するのは{不自然|ふしぜん}だよね。"
          - text: "ソラ（今週の担当で取材していなかった）"
            value: c
            feedback: "{今週|こんしゅう}の{担当|たんとう}で、{取材|しゅざい}ゼロ。ソラのアカウントから22:30に{投稿|とうこう}。{記事|きじ}の{内容|ないよう}は{事実|じじつ}と4つとも{不一致|ふいっち}。{証拠|しょうこ}がそろっている。"
          - text: "リコ（冷静に分析しているのが逆に怪しい）"
            value: d
            feedback: "リコは{先月|せんげつ}の{担当|たんとう}で{取材|しゅざい}{済|ず}み。{冷静|れいせい}なのは{性格|せいかく}。むしろ{記事|きじ}の{矛盾|むじゅん}を{指摘|してき}する{側|がわ}だよ。"
      - type: choice
        id: q2
        text: "記事が嘘だと分かった一番の決め手は？"
        options:
          - text: "出典が書かれていなかった"
            value: a
            feedback: "{出典|しゅってん}がないのは{大|おお}きな{警告|けいこく}サイン。でもそれだけでは『{書|か}き{忘|わす}れ』の{可能性|かのうせい}もある。{事実|じじつ}との{照合|しょうごう}で{嘘|うそ}が{確定|かくてい}した。"
          - text: "木曜のメニューがカレーではなく焼き魚だった"
            value: b
            feedback: "{仮説|かせつ}{検証|けんしょう}の{力|ちから}。『もしカレーに{虫|むし}が{入|はい}っていたなら{木曜|もくよう}はカレーのはず』→{焼|や}き{魚|さかな}。{記事|きじ}の{前提|ぜんてい}が{崩|くず}れた。"
          - text: "ソラが取材をしていなかった"
            value: c
            feedback: "{取材|しゅざい}していない{人|ひと}が{書|か}いた{記事|きじ}だから、{基本的|きほんてき}な{事実|じじつ}を{間違|まちが}えた。「{取材|しゅざい}していない」ことが{嘘|うそ}の{原因|げんいん}。"
          - text: "全部合わせた総合判断"
            value: d
            feedback: "その{通|とお}り。{出典|しゅってん}なし＋{事実|じじつ}と{不一致|ふいっち}＋{取材|しゅざい}ゼロ——{複数|ふくすう}の{証拠|しょうこ}を{組|く}み{合|あ}わせて{判断|はんだん}する。これがファクトチェックの{力|ちから}。"
      - type: choice
        id: q3
        text: "フェイクニュースに気づくために一番大事なことは？"
        options:
          - text: "出典を確認する（誰がその情報を言ったか）"
            value: a
            feedback: "『{誰|だれ}が{言|い}ったか』が{分|わ}からない{情報|じょうほう}は{信頼|しんらい}できない。{出典|しゅってん}の{確認|かくにん}はファクトチェックの{第一歩|だいいっぽ}。"
          - text: "事実と照合する（仮説検証）"
            value: b
            feedback: "『もし{本当|ほんとう}なら〇〇のはず』と{仮説|かせつ}を{立|た}てて、{事実|じじつ}と{比|くら}べる。{矛盾|むじゅん}があれば{嘘|うそ}の{可能性|かのうせい}が{高|たか}い。"
          - text: "裏取りする（複数の情報源で確認）"
            value: c
            feedback: "1つの{情報|じょうほう}だけでなく、2つ{以上|いじょう}の{情報源|じょうほうげん}で{同|おな}じことが{確認|かくにん}できるか。{今回|こんかい}は{給食|きゅうしょく}の{先生|せんせい}に{聞|き}けば{一発|いっぱつ}だった。"
