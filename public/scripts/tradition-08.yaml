      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "学校の和室体験コーナーで、畳の敷き方が「切腹敷き（畳の目が縦横に交わる不吉な敷き方）」になっていた。"
      - type: narration
        text: "通常は「祝儀敷き（畳の目が交差しない縁起のよい敷き方）」に敷くのが慣例。"
      - type: narration
        text: "誰が畳を動かしたのか——日本建築における畳の配置ルールと、障子・縁側の機能的な役割を理解しないと「何が問題で、誰がなぜ動かしたか」が分からない。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: kotono
        expression: worried
        position: center
      - type: dialog
        character: kotono
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: kotono
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: determined }
          - { id: kanade, expression: thinking }
          - { id: ibuki, expression: thinking }
          - { id: kotono, expression: worried }
      - type: narration
        text: "「伝統文化探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "伝統文化探偵団"
        subtitle: "Vol.8 畳の部屋で"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: tsumugi
        expression: thinking
        position: left
      - type: dialog
        character: tsumugi
        text: "3種類の配置パターンの図を整理し、現在の和室が「切腹敷き」だと特定する場面"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        expression: thinking
        position: right
      - type: dialog
        character: kanade
        text: "タイムラインを確認し、「前日夕方に和室に入れた可能性がある人は誰か」を絞る場面"
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        expression: thinking
        position: left
      - type: dialog
        character: ibuki
        text: "畳の縁についた手形の向きから「どの方向から動かしたか」を観察する場面"
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        expression: worried
        position: right
      - type: dialog
        character: kotono
        text: "Card 5後、「畳のマナーは知っていたけど、敷き方のルールは知らなかった」と認める瞬間"
      - type: sprite
        character: kotono
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「畳を動かして切腹敷きにしてしまったのは誰？」"
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: normal }
          - { id: kanade, expression: normal }
          - { id: ibuki, expression: normal }
          - { id: kotono, expression: worried }
      - type: choice
        id: q1
        text: "畳を動かして切腹敷きにしてしまったのは誰？"
        options:
          - label: "ツムギ"
            value: tsumugi
            correct: false
            feedback: "ツムギは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "カナデ"
            value: kanade
            correct: false
            feedback: "カナデは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "イブキ"
            value: ibuki
            correct: false
            feedback: "イブキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "コトノ"
            value: kotono
            correct: true
            feedback: "コトノの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、コトノ（言乃）"
      - type: dialog
        character: sensei
        text: "動機は、#15 正義感の暴走 — コトノは和室体験の前日、「畳が正しく敷かれているか」を確認しに来た。コトノは畳の「踏み方のマナー（畳の縁を踏まない）」は知っていたが、「敷き方のルール（祝儀敷き・切腹敷きの違い）」は知らなかった。コトノは「畳の端がきれいに合っていないから直してあげよう」と思い、畳を動かして端をそろえた。その際に祝儀敷きから切腹敷きに変えてしまった。コトノは「部屋を整えた」と思っているが、実は不吉な配置にしてしまっていた。「正しくしようとした正義感」が「別の間違いを生んだ」形。"
      - type: dialog
        character: sensei
        text: "視点の矛盾は、コトノは「畳の縁のマナーは知っているから畳を動かした」と言う。しかし「動かすこと自体」が敷き方を変えるリスクがあることを知らなかった。「マナーを知っている」と「全部のルールを知っている」の混同が推理の核。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotono
        expression: worried
        position: center
      - type: dialog
        character: kotono
        text: "Card 5後、「畳のマナーは知っていたけど、敷き方のルールは知らなかった」と認める瞬間"
      - type: sprite
        character: kotono
        expression: determined
      - type: dialog
        character: kotono
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: kotono
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 畳の配置ルール（祝儀敷き・不祝儀敷き・切腹敷きの違いと意味）と、障子・縁側の機能的役割（採光・通風・空間の可変性）を理解する\n・**サブ**: 認知バイアスの認識スキル——「マナーを知っている＝全てを知っている」という思い込みに気づく"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: happy }
          - { id: kanade, expression: happy }
          - { id: ibuki, expression: happy }
          - { id: kotono, expression: happy }
      - type: narration
        text: "伝統文化探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
