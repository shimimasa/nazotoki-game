      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "学芸会の「伝統芸能紹介コーナー」の準備で、展示用の歌舞伎衣装と能の面の組み合わせが「正しくない」ものになっていた。"
      - type: narration
        text: "「荒事」の隈取り衣装に「若女（わかおんな）の面」が並んでいる——これは本来あわせない組み合わせ。"
      - type: narration
        text: "誰が組み合わせを変えたのか。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: tsumugi
        expression: worried
        position: center
      - type: dialog
        character: tsumugi
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: tsumugi
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: determined }
          - { id: kanade, expression: thinking }
          - { id: ibuki, expression: thinking }
          - { id: kotono, expression: worried }
      - type: narration
        text: "「伝統文化探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "伝統文化探偵団"
        subtitle: "Vol.7 舞台の謎"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: tsumugi
        expression: worried
        position: left
      - type: dialog
        character: tsumugi
        text: "密談後、「見栄えのいい組み合わせにしようとして、勝手に変えた」と認める瞬間"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        expression: thinking
        position: right
      - type: dialog
        character: kanade
        text: "4時から4時半の間の行動情報がどこにも記録されていない」という情報欠落に気づく場面"
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        expression: thinking
        position: left
      - type: dialog
        character: ibuki
        text: "歌舞伎の衣装（荒々しい役=赤隈取り）と能の面（若女=穏やかな美しさ）の対比を説明する場面"
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        expression: thinking
        position: right
      - type: dialog
        character: kotono
        text: "密談でツムギに「見栄えのいい展示にしたかっただけなのに、文化的に正確かどうか確認しなかった」と聞く場面"
      - type: sprite
        character: kotono
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「歌舞伎衣装と能の面の組み合わせを変えたのは誰？」"
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: normal }
          - { id: kanade, expression: normal }
          - { id: ibuki, expression: normal }
          - { id: kotono, expression: worried }
      - type: choice
        id: q1
        text: "歌舞伎衣装と能の面の組み合わせを変えたのは誰？"
        options:
          - label: "ツムギ"
            value: tsumugi
            correct: true
            feedback: "ツムギの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - label: "カナデ"
            value: kanade
            correct: false
            feedback: "カナデは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "イブキ"
            value: ibuki
            correct: false
            feedback: "イブキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "コトノ"
            value: kotono
            correct: false
            feedback: "コトノは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、ツムギ（紡）"
      - type: dialog
        character: sensei
        text: "動機は、#9 承認欲求 — ツムギは伝統芸能に詳しく、準備中に「自分の提案した展示方法を採用してほしい」と考えた。前日の夜に展示の資料を読み込み、自分なりの組み合わせで並べ直した。ツムギの提案は「見栄えのよい組み合わせ」だったが、文化的に正確かどうかの確認を怠っていた。「詳しい自分が正しい」という思い込みから、班の他のメンバーに相談せず一人で変更した。発見時刻の証言に矛盾があり（「準備が終わってから帰った」という主張と実際の滞在時刻の差）が推理の鍵。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: tsumugi
        expression: worried
        position: center
      - type: dialog
        character: tsumugi
        text: "密談後、「見栄えのいい組み合わせにしようとして、勝手に変えた」と認める瞬間"
      - type: sprite
        character: tsumugi
        expression: determined
      - type: dialog
        character: tsumugi
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: tsumugi
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 歌舞伎（荒事・和事）と能（の面の種類と感情表現）の基本的な違いを理解し、「なぜこの衣装と面はあわせないか」を説明できる\n・**サブ**: 情報欠落の認識スキル——「ツムギが4時に帰った時刻の証言」に欠けているものを見抜く"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: happy }
          - { id: kanade, expression: happy }
          - { id: ibuki, expression: happy }
          - { id: kotono, expression: happy }
      - type: narration
        text: "伝統文化探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
