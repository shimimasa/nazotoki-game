scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{からだ}探偵団の4{人|にん}。{放課後|ほうかご}、カラダはオンラインゲームで{知|し}り{合|あ}った「ミライさん」と{毎日|まいにち}チャットしている。"
      - type: narration
        text: "ミライさんはいつも{優|やさ}しく、「{特別|とくべつ}だよ」と{言|い}ってゲームの{攻略法|こうりゃくほう}を{教|おし}えてくれる。"
      - type: narration
        text: "そしてある{日|ひ}、ミライさんから{新|あたら}しいメッセージが{届|とど}いた——「もっと{仲良|なかよ}くなりたいから、{顔写真|かおしゃしん}を{送|おく}って」。"
      - type: sprite
        character: karada
        expression: happy
        position: left
      - type: dialog
        character: karada
        text: "ミライさん、ゲーム{教|おし}えてくれるし、{優|やさ}しいし……{写真|しゃしん}{送|おく}ったら、もっと{仲良|なかよ}くなれるかも。"
        expression: happy
      - type: sprite
        character: karada
        action: hide
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: mamoru
        expression: surprised
        position: right
      - type: dialog
        character: mamoru
        text: "待って！ カラダ、{今|いま}スマホに「{写真|しゃしん}{送|おく}って」って{見|み}えた。{顔写真|かおしゃしん}を{送|おく}ろうとしてるの？"
        expression: surprised
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{顔写真|かおしゃしん}は「{身体|からだ}の{情報|じょうほう}」。{一度|いちど}{送|おく}ったら{取|と}り{消|け}せない。{画面|がめん}の{向|む}こうの{人|ひと}が{本当|ほんとう}にだれかは、{確認|かくにん}する{方法|ほうほう}がないのよ。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: karada
            expression: worried
          - character: mamoru
            expression: thinking
          - character: kokochi
            expression: thinking
          - character: kizuna
            expression: surprised
      - type: narration
        text: "からだ探偵団が{動|うご}き{出|だ}した。「{顔写真|かおしゃしん}を{送|おく}ろうとしたのはなぜか？ {本当|ほんとう}に{安全|あんぜん}だったのか？」"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 画面の向こう
        subtitle: からだ探偵団 Vol.5

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 事件の事実確認
      - type: narration
        text: "{証拠|しょうこ}カード①——カラダがオンラインゲームの{知|し}り{合|あ}い「ミライさん」に{顔写真|かおしゃしん}を{送|おく}ろうとした。マモルが{直前|ちょくぜん}に{止|と}めた。"
      - type: narration
        text: "マモルがカラダのスマートフォンの{通知|つうち}{画面|がめん}を{見|み}て、{写真|しゃしん}アプリを{開|ひら}いて{自撮|じど}りしようとしていた{場面|ばめん}を{目撃|もくげき}した。"
      - type: sprite
        character: mamoru
        expression: determined
        position: left
      - type: dialog
        character: mamoru
        text: "カラダのスマホに「{写真|しゃしん}{送|おく}って」って{見|み}えた。{写真|しゃしん}アプリを{開|ひら}こうとしてたから、「{待|ま}って！」って{言|い}うしかなかった。"
        expression: determined
      - type: sprite
        character: mamoru
        action: hide

  # ==================== 調査：証拠カード2・3 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 身体の情報とプロフィール
      - type: sprite
        character: kokochi
        expression: thinking
        position: left
      - type: dialog
        character: kokochi
        text: "ミライさんのプロフィールを{見|み}てみた。{名前|なまえ}「ミライ」、{年齢|ねんれい}「12{歳|さい}」、{趣味|しゅみ}「ゲーム」。でも、これが{本当|ほんとう}かどうか{確認|かくにん}する{方法|ほうほう}がない。"
        expression: thinking
      - type: sprite
        character: kokochi
        action: hide
      - type: sprite
        character: kizuna
        expression: worried
        position: right
      - type: dialog
        character: kizuna
        text: "「{特別|とくべつ}だよ」「{他|ほか}の{人|ひと}には{教|おし}えない{攻略法|こうりゃくほう}だよ」——Vol.3の「ひみつの{約束|やくそく}」でタケル{先輩|せんぱい}が{言|い}ってたパターンと{同|おな}じじゃない？"
        expression: worried
      - type: sprite
        character: kizuna
        action: hide
      - type: narration
        text: "{証拠|しょうこ}カード②——{顔写真|かおしゃしん}・{名前|なまえ}・{住所|じゅうしょ}・{学校名|がっこうめい}は「{身体|からだ}の{情報|じょうほう}」。{一度|いちど}{送|おく}ったら{取|と}り{消|け}せない。{知|し}らない{人|ひと}に{渡|わた}ると{悪用|あくよう}の{可能性|かのうせい}がある。"
      - type: narration
        text: "{証拠|しょうこ}カード③——オンラインでは{本当|ほんとう}の{年齢|ねんれい}や{名前|なまえ}は{分|わ}からない。「12{歳|さい}」と{書|か}いてあっても、{確認|かくにん}する{手段|しゅだん}がない。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: チャット履歴の「特別パターン」
      - type: narration
        text: "{証拠|しょうこ}カード④——カラダへの{追加|ついか}HO: ミライさんとのチャット{履歴|りれき}。"
      - type: se
        sound: discover
      - type: sprite
        character: karada
        expression: worried
        position: left
      - type: dialog
        character: karada
        text: "「{特別|とくべつ}だよ」「{他|ほか}の{人|ひと}には{教|おし}えない{攻略法|こうりゃくほう}だよ」「もっと{仲良|なかよ}くなりたいから{顔写真|かおしゃしん}{送|おく}って」……{全部|ぜんぶ}ミライさんからのメッセージだ。"
        expression: worried
      - type: sprite
        character: karada
        action: hide
      - type: sprite
        character: kizuna
        expression: determined
        position: right
      - type: dialog
        character: kizuna
        text: "これ、「{特別|とくべつ}」って{言|い}って{近|ちか}づいて、{段々|だんだん}と{情報|じょうほう}を{要求|ようきゅう}してくる{支配|しはい}のパターン。Vol.3で{学|まな}んだ{危|あぶ}ないサインだよ。"
        expression: determined
      - type: sprite
        character: kizuna
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 山田先生の解説
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "{証拠|しょうこ}カード⑤——ミライさんが{悪|わる}い{人|ひと}かどうかは{分|わ}からない。でも「{分|わ}からない」こと{自体|じたい}が{危険|きけん}。"
        expression: determined
      - type: dialog
        character: yamada
        text: "{画面|がめん}{越|ご}しの{人|ひと}に「{身体|からだ}の{情報|じょうほう}」を{送|おく}るのは、{見知|みし}らぬ{人|ひと}に{鍵|かぎ}を{渡|わた}すのと{同|おな}じことよ。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "「{いい人|いいひと}かも」→「{分|わ}からないこと{自体|じたい}がリスク」——{見方|みかた}が{変|か}わった。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 事件の中心にいたのは誰だ？
      - type: sprite
        character: kokochi
        expression: thinking
        position: left
      - type: dialog
        character: kokochi
        text: "ミライさんのプロフィールは{年齢|ねんれい}も{名前|なまえ}も{確認|かくにん}できない。「12{歳|さい}」が{本当|ほんとう}かどうか{証明|しょうめい}する{方法|ほうほう}がない。"
        expression: thinking
      - type: sprite
        character: kokochi
        action: hide
      - type: sprite
        character: mamoru
        expression: worried
        position: right
      - type: dialog
        character: mamoru
        text: "カラダが{写真|しゃしん}アプリを{開|ひら}こうとしてたのを{見|み}た。{直前|ちょくぜん}で{止|と}められたけど、{危|あぶ}なかった。"
        expression: worried
      - type: sprite
        character: mamoru
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①{顔写真|かおしゃしん}を{送|おく}ろうとした。②{相手|あいて}の{素性|すじょう}が{不明|ふめい}。③「{特別|とくべつ}」パターンと{一致|いっち}。④「{分|わ}からない」こと{自体|じたい}がリスク。"
      - type: choice
        id: q1
        question: 事件の中心になって問題を起こしたのは誰だ？
        options:
          - text: カラダ（好奇心から顔写真を送ろうとした当事者）
            value: karada
            correct: true
            feedback: "{正解|せいかい}！ カラダはミライさんのことを「{いい人|いいひと}」と{信|しん}じ、{好奇心|こうきしん}と{期待|きたい}から{顔写真|かおしゃしん}を{送|おく}ろうとした。{画面|がめん}の{向|む}こうの{人|ひと}が{本当|ほんとう}に「{いい人|いいひと}」か{確認|かくにん}する{手段|しゅだん}がないこと、{顔写真|かおしゃしん}は「{身体|からだ}の{情報|じょうほう}」で{取|と}り{消|け}せないことに{気|き}づいていなかった。"
          - text: マモル（カラダを止めた人）
            value: mamoru
            feedback: "マモルはカラダを{止|と}めた{側|がわ}。{正義感|せいぎかん}から「{待|ま}って！」と{声|こえ}をかけた{行動|こうどう}は{正|ただ}しかった。"
          - text: ココチ（プロフィールを調べた人）
            value: kokochi
            feedback: "ココチはミライさんのプロフィールを{検証|けんしょう}して「{確認{かくにん}できない」と{報告|ほうこく}した{側|がわ}。{問題|もんだい}の{発見|はっけん}に{貢献|こうけん}した。"
          - text: キズナ（パターンを指摘した人）
            value: kizuna
            feedback: "キズナは「{特別|とくべつ}だよ」パターンの{危険|きけん}を{指摘|してき}した{側|がわ}。Vol.3の{学|まな}びを{活|い}かした{重要|じゅうよう}な{発見|はっけん}だった。"

  # ==================== 真実：カラダ ====================
  - id: truth-karada
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: カラダの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: karada
        expression: worried
        position: center
      - type: dialog
        character: karada
        text: "……{顔写真|かおしゃしん}を{送|おく}ろうとしたのは、ぼくです。"
        expression: worried
      - type: dialog
        character: karada
        text: "ミライさんは{毎日|まいにち}チャットしてくれて、{攻略法|こうりゃくほう}も{教|おし}えてくれて……「{特別|とくべつ}だよ」って{言|い}ってくれた。{写真|しゃしん}{送|おく}ったらもっと{仲良|なかよ}くなれると{思|おも}ってた。"
        expression: thinking
      - type: dialog
        character: karada
        text: "でも……ミライさんの{本当|ほんとう}の{名前|なまえ}も{年齢|ねんれい}も{知|し}らなかった。{送|おく}るところだった……こわい。"
        expression: worried
      - type: sprite
        character: karada
        action: hide

  # ==================== 真実：他のメンバー ====================
  - id: truth-others
    bg: classroom
    steps:
      - type: sprite
        character: kizuna
        expression: thinking
        position: left
      - type: dialog
        character: kizuna
        text: "「{特別|とくべつ}だよ」って{言葉|ことば}……Vol.3のタケル{先輩|せんぱい}も{同|おな}じ{言|い}い{方|かた}をしてた。これって{支配|しはい}の{始|はじ}まりのサインなんだ。"
        expression: thinking
      - type: sprite
        character: kizuna
        action: hide
      - type: sprite
        character: kokochi
        expression: determined
        position: right
      - type: dialog
        character: kokochi
        text: "「12{歳|さい}」って{書|か}いてあっても{確認|かくにん}できない。オンラインの{情報|じょうほう}は{信|しん}じる{前|まえ}に「{本当|ほんとう}に{確認|かくにん}できるか？」を{考|かんが}えないといけないね。"
        expression: determined
      - type: sprite
        character: kokochi
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "{画面|がめん}の{向|む}こうでも、{顔写真|かおしゃしん}や{個人情報|こじんじょうほう}は「{身体|からだ}の{一部|いちぶ}」。{一度|いちど}{送|おく}ったら{取|と}り{消|け}せない。「{いい人|いいひと}そう」「{特別|とくべつ}だよ」は{送|おく}る{理由|りゆう}にならないわ。"
        expression: normal
      - type: dialog
        character: yamada
        text: "{分|わ}からない{人|ひと}に「{身体|からだ}の{情報|じょうほう}」を{送|おく}りそうになったら、まず{大人|おとな}に{相談|そうだん}してね。"
        expression: happy
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "カラダは{送|おく}る{前|まえ}に{止|と}まれた。でも{次|つぎ}は{自分|じぶん}で{気|き}づける{力|ちから}が{必要|ひつよう}だ。"
      - type: narration
        text: "「{特別|とくべつ}だよ」——その{言葉|ことば}が{出|で}たとき、{立|た}ち{止|と}まって{考|かんが}えよう。{画面|がめん}の{向|む}こうを、{確認|かくにん}する{方法|ほうほう}はあるか？"
      - type: effect
        name: fade-out
