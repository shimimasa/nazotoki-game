scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "物語が始まる。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: tsunagu
        expression: worried
        position: center
      - type: dialog
        character: tsunagu
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: tsunagu
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "{{落|お}}ち{{着|つ}}いて。みんなで{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみよう。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: mamoru, expression: determined }
          - { id: hitomi, expression: thinking }
          - { id: task, expression: thinking }
          - { id: tsunagu, expression: worried }
      - type: narration
        text: "「人権探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: hitomi
        action: hide
      - type: sprite
        character: task
        action: hide
      - type: sprite
        character: tsunagu
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: 人権探偵団
        subtitle: Vol.6 やさしい排除

  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: ステップ1
        subtitle: 調査
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover

  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover

  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover

  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover

  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: ステップ2
        subtitle: 反転
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: yamada
        action: hide

  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: mamoru
        expression: thinking
        position: left
      - type: dialog
        character: mamoru
        text: "マモルの考えを述べる"
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: hitomi
        expression: thinking
        position: right
      - type: dialog
        character: hitomi
        text: "ヒトミの考えを述べる"
      - type: sprite
        character: hitomi
        action: hide
      - type: sprite
        character: task
        expression: thinking
        position: left
      - type: dialog
        character: task
        text: "タスクの考えを述べる"
      - type: sprite
        character: task
        action: hide
      - type: sprite
        character: tsunagu
        expression: worried
        position: right
      - type: dialog
        character: tsunagu
        text: "ツナグの考えを述べる"
      - type: sprite
        character: tsunagu
        action: hide

  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票
      - type: narration
        text: "「ユキさんの遠足プログラムを変えたのは誰？」"
      - type: sprite_group
        characters:
          - { id: mamoru, expression: normal }
          - { id: hitomi, expression: normal }
          - { id: task, expression: normal }
          - { id: tsunagu, expression: worried }
      - type: choice
        id: q1
        text: "ユキさんの遠足プログラムを変えたのは誰？"
        options:
          - label: マモル
            value: mamoru
            correct: false
            feedback: "マモルは16時に図書室にいた。変更の時間にPCを使えなかった"
          - label: ヒトミ
            value: hitomi
            correct: false
            feedback: "ヒトミは実行委員ではなく、変更権限がなかった"
          - label: タスク
            value: task
            correct: false
            feedback: "タスクは16時に校庭で練習しており、職員室にいなかった"
          - label: ツナグ
            value: tsunagu
            correct: true
            feedback: "ツナグはユキさんを心配して、善意でプログラムを変えた。でも"あなたのために"と決めつけて、本人に聞かなかった。これを"パターナリズム"という。善意でも、本人の意思を無視したら排除になる。大事なのは"守ること"ではなく"一緒に考えること""
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: hitomi
        action: hide
      - type: sprite
        character: task
        action: hide
      - type: sprite
        character: tsunagu
        action: hide

  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: 真相
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "真相が明かされた。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite
        character: tsunagu
        expression: worried
        position: center
      - type: dialog
        character: tsunagu
        text: "ごめんなさい。"
      - type: sprite
        character: tsunagu
        expression: determined
      - type: dialog
        character: tsunagu
        text: "ごめんなさい。"
      - type: sprite
        character: tsunagu
        action: hide

  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: yamada
        expression: thinking
      - type: dialog
        character: yamada
        text: "今日の学び"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: mamoru, expression: happy }
          - { id: hitomi, expression: happy }
          - { id: task, expression: happy }
          - { id: tsunagu, expression: happy }
      - type: narration
        text: "人権探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: hitomi
        action: hide
      - type: sprite
        character: task
        action: hide
      - type: sprite
        character: tsunagu
        action: hide
      - type: effect
        name: fade-out
        duration: 1000
