scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: health-07/opening
    steps:
      - type: narration
        text: "あおば{小学校|しょうがっこう}5{年|ねん}1{組|くみ}の{保健|ほけん}{委員|いいん}ハルキが「{最近|さいきん}{体調|たいちょう}が{悪|わる}い」と{言|い}われている。"

      - type: narration
        text: "{健康|けんこう}{記録帳|きろくちょう}を{見|み}ると、{就寝|しゅうしん}{時刻|じこく}の{遅|おく}れ・{食事|しょくじ}の{乱|みだ}れ・{運動量|うんどうりょう}の{減少|げんしょう}が2{週間|しゅうかん}{前|まえ}から{連鎖|れんさ}して{崩|くず}れている。"

      - type: bgm
        action: stop

      - type: se
        sound: common/tension

      - type: narration
        speed: slow
        text: "でも「なぜ{崩|くず}れ{始|はじ}めたか」の{原因|げんいん}が、{記録|きろく}には{出|で}てこない。{睡眠|すいみん}{不足|ぶそく}→{集中力|しゅうちゅうりょく}{低下|ていか}→ストレス→さらに{睡眠|すいみん}{不足|ぶそく}——{悪循環|あくじゅんかん}が{回|まわ}り{続|つづ}けている。"

      - type: bgm
        track: health-07/investigation

      - type: sprite
        character: sensei
        expression: worried
        position: center

      - type: dialog
        character: sensei
        text: "「{本当|ほんとう}の{起点|きてん}」を{見|み}つけないと{連鎖|れんさ}は{止|と}まらない。{記録|きろく}に{書|か}かれていることだけじゃなく、「{書|か}かれていないこと」にも{目|め}を{向|む}けよう。"

      - type: sprite
        character: sensei
        action: hide

      - type: sprite_group
        characters:
          - { id: haruki, expression: worried }
          - { id: mio, expression: thinking }
          - { id: kenta, expression: surprised }
          - { id: sayaka, expression: thinking }

      - type: narration
        text: "ハルキ、ミオ、ケンタ、サヤカ——{保健|ほけん}{探偵団|たんていだん}、{調査|ちょうさ}{開始|かいし}。"

      - type: sprite
        character: haruki
        action: hide
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: kenta
        action: hide
      - type: sprite
        character: sayaka
        action: hide

      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        text: 生活習慣の連鎖
        subtitle: 保健探偵団 Vol.7

  # ========================================
  # 証拠カード1: ハルキの健康記録帳
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: health-07/investigation
    steps:
      - type: effect
        name: fade-in
        duration: 500

      - type: title_card
        text: ステップ1：調査
        subtitle: 生活習慣の崩れを追おう

      - type: narration
        text: "ハルキの{健康|けんこう}{記録帳|きろくちょう}（2{週間|しゅうかん}{分|ぶん}）——18{日前|にちまえ}：{就寝|しゅうしん}21:00、{食事|しょくじ}{普通|ふつう}、{運動|うんどう}{多|おお}い、{体調|たいちょう}{良好|りょうこう}。"

      - type: narration
        text: "16{日前|にちまえ}（{月曜日|げつようび}）：{就寝|しゅうしん}22:30、{食事|しょくじ}{少|すく}ない、{運動|うんどう}{少|すく}ない、{体調|たいちょう}やや{悪|わる}い。ここから{急|きゅう}に{崩|くず}れている。"

      - type: narration
        text: "12{日前|にちまえ}：{就寝|しゅうしん}23:00、{食事|しょくじ}{少|すく}ない、{運動|うんどう}なし、{体調|たいちょう}{悪|わる}い。3{日前|にちまえ}：{就寝|しゅうしん}23:10、{体調|たいちょう}{非常|ひじょう}に{悪|わる}い。"

      - type: se
        sound: common/discover

      - type: narration
        speed: slow
        text: "3つの{乱|みだ}れが16{日前|にちまえ}の{月曜日|げつようび}から{一斉|いっせい}に{始|はじ}まっている。でも「なぜ{崩|くず}れたのか」は{記録|きろく}に{書|か}かれていない。"

  # ========================================
  # 証拠カード2: 因果連鎖ワークシート
  # ========================================
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 因果連鎖ワークシート

      - type: narration
        text: "「{情報|じょうほう}{欠落|けつらく}の{認識|にんしき}」——{記録|きろく}に{書|か}かれていないことがあるかもしれない。{何|なに}が{欠|か}けているかを{問|と}い{直|なお}す。"

      - type: narration
        text: "{因果|いんが}{連鎖|れんさ}：{就寝|しゅうしん}{時刻|じこく}が{遅|おく}れた→{睡眠|すいみん}{不足|ぶそく}→{免疫|めんえき}{低下|ていか}・{集中力|しゅうちゅうりょく}{低下|ていか}→{体調|たいちょう}{悪化|あっか}・{勉強|べんきょう}が{滞|とどこお}る→ストレス→さらに{食欲|しょくよく}{低下|ていか}・{睡眠|すいみん}の{質|しつ}{低下|ていか}→{悪循環|あくじゅんかん}。"

      - type: narration
        speed: slow
        text: "{連鎖|れんさ}の「{起点|きてん}」は{就寝|しゅうしん}{時刻|じこく}の{遅|おく}れ。でも「なぜ{遅|おく}れたのか」が{記録|きろく}にない。{記録|きろく}に{書|か}いてあることだけで{考|かんが}えると、{本当|ほんとう}の{答|こた}えには{辿|たど}り{着|つ}けない。"

  # ========================================
  # 証拠カード3: 先生への聞き取り
  # ========================================
  - id: evidence-3
    bgm: health-07/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 先生への聞き取りメモ

      - type: narration
        text: "{担任|たんにん}の{安田|やすだ}{先生|せんせい}への{聞|き}き{取|と}り——「{保健|ほけん}{委員|いいん}は2{人|にん}1{組|くみ}で、クラス{全員|ぜんいん}30{人分|にんぶん}の{健康|けんこう}{記録|きろく}を{入力|にゅうりょく}する{仕事|しごと}を{担当|たんとう}しています」"

      - type: narration
        text: "「{実|じつ}は2{学期|がっき}の{途中|とちゅう}で{田中|たなか}さんが{転校|てんこう}してしまって。ハルキくんに{補充|ほじゅう}を{提案|ていあん}したんですが、'{自分|じぶん}でできます'と{言|い}うので{任|まか}せてしまいました」"

      - type: narration
        text: "「1{人|り}で30{人分|にんぶん}の{記録|きろく}を{入力|にゅうりょく}するのは、{慣|な}れても1〜2{時間|じかん}かかるかもしれません」"

      - type: sprite
        character: sayaka
        expression: surprised
        position: right

      - type: dialog
        character: sayaka
        text: "{待|ま}って。16{日前|にちまえ}の{月曜日|げつようび}は、{田中|たなか}さんの{転校|てんこう}の{翌週|よくしゅう}の{最初|さいしょ}の{登校日|とうこうび}。つまりその{週|しゅう}から、ハルキが1{人|り}で30{人分|にんぶん}の{記録|きろく}を{入力|にゅうりょく}し{始|はじ}めた……。"

      - type: sprite
        character: sayaka
        action: hide

      - type: se
        sound: common/discover

      - type: narration
        speed: slow
        text: "{就寝|しゅうしん}{時刻|じこく}が{遅|おく}れた「{本当|ほんとう}の{原因|げんいん}」——{毎晩|まいばん}21{時|じ}〜23{時|じ}の2{時間|じかん}、{保健|ほけん}{委員|いいん}の{記録|きろく}{作業|さぎょう}。でもこの{事実|じじつ}は{健康|けんこう}{記録帳|きろくちょう}に{記録|きろく}されない。"

  # ========================================
  # 証拠カード4: ハルキの記録入力ノート
  # ========================================
  - id: evidence-4
    bgm: health-07/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: ハルキの記録入力ノート

      - type: sprite
        character: kenta
        expression: thinking
        position: left

      - type: dialog
        character: kenta
        text: "{放課後|ほうかご}、ハルキがいつも{教室|きょうしつ}に{残|のこ}ってるの{見|み}かけてた。ノートを{開|ひら}いてたから{覗|のぞ}いたら、{名前|なまえ}がびっしり30{人分|にんぶん}{書|か}いてあった。「{保健|ほけん}{委員|いいん}の{仕事|しごと}？」って{聞|き}いたら「うん」ってだけ。"

      - type: sprite
        character: kenta
        action: hide

      - type: narration
        text: "ハルキの{補足|ほそく}——「30{人分|にんぶん}の{記録|きろく}を{手書|てが}きで{整理|せいり}して、{放課後|ほうかご}と{夜|よる}に{入力|にゅうりょく}している。1{回|かい}1〜2{時間|じかん}かかる」"

      - type: narration
        text: "そして——ハルキ{自身|じしん}の{健康|けんこう}{記録帳|きろくちょう}には「{保健|ほけん}{委員|いいん}の{記録|きろく}{入力|にゅうりょく}をした」という{欄|らん}がない。21{時|じ}〜23{時|じ}の2{時間|じかん}が{記録|きろく}{入力|にゅうりょく}の{時間|じかん}でも、{記録帳|きろくちょう}の「{就寝|しゅうしん}{時刻|じこく}」{欄|らん}に{書|か}く{内容|ないよう}がない。"

      - type: effect
        name: flash
        duration: 300

      - type: narration
        speed: slow
        text: "{記録|きろく}の{仕組|しく}み{自体|じたい}に「{書|か}けない{項目|こうもく}」があった。ハルキは{隠|かく}していたのではなく、{記録|きろく}できなかったのだ。"

  # ========================================
  # 投票
  # ========================================
  - id: questions
    bg: classroom
    bgm: health-07/tension
    steps:
      - type: sprite
        character: sensei
        expression: worried
        position: center

      - type: dialog
        character: sensei
        text: "{記録|きろく}に{書|か}かれていることと、{書|か}かれていないこと。{因果|いんが}{連鎖|れんさ}の{起点|きてん}は{何|なに}だった？"

      - type: sprite
        character: sensei
        action: hide

      - type: choice
        id: q1
        question: ハルキの体調悪化の本当の起点は？
        options:
          - text: "{保健|ほけん}{委員|いいん}の{記録|きろく}{入力|にゅうりょく}を1{人|り}で{引|ひ}き{受|う}けたこと"
            value: overwork
            feedback: "{正解|せいかい}！ {毎晩|まいばん}1〜2{時間|じかん}の{入力|にゅうりょく}{作業|さぎょう}が{就寝|しゅうしん}{時刻|じこく}を{遅|おく}らせ、{睡眠|すいみん}{不足|ぶそく}→{体調|たいちょう}{悪化|あっか}の{連鎖|れんさ}を{引|ひ}き{起|お}こした。しかもこの{事実|じじつ}は{記録|きろく}に{書|か}けなかった。"
          - text: "ゲームのやりすぎ"
            value: gaming
            feedback: "ハルキの{記録|きろく}に「ゲーム」の{記述|きじゅつ}はない。{就寝|しゅうしん}{時刻|じこく}が{遅|おく}れた{理由|りゆう}は{記録|きろく}に{出|で}てこない{別|べつ}の{要因|よういん}——{保健|ほけん}{委員|いいん}の{仕事|しごと}だったよ。"
          - text: "{勉強|べんきょう}のストレス"
            value: study
            feedback: "{勉強|べんきょう}のストレスは{結果|けっか}であって{起点|きてん}ではない。{睡眠|すいみん}{不足|ぶそく}→{集中力|しゅうちゅうりょく}{低下|ていか}→{勉強|べんきょう}のやり{直|なお}し→ストレス——この{連鎖|れんさ}の{最初|さいしょ}は「なぜ{睡眠|すいみん}{不足|ぶそく}になったか」だよ。"
          - text: "{風邪|かぜ}をひいた"
            value: cold
            feedback: "{体調|たいちょう}{悪化|あっか}は{風邪|かぜ}の{症状|しょうじょう}（{発熱|はつねつ}・{咳|せき}）ではなく、{生活習慣|せいかつしゅうかん}の{乱|みだ}れからくる{症状|しょうじょう}（だるい・{集中|しゅうちゅう}できない・{食欲|しょくよく}{低下|ていか}）。{起点|きてん}は{生活習慣|せいかつしゅうかん}の{崩|くず}れだよ。"

      - type: choice
        id: q2
        question: なぜハルキは助けを求めなかった？
        options:
          - text: "{先生|せんせい}や{友達|ともだち}に{迷惑|めいわく}をかけたくなかったから"
            value: burden
            feedback: "{正解|せいかい}。ハルキは「{自分|じぶん}でできます」と{言|い}って{補充|ほじゅう}を{断|ことわ}った。{迷惑|めいわく}をかけたくない{気持|きも}ちが、ハルキ{自身|じしん}の{健康|けんこう}を{蝕|むしば}んでいた。"
          - text: "1{人|り}でできると{思|おも}っていたから"
            value: confidence
            feedback: "{近|ちか}い{答|こた}え。でも{本質|ほんしつ}は「できる」と{信|しん}じていたのではなく「{頼|たの}ったら{迷惑|めいわく}になる」と{思|おも}っていたこと。{責任|せきにん}を{背負|せお}いすぎた。"
          - text: "{保健|ほけん}{委員|いいん}の{仕事|しごと}が{好|す}きだったから"
            value: enjoy
            feedback: "{仕事|しごと}への{責任感|せきにんかん}はあった。でも{毎晩|まいばん}2{時間|じかん}、{体調|たいちょう}を{崩|くず}してまで{続|つづ}けるのは「{好|す}き」ではなく「{背負|せお}いすぎ」。{助|たす}けを{求|もと}めることも{大切|たいせつ}な{力|ちから}。"
          - text: "{誰|だれ}も{気|き}づいてくれなかったから"
            value: unnoticed
            feedback: "ミオはハルキの{変化|へんか}に{気|き}づいていた。でもハルキが「よく{分|わ}からない」と{繰|く}り{返|かえ}すから、{踏|ふ}み{込|こ}めなかった。「{助|たす}けて」と{言|い}うのもまた{勇気|ゆうき}。"

  # ========================================
  # 証拠カード5: 記録に出ない情報
  # ========================================
  - id: evidence-5
    bg: classroom
    bgm: health-07/emotional
    steps:
      - type: effect
        name: fade-out
        duration: 500

      - type: effect
        name: fade-in
        duration: 500

      - type: sprite
        character: mio
        expression: determined
        position: center

      - type: dialog
        character: mio
        text: "ずっと{引|ひ}っかかってた。{記録|きろく}に{書|か}いてあることだけじゃ{分|わ}からないことがある。ハルキの{記録帳|きろくちょう}に「{保健|ほけん}{委員|いいん}の{仕事|しごと}」っていう{欄|らん}はないの。"

      - type: sprite
        character: mio
        action: hide

      - type: narration
        text: "{記録|きろく}は{完全|かんぜん}ではない。「{何|なに}が{記録|きろく}されているか」だけでなく「{何|なに}が{記録|きろく}されていないか」——その{視点|してん}が{必要|ひつよう}だった。"

      - type: narration
        speed: slow
        text: "{就寝|しゅうしん}{時刻|じこく}の{遅|おく}れの{原因|げんいん}は、{健康|けんこう}{記録帳|きろくちょう}のどこにも{書|か}けなかった。「{記録|きろく}にないこと」こそが、{謎|なぞ}の{核心|かくしん}だった。"

      - type: wait
        duration: 1500

  # ========================================
  # 真実 — ハルキ
  # ========================================
  - id: truth-haruki
    bg: classroom
    bgm: health-07/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        text: 真実

      - type: effect
        name: fade-in
        duration: 500

      - type: sprite
        character: haruki
        expression: worried
        position: left

      - type: dialog
        character: haruki
        text: "……{田中|たなか}さんが{転校|てんこう}してから、30{人分|にんぶん}の{記録|きろく}{入力|にゅうりょく}を1{人|り}でやってた。{毎晩|まいばん}21{時|じ}から23{時|じ}まで。"

      - type: dialog
        character: haruki
        text: "{先生|せんせい}に「{補充|ほじゅう}を{選|えら}ぼうか」って{言|い}われたけど、「{自分|じぶん}でできます」って{断|ことわ}っちゃった。{誰|だれ}かに{頼|たの}んだら{迷惑|めいわく}をかけるって{思|おも}ったから。"

      - type: sprite
        character: kenta
        expression: surprised
        position: right

      - type: dialog
        character: kenta
        text: "なんで1{人|り}でやってたんだよ！ {言|い}ってくれたら{手伝|てつだ}ったのに！"

      - type: sprite
        character: kenta
        action: hide

      - type: dialog
        character: haruki
        expression: determined
        text: "……ごめん。「{迷惑|めいわく}をかけたくない」って{気持|きも}ちが、{自分|じぶん}の{体|からだ}を{壊|こわ}してた。{助|たす}けてって{言|い}えばよかった。"

      - type: sprite
        character: haruki
        action: hide

      - type: narration
        text: "ハルキの{動機|どうき}は「{責任|せきにん}を{背負|せお}いすぎた」こと。「{迷惑|めいわく}をかけたくない」が、{自分自身|じぶんじしん}の{健康|けんこう}を{蝕|むしば}んでいた。"

  # ========================================
  # 真実 — ミオ
  # ========================================
  - id: truth-mio
    steps:
      - type: sprite
        character: mio
        expression: worried
        position: right

      - type: dialog
        character: mio
        text: "ハルキがずっと「よく{分|わ}からない」って{言|い}うから、{踏|ふ}み{込|こ}めなかった。でも「{記録|きろく}に{書|か}けないこと」があるなんて、{考|かんが}えもしなかった。"

      - type: dialog
        character: mio
        expression: determined
