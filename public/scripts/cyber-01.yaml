scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "5{年|ねん}2{組|くみ}のタブレット{端末|たんまつ}に、「{学校|がっこう}{情報|じょうほう}センター」からメールが{届|とど}いた。"
      - type: narration
        text: "「{学校|がっこう}アンケートのお{願|ねが}い」——{リンク|りんく}をクリックすると、{名前|なまえ}と{パスワード|ぱすわーど}を{入力|にゅうりょく}する{画面|がめん}が{表示|ひょうじ}される。"
      - type: se
        sound: phone
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "**ガードが「{先生|せんせい}からのアンケートだと{思|おも}った」とリンクをクリックし、{名前|なまえ}と{パスワード|ぱすわーど}を{入力|にゅうりょく}してしまった。**"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "たいへん！　{翌日|よくじつ}、{本物|ほんもの}の{学校|がっこう}{情報|じょうほう}センターが「そんなメールは{送|おく}っていない」と{否定|ひてい}したの。{誰|だれ}かがクラスのメーリングリストを{使|つか}って{偽|にせ}メールを{送|おく}ったのよ。"
        expression: worried
      - type: dialog
        character: yamada
        text: "ネット{探偵団|たんていだん}に{調査|ちょうさ}をお{願|ねが}いしたいわ。{偽|にせ}メールを{送|おく}ったのは{誰|だれ}か——{証拠|しょうこ}を{集|あつ}めて{真相|しんそう}を{解|と}き{明|あか}かしてください。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: netto
            expression: thinking
          - character: pasu
            expression: thinking
          - character: rogu
            expression: worried
          - character: gado
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{偽|にせ}メールで{パスワード|ぱすわーど}が{盗|ぬす}まれたかもしれない——{事件|じけん}は{深刻|しんこく}だった。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: にせものメール
        subtitle: ネット探偵団 Vol.1

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 偽メールの正体を調べる
      - type: narration
        text: "{偽|にせ}メールのスクリーンショット——{差出人|さしだしにん}は「{学校|がっこう}{情報|じょうほう}センター」。{本文|ほんぶん}に{アンケート|あんけーと}の{リンク|りんく}が{貼|は}られている。"
      - type: narration
        text: "{本物|ほんもの}の{学校|がっこう}メールと{並|なら}べると——{差出人|さしだしにん}{欄|らん}のアドレスが{微妙|びみょう}に{違|ちが}う。{見|み}ただけでは{分|わ}かりにくい。"
      - type: evidence
        id: card-1
        title: 偽メールのスクリーンショット
        content: "{差出人|さしだしにん}「{学校|がっこう}{情報|じょうほう}センター」、{本文|ほんぶん}にアンケートリンク。{本物|ほんもの}との{比較表|ひかくひょう}: ①{差出人|さしだしにん}アドレスが{似|に}ているが{異|こと}なる ②{リンク先|りんくさき}URLが{微妙|びみょう}に{違|ちが}う ③「{急|いそ}いで{回答|かいとう}してください」という{不自然|ふしぜん}な{言葉|ことば}"
      - type: sprite
        character: netto
        expression: thinking
        position: left
      - type: dialog
        character: netto
        text: "このメール……{差出人|さしだしにん}の{名前|なまえ}は「{学校|がっこう}{情報|じょうほう}センター」になってるけど、アドレスをよく{見|み}ると……なんか{怪|あや}しい。{本物|ほんもの}のアドレスと{比|くら}べてみたい。"
        expression: worried
      - type: sprite
        character: netto
        action: hide
      - type: narration
        text: "{フィッシング|ふぃっしんぐ}メールの3つのチェックポイント——①{差出人|さしだしにん}アドレスの{確認|かくにん}　②URLの{確認|かくにん}　③{本文|ほんぶん}の{不自然|ふしぜん}さ。この3つを{確認|かくにん}すれば、{偽|にせ}メールを{見|み}つけられる。"
      - type: evidence
        id: card-2
        title: フィッシングメールの3つのチェックポイント
        content: "①{差出人|さしだしにん}アドレスを{確認|かくにん}——{本物|ほんもの}と1{文字|もじ}でも{違|ちが}えば{偽物|にせもの}。②{リンク先|りんくさき}URLを{確認|かくにん}——{公式|こうしき}ドメインと{違|ちが}う{場合|ばあい}は{危険|きけん}。③{本文|ほんぶん}の{不自然|ふしぜん}な{言葉|ことば}——「{急|いそ}いで」「{今|いま}すぐ{入力|にゅうりょく}」は{要注意|ようちゅうい}。"
      - type: sprite
        character: pasu
        expression: happy
        position: right
      - type: dialog
        character: pasu
        text: "チェックポイントが{分|わ}かれば{見|み}つけられる！　このメールの{リンク先|りんくさき}URLを{調|しら}べてみよう。{本物|ほんもの}の{学校|がっこう}サイトのアドレスと{比|くら}べれば——"
        expression: determined
      - type: sprite
        character: pasu
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 送信元を追う
      - type: sprite
        character: netto
        expression: surprised
        position: left
      - type: dialog
        character: netto
        text: "URLをよく{見|み}て！　{公式|こうしき}は「gakko.ed.jp」——でも{偽|にせ}メールのリンク先は「gakk**0**.ed.jp」になってる！　oじゃなくて{数字|すうじ}の0だ！"
        expression: determined
      - type: sprite
        character: netto
        action: hide
      - type: evidence
        id: card-3
        title: メールのヘッダー情報
        content: "{送信元|そうしんもと}IPアドレス: {校内|こうない}Wi-Fiからの{送信|そうしん}。{送信|そうしん}{時刻|じこく}: {火曜日|かようび}16:05。{リンク先|りんくさき}URL: gakk0.ed.jp（{公式|こうしき}はgakko.ed.jp——oが{数字|すうじ}の0に{変|か}わっている）"
      - type: sprite
        character: pasu
        expression: happy
        position: right
      - type: dialog
        character: pasu
        text: "{送信元|そうしんもと}が{校内|こうない}Wi-Fiだ。{外部|がいぶ}からじゃない！　つまり——このメールは{学校|がっこう}の{中|なか}から{送|おく}られている。{犯人|はんにん}はクラスの{誰|だれ}かよ。"
        expression: determined
      - type: sprite
        character: pasu
        action: hide
      - type: sprite
        character: rogu
        expression: thinking
        position: left
      - type: dialog
        character: rogu
        text: "{送信|そうしん}{時刻|じこく}は{火曜日|かようび}の16:05。その{時間|じかん}に{教室|きょうしつ}にいた{人|ひと}を{調|しら}べれば、{犯人|はんにん}を{絞|しぼ}り{込|こ}める。ログは{嘘|うそ}をつかない——"
        expression: determined
      - type: sprite
        character: rogu
        action: hide
      - type: evidence
        id: card-4
        title: 端末操作ログ
        content: "{火曜日|かようび}16:05に{教室|きょうしつ}にいたのは{ガード|がーど}と{ネット|ねっと}の2{人|にん}だけ。{ネット|ねっと}はその{時間|じかん}に{タブレット|たぶれっと}で{別|べつ}の{作業|さぎょう}をしていた{記録|きろく}がある。→{送信|そうしん}{時刻|じこく}に{端末|たんまつ}を{自由|じゆう}に{使|つか}えた{人物|じんぶつ}は1{人|り}だけ。"

  # ==================== 中間点 ====================
  - id: midpoint
    bg: classroom
    bgm: thinking-time
    steps:
      - type: narration
        text: "{証拠|しょうこ}が{揃|そろ}ってきた。{送信元|そうしんもと}は{校内|こうない}Wi-Fi——{犯人|はんにん}はクラスの{誰|だれ}か。{火曜日|かようび}16:05に{教室|きょうしつ}にいたのは{ガード|がーど}と{ネット|ねっと}の2{人|にん}だけ。"
      - type: sprite
        character: rogu
        expression: worried
        position: right
      - type: dialog
        character: rogu
        text: "{ネット|ねっと}はその{時間|じかん}に{別|べつ}の{作業|さぎょう}をしていた{記録|きろく}がある。ということは——{送信|そうしん}{時刻|じこく}に{端末|たんまつ}を{自由|じゆう}に{使|つか}えたのは……1{人|り}だけ。でも、なぜ{偽|にせ}メールを{送|おく}ったのか{理由|りゆう}が{分|わ}からない。"
        expression: worried
      - type: sprite
        character: rogu
        action: hide
      - type: sprite
        character: gado
        expression: worried
        position: left
      - type: dialog
        character: gado
        text: "わ、{私|わたし}は{被害者|ひがいしゃ}で……{先生|せんせい}からのアンケートだと{思|おも}ってクリックしたんです。{本当|ほんとう}に{信|しん}じてたんだから！　{誰|だれ}が{送|おく}ったんでしょうね……"
        expression: worried
      - type: sprite
        character: gado
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: ガードの端末の下書き
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "ガードの{端末|たんまつ}を{確認|かくにん}したら……{偽|にせ}メールの{下書|したが}きが{残|のこ}っていたわ。ガードに{聞|き}いたら「{練習|れんしゅう}のつもりで{作|つく}った。まさか{自分|じぶん}が{引|ひ}っかかるとは……」と{言|い}っていたの。"
        expression: surprised
      - type: dialog
        character: yamada
        text: "ガードは{先週|せんしゅう}の{情報|じょうほう}の{授業|じゅぎょう}で「{フィッシング|ふぃっしんぐ}メール」の{話|はなし}を{聞|き}いた。「{自分|じぶん}が{引|ひ}っかかるか{実験|じっけん}してみたい」と{思|おも}って、{練習用|れんしゅうよう}のつもりで{偽|にせ}メールを{作成|さくせい}してクラスに{送信|そうしん}したのよ。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: evidence
        id: card-5
        title: ガードの端末から発見された下書き
        content: "{偽|にせ}メールの{下書|したが}きが{保存|ほぞん}されていた。{先生|せんせい}のメモ:「ガードに{聞|き}いたら"練習のつもりで{作|つく}った。まさか{自分|じぶん}が{引|ひ}っかかるとは……"と{言|い}った。{送信|そうしん}から{数日後|すうじつご}にメールの{存在|そんざい}を{忘|わす}れていて、{本物|ほんもの}そっくりに{作|つく}りすぎて{自分|じぶん}で{信|しん}じてしまった」"
      - type: sprite
        character: netto
        expression: surprised
        position: left
      - type: dialog
        character: netto
        text: "{送|おく}った{本人|ほんにん}が……{自分|じぶん}のメールに{引|ひ}っかかった？！　{本物|ほんもの}そっくりに{作|つく}りすぎて……{自分|じぶん}でも{見分|みわ}けられなくなったってこと？"
        expression: surprised
      - type: sprite
        character: netto
        action: hide
      - type: se
        sound: reveal
      - type: narration
        text: "**{偽|にせ}メールの{送信者|そうしんしゃ}と{フィッシング|ふぃっしんぐ}の{被害者|ひがいしゃ}が{同一人物|どういつじんぶつ}——「{自分|じぶん}は{騙|だま}されない」という{思|おも}い{込|こ}みが{最大|さいだい}の{落|お}とし{穴|あな}だった。**"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: confrontation
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 偽メールを送ったのは誰？
      - type: sprite
        character: rogu
        expression: determined
        position: left
      - type: dialog
        character: rogu
        text: "{証拠|しょうこ}を{整理|せいり}しよう。{送信元|そうしんもと}は{校内|こうない}Wi-Fi——{外部|がいぶ}からじゃない。{送信|そうしん}{時刻|じこく}に{教室|きょうしつ}にいたのは2{人|にん}。{ネット|ねっと}は{別|べつ}の{作業|さぎょう}の{記録|きろく}がある。そして{端末|たんまつ}には{下書|したが}きが{残|のこ}っていた——"
        expression: determined
      - type: sprite
        character: rogu
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整|ととの}えよう。①{送信元|そうしんもと}は{校内|こうない}Wi-Fi（{外部|がいぶ}からではない）。②{送信|そうしん}{時刻|じこく}16:05に{教室|きょうしつ}にいたのは{ガード|がーど}と{ネット|ねっと}の2{人|にん}。③{ネット|ねっと}は{別|べつ}の{作業|さぎょう}の{記録|きろく}がある。④{ガード|がーど}の{端末|たんまつ}に{偽|にせ}メールの{下書|したが}きが{残|のこ}っていた。⑤「{練習|れんしゅう}のつもりで{作|つく}った」という{本人|ほんにん}の{言葉|ことば}。"
      - type: choice
        id: q1
        question: 偽メールを送ったのは誰？
        options:
          - text: ガード（練習のつもりで作った偽メールに、自分が引っかかった）
            value: gado
            correct: true
            feedback: "{正解|せいかい}！　ガードは「フィッシングに{引|ひ}っかかるか{実験|じっけん}してみたい」と{練習用|れんしゅうよう}のつもりで{偽|にせ}メールを{作|つく}った。でも{数日後|すうじつご}に{自分|じぶん}のメールを{本物|ほんもの}と{思|おも}い{込|こ}んでクリックしてしまった。**「{自分|じぶん}は{騙|だま}されない」と{思|おも}っている{人|ひと}ほど{危|あぶ}ない。フィッシングの{手口|てぐち}を{知|し}ることが{最大|さいだい}の{防御|ぼうぎょ}だよ。**"
          - text: ネット（URLの偽装に最初に気づいた人）
            value: netto
            feedback: "{ネット|ねっと}は{送信|そうしん}{時刻|じこく}に{別|べつ}の{作業|さぎょう}をしていた{記録|きろく}がある。{偽|にせ}メールのURLの{偽装|ぎそう}に{気|き}づいてくれた{側|がわ}だよ。"
          - text: パス（メールのヘッダー情報を分析した人）
            value: pasu
            feedback: "{パス|ぱす}は{送信元|そうしんもと}が{校内|こうない}Wi-Fiだと{突|つ}き{止|と}めてくれた{側|がわ}。{犯人|はんにん}を{絞|しぼ}り{込|こ}む{手助|てだす}けをしたよ。"
          - text: ログ（端末の操作ログを確認した人）
            value: rogu
            feedback: "{ログ|ろぐ}は{操作|そうさ}{記録|きろく}で{消去法|しょうきょほう}を{完成|かんせい}させてくれた{側|がわ}。「ログは{嘘|うそ}をつかない」という{正義感|せいぎかん}が{事件|じけん}を{解決|かいけつ}に{導|みちび}いたよ。"

  # ==================== 真相：ガードの告白 ====================
  - id: truth-gado
    bg: classroom
    bgm: emotional
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真相
        subtitle: ガードの気持ち
      - type: effect
        name: fade-in
      - type: sprite
        character: gado
        expression: worried
        position: center
      - type: dialog
        character: gado
        text: "……{私|わたし}が{送|おく}りました。{先週|せんしゅう}の{情報|じょうほう}の{授業|じゅぎょう}で{フィッシング|ふぃっしんぐ}の{話|はなし}を{聞|き}いて——「{本当|ほんとう}に{引|ひ}っかかるのかな？」って{実験|じっけん}したくなって。"
        expression: worried
      - type: dialog
        character: gado
        text: "{練習用|れんしゅうよう}のつもりだったから、{誰|だれ}かを{騙|だま}そうとは{思|おも}ってなかった。でも……{本物|ほんもの}そっくりに{作|つく}りすぎて、{数日後|すうじつご}に{自分|じぶん}で{受信|じゅしん}したとき、{送|おく}ったこと{忘|わす}れてたんです。"
        expression: thinking
      - type: dialog
        character: gado
        text: "「{自分|じぶん}は{騙|だま}されない」って{思|おも}ってたのに……{自分|じぶん}が{一番|いちばん}{危|あぶ}なかった。ごめんなさい。"
        expression: worried
      - type: sprite
        character: gado
        action: hide

  # ==================== 真相：他のメンバーの反応 ====================
  - id: truth-others
    bg: classroom
    bgm: emotional
    steps:
      - type: sprite
        character: netto
        expression: thinking
        position: left
      - type: dialog
        character: netto
        text: "{クリック|くりっく}したくなる{気持|きも}ちは……{分|わ}かる。{本物|ほんもの}そっくりだったんだから。でも{URLを|うるるを}{一文字|ひともじ}だけ{変|か}えるなんて——チェックポイントを{知|し}ってないと{見|み}つけられないよね。"
        expression: thinking
      - type: sprite
        character: netto
        action: hide
      - type: sprite
        character: pasu
        expression: normal
        position: right
      - type: dialog
        character: pasu
        text: "{送信元|そうしんもと}が{校内|こうない}Wi-Fiだと{分|わ}かったとき、「{外部|がいぶ}からじゃない＝クラスの{誰|だれ}か」って{絞|しぼ}れた。でも{送|おく}った{本人|ほんにん}が{引|ひ}っかかるとは……{予想|よそう}{外|がい}だった。"
        expression: normal
      - type: sprite
        character: pasu
        action: hide
      - type: sprite
        character: rogu
