      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "総合学習で作った「全国の祭り紹介カード」（10枚）を発表会の前日に確認していると、複数のカードに「他の地域の祭りと混同した誤情報」が書かれていた。"
      - type: narration
        text: "「青森のねぶた祭り」の説明に「徳島の阿波おどり」の特徴が混入、「博多祇園山笠」の説明に「京都の祇園祭」の特徴が混入——誰が、なぜ情報を混同したのか。"
      - type: narration
        text: "各地域の祭りの特徴を正確に知らないと「どれが誤情報か」が判定できない。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: kanade
        expression: worried
        position: center
      - type: dialog
        character: kanade
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: kanade
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: determined }
          - { id: kanade, expression: thinking }
          - { id: ibuki, expression: thinking }
          - { id: kotono, expression: worried }
      - type: narration
        text: "「伝統文化探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "伝統文化探偵団"
        subtitle: "Vol.9 ふるさとの祭り"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: tsumugi
        expression: thinking
        position: left
      - type: dialog
        character: tsumugi
        text: "10枚のカードのエラーパターンを帰納的に分類し、「体系的な混同が1箇所に集中している」を発見する場面"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        expression: worried
        position: right
      - type: dialog
        character: kanade
        text: "追加HO発見後、「旅行で実際に見たから分かると思っていた。でも他の祭りと混同していた」と認める瞬間"
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        expression: thinking
        position: left
      - type: dialog
        character: ibuki
        text: "書き換えの文体・書き方の特徴から「複数カードが同一人物の手によるもの」を指摘する場面"
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        expression: thinking
        position: right
      - type: dialog
        character: kotono
        text: "真相後、「どの地域の祭りにもその地域の人たちの誇りがある。正確に伝えることが敬意なんだね」と伝える場面"
      - type: sprite
        character: kotono
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「祭りカードを記憶だけで書き直して誤情報を入れたのは誰？」"
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: normal }
          - { id: kanade, expression: normal }
          - { id: ibuki, expression: normal }
          - { id: kotono, expression: worried }
      - type: choice
        id: q1
        text: "祭りカードを記憶だけで書き直して誤情報を入れたのは誰？"
        options:
          - label: "ツムギ"
            value: tsumugi
            correct: false
            feedback: "ツムギは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "カナデ"
            value: kanade
            correct: true
            feedback: "カナデの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - label: "イブキ"
            value: ibuki
            correct: false
            feedback: "イブキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "コトノ"
            value: kotono
            correct: false
            feedback: "コトノは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、カナデ（奏）"
      - type: dialog
        character: sensei
        text: "動機は、#12 約束を守る — カナデは発表会の前日、「より分かりやすい説明にしよう」と思い、複数の祭りカードを参考書なしで「記憶だけ」で書き直した。カナデは旅行でいくつかの地域の祭りに実際に行ったことがあり、「自分は体験しているから大丈夫」という自信があった。しかしカナデの記憶は複数の祭りが混同されており、「山車のある祭り」「踊りの祭り」という特徴が地域をまたいで入れ替わっていた。「みんなのために発表をよくしようとした約束を守った」つもりが、誤情報を生んだ。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kanade
        expression: worried
        position: center
      - type: dialog
        character: kanade
        text: "追加HO発見後、「旅行で実際に見たから分かると思っていた。でも他の祭りと混同していた」と認める瞬間"
      - type: sprite
        character: kanade
        expression: determined
      - type: dialog
        character: kanade
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: kanade
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 日本各地の主要な祭りの特徴（ねぶた=山車/灯籠型, 阿波おどり=踊り, 祇園祭=山鉾/山車, 博多祇園山笠=山笠担ぎ, 秋田竿燈まつり=灯籠）の違いを理解し、地域文化の多様性を尊重する\n・**サブ**: 帰納法スキル——複数のカードのエラーパターンを比較し、「一人が体系的に書き換えた」という結論を導く"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: tsumugi, expression: happy }
          - { id: kanade, expression: happy }
          - { id: ibuki, expression: happy }
          - { id: kotono, expression: happy }
      - type: narration
        text: "伝統文化探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kotono
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
