meta:
  id: data-06
  title: かくれたグループ
  series: データ探偵団
  volume: 6
  estimatedMinutes: 18

characters:
  hyou:
    name: ヒョウ
    color: "#4169E1"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  suu:
    name: スウ
    color: "#FF4444"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  graph:
    name: グラフ
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  matome:
    name: マトメ
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  yamada:
    name: 山田先生
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "新しい{教|おし}え{方|かた}をためしたあと、こんな{報告|ほうこく}が出ました。"
      - type: narration
        text: "「{全体平均|ぜんたいへいきん}が68点から65点に下がった。新しい方法はダメです」"
      - type: narration
        text: "その{報告|ほうこく}を聞いて、みんなはしょんぼりしました。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: matome
        expression: worried
        position: center
      - type: dialog
        character: matome
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: matome
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "{{落|お}}ち{{着|つ}}いて。みんなで{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみよう。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: determined }
          - { id: suu, expression: thinking }
          - { id: graph, expression: thinking }
          - { id: matome, expression: worried }
      - type: narration
        text: "「データ探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: データ探偵団
        subtitle: Vol.6 かくれたグループ

  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: ステップ1
        subtitle: 調査
      - type: narration
        text: "マトメの報告書"
      - type: se
        sound: discover

  - id: evidence-2
    steps:
      - type: narration
        text: "シンプソンのパラドックス説明カード"
      - type: se
        sound: discover

  - id: evidence-3
    steps:
      - type: narration
        text: "全体データ"
      - type: se
        sound: discover

  - id: evidence-4
    steps:
      - type: narration
        text: "グループ別データ"
      - type: se
        sound: discover

  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: ステップ2
        subtitle: 反転
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "先生のメモ"
      - type: se
        sound: discover
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: yamada
        action: hide

  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: hyou
        expression: thinking
        position: left
      - type: dialog
        character: hyou
        text: "ヒョウの考えを述べる"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        expression: thinking
        position: right
      - type: dialog
        character: suu
        text: "スウの考えを述べる"
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        expression: thinking
        position: left
      - type: dialog
        character: graph
        text: "グラフの考えを述べる"
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        expression: worried
        position: right
      - type: dialog
        character: matome
        text: "マトメの考えを述べる"
      - type: sprite
        character: matome
        action: hide

  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票
      - type: narration
        text: "「\"新しい方法はダメ\"と間違った結論を出したのは誰？」"
      - type: sprite_group
        characters:
          - { id: hyou, expression: normal }
          - { id: suu, expression: normal }
          - { id: graph, expression: normal }
          - { id: matome, expression: worried }
      - type: choice
        id: q1
        text: "\"新しい方法はダメ\"と間違った結論を出したのは誰？"
        options:
          - label: ヒョウ
            value: hyou
            correct: false
            feedback: "ヒョウは{調査|ちょうさ}をした{側|がわ}だよ。"
          - label: スウ
            value: suu
            correct: false
            feedback: "スウは{調査|ちょうさ}をした{側|がわ}だよ。"
          - label: グラフ
            value: graph
            correct: false
            feedback: "グラフは{調査|ちょうさ}をした{側|がわ}だよ。"
          - label: マトメ
            value: matome
            correct: true
            feedback: "全体の数字は嘘ではない。でもグループ別に見ると全員が上がっていた。全体と部分で結論が逆転する——これをシンプソンのパラドックスという。データは\"分けて見る\"ことも大事"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide

  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: 真相
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "真相が明かされた。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite
        character: matome
        expression: worried
        position: center
      - type: dialog
        character: matome
        text: "ごめんなさい。"
      - type: sprite
        character: matome
        expression: determined
      - type: dialog
        character: matome
        text: "ごめんなさい。"
      - type: sprite
        character: matome
        action: hide

  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: yamada
        expression: thinking
      - type: dialog
        character: yamada
        text: "・証拠カード1より、マトメは全体平均68→65だけを見て「ダメ」と報告したとわかる。\n・証拠カード2より、全体とグループ別で結論が逆になることがあり、人数のちがいも大事だとわかる。\n・証拠カード3より、全体平均は本当に68→65で下がっているとわかる。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: happy }
          - { id: suu, expression: happy }
          - { id: graph, expression: happy }
          - { id: matome, expression: happy }
      - type: narration
        text: "データ探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 1000
