scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校|がっこう}の{美術展|びじゅつてん}。テーマは「{自分|じぶん}の{好|す}きな{美術|びじゅつ}{様式|ようしき}で{描|か}く」。4{人|にん}はそれぞれ{違|ちが}う{様式|ようしき}を{選|えら}んだ。"
      - type: narration
        text: "サクラ: {写実|しゃじつ}{主義|しゅぎ}。タクミ: {抽象画|ちゅうしょうが}。ニジカ: フォーヴィスム。**ユウ: {印象派|いんしょうは}**。"
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ユウの{絵|え}、{印象派|いんしょうは}のはずなのに、{一部|いちぶ}の{描|か}き{方|かた}が**{写実|しゃじつ}{主義|しゅぎ}みたい**。1{枚|まい}の{絵|え}に2つの{正反対|せいはんたい}の{様式|ようしき}が{混|ま}ざっているのは{不自然|ふしぜん}ね。"
        expression: thinking
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "\"{大事|だいじ}な{知識|ちしき}——{印象派|いんしょうは}={短|みじか}い{筆触|ひっしょく}で{光|ひかり}を{表現|ひょうげん}、{輪郭|りんかく}がぼんやり。{写実|しゃじつ}{主義|しゅぎ}={正確|せいかく}に{描|か}く、{筆跡|ひっせき}をなめらかに{消|け}す。**{正反対|せいはんたい}の{技法|ぎほう}**。"
      - type: effect
        name: fade-out
      - type: title_card
        text: "様式の矛盾"
        subtitle: "美術探偵団 Vol.7"

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1"
        subtitle: "ユウの絵の分析"
      - type: sprite
        character: sakura
        expression: determined
        position: left
      - type: dialog
        character: sakura
        text: "ユウの{絵|え}を{分析|ぶんせき}したの。{上半分|うえはんぶん}（{空|そら}・{木|き}の{葉|は}）は**{印象派|いんしょうは}**——{短|みじか}い{筆触|ひっしょく}で{点々|てんてん}と。でも{下半分|したはんぶん}（ベンチ・{道|みち}）は**{写実|しゃじつ}{主義|しゅぎ}**——なめらかで{正確|せいかく}。"
        expression: determined
      - type: dialog
        character: sakura
        text: "{技術|ぎじゅつ}レベルも{違|ちが}う。{印象派|いんしょうは}{部分|ぶぶん}は{不安定|ふあんてい}（{初心者|しょしんしゃ}レベル）。{写実|しゃじつ}{部分|ぶぶん}は{安定|あんてい}（{経験者|けいけんしゃ}レベル）。**{別|べつ}の{人|ひと}が{描|か}いた{可能性|かのうせい}**。"
        expression: thinking
      - type: sprite
        character: sakura
        action: hide
      - type: narration
        text: "{美術展|びじゅつてん}のルール: 「{自分|じぶん}で{描|か}いた{作品|さくひん}」を{出展|しゅってん}すること。{他人|たにん}に{手伝|てつだ}ってもらうのはルール{違反|いはん}。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: "ステップ2"
        subtitle: "制作スケジュールと発言"
      - type: narration
        text: "ユウの{証言|しょうげん}: 「{昨日|きのう}の{放課後|ほうかご}（15:00〜16:30）に{図工室|ずこうしつ}で{描|か}き{始|はじ}めた。16:30に{家|いえ}に{持|も}ち{帰|かえ}って、**{夜|よる}に{仕上|しあ}げた**。{今朝|けさ}{完成品|かんせいひん}を{持|も}ってきた」"
      - type: narration
        text: "「{夜|よる}に{仕上|しあ}げた」——{何時|なんじ}から{何時|なんじ}まで？ **{具体的|ぐたいてき}な{時間|じかん}が{語|かた}られていない**。この「{空白|くうはく}」に{何|なに}が{隠|かく}されている？"
      - type: narration
        text: "ユウの{最近|さいきん}の{発言|はつげん}——1{週間|しゅうかん}{前|まえ}「{印象派|いんしょうは}の{筆使|ふでづか}い、{難|むずか}しい……」。3{日|にち}{前|まえ}「マキにも{見|み}せたいから{頑張|がんば}らないと」。"
      - type: narration
        text: "**マキ**: ユウのクラブ{外|がい}の{親友|しんゆう}。{別|べつ}のクラスの{生徒|せいと}。**{写実|しゃじつ}{主義|しゅぎ}が{得意|とくい}**。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "決定的証拠"
        subtitle: "2人の手と目撃情報"
      - type: effect
        name: fade-in
      - type: sprite
        character: takumi
        expression: determined
        position: left
      - type: dialog
        character: takumi
        text: "{絵|え}の{具|ぐ}の{厚|あつ}みが{上下|じょうげ}で{違|ちが}う。{印象派|いんしょうは}{部分|ぶぶん}は{厚|あつ}い（{点々|てんてん}）、{写実|しゃじつ}{部分|ぶぶん}は{薄|うす}い。{使|つか}った{筆|ふで}も{違|ちが}う——{上|うえ}は{細|ほそ}い{丸筆|まるふで}、{下|した}は{平筆|ひらふで}。{乾燥|かんそう}{度|ど}も{違|ちが}う。**2{人|り}が{異|こと}なる{時間帯|じかんたい}に{描|か}いた{可能性|かのうせい}**。"
        expression: determined
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: nijika
        expression: surprised
        position: right
      - type: dialog
        character: nijika
        text: "{昨夜|さくや}ユウの{家|いえ}の{前|まえ}を{通|とお}ったとき、2{階|かい}の{部屋|へや}に**2{人|にん}{分|ぶん}の{影|かげ}**が{見|み}えた。{窓越|まどご}しに{絵|え}を{描|か}いている{動|うご}きが{見|み}えたんだ。"
        expression: surprised
      - type: sprite
        character: nijika
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "ユウの「{夜|よる}に{仕上|しあ}げた」の{空白|くうはく}を{埋|う}めると——15:00〜16:30 {図工室|ずこうしつ}で{印象派|いんしょうは}{部分|ぶぶん}（{上半分|うえはんぶん}）を{描|か}いた。**19:00〜21:00 マキが{来|き}て{写実|しゃじつ}{主義|しゅぎ}{部分|ぶぶん}（{下半分|したはんぶん}）を{描|か}いた**。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "{語|かた}られていなかった2{時間|じかん}の{空白|くうはく}にマキがいた。{印象派|いんしょうは}が{苦手|にがて}で{間|ま}に{合|あ}わなかったユウが、{親友|しんゆう}マキに{手伝|てつだ}ってもらった。マキは{写実|しゃじつ}{主義|しゅぎ}が{得意|とくい}だから、{下半分|したはんぶん}は{写実|しゃじつ}の{筆触|ひっしょく}になった。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: "推理タイム"
        subtitle: "犯人は誰だ？"
      - type: narration
        text: "{証拠|しょうこ}をまとめよう。1{枚|まい}の{絵|え}に{印象派|いんしょうは}（{上|うえ}）と{写実|しゃじつ}（{下|した}）が{混在|こんざい}。{技術|ぎじゅつ}レベルが{違|ちが}う。{筆|ふで}と{厚|あつ}みと{乾燥|かんそう}が{上下|じょうげ}で{異|こと}なる。{昨夜|さくや}ユウの{部屋|へや}に2{人|にん}。{写実|しゃじつ}{得意|とくい}のマキ。{証言|しょうげん}の{空白|くうはく}2{時間|じかん}。"
      - type: choice
        id: q1
        question: "絵に2つの様式が混在する原因は？ ルール違反をしたのは誰？"
        options:
          - text: ユウ（印象派が苦手で親友マキに下半分を手伝ってもらった）
            value: yuu
            correct: true
            feedback: "{正解|せいかい}！ ユウは{印象派|いんしょうは}の{筆使|ふでづか}いが{苦手|にがて}で、{親友|しんゆう}マキに{下半分|したはんぶん}を{手伝|てつだ}ってもらった。マキは{写実|しゃじつ}{主義|しゅぎ}{得意|とくい}だから{下半分|したはんぶん}が{写実|しゃじつ}の{筆触|ひっしょく}に。{美術|びじゅつ}{様式|ようしき}の{知識|ちしき}で{見破|みやぶ}れた。"
          - text: サクラ（写実主義が得意な人）
            value: sakura
            feedback: "サクラは{写実|しゃじつ}{主義|しゅぎ}が{得意|とくい}だけど、**ユウの{絵|え}には{一切|いっさい}{触|さわ}っていない**。{自分|じぶん}の{静物画|せいぶつが}に{集中|しゅうちゅう}していたよ。クラブ{外|がい}のマキが{手伝|てつだ}ったんだ。"
          - text: タクミ（筆触を分析した人）
            value: takumi
            feedback: "タクミは{物理的|ぶつりてき}{分析|ぶんせき}で「2{人|にん}の{手|て}」を{発見|はっけん}した{側|がわ}。{抽象画|ちゅうしょうが}は{自分|じぶん}で{描|か}いたよ。"
          - text: ニジカ（2人分の影を目撃した人）
            value: nijika
            feedback: "ニジカは{目撃|もくげき}{情報|じょうほう}を{持|も}っている{側|がわ}。フォーヴィスムは{自分|じぶん}で{描|か}いたよ。"

  # ==================== 真実：ユウ ====================
  - id: truth-yuu
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
        subtitle: "ユウの告白"
      - type: effect
        name: fade-in
      - type: sprite
        character: yuu
        expression: worried
        position: center
      - type: dialog
        character: yuu
        text: "……ごめんなさい。{下半分|したはんぶん}はマキに{手伝|てつだ}ってもらいました。"
        expression: worried
      - type: dialog
        character: yuu
        text: "{印象派|いんしょうは}の{絵|え}を{描|か}くってマキに{約束|やくそく}したのに、{短|みじか}い{筆触|ひっしょく}がどうしてもうまくできなくて。{焦|あせ}って{昨夜|さくや}マキを{呼|よ}んで{手伝|てつだ}ってもらった。"
        expression: thinking
      - type: dialog
        character: yuu
        text: "マキは{写実|しゃじつ}{主義|しゅぎ}{得意|とくい}だから、{下半分|したはんぶん}が{写実|しゃじつ}の{筆触|ひっしょく}になっちゃった。「{自分|じぶん}で{描|か}いた」って{嘘|うそ}をついた……ごめんなさい。"
        expression: worried
      - type: sprite
        character: yuu
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{美術|びじゅつ}{様式|ようしき}——{印象派|いんしょうは}と{写実|しゃじつ}{主義|しゅぎ}は{正反対|せいはんたい}の{技法|ぎほう}。{様式|ようしき}の{特徴|とくちょう}を{知|し}ると、{絵|え}の「{作者|さくしゃ}」が{見|み}える。{筆触|ひっしょく}は{描|か}く{人|ひと}の『{指紋|しもん}』よ。"
        expression: happy
      - type: dialog
        character: sensei
        text: "そして{今日|きょう}のスキル——{情報|じょうほう}{欠落|けつらく}{認識|にんしき}。ユウの「{夜|よる}に{仕上|しあ}げた」の{空白|くうはく}に{気|き}づいた。「{語|かた}られていないこと」に{注目|ちゅうもく}することが{大切|たいせつ}ね。"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "\"{約束|やくそく}を{守|まも}りたい{気持|きも}ちは{分|わ}かる。でも「{代|か}わりにやってもらう」と「{教|おし}えてもらう」は{違|ちが}う。{苦手|にがて}でも{自分|じぶん}で{挑戦|ちょうせん}する{方|ほう}がずっと{価値|かち}がある。"
      - type: effect
        name: fade-out
