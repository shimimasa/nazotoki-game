        character: makoto
        expression: thinking
        position: left
      - type: dialog
        character: makoto
        text: "{発表|はっぴょう}の{数字|すうじ}と{実際|じっさい}の{枚数|まいすう}が{合|あ}わないのに、{最初|さいしょ}はスルーしそうになってた。30{枚|まい}を全部{数|かぞ}えて{初|はじ}めて「20{票|ひょう}しかない」って{気|き}づけた。{全探索|ぜんたんさく}って、やっぱり{大事|たいせつ}だ。"
        expression: thinking
      - type: sprite
        character: makoto
        action: hide
      - type: sprite
        character: nozomu
        expression: worried
        position: right
      - type: dialog
        character: nozomu
        text: "「25{票|ひょう}！ お{化|ば}け{屋敷|やしき}最高！」って{喜|よろこ}んでたけど……タカシが「ドッジボールに『{退屈|たいくつ}』って{書|か}いてあったから{選|えら}びにくかった」って{言|い}ってたの、もっと{早|はや}く{伝|つた}えればよかった。"
        expression: worried
      - type: sprite
        character: nozomu
        action: hide
      - type: sprite
        character: shiori
        expression: determined
        position: left
