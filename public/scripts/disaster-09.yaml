          - { id: ai, expression: determined }
      - type: dialog
        character: kei
        text: "おれ、{防災|ぼうさい}マップを作り{直|なお}す。{今度|こんど}は{地形|ちけい}データも{過去|かこ}の{記録|きろく}も{全部|ぜんぶ}{確認|かくにん}する。"
