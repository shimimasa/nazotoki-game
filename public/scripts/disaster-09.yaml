      - type: sprite
        character: nana
        action: hide
      - type: sprite
        character: kei
        action: hide
      - type: sprite
        character: ai
        action: hide
      - type: narration
        text: "{防災|ぼうさい}{探偵|たんてい}団——{地域|ちいき}{防災|ぼうさい}マップの{謎|なぞ}、{解決|かいけつ}！"
      - type: effect
