        text: "「{見|み}た{目|め}がきれい＝{安全|あんぜん}」じゃない。データが{教|おし}えてくれる{真実|しんじつ}を読み{取|と}る{力|ちから}——それが{今日|きょう}の{帰納法|きのうほう}の学び。"
