        text: "ソウタは{過去|かこ}の{記録|きろく}に気づいていた。アイは{地形|ちけい}データに気づいていた。ナナはタカギさんの{証言|しょうげん}を聞いていた。でも——{誰|だれ}も{声|こえ}を上げなかった。"
