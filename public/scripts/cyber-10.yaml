scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "5{年|ねん}2{組|くみ}では「ネット{安全|あんぜん}ガイド」を{作|つく}るプロジェクトが{始|はじ}まった。"
      - type: narration
        text: "Vol.1から9まで{学|まな}んできたサイバーセキュリティの{知識|ちしき}を1{年生|ねんせい}にも{分|わ}かる{形|かたち}にまとめる——ネット{探偵団|たんていだん}の4{人|にん}が{中心|ちゅうしん}となって{編集|へんしゅう}を{進|すす}めていた。"
      - type: se
        sound: paper
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "ところがある{朝|あさ}、{共有|きょうゆう}フォルダに{保存|ほぞん}していたガイドの{内容|ないよう}が{書|か}き{換|か}えられていた。"
      - type: narration
        text: "**もともとあった「{個人|こじん}の{注意|ちゅうい}」の{項目|こうもく}が、「しくみで{守|まも}る{方法|ほうほう}」に{丸|まる}ごと{変|か}わっている——いったい、{誰|だれ}が{何|なに}のために？**"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "たいへん！　{今朝|けさ}、{共有|きょうゆう}フォルダのガイドが{書|か}き{換|か}えられているのを{見|み}つけたの。「{パスワードを|ぱすわーどを}{強|つよ}くしよう」「{怪|あや}しいリンクをクリックしない」という{内容|ないよう}が、「プライバシー{設定|せってい}を{確認|かくにん}しよう」「{二段階|にだんかい}{認証|にんしょう}をオンにしよう」に{変|か}わっているのよ。"
        expression: worried
      - type: dialog
        character: yamada
        text: "ネット{探偵団|たんていだん}の{皆|みな}さんに{調査|ちょうさ}をお{願|ねが}いしたいわ。{証拠|しょうこ}を{集|あつ}めて、{誰|だれ}がなぜガイドを{書|か}き{換|か}えたのかを{突|つ}き{止|と}めてください。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: netto
            expression: surprised
          - character: pasu
            expression: worried
          - character: rogu
            expression: thinking
          - character: gado
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{自分|じぶん}たちが{作|つく}っていたガイドが{無断|むだん}で{書|か}き{換|か}えられた——{誰|だれ}が、{何|なに}のために？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: デジタルの足あと
        subtitle: ネット探偵団 Vol.10（最終巻）

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 書き換えの内容を比較する
      - type: narration
        text: "まず{書|か}き{換|か}え{前後|ぜんご}のガイドを{比較|ひかく}する。{変化|へんか}の{内容|ないよう}を{正確|せいかく}に{把握|はあく}することが{最初|さいしょ}の{一歩|いっぽ}だ。"
      - type: evidence
        id: card-1
        title: ガイドの書き換え前後の比較
        content: "【{書|か}き{換|か}え{前|まえ}】①パスワードを{強|つよ}くしよう（{誕生日|たんじょうび}・{名前|なまえ}はNG）②{怪|あや}しいリンクをクリックしない③{知|し}らない{人|ひと}からのメールに{返信|へんしん}しない【{書|か}き{換|か}え{後|ご}】①プライバシー{設定|せってい}を{確認|かくにん}しよう②{二段階|にだんかい}{認証|にんしょう}をオンにしよう③アプリの{権限|けんげん}を{見直|みなお}そう→「{個人|こじん}の{注意|ちゅうい}」から「しくみで{守|まも}る」へ{大|おお}きく{方向性|ほうこうせい}が{変|か}わっている"
      - type: sprite
        character: rogu
        expression: thinking
        position: left
      - type: dialog
        character: rogu
        text: "{書|か}き{換|か}え{前|まえ}は「{気|き}をつけよう」という{内容|ないよう}——{書|か}き{換|か}え{後|ご}は「しくみで{守|まも}る」という{内容|ないよう}に{全部|ぜんぶ}{変|か}わっている。ただのミスじゃない。{意図的|いとてき}に{書|か}き{換|か}えた{人|ひと}がいる。"
        expression: determined
      - type: sprite
        character: rogu
        action: hide
      - type: sprite
        character: netto
        expression: thinking
        position: right
      - type: dialog
        character: netto
        text: "「{二段階|にだんかい}{認証|にんしょう}」「プライバシー{設定|せってい}」……Vol.1-9で{学|まな}んだことと{全部|ぜんぶ}つながる{内容|ないよう}だ。でも、なぜ{最初|さいしょ}の「{個人|こじん}の{注意|ちゅうい}」の{項目|こうもく}を{消|け}したんだろう？"
        expression: worried
      - type: sprite
        character: netto
        action: hide
      - type: evidence
        id: card-2
        title: 共有フォルダの編集履歴
        content: "{共有|きょうゆう}フォルダの{編集|へんしゅう}{履歴|りれき}。{木曜日|もくようび}15:42に1{件|けん}の{編集|へんしゅう}が{記録|きろく}されている。{編集者|へんしゅうしゃ}のアカウント{名|めい}は{一時的|いちじてき}に{不明|ふめい}（{上書|うわが}きのため）。ただし{編集|へんしゅう}{時刻|じこく}は{確実|かくじつ}で、{木曜日|もくようび}の{放課後|ほうかご}に{行|おこな}われたことが{分|わ}かる"
      - type: sprite
        character: gado
        expression: surprised
        position: left
      - type: dialog
        character: gado
        text: "{木曜|もくよう}{放課後|ほうかご}……{私|わたし}はその{時間|じかん}、{図書室|としょしつ}にいたから{教室|きょうしつ}にはいなかった。{誰|だれ}が{残|のこ}っていたっけ……"
        expression: worried
      - type: sprite
        character: gado
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: アクセスログから犯人を絞り込む
      - type: sprite
        character: rogu
        expression: determined
        position: left
      - type: dialog
        character: rogu
        text: "{学校|がっこう}の{共有|きょうゆう}フォルダには{アクセスログ|あくせすろぐ}が{残|のこ}っているはず。「{木曜|もくよう}{放課後|ほうかご}に{教室|きょうしつ}のPCを{使|つか}ったのは{誰|だれ}か」——ログは{嘘|うそ}をつかない。"
        expression: determined
      - type: sprite
        character: rogu
        action: hide
      - type: evidence
        id: card-3
        title: 教室PCのアクセスログ
        content: "{木曜日|もくようび}{放課後|ほうかご}15:30〜16:00の{教室|きょうしつ}PCログ。{ログイン|ろぐいん}{記録|きろく}: ネット（15:31〜15:58）、パス（15:33〜15:55）の2{名|めい}。ガードは{図書室|としょしつ}で{別|べつ}の{作業|さぎょう}（{図書室|としょしつ}PCのログに{記録|きろく}あり）。ログは{委員|いいん}{活動|かつどう}で{音楽室|おんがくしつ}に{記録|きろく}あり。→{書|か}き{換|か}え{時刻|じこく}15:42に{教室|きょうしつ}にいたのは2{人|り}だけ。"
      - type: sprite
        character: netto
        expression: surprised
        position: right
      - type: dialog
        character: netto
        text: "{木曜|もくよう}{放課後|ほうかご}の{教室|きょうしつ}にいたのは、{僕|ぼく}と……パスだけ？　でも{僕|ぼく}はその{時間|じかん}、{別|べつ}の{宿題|しゅくだい}をしてたし……"
        expression: worried
      - type: sprite
        character: netto
        action: hide
      - type: evidence
        id: card-4
        title: ネットの作業記録
        content: "ネットの{木曜日|もくようび}15:42の{作業|さぎょう}{記録|きろく}。{教室|きょうしつ}PCの{別|べつ}のウィンドウで「{算数|さんすう}{ドリル|どりる}アプリ」が15:30〜15:58まで{起動|きどう}している（{自動|じどう}{保存|ほぞん}{記録|きろく}あり）。→ネットが15:42に{共有|きょうゆう}フォルダを{編集|へんしゅう}していた{可能性|かのうせい}は{低|ひく}い。{書|か}き{換|か}えたのは{残|のこ}り1{人|り}の{可能性|かのうせい}が{高|たか}い。"
      - type: sprite
        character: pasu
        expression: worried
        position: left
      - type: dialog
        character: pasu
        text: "…………。"
        expression: worried
      - type: sprite
        character: pasu
        action: hide

  # ==================== 中間点 ====================
  - id: midpoint
    bg: classroom
    bgm: thinking-time
    steps:
      - type: narration
        text: "{証拠|しょうこ}から{状況|じょうきょう}が{見|み}えてきた。{書|か}き{換|か}えは{木曜|もくよう}{放課後|ほうかご}15:42。{教室|きょうしつ}にいたのは2{人|り}。{片方|かたほう}にはアリバイがある——{犯人|はんにん}はほぼ{絞|しぼ}れている。"
      - type: sprite
        character: rogu
        expression: worried
        position: right
      - type: dialog
        character: rogu
        text: "ログは{証拠|しょうこ}が{揃|そろ}っている……でも、なぜ{書|か}き{換|か}えたのかが{分|わ}からない。「{個人|こじん}の{注意|ちゅうい}」から「しくみで{守|まも}る」に{変|か}えた{理由|りゆう}——ただの{悪意|あくい}には{思|おも}えない。"
        expression: worried
      - type: sprite
        character: rogu
        action: hide
      - type: sprite
        character: gado
        expression: thinking
        position: left
      - type: dialog
        character: gado
        text: "……{私|わたし}、なんか{知|し}ってることがあるかもしれない。でも{言|い}いにくくて……{誰|だれ}かが{傷|きず}つくかもしれないから、{言|い}っていいのかな。"
        expression: worried
      - type: sprite
        character: gado
        action: hide
      - type: sprite
        character: netto
        expression: worried
        position: right
      - type: dialog
        character: netto
        text: "……{実|じつ}は……{僕|ぼく}、{今|いま}でも{誕生日|たんじょうび}をパスワードに{使|つか}ってる。Vol.2で{学|まな}んで「{変|か}える」って{言|い}ったのに……{忘|わす}れてた。ずっと{変|か}えてなかったんだ。"
        expression: worried
      - type: sprite
        character: netto
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: パスの端末に残された記録
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "パスの{端末|たんまつ}を{確認|かくにん}したら——{共有|きょうゆう}フォルダの{編集|へんしゅう}{画面|がめん}が{履歴|りれき}に{残|のこ}っていたわ。そして{下書|したが}きファイルが{見|み}つかった。パスに{話|はな}を{聞|き}いたら……すべてを{話|はな}してくれたの。"
        expression: thinking
      - type: dialog
        character: yamada
        text: "パスは{水曜日|すいようび}に、ネットのパスワード{設定|せってい}{画面|がめん}をたまたま{見|み}てしまった。まだ{誕生日|たんじょうび}のまま——Vol.2で{学|まな}んだはずなのに、{変|か}えていなかった。パスは「ネットが{傷|きず}つく」と{思|おも}って、ガイドの{内容|ないよう}を{書|か}き{換|か}えることで{問題|もんだい}を{解決|かいけつ}しようとしたの。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: evidence
        id: card-5
        title: パスの端末から発見された記録
        content: "①{共有|きょうゆう}フォルダの{編集|へんしゅう}{画面|がめん}が{履歴|りれき}に{残|のこ}存（{木曜|もくよう}15:42）②{下書|したが}きファイルに{動機|どうき}のメモ:「{二段階|にだんかい}{認証|にんしょう}があればパスワードが{弱|よわ}くても{守|まも}れる。「{気|き}をつけよう」だけじゃ{人|ひと}は{忘|わす}れる。しくみで{守|まも}ることを1{年生|ねんせい}に{伝|つた}えたい」③{水曜日|すいようび}のメモ:「ネットのパスワード、まだ{誕生日|たんじょうび}のまま——Vol.2で{学|まな}んだのに……」"
      - type: se
        sound: reveal
      - type: sprite
        character: pasu
        expression: worried
        position: center
      - type: dialog
        character: pasu
        text: "…………{僕|ぼく}がやりました。ネットのパスワードが{変|か}わってないのを{見|み}て——「{気|き}をつけよう」って{学|まな}んでも、{人|ひと}は{忘|わす}れるんだって{気|き}づいた。{悪意|あくい}があったわけじゃない。でも、{勝手|かって}に{書|か}き{換|か}えるべきじゃなかった。"
        expression: worried
      - type: dialog
        character: pasu
        text: "ガイドを「しくみで{守|まも}る」に{変|か}えれば、ネットのパスワードが{弱|よわ}くても「{二段階|にだんかい}{認証|にんしょう}でカバーできる」——そう{伝|つた}えれば、ネットが{責|せ}められずに{済|す}むと{思|おも}ったんだ。"
        expression: worried
      - type: sprite
        character: pasu
        action: hide
      - type: narration
        text: "**{書|か}き{換|か}えた{犯人|はんにん}はパス。でも{動機|どうき}は{悪意|あくい}ではなく——{友達|ともだち}をかばう{罪悪感|ざいあくかん}と、「{気|き}をつけよう」だけでは{守|まも}れないという{問題|もんだい}{提起|ていき}だった。**"

  # ==================== 推理・1回目投票 ====================
  - id: deduction
    bg: classroom
    bgm: confrontation
    steps:
      - type: title_card
        text: 推理タイム①
        subtitle: ネット安全ガイドを書き換えたのは誰？
      - type: sprite
        character: rogu
        expression: determined
        position: left
      - type: dialog
        character: rogu
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①{書|か}き{換|か}えは{木曜|もくよう}{放課後|ほうかご}15:42②{教室|きょうしつ}にいたのは{ネット|ねっと}と{パス|ぱす}の2{人|り}③{ネット|ねっと}は{別|べつ}のアプリを{使|つか}っていた{記録|きろく}あり④{パス|ぱす}の{端末|たんまつ}に{編集|へんしゅう}{履歴|りれき}と{動機|どうき}のメモが{残|のこ}っていた。"
        expression: determined
      - type: sprite
        character: rogu
        action: hide
      - type: narration
        text: "{証拠|しょうこ}をつなぐと1{人|り}に{辿|たど}り{着|つ}く。①{書|か}き{換|か}え{時刻|じこく}に{教室|きょうしつ}にいた。②{ネット|ねっと}のアリバイが{成立|せいりつ}。③{端末|たんまつ}に{編集|へんしゅう}{履歴|りれき}と「かばう{動機|どうき}」のメモが{存在|そんざい}。④ネットの{弱|よわ}いパスワードを{水曜日|すいようび}に{目撃|もくげき}していた。"
      - type: choice
        id: q1
        question: ネット安全ガイドを書き換えたのは誰？
        options:
          - text: パス（ネットをかばうためにガイドを書き換えた）
            value: pasu
            correct: true
            feedback: "{正解|せいかい}！　パスは{水曜日|すいようび}にネットのパスワードが{誕生日|たんじょうび}のままだと{知|し}り、「ネットが{責|せ}められる」と{思|おも}ってガイドを{書|か}き{換|か}えた。{悪意|あくい}はなかったけれど、{無断|むだん}で{書|か}き{換|か}えたのは{問題|もんだい}だったね。**でも——この{事件|じけん}には、もう1つの{大切|たいせつ}な{問い|とい}がある。**"
          - text: ネット（弱いパスワードを隠したかった）
            value: netto
            feedback: "{ネット|ねっと}は{木曜|もくよう}{放課後|ほうかご}に{算数|さんすう}ドリルのアプリを{使|つか}っていた{記録|きろく}があるよ。{弱|よわ}いパスワードを{使|つか}い{続|つづ}けていたのは{事実|じじつ}だけど、ガイドを{書|か}き{換|か}えたのは{別|べつ}の{人|ひと}だ。"
          - text: ログ（チェック担当として責任を感じた）
            value: rogu
            feedback: "{ログ|ろぐ}は{木曜|もくよう}{放課後|ほうかご}{音楽室|おんがくしつ}で{委員|いいん}{活動|かつどう}をしていた{記録|きろく}があるよ。{書|か}き{換|か}えに{気|き}づけなかったことを{反省|はんせい}していたけど、{書|か}き{換|か}えた{本人|ほんにん}ではない。"
          - text: ガード（言いにくいことを代わりに伝えたかった）
            value: gado
            feedback: "{ガード|がーど}は{木曜|もくよう}{放課後|ほうかご}{図書室|としょしつ}にいた{記録|きろく}があるよ。ネットの{弱|よわ}いパスワードを{知|し}っていたけど「{言|い}いにくくて」{黙|だま}っていた——{行動|こうどう}できなかった{側|がわ}だ。"

  # ==================== Card5反転後：第2層へ ====================
  - id: truth-shift
    bg: classroom
    bgm: emotional
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: パラダイムシフト
        subtitle: 「気をつけよう」だけでは守れない
      - type: effect
        name: fade-in
      - type: sprite
