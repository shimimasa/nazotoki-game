meta:
  id: disaster-08
  title: 避難所のデマ
  series: 防災探偵団
  volume: 8
  estimatedMinutes: 22

characters:
  souta:
    name: ソウタ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  nana:
    name: ナナ
    color: "#E91E63"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  kei:
    name: ケイ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  ai:
    name: アイ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: gym
    bgm: disaster-03/opening
    steps:
      - type: narration
        text: "{地震|じしん}{発生|はっせい}から2日後——X{市立|しりつ}みどり{小学校|しょうがっこう}{体育館|たいいくかん}の{避難所|ひなんじょ}。"
      - type: narration
        text: "「{食料|しょくりょう}を{独|ひと}り{占|じ}めにした人がいる」——そんなうわさが{避難所|ひなんじょ}{全体|ぜんたい}に広まっていた。"
      - type: bgm
        action: stop
      - type: effect
        name: shake
        duration: 400
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: bgm
        track: disaster-03/investigation
      - type: dialog
        character: sensei
        text: "このうわさの出どころを{調|しら}べました。{最初|さいしょ}に言い出したのはアイさんだとわかりました。"
      - type: dialog
        character: sensei
        text: "でも本当にそれは{事実|じじつ}なのか——うわさの{正体|しょうたい}を{調|しら}べてください。"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: souta, expression: worried }
          - { id: nana, expression: worried }
          - { id: kei, expression: thinking }
          - { id: ai, expression: worried }
      - type: narration
        text: "アイだけが{目|め}をそらした。{何|なに}かを{隠|かく}しているのか——それとも、自分でも{戸惑|とまど}っているのか。"
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: nana
        action: hide
      - type: sprite
        character: kei
        action: hide
      - type: sprite
        character: ai
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 防災探偵団 Vol.8
        subtitle: 避難所のデマ

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: gym
    bgm: disaster-03/investigation
    steps:
      - type: narration
        text: "4人がそれぞれ何を知っているか、聞いてみよう。"
      - type: sprite
        character: souta
        expression: normal
        position: left
      - type: dialog
        character: souta
        text: "11月4日の{午後|ごご}2{時|じ}半ごろ、アイに「{食料|しょくりょう}を{独|ひと}り{占|じ}めにした人がいるって」と{言|い}われた。{驚|おどろ}いて、ほかの人にも{伝|つた}えてしまった。"
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: nana
        expression: normal
        position: right
      - type: dialog
        character: nana
        text: "わたしは{食料|しょくりょう}が{少|すく}ないって{不満|ふまん}を{言|い}っている人を見かけた。でもなだめることはできなかった……。"
        expression: worried
      - type: sprite
        character: nana
        action: hide
      - type: sprite
        character: kei
        expression: normal
        position: left
      - type: dialog
        character: kei
        text: "おれは「{独|ひと}り{占|じ}め」のうわさを聞いて、{配給|はいきゅう}ルールを{確認|かくにん}しようと思った。でもまだ{全部|ぜんぶ}は{調|しら}べきれてない。"
      - type: sprite
        character: kei
        action: hide
      - type: sprite
        character: ai
        expression: normal
        position: right
      - type: dialog
        character: ai
        text: "わたしは{避難所|ひなんじょ}の{隅|すみ}で「{食料|しょくりょう}を{独|ひと}り{占|じ}めにした人がいる」と聞いた。{困|こま}っている人が出ないように、ソウタに{伝|つた}えた。"
      - type: sprite
        character: ai
        action: hide

  # ===== 証拠カード1: デマ判定シート =====
  - id: evidence-1
    bg: gym
    bgm: disaster-03/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: デマ判定シート
      - type: narration
        text: "デマには4つの{特徴|とくちょう}がある。この4つを{知|し}らないと、{情報|じょうほう}の{真偽|しんぎ}を見分けられない。"
      - type: narration
        text: "①{出典|しゅってん}{不明|ふめい}——「{誰|だれ}が{言|い}った」「どこで{確認|かくにん}した」がわからない。"
      - type: narration
        text: "②{感情的|かんじょうてき}——「ひどい！」「ありえない！」など、{感情|かんじょう}をあおる{言葉|ことば}が{多|おお}い。"
      - type: narration
        text: "③{伝聞|でんぶん}——「○○が{言|い}っていた」「○○だと聞いた」という{形|かたち}。"
      - type: narration
        text: "④{具体性|ぐたいせい}がない——いつ・どこで・{誰|だれ}が、がはっきりしない。"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "{信頼|しんらい}できる{情報源|じょうほうげん}の{優先|ゆうせん}{順位|じゅんい}——①{市役所|しやくしょ}{公式|こうしき}{発表|はっぴょう}、②NHKニュース、③{消防|しょうぼう}・{警察|けいさつ}、④{自治体|じちたい}HP。{個人|こじん}の口コミは{確認|かくにん}が{必要|ひつよう}。"

  # ===== 証拠カード2: 情報変形記録 =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 情報変形記録
      - type: narration
        text: "「{食料|しょくりょう}{独|ひと}り{占|じ}め」うわさの{変形|へんけい}{記録|きろく}——{情報|じょうほう}が{段階|だんかい}を{経|へ}るごとにどう{変|か}わったか。"
      - type: narration
        text: "【{元|もと}の{出来事|できごと}】Fさんが{担当者|たんとうしゃ}の{許可|きょか}を{得|え}て、{食料|しょくりょう}を2{個|こ}{受|う}け取った。11:10ごろ。"
      - type: narration
        text: "【{段階|だんかい}1】Xさん（{見知|みし}らぬ人）が「あの人、2{個|こ}もらっていたよ」とつぶやいた。13:30ごろ。"
      - type: narration
        text: "【{段階|だんかい}2】{近|ちか}くにいた{別|べつ}の人が「え、2{個|こ}？ {多|おお}くもらっていたんだ」と{伝|つた}えた。13:35ごろ。"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "【{段階|だんかい}3】さらに{別|べつ}の人が「{食料|しょくりょう}を{独|ひと}り{占|じ}めにした人がいるって」と広めた。14:00ごろ。"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "「2{個|こ}もらった」→「{多|おお}くもらった」→「{独|ひと}り{占|じ}め」——{情報|じょうほう}が{段階|だんかい}を{経|へ}るごとに、{事実|じじつ}の{文脈|ぶんみゃく}が{消|き}え、{感情的|かんじょうてき}な{解釈|かいしゃく}が{加|くわ}わった。"

  # ===== 証拠カード3: 避難所ルールと入所記録 =====
  - id: evidence-3
    bgm: disaster-03/experiment
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 避難所ルールと入所記録
      - type: narration
        text: "{避難所|ひなんじょ}ルールシート（{抜粋|ばっすい}）——"
      - type: se
        sound: common/tension
      - type: narration
        speed: slow
        text: "ルール7{条|じょう}：{確認|かくにん}されていない{情報|じょうほう}は、{他|ほか}の人に{伝|つた}えてはいけない。{不確|ふたし}かな{情報|じょうほう}が{避難所|ひなんじょ}{全体|ぜんたい}の{不安|ふあん}やパニックを引き{起|お}こすことがあります。"
      - type: narration
        text: "{入所|にゅうしょ}{記録|きろく}——ソウタ：11月3日 09:30{受取|うけとり}{確認|かくにん}。ナナ：09:45。ケイ：10:00。アイ：10:15。"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "{全員|ぜんいん}がルールシートを{受|う}け取っている。アイも11月3日に{受|う}け取り{済|ず}み。「知らなかった」は{通|とお}らない。"

  # ===== 証拠カード4: ケイの確認メモ =====
  - id: evidence-4
    bgm: disaster-03/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: ケイの確認メモ
      - type: sprite
        character: kei
        expression: thinking
        position: left
      - type: dialog
        character: kei
        text: "うわさを聞いてから、{市役所|しやくしょ}の{公式|こうしき}{発表|はっぴょう}ページを{確認|かくにん}した。15:10ごろに{調|しら}べた{結果|けっか}がこれだ。"
      - type: sprite
        character: kei
        action: hide
      - type: narration
        text: "ケイのメモ——「{食料|しょくりょう}{配給|はいきゅう}に{関|かん}するトラブルや{問題|もんだい}の{発表|はっぴょう}は{一切|いっさい}なし。{避難所|ひなんじょ}での{配給|はいきゅう}は『{担当者|たんとうしゃ}の{管理|かんり}のもと{適切|てきせつ}に{実施|じっし}』と{記載|きさい}。」"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "{市役所|しやくしょ}の{公式|こうしき}{情報|じょうほう}には「{独|ひと}り{占|じ}め」に{一致|いっち}する{内容|ないよう}がない。うわさは{公式|こうしき}{情報|じょうほう}に{裏付|うらづ}けられていない。"

  # ===== 証拠カード5: 配給記録簿とアイの観察ノート =====
  - id: evidence-5
    bg: gym
    bgm: disaster-03/tension
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{配給|はいきゅう}{記録簿|きろくぼ}とアイの{観察|かんさつ}ノートが見つかりました。{重大|じゅうだい}な{発見|はっけん}があります。"
      - type: sprite
        character: sensei
        action: hide
      - type: se
        sound: common/tension
      - type: narration
        text: "{配給|はいきゅう}{記録簿|きろくぼ}——Fさんの{受取|うけとり}：2{個|こ}。{備考|びこう}：「アレルギー{対応|たいおう}{食料|しょくりょう}（{小麦|こむぎ}{不使用|ふしよう}）1{個|こ}{追加|ついか}。{事前|じぜん}{申請|しんせい}あり・{許可|きょか}{済|ず}み」。{担当者|たんとうしゃ}{田中|たなか}の{署名|しょめい}あり。"
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "Fさんの{受|う}け取りは{正式|せいしき}に{許可|きょか}されたものだった。「{独|ひと}り{占|じ}め」ではなく、{正当|せいとう}な{受|う}け取りだった！"
      - type: narration
        text: "アイの{観察|かんさつ}ノート——「14:00ごろ、{食料|しょくりょう}を{独|ひと}り{占|じ}めにした人がいるという{話|はなし}を聞いた。{困|こま}っている人が出ないようにしなければと思った。ソウタに{伝|つた}えた。」"
      - type: narration
        speed: slow
        text: "ノートの{追記|ついき}——「自分はその{情報|じょうほう}がどこから来たか{確認|かくにん}しなかった。{避難所|ひなんじょ}ルール7{条|じょう}を知っていたのに。どうして{確認|かくにん}しなかったんだろう……」"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "アイは「{意図的|いとてき}にデマを広めた」のではなかった。アイ{自身|じしん}がデマの{被害者|ひがいしゃ}だった——{最初|さいしょ}に聞いた{情報|じょうほう}を{信|しん}じてしまった。"

  # ===== 投票 =====
  - id: questions
    bg: gym
    bgm: disaster-03/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}を整理しましょう。{確認|かくにん}せずにうわさを広めてしまったのは{誰|だれ}？"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: 未確認の情報を最初に広めたのは誰？
        options:
          - text: アイ（見知らぬ人から聞いた話を確認せずソウタに伝えた）
            value: ai
            feedback: 正解！ アイは出典不明の伝聞情報を、避難所ルール7条を知っていたのに確認せずにソウタに伝えた。でもアイにも事情がある——証拠⑤を思い出して。
          - text: ソウタ（アイから聞いた話をさらに広めた）
            value: souta
            feedback: ソウタも広めてしまったけど、最初に未確認情報を伝えたのは別の人。出発点を探してみよう。
          - text: ケイ（市役所の情報を確認していたが報告が遅れた）
            value: kei
            feedback: ケイはむしろ正しい行動をしていた——公式情報を確認しようとした。デマを広めたのは別の人だよ。
          - text: ナナ（不満を言っている人を見かけたが何もしなかった）
            value: nana
            feedback: ナナはなだめられなかったけど、デマを広めたわけではない。最初に未確認情報を伝えた人を探してみよう。
      - type: choice
        id: q2
        question: アイが確認せずに情報を広めてしまった一番の理由は？
        options:
          - text: 最初に聞いた情報をそのまま信じてしまった（認知バイアス）
            value: bias
            feedback: 正解！ 「食料を独り占めした人がいる」という最初の情報が頭の中の基準になり、「本当にそうか？」と疑う前に行動してしまった。これを「アンカリング」と言うよ。
          - text: わざとデマを広めて混乱させたかった
            value: malicious
            feedback: アイに悪意はなかった。観察ノートにも「困っている人が出ないように」と書いてある。正義感から行動したんだ。
          - text: ルール7条を知らなかった
            value: no-rule
            feedback: 入所記録を見てみよう。アイは11月3日にルールシートを受け取っている。知っていたのに確認できなかった理由が大事だよ。
          - text: 情報源を確認する方法がわからなかった
            value: no-method
            feedback: アイは「確認しなかった」と自分で振り返っている。方法がわからなかったのではなく、最初の情報を疑う前に行動してしまったんだ。

  # ===== 真実パート =====
  - id: truth-intro
    bg: gym
    bgm: disaster-03/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: デマはこうして広まる
      - type: effect
        name: fade-in
        duration: 600

  # ソウタの秘密
  - id: truth-souta
    bg: gym
    steps:
      - type: sprite
        character: souta
        expression: worried
        position: left
      - type: dialog
        character: souta
        text: "ぼくも{完璧|かんぺき}じゃなかった。アイから聞いた{話|はなし}を「デマかもしれない」と思ったのに、{声|こえ}に出せなかった。"
      - type: dialog
        character: souta
        text: "{情報|じょうほう}の{変形|へんけい}{過程|かてい}を{整理|せいり}できる{力|ちから}があったのに、{使|つか}わなかった。それがぼくの後ろめたさだ。"
        expression: determined
      - type: sprite
        character: souta
        action: hide

  # ナナの秘密
  - id: truth-nana
    steps:
      - type: sprite
        character: nana
        expression: worried
        position: right
      - type: dialog
        character: nana
        text: "わたしは{食料|しょくりょう}が{少|すく}ないって{不満|ふまん}を{言|い}っている人を見かけた。でも{何|なに}も{言|い}えなかった。"
      - type: dialog
        character: nana
        text: "あのとき「{担当者|たんとうしゃ}に{相談|そうだん}しよう」って{声|こえ}をかけていたら、{不満|ふまん}がうわさに変わるのを{止|と}められたかもしれない。"
        expression: determined
      - type: sprite
        character: nana
        action: hide

  # ケイの秘密
  - id: truth-kei
    steps:
      - type: sprite
        character: kei
        expression: worried
        position: left
      - type: dialog
        character: kei
        text: "おれは「{配給|はいきゅう}ルールを{確認|かくにん}しよう」と思いつつ、{面倒|めんどう}くさくて{後回|あとまわ}しにしていた。"
      - type: dialog
        character: kei
        text: "もっと{早|はや}く{担当者|たんとうしゃ}に聞いていれば、{配給|はいきゅう}{記録簿|きろくぼ}の{存在|そんざい}がわかって、デマを{早|はや}く{止|と}められたかもしれない。"
        expression: determined
      - type: sprite
        character: kei
        action: hide

  # アイの真実（クライマックス）
  - id: truth-ai
    bgm: disaster-03/truth
    steps:
      - type: sprite
        character: ai
        expression: worried
        position: center
      - type: narration
        speed: slow
        text: "アイが{長|なが}い{間|あいだ}、{黙|だま}っていた。"
      - type: dialog
        character: ai
        text: "……うわさを広めたのは、わたしだ。"
        expression: worried
      - type: dialog
        character: ai
        text: "11月4日の14{時|じ}ごろ、{避難所|ひなんじょ}の{隅|すみ}で{見知|みし}らぬ人が「あそこの人、{食料|しょくりょう}を{独|ひと}り{占|じ}めにしてた」ってつぶやいているのを聞いた。"
      - type: dialog
        character: ai
        text: "その{瞬間|しゅんかん}、「大変だ、{困|こま}っている人がいるかもしれない」って思った。{正|ただ}しいことを{伝|つた}えなきゃ、って。"
        expression: worried
      - type: dialog
        character: ai
        text: "でも——「{誰|だれ}がそう{言|い}ったの？」「いつの{話|はなし}？」「{本当|ほんとう}に見たの？」……{何|なに}も{確認|かくにん}しなかった。"
        expression: worried
      - type: dialog
        character: ai
