scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "{図工|ずこう}の{時間|じかん}に{木版画|もくはんが}を{制作|せいさく}する{課題|かだい}。4{人|にん}はそれぞれの{版画|はんが}を{進|すす}めている。{下絵|したえ}→{転写|てんしゃ}→{彫|ほ}り→{刷|す}り→{乾燥|かんそう}の5{工程|こうてい}だ。"
      - type: narration
        text: "ところが——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "カナデの{版木|はんぎ}を{刷|す}ったら、{下絵|したえ}にはなかった{変|へん}な{模様|もよう}が{印刷|いんさつ}されていた！ {版木|はんぎ}に{誰|だれ}かが{勝手|かって}に{彫刻刀|ちょうこくとう}を{入|い}れた？ それとも……？"
      - type: sprite
        character: kanade
        expression: worried
        position: left
      - type: dialog
        character: kanade
        text: "わたしの{版画|はんが}に{変|へん}な{模様|もよう}が{出|で}た！ {花畑|はなばたけ}しか{彫|ほ}ってないのに……なんで？"
        expression: worried
      - type: sprite
        character: kanade
        action: hide
      - type: sprite_group
        characters:
          - character: hinata
            expression: thinking
          - character: sumire
            expression: thinking
          - character: tsukuru
            expression: surprised
          - character: kanade
            expression: worried
      - type: narration
        text: "4{人|にん}は{刷|す}り{上|あ}がった{版画|はんが}を{見|み}つめた。「{花畑|はなばたけ}」の{絵|え}の{上|うえ}に、{下絵|したえ}にはなかった{模様|もよう}が{重|かさ}なっている。いったい{何|なに}が{起|お}きたのか？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 版画の空白
        subtitle: 図工探偵団 Vol.7

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 4人の版画を確認しよう
      - type: narration
        text: "4{人|にん}の{版画|はんが}テーマと{工程|こうてい}の{進|すす}み{具合|ぐあい}を{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "ヒナタ —— 「{校舎|こうしゃ}」。まっすぐな{横線|よこせん}・{縦線|たてせん}が{多|おお}い。{彫|ほ}り→{刷|す}り、{完成|かんせい}。{問題|もんだい}なし。"
      - type: narration
        text: "スミレ —— 「{猫|ねこ}」。なめらかな{曲線|きょくせん}が{多|おお}い。{彫|ほ}り→{刷|す}り、{完成|かんせい}。{問題|もんだい}なし。"
      - type: narration
        text: "ツクル —— 「{船|ふね}」。{波|なみ}の{斜|なな}め{線|せん}+大きめのV{字|じ}{彫|ぼ}り。{彫|ほ}り→{刷|す}り、{完成|かんせい}。{問題|もんだい}なし。"
      - type: narration
        text: "カナデ —— 「{花畑|はなばたけ}」。{細|こま}かいV{字|じ}の{花|はな}びら{彫|ぼ}り。{彫|ほ}り→{刷|す}り→{変|へん}な{模様|もよう}が{出|で}た！"
      - type: narration
        text: "{他|ほか}の3{人|にん}の{版画|はんが}には{問題|もんだい}がない。カナデの{版画|はんが}だけに{変|へん}な{模様|もよう}が{出|で}た。"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 工程タイムラインを確認しよう
      - type: narration
        text: "{今日|きょう}の{授業中|じゅぎょうちゅう}、4{人|にん}の「{彫|ほ}りが{終|お}わった{時刻|じこく}」を{記録|きろく}した。"
      - type: se
        sound: discover
      - type: narration
        text: "ヒナタ —— {彫|ほ}り{終|お}わり10:20、{刷|す}り{開始|かいし}10:25。{間|あいだ}の{時間|じかん}：{約|やく}5{分|ふん}。"
      - type: narration
        text: "スミレ —— {彫|ほ}り{終|お}わり10:10、{刷|す}り{開始|かいし}10:18。{間|あいだ}の{時間|じかん}：{約|やく}8{分|ぷん}。"
      - type: narration
        text: "ツクル —— {彫|ほ}り{終|お}わり10:15、{刷|す}り{開始|かいし}10:22。{間|あいだ}の{時間|じかん}：{約|やく}7{分|ふん}。"
      - type: narration
        text: "カナデ —— {彫|ほ}り{終|お}わり10:05、{刷|す}り{開始|かいし}10:30。{間|あいだ}の{時間|じかん}：{約|やく}25{分|ふん}！"
      - type: narration
        text: "カナデだけが「{彫|ほ}り→{刷|す}り」の{間|あいだ}に{約|やく}25{分|ぷん}の「{空白|くうはく}の{時間|じかん}」がある。{他|ほか}の3{人|にん}は5〜8{分|ぷん}。この25{分間|ふんかん}に{何|なに}が{起|お}きた？"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 模様を分析しよう
      - type: narration
        text: "カナデの{版画|はんが}に{印刷|いんさつ}された「{変|へん}な{模様|もよう}」を{詳|くわ}しく{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "{細|こま}かい{線|せん}が{組|く}み{合|あ}わさっている。よく{見|み}ると、{文字|もじ}を{書|か}いたような{構造|こうぞう}に{見|み}える。"
      - type: narration
        text: "{特|とく}に「タ」「カ」「ナ」のような——カタカナを{左右|さゆう}{反転|はんてん}した{形|かたち}に{見|み}える{部分|ぶぶん}がある。"
      - type: narration
        text: "{版画|はんが}を{刷|す}ると、{版木|はんぎ}の{絵|え}は{左右|さゆう}{反転|はんてん}して{印刷|いんさつ}される。{版木|はんぎ}に「カ」があれば、{印刷|いんさつ}されるのは「カ」の{左右|さゆう}{反転|はんてん}。"
      - type: narration
        text: "{版木|はんぎ}の{表面|おもてめん}には「{花畑|はなばたけ}」しかない。もし{版木|はんぎ}の{裏面|うらめん}に{文字|もじ}が{彫|ほ}ってあって、{表裏|おもてうら}を{間違|まちが}えて{刷|す}ってしまったとしたら——この{模様|もよう}の{説明|せつめい}がつく。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 彫刻刀の跡を分析しよう
      - type: narration
        text: "「{変|へん}な{模様|もよう}」の{彫|ほ}り{跡|あと}を{詳|くわ}しく{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "{模様|もよう}の{彫|ほ}り{跡|あと}は{細|こま}かく、{一定|いってい}の{幅|はば}がある。{細|ほそ}いV{字|じ}の{彫|ほ}り{跡|あと}が{多|おお}い。{全体的|ぜんたいてき}に{繊細|せんさい}で{丁寧|ていねい}な{仕上|しあ}がりだ。"
      - type: narration
        text: "4{人|にん}の{彫|ほ}り{方|かた}を{比較|ひかく}しよう。ヒナタ：まっすぐな{水平|すいへい}・{垂直|すいちょく}の{線|せん}。V{字|じ}{彫|ぼ}りはほとんど{使|つか}わない。"
      - type: narration
        text: "スミレ：なめらかな{曲線|きょくせん}が{多|おお}い。V{字|じ}{彫|ぼ}りはたまに{使|つか}う。"
      - type: narration
        text: "ツクル：{波|なみ}の{斜|なな}め{線|せん}+大きめのV{字|じ}。{多用|たよう}するが大きめ。"
      - type: narration
        text: "カナデ：{花|はな}びらを{表|あらわ}す{細|こま}かいV{字|じ}。{細|こま}かいV{字|じ}を{多用|たよう}。——「{変|へん}な{模様|もよう}」の{彫|ほ}り{跡|あと}は{細|こま}かいV{字|じ}。カナデの{特徴|とくちょう}と{一致|いっち}する。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 版木の裏面
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "カナデの{版木|はんぎ}の{裏面|うらめん}を{見|み}せてもらいました。{裏面|うらめん}に……{文字|もじ}が{彫|ほ}ってありますね。"
        expression: thinking
      - type: dialog
        character: yamada
        text: "「ヒナタへ ありがとう カナデ」——そう{彫|ほ}ってあります。"
        expression: surprised
      - type: dialog
        character: yamada
        text: "カナデ、{刷|す}るときに{版木|はんぎ}を{置|お}く{向|む}きを{間違|まちが}えたのではないですか？ {裏面|うらめん}を{下|した}にして{刷|す}ってしまうと、{裏面|うらめん}に{彫|ほ}った{文字|もじ}が{印刷|いんさつ}されます。しかも{版画|はんが}は{左右|さゆう}{反転|はんてん}するので、「{左右|さゆう}{反転|はんてん}した{文字|もじ}の{模様|もよう}」になります。"
        expression: determined
      - type: dialog
        character: yamada
        text: "でも……カナデ、ヒナタへのメッセージ、{素敵|すてき}ですね。サプライズの{気持|きも}ちは{本物|ほんもの}だったんです。"
        expression: happy
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "「{変|へん}な{模様|もよう}」の{正体|しょうたい}は、{版木|はんぎ}の{裏面|うらめん}に{彫|ほ}られた{感謝|かんしゃ}のメッセージだった——！"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 何が起きた？
      - type: sprite
        character: hinata
        expression: thinking
        position: left
      - type: dialog
        character: hinata
        text: "{工程|こうてい}のタイムラインを{整理|せいり}した。カナデの「{彫|ほ}り→{刷|す}り」の{間|あいだ}に25{分|ぷん}の{空白|くうはく}がある。この{時間|じかん}に{版木|はんぎ}の{裏面|うらめん}に{彫|ほ}っていたんだ。「{語|かた}られていない{工程|こうてい}」があった。"
        expression: thinking
      - type: sprite
        character: hinata
        action: hide
      - type: sprite
        character: sumire
        expression: determined
        position: right
      - type: dialog
        character: sumire
        text: "{模様|もよう}が{文字|もじ}の{左右|さゆう}{反転|はんてん}に{見|み}えてた。{版木|はんぎ}の{裏面|うらめん}に{文字|もじ}を{彫|ほ}って、{表裏|おもてうら}を{間違|まちが}えて{刷|す}った——だから{反転|はんてん}した{文字|もじ}が{印刷|いんさつ}されたんだ。"
        expression: determined
      - type: sprite
        character: sumire
        action: hide
      - type: sprite
        character: tsukuru
        expression: thinking
        position: left
      - type: dialog
        character: tsukuru
        text: "{彫|ほ}り{跡|あと}の{分析|ぶんせき}で{分|わ}かった。「{変|へん}な{模様|もよう}」の{細|こま}かいV{字|じ}{彫|ぼ}りは、カナデの{花|はな}びらの{彫|ほ}り{方|かた}と{同|おな}じだ。{彫|ほ}ったのはカナデ{自身|じしん}。"
        expression: thinking
      - type: sprite
        character: tsukuru
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{統合|とうごう}しよう。カナデの25{分|ぷん}の{空白|くうはく}{時間|じかん}に{裏面|うらめん}にメッセージを{彫|ほ}った。{刷|す}りのとき{表裏|おもてうら}を{間違|まちが}えて{裏面|うらめん}が{印刷|いんさつ}された。{彫|ほ}り{跡|あと}もカナデの{特徴|とくちょう}と{一致|いっち}——"
      - type: choice
        id: q1
        question: 変な模様が出た原因は？
        options:
          - text: カナデが裏面にメッセージを彫り、表裏を間違えて刷った
            value: kanade
            correct: true
            feedback: "{正解|せいかい}！ カナデはヒナタへの{感謝|かんしゃ}のサプライズとして{版木|はんぎ}の{裏面|うらめん}にメッセージを{彫|ほ}った。{刷|す}りのとき{表裏|おもてうら}を{間違|まちが}えて{裏面|うらめん}が{印刷|いんさつ}され、{左右|さゆう}{反転|はんてん}した{文字|もじ}が「{変|へん}な{模様|もよう}」として{現|あらわ}れた。"
          - text: 誰かがカナデの版木に勝手に彫刻刀を入れた
            value: someone
            feedback: "{版木|はんぎ}の{表面|おもてめん}には「{花畑|はなばたけ}」しかない。{模様|もよう}は{裏面|うらめん}から{来|き}ている。そしてその{彫|ほ}り{跡|あと}はカナデの{特徴|とくちょう}と{一致|いっち}する。{外部|がいぶ}の{犯人|はんにん}ではなく、カナデ{自身|じしん}が{裏面|うらめん}に{彫|ほ}ったものだよ。"
          - text: 版木の木目が偶然模様のように見えただけ
            value: natural
            feedback: "{木目|もくめ}で「タ」「カ」「ナ」のような{文字|もじ}はできない。{彫刻刀|ちょうこくとう}の{細|こま}かいV{字|じ}{彫|ぼ}りの{跡|あと}がはっきり{残|のこ}っている。{誰|だれ}かが{意図的|いとてき}に{彫|ほ}ったものだ。"
          - text: インクの付き方の問題で模様が出た
            value: ink
            feedback: "インクの{問題|もんだい}なら{毎回|まいかい}{同|おな}じ{模様|もよう}は{出|で}ない。{彫刻刀|ちょうこくとう}の{跡|あと}が{残|のこ}っている{以上|いじょう}、{物理的|ぶつりてき}に{彫|ほ}られた{文字|もじ}が{印刷|いんさつ}されたんだ。"

  # ==================== 真実：カナデ ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: カナデの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: kanade
        expression: worried
        position: center
      - type: dialog
        character: kanade
        text: "……ごめんなさい。{変|へん}な{模様|もよう}の{原因|げんいん}は、わたしです。"
        expression: worried
      - type: narration
        text: "カナデは{涙|なみだ}をこらえながら、ゆっくり{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: kanade
        text: "ヒナタが{図工展|ずこうてん}の{準備|じゅんび}を{手伝|てつだ}ってくれたの、すごく{嬉|うれ}しかった。サプライズで{感謝|かんしゃ}を{伝|つた}えたくて、{版木|はんぎ}の{裏面|うらめん}に「ヒナタへ ありがとう カナデ」って{彫|ほ}ったの。"
        expression: thinking
      - type: dialog
        character: kanade
        text: "{彫|ほ}りが10:05に{終|お}わった{後|あと}、{刷|す}りまでの{間|あいだ}に{裏面|うらめん}に{彫|ほ}った。でも{刷|す}るとき、{表裏|おもてうら}を{間違|まちが}えて{裏面|うらめん}を{紙|かみ}に{当|あ}てちゃった。メッセージが{左右|さゆう}{反転|はんてん}して{印刷|いんさつ}されて……"
        expression: worried
      - type: dialog
        character: kanade
        text: "すぐ{気|き}づいて{刷|す}り{直|なお}したけど、{最初|さいしょ}の{紙|かみ}が{残|のこ}っちゃった。サプライズが{台|だい}なしになると{思|おも}って、{言|い}い{出|だ}せなくなって……ごめんなさい。"
        expression: determined
      - type: sprite
        character: kanade
        action: hide

  # ==================== 真実：ほかのメンバー ====================
  - id: truth-others
    bg: classroom-blackboard
    steps:
      - type: sprite
        character: hinata
        expression: surprised
        position: left
      - type: dialog
        character: hinata
        text: "えっ……{僕|ぼく}へのメッセージ？ カナデ、{図工展|ずこうてん}の{準備|じゅんび}はみんなで{一緒|いっしょ}にやったのに……ありがとう。すごく{嬉|うれ}しいよ。"
        expression: happy
      - type: sprite
        character: hinata
        action: hide
      - type: sprite
        character: sumire
        expression: happy
        position: right
      - type: dialog
        character: sumire
        text: "{模様|もよう}が{文字|もじ}の{左右|さゆう}{反転|はんてん}に{見|み}えるって{気|き}づいてた。{版木|はんぎ}の{裏面|うらめん}に{彫|ほ}って{表裏|おもてうら}を{間違|まちが}えたんだ。「{語|かた}られていない{工程|こうてい}」があったのね。"
        expression: happy
      - type: sprite
        character: sumire
        action: hide
      - type: sprite
        character: tsukuru
        expression: happy
        position: left
      - type: dialog
        character: tsukuru
        text: "{彫|ほ}り{跡|あと}の{細|こま}かいV{字|じ}がカナデの{特徴|とくちょう}と{同|おな}じだって{気|き}づいてた。でもまさかサプライズのメッセージだったとは……カナデ、{優|やさ}しいな。"
        expression: happy
      - type: sprite
        character: tsukuru
