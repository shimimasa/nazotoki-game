  id: moral-02
  title: "{広|ひろ}がったウワサと4{人|にん}の{言|い}ぶん"
  series: "{答|こた}えのない{法廷|ほうてい}"
  volume: 2
  estimatedMinutes: 22

characters:
  aoi:
    name: アオイ
    color: "#E91E63"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
