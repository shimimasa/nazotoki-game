meta:
  id: medical-03
  title: "アレルギーの手がかり"
  series: "医療探偵団"
  volume: 3
  estimatedMinutes: 18

characters:
  naoru:
    name: "ナオル"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  mibuki:
    name: "ミブキ"
    color: "#FF4444"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  iyashi:
    name: "イヤシ"
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  genki:
    name: "ゲンキ"
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "給食の時間、クラスメートのクミちゃんがじんましんを発症した。"
      - type: narration
        text: "クミちゃんの保護者はアレルギーの申請をしているが、除去食対応をしていた給食でなぜ反応が出たのか？"
      - type: narration
        text: "給食室の記録、食材のリスト、クミちゃんの行動記録を調べると、「初めて食べた食材なのに反応した」という不思議な事実が浮かび上がる。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: naoru
        expression: worried
        position: center
      - type: dialog
        character: naoru
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: naoru
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: naoru, expression: determined }
          - { id: mibuki, expression: thinking }
          - { id: iyashi, expression: thinking }
          - { id: genki, expression: worried }
      - type: narration
        text: "「医療探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "医療探偵団"
        subtitle: "Vol.3 アレルギーの手がかり"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "クミちゃんのアレルギー申請書"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、アレルゲンの基礎情報ためのヒントはどこにありそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "給食メニューの食材リスト"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、「除去食には入っていない」ことを証明ためのヒントはどこにありそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "アレルギーの仕組みの説明カード"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、推理の医学的根拠ためのヒントはどこにありそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "配膳担当の記録"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、ナオルの担当範囲を絞るためのヒントはどこにありそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "調理器具の使用記録"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、視点転換。交差汚染の直接証拠ためのヒントはどこにありそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: naoru
        expression: worried
        position: left
      - type: dialog
        character: naoru
        text: "Card 5後、「同じトングで触った。知らなかった。微量でも危険だなんて」と理解する場面"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        expression: thinking
        position: right
      - type: dialog
        character: mibuki
        text: "配膳記録の空白に気づき、「ここの記録が抜けている」と指摘する場面"
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        expression: thinking
        position: left
      - type: dialog
        character: iyashi
        text: "食材リストと発症タイミングを対比し、「食材ではなく器具の問題かも」と気づく場面"
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        expression: thinking
        position: right
      - type: dialog
        character: genki
        text: "アレルギーの人にとって、微量でも怖い。その怖さを理解するのも大事」と締める場面"
      - type: sprite
        character: genki
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「アレルギー反応のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: naoru, expression: normal }
          - { id: mibuki, expression: normal }
          - { id: iyashi, expression: normal }
          - { id: genki, expression: worried }
      - type: choice
        id: q1
        text: "アレルギー反応のきっかけになった行動をしたのは誰？"
        options:
          - text: "ナオル"
            value: naoru
            correct: true
            feedback: "ナオルの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - text: "ミブキ"
            value: mibuki
            correct: false
            feedback: "ミブキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "イヤシ"
            value: iyashi
            correct: false
            feedback: "イヤシは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "ゲンキ"
            value: genki
            correct: false
            feedback: "ゲンキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "動機は、#7 守る — ナオルはクミちゃんのために「おいしそうなおかずを先に取ってあげよう」と先に配膳した。しかし同じトングで通常食とアレルギー対応食を触ったため、微量のアレルゲン（落花生）が混入した。ナオルには悪意がなく、「アレルギーのある食材は使っていないから大丈夫」という善意の思い込みがあった。"
      - type: dialog
        character: sensei
        text: "医学的根拠は、食物アレルギーはごく微量のアレルゲン（タンパク質成分）でも反応を引き起こすことがある。除去食であっても、調理器具・トング・食器の交差汚染で微量のアレルゲンが混入することがある。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: naoru
        expression: worried
        position: center
      - type: dialog
        character: naoru
        text: "Card 5後、「同じトングで触った。知らなかった。微量でも危険だなんて」と理解する場面"
      - type: sprite
        character: naoru
        expression: determined
      - type: dialog
        character: naoru
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: naoru
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: アレルギーのメカニズム（初回暴露で感作→IgE抗体産生→再暴露→ヒスタミン放出→じんましん・かゆみ・腫れ）を理解し、なぜ「微量でも反応する」かを説明できる\n・**サブ**: 因果連鎖スキル — 「原因→結果」の連鎖を複数のカードで組み立てる"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: naoru, expression: happy }
          - { id: mibuki, expression: happy }
          - { id: iyashi, expression: happy }
          - { id: genki, expression: happy }
      - type: narration
        text: "医療探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
