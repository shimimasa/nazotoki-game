scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{図工室|ずこうしつ}の{壁|かべ}に{展示|てんじ}していたタクミの{粘土|ねんど}{作品|さくひん}「{未来|みらい}の{街|まち}」が{壊|こわ}れた{状態|じょうたい}で{見|み}つかった。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{作品|さくひん}の{近|ちか}くに「{赤|あか}い{絵|え}の{具|ぐ}の{指紋|しもん}」がついている。4{人|にん}の{中|なか}で{赤|あか}い{絵|え}の{具|ぐ}を{使|つか}っていたのは**ニジカだけ**——だからニジカが{犯人|はんにん}？
      - type: narration
        text: でも{遠近法|えんきんほう}の{知識|ちしき}で「{指紋|しもん}がついた{角度|かくど}」を{分析|ぶんせき}すると、ニジカの{席|せき}からは{物理的|ぶつりてき}に{不可能|ふかのう}な{位置|いち}だと{分|わ}かる。**{見|み}た{目|め}の{証拠|しょうこ}と、{実際|じっさい}の{位置|いち}{関係|かんけい}が{食|く}い{違|ちが}う**。
      - type: narration
        text: "{大事|だいじ}な{知識|ちしき}——{遠近法|えんきんほう}。ものの{見|み}え{方|かた}は{見|み}る{位置|いち}（{視点|してん}）で{変|か}わる。{指紋|しもん}も「どの{角度|かくど}から{触|さわ}ったか」で{向|む}きが{変|か}わる。
      - type: effect
        name: fade-out
      - type: title_card
        text: 遠近法の罠
        subtitle: 美術探偵団 Vol.2

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 赤い指紋と席配置
      - type: narration
        text: "{壊|こわ}れた{作品|さくひん}のそばに{赤|あか}い{指紋|しもん}。{指紋|しもん}の{位置|いち}は{展示台|てんじだい}の**{右側|みぎがわ}{上部|じょうぶ}**。{指先|ゆびさき}の{向|む}きは**{左|ひだり}**を{向|む}いている＝**{右側|みぎがわ}から{手|て}を{伸|の}ばした{角度|かくど}**。"
      - type: narration
        text: "{席|せき}{配置|はいち}を{確認|かくにん}——サクラの{席|せき}は{展示台|てんじだい}の**{右側|みぎがわ}{手前|てまえ}**。タクミは{右|みぎ}{奥|おく}。ニジカは**{左下|ひだりした}**。ユウは{左|ひだり}{中|ちゅう}。"
      - type: narration
        text: "{出入|でい}りノート——16:00タクミ{退室|たいしつ}。16:05ユウ{退室|たいしつ}。16:10ニジカ{退室|たいしつ}。**16:20サクラ{退室|たいしつ}（{最後|さいご}）**。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 赤い絵の具の使用状況
      - type: narration
        text: "{赤|あか}い{絵|え}の{具|ぐ}を{使|つか}ったのは**ニジカだけ**。"
      - type: sprite
        character: nijika
        expression: determined
        position: left
      - type: dialog
        character: nijika
        text: "{赤|あか}い{絵|え}の{具|ぐ}は{使|つか}ったけど、タクミの{作品|さくひん}には{触|さわ}ってない！ それに、{赤|あか}い{絵|え}の{具|ぐ}のチューブをフタを{開|あ}けたまま{机|つくえ}に{置|お}き{忘|わす}れて{帰|かえ}っちゃったの。"
        expression: worried
      - type: sprite
        character: nijika
        action: hide
      - type: narration
        text: ニジカの{机|つくえ}に{赤|あか}い{絵|え}の{具|ぐ}が{開|あ}いたまま{残|のこ}っていた。{他|ほか}の{人|ひと}がニジカの{机|つくえ}のそばを{通|とお}ったら、{手|て}に{赤|あか}がつく{可能性|かのうせい}は？

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: タクミの作品の意図
      - type: sprite
        character: takumi
        expression: determined
        position: right
      - type: dialog
        character: takumi
        text: "『{未来|みらい}の{街|まち}』には、わざと{曲|ま}げた『{歪|ゆが}んだ{塔|とう}』がある。{未来|みらい}は{完璧|かんぺき}じゃない。{少|すこ}し{歪|ゆが}んでいるのがリアルだと{思|おも}って。{意図的|いとてき}な{表現|ひょうげん}なんだ。"
        expression: determined
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: yuu
        expression: thinking
        position: left
      - type: dialog
        character: yuu
        text: "{制作中|せいさくちゅう}にサクラが「あの{塔|とう}、{曲|ま}がってない？ {未完成|みかんせい}なのかな？」って{言|い}ってた。タクミの{意図|いと}とは{違|ちが}う{解釈|かいしゃく}だよね……"
        expression: thinking
      - type: sprite
        character: yuu
        action: hide
      - type: narration
        text: タクミは「{意図的|いとてき}に{曲|ま}げた」。でもサクラは「{未完成|みかんせい}」と{思|おも}った。この**{誤解|ごかい}**が{事件|じけん}の{原因|げんいん}？

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 指紋の角度分析
      - type: effect
        name: fade-in
      - type: sprite
        character: takumi
        expression: determined
        position: left
      - type: dialog
        character: takumi
        text: "{指紋|しもん}を{詳|くわ}しく{分析|ぶんせき}した。{指先|ゆびさき}が{左|ひだり}を{向|む}いている＝**{右側|みぎがわ}から{手|て}を{伸|の}ばした{角度|かくど}**。{左側|ひだりがわ}から{触|さわ}ったら{指先|ゆびさき}は{右|みぎ}を{向|む}くはず——**{一致|いっち}しない**。"
        expression: determined
      - type: sprite
        character: takumi
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "{席|せき}{位置|いち}との{照合|しょうごう}——ニジカ（{左下|ひだりした}）: {回|まわ}り{込|こ}む{必要|ひつよう}あり ❌。ユウ（{左|ひだり}）: {回|まわ}り{込|こ}む{必要|ひつよう}あり ❌。タクミ（{右|みぎ}{奥|おく}）: {触|ふ}れるが16:00に{退室|たいしつ} △。**サクラ（{右|みぎ}{手前|てまえ}）: {右手|みぎて}を{伸|の}ばすだけで{触|ふ}れる ◎**。"
      - type: effect
        name: shake
        duration: 300
      - type: sprite
        character: yuu
        expression: determined
        position: right
      - type: dialog
        character: yuu
        text: "タクミが{帰|かえ}った16:00の{後|あと}、サクラが{席|せき}を{立|た}って{展示台|てんじだい}の{方|ほう}に{歩|ある}いていったのを{見|み}たよ。"
        expression: determined
      - type: sprite
        character: yuu
        action: hide
      - type: narration
        text: サクラが{展示台|てんじだい}に{向|む}かう → {途中|とちゅう}でニジカの{机|つくえ}の{赤|あか}い{絵|え}の{具|ぐ}に{手|て}が{触|ふ}れる → {赤|あか}がついた{手|て}で{作品|さくひん}を{触|さわ}る → 「{歪|ゆが}んだ{塔|とう}」を{直|なお}そうとして{力|ちから}を{入|い}れる → バランスが{崩|くず}れて{壊|こわ}れる → {赤|あか}い{指紋|しもん}が{右側|みぎがわ}{上部|じょうぶ}に{残|のこ}る。

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: narration
        text: 「{赤|あか}い{絵|え}の{具|ぐ}を{使|つか}っていた{人|ひと}＝{犯人|はんにん}」は{思|おも}い{込|こ}みだった。{赤|あか}い{絵|え}の{具|ぐ}は**{別|べつ}の{人|ひと}の{手|て}に{移|うつ}ることがある**。{大事|だいじ}なのは「{誰|だれ}が{使|つか}ったか」ではなく「{指紋|しもん}の{位置|いち}がどの{席|せき}と{合|あ}うか」。
      - type: choice
        id: q1
        question: タクミの作品を壊したのは誰？
        options:
          - text: サクラ（席が右手前＋指紋の角度が一致＋「未完成」と誤解＋展示台に向かった）
            value: sakura
            correct: true
            feedback: "{正解|せいかい}！ サクラは「{歪|ゆが}んだ{塔|とう}」を{未完成|みかんせい}だと{誤解|ごかい}し、{直|なお}そうとして{壊|こわ}してしまった。ニジカの{机|つくえ}に{置|お}いてあった{赤|あか}い{絵|え}の{具|ぐ}が{手|て}につき、{指紋|しもん}が{残|のこ}った。**{視点|してん}を{変|か}えると{真実|しんじつ}が{見|み}えた**。"
          - text: ニジカ（赤い絵の具を使っていた人）
            value: nijika
            feedback: "ニジカは{赤|あか}い{絵|え}の{具|ぐ}を{使|つか}ったけど、{席|せき}は{左下|ひだりした}。{指紋|しもん}の{角度|かくど}は{右側|みぎがわ}からの{角度|かくど}——ニジカの{席|せき}からは{合|あ}わないよ。"
          - text: タクミ（作品の作者）
            value: takumi
            feedback: "タクミは16:00に{帰|かえ}っている。{自分|じぶん}の{作品|さくひん}を{壊|こわ}す{理由|りゆう}もないね。"
          - text: ユウ（サクラの行動を見ていた人）
            value: yuu
            feedback: "ユウは{目撃|もくげき}{情報|じょうほう}を{持|も}っている{側|がわ}。16:05に{帰|かえ}っているよ。"

  # ==================== 真実：サクラ ====================
  - id: truth-sakura
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: サクラの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: sakura
        expression: worried
        position: center
      - type: dialog
        character: sakura
        text: "……ごめんなさい。タクミの{作品|さくひん}を{壊|こわ}したのは、わたしです。でも{悪気|わるぎ}はなかったの。"
        expression: worried
      - type: dialog
        character: sakura
        text: "『{歪|ゆが}んだ{塔|とう}』を{見|み}て「{未完成|みかんせい}なのかな？ {直|なお}してあげよう」って{思|おも}った。タクミが{意図的|いとてき}に{曲|ま}げたなんて{知|し}らなくて……。{展示台|てんじだい}に{向|む}かう{途中|とちゅう}でニジカの{机|つくえ}の{赤|あか}い{絵|え}の{具|ぐ}に{手|て}が{触|ふ}れちゃって。"
        expression: thinking
      - type: dialog
        character: sakura
        text: "{直|なお}そうと{力|ちから}を{入|い}れたらバランスが{崩|くず}れて{壊|こわ}れちゃった。パニックになって、そのまま{帰|かえ}ってしまった……ごめんなさい。"
        expression: worried
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: takumi
        expression: thinking
        position: right
      - type: dialog
        character: takumi
        text: "{手伝|てつだ}おうとしてくれたんだ。{気持|きも}ちは{嬉|うれ}しい。でも{次|つぎ}は{聞|き}いてくれると{助|たす}かるな。あの{歪|ゆが}みは{僕|ぼく}の{表現|ひょうげん}なんだ。"
        expression: happy
      - type: sprite
        character: takumi
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{最初|さいしょ}はニジカが{犯人|はんにん}に{見|み}えた。{赤|あか}い{絵|え}の{具|ぐ}を{使|つか}っていたから。でも{指紋|しもん}の{角度|かくど}——つまり「{視点|してん}を{変|か}える」と、{真犯人|しんはんにん}はサクラだった。"
        expression: happy
      - type: dialog
        character: sensei
        text: "{遠近法|えんきんほう}で{学|まな}んだ「{見|み}る{位置|いち}で{見|み}え{方|かた}が{変|か}わる」は、{推理|すいり}でも{同|おな}じ。1つの{視点|してん}だけで{判断|はんだん}せず、{複数|ふくすう}の{角度|かくど}から{見|み}ることが{大切|たいせつ}よ。"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "{善意|ぜんい}の{誤解|ごかい}——「{直|なお}してあげよう」が「{壊|こわ}してしまった」に。{相手|あいて}の{意図|いと}を{確認|かくにん}すること。{自分|じぶん}の{解釈|かいしゃく}が{正|ただ}しいと{思|おも}い{込|こ}まないこと。
      - type: narration
        text: "{視点|してん}を{変|か}えると、{見|み}え{方|かた}が{変|か}わる。{絵|え}も{推理|すいり}も{同|おな}じだ。
      - type: effect
        name: fade-out
