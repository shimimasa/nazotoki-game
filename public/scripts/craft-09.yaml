scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校|がっこう}の{校内|こうない}{作品展|さくひんてん}が{開|ひら}かれた。{全校|ぜんこう}のみんなが{来場|らいじょう}して、4つのクラスの{作品|さくひん}を{見|み}てコメントカードに{感想|かんそう}と{評価|ひょうか}を{書|か}いた。"
      - type: narration
        text: "ところが——"
      - type: se
        sound: discover
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{集計|しゅうけい}された{評価|ひょうか}データを{見|み}ると、3{組|くみ}だけ{全作品|ぜんさくひん}が「よかった」という{高|たか}{評価|ひょうか}。{他|ほか}の3クラスは{作品|さくひん}ごとにバラバラなのに、3{組|くみ}だけ{全部|ぜんぶ}{均一|きんいつ}。これはおかしい。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "3{組|くみ}の{評価|ひょうか}データだけが{全作品|ぜんさくひん}「よかった83・ふつう0・もう{少|すこ}し0」で{均一|きんいつ}になっています。{他|ほか}の3クラスは{作品|さくひん}ごとにばらつきがある。これは{不自然|ふしぜん}ですね。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: hinata
            expression: worried
          - character: sumire
            expression: thinking
          - character: tsukuru
            expression: surprised
          - character: kanade
            expression: worried
      - type: narration
        text: "4{人|にん}は{集計表|しゅうけいひょう}を{見|み}つめた。{誰|だれ}かが3{組|くみ}の{評価|ひょうか}データを{書|か}き{換|か}えたのか？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 鑑賞会の法則
        subtitle: 図工探偵団 Vol.9

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 4クラスの評価データを比べよう
      - type: narration
        text: "4クラスの{評価|ひょうか}{集計|しゅうけい}データを{並|なら}べて{比較|ひかく}した。"
      - type: se
        sound: discover
      - type: narration
        text: "1{組|くみ}——{作品|さくひん}ごとに「よかった」「ふつう」「もう{少|すこ}し」の{数字|すうじ}がバラバラ。{高|たか}いものも{低|ひく}いものもある。{自然|しぜん}な{評価|ひょうか}。"
      - type: narration
        text: "2{組|くみ}——{作品|さくひん}ごとに{数字|すうじ}がバラバラ。{自然|しぜん}な{評価|ひょうか}。"
      - type: narration
        text: "3{組|くみ}——{全|ぜん}6{作品|さくひん}が「よかった83・ふつう0・もう{少|すこ}し0」。{完全|かんぜん}に{均一|きんいつ}。83{人|にん}{全員|ぜんいん}が{全|ぜん}6{作品|さくひん}を{同|おな}じように「よかった」と{感|かん}じた？"
      - type: narration
        text: "4{組|くみ}——{作品|さくひん}ごとに{数字|すうじ}がバラバラ。{自然|しぜん}な{評価|ひょうか}。"
      - type: narration
        text: "1・2・4{組|くみ}はバラバラ。3{組|くみ}だけ{全部|ぜんぶ}{均一|きんいつ}。{自然|しぜん}な{評価|ひょうか}には{必|かなら}ずばらつきが{出|で}る。3{組|くみ}のデータは{不自然|ふしぜん}だ。"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 集計作業の記録を確認しよう
      - type: narration
        text: "{集計|しゅうけい}{作業|さぎょう}の{記録|きろく}を{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "{集計|しゅうけい}{手順|てじゅん}——コメントカードを{回収|かいしゅう}→クラスごとに{仕分|しわ}け→「よかった・ふつう・もう{少|すこ}し」を{数|かぞ}えて{集計表|しゅうけいひょう}に{記入|きにゅう}→{先生|せんせい}に{提出|ていしゅつ}。"
      - type: narration
        text: "{集計|しゅうけい}{作業|さぎょう}を{担当|たんとう}したのはヒナタ（{集計係|しゅうけいがかり}）。1{人|り}で{教室|きょうしつ}にて{作業|さぎょう}を{実施|じっし}。"
      - type: narration
        text: "{集計|しゅうけい}{作業中|さぎょうちゅう}、カナデが{近|ちか}くを{通|とお}った。ヒナタが「{困|こま}った{顔|かお}」をしていたのを{目撃|もくげき}。"
      - type: narration
        text: "データを{変更|へんこう}する{機会|きかい}があったのは——ヒナタだけ（1{人|り}で{集計|しゅうけい}{作業|さぎょう}）。スミレ・ツクル・カナデは{集計|しゅうけい}{作業|さぎょう}に{関与|かんよ}なし。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: コメントカードの筆跡を調べよう
      - type: narration
        text: "{回収|かいしゅう}されたコメントカードを{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "1・2・4{組|くみ}——コメントが{来場者|らいじょうしゃ}の{筆跡|ひっせき}でバラバラ。{自然|しぜん}な{状態|じょうたい}。"
      - type: narration
        text: "3{組|くみ}——「よかった」の{欄|らん}に{追加|ついか}された{文字|もじ}が1{人|にん}の{筆跡|ひっせき}に{見|み}えるものがある。「もう{少|すこ}し」の{欄|らん}は{全|すべ}て{空白|くうはく}。{修正|しゅうせい}された{痕跡|こんせき}が{見|み}られるカードもある。"
      - type: narration
        text: "{筆跡|ひっせき}が「1{人|にん}の{字|じ}」に{見|み}える{部分|ぶぶん}がある。{誰|だれ}かが{後|あと}から{書|か}き{足|た}した{可能性|かのうせい}——{集計|しゅうけい}の{際|さい}にデータを{変|か}えた{人|ひと}がいる。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 作品レベルを比べよう
      - type: narration
        text: "{展示|てんじ}{準備|じゅんび}を{担当|たんとう}した{人|ひと}の{観察|かんさつ}メモと、{先生|せんせい}の{評価|ひょうか}{記録|きろく}をまとめた。"
      - type: se
        sound: discover
      - type: narration
        text: "1{組|くみ}——{全体|ぜんたい}{的|てき}に{仕上|しあ}がりが{良|よ}い。2{組|くみ}——{全体|ぜんたい}{的|てき}に{仕上|しあ}がりが{良|よ}い。4{組|くみ}——{全体|ぜんたい}{的|てき}に{仕上|しあ}がりが{良|よ}い。"
      - type: narration
        text: "3{組|くみ}——{完成度|かんせいど}の{高|たか}い{作品|さくひん}と{低|ひく}い{作品|さくひん}が{混在|こんざい}。1{点|てん}だけ{明|あき}らかに{未完成|みかんせい}に{見|み}える{作品|さくひん}がある。{先生|せんせい}も「もう{少|すこ}し{丁寧|ていねい}に{仕上|しあ}げましょう」と{指導|しどう}。"
      - type: narration
        text: "{先生|せんせい}が「もう{少|すこ}し{丁寧|ていねい}に」と{指導|しどう}した{作品|さくひん}が、{集計|しゅうけい}では「{全員|ぜんいん}よかった」になっている。データと{実際|じっさい}の{作品|さくひん}レベルが{矛盾|むじゅん}している。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 先生の統計分析
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "4クラスの{評価|ひょうか}データを{統計的|とうけいてき}に{分析|ぶんせき}しました。1・2・4{組|くみ}は{作品|さくひん}ごとに{評価|ひょうか}がバラバラ。これは{自然|しぜん}な{評価|ひょうか}です——83{人|にん}が{同|おな}じ{作品|さくひん}を{見|み}ても、{感|かん}じ{方|かた}は{人|ひと}それぞれ{違|ちが}うから。"
        expression: thinking
      - type: dialog
        character: yamada
        text: "ところが3{組|くみ}は{全|ぜん}6{作品|さくひん}すべてが「よかった83」。{自然|しぜん}な{評価|ひょうか}には{必|かなら}ずばらつきが{出|で}ます。83{人|にん}{全員|ぜんいん}が{全|ぜん}6{作品|さくひん}を{同|おな}じように「よかった」と{感|かん}じるのは、{統計的|とうけいてき}にはほぼありえません。"
        expression: determined
      - type: dialog
        character: yamada
        text: "これは{誰|だれ}かが{人為的|じんいてき}に3{組|くみ}のデータを{均一化|きんいつか}した{可能性|かのうせい}を{示|しめ}しています。{正直|しょうじき}な{評価|ひょうか}はときに{厳|きび}しいこともある。でも{正直|しょうじき}な{評価|ひょうか}があってこそ、{次|つぎ}の{成長|せいちょう}につながるのです。"
        expression: happy
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "「{自然|しぜん}な{評価|ひょうか}には{必|かなら}ずばらつきが{出|で}る」——この{法則|ほうそく}に3{組|くみ}だけが{当|あ}てはまらない。{誰|だれ}が、なぜ、3{組|くみ}のデータを{書|か}き{換|か}えた？"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: sprite
        character: sumire
        expression: determined
        position: left
      - type: dialog
        character: sumire
        text: "3{組|くみ}だけ{全作品|ぜんさくひん}が{均一|きんいつ}に{高|たか}{評価|ひょうか}。{自然|しぜん}な{評価|ひょうか}にはばらつきが{出|で}るはず。3{組|くみ}だけパターンが{違|ちが}う。これは{誰|だれ}かが{変|か}えた{証拠|しょうこ}だ。"
