      - type: sprite
        character: sumire
        action: hide
      - type: sprite
        character: kanade
        expression: worried
        position: right
      - type: dialog
        character: kanade
        text: "{集計|しゅうけい}{作業中|さぎょうちゅう}のヒナタの{様子|ようす}が{気|き}になってた。{困|こま}った{顔|かお}で{集計表|しゅうけいひょう}に{何|なに}かを{書|か}いてて、その{後|あと}「ふう」って{小|ちい}さく{息|いき}をついて{普通|ふつう}の{顔|かお}に{戻|もど}った。あの{表情|ひょうじょう}、{何|なに}かあったんじゃない？"
        expression: worried
      - type: sprite
        character: kanade
        action: hide
      - type: sprite
        character: tsukuru
        expression: thinking
        position: left
      - type: dialog
        character: tsukuru
        text: "{展示|てんじ}{準備|じゅんび}で3{組|くみ}の{作品|さくひん}を{見|み}た。{正直|しょうじき}、1{点|てん}だけ{完成度|かんせいど}が{低|ひく}い{作品|さくひん}があった。それが{集計|しゅうけい}では「{全員|ぜんいん}よかった」になってる。{実際|じっさい}の{作品|さくひん}と{評価|ひょうか}が{合|あ}ってない。"
        expression: thinking
      - type: sprite
        character: tsukuru
        action: hide
      - type: narration
        text: "{帰納法|きのうほう}で{整理|せいり}しよう。3クラスのデータから「ばらつきがある={自然|しぜん}」という{法則|ほうそく}が{見|み}える。3{組|くみ}だけその{法則|ほうそく}に{当|あ}てはまらない。データを{変|か}える{機会|きかい}があったのはヒナタだけ——"
      - type: choice
        id: q1
        question: 3組の評価データを書き換えたのは誰？
        options:
          - text: ヒナタ（集計係。1人で作業。3組の友達の低評価を見て書き換えた）
            value: hinata
            correct: true
            feedback: "{正解|せいかい}！ ヒナタは{集計係|しゅうけいがかり}として1{人|り}で{作業|さぎょう}していた。3{組|くみ}の{友達|ともだち}の{作品|さくひん}への{低|てい}{評価|ひょうか}を{見|み}て「{可哀想|かわいそう}」と{思|おも}い、3{組|くみ}{全作品|ぜんさくひん}の{評価|ひょうか}を「よかった」に{書|か}き{換|か}えた。{責任感|せきにんかん}の{暴走|ぼうそう}だ。"
          - text: スミレ（データの不自然さに一番詳しい）
            value: sumire
            feedback: "スミレはデータの{不自然|ふしぜん}さに{気|き}づいた{分析者|ぶんせきしゃ}であって、{集計|しゅうけい}{作業|さぎょう}には{関与|かんよ}していない。データを{変|か}える{機会|きかい}がなかったよ。"
          - text: ツクル（3組の作品が低レベルだと知っていた）
            value: tsukuru
            feedback: "ツクルは{展示|てんじ}{準備|じゅんび}で{作品|さくひん}を{見|み}ただけ。{集計|しゅうけい}{作業|さぎょう}には{関与|かんよ}していないし、データを{書|か}き{換|か}える{動機|どうき}もないよ。"
          - text: カナデ（ヒナタの異変に気づいていた目撃者）
            value: kanade
            feedback: "カナデは{来場者|らいじょうしゃ}{案内係|あんないがかり}で、{集計|しゅうけい}{作業|さぎょう}には{関与|かんよ}なし。ヒナタの{異変|いへん}を{目撃|もくげき}しただけで、データに{触|ふ}れる{機会|きかい}はなかったよ。"

  # ==================== 真実：ヒナタ ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ヒナタの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: hinata
        expression: worried
        position: center
      - type: dialog
        character: hinata
        text: "……ごめんなさい。3{組|くみ}のデータを{書|か}き{換|か}えたのは、{僕|ぼく}です。"
        expression: worried
      - type: narration
        text: "ヒナタは{下|した}を{向|む}きながら、{静|しず}かに{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: hinata
        text: "{集計|しゅうけい}をしてたら、3{組|くみ}のある{作品|さくひん}に「もう{少|すこ}し」がたくさんあった。その{作品|さくひん}を{作|つく}ったのは、{僕|ぼく}の{友達|ともだち}。{一生懸命|いっしょうけんめい}{作|つく}ったって{聞|き}いてたから……{低|てい}{評価|ひょうか}が{可哀想|かわいそう}で。"
        expression: thinking
      - type: dialog
        character: hinata
        text: "「{集計係|しゅうけいがかり}の{自分|じぶん}がやれば、{友達|ともだち}を{傷|きず}つけずに{済|す}む」って{思|おも}った。だから3{組|くみ}{全部|ぜんぶ}の{評価|ひょうか}を「よかった」に{変|か}えた。……{友達|ともだち}を{守|まも}りたかったんだ。でも{間違|まちが}ってた。"
        expression: determined
      - type: sprite
        character: hinata
        action: hide

  # ==================== 真実：ほかのメンバー ====================
  - id: truth-others
    bg: classroom-blackboard
    steps:
      - type: sprite
        character: sumire
        expression: thinking
        position: left
      - type: dialog
        character: sumire
        text: "データを{並|なら}べた{瞬間|しゅんかん}「3{組|くみ}だけ{均一|きんいつ}」って{気|き}づいた。{自然|しぜん}な{評価|ひょうか}にはばらつきが{出|で}る。{均一|きんいつ}は{不自然|ふしぜん}の{証拠|しょうこ}。{帰納法|きのうほう}でパターンの{不一致|ふいっち}を{見|み}つけたの。"
        expression: thinking
      - type: sprite
        character: sumire
        action: hide
      - type: sprite
        character: tsukuru
        expression: worried
        position: right
      - type: dialog
        character: tsukuru
        text: "{展示|てんじ}{準備|じゅんび}で3{組|くみ}の{作品|さくひん}を{見|み}てた。「この{作品|さくひん}は{正直|しょうじき}、もう{少|すこ}しだな」って{思|おも}った{作品|さくひん}が「{全員|ぜんいん}よかった」になってて、おかしいと{思|おも}ってた。ヒナタの{気持|きも}ちは{分|わ}かるけど……{正直|しょうじき}な{評価|ひょうか}って{大事|だいじ}だよな。"
        expression: worried
      - type: sprite
        character: tsukuru
        action: hide
      - type: sprite
        character: kanade
        expression: worried
        position: left
