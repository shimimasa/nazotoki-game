scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "海岸清掃中に、外国語（ハングル文字）が書かれたペットボトルが流れ着いた。"
      - type: narration
        text: "シオルが「漁港の漁師さんが韓国のゴミを捨てたに違いない！"
      - type: narration
        text: "」と言い出し、港に乗り込もうとした。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: shioru
        expression: worried
        position: center
      - type: dialog
        character: shioru
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: shioru
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: shioru, expression: determined }
          - { id: minato, expression: thinking }
          - { id: nami, expression: thinking }
          - { id: kai, expression: worried }
      - type: narration
        text: "「海洋探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "海洋探偵団"
        subtitle: "Vol.2 流れ着いたひみつ"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: shioru
        expression: worried
        position: left
      - type: dialog
        character: shioru
        text: "密談後「本当は海流図の読み方が自信なかった。でも先に気づいたって言いたかった"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        expression: thinking
        position: right
      - type: dialog
        character: minato
        text: "漁師さんの道具を全部確認したけど、こういうボトルは1本もなかった"
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        expression: thinking
        position: left
      - type: dialog
        character: nami
        text: "対馬海流の速さで計算すると、この距離は2〜3年かかる。製造日とぴったり合う！"
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        expression: thinking
        position: right
      - type: dialog
        character: kai
        text: "漁師さんは海がきれいなことを誇りにしてる。その人が捨てたって言われたら、どんな気持ちだろう"
      - type: sprite
        character: kai
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「漁師さんを誤って疑う原因を作ったのは誰？」"
      - type: sprite_group
        characters:
          - { id: shioru, expression: normal }
          - { id: minato, expression: normal }
          - { id: nami, expression: normal }
          - { id: kai, expression: worried }
      - type: choice
        id: q1
        text: "漁師さんを誤って疑う原因を作ったのは誰？"
        options:
          - text: "シオル"
            value: shioru
            correct: true
            feedback: "シオルは\"先に気づいた！\"という気持ちが焦りを生み、海流の向きを確認しないで主張してしまいました。でもこのボトルは遠く韓国の沿岸から、対馬海流に乗って2〜3年かけて日本に流れ着いたのです。海流は地球規模の大きな\"川\"——その向きと速さを読むことで、漂着物の旅の軌跡が分かります"
          - text: "ミナト"
            value: minato
            correct: false
            feedback: "ミナトは漁師さんへの聞き取りで事実を確認した側だよ"
          - text: "ナミ"
            value: nami
            correct: false
            feedback: "ナミは海流データで正確に分析した調査側だよ"
          - text: "カイ"
            value: kai
            correct: false
            feedback: "カイは漁師さんの気持ちを最初に気にかけた側だよ"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、シオル"
      - type: dialog
        character: sensei
        text: "動機は、#13 恥ずかしさ — シオルは「自分が先に気づいた！」と得意げに主張したが、海流図の読み方を誤っていた。「対馬海流は北に流れる」という基本的な事実を忘れて、「南から来た＝隣の港から来た」と短絡的に判断した。間違いを指摘されると恥ずかしくて最初は認めなかったが、密談パートで仲間に静かに打ち明ける。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: shioru
        expression: worried
        position: center
      - type: dialog
        character: shioru
        text: "密談後「本当は海流図の読み方が自信なかった。でも先に気づいたって言いたかった"
      - type: sprite
        character: shioru
        expression: determined
      - type: dialog
        character: shioru
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: shioru
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・主要な海流（対馬海流・黒潮など）の向きと速さを理解し、漂着物がどこから来たかを推理できる\n・複数の情報を時系列で整理する（情報整理スキル）。「どの情報が決め手になるか」を判断する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: shioru, expression: happy }
          - { id: minato, expression: happy }
          - { id: nami, expression: happy }
          - { id: kai, expression: happy }
      - type: narration
        text: "海洋探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
