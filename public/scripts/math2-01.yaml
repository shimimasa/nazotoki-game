meta:
  id: math2-01
  title: 約数のカギ
  series: 数学深化探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  riku:
    name: リク
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  hina:
    name: ヒナ
    color: "#E91E63"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  takumi:
    name: タクミ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  kotoha:
    name: コトハ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: library
    bgm: math2-01/opening
    steps:
      - type: narration
        text: "あおば{市立|しりつ}ひまわり小学校の{図書室|としょしつ}に、新しい{備品|びひん}ロッカーが{設置|せっち}された。{暗証番号|あんしょうばんごう}つきだ。"
      - type: sprite
        character: riku
        expression: normal
        position: left
      - type: dialog
        character: riku
        text: "{暗証番号|あんしょうばんごう}は「12の{約数|やくすう}だけで作れる3{桁|けた}の{数字|すうじ}」にしよう。{班|はん}のメンバーなら{約数|やくすう}が分かるからね。"
      - type: sprite
        character: riku
        action: hide
      - type: sprite
        character: takumi
        expression: happy
        position: right
      - type: dialog
        character: takumi
        text: "{設定|せってい}{係|がかり}、おれがやるよ！ {放課後|ほうかご}に{設定|せってい}しておく！"
      - type: sprite
        character: takumi
        action: hide
      - type: narration
        text: "{翌日|よくじつ}の朝——"
      - type: bgm
        action: stop
      - type: sprite
        character: riku
        expression: surprised
        position: center
      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: dialog
        character: riku
        text: "あれ？ タクミから{聞|き}いた「1-4-8」を{入力|にゅうりょく}しても……開かない！"
      - type: sprite
        character: riku
        action: hide
      - type: bgm
        track: math2-01/investigation
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{誰|だれ}かが{約数|やくすう}のルールに{合|あ}わない{番号|ばんごう}を{設定|せってい}した{可能性|かのうせい}があるわ。{数学|すうがく}{深化|しんか}{探偵団|たんていだん}、{約数|やくすう}を{確認|かくにん}して{真相|しんそう}を{突|つ}き{止|と}めて！"
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 数学深化探偵団 Vol.1
        subtitle: 約数のカギ

  # ===== メンバー紹介 =====
  - id: suspects
    bg: library
    bgm: math2-01/investigation
    steps:
      - type: narration
        text: "{図書|としょ}{委員|いいん}「すうじたんてい{団|だん}」の4人に話を{聞|き}こう。"
      - type: sprite
        character: riku
        expression: normal
        position: left
      - type: dialog
        character: riku
        text: "ぼくはリク。「12の{約数|やくすう}で{暗証番号|あんしょうばんごう}を作ろう」って{提案|ていあん}した。タクミが{設定|せってい}して「1-4-8」って{教|おし}えてくれたから{全員|ぜんいん}に{伝|つた}えた。"
      - type: sprite
        character: riku
        action: hide
      - type: sprite
        character: hina
        expression: normal
        position: right
      - type: dialog
        character: hina
        text: "わたしはヒナ。リクから「1-4-8」って{聞|き}いたよ。でも……8って12の{約数|やくすう}だっけ？ ちょっと気になったんだけど。"
        expression: thinking
      - type: sprite
        character: hina
        action: hide
      - type: sprite
        character: takumi
        expression: normal
        position: left
      - type: dialog
        character: takumi
        text: "おれはタクミ。{設定|せってい}{係|がかり}を{引|ひ}き{受|う}けて{放課後|ほうかご}に{番号|ばんごう}を{決|き}めたよ。ちゃんと{約数|やくすう}から{選|えら}んだはず……。"
        expression: thinking
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: kotoha
        expression: normal
        position: right
      - type: dialog
        character: kotoha
        text: "わたしはコトハ。{数字|すうじ}の{間違|まちが}いに気づくのが{得意|とくい}。「1-4-8」の{数字|すうじ}、{全部|ぜんぶ}{本当|ほんとう}に12の{約数|やくすう}なのかな？"
        expression: thinking
      - type: sprite
        character: kotoha
        action: hide

  # ===== 証拠カード1: ロッカーの説明 =====
  - id: evidence-1
    bg: library
    bgm: math2-01/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: 暗証番号のルール
      - type: narration
        text: "ロッカーの{暗証番号|あんしょうばんごう}ルール——"
      - type: narration
        text: "「3{桁|けた}の{数字|すうじ}を{使用|しよう}すること」"
      - type: narration
        text: "「{各|かく}{桁|けた}（{百|ひゃく}の{位|くらい}・{十|じゅう}の{位|くらい}・{一|いち}の{位|くらい}）の{数字|すうじ}は{全|すべ}て12の{約数|やくすう}にすること」"
      - type: narration
        text: "{設定|せってい}{担当|たんとう}：タクミ"
      - type: narration
        text: "タクミが{伝|つた}えた{番号|ばんごう}：「1-4-8」"
      - type: se
        sound: common/discover
      - type: narration
        text: "まず{確認|かくにん}しよう——「1」「4」「8」はそれぞれ12の{約数|やくすう}？"

  # ===== 証拠カード2: 約数の確認 =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 12の約数を全部書き出そう！
      - type: narration
        text: "12の{約数|やくすう}を1から{順番|じゅんばん}に{確認|かくにん}する。12をその数で{割|わ}り{切|き}れるか？"
      - type: narration
        text: "12÷1＝12 → {割|わ}り{切|き}れる → 1は{約数|やくすう}"
      - type: narration
        text: "12÷2＝6 → {割|わ}り{切|き}れる → 2は{約数|やくすう}"
      - type: narration
        text: "12÷3＝4 → {割|わ}り{切|き}れる → 3は{約数|やくすう}"
      - type: narration
        text: "12÷4＝3 → {割|わ}り{切|き}れる → 4は{約数|やくすう}"
      - type: narration
        text: "12÷5＝2{余|あま}り2 → {割|わ}り{切|き}れない → 5は{約数|やくすう}ではない"
      - type: narration
        text: "12÷6＝2 → {割|わ}り{切|き}れる → 6は{約数|やくすう}"
      - type: narration
        text: "12÷7＝1{余|あま}り5 → {割|わ}り{切|き}れない → 7は{約数|やくすう}ではない"
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "12÷8＝1{余|あま}り4 → {割|わ}り{切|き}れない → 8は{約数|やくすう}ではない！"
      - type: se
        sound: common/discover
      - type: narration
        text: "12の{約数|やくすう}は：1、2、3、4、6、12 の6個。"
      - type: narration
        text: "12は2{桁|けた}なので{各|かく}{桁|けた}には使えない。使える{数字|すうじ}は：1、2、3、4、6 の5{種類|しゅるい}。"
      - type: narration
        speed: slow
        text: "「8」は12の{約数|やくすう}ではない。——タクミが{伝|つた}えた{番号|ばんごう}「1-4-8」の「8」がルール{違反|いはん}！"

  # ===== 証拠カード3: タクミの行動記録 =====
  - id: evidence-3
    bgm: math2-01/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 昨日の放課後
      - type: narration
        text: リクのメモ——
      - type: narration
        text: "15:45 {打|う}ち{合|あ}わせ{終了|しゅうりょう}。タクミが「{設定|せってい}{係|がかり}やる！」と言って1人で{図書室|としょしつ}に{残|のこ}った"
      - type: narration
        text: "16:10 タクミからメッセージ「{番号|ばんごう}{設定|せってい}したよ。1-4-8ね」"
      - type: narration
        text: "リクは「タクミが{確認|かくにん}したはず」と思い、そのまま{全員|ぜんいん}に{転送|てんそう}した"
      - type: narration
        text: "今朝8:22 リクが「1-4-8」を{入力|にゅうりょく} → 開かない"
      - type: narration
        text: "8:25 タクミを{呼|よ}ぶ → タクミが{入力|にゅうりょく}すると開いた"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "タクミは「1-4-8」と{伝|つた}えたが、{実際|じっさい}に{入力|にゅうりょく}した{番号|ばんごう}は{違|ちが}う？ タクミだけがロッカーを開けられた——。"

  # ===== 証拠カード4: タクミのメモ帳 =====
  - id: evidence-4
    bgm: math2-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: タクミのメモ帳
      - type: narration
        text: "タクミが{昨日|きのう}の{放課後|ほうかご}に{図書室|としょしつ}で書いたメモ——"
      - type: narration
        text: "「12の{約数|やくすう}で3{桁|けた}の{番号|ばんごう}を作る」"
      - type: narration
        text: "「12の{約数|やくすう}→むずかしいな」"
      - type: narration
        text: "「あ！ 12の2{倍|ばい}は24だから、24の{約数|やくすう}を使えばOKだ！」"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "「24の{約数|やくすう}：1、2、3、4、6、8、12、24」"
      - type: narration
        text: "「ここから3つ{選|えら}ぶ → 1、4、8 にしよう！」"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "タクミは「12の{約数|やくすう}」ではなく「24の{約数|やくすう}」から{番号|ばんごう}を{選|えら}んでいた！ 「8」は24の{約数|やくすう}だが12の{約数|やくすう}ではない——ここで{間違|まちが}いが起きた。"

  # ===== 投票 =====
  - id: questions
    bg: library
    bgm: math2-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "12の{約数|やくすう}を{確認|かくにん}できたわね。12の{約数|やくすう}のルールに{違反|いはん}した{番号|ばんごう}を{設定|せってい}したのは{誰|だれ}？"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: 約数のルールに違反した番号を設定したのは誰？
        options:
          - text: リク（番号を全員に伝えた人）
            value: riku
            feedback: リクは番号を受け取って転送しただけ。設定はしていないから、番号のルール違反はリクの責任ではないよ。
          - text: ヒナ（番号を受け取った人）
            value: hina
            feedback: ヒナはメッセージを受け取っただけ。番号を設定する権限も機会もなかったよ。
          - text: タクミ（番号を設定した人）
            value: takumi
            feedback: 正解！ タクミが設定係で「1-4-8」を設定した。メモ帳に「24の約数から選んだ」と書いてある——12の約数と混同した。
          - text: コトハ（番号を受け取った人）
            value: kotoha
            feedback: コトハもメッセージを受け取っただけ。番号の設定には関わっていないよ。
      - type: choice
        id: q2
        question: なぜ「8」を12の約数だと思ってしまった？
        options:
          - text: 12の約数と24の約数を混同したから
            value: confusion
            feedback: 正解！ タクミのメモに「12の2倍は24だから24の約数を使えばOK」と書いてある。24の約数には8が含まれるが、12の約数には含まれない。
          - text: 計算を間違えたから
            value: miscalculation
            feedback: 計算ミスというより「12の約数を全部書き出す」ステップを省略して、24の約数で代用しようとしたのが原因だよ。
          - text: 約数の意味を知らなかったから
            value: ignorance
            feedback: タクミは約数の意味は知っていた。「24の約数から選べばいい」という思い込みで近道しようとしたのが問題。
          - text: わざと違う番号にしたから
            value: intentional
            feedback: タクミに悪意はなかった。面倒くさがって「全部書き出す」ステップを飛ばしただけだよ。

  # ===== 証拠カード5: 比較表 =====
  - id: evidence-5
    bgm: math2-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: 12の約数と24の約数の比較
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "12の{約数|やくすう}と24の{約数|やくすう}を{並|なら}べて{比|くら}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "12の{約数|やくすう}：1、2、3、4、6、12（6個）"
      - type: narration
        text: "24の{約数|やくすう}：1、2、3、4、6、8、12、24（8個）"
      - type: se
        sound: common/discover
      - type: narration
        text: "同じ{数字|すうじ}：1、2、3、4、6、12 → 12の{約数|やくすう}は{全|すべ}て24の{約数|やくすう}でもある"
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "24だけにある{数字|すうじ}：8、24 → この2つは12の{約数|やくすう}ではない！"
      - type: narration
        text: "タクミは「24の{約数|やくすう}なら12の{約数|やくすう}も{全|すべ}て{含|ふく}む」と思った。{半分|はんぶん}正しい。でも「24の{約数|やくすう}＝12の{約数|やくすう}」ではない。"
      - type: narration
        text: "12÷8＝1{余|あま}り4。{割|わ}り{切|き}れない。8は12の{約数|やくすう}ではない。タクミのメモが{全|すべ}てを{物語|ものがた}っている。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: library
    bgm: math2-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: 約数と倍数を混同した
      - type: effect
        name: fade-in
        duration: 600

  # リクの秘密
  - id: truth-riku
    bg: library
    steps:
      - type: sprite
        character: riku
        expression: worried
        position: left
      - type: dialog
        character: riku
        text: "ぼくも{反省|はんせい}しなきゃ。「12の{約数|やくすう}で作ろう」って{提案|ていあん}したのに、タクミの{番号|ばんごう}を{確認|かくにん}しなかった。"
      - type: dialog
        character: riku
        text: "「8って12の{約数|やくすう}だっけ？」って{一瞬|いっしゅん}思ったのに、「タクミが{確認|かくにん}したはず」で{済|す}ませた。"
        expression: determined
      - type: sprite
        character: riku
        action: hide

  # ヒナの秘密
  - id: truth-hina
    steps:
      - type: sprite
        character: hina
        expression: worried
        position: right
      - type: dialog
        character: hina
        text: "わたしも「8」に{違和感|いわかん}があったの。でも{計算|けいさん}して{確認|かくにん}しなかった。"
      - type: dialog
        character: hina
        text: "タクミが「24の{約数|やくすう}から{選|えら}んだ」って言ってたのも{聞|き}いてた。あのとき「それ{違|ちが}うよ」って言えてれば……。"
        expression: determined
      - type: sprite
        character: hina
        action: hide

  # コトハの秘密
  - id: truth-kotoha
    steps:
      - type: sprite
        character: kotoha
        expression: worried
        position: left
      - type: dialog
        character: kotoha
        text: "わたし、ノートに12の{約数|やくすう}を書き出しかけたの。でも{途中|とちゅう}でやめちゃった。"
      - type: dialog
        character: kotoha
        text: "「{全員|ぜんいん}で{番号|ばんごう}を{確認|かくにん}しよう」ってメッセージも書きかけたけど、「{余計|よけい}なことかも」ってやめた。"
        expression: determined
      - type: sprite
        character: kotoha
        action: hide

  # タクミの真実（クライマックス）
  - id: truth-takumi
    bgm: math2-01/truth
    steps:
      - type: sprite
        character: takumi
        expression: worried
        position: center
      - type: dialog
        character: takumi
        text: "……おれのミスだ。「12の{約数|やくすう}」を{全部|ぜんぶ}書き出さないで、{近道|ちかみち}しようとした。"
      - type: narration
        speed: slow
        text: "タクミがゆっくりと話し{始|はじ}めた。"
      - type: dialog
        character: takumi
        text: "「12の{約数|やくすう}って何だっけ？ むずかしいな」って思って、「12の2{倍|ばい}は24だから24の{約数|やくすう}を使えばいいや」って{考|かんが}えた。"
        expression: worried
      - type: dialog
        character: takumi
        text: "24の{約数|やくすう}を書き出したら8が入ってた。「1、4、8——これでいいや」って。"
      - type: dialog
        character: takumi
        text: "でも12÷8は1{余|あま}り4で{割|わ}り{切|き}れない。8は12の{約数|やくすう}じゃなかった。"
        expression: worried
      - type: dialog
        character: takumi
        text: "「1から{順番|じゅんばん}に{全部|ぜんぶ}{確認|かくにん}する」っていう{一番|いちばん}大事なステップを{飛|と}ばしちゃったんだ。{面倒|めんどう}くさがって{近道|ちかみち}したら、{全部|ぜんぶ}{間違|まちが}えた。"
        expression: determined
      - type: sprite
        character: takumi
        action: hide
      - type: narration
        speed: slow
        text: "タクミに{悪意|あくい}はなかった。「{面倒|めんどう}だから{近道|ちかみち}しよう」と思っただけ。でも{数学|すうがく}は{近道|ちかみち}すると{間違|まちが}える。{全部|ぜんぶ}書き出して{確認|かくにん}する——それが{約数|やくすう}の正しい{求|もと}め方だ。"

  # ===== エピローグ =====
  - id: epilogue
    bg: library
    bgm: math2-01/resolution
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{今回|こんかい}の{事件|じけん}で大切なことが分かったわね。"
