scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "保健室に「薬を飲んだのに全然効かなかった」という相談が相次いでいる。"
      - type: narration
        text: "一方で「すごく効いた」という人もいる。"
      - type: narration
        text: "同じ薬を同じ症状で飲んだはずなのに、なぜ効果に差が出た？"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: iyashi
        expression: worried
        position: center
      - type: dialog
        character: iyashi
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: iyashi
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: naoru, expression: determined }
          - { id: mibuki, expression: thinking }
          - { id: iyashi, expression: thinking }
          - { id: genki, expression: worried }
      - type: narration
        text: "「医療探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "医療探偵団"
        subtitle: "Vol.7 くすりのまちがい"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "薬の配布記録"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、「効かなかった」全員に共通する時刻パターンを確認ためのヒントはどこにありそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "薬の効果報告"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、効果の差を確認ためのヒントはどこにありそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "薬の用法・用量の説明書"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、飲むべきタイミングの基準ためのヒントはどこにありそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "給食・おやつの時刻記録"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、食事の時刻を特定するための情報ためのヒントはどこにありそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "イヤシとの密談後の告白：「食前に配った。食後と食前は同じだと思っていた」と食後・食前の違いの医学的説明"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、前提破壊。情報欠落の解消ためのヒントはどこにありそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: naoru
        expression: thinking
        position: left
      - type: dialog
        character: naoru
        text: "薬の飲み方の説明書を全員で確認しよう」と提案し、正しい知識を引き出す場面"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        expression: thinking
        position: right
      - type: dialog
        character: mibuki
        text: "記録に何が書かれていないか」に最初に気づき、情報欠落を指摘する場面"
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        expression: worried
        position: left
      - type: dialog
        character: iyashi
        text: "密談後、「食後って書いたけど、実際は昼食前に配布した。同じだと思ってた」と告白する場面"
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        expression: thinking
        position: right
      - type: dialog
        character: genki
        text: "薬は正しく使えば助けてくれる。だから指示通りに使うことが大事」と締める場面"
      - type: sprite
        character: genki
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「薬の飲み方の記録を不正確にした行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: naoru, expression: normal }
          - { id: mibuki, expression: normal }
          - { id: iyashi, expression: normal }
          - { id: genki, expression: worried }
      - type: choice
        id: q1
        text: "薬の飲み方の記録を不正確にした行動をしたのは誰？"
        options:
          - text: "ナオル"
            value: naoru
            correct: false
            feedback: "ナオルは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "ミブキ"
            value: mibuki
            correct: false
            feedback: "ミブキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "イヤシ"
            value: iyashi
            correct: true
            feedback: "イヤシの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - text: "ゲンキ"
            value: genki
            correct: false
            feedback: "ゲンキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "動機は、#9 承認欲求 — イヤシは「保健委員として薬の管理を完璧にしたい」というプレッシャーから、「食後30分以内に飲む」という指示を「食前に飲んでも同じ」と解釈して薬を配布した。「どうせ同じだろう」という合理化と、間違いを指摘されたくないという承認欲求から、「食後に飲んだ」という記録に食後の時刻ではなく配布時刻を記録していた。"
      - type: dialog
        character: sensei
        text: "医学的根拠は、薬の飲むタイミングが重要な理由——食後: 胃への刺激が少なく、食事で胃酸が中和されてから吸収される（胃薬・NSAIDs等）。食前: 空腹時に吸収が速い（一部の抗生物質・糖尿病薬等）。食間（食事の2時間後）: 胃が空になった状態で吸収（胃腸薬の一部）。また、薬は水（コップ1杯）で飲むことで正しい速度で溶ける。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: iyashi
        expression: worried
        position: center
      - type: dialog
        character: iyashi
        text: "密談後、「食後って書いたけど、実際は昼食前に配布した。同じだと思ってた」と告白する場面"
      - type: sprite
        character: iyashi
        expression: determined
      - type: dialog
        character: iyashi
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: iyashi
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 薬の正しい用法（用量・飲むタイミング・水で飲む理由）を理解し、「なぜ指示通りに飲む必要があるか」を医学的に説明できる\n・**サブ**: 情報欠落スキル — 「記録されていない情報の存在」に気づき、その情報を引き出す質問を考える"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: naoru, expression: happy }
          - { id: mibuki, expression: happy }
          - { id: iyashi, expression: happy }
          - { id: genki, expression: happy }
      - type: narration
        text: "医療探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
