scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: school
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校全員|がっこうぜんいん}が{使|つか}える{掲示板|けいじばん}アプリの{開発|かいはつ}プロジェクト——{デザイン思考探偵団|でざいんしこうたんていだん}の4{人|にん}が{力|ちから}を{合|あ}わせて{作|つく}り{上|あ}げた。「{全員|ぜんいん}が{使|つか}える」はずだった。"
      - type: narration
        text: "ところが、{完成|かんせい}して{配布|はいふ}してみると——「{自分|じぶん}には{関係|かんけい}ない{感|かん}じがした」と{言|い}って{使|つか}わない{子|こ}が{続出|ぞくしゅつ}した。"
      - type: se
        sound: murmur
      - type: sprite
        character: tsukuru
        expression: surprised
        position: center
      - type: dialog
        character: tsukuru
        text: "え……{半分|はんぶん}くらいの{子|こ}が{使|つか}ってないって？　「みんなのために{作|つく}った」のに、どうして{届|とど}かないんだ！"
        expression: surprised
      - type: sprite
        character: tsukuru
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite_group
        characters:
          - character: tsukuru
            expression: worried
          - character: hakaru
            expression: thinking
          - character: kanae
            expression: worried
          - character: minaosu
            expression: thinking
      - type: narration
        text: "「みんな」のために{作|つく}ったのに、「みんな」に{届|とど}かなかった。「みんな」の{定義|ていぎ}が、{最初|さいしょ}から{特定|とくてい}のグループに{偏|かたよ}っていたとしたら——？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 見えないユーザー
        subtitle: デザイン思考探偵団 Vol.7

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: school
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: アプリ利用状況とペルソナ設計書
      - type: narration
        text: "{利用|りよう}{状況|じょうきょう}の{報告|ほうこく}が{届|とど}いた。{使|つか}っている{子|こ}と{使|つか}っていない{子|こ}のリスト、そして{使|つか}っていない{子|こ}のコメントが{記録|きろく}されている。"
      - type: evidence
        id: card-1
        title: アプリ利用状況報告
        content: "【{使|つか}っている{子|こ}】{積極的|せっきょくてき}にクラスの{活動|かつどう}に{参加|さんか}する{子|こ}・{友達|ともだち}に{話|はな}しかけるのが{得意|とくい}な{子|こ}　【{使|つか}っていない{子|こ}の{声|こえ}（{一部|いちぶ}）】「{自分|じぶん}には{関係|かんけい}ない{感|かん}じがした」「{投稿|とうこう}するのが{恥|は}ずかしい」「{日本語|にほんご}の{読|よ}み{書|か}きが{難|むずか}しい」　【{使|つか}っていない{子|こ}の{特徴|とくちょう}】{内向的|ないこうてき}な{子|こ}・クラスの{活動|かつどう}に{参加|さんか}しにくい{子|こ}・{転校生|てんこうせい}が{多|おお}い"
      - type: sprite
        character: hakaru
        expression: thinking
        position: right
      - type: dialog
        character: hakaru
        text: "{使|つか}っている{子|こ}と{使|つか}っていない{子|こ}で{特徴|とくちょう}が{分|わ}かれてるね。{使|つか}っていない{子|こ}は「{内向的|ないこうてき}」「{転校生|てんこうせい}」——これはアプリの{設計|せっけい}に{何|なん}か{問題|もんだい}があるんじゃないかな。"
        expression: thinking
      - type: sprite
        character: hakaru
        action: hide
      - type: narration
        text: "このアプリを{作|つく}るとき、「{典型的|てんけいてき}なユーザーの{人物像|じんぶつぞう}」——ペルソナを{設計|せっけい}した{記録|きろく}があった。{担当|たんとう}はカナエだ。"
      - type: evidence
        id: card-2
        title: ペルソナ設計書＋ヒアリング実施記録
        content: "【3{名|めい}のペルソナ{人物像|じんぶつぞう}】ペルソナA:「クラスのみんなと{話|はな}したい{積極的|せっきょくてき}な{子|こ}」ペルソナB:「{委員会|いいんかい}{活動|かつどう}を{広|ひろ}めたい{子|こ}」ペルソナC:「{放課後|ほうかご}{活動|かつどう}の{連絡|れんらく}をしたい{子|こ}」　【ヒアリング{実施|じっし}{記録|きろく}】{対象者|たいしょうしゃ}: Aさん（{火曜日|かようび}3{時|じ}）・Bさん（{水曜日|すいようび}3{時|じ}）・Cさん（{水曜日|すいようび}4{時|じ}）※{内向的|ないこうてき}な{子|こ}・{転校生|てんこうせい}へのヒアリング{記録|きろく}なし"
      - type: sprite
        character: minaosu
        expression: surprised
        position: left
      - type: dialog
        character: minaosu
        text: "{待|ま}って——このペルソナ、{全員|ぜんいん}「{積極的|せっきょくてき}に{動|うご}ける{子|こ}」ばかり！　{内向的|ないこうてき}な{子|こ}も、{転校生|てんこうせい}も、1{人|ひとり}も{入|はい}っていないの。"
        expression: surprised
      - type: sprite
        character: minaosu
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: school
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 使わなかった子の詳細とカナエの行動記録
      - type: narration
        text: "{使|つか}わなかった{子|こ}たちの{詳細|しょうさい}なプロフィールと、ペルソナ{設計書|せっけいしょ}との{比較表|ひかくひょう}——{照|てら}らし{合|あ}わせると{何|なに}かが{見|み}えてくる。"
      - type: evidence
        id: card-3
        title: 使わなかった子のプロフィール＋ペルソナ比較表
        content: "【{使|つか}わなかった{子|こ}の{特徴|とくちょう}】①{内向的|ないこうてき}で{大人数|おおにんずう}の{場|ば}が{苦手|にがて}②クラスの{集団活動|しゅうだんかつどう}に{参加|さんか}しにくい③{日本語|にほんご}の{読|よ}み{書|か}きに{不安|ふあん}がある{転校生|てんこうせい}　【ペルソナとの{比較|ひかく}】3{名|めい}のペルソナのどれにも「{内向的|ないこうてき}」「{参加|さんか}しにくい」「{日本語不安|にほんごふあん}」の{要素|ようそ}がない。ペルソナ{設計書|せっけいしょ}のヒアリング{記録|きろく}にも、これらの{子|こ}への{聞|き}き{込|こ}みが{一切|いっさい}ない。"
      - type: sprite
        character: hakaru
        expression: determined
        position: right
      - type: dialog
        character: hakaru
        text: "{完全|かんぜん}に{一致|いっち}している。{使|つか}わなかった{子|こ}たちの{特徴|とくちょう}が、ペルソナ{設計書|せっけいしょ}に{含|ふく}まれていない{層|そう}と{全部|ぜんぶ}{重|かさ}なってる。ペルソナに{含|ふく}まれなかったから、アプリが{届|とど}かなかったんだ。"
        expression: determined
      - type: sprite
        character: hakaru
        action: hide
      - type: narration
        text: "ペルソナ{設計書|せっけいしょ}のヒアリング{実施|じっし}{記録|きろく}の{時刻|じこく}と、カナエの{当日|とうじつ}{行動|こうどう}{記録|きろく}を{照合|しょうごう}すると——{矛盾|むじゅん}が{現|あらわ}れた。"
      - type: evidence
        id: card-4
        title: カナエの当日行動記録＋ペルソナ設計書のインタビュー欄
        content: "【カナエの{当日|とうじつ}{行動|こうどう}{記録|きろく}】{火曜日|かようび}3{時|じ}: Aさんにヒアリング（{記録|きろく}あり）　{水曜日|すいようび}3{時|じ}: Bさんにヒアリング（{記録|きろく}あり）　{水曜日|すいようび}4{時|じ}: Cさんにヒアリング（{記録|きろく}あり）　※「{内向的|ないこうてき}な{子|こ}・{転校生|てんこうせい}へのヒアリング」{時刻|じこく}={記録|きろく}なし（{空白|くうはく}）　【ペルソナ{設計書|せっけいしょ}のインタビュー{欄|らん}】{内向的|ないこうてき}な{子|こ}・{転校生|てんこうせい}へのインタビュー{欄|らん}が{空白|くうはく}のまま"
      - type: sprite
        character: tsukuru
        expression: worried
        position: left
      - type: dialog
        character: tsukuru
        text: "インタビュー{記録|きろく}の{空白|くうはく}……{内向的|ないこうてき}な{子|こ}や{転校生|てんこうせい}には、{結局|けっきょく}{一度|いちど}も{話|はな}しかけていなかったってこと？"
        expression: worried
      - type: sprite
        character: tsukuru
        action: hide

  # ==================== 中間点 ====================
  - id: midpoint
    bg: school
    bgm: thinking-time
    steps:
      - type: narration
        text: "{証拠|しょうこ}が{揃|そろ}ってきた。ペルソナには{積極的|せっきょくてき}な{子|こ}しか{含|ふく}まれていない。ヒアリング{記録|きろく}には{内向的|ないこうてき}な{子|こ}や{転校生|てんこうせい}への{聞|き}き{込|こ}みが{一切|いっさい}ない。{設計書|せっけいしょ}のインタビュー{欄|らん}は{空白|くうはく}。——{動機|どうき}は{何|なに}だったのか。"
      - type: sprite
        character: minaosu
        expression: thinking
        position: right
      - type: dialog
        character: minaosu
        text: "{情報|じょうほう}が「ない」こと{自体|じたい}が{証拠|しょうこ}になる。{記録|きろく}の「{空白|くうはく}」は「ヒアリングしていない」という{事実|じじつ}を{示|しめ}してる。"
        expression: thinking
      - type: sprite
        character: minaosu
        action: hide
      - type: sprite
        character: hakaru
        expression: thinking
        position: center
      - type: dialog
        character: hakaru
        text: "ペルソナ{設計|せっけい}を{担当|たんとう}したのはカナエ1{人|ひとり}。インタビューした3{人|にん}は{全員|ぜんいん}「{積極的|せっきょくてき}に{動|うご}ける{子|こ}」。{話|はな}しかけやすい{相手|あいて}だけを{選|えら}んだとしたら——{自分|じぶん}に{似|に}た{人|ひと}だけをペルソナにしたことになる。"
        expression: thinking
      - type: sprite
        character: hakaru
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: school
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 山田先生の補足とカナエの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "カナエに{直接|ちょくせつ}{確認|かくにん}したところ、こう{話|はな}してくれたの。「{内向的|ないこうてき}な{子|こ}に{話|はな}しかけるのが{苦手|にがて}で、{後回|あとまわ}しにしてしまった。{急|いそ}いでいたから、{話|はな}しかけやすい{子|こ}だけでヒアリングを{終|お}わらせた」——"
        expression: thinking
      - type: dialog
        character: yamada
        text: "{悪意|あくい}はなかった。ただ、「みんな」を{思|おも}い{浮|う}かべたとき——{無意識|むいしき}に{自分|じぶん}と{似|に}た{子|こ}たちだけが{頭|あたま}に{浮|う}かんだの。それが「{無意識|むいしき}のバイアス」よ。"
        expression: determined
      - type: sprite
        character: yamada
        action: hide
      - type: evidence
        id: card-5
        title: 山田先生の補足＋無意識のバイアスとペルソナ設計の解説
        content: "【カナエの{告白|こくはく}（{密談後|みつだんご}）】「{内向的|ないこうてき}な{子|こ}に{話|はな}しかけるのが{怖|こわ}くて、{後回|あとまわ}しにした。{急|いそ}ぎだったから{話|はな}しかけやすい{子|こ}でヒアリングを{終|お}わらせた。ペルソナが{自分|じぶん}と{似|に}た{子|こ}ばかりになってしまった」　【{無意識|むいしき}のバイアスとペルソナ{設計|せっけい}の{解説|かいせつ}】{デザイナー|でざいなー}は{自分|じぶん}に{似|に}た{人|ひと}のことは{想像|そうぞう}しやすいが、{自分|じぶん}と{違|ちが}う{人|ひと}は{見落|みおと}としがち——これを「{無意識|むいしき}のバイアス」という。ペルソナ{設計|せっけい}では、{意識的|いしきてき}に「{自分|じぶん}と{違|ちが}うユーザー」を{探|さが}しに{行|い}くことが{必要|ひつよう}。"
      - type: sprite
        character: minaosu
        expression: determined
        position: right
      - type: dialog
        character: minaosu
        text: "これが「{見|み}えないユーザー」の{正体|しょうたい}。{意識|いしき}しないと{見|み}えてこない{人|ひと}たちが、{最初|さいしょ}からペルソナの{外|そと}に{置|お}かれていたの。{記録|きろく}の「{空白|くうはく}」はそれを{証明|しょうめい}している。"
        expression: determined
      - type: sprite
        character: minaosu
        action: hide
      - type: se
        sound: reveal
      - type: narration
        text: "**{自分|じぶん}に{似|に}た{人|ひと}だけにヒアリング→{内向的|ないこうてき}な{子|こ}・{転校生|てんこうせい}がペルソナから{消|き}える→アプリが「{見|み}えないユーザー」に{届|とど}かない。**{悪意|あくい}ではなく「{見|み}えていない」ことから{生|う}まれた{偏|かたよ}りだった。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: school
    bgm: confrontation
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: ペルソナ設計で「見えないユーザー」を作り出したのは誰？
      - type: sprite
        character: hakaru
        expression: determined
        position: right
      - type: dialog
        character: hakaru
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①ペルソナ{設計|せっけい}{担当|たんとう}はカナエ1{人|ひとり}。②インタビューした{相手|あいて}は{全員|ぜんいん}「{積極的|せっきょくてき}に{動|うご}ける{子|こ}」。③{内向的|ないこうてき}な{子|こ}・{転校生|てんこうせい}へのインタビュー{記録|きろく}が{空白|くうはく}。④{使|つか}わなかった{子|こ}たちの{特徴|とくちょう}はペルソナに{含|ふく}まれていない{層|そう}と{完全一致|かんぜんいっち}。"
        expression: determined
      - type: sprite
        character: hakaru
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①ペルソナ{設計|せっけい}{担当|たんとう}はカナエただ1{人|ひとり}。②ヒアリング{記録|きろく}の「{空白|くうはく}」——「ない」こと{自体|じたい}が{証拠|しょうこ}。③{密談|みつだん}で「{話|はな}しかけるのが{怖|こわ}かった」という{本音|ほんね}が{判明|はんめい}。④ペルソナの{偏|かたよ}りと「{使|つか}わなかった{子|こ}」の{特徴|とくちょう}が{完全一致|かんぜんいっち}。"
      - type: choice
        id: q1
        question: ペルソナ設計で「見えないユーザー」を作り出したのは誰？
        options:
          - text: カナエ（ペルソナ設計で自分と似た子しかインタビューしなかった）
            value: kanae
            correct: true
            feedback: "{正解|せいかい}！　カナエは{悪意|あくい}があったわけじゃない。でも、インタビューしやすい{子|こ}だけに{話|はな}を{聞|き}いた——これをデザインの「{無意識|むいしき}のバイアス」という。**{デザイナー|でざいなー}は{自分|じぶん}に{似|に}た{人|ひと}のことは{想像|そうぞう}しやすいけど、{自分|じぶん}と{違|ちが}う{人|ひと}のことは{見落|みおと}としがち。ペルソナ{設計|せっけい}では、{意識的|いしきてき}に「{自分|じぶん}と{違|ちが}うユーザー」を{探|さが}しに{行|い}くことが{必要|ひつよう}。**"
          - text: ハカル（ペルソナと使わなかった子の特性を比較・分析した人）
            value: hakaru
            feedback: "ハカルはペルソナ{設計書|せっけいしょ}と「{使|つか}わなかった{子|こ}」のプロフィールを{比較|ひかく}・{分析|ぶんせき}した{側|がわ}だよ。ペルソナ{設計|せっけい}{担当|たんとう}はカナエだったね。"
          - text: ツクル（アプリを実装した人）
            value: tsukuru
            feedback: "ツクルはアプリを{実装|じっそう}した{側|がわ}。ペルソナ{設計|せっけい}はカナエが{担当|たんとう}していたね。{設計書|せっけいしょ}のヒアリング{記録|きろく}の{空白|くうはく}を{確認|かくにん}してみよう。"
          - text: ミナオス（ペルソナ設計の多様性の問題を指摘した人）
            value: minaosu
