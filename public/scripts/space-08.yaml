      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "学校で、"

      - type: narration
        text: "日食観察会がひらかれることになりました。"

      - type: narration
        text: "でもその前に、"

      - type: se
        sound: crash

      - type: effect
        name: shake
        duration: 400

      - type: bgm
        action: stop

      - type: sprite
        character: tsukimi
        expression: worried
        position: center

      - type: dialog
        character: tsukimi
        text: "大変だ！ みんな来て！"

      - type: sprite
        character: tsukimi
        action: hide

      - type: bgm
        track: tension-quiet

      - type: sprite
        character: yamada
        expression: thinking
        position: center

      - type: dialog
        character: yamada
        text: "{落|お}ち{着|つ}いて。みんなで{証拠|しょうこ}を{集|あつ}めて{調|しら}べてみましょう。"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite_group
        characters:
          - { id: hikari, expression: determined }
          - { id: hoshino, expression: thinking }
          - { id: tsukimi, expression: thinking }
          - { id: sora, expression: worried }

      - type: narration
        text: "「{宇宙探偵団|うちゅうたんていだん}」として{調査|ちょうさ}を{始|はじ}める。"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        title: 宇宙探偵団
        subtitle: Vol.8 食の恐怖

  # ========================================
  # 証拠カード1
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600

      - type: title_card
        title: ステップ1
        subtitle: 調査

      - type: narration
        text: "うわさ一覧 + 観察会の案内"

      - type: narration
        text: "観察会の案内:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード2
  # ========================================
  - id: evidence-2
    steps:
      - type: narration
        text: "「日食のしくみ」問いカード"

      - type: narration
        text: "安全メモ:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード3
  # ========================================
  - id: evidence-3
    steps:
      - type: narration
        text: "ヒカリの聞き取り + ホシノの分析"

      - type: narration
        text: "ホシノの分析:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード4
  # ========================================
  - id: evidence-4
    steps:
      - type: narration
        text: "ソラの観察 + 歴史資料"

      - type: narration
        text: "歴史資料:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード5
  # ========================================
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600

      - type: title_card
        title: ステップ2
        subtitle: 反転

      - type: effect
        name: fade-in
        duration: 600

      - type: narration
        text: "先生のメモ"

      - type: se
        sound: discover

      - type: sprite
        character: yamada
        expression: thinking
        position: center

      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"

      - type: sprite
        character: yamada
        action: hide

  # ========================================
  # 議論
  # ========================================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論

      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"

      - type: sprite
        character: hikari
        expression: thinking
        position: left

      - type: dialog
        character: hikari
        text: "うわさの出どころが3年1組だとたどった"

      - type: sprite
        character: hikari
        action: hide

      - type: sprite
        character: hoshino
        expression: thinking
        position: right

      - type: dialog
        character: hoshino
        text: "日食の科学的な危険は、直接見ることにあると整理した"

      - type: sprite
        character: hoshino
        action: hide

      - type: sprite
        character: sora
        expression: thinking
        position: left

      - type: dialog
        character: sora
        text: "クラスのみんなが不安になっていたことを感じていた"

      - type: sprite
        character: sora
        action: hide

      - type: sprite
        character: tsukimi
        expression: worried
        position: right

      - type: dialog
        character: tsukimi
        text: "日食の映像がこわくて、観察会に行きたくなくなった"

      - type: sprite
        character: tsukimi
        action: hide

  # ========================================
  # 投票
  # ========================================
  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票

      - type: narration
        text: "「日食の噂を広げたのは誰？」"

      - type: sprite_group
        characters:
          - { id: hikari, expression: normal }
          - { id: hoshino, expression: normal }
          - { id: tsukimi, expression: normal }
          - { id: sora, expression: worried }

      - type: choice
        id: q1
        text: "日食の噂を広げたのは誰？"
        options:
          - text: ヒカリ
            value: hikari
            correct: false
            feedback: "ヒカリは噂のルートを調べた側"
          - text: ホシノ
            value: hoshino
            correct: false
            feedback: "ホシノは科学的データを整理した側"
          - text: ツキミ
            value: tsukimi
            correct: true
            feedback: "ツキミは天文が好き。でも日食の映像を見て怖くなった。\"目が潰れる\"は日食グラスなしの場合のリスクで半分本当。でも\"呪い\"は完全な迷信。ツキミは恐怖のあまり科学と迷信を混ぜてしまった。怖いと思う気持ちは自然だけど、科学的事実と迷信は分けなきゃいけない。日食は月が太陽を隠す美しい天文現象。正しい知識と日食グラスがあれば安全に楽しめるんだ"
          - text: ソラ
            value: sora
            correct: false
            feedback: "ソラは怖いと感じる子どもたちの気持ちを代弁した側"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

  # ========================================
  # 真相
  # ========================================
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600

      - type: title_card
        title: 真相

      - type: effect
        name: fade-in
        duration: 600

      - type: sprite
        character: yamada
        expression: normal
        position: center

      - type: dialog
        character: yamada
        text: "真相が明かされた。"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite
        character: tsukimi
        expression: worried
        position: center

      - type: dialog
        character: tsukimi
        text: "さらに自分のこわさから、迷信の話も足してしまった"

      - type: sprite
        character: tsukimi
        expression: determined

      - type: dialog
        character: tsukimi
        text: "ごめんなさい。"

      - type: sprite
        character: tsukimi
        action: hide

  # ========================================
  # エピローグ
  # ========================================
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center

      - type: dialog
        character: yamada
        text: "みんな、よく{調|しら}べたね。今日の{学|まな}びを{振|ふ}り{返|かえ}ろう。"

      - type: sprite
        character: yamada
        expression: thinking

      - type: dialog
        character: yamada
        text: "・証拠カード1で、学校には3つの日食のうわさが広がっていると分かる\n・その中には、危険の話と迷信らしい話が混ざっている\n・証拠カード2で、日食は月が太陽をかくす現象であり、日食グラスを使えば安全に観察できると分かる"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite_group
        characters:
          - { id: hikari, expression: happy }
          - { id: hoshino, expression: happy }
          - { id: tsukimi, expression: happy }
          - { id: sora, expression: happy }

      - type: narration
        text: "{宇宙探偵団|うちゅうたんていだん}の{冒険|ぼうけん}はつづく——"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

      - type: effect
        name: fade-out
        duration: 1000
