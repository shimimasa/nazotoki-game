scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "論理ミステリー Vol.4"
        subtitle: "AかBしかない?"
      - type: sprite_group
        characters:
          - id: ron
            expression: normal
          - id: rika
            expression: normal
          - id: koto
            expression: normal
          - id: kana
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: ron
        expression: normal
        position: left
      - type: dialog
        character: ron
        text: "「展示コーナー」は低学年にも見てもらえてよさそうだという意見があった"
      - type: dialog
        character: ron
        text: "「展示コーナー」は低学年にも見てもらえてよさそうだという意見があった"
        expression: thinking
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        expression: normal
        position: right
      - type: dialog
        character: rika
        text: "黒板には途中まで4つの案が並んでいた"
      - type: dialog
        character: rika
        text: "黒板には途中まで4つの案が並んでいた"
        expression: thinking
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        expression: normal
        position: left
      - type: dialog
        character: koto
        text: "「劇かクイズにしぼろう」という言い方なら分かる"
      - type: dialog
        character: koto
        text: "「劇かクイズにしぼろう」という言い方なら分かる"
        expression: thinking
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        expression: normal
        position: right
      - type: dialog
        character: kana
        text: "最初は展示コーナーやインタビュー発表の案も出ていた"
      - type: dialog
        character: kana
        text: "最初は展示コーナーやインタビュー発表の案も出ていた"
        expression: thinking
      - type: sprite
        character: kana
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: ron
            expression: thinking
          - id: rika
            expression: thinking
          - id: koto
            expression: thinking
          - id: kana
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ロン"
            value: ron
            correct: false
            feedback: "ロンは手がかりを持っているが、決め手は足りない。"
          - text: "リカ"
            value: rika
            correct: false
            feedback: "リカは手がかりを持っているが、決め手は足りない。"
          - text: "コト"
            value: koto
            correct: false
            feedback: "コトは手がかりを持っているが、決め手は足りない。"
          - text: "カナ"
            value: kana
            correct: true
            feedback: "カナの行動が、証拠といちばん一致している。"
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "カナ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kana
        expression: worried
        position: center
      - type: dialog
        character: kana
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: kana
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "「AかBしかない」と言われても、第三の案が残っていることがある"
      - type: narration
        text: "選択肢を整理することと、最初から二択しかないことは違う"
      - type: narration
        text: "話し合いでは、消えた選択肢が本当に不可能かを確かめる必要がある"
      - type: sprite_group
        characters:
          - id: ron
            expression: happy
          - id: rika
            expression: happy
          - id: koto
            expression: happy
          - id: kana
            expression: happy
      - type: narration
        text: "論理ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
