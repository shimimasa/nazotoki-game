scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: schoolyard
    bgm: daily-life
    steps:
      - type: narration
        text: "{図工|ずこう}の{時間|じかん}に、{校庭|こうてい}の{砂場|すなば}で{砂|すな}の{城|しろ}を{作|つく}った。4人で{力|ちから}を{合|あ}わせた{力作|りきさく}。{塔|とう}が3{本|ぼん}、{橋|はし}が1つ、{小石|こいし}の{窓|まど}、{葉|は}っぱの{旗|はた}。"

      - type: narration
        text: "1{時間|じかん}かけて{作|つく}った。{最高|さいこう}の{出来|でき}だった。"

      - type: narration
        text: "{放課後|ほうかご}、{見|み}に{行|い}くと——"

      - type: bgm
        action: stop

      - type: effect
        name: shake
        duration: 400

      - type: narration
        text: "{砂|すな}の{城|しろ}は{崩|くず}れていた。"
        speed: slow

      - type: bgm
        track: tension-quiet

      - type: sprite
        character: rina
        expression: worried
        position: center

      - type: dialog
        character: rina
        text: "うそ……。あんなに{頑張|がんば}ったのに……。"
        expression: worried

      - type: sprite
        character: rina
        action: hide

      - type: sprite_group
        characters:
          - id: nao
            expression: thinking
          - id: haru
            expression: surprised
          - id: rina
            expression: worried
          - id: yuuta
            expression: surprised

      - type: narration
        text: "{風|かぜ}？ {猫|ねこ}？ {誰|だれ}か？ ——{誰|だれ}が{壊|こわ}したのか、{調|しら}べてみよう。"

      - type: sprite
        character: nao
        action: hide
      - type: sprite
        character: haru
        action: hide
      - type: sprite
        character: rina
        action: hide
      - type: sprite
        character: yuuta
        action: hide

      - type: effect
        name: fade-out

      - type: title_card
        text: "答えのない法廷 Vol.14"
        subtitle: "壊された砂の城"

  # ========================================
  # 証拠カード1: 砂の城の残骸
  # ========================================
  - id: evidence-1
    bg: schoolyard
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1：調査"

      - type: narration
        text: "{壊|こわ}れた{砂|すな}の{城|しろ}を{詳|くわ}しく{観察|かんさつ}してみよう。"

      - type: narration
        text: "{塔|とう}は3{本中|ぼんちゅう}2{本|ほん}が{倒|たお}れている。{橋|はし}は{完全|かんぜん}に{崩|くず}れた。{小石|こいし}の{窓|まど}はバラバラ。{葉|は}っぱの{旗|はた}は{飛|と}ばされている。"

      - type: narration
        text: "{崩|くず}れ{方|かた}は**{全体|ぜんたい}がじわっと{崩|くず}れている**。{踏|ふ}まれた{跡|あと}ではない。{砂|すな}は{乾|かわ}いている——{作|つく}ったときは{水|みず}で{固|かた}めていたのに。"

      - type: narration
        text: "人が{踏|ふ}んだなら1か{所|しょ}がへこむ。でもこの{城|しろ}は『{全体|ぜんたい}がじわっと』{壊|こわ}れている。これは何を{意味|いみ}する？"

  # ========================================
  # 証拠カード2: 放課後の天気と環境
  # ========================================
  - id: evidence-2
    steps:
      - type: narration
        text: "その{日|ひ}の{天気|てんき}を{確認|かくにん}しよう。"

      - type: narration
        text: "{午前|ごぜん}（{図工|ずこう}の{時間|じかん}）：{晴|は}れ。{風|かぜ}はほぼなし。\n12:00 {昼|ひる}：{晴|は}れ。少し{風|かぜ}が{出|で}てきた。\n15:00 {放課後|ほうかご}：{晴|は}れ。**{風|かぜ}が{強|つよ}くなった**。\n16:00：{風|かぜ}がさらに{強|つよ}くなった。"

      - type: narration
        text: "{砂場|すなば}の{環境|かんきょう}：{午前|ごぜん}は{砂|すな}が{湿|しめ}っていたが、{午後|ごご}には{乾|かわ}いていた。{砂場|すなば}に{猫|ねこ}の{足跡|あしあと}あり（いつのものか{不明|ふめい}）。{複数|ふくすう}の{人|ひと}の{足跡|あしあと}あり。"

      - type: narration
        text: "{風|かぜ}、{乾燥|かんそう}、{猫|ねこ}、{人|ひと}——{壊|こわ}した{可能性|かのうせい}があるものが**{複数|ふくすう}**ある。1つに{決|き}められる？"

  # ========================================
  # 証拠カード3: 4人のタイムライン
  # ========================================
  - id: evidence-3
    bg: classroom
    steps:
      - type: narration
        text: "{放課後|ほうかご}の4人の{行動|こうどう}を{確認|かくにん}しよう。"

      - type: sprite
        character: yuuta
        expression: normal
        position: left

      - type: dialog
        character: yuuta
        text: "15:15に{砂場|すなば}に{見|み}に{行|い}った。{城|しろ}は{無事|ぶじ}だったよ。{近|ちか}くでしゃがんで{見|み}たけど、{触|さわ}ってないよ。"
        expression: normal

      - type: sprite
        character: yuuta
        action: hide

      - type: sprite
        character: haru
        expression: thinking
        position: right

      - type: dialog
        character: haru
        text: "15:30に{砂場|すなば}の{近|ちか}くを{通|とお}った。{城|しろ}の{形|かたち}はまだあったと{思|おも}う……{多分|たぶん}。{猫|ねこ}が{砂場|すなば}にいたのは{見|み}た。"
        expression: thinking

      - type: sprite
        character: haru
        action: hide

      - type: sprite
        character: rina
        expression: worried
        position: left

      - type: dialog
        character: rina
        text: "15:45に{見|み}に{行|い}ったら……もう{壊|こわ}れていた。"
        expression: worried

      - type: sprite
        character: rina
        action: hide

      - type: se
        sound: discover

      - type: narration
        text: "{壊|こわ}れたのは**15:30〜15:45の{間|あいだ}**。でもその{時間帯|じかんたい}に{砂場|すなば}にいた人は——**いない？**"

  # ========================================
  # 証拠カード4: ユウタの疑惑
  # ========================================
  - id: evidence-4
    steps:
      - type: narration
        text: "ユウタの{行動|こうどう}をもう少し{詳|くわ}しく{見|み}てみよう。"

      - type: narration
        text: "ユウタは15:15に{砂場|すなば}に{行|い}った。{砂場|すなば}の{中|なか}に{入|はい}って、しゃがんで{城|しろ}を{近|ちか}くで{見|み}た。そのとき{城|しろ}は{壊|こわ}れていなかった——とユウタは{言|い}っている。"

      - type: narration
        text: "でも——ユウタは{砂場|すなば}の{中|なか}に{入|はい}った。{足跡|あしあと}がつく。{近|ちか}くでしゃがんだ。{触|さわ}った{可能性|かのうせい}は？ ユウタが{去|さ}った{後|あと}、{城|しろ}がまだ{無事|ぶじ}だったか——**{確認|かくにん}した人はいない**。"

      - type: narration
        text: "ユウタが{壊|こわ}した**{証拠|しょうこ}**はない。でも{壊|こわ}していない**{証拠|しょうこ}**もない。『{分|わ}からない』は『{犯人|はんにん}』と{同|おな}じ？"

  # ========================================
  # 証拠カード5: 「分からない」という答え（反転フェーズ）
  # ========================================
  - id: evidence-5
    bg: schoolyard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "ステップ2：新たな証拠"
      - type: effect
        name: fade-in

      - type: narration
        text: "{全|すべ}ての{証拠|しょうこ}を{集|あつ}めても——**{犯人|はんにん}は{確定|かくてい}できない**。"
        speed: slow

      - type: narration
        text: "{可能性|かのうせい}①：{風|かぜ}が{壊|こわ}した。{午後|ごご}から{風|かぜ}が{強|つよ}くなった。{旗|はた}は{飛|と}ばされている。\n{可能性|かのうせい}②：{猫|ねこ}が{壊|こわ}した。{砂場|すなば}に{猫|ねこ}の{足跡|あしあと}がある。\n{可能性|かのうせい}③：ユウタが{触|さわ}って{弱|よわ}くした。{砂場|すなば}に{入|はい}った。{証人|しょうにん}はいない。\n{可能性|かのうせい}④：{自然|しぜん}に{崩|くず}れた。{砂|すな}が{乾|かわ}いて{弱|よわ}くなった。"

      - type: narration
        text: "どれも『かもしれない』。どれも『{確定|かくてい}できない』。"

      - type: effect
        name: flash

      - type: narration
        text: "でも——{犯人|はんにん}が{分|わ}からなくても、{砂|すな}の{城|しろ}が『すごかった』{事実|じじつ}は{変|か}わらない。4人で{力|ちから}を{合|あ}わせた{事実|じじつ}は{変|か}わらない。{壊|こわ}れた{悲|かな}しさも、{本物|ほんもの}の{気持|きも}ち。"
        speed: slow

      - type: narration
        text: "『{誰|だれ}が{壊|こわ}した？』ではなく——『{壊|こわ}れたことに、どう{向|む}き{合|あ}う？』"

  # ========================================
  # 質問フェーズ
  # ========================================
  - id: questions
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "ステップ3：考えよう"
      - type: effect
        name: fade-in

      - type: choice
        id: q1
        question: "{砂|すな}の{城|しろ}が{壊|こわ}れたことに、どう{向|む}き{合|あ}う？"
        feedback_default: "{壊|こわ}れるものにどう{向|む}き{合|あ}うかは人それぞれ。どの{考|かんが}えにも{理由|りゆう}がある。"
        options:
          - text: "{壊|こわ}した人を{見|み}つけるべき"
            value: find-culprit
          - text: "{誰|だれ}が{壊|こわ}したかは{関係|かんけい}ない"
            value: doesnt-matter
          - text: "もう{一度|いちど}{作|つく}り{直|なお}そう"
            value: rebuild
          - text: "{壊|こわ}れることも{含|ふく}めて『{作品|さくひん}』"
            value: part-of-art

      - type: choice
        id: q2
        question: "ユウタは{砂|すな}の{城|しろ}を{壊|こわ}した？"
        feedback_default: "{壊|こわ}した{証拠|しょうこ}もない。{壊|こわ}していない{証拠|しょうこ}もない。『{分|わ}からない』を{受|う}け{入|い}れることも{大切|たいせつ}な{勇気|ゆうき}。"
        options:
          - text: "{壊|こわ}した。{砂場|すなば}に{入|はい}って{触|さわ}ったはず"
            value: guilty
          - text: "{壊|こわ}していない。{本人|ほんにん}がそう{言|い}っている"
            value: innocent
          - text: "{分|わ}からない。{証拠|しょうこ}が{足|た}りない"
            value: unknown

      - type: choice
        id: q3
        question: "{砂|すな}の{城|しろ}は{最初|さいしょ}から『{壊|こわ}れるもの』だった。それでも{全力|ぜんりょく}で{作|つく}ったのは{無駄|むだ}？"
        feedback_default: "{壊|こわ}れると{分|わ}かっていても{全力|ぜんりょく}で{作|つく}る。{花|はな}は{散|ち}るから{美|うつく}しい。{砂|すな}の{城|しろ}は{壊|こわ}れるからこそ——{作|つく}った{瞬間|しゅんかん}が{尊|とうと}い。"
        options:
          - text: "{無駄|むだ}じゃない。{作|つく}った{時間|じかん}に{意味|いみ}がある"
            value: meaningful
          - text: "{写真|しゃしん}に{撮|と}っておけばよかった"
            value: photo
          - text: "もっと{壊|こわ}れにくい{材料|ざいりょう}で{作|つく}ればよかった"
            value: durable
          - text: "{壊|こわ}れるからこそ{美|うつく}しい"
            value: beauty-in-impermanence

  # ========================================
  # 真相 — 各キャラの秘密
  # ========================================
  - id: truth
    bg: schoolyard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in

      - type: sprite
        character: nao
        expression: thinking
        position: left

      - type: dialog
        character: nao
        text: "……{設計|せっけい}したのは{僕|ぼく}だ。{砂|すな}の{城|しろ}は{最初|さいしょ}から{永遠|えいえん}じゃなかった。{壊|こわ}れると{分|わ}かっていて、{全力|ぜんりょく}で{作|つく}った。それって……すごいことなのかもしれない。"
        expression: thinking

      - type: sprite
        character: nao
        action: hide

      - type: sprite
        character: haru
        expression: worried
        position: right

      - type: dialog
        character: haru
        text: "{猫|ねこ}が{砂場|すなば}にいたのは{見|み}た。でも{城|しろ}を{踏|ふ}んだかは{見|み}ていない。ちゃんと{見|み}ていなかった……。{分|わ}からないことが{増|ふ}えちゃった。"
        expression: worried

      - type: sprite
        character: haru
        action: hide

      - type: sprite
        character: rina
        expression: thinking
        position: left

      - type: dialog
        character: rina
        text: "{壊|こわ}れ{方|かた}が『{踏|ふ}まれた』のとは{違|ちが}った。{全体|ぜんたい}がじわっと{崩|くず}れていた。……お{母|かあ}さんが{言|い}っていた。『{花|はな}は{散|ち}るから{美|うつく}しい』って。"
        expression: determined

      - type: sprite
        character: rina
        action: hide

      - type: sprite
        character: yuuta
        expression: worried
        position: right

      - type: dialog
        character: yuuta
        text: "……{正直|しょうじき}に{言|い}う。{砂場|すなば}でバランスを{崩|くず}して{手|て}をついた。{城|しろ}に{触|さわ}ったかどうか、100%の{自信|じしん}がない。"
        expression: worried

      - type: dialog
        character: yuuta
        text: "{壊|こわ}したのは{僕|ぼく}かもしれない。でも{分|わ}からない。{分|わ}からないまま、{謝|あやま}ることもできない。どうすればいいんだろう。"
        expression: thinking

      - type: sprite
        character: yuuta
        action: hide

      - type: narration
        text: "{犯人|はんにん}は{確定|かくてい}できない。{風|かぜ}かもしれない。{猫|ねこ}かもしれない。ユウタかもしれない。{自然|しぜん}かもしれない。——『{分|わ}からない』が{答|こた}え。"
        speed: slow

  # ========================================
  # 最後の問い
  # ========================================
  - id: final-question
    steps:
      - type: choice
        id: q4
        question: "『{分|わ}からない』を{受|う}け{入|い}れるのは{難|むずか}しい？"
        feedback_default: "{分|わ}からないことを{受|う}け{入|い}れるのは{勇気|ゆうき}がいる。でも{世|よ}の{中|なか}には『{分|わ}からない』ことがたくさんある。それでも{前|まえ}に{進|すす}むことはできる。"
        options:
          - text: "{難|むずか}しい。{答|こた}えがないと{落|お}ち{着|つ}かない"
            value: difficult
          - text: "{受|う}け{入|い}れられる。{分|わ}からないこともある"
            value: accept
          - text: "{分|わ}からないけど{前|まえ}に{進|すす}みたい"
            value: move-forward

      - type: choice
        id: q5
        question: "もし{来週|らいしゅう}もう{一度|いちど}{砂|すな}の{城|しろ}を{作|つく}るとしたら？"
        feedback_default: "{壊|こわ}れるものを{全力|ぜんりょく}で{作|つく}る。それが{感動|かんどう}であり、{畏敬|いけい}の{念|ねん}。{砂|すな}の{城|しろ}が{教|おし}えてくれたのは——{永遠|えいえん}じゃなくても、{全力|ぜんりょく}で{作|つく}ることの{尊|とうと}さ。"
        options:
          - text: "もっと{頑丈|がんじょう}に{作|つく}る"
            value: stronger
          - text: "{壊|こわ}れる{前|まえ}に{写真|しゃしん}を{撮|と}る"
            value: take-photo
          - text: "{同|おな}じように{全力|ぜんりょく}で{作|つく}る。{壊|こわ}れてもいい"
            value: full-effort
          - text: "もう{作|つく}らない。{壊|こわ}れるのが{悲|かな}しいから"
            value: dont-make

  # ========================================
  # エピローグ
  # ========================================
  - id: epilogue
    bg: schoolyard
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center

      - type: dialog
        character: sensei
        text: "この{事件|じけん}の{真相|しんそう}は——『{分|わ}からない』です。{犯人|はんにん}は{確定|かくてい}できません。"
        expression: normal

      - type: dialog
        character: sensei
        text: "でもね——{分|わ}からなくても、{砂|すな}の{城|しろ}が{素晴|すば}らしかった{事実|じじつ}は{変|か}わらない。4人で{力|ちから}を{合|あ}わせた{事実|じじつ}は{変|か}わらない。"
        expression: thinking

      - type: dialog
        character: sensei
        text: "{砂|すな}の{城|しろ}は{最初|さいしょ}から『{壊|こわ}れるもの』だった。{花|はな}が{散|ち}るように。{雪|ゆき}が{溶|と}けるように。{壊|こわ}れると{分|わ}かっていて、それでも{全力|ぜんりょく}で{作|つく}った。"
        expression: determined

      - type: dialog
        character: sensei
        text: "——{壊|こわ}れるからこそ{美|うつく}しい。{永遠|えいえん}じゃないからこそ、{作|つく}っている{瞬間|しゅんかん}が{尊|とうと}い。"
        expression: happy

      - type: sprite
        character: sensei
        action: hide

      - type: narration
        text: "{砂|すな}の{城|しろ}は{消|き}えた。でも、4人が{力|ちから}を{合|あ}わせた{時間|じかん}は{消|き}えない。"

      - type: narration
        text: "——それが、{壊|こわ}された{砂|すな}の{城|しろ}が{教|おし}えてくれたこと。"

      - type: effect
        name: fade-out
