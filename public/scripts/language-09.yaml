scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "ことば探偵団 Vol.9"
        subtitle: "二つの文章"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: normal
          - id: fumi
            expression: normal
          - id: yomi
            expression: normal
          - id: tsuzuri
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: kotoha
        expression: normal
        position: left
      - type: dialog
        character: kotoha
        text: "文章Aには「なんと」「やはり」「しっかりと」のような言葉が多い。"
      - type: dialog
        character: kotoha
        text: "文章Aには「なんと」「やはり」「しっかりと」のような言葉が多い。"
        expression: thinking
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        expression: normal
        position: right
      - type: dialog
        character: fumi
        text: "あなたは感想文を書くのが遅れ、締切ぎりぎりになっていた。"
      - type: dialog
        character: fumi
        text: "あなたは感想文を書くのが遅れ、締切ぎりぎりになっていた。"
        expression: thinking
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        expression: normal
        position: left
      - type: dialog
        character: yomi
        text: "文章Aは短い文が続きやすく、文章Bは一文が長めで説明が重なりやすい。"
      - type: dialog
        character: yomi
        text: "文章Aは短い文が続きやすく、文章Bは一文が長めで説明が重なりやすい。"
        expression: thinking
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        expression: normal
        position: right
      - type: dialog
        character: tsuzuri
        text: "フミが焦っていたことは分かるし、その苦しさにも少し共感している。"
      - type: dialog
        character: tsuzuri
        text: "フミが焦っていたことは分かるし、その苦しさにも少し共感している。"
        expression: thinking
      - type: sprite
        character: tsuzuri
        action: hide
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠1"
        subtitle: "### タイトル"
  - id: evidence-2
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠2"
        subtitle: "### タイトル"
      - type: narration
        text: "コトハの過去作文でよく出る表現: 「なんと」「やはり」「しっかりと」"
      - type: narration
        text: "フミの過去作文でよく出る表現: 「でも」「だから」「すごく」"
      - type: narration
        text: "コトハの作文: 一文がやや長めで、説明が重なる"
      - type: narration
        text: "フミの作文: 短く切る文が多く、会話に近いリズム"
  - id: evidence-3
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠3"
        subtitle: "### タイトル"
      - type: narration
        text: "文章Aには「なんと」「やはり」など、コトハの作文に近い語彙が多い"
      - type: narration
        text: "文章Bには「でも」「だから」が多く、フミの作文に近い"
      - type: narration
        text: "文章Aは平均20文字前後の文が続く"
      - type: narration
        text: "文章Bは平均12文字前後で短く切れる"
  - id: evidence-4
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠4"
        subtitle: "### タイトル"
      - type: narration
        text: "最初の説明: 「下書きと清書を取り違えた」"
      - type: narration
        text: "追加の聞き取り: 「締切に間に合わなくてあせっていた」"
      - type: narration
        text: "提出記録: 実際には一つの封筒にまとめて出されていた"
  - id: evidence-5
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠5"
        subtitle: "### タイトル"
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: kotoha
            expression: thinking
          - id: fumi
            expression: thinking
          - id: yomi
            expression: thinking
          - id: tsuzuri
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "コトハ"
            value: kotoha
            correct: false
            feedback: "コトハは手がかりを持っているが、決め手は足りない。"
          - text: "フミ"
            value: fumi
            correct: false
            feedback: "フミは手がかりを持っているが、決め手は足りない。"
          - text: "ヨミ"
            value: yomi
            correct: false
            feedback: "ヨミは手がかりを持っているが、決め手は足りない。"
          - text: "ツヅリ"
            value: tsuzuri
            correct: true
            feedback: "ツヅリの行動が、証拠といちばん一致している。"
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "ツヅリ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: tsuzuri
        expression: worried
        position: center
      - type: dialog
        character: tsuzuri
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: tsuzuri
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: happy
          - id: fumi
            expression: happy
          - id: yomi
            expression: happy
          - id: tsuzuri
            expression: happy
      - type: narration
        text: "ことば探偵団の学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
