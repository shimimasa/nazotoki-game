meta:
  id: english-01
  title: 消えたアルファベット
  series: 英語探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  ren:
    name: レン
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  emma:
    name: エマ
    color: "#FF6B9D"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  takumi:
    name: タクミ
    color: "#E67E22"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  hina:
    name: ヒナ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: english-01/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}の{教室|きょうしつ}。{壁|かべ}にはアルファベット{磁石|じしゃく}ボードがある。AからZまで26文字がきれいに{並|なら}んでいて、ALTのブラウン先生と{英語|えいご}の{授業|じゅぎょう}で使っている。"
      - type: narration
        text: "火曜日の朝——"
      - type: sprite
        character: emma
        expression: normal
        position: center
      - type: dialog
        character: emma
        text: "今日の3時間目はブラウン先生の{英語|えいご}だ！ {楽|たの}しみ～！"
      - type: dialog
        character: emma
        text: "あれ……？ ボードの文字が……"
        expression: surprised
      - type: bgm
        action: stop
      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: dialog
        character: emma
        text: "アルファベットが{足|た}りない！ 6文字もなくなってる！"
        expression: worried
      - type: sprite
        character: emma
        action: hide
      - type: bgm
        track: english-01/investigation
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "大変ね。ブラウン先生の{授業|じゅぎょう}までにボードを{直|なお}さないと。まずは{消|き}えた文字を{特定|とくてい}しましょう。"
      - type: dialog
        character: sensei
        text: "月曜の{放課後|ほうかご}から火曜の朝までの{間|あいだ}に、{誰|だれ}かが文字を{外|はず}した。{英語|えいご}{探偵団|たんていだん}、{出動|しゅつどう}よ！"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 英語探偵団 Vol.1
        subtitle: 消えたアルファベット

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: classroom
    bgm: english-01/investigation
    steps:
      - type: narration
        text: "4人のメンバーに話を{聞|き}こう。"
      - type: sprite
        character: ren
        expression: normal
        position: left
      - type: dialog
        character: ren
        text: "ぼくはレン。アルファベット26文字は{全部|ぜんぶ}{覚|おぼ}えてる。ボードを見て、すぐにどの文字が{消|き}えたか分かったよ。"
      - type: dialog
        character: ren
        text: "月曜の{放課後|ほうかご}は{図書室|としょしつ}にいた。{教室|きょうしつ}には{戻|もど}ってないよ。"
        expression: thinking
      - type: sprite
        character: ren
        action: hide
      - type: sprite
        character: emma
        expression: worried
        position: right
      - type: dialog
        character: emma
        text: "わたしはエマ。ブラウン先生の{授業|じゅぎょう}が大好きなの。ボードが{壊|こわ}れてたら先生が{困|こま}っちゃう！"
      - type: dialog
        character: emma
        text: "月曜の{放課後|ほうかご}は{合唱|がっしょう}{練習|れんしゅう}。{教室|きょうしつ}には{戻|もど}ってないよ。"
        expression: normal
      - type: sprite
        character: emma
        action: hide
      - type: sprite
        character: takumi
        expression: normal
        position: left
      - type: dialog
        character: takumi
        text: "ぼくはタクミ。{元気|げんき}だけど……{英語|えいご}はちょっと{苦手|にがて}なんだ。ローマ字もまだよく分からなくて。"
      - type: dialog
        character: takumi
        text: "月曜の{放課後|ほうかご}は{教室|きょうしつ}で{宿題|しゅくだい}をやってたよ。"
        expression: thinking
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: hina
        expression: normal
        position: right
      - type: dialog
        character: hina
        text: "わたしはヒナ。{記憶力|きおくりょく}がいいの。月曜の{放課後|ほうかご}は{委員会|いいんかい}{活動|かつどう}で、16:30に{教室|きょうしつ}の前を{通|とお}ったよ。"
      - type: sprite
        character: hina
        action: hide

  # ===== 証拠カード1: ボードの状態 =====
  - id: evidence-1
    bg: classroom
    bgm: english-01/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: 消えた文字を見つけよう！
      - type: narration
        text: "ABCの{歌|うた}を思い出して、26文字の中で「ない文字」を{探|さが}そう。"
      - type: narration
        text: "A → ない！"
      - type: narration
        text: "B C D E F G H → ある"
      - type: narration
        text: "I → ない！"
      - type: narration
        text: "J → ある"
      - type: narration
        text: "K → ない！"
      - type: narration
        text: "L → ある"
      - type: narration
        text: "M → ない！"
      - type: narration
        text: "N O P Q R S → ある"
      - type: narration
        text: "T → ない！"
      - type: narration
        text: "U → ない！"
      - type: narration
        text: "V W X Y Z → ある"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "{消|き}えた6文字——A、I、K、M、T、U"
      - type: narration
        text: "この6文字を{並|なら}べ{替|か}えると……何かの{言葉|ことば}になる？ ローマ字で読める？"

  # ===== 証拠カード2: ローマ字の名前と照合 =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 消えた文字は誰の名前？
      - type: narration
        text: "4人の名前をローマ字で{書|か}くと——"
      - type: narration
        text: "レン → REN（R, E, N の3文字）"
      - type: narration
        text: "エマ → EMA（E, M, A の3文字）"
      - type: narration
        text: "タクミ → TAKUMI（T, A, K, U, M, I の6文字）"
      - type: narration
        text: "ヒナ → HINA（H, I, N, A の4文字）"
      - type: narration
        text: "{消|き}えた6文字（A, I, K, M, T, U）と{比|くら}べてみよう。"
      - type: narration
        text: "レン（REN）→ Rが{消|き}えていない。{完全|かんぜん}{一致|いっち}しない。"
      - type: narration
        text: "ヒナ（HINA）→ HとNが{消|き}えていない。{完全|かんぜん}{一致|いっち}しない。"
      - type: narration
        text: "エマ（EMA）→ MとAは{消|き}えている。でもEはボードに{残|のこ}っている！"
      - type: sprite
        character: ren
        expression: thinking
        position: left
      - type: dialog
        character: ren
        text: "ちょっと待って。エマの名前にMとAが入ってるから、エマが{怪|あや}しいと思う人がいるかも。"
      - type: dialog
        character: ren
        text: "でもエマの名前にはEも{必要|ひつよう}。Eはボードに{残|のこ}ってる。エマが自分の名前のために{外|はず}したなら、Eも{消|き}えるはず！"
        expression: determined
      - type: sprite
        character: ren
        action: hide
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "{消|き}えた6文字が「{全部|ぜんぶ}」{誰|だれ}かの名前になるのは——TAKUMI。タクミだけ{完全|かんぜん}{一致|いっち}！"
      - type: narration
        text: "「{一部|いちぶ}だけ{一致|いっち}」と「{完全|かんぜん}{一致|いっち}」は{意味|いみ}が{違|ちが}う。6文字{全部|ぜんぶ}が名前の文字 = その人が{外|はず}した{証拠|しょうこ}。"

  # ===== 証拠カード3: 宿題と行動 =====
  - id: evidence-3
    bgm: english-01/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: ローマ字の宿題
      - type: narration
        text: "ブラウン先生の{宿題|しゅくだい}——「自分の名前をローマ字で{書|か}いてきてね」"
      - type: narration
        text: "レン → 自分で{書|か}けた（RENは{簡単|かんたん}）"
      - type: narration
        text: "エマ → お{母|かあ}さんに{教|おし}えてもらった"
      - type: narration
        text: "ヒナ → 自分で{書|か}けた"
      - type: narration
        text: "タクミ → 「自分で{調|しら}べた」と言っている。でもローマ字が{苦手|にがて}なのに、どうやって？"
      - type: narration
        text: "月曜{放課後|ほうかご}の{行動|こうどう}——"
      - type: narration
        text: "レン：{図書室|としょしつ}。{教室|きょうしつ}に{戻|もど}っていない。"
      - type: narration
        text: "エマ：{合唱|がっしょう}{練習|れんしゅう}。{教室|きょうしつ}に{戻|もど}っていない。"
      - type: narration
        text: "ヒナ：{委員会|いいんかい}{活動|かつどう}。16:30に{教室|きょうしつ}の前を{通|とお}った。"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "タクミ：{教室|きょうしつ}に{残|のこ}って{宿題|しゅくだい}をやっていた。——タクミだけが{放課後|ほうかご}に{教室|きょうしつ}にいた！"

  # ===== 証拠カード4: 目撃情報 =====
  - id: evidence-4
    bgm: english-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: ボードの前で何をしていた？
      - type: sprite
        character: emma
        expression: thinking
        position: left
      - type: dialog
        character: emma
        text: "月曜の{帰|かえ}り{際|ぎわ}、{教室|きょうしつ}の前を{通|とお}ったとき、タクミが{教室|きょうしつ}にいたよ。アルファベットボードの前で何かをしてた。"
      - type: sprite
        character: emma
        action: hide
      - type: sprite
        character: hina
        expression: determined
        position: right
      - type: dialog
        character: hina
        text: "わたしも見ました。タクミがボードの{磁石|じしゃく}を{外|はず}して、自分の{机|つくえ}に{並|なら}べていたの。"
      - type: dialog
        character: hina
        text: "「{宿題|しゅくだい}を{頑張|がんば}ってるんだな」と思って声をかけなかった……。"
        expression: worried
      - type: sprite
        character: hina
        action: hide
      - type: narration
        text: "タクミはボードから{磁石|じしゃく}を{外|はず}して{机|つくえ}に{並|なら}べていた。6文字{外|はず}した。その6文字は T-A-K-U-M-I。"
      - type: narration
        text: "ローマ字の{宿題|しゅくだい}のために、自分の名前の文字を{確認|かくにん}していた？"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: english-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{消|き}えた6文字と、4人の名前。{証拠|しょうこ}をまとめて、{犯人|はんにん}を{推理|すいり}しましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: アルファベットの磁石を外したのは誰？
        options:
          - text: レン（アルファベットに詳しい）
            value: ren
            feedback: レンの名前はREN（3文字）。消えた6文字（A,I,K,M,T,U）とは1文字も一致しないよ。
          - text: エマ（名前にMとAが含まれる）
            value: emma
            feedback: エマの名前EMAにはMとAが含まれる。でもEはボードに残ってる！ エマなら E も消えるはずだよね。
          - text: タクミ（消えた6文字が名前と完全一致）
            value: takumi
            feedback: 正解！ T-A-K-U-M-I の6文字がタクミのローマ字名と完全一致。6文字全部が名前の文字＝その人が外した証拠！
          - text: ヒナ（教室の前を通った）
            value: hina
            feedback: ヒナの名前HIRAにはIとAが含まれるけど、HとNは消えていない。「部分一致」と「完全一致」は違うよ。

  # ===== 証拠カード5: 机の引き出し =====
  - id: evidence-5
    bgm: english-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: タクミの机の引き出し
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "タクミくんの{机|つくえ}の{引|ひ}き出しを{確認|かくにん}させてもらいました。"
      - type: sprite
        character: sensei
        action: hide
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "6個のアルファベット{磁石|じしゃく}が見つかった——T、A、K、U、M、I。"
      - type: narration
        text: "タクミの{宿題|しゅくだい}ノートも{確認|かくにん}。「ぼくの名前：TAKUMI」——{正|ただ}しく{書|か}けている。"
      - type: narration
        text: "タクミはローマ字の{宿題|しゅくだい}のために自分の名前の文字を{外|はず}し、{机|つくえ}に{並|なら}べて{確認|かくにん}した。ノートに{書|か}き{写|うつ}した後、{磁石|じしゃく}をボードに{戻|もど}すのを{忘|わす}れてそのまま{帰|かえ}ってしまった。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: classroom
    bgm: english-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: T-A-K-U-M-I
      - type: effect
        name: fade-in
        duration: 600

  # レンの秘密
  - id: truth-ren
    bg: classroom
    steps:
      - type: sprite
        character: ren
        expression: thinking
        position: left
      - type: dialog
        character: ren
        text: "{実|じつ}は……{消|き}えた6文字を見て、すぐに気づいたんだ。A, I, K, M, T, U。{並|なら}べ{替|か}えるとTAKUMI。"
      - type: dialog
        character: ren
        text: "でもタクミを名{指|ざ}しで「{犯人|はんにん}」って言うのは気が{引|ひ}けて……もう少し{証拠|しょうこ}を{集|あつ}めてからにしようと思ってた。"
        expression: worried
      - type: sprite
        character: ren
        action: hide

  # エマの秘密
  - id: truth-emma
    steps:
      - type: sprite
        character: emma
        expression: worried
        position: right
      - type: dialog
        character: emma
        text: "わたし、月曜にタクミがボードの前にいるのを見たのに、声をかけなかった。"
      - type: dialog
        character: emma
        text: "「あのとき{聞|き}いていれば、{戻|もど}し{忘|わす}れは{防|ふせ}げたのに」って……{後悔|こうかい}してる。"
        expression: determined
      - type: sprite
        character: emma
        action: hide

  # ヒナの秘密
  - id: truth-hina
    steps:
      - type: sprite
        character: hina
        expression: worried
        position: left
      - type: dialog
        character: hina
        text: "わたしはタクミが{磁石|じしゃく}を{外|はず}して{机|つくえ}に{並|なら}べてるのを見てた。「{頑張|がんば}ってるんだな」って思ったけど、声をかけなかった。"
      - type: dialog
        character: hina
        text: "「{戻|もど}した？」って一言{聞|き}いていれば……。"
        expression: determined
      - type: sprite
        character: hina
        action: hide

  # タクミの真実（クライマックス）
  - id: truth-takumi
    bgm: english-01/truth
    steps:
      - type: sprite
        character: takumi
        expression: worried
        position: center
      - type: dialog
        character: takumi
        text: "……ぼくがやりました。アルファベットの{磁石|じしゃく}を{外|はず}したのは、ぼくです。"
      - type: narration
        speed: slow
        text: "タクミがゆっくりと話し{始|はじ}めた。"
      - type: dialog
        character: takumi
        text: "ローマ字の{宿題|しゅくだい}で「自分の名前を{書|か}く」のが出たんだけど、{全然|ぜんぜん}分からなくて。"
        expression: worried
      - type: dialog
        character: takumi
        text: "アルファベットボードを見て、自分の名前の文字を1つずつ{探|さが}したんだ。T……あった！ A……これだ！ K……ここ！"
      - type: dialog
        character: takumi
        text: "6文字を{外|はず}して{机|つくえ}に{並|なら}べて、「T-A-K-U-M-I、これがぼくの名前か！」って。すごく{嬉|うれ}しかった。"
        expression: happy
      - type: dialog
        character: takumi
        text: "ノートに{書|か}き{写|うつ}した後、{磁石|じしゃく}を{戻|もど}すの{忘|わす}れてそのまま{帰|かえ}っちゃった。"
        expression: worried
      - type: dialog
        character: takumi
        text: "次の日、6文字がなくなってるって{聞|き}いて……「やばい、{戻|もど}すの{忘|わす}れた！」って。でも{英語|えいご}が{苦手|にがて}なのがバレるのが{恥|は}ずかしくて言えなかった。"
      - type: dialog
        character: takumi
        text: "ごめん。ボードを{壊|こわ}すつもりなんてなかった。ただ、自分の名前が{書|か}きたかっただけなんだ。"
        expression: determined
      - type: sprite
        character: takumi
        action: hide
      - type: narration
        speed: slow
        text: "タクミは{悪意|あくい}でボードを{壊|こわ}したのではない。{英語|えいご}を{頑張|がんば}ろうとしたのだ。ただ、「{借|か}りたものは{返|かえ}す」を{忘|わす}れてしまっただけ。"

  # ===== エピローグ =====
  - id: epilogue
    bg: classroom
    bgm: english-01/resolution
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "タクミくん、{英語|えいご}を{頑張|がんば}ろうとしたことは{素敵|すてき}よ。分からないときにボードを使ったのは、いい{方法|ほうほう}だった。"
      - type: dialog
        character: sensei
        text: "ただ「{借|か}りたら{返|かえ}す」を{忘|わす}れないでね。お金でも、{文房具|ぶんぼうぐ}でも、アルファベットの{磁石|じしゃく}でも、同じこと。"
        expression: thinking
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: takumi
        expression: determined
        position: left
