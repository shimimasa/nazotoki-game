scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "ことば探偵団 Vol.7"
        subtitle: "オノマトペ事件"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: normal
          - id: fumi
            expression: normal
          - id: yomi
            expression: normal
          - id: tsuzuri
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: kotoha
        expression: normal
        position: left
      - type: dialog
        character: kotoha
        text: "あなたは発表会をこわがっていたのではなく、楽しみにしていた。"
      - type: dialog
        character: kotoha
        text: "あなたは発表会をこわがっていたのではなく、楽しみにしていた。"
        expression: thinking
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        expression: normal
        position: right
      - type: dialog
        character: fumi
        text: "友達は「ドキドキするね」を読んで、「こわいのかな」と思った。"
      - type: dialog
        character: fumi
        text: "友達は「ドキドキするね」を読んで、「こわいのかな」と思った。"
        expression: thinking
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        expression: normal
        position: left
      - type: dialog
        character: yomi
        text: "手紙には「ドキドキするね」という表現はあるが、「楽しみ」「うれしい」「ワクワク」といった言葉は書かれていない。"
      - type: dialog
        character: yomi
        text: "手紙には「ドキドキするね」という表現はあるが、「楽しみ」「うれしい」「ワクワク」といった言葉は書かれていない。"
        expression: thinking
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        expression: normal
        position: right
      - type: dialog
        character: tsuzuri
        text: "「ドキドキ」は、遠足前の楽しみでも、テスト前の不安でも使われていた。"
      - type: dialog
        character: tsuzuri
        text: "「ドキドキ」は、遠足前の楽しみでも、テスト前の不安でも使われていた。"
        expression: thinking
      - type: sprite
        character: tsuzuri
        action: hide
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠1"
        subtitle: "### タイトル"
  - id: evidence-2
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠2"
        subtitle: "### タイトル"
      - type: narration
        text: "「私は発表会が楽しみだった」"
      - type: narration
        text: "「友達と一緒にがんばろうという気持ちで書いた」"
      - type: narration
        text: "「“ドキドキ”って書けば、前向きな気持ちも伝わると思っていた」"
  - id: evidence-3
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠3"
        subtitle: "### タイトル"
      - type: narration
        text: "「“ドキドキするね”を見て、発表会がこわいのかなと思った」"
      - type: narration
        text: "「私は発表会の前、不安でドキドキすることが多い」"
      - type: narration
        text: "「だから心配して返事を書いた」"
  - id: evidence-4
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠4"
        subtitle: "### タイトル"
      - type: narration
        text: "ドキドキ"
      - type: narration
        text: "一緒にがんばろう"
      - type: narration
        text: "楽しみ"
      - type: narration
        text: "ワクワク"
      - type: narration
        text: "うれしい"
  - id: evidence-5
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠5"
        subtitle: "### タイトル"
      - type: narration
        text: "遠足の前日でドキドキして眠れない"
      - type: narration
        text: "発表が楽しみでドキドキする"
      - type: narration
        text: "プレゼントを開ける前にドキドキする"
      - type: narration
        text: "テストの結果が心配でドキドキする"
      - type: narration
        text: "発表で失敗しそうでドキドキする"
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: kotoha
            expression: thinking
          - id: fumi
            expression: thinking
          - id: yomi
            expression: thinking
          - id: tsuzuri
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "コトハ"
            value: kotoha
            correct: false
            feedback: "コトハは手がかりを持っているが、決め手は足りない。"
          - text: "フミ"
            value: fumi
            correct: false
            feedback: "フミは手がかりを持っているが、決め手は足りない。"
          - text: "ヨミ"
            value: yomi
            correct: false
            feedback: "ヨミは手がかりを持っているが、決め手は足りない。"
          - text: "ツヅリ"
            value: tsuzuri
            correct: true
            feedback: "ツヅリの行動が、証拠といちばん一致している。"
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "ツヅリ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: tsuzuri
        expression: worried
        position: center
      - type: dialog
        character: tsuzuri
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: tsuzuri
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: happy
          - id: fumi
            expression: happy
          - id: yomi
            expression: happy
          - id: tsuzuri
            expression: happy
      - type: narration
        text: "ことば探偵団の学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
