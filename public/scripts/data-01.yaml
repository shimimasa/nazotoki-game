meta:
  id: data-01
  title: 消えた10%
  series: データ探偵団
  volume: 1
  estimatedMinutes: 18

characters:
  hyou:
    name: ヒョウ
    color: "#4169E1"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  suu:
    name: スウ
    color: "#FF4444"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  graph:
    name: グラフ
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  matome:
    name: マトメ
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  yamada:
    name: 山田先生
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "クラスで読書アンケートをしました。"
      - type: narration
        text: "その結果をまとめたポスターには、"
      - type: narration
        text: "「ほぼ{全員|ぜんいん}が読書好き！」"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: matome
        expression: worried
        position: center
      - type: dialog
        character: matome
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: matome
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "{{落|お}}ち{{着|つ}}いて。みんなで{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみよう。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: determined }
          - { id: suu, expression: thinking }
          - { id: graph, expression: thinking }
          - { id: matome, expression: worried }
      - type: narration
        text: "「データ探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: データ探偵団
        subtitle: Vol.1 消えた10%

  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: ステップ1
        subtitle: 調査
      - type: narration
        text: "掲示されたポスター"
      - type: se
        sound: discover
      - type: narration
        text: "このグラフは、見る人にどんな印象をあたえそうかな？"

  - id: evidence-2
    steps:
      - type: narration
        text: "グラフの読み方カード"
      - type: se
        sound: discover
      - type: narration
        text: "今回のポスターでは、どこを先にたしかめるとよさそうかな？"

  - id: evidence-3
    steps:
      - type: narration
        text: "元のアンケート集計表"
      - type: se
        sound: discover
      - type: narration
        text: "60%という数字は本当だとして、どうしてポスターだと「ほぼ全員」に見えるのかな？"

  - id: evidence-4
    steps:
      - type: narration
        text: "ポスター制作分担表"
      - type: se
        sound: discover
      - type: narration
        text: "グラフの見え方に問題があるなら、だれが一番その部分に関わっていそうかな？"

  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: ステップ2
        subtitle: 反転
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "先生のメモ"
      - type: se
        sound: discover
      - type: narration
        text: "数字を変えていなくても、見せ方を変えると問題になるのはなぜかな？"
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: yamada
        action: hide

  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: hyou
        expression: thinking
        position: left
      - type: dialog
        character: hyou
        text: "ヒョウの考えを述べる"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        expression: thinking
        position: right
      - type: dialog
        character: suu
        text: "スウの考えを述べる"
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        expression: thinking
        position: left
      - type: dialog
        character: graph
        text: "グラフの考えを述べる"
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        expression: worried
        position: right
      - type: dialog
        character: matome
        text: "マトメの考えを述べる"
      - type: sprite
        character: matome
        action: hide

  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票
      - type: narration
        text: "「グラフの軸を変えて印象を操作したのは誰？」"
      - type: sprite_group
        characters:
          - { id: hyou, expression: normal }
          - { id: suu, expression: normal }
          - { id: graph, expression: normal }
          - { id: matome, expression: worried }
      - type: choice
        id: q1
        text: "グラフの軸を変えて印象を操作したのは誰？"
        options:
          - text: ヒョウ
            value: hyou
            correct: false
            feedback: "ヒョウは軸の問題に気づいた分析者。操作したのはヒョウではない"
          - text: スウ
            value: suu
            correct: false
            feedback: "数字は変わっていない。操作されたのは\"軸の見せ方\"。スウは元データを確認した側"
          - text: グラフ
            value: graph
            correct: false
            feedback: "グラフはデザイン全体を担当したが、棒グラフの作成はマトメの担当"
          - text: マトメ
            value: matome
            correct: true
            feedback: "マトメはデータの数字は変えていない。でも軸を50%から始めることで\"ほぼ全員が好き\"に見せた。数字が正しくても、見せ方で印象は大きく変わる。グラフを見るときは、まず軸を確認しよう"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide

  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: 真相
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "真相が明かされた。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite
        character: matome
        expression: worried
        position: center
      - type: dialog
        character: matome
        text: "ごめんなさい。"
      - type: sprite
        character: matome
        expression: determined
      - type: dialog
        character: matome
        text: "ごめんなさい。"
      - type: sprite
        character: matome
        action: hide

  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: yamada
        expression: thinking
      - type: dialog
        character: yamada
        text: "・証拠カード1で、ポスターの見た目に違和感があると気づく\n・証拠カード2で、縦軸を変えると印象が変わると分かる\n・証拠カード3で、元データの60%は正しいと確定する"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: happy }
          - { id: suu, expression: happy }
          - { id: graph, expression: happy }
          - { id: matome, expression: happy }
      - type: narration
        text: "データ探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 1000
