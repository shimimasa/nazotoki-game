meta:
  id: space-09
  title: ずれた星座
  series: 宇宙探偵団
  volume: 9
  estimatedMinutes: 18

characters:
  hikari:
    name: ヒカリ
    color: "#FF4444"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  hoshino:
    name: ホシノ
    color: "#4169E1"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  tsukimi:
    name: ツキミ
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sora:
    name: ソラ
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  yamada:
    name: 山田先生
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "天体観測クラブでは、"

      - type: narration
        text: "3回の観測会のたびに"

      - type: narration
        text: "星の位置を記録していました。"

      - type: se
        sound: crash

      - type: effect
        name: shake
        duration: 400

      - type: bgm
        action: stop

      - type: sprite
        character: hikari
        expression: worried
        position: center

      - type: dialog
        character: hikari
        text: "大変だ！ みんな来て！"

      - type: sprite
        character: hikari
        action: hide

      - type: bgm
        track: tension-quiet

      - type: sprite
        character: yamada
        expression: thinking
        position: center

      - type: dialog
        character: yamada
        text: "{落|お}ち{着|つ}いて。みんなで{証拠|しょうこ}を{集|あつ}めて{調|しら}べてみましょう。"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite_group
        characters:
          - { id: hikari, expression: determined }
          - { id: hoshino, expression: thinking }
          - { id: tsukimi, expression: thinking }
          - { id: sora, expression: worried }

      - type: narration
        text: "「{宇宙探偵団|うちゅうたんていだん}」として{調査|ちょうさ}を{始|はじ}める。"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        title: 宇宙探偵団
        subtitle: Vol.9 ずれた星座

  # ========================================
  # 証拠カード1
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600

      - type: title_card
        title: ステップ1
        subtitle: 調査

      - type: narration
        text: "3回分の観測記録表"

      - type: narration
        text: "クラブの声:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード2
  # ========================================
  - id: evidence-2
    steps:
      - type: narration
        text: "「星座の位置」問いカード"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード3
  # ========================================
  - id: evidence-3
    steps:
      - type: narration
        text: "ホシノの比較分析 + 望遠鏡の整備記録"

      - type: narration
        text: "望遠鏡の整備記録:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード4
  # ========================================
  - id: evidence-4
    steps:
      - type: narration
        text: "ツキミの調査 + ヒカリの提出記録"

      - type: narration
        text: "メモ:"

      - type: narration
        text: "ヒカリの提出記録:"

      - type: se
        sound: discover

  # ========================================
  # 証拠カード5
  # ========================================
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600

      - type: title_card
        title: ステップ2
        subtitle: 反転

      - type: effect
        name: fade-in
        duration: 600

      - type: narration
        text: "先生のメモ"

      - type: se
        sound: discover

      - type: sprite
        character: yamada
        expression: thinking
        position: center

      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"

      - type: sprite
        character: yamada
        action: hide

  # ========================================
  # 議論
  # ========================================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論

      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"

      - type: sprite
        character: tsukimi
        expression: thinking
        position: left

      - type: dialog
        character: tsukimi
        text: "準備室の星図が30年前のものだと見つけた"

      - type: sprite
        character: tsukimi
        action: hide

      - type: sprite
        character: hoshino
        expression: thinking
        position: right

      - type: dialog
        character: hoshino
        text: "3回のズレが全部同じ方向・同じ量だと見つけた"

      - type: sprite
        character: hoshino
        action: hide

      - type: sprite
        character: sora
        expression: thinking
        position: left

      - type: dialog
        character: sora
        text: "歳差運動の資料を見つけた"

      - type: sprite
        character: sora
        action: hide

      - type: sprite
        character: hikari
        expression: worried
        position: right

      - type: dialog
        character: hikari
        text: "3回とも同じ星図を使っていた"

      - type: sprite
        character: hikari
        action: hide

  # ========================================
  # 投票
  # ========================================
  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票

      - type: narration
        text: "「犯人は誰？」"

      - type: sprite_group
        characters:
          - { id: hikari, expression: normal }
          - { id: hoshino, expression: normal }
          - { id: tsukimi, expression: normal }
          - { id: sora, expression: worried }

      - type: choice
        id: q1
        text: "犯人は誰？"
        options:
          - label: ヒカリ
            value: hikari
            correct: true
            feedback: "ヒカリは締切に間に合わせるために準備室の星図を使った。30年前のものだと気づかなかった。3回とも同じ方向にずれたのは、古い星図が原因。でもこのズレには深い理由がある——歳差運動だ"
          - label: ホシノ
            value: hoshino
            correct: false
            feedback: "ホシノはデータを比較分析した側"
          - label: ツキミ
            value: tsukimi
            correct: false
            feedback: "ツキミは星図の年代を調べた側"
          - label: ソラ
            value: sora
            correct: false
            feedback: "ソラは歳差運動の資料を見つけた側"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

  # ========================================
  # 真相
  # ========================================
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600

      - type: title_card
        title: 真相

      - type: effect
        name: fade-in
        duration: 600

      - type: sprite
        character: yamada
        expression: normal
        position: center

      - type: dialog
        character: yamada
        text: "真相が明かされた。"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite
        character: hikari
        expression: worried
        position: center

      - type: dialog
        character: hikari
        text: "古いことに気づかず、そのまま使ってしまった"

      - type: sprite
        character: hikari
        expression: determined

      - type: dialog
        character: hikari
        text: "ごめんなさい。"

      - type: sprite
        character: hikari
        action: hide

  # ========================================
  # エピローグ
  # ========================================
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center

      - type: dialog
        character: yamada
        text: "みんな、よく{調|しら}べたね。今日の{学|まな}びを{振|ふ}り{返|かえ}ろう。"

      - type: sprite
        character: yamada
        expression: thinking

      - type: dialog
        character: yamada
        text: "・証拠カード1で、3回の観測記録すべてが星図とずれていると分かる\n・1回だけのミスではなく、くり返して同じ問題が起きていると考えられる\n・証拠カード3で、3回とも北西に約0.5度ずつずれていると分かる"

      - type: sprite
        character: yamada
        action: hide

      - type: sprite_group
        characters:
          - { id: hikari, expression: happy }
          - { id: hoshino, expression: happy }
          - { id: tsukimi, expression: happy }
          - { id: sora, expression: happy }

      - type: narration
        text: "{宇宙探偵団|うちゅうたんていだん}の{冒険|ぼうけん}はつづく——"

      - type: sprite
        character: hikari
        action: hide
      - type: sprite
        character: hoshino
        action: hide
      - type: sprite
        character: tsukimi
        action: hide
      - type: sprite
        character: sora
        action: hide

      - type: effect
        name: fade-out
        duration: 1000
