scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{美術|びじゅつ}コンクールの{提出|ていしゅつ}{期限|きげん}は{今朝|けさ}の9:00。ニジカは「{昨日|きのう}の{午前中|ごぜんちゅう}に{完成|かんせい}させた」と{言|い}って{油絵|あぶらえ}を{提出|ていしゅつ}した。"
      - type: sprite
        character: sakura
        expression: thinking
        position: left
      - type: dialog
        character: sakura
        text: "ちょっと{待|ま}って。この{油絵|あぶらえ}、まだ{乾|かわ}いていない。{触|さわ}るとベタベタする。{油絵|あぶらえ}は{乾|かわ}くのに**24{時間|じかん}{以上|いじょう}**かかるのよ。"
        expression: surprised
      - type: sprite
        character: sakura
        action: hide
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{昨日|きのう}の{午前中|ごぜんちゅう}に{完成|かんせい}なら21{時間|じかん}{以上|いじょう}{経|た}っている。「{少|すこ}しベタつく」{程度|ていど}のはず。でもニジカの{絵|え}は**ベタベタ**。ベタベタ＝{完成|かんせい}から**12{時間|じかん}{以内|いない}**。
      - type: narration
        text: "{大事|だいじ}な{知識|ちしき}——{画材|がざい}の{乾燥|かんそう}{時間|じかん}。{水彩|すいさい}=30{分|ぷん}〜1{時間|じかん}。アクリル=10{分|ぷん}〜1{時間|じかん}。**{油絵|あぶらえ}の{具|ぐ}=24{時間|じかん}〜{数日|すうじつ}**。
      - type: effect
        name: fade-out
      - type: title_card
        text: 乾かないアリバイ
        subtitle: 美術探偵団 Vol.5

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 油絵の状態と4人の比較
      - type: narration
        text: "ニジカの{油絵|あぶらえ}「{夕焼|ゆうや}けの{丘|おか}」——{表面|ひょうめん}**ベタベタ**（{触|さわ}ると{指|ゆび}に{絵|え}の{具|ぐ}がつく）。{油|あぶら}の{匂|にお}いが**{強|つよ}い**。{厚塗|あつぬ}り{部分|ぶぶん}が3mmほど。"
      - type: narration
        text: "4{人|にん}の{作品|さくひん}の{乾燥|かんそう}{状態|じょうたい}{比較|ひかく}——"
      - type: narration
        text: "サクラ（{水彩|すいさい}・{昨日|きのう}{午後|ごご}）: {完全|かんぜん}{乾燥|かんそう} ✅"
      - type: narration
        text: "タクミ（アクリル・{昨日|きのう}{午後|ごご}）: {完全|かんぜん}{乾燥|かんそう} ✅"
      - type: narration
        text: "ユウ（{水彩|すいさい}・{昨日|きのう}{午後|ごご}）: {完全|かんぜん}{乾燥|かんそう} ✅"
      - type: narration
        text: "**ニジカ（{油絵|あぶらえ}・{昨日|きのう}{午前|ごぜん}？）: ベタベタ ❌ {矛盾|むじゅん}**"
      - type: narration
        text: "ニジカが{一番|いちばん}{早|はや}く{完成|かんせい}したはずなのに、{一番|いちばん}{乾|かわ}いていない。{油絵|あぶらえ}は{乾|かわ}きが{遅|おそ}いとはいえ、21{時間|じかん}も{経|た}てばベタベタではないはず。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: ニジカの行動の証拠
      - type: sprite
        character: yuu
        expression: worried
        position: right
      - type: dialog
        character: yuu
        text: "ニジカ、{先週|せんしゅう}から「{間|ま}に{合|あ}わない」「まだ{描|か}き{終|お}わらない」って{焦|あせ}ってたよね。{昨日|きのう}は「{今夜中|こんやじゅう}に{絶対|ぜったい}{終|お}わらせる」って{言|い}って{帰|かえ}ったし。"
        expression: worried
      - type: sprite
        character: yuu
        action: hide
      - type: sprite
        character: takumi
        expression: thinking
        position: left
      - type: dialog
        character: takumi
        text: "{今朝|けさ}のニジカ、{目|め}の{下|した}にクマがあった。{寝不足|ねぶそく}に{見|み}えた。それとカバンから**{油絵|あぶらえ}の{具|ぐ}のチューブ**がはみ{出|で}してた。{昨日|きのう}{完成|かんせい}してるなら{今朝|けさ}{持|も}ってくる{必要|ひつよう}ないよね。"
        expression: thinking
      - type: sprite
        character: takumi
        action: hide
      - type: narration
        text: "ニジカの{爪|つめ}の{間|あいだ}に{油絵|あぶらえ}の{具|ぐ}の{跡|あと}がまだ{残|のこ}っている。{昨日|きのう}{午前|ごぜん}{完成|かんせい}なら{一晩|ひとばん}で{洗|あら}い{落|お}としているはず。{最近|さいきん}まで{描|か}いていた{証拠|しょうこ}。"
      - type: narration
        text: "「{昨日|きのう}{午前|ごぜん}に{完成|かんせい}」なら「{今夜中|こんやじゅう}に{終|お}わらせる」とは{言|い}わない。{目|め}のクマ。カバンの{絵|え}の{具|ぐ}。{全部|ぜんぶ}{矛盾|むじゅん}する。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 仮説検証シート
      - type: effect
        name: fade-in
      - type: narration
        text: "{仮説|かせつ}A「ニジカの{油絵|あぶらえ}は{昨日|きのう}{午前|ごぜん}（12:00{以前|いぜん}）に{完成|かんせい}した」を6つの{証拠|しょうこ}で{検証|けんしょう}——"
      - type: narration
        text: "{乾燥|かんそう}{状態|じょうたい}: 「{少|すこ}しベタつく」のはず → {実際|じっさい}は**ベタベタ** ❌"
      - type: narration
        text: "{匂|にお}い: {薄|うす}くなっているはず → {実際|じっさい}は**{強|つよ}い** ❌"
      - type: narration
        text: "{爪|つめ}の{絵|え}の{具|ぐ}: {洗|あら}い{落|お}としているはず → {実際|じっさい}は**{残|のこ}っている** ❌"
      - type: narration
        text: "「{今夜中|こんやじゅう}に」{発言|はつげん}: {言|い}う{必要|ひつよう}がない → {実際|じっさい}は**{言|い}った** ❌"
      - type: narration
        text: "{目|め}のクマ: {普通|ふつう}に{寝|ね}たはず → {実際|じっさい}は**{寝不足|ねぶそく}** ❌"
      - type: narration
        text: "カバンに{絵|え}の{具|ぐ}: {持|も}ってくる{必要|ひつよう}なし → {実際|じっさい}は**{持|も}ってきている** ❌"
      - type: se
        sound: discover
      - type: narration
        text: "**6{項目|こうもく}すべてが{仮説|かせつ}Aと{矛盾|むじゅん}。{仮説|かせつ}Aは{偽|にせ}。**"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "{仮説|かせつ}B「{今朝|けさ}6:00ごろに{完成|かんせい}」→ {乾燥|かんそう}ベタベタ ✅、{匂|にお}い{強|つよ}い ✅、{爪|つめ}{残|のこ}る ✅、{発言|はつげん} ✅、クマ ✅、カバン ✅。**6{項目|こうもく}{全|すべ}て{一致|いっち}。{仮説|かせつ}Bは{正|ただ}しい。**"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: narration
        text: "{仮説|かせつ}{検証|けんしょう}の{結果|けっか}——ニジカの{油絵|あぶらえ}は{今朝|けさ}6:00ごろに{完成|かんせい}。「{昨日|きのう}{午前|ごぜん}{完成|かんせい}」は{嘘|うそ}。{締切|しめきり}に{間|ま}に{合|あ}わなかったから{嘘|うそ}をついた。"
      - type: choice
        id: q1
        question: 完成時刻を嘘ついた犯人は？
        options:
          - text: ニジカ（ベタベタ＝12時間以内＋6つの証拠すべて矛盾＋締切の焦り）
            value: nijika
            correct: true
            feedback: "{正解|せいかい}！ ニジカは{昨夜|さくや}{遅|おそ}くまで{描|か}き{続|つづ}け、{今朝|けさ}6:00ごろに{完成|かんせい}。{油絵|あぶらえ}の{乾燥|かんそう}{時間|じかん}が{嘘|うそ}を{暴|あば}いた。6つの{証拠|しょうこ}すべてが「{今朝|けさ}{完成|かんせい}」を{示|しめ}していた。"
          - text: サクラ（乾燥時間に詳しい人）
            value: sakura
            feedback: "サクラは{画材|がざい}{知識|ちしき}で{矛盾|むじゅん}を{発見|はっけん}した{側|がわ}。{水彩画|すいさいが}は{完全|かんぜん}{乾燥|かんそう}{済|ず}みだよ。"
          - text: タクミ（触察で確認した人）
            value: takumi
            feedback: "タクミは{物理的|ぶつりてき}{証拠|しょうこ}（{匂|にお}い・{爪|つめ}・カバン）を{検出|けんしゅつ}した{側|がわ}。アクリル{画|が}は{乾燥|かんそう}{済|ず}みだよ。"
          - text: ユウ（ニジカの焦りを知っていた人）
            value: yuu
            feedback: "ユウは{行動|こうどう}{証拠|しょうこ}（{焦|あせ}り{発言|はつげん}・{寝不足|ねぶそく}）を{持|も}っている{側|がわ}。{水彩画|すいさいが}は{乾燥|かんそう}{済|ず}みだよ。"

  # ==================== 真実：ニジカ ====================
  - id: truth-nijika
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ニジカの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: nijika
        expression: worried
        position: center
      - type: dialog
        character: nijika
        text: "……ごめんなさい。{本当|ほんとう}は{今朝|けさ}6:00ごろに{完成|かんせい}したの。{昨夜|さくや}{遅|おそ}くまで{描|か}いて、{今朝|けさ}{早|はや}く{起|お}きて{最後|さいご}の{仕上|しあ}げをした。"
        expression: worried
      - type: dialog
        character: nijika
        text: "{提出|ていしゅつ}ルール（{前日|ぜんじつ}{完成|かんせい}{推奨|すいしょう}）に{違反|いはん}するから、「{昨日|きのう}の{午前中|ごぜんちゅう}に{完成|かんせい}した」って{嘘|うそ}をついた。{油絵|あぶらえ}の{乾燥|かんそう}に24{時間|じかん}かかるって、{焦|あせ}って{考|かんが}えが{回|まわ}らなかった……ごめんなさい。"
        expression: worried
      - type: sprite
        character: nijika
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{画材|がざい}の{乾燥|かんそう}{時間|じかん}——{水彩|すいさい}は30{分|ぷん}、アクリルは1{時間|じかん}、{油彩|ゆさい}は24{時間|じかん}{以上|いじょう}。{画材|がざい}の{性質|せいしつ}を{知|し}っていれば、{絵|え}が「いつ{描|か}かれたか」が{分|わ}かる。{科学的|かがくてき}な{証拠|しょうこ}ね。"
        expression: happy
      - type: dialog
        character: sensei
        text: "そして{今日|きょう}のスキル——{仮説|かせつ}{検証|けんしょう}。「もし〜なら〜のはず」を{立|た}てて、1つずつ{証拠|しょうこ}と{照|て}らし{合|あ}わせる。{全部|ぜんぶ}{一致|いっち}したら{仮説|かせつ}は{正|ただ}しい。{全部|ぜんぶ}{矛盾|むじゅん}したら{仮説|かせつ}は{偽|にせ}。"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "{締切|しめきり}に{間|ま}に{合|あ}わなくても{正直|しょうじき}に{言|い}えば、先生が{対応|たいおう}してくれる。{嘘|うそ}は{問題|もんだい}を{大|おお}きくする。
      - type: narration
        text: "{画材|がざい}の{知識|ちしき}＝{推理|すいり}の{武器|ぶき}。{乾燥|かんそう}{時間|じかん}で「いつ{描|か}いたか」が{分|わ}かる。{科学|かがく}と{美術|びじゅつ}は{繋|つな}がっている。
      - type: effect
        name: fade-out
