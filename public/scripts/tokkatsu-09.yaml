      - type: narration
        text: "「{勝手|かって}に{書|か}きかえない」というルールが{明記|めいき}されている。{理由|りゆう}が{正|ただ}しくても、{手続|てつづ}きを{飛|と}ばして{変更|へんこう}するのはルール{違反|いはん}になる。"
      - type: narration
        text: "{変更|へんこう}した{人|ひと}は「{正|ただ}しい{理由|りゆう}があった」と{思|おも}っているのかもしれない。でも、{手続|てつづ}きを{飛|と}ばしたことが{問題|もんだい}になっている——「{理由|りゆう}」と「{手続|てつづ}き」は{別|べつ}に{考|かんが}えないといけない。"

  # ==================== 調査：証拠カード3 ====================
