scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "{林間学校|りんかんがっこう}の{班別行動|はんべつこうどう}{予定表|よていひょう}が、ついに8{班|はん}ぶんそろった。{実行委員|じっこういいん}の4{人|にん}が{金曜日|きんようび}の{放課後|ほうかご}に{最終確認|さいしゅうかくにん}をして、{予定表|よていひょう}ボードに{貼|は}り{出|だ}した。"
      - type: narration
        text: "ところが——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{月曜日|げつようび}の{朝|あさ}8{時|じ}、{提出|ていしゅつ}の{当日|とうじつ}に{見|み}ると、3{班|はん}ぶんの「{午後|ごご}の{自由時間|じゆうじかん}の{行|い}き{先|さき}」が{書|か}きかわっていた。2{班|はん}・5{班|はん}・8{班|はん}、すべて「{渓流|けいりゅう}コース」から「{展望台|てんぼうだい}コース」への{変更|へんこう}だ。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "3{班|はん}の{予定|よてい}が{書|か}きかわっています。3つとも{同|おな}じ{渓流|けいりゅう}コースから{展望台|てんぼうだい}コースへの{変更|へんこう}です。いたずらでしょうか。それとも{何|なに}か{同|おな}じ{理由|りゆう}があるのでしょうか。{調|しら}べてもらえますか。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: tsumugi
            expression: thinking
          - character: ayumu
            expression: worried
          - character: mamoru
            expression: surprised
          - character: nozomi
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{全部|ぜんぶ}ちがう{班|はん}なのに、{変|か}わり{方|かた}は{同|おな}じだ。3つの{書|か}きかえに{共通|きょうつう}のパターンがある——ということは、{同|おな}じ{理由|りゆう}が{隠|かく}れているのかもしれない。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 予定表のカオス
        subtitle: 特別活動探偵団 Vol.9

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 書きかえられた3班を確認しよう
      - type: narration
        text: "{予定表|よていひょう}ボードから、{書|か}きかわった3{班|はん}の{記録|きろく}を{取|と}り{出|だ}して{並|なら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "2{班|はん}——{変更前|へんこうまえ}「{渓流|けいりゅう}コース」、{変更後|へんこうご}「{展望台|てんぼうだい}コース」。"
      - type: narration
        text: "5{班|はん}——{変更前|へんこうまえ}「{渓流|けいりゅう}コース」、{変更後|へんこうご}「{展望台|てんぼうだい}コース」。"
      - type: narration
        text: "8{班|はん}——{変更前|へんこうまえ}「{渓流|けいりゅう}コース」、{変更後|へんこうご}「{展望台|てんぼうだい}コース」。"
      - type: narration
        text: "3つとも{同|おな}じ{方向|ほうこう}の{変更|へんこう}だ。「{展望台|てんぼうだい}→{渓流|けいりゅう}」への{変更|へんこう}は1つもない。{渓流|けいりゅう}コースを{選|えら}んでいた{班|はん}だけが{変|か}わっている——これが{最初|さいしょ}の{手|て}がかりだ。"

