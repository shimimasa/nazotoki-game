      - type: narration
        text: "アユムが「{もう一度|もういちど}だけ{確認|かくにん}する」と{言|い}ったのは、{何|なに}かを{心配|しんぱい}していたからかもしれない。{金曜日|きんようび}の{夜|よる}から{月曜日|げつようび}の{朝|あさ}の{間|あいだ}に{変更|へんこう}が{起|お}きた。"

