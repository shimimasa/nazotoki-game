      - type: narration
        text: "8{班|はん}{全部|ぜんぶ}の{予定表|よていひょう}を{並|なら}べて、{変|か}わった{班|はん}と{変|か}わっていない{班|はん}を{表|ひょう}にした。"
      - type: se
