      - type: narration
        text: "{変|か}わっていない{班|はん}——1{班|はん}「{展望台|てんぼうだい}→{展望台|てんぼうだい}」、3{班|はん}「{展望台|てんぼうだい}→{展望台|てんぼうだい}」、4{班|はん}「{渓流|けいりゅう}→{渓流|けいりゅう}」、6{班|はん}「{展望台|てんぼうだい}→{展望台|てんぼうだい}」、7{班|はん}「{渓流|けいりゅう}→{渓流|けいりゅう}」。"
      - type: narration
        text: "{重要|じゅうよう}な{発見|はっけん}——4{班|はん}と7{班|はん}も{渓流|けいりゅう}コースを{選|えら}んでいるのに、{変|か}わっていない。{変|か}わった2{班|はん}・5{班|はん}・8{班|はん}と{変|か}わっていない4{班|はん}・7{班|はん}、{渓流|けいりゅう}{同士|どうし}なのに{差|さ}があるのはなぜだろう？"
