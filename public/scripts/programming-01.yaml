          - { id: mei, expression: happy }
          - { id: takumi, expression: happy }
          - { id: kotone, expression: happy }
      - type: narration
        text: "{花瓶|かびん}は新しいものに{取|と}り{替|か}えられた。そしてメイの{絵|え}は——"
      - type: narration
        speed: slow
        text: "{校長|こうちょう}先生がちゃんと見に来てくれた。「すてきな{絵|え}だね」と言って。"
      - type: sprite
        character: yuuki
        action: hide
      - type: sprite
        character: mei
        action: hide
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: kotone
        action: hide
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "{命令|めいれい}のまちがいは「バグ」。バグを見つけるのは「デバッグ」。きみたちは今日、{立派|りっぱ}なデバッガーになったよ！"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "バグ{探偵団|たんていだん}——デバッグ{完了|かんりょう}！"
      - type: effect
        name: fade-out
        duration: 1500
