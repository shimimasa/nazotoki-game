      - type: dialog
        character: kotone
        text: "「しまわなくていいの？」って{聞|き}こうとしたけど、ユウキが{喜|よろこ}んでて……言い出せなかった。"
      - type: dialog
        character: kotone
        text: "それと、木曜日の朝、メイが{教室|きょうしつ}から{慌|あわ}てて出てくるのを見ました。何か{隠|かく}してる{様子|ようす}だった。"
        expression: determined
      - type: dialog
        character: kotone
        text: "気づいてたのに言えなかった。テスト{担当|たんとう}として、もっとしっかりすべきだった。"
      - type: sprite
        character: kotone
        action: hide

  # メイの真実（クライマックス）
  - id: truth-mei
    bgm: programming-01/truth
    steps:
      - type: sprite
        character: mei
        expression: worried
        position: center
      - type: dialog
        character: mei
        text: "……わたしがやりました。カード②の「右」を{消|け}して「左」に書きかえたのは、わたしです。"
      - type: narration
        speed: slow
        text: "メイがゆっくりと話し{始|はじ}めた。"
      - type: dialog
        character: mei
        text: "木曜日の朝、{早|はや}く{登校|とうこう}して{教室|きょうしつ}に行ったら、{命令|めいれい}カードが{机|つくえ}の上にあったの。"
        expression: worried
      - type: dialog
        character: mei
        text: "わたしの{絵|え}は{廊下|ろうか}の左{側|がわ}に{展示|てんじ}してある。「ロボットが先に自分の{絵|え}のところに来てくれたら、{校長|こうちょう}先生が気づいてくれるかも」って思って……"
      - type: dialog
        character: mei
        text: "スケッチブックにマップを{描|か}いて{確認|かくにん}して、カード②の「右」を{消|け}しゴムで{消|け}して「左」に書きかえた。"
        expression: worried
      - type: dialog
        character: mei
        text: "{本番|ほんばん}の前に元に{戻|もど}すつもりだったのに、ドキドキして{忘|わす}れちゃったの。"
      - type: dialog
        character: mei
        text: "{花瓶|かびん}を{壊|こわ}すつもりなんてなかった。ただ……自分の{絵|え}を見てほしかっただけなのに……。"
        expression: determined
      - type: sprite
        character: mei
        action: hide
      - type: narration
        speed: slow
        text: "メイは{花瓶|かびん}を{壊|こわ}したかったわけじゃない。ただ、自分の{絵|え}を{校長|こうちょう}先生に見てもらいたかっただけ——。"
      - type: narration
        text: "でも、たった1{枚|まい}のカードの「右」を「左」に変えただけで、ロボットの行き先がまったく変わってしまった。"

  # ===== エピローグ =====
  - id: epilogue
    bg: classroom
    bgm: programming-01/resolution
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "メイの気持ちは分かるよ。自分の{作品|さくひん}を見てほしいって、大切な気持ちだよね。"
      - type: dialog
        character: sensei
        text: "でも今回みんなが学んだのは、とても大事なことです。"
        expression: normal
      - type: dialog
        character: sensei
        text: "{命令|めいれい}を{順番|じゅんばん}にたどると、{結果|けっか}が{予測|よそく}できる。これが「プログラミング{的|てき}{思考|しこう}」。"
      - type: dialog
        character: sensei
        text: "そして、1つの{命令|めいれい}を変えるだけで{結果|けっか}が大きく変わる。だからテストが大切なの。"
        expression: thinking
      - type: dialog
        character: sensei
        text: "でもね、テストは「その時点で{正|ただ}しい」ことしか{保証|ほしょう}しない。テスト{後|ご}に{変更|へんこう}されたら、またバグが入る。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: yuuki
        expression: determined
        position: left
      - type: dialog
        character: yuuki
        text: "ぼくがカードをちゃんとしまっていれば……。次からは{必|かなら}ず{鍵|かぎ}つきの{引|ひ}き出しに入れます。"
      - type: sprite
        character: yuuki
        action: hide
      - type: sprite
        character: mei
        expression: determined
        position: right
      - type: dialog
        character: mei
        text: "ごめんなさい。今度からは、やりたいことがあったらちゃんとみんなに{相談|そうだん}します。"
      - type: sprite
