meta:
  id: programming-01
  title: バグだらけのロボットと書きかえられた命令カード
  series: バグ探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  yuuki:
    name: ユウキ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  mei:
    name: メイ
    color: "#9B59B6"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  takumi:
    name: タクミ
    color: "#E67E22"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  kotone:
    name: コトネ
    color: "#C0392B"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: programming-01/opening
    steps:
      - type: narration
        text: "あおば小学校の{文化祭|ぶんかさい}。3年2{組|くみ}が作った「お{手伝|てつだ}いロボット」のデモンストレーションが{始|はじ}まる。"
      - type: narration
        text: "ロボットは「{命令|めいれい}カード」に{書|か}かれた{通|とお}りに{動|うご}く。カードを1{枚|まい}ずつ{順番|じゅんばん}に読んで、その{通|とお}りに{実行|じっこう}するのだ。"
      - type: sprite_group
        characters:
          - { id: yuuki, expression: happy }
          - { id: mei, expression: happy }
          - { id: takumi, expression: happy }
          - { id: kotone, expression: happy }
      - type: narration
        text: "今日の{任務|にんむ}——{職員室|しょくいんしつ}の前の{棚|たな}にある「がんばったで{賞|しょう}トロフィー」を、{校長室|こうちょうしつ}まで{届|とど}けること。"
      - type: sprite
        character: yuuki
        action: hide
      - type: sprite
        character: mei
        action: hide
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: kotone
        action: hide
      - type: narration
        text: "ロボット、スタート！"
      - type: narration
        text: "カード①「まっすぐ2つ{進|すす}む」——ロボットが{廊下|ろうか}を{進|すす}んでいく。{順調|じゅんちょう}だ。"
      - type: narration
        text: "分かれ道に{到着|とうちゃく}。ここで右に{曲|ま}がればトロフィーの{棚|たな}だ。"
      - type: narration
        text: "カード②を読み{込|こ}む——"
      - type: bgm
        action: stop
      - type: narration
        speed: slow
        text: "ロボットが……左に{曲|ま}がった！"
      - type: se
        sound: programming-01/error
      - type: effect
        name: shake
        duration: 500
      - type: se
        sound: common/crash
      - type: narration
        text: "ガシャーン！ ロボットがメイの{展示台|てんじだい}の近くにあった{花瓶|かびん}を{倒|たお}してしまった！"
      - type: sprite_group
        characters:
          - { id: yuuki, expression: surprised }
          - { id: mei, expression: surprised }
          - { id: takumi, expression: surprised }
          - { id: kotone, expression: surprised }
      - type: sprite
        character: yuuki
        action: hide
      - type: sprite
        character: mei
        action: hide
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: kotone
        action: hide
      - type: bgm
        track: programming-01/investigation
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "大変！ ロボットは{命令|めいれい}カードの{通|とお}りにしか{動|うご}かないはず。"
      - type: dialog
        character: sensei
        text: "つまり——だれかが{命令|めいれい}カードを書きかえたのよ。{命令|めいれい}のまちがい、これを「バグ」と{呼|よ}びます。"
        expression: thinking
      - type: dialog
        character: sensei
        text: "バグ{探偵団|たんていだん}、{出動|しゅつどう}！ {命令|めいれい}カードをたどって、バグを見つけ出そう！"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: バグ探偵団 Vol.1
        subtitle: バグだらけのロボットと書きかえられた命令カード

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: classroom
    bgm: programming-01/investigation
    steps:
      - type: narration
        text: "ロボットを作った4人のメンバーを{確認|かくにん}しよう。"
      - type: sprite
        character: yuuki
        expression: normal
        position: left
      - type: dialog
        character: yuuki
        text: "ぼくはユウキ。ロボットの道{順|じゅん}を{設計|せっけい}して、{命令|めいれい}カード5{枚|まい}を{書|か}きました。"
      - type: dialog
        character: yuuki
        text: "水曜日のテストでは{正|ただ}しく{動|うご}いたのに……なぜ{本番|ほんばん}でバグが？"
        expression: thinking
      - type: sprite
        character: yuuki
        action: hide
      - type: sprite
        character: mei
        expression: normal
        position: right
      - type: dialog
        character: mei
        text: "わたしはメイ。{絵|え}を{描|か}くのが{得意|とくい}で、{文化祭|ぶんかさい}のポスターも{描|か}きました。"
      - type: dialog
        character: mei
        text: "{廊下|ろうか}の左{側|がわ}に自分の{絵|え}を{展示|てんじ}してるの……ロボットのことはすごいなって思ってた。"
        expression: thinking
      - type: sprite
        character: mei
        action: hide
      - type: sprite
        character: takumi
        expression: happy
        position: left
      - type: dialog
        character: takumi
        text: "ぼくはタクミ！ ロボットの体——{箱|はこ}と{車輪|しゃりん}とつかむアームを作ったんだ！"
      - type: dialog
        character: takumi
        text: "{命令|めいれい}カードは{書|か}いてないよ。字を{書|か}くのは{苦手|にがて}で、ユウキに{任|まか}せたんだ。"
        expression: normal
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: kotone
        expression: normal
        position: right
      - type: dialog
        character: kotone
        text: "わたしはコトネ。水曜日にロボットのテストを{担当|たんとう}しました。"
      - type: dialog
        character: kotone
        text: "テストでは{正|ただ}しく{動|うご}いたの……右に{曲|ま}がってトロフィーの前に行けた。なのに{本番|ほんばん}では左に……？"
        expression: thinking
      - type: sprite
        character: kotone
        action: hide

  # ===== 証拠カード1: 命令カード =====
  - id: evidence-1
    bg: classroom
    bgm: programming-01/experiment
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 命令カードをたどれ！
      - type: narration
        text: "ロボットに入っていた{命令|めいれい}カード5{枚|まい}。ロボットはこれを①→②→③→④→⑤の{順番|じゅんばん}に読んで{動|うご}く。"
      - type: narration
        text: "カード①「まっすぐ2つ{進|すす}む」"
      - type: narration
        text: "カード②「左に{曲|ま}がる」"
      - type: narration
        text: "カード③「つかむ」"
      - type: narration
        text: "カード④「まっすぐ1つ{進|すす}む」"
      - type: narration
        text: "カード⑤「おく」"
      - type: narration
        text: "この{命令|めいれい}の{通|とお}りにロボットを{動|うご}かすと……分かれ道で「左」に{曲|ま}がってしまう。メイの{展示|てんじ}の方へ！"

  # ===== 証拠カード2: 設計ノート =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: ユウキの設計ノート
      - type: sprite
        character: yuuki
        expression: normal
        position: left
      - type: dialog
        character: yuuki
        text: "これがぼくの{設計|せっけい}ノートです。{正|ただ}しい{命令|めいれい}を{書|か}いてあります。"
      - type: sprite
        character: yuuki
        action: hide
      - type: narration
        text: "ユウキの{設計|せっけい}ノートの{正|ただ}しい{命令|めいれい}——"
      - type: narration
        text: "①まっすぐ2つ{進|すす}む → 分かれ道に{着|つ}く"
      - type: narration
        text: "②「右」に{曲|ま}がる → トロフィーの{棚|たな}の{方向|ほうこう}"
      - type: narration
        text: "③つかむ → トロフィーをつかむ"
      - type: narration
        text: "④まっすぐ1つ{進|すす}む → {校長室|こうちょうしつ}に{着|つ}く"
      - type: narration
        text: "⑤おく → トロフィーを{置|お}く"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "{設計|せっけい}ノートではカード②は「右に{曲|ま}がる」。でも今のカード②は「左に{曲|ま}がる」に変わっている！"
      - type: narration
        text: "これがバグだ！ だれかがカード②を書きかえた！"

  # ===== 証拠カード3: 命令トレース =====
  - id: evidence-3
    bg: hallway
    steps:
      - type: title_card
        text: 証拠③
        subtitle: ろうかマップで命令をたどろう
      - type: narration
        text: "ロボットの{動|うご}きを、ろうかマップの上でたどってみよう。"
      - type: narration
        text: "{廊下|ろうか}は一本道。スタート{地点|ちてん}から分かれ道まで{進|すす}む。"
      - type: narration
        text: "分かれ道の左には……メイの{絵|え}の{展示|てんじ}。{花瓶|かびん}もある。"
      - type: narration
        text: "分かれ道の右には……トロフィーの{棚|たな}。その先に{校長室|こうちょうしつ}。"
      - type: narration
        text: "では、{命令|めいれい}カードを1{枚|まい}ずつ{実行|じっこう}しよう。"
      - type: narration
        text: "【{実行|じっこう}】カード①「まっすぐ2つ{進|すす}む」→ ロボットが分かれ道に{到着|とうちゃく}。"
      - type: narration
        text: "【{実行|じっこう}】カード②「左に{曲|ま}がる」→ ロボットが左へ！ メイの{展示|てんじ}の方へ{進|すす}む！"
      - type: se
        sound: programming-01/error
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "{花瓶|かびん}にぶつかった！ ——ここが「バグ」の{影響|えいきょう}だ。"
      - type: narration
        text: "もしカード②が{正|ただ}しく「右に{曲|ま}がる」だったら——"
      - type: narration
        text: "【{正|ただ}しい{実行|じっこう}】カード②「右に{曲|ま}がる」→ トロフィーの{棚|たな}へ → つかむ → {校長室|こうちょうしつ}へ → {置|お}く。{完璧|かんぺき}！"
      - type: narration
        speed: slow
        text: "たった1{枚|まい}のカードの「右」が「左」に変わっただけで、{結果|けっか}がまったく変わってしまった。これがバグの{怖|こわ}さだ。"

  # ===== 証拠カード4: 行動記録 =====
  - id: evidence-4
    bg: classroom
    bgm: programming-01/investigation
    steps:
      - type: title_card
        text: 証拠④
        subtitle: だれがカードに触れた？
      - type: narration
        text: "木曜日の朝、{命令|めいれい}カードは{教室|きょうしつ}の{机|つくえ}の上にあった。だれがカードに{触|ふ}れたか、{行動|こうどう}{記録|きろく}を{確認|かくにん}しよう。"
      - type: sprite
        character: yuuki
        expression: normal
        position: left
      - type: dialog
        character: yuuki
        text: "ぼくは8:00に{登校|とうこう}して、8:00～8:30はずっと{体育館|たいいくかん}で{飾|かざ}りつけをしていました。{担任|たんにん}の先生が{証人|しょうにん}です。"
      - type: narration
        text: "ユウキ→ 8:00～8:30 {体育館|たいいくかん}（先生が{証人|しょうにん}）。{教室|きょうしつ}には行けなかった。"
      - type: sprite
        character: yuuki
        action: hide
      - type: sprite
        character: takumi
        expression: normal
        position: right
      - type: dialog
        character: takumi
        text: "ぼくは8:15に{登校|とうこう}して、{理科室|りかしつ}でロボットの{車輪|しゃりん}に{油|あぶら}をさしてたよ。{理科|りか}の先生が{証人|しょうにん}！"
      - type: narration
        text: "タクミ→ 8:15～8:40 {理科室|りかしつ}（先生が{証人|しょうにん}）。{教室|きょうしつ}には行けなかった。"
      - type: sprite
        character: takumi
        action: hide
      - type: sprite
        character: kotone
        expression: normal
        position: left
      - type: dialog
        character: kotone
        text: "わたしは8:20に{登校|とうこう}して、{飼育|しいく}{委員|いいん}の仕事でウサギ小屋にいました。友達が{証人|しょうにん}です。"
      - type: narration
        text: "コトネ→ 8:20～8:45 ウサギ小屋（友達が{証人|しょうにん}）。{教室|きょうしつ}には行けなかった。"
      - type: sprite
        character: kotone
        action: hide
      - type: sprite
        character: mei
        expression: normal
        position: right
      - type: dialog
        character: mei
        text: "わたしは7:50に{登校|とうこう}しました。{絵|え}の{展示|てんじ}をきれいにしたくて、{早|はや}く来たの。"
      - type: dialog
        character: mei
        text: "8:10ごろ{教室|きょうしつ}にも行きました。"
        expression: thinking
      - type: sprite
        character: mei
        action: hide
      - type: se
        sound: common/discover
      - type: narration
        text: "ユウキ、タクミ、コトネには{証人|しょうにん}がいる。{教室|きょうしつ}に行けた時間がない。"
      - type: narration
        speed: slow
        text: "メイだけが7:50に{登校|とうこう}し、{他|ほか}のみんなが来る前に1人で{教室|きょうしつ}に行けた。{証人|しょうにん}はいない。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: programming-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{命令|めいれい}カードのバグを入れたのは{誰|だれ}だと思う？ {証拠|しょうこ}をもとに考えてみて。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: 命令カードを書きかえた犯人は誰だと思う？
        options:
          - text: ユウキ（命令カードを設計した人）
            value: yuuki
            feedback: ユウキは8:00～8:30まで体育館にいた（先生が証人）。カードに触れる時間がなかったよ。
          - text: メイ（絵の展示を担当した人）
            value: mei
            feedback: 鋭い！ メイは7:50に登校して、誰よりも早く教室に1人でいた。カードに触れる機会があった！
          - text: タクミ（ロボットの体を作った人）
            value: takumi
            feedback: タクミは8:15～8:40まで理科室にいた（先生が証人）。命令カードは書いていないし、触れる時間もなかったよ。
          - text: コトネ（テストを担当した人）
            value: kotone
            feedback: コトネは8:20～8:45までウサギ小屋にいた（友達が証人）。教室に行けた時間がないよ。
      - type: choice
        id: q2
        question: "なぜメイは{命令|めいれい}カードを「{右|みぎ}」から「{左|ひだり}」に{書|か}きかえた？"
        options:
          - text: "ロボットを{自分|じぶん}の{絵|え}の{展示|てんじ}に{向|む}かわせて、{校長|こうちょう}{先生|せんせい}に{見|み}てもらいたかったから"
            value: art-notice
            feedback: "{正解|せいかい}！ メイは{自分|じぶん}の{絵|え}を{校長|こうちょう}{先生|せんせい}に{見|み}てほしかった。「{左|ひだり}」に{進|すす}むと{自分|じぶん}の{絵|え}の{前|まえ}を{通|とお}ると{分|わ}かっていたんだ。"
          - text: "ロボットの{動|うご}きをめちゃくちゃにしたかったから"
            value: chaos
            feedback: "メイに{悪意|あくい}はなかった。ロボットを{壊|こわ}したかったのではなく、{自分|じぶん}の{絵|え}を{見|み}てほしかっただけなんだ。"
          - text: "「{右|みぎ}」よりも「{左|ひだり}」のほうが{正|ただ}しい{道|みち}だと{思|おも}ったから"
            value: correct-path
            feedback: "メイはスケッチブックに{地図|ちず}を{描|か}いて{道順|みちじゅん}を{調|しら}べていた。「{正|ただ}しい{道|みち}」ではなく、{自分|じぶん}の{絵|え}に{向|む}かう{道|みち}だと{分|わ}かっていたよ。"
          - text: "{命令|めいれい}カードの{間違|まちが}いを{直|なお}そうとしたから"
            value: fix-error
            feedback: "{元|もと}の{命令|めいれい}カードは{正|ただ}しかった。メイが{書|か}きかえたことで、ロボットが{予定|よてい}と{違|ちが}うルートを{進|すす}んでしまったんだ。"
      - type: narration
        text: "カードに{触|ふ}れる{機会|きかい}があったのは{誰|だれ}？ カードを「左」に変えると{得|とく}をするのは{誰|だれ}？"

  # ===== 証拠カード5: メイのスケッチブック =====
  - id: evidence-5
    bgm: programming-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: メイのスケッチブック
      - type: sprite
        character: kotone
        expression: determined
        position: center
      - type: dialog
        character: kotone
        text: "……先生、見つけました。メイの{机|つくえ}の中に、スケッチブックがありました。"
      - type: sprite
        character: kotone
        action: hide
      - type: narration
        text: "スケッチブックの{最後|さいご}のページに、ろうかマップの{絵|え}が{描|か}いてあった。"
      - type: narration
        text: "マップにはロボットの道{順|じゅん}が書き{込|こ}んである。分かれ道で「左」に{進|すす}む{矢印|やじるし}が{描|か}かれていた。"
      - type: narration
        text: "その先にはメイの{絵|え}の{展示|てんじ}。"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "{矢印|やじるし}の{横|よこ}にメイの字で小さなメモ——「ロボットが先に{私|わたし}の{絵|え}に来てくれたら、{校長|こうちょう}先生が気づいてくれるかも…」"
      - type: narration
        text: "メイは「左に{曲|ま}がると自分の{絵|え}のところに行く」と知っていた。{命令|めいれい}カードの{意味|いみ}を{理解|りかい}していた{証拠|しょうこ}だ。"
      - type: narration
        text: "カード②を「右→左」に書きかえると{得|とく}をするのは——メイだけ。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: classroom
    bgm: programming-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: みんなの秘密
      - type: effect
        name: fade-in
        duration: 600

  # ユウキの秘密
  - id: truth-yuuki
    bg: classroom
    steps:
      - type: sprite
        character: yuuki
        expression: worried
        position: left
      - type: dialog
        character: yuuki
        text: "ぼくも{正直|しょうじき}に言います。"
      - type: dialog
        character: yuuki
        text: "水曜日のテストのあと、{命令|めいれい}カードを{机|つくえ}の上に{置|お}きっぱなしにしてしまったんです。"
        expression: worried
      - type: dialog
        character: yuuki
        text: "{本当|ほんとう}は{鍵|かぎ}つきの{引|ひ}き出しにしまうはずだったのに、テストがうまくいって{嬉|うれ}しくて{忘|わす}れた。"
      - type: dialog
        character: yuuki
        text: "ぼくがちゃんとしまっていれば、{誰|だれ}もカードに{触|ふ}れなかった。ぼくにも{責任|せきにん}があります。"
        expression: determined
      - type: sprite
        character: yuuki
        action: hide

  # タクミの秘密
  - id: truth-takumi
    steps:
      - type: sprite
        character: takumi
        expression: worried
        position: right
      - type: dialog
        character: takumi
        text: "ぼくも{隠|かく}してたことがある。"
      - type: dialog
        character: takumi
        text: "水曜日のテストのとき、ロボットのアームの{調子|ちょうし}がちょっと{悪|わる}かったんだ。つかむときに「ガクッ」って{揺|ゆ}れた。"
        expression: worried
      - type: dialog
        character: takumi
        text: "でもトロフィーは{落|お}ちなかったから「大丈夫」って言っちゃった。{花瓶|かびん}を{倒|たお}したのは、アームの{不調|ふちょう}も{原因|げんいん}の1つかもしれない。"
      - type: dialog
        character: takumi
        text: "「ぼくのロボットは{完璧|かんぺき}」って言いたかったけど……{正直|しょうじき}に言うべきだった。"
        expression: determined
      - type: sprite
        character: takumi
        action: hide

  # コトネの秘密
  - id: truth-kotone
    steps:
      - type: sprite
        character: kotone
        expression: worried
        position: left
      - type: dialog
        character: kotone
        text: "わたしも言わなきゃいけないことがあります。"
