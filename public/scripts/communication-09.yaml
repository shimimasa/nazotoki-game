    bgm: emotional
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真相
        subtitle: コンテキストの欠落
      - type: effect
        name: fade-in
      - type: sprite
        character: tsutae
        expression: worried
        position: center
      - type: dialog
        character: tsutae
        text: "……{私|わたし}が3{件|けん}{全|すべ}ての{発信者|はっしんしゃ}でした。{締切|しめきり}が{重|かさ}なっていて、{最低限|さいていげん}の{言葉|ことば}だけ{送|おく}ってた。"
        expression: worried
      - type: dialog
        character: tsutae
        text: "{受|う}け{取|と}る{人|ひと}がどう{読|よ}むか、{考|かんが}える{余裕|よゆう}がなかった。「グループを{作|つく}って」「{金曜|きんよう}{出|だ}して」「{図書館|としょかん}で{待|ま}って」——{確|たし}かに{伝|つた}えたけど、{何|なに}の{話|はなし}か{分|わ}かるように{伝|つた}えてなかった。"
        expression: thinking
      - type: dialog
        character: tsutae
        text: "「{伝|つた}える」と「{伝|つた}わる」は{違|ちが}うんだ……{受|う}け{取|と}る{側|がわ}が「{何|なに}を{知|し}っていて{何|なに}を{知|し}らないか」を{考|かんが}える{余裕|よゆう}が、あのときなかった。"
        expression: worried
      - type: sprite
        character: tsutae
        action: hide

  # ==================== 真相：他のメンバーの反応 ====================
