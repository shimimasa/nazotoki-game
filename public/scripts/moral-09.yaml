scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "2{学期|がっき}の{途中|とちゅう}、5{年|ねん}2{組|くみ}に{転校生|てんこうせい}のソラがやってきた。"

      - type: narration
        text: "ソラは{静|しず}かで、{自分|じぶん}からはあまり{話|はな}さない。1か月たっても{友|とも}だちが{増|ふ}えず、{毎朝|まいあさ}つらそうに{登校|とうこう}している。"

      - type: bgm
        action: stop

      - type: narration
        text: "ある日の{朝|あさ}——"
        speed: slow

      - type: sprite
        character: sensei
        expression: surprised
        position: center

      - type: bgm
        track: tension-quiet

      - type: dialog
        character: sensei
        text: "ソラの{机|つくえ}の{中|なか}に、{手紙|てがみ}が{入|はい}っていた。"
        expression: surprised

      - type: dialog
        character: sensei
        text: "『もう{学校|がっこう}{来|こ}なくていいよ』——これは{何|なん}だろう。これは……いじめですか？"
        expression: worried

      - type: dialog
        character: sensei
        text: "書いた人、{知|し}っている人はいますか？"
        expression: determined

      - type: sprite
        character: sensei
        action: hide

      - type: sprite_group
        characters:
          - id: haruka
            expression: worried
          - id: yuuma
            expression: thinking
          - id: misaki
            expression: worried
          - id: ryou
            expression: surprised

      - type: narration
        text: "4人とも、だまっている——"
        speed: slow

      - type: sprite
        character: haruka
        action: hide
      - type: sprite
        character: yuuma
        action: hide
      - type: sprite
        character: misaki
        action: hide
      - type: sprite
        character: ryou
        action: hide

      - type: effect
        name: fade-out

      - type: title_card
        text: "答えのない法廷 Vol.9"
        subtitle: "机の中の手紙と4つのことば"

  # ========================================
  # 証拠カード1: 手紙の全文
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "ステップ1：調査"

      - type: narration
        text: "{手紙|てがみ}の{全文|ぜんぶん}を{読|よ}んでみよう。"

      - type: narration
        text: "『ソラへ。\nもう{学校|がっこう}{来|こ}なくていいよ。\n{毎朝|まいあさ}つらそうだから。\nむりしないでね。』"
        speed: slow

      - type: narration
        text: "{名前|なまえ}は書かれていない。{丸|まる}い{字|じ}で、ていねいに書かれている。"

      - type: narration
        text: "この{手紙|てがみ}は『{来|く}るな』と{言|い}っている？ それとも『{無理|むり}しなくていいよ』と言っている？ {同|おな}じ{言葉|ことば}でも、{読|よ}む人によって{受|う}け{取|と}り{方|かた}が{違|ちが}うことがある。"

  # ========================================
  # 証拠カード2: タイムライン
  # ========================================
  - id: evidence-2
    steps:
      - type: narration
        text: "この1{週間|しゅうかん}に何があったか、{時間|じかん}{順|じゅん}に{並|なら}べてみよう。"

      - type: narration
        text: "{水曜日|すいようび}：リョウが『ソラにやさしくしよう{運動|うんどう}』を{提案|ていあん}。クラスで{決定|けってい}。\n{木曜日|もくようび}：{当番|とうばん}の{班|はん}がソラに{声|こえ}をかけ{始|はじ}める。ソラは少し{笑|わら}っていた。"

      - type: narration
        text: "{金曜日|きんようび}の{昼|ひる}：当番の子が『{一緒|いっしょ}に{遊|あそ}ぼう！』→ソラは『いい……』と{断|ことわ}った。\n金曜日の{放課後|ほうかご}：ある{生徒|せいと}がソラの{机|つくえ}に{手紙|てがみ}を{入|い}れた。"

      - type: narration
        text: "金曜日の{帰|かえ}り：ソラが{校門|こうもん}の{前|まえ}で{泣|な}いていた（リョウが{目撃|もくげき}）。\n{月曜日|げつようび}：ソラが{学校|がっこう}を{休|やす}んだ。\n{火曜日|かようび}の{朝|あさ}：ユウマが手紙を{発見|はっけん}→ノゾミ先生に{報告|ほうこく}。"

      - type: narration
        text: "ソラが{泣|な}いたのは{金曜日|きんようび}。手紙が書かれたのも金曜日。手紙がソラを泣かせた？ それとも{別|べつ}の{理由|りゆう}がある？"

  # ========================================
  # 証拠カード3: やさしくしよう運動
  # ========================================
  - id: evidence-3
    steps:
      - type: narration
        text: "{教室|きょうしつ}の{掲示板|けいじばん}にポスターが{貼|は}られている。"

      - type: narration
        text: "『★ ソラにやさしくしよう！ ★\n・ソラに{声|こえ}をかけよう\n・{一緒|いっしょ}にごはんを{食|た}べよう\n・ソラを1人にしない\nみんなでソラの{味方|みかた}になろう！\nリョウ』"

      - type: narration
        text: "このポスターを見て、ソラはどう{思|おも}うだろう？ 『うれしい』？ 『{恥|は}ずかしい』？ 『{自分|じぶん}は{助|たす}けてもらわないといけない人なんだ』？"

  # ========================================
  # 証拠カード4: 当番表
  # ========================================
  - id: evidence-4
    steps:
      - type: narration
        text: "リョウが作った『ソラに{声|こえ}をかけ{当番|とうばん}』の{表|ひょう}。"

      - type: narration
        text: "{月|げつ}：1{班|はん}（{朝|あさ}のあいさつ）\n{火|か}：2班（{給食|きゅうしょく}を{一緒|いっしょ}に）\n{水|すい}：3班（{休|やす}み{時間|じかん}に{声|こえ}かけ）\n{木|もく}：4班（{帰|かえ}りにバイバイ）\n{金|きん}：5班（{掃除|そうじ}を{一緒|いっしょ}に）"

      - type: se
        sound: discover

      - type: narration
        text: "リョウの{追記|ついき}：『※ソラが{嫌|いや}がったら{無理|むり}しない。でもできるだけ{声|こえ}をかけよう！』"

      - type: narration
        text: "この{当番表|とうばんひょう}は『やさしさ』？ それとも『おせっかい』？ もしソラがこの{表|ひょう}を見たら——『{当番|とうばん}で{話|はな}しかけられている』と{思|おも}うかもしれない。"

  # ========================================
  # 質問フェーズ
  # ========================================
  - id: questions
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "ステップ2：考えよう"
      - type: effect
        name: fade-in

      - type: choice
        id: q1
        question: "この{手紙|てがみ}は『いじめ』？"
        feedback_default: "{同|おな}じ{言葉|ことば}でも、書いた人の{気持|きも}ちと{読|よ}んだ人の{気持|きも}ちは{違|ちが}うことがある。{大事|だいじ}なのは『なぜそう{読|よ}めるか』を{考|かんが}えること。"
        options:
          - text: "いじめだ。『{来|く}るな』と{言|い}っている"
            value: bullying
          - text: "いじめじゃない。『{無理|むり}しないで』と{言|い}っている"
            value: caring
          - text: "{分|わ}からない。書いた人に{聞|き}かないと{判断|はんだん}できない"
            value: need-context

      - type: choice
        id: q2
        question: "ユウマが{手紙|てがみ}を先生に{見|み}せたのは{正|ただ}しい？"
        feedback_default: "いじめかもしれないと{思|おも}って{報告|ほうこく}する——{大人|おとな}に{伝|つた}えること{自体|じたい}は{大切|たいせつ}。でも、もう少し{確認|かくにん}する{方法|ほうほう}もあったかもしれない。"
        options:
          - text: "{正|ただ}しい。いじめかもしれないなら{報告|ほうこく}すべき"
            value: correct
          - text: "まず書いた人を{探|さが}して{聞|き}くべきだった"
            value: should-ask
          - text: "{場合|ばあい}による。これが{本当|ほんとう}のいじめだったら{報告|ほうこく}は{正解|せいかい}"
            value: depends

      - type: choice
        id: q3
        question: "『やさしくしよう{運動|うんどう}』は{良|よ}いこと？"
        feedback_default: "『{助|たす}けたい』{気持|きもち}は{本物|ほんもの}。でも『{助|たす}けてあげる』と『{一緒|いっしょ}にいる』は{違|ちが}う。{相手|あいて}がどう{感|かん}じるかを{考|かんが}えることが{大事|だいじ}。"
        options:
          - text: "{良|よ}いこと。みんなで{助|たす}けようとした"
            value: good
          - text: "おせっかい。ソラに{聞|き}かずにやった"
            value: meddling
          - text: "{気持|きもち}は{良|よ}いけど、やり{方|かた}が{間違|まちが}っている"
            value: good-intent-bad-method

  # ========================================
  # ソラの手紙（立場交換フェーズ）
  # ========================================
  - id: sora-letter
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "ソラからの手紙"
      - type: effect
        name: fade-in

      - type: sprite
        character: sensei
        expression: normal
        position: center

      - type: dialog
        character: sensei
        text: "ソラに{電話|でんわ}をしたところ、{手紙|てがみ}を{預|あず}かりました。みんなに{読|よ}ませてほしいそうです。"
        expression: normal

      - type: sprite
        character: sensei
        action: hide

      - type: narration
        text: "『ノゾミ先生へ\n{学校|がっこう}を{休|やす}んでごめんなさい。\nぼくは{前|まえ}の{学校|がっこう}でいじめられてました。\nだから{新|あたら}しい学校が{怖|こわ}かったです。』"
        speed: slow

      - type: narration
        text: "『でも、この学校には{怖|こわ}い人はいませんでした。\nみんなやさしかったです。{本当|ほんとう}です。』"

      - type: narration
        text: "『でも——\n「やさしくしよう{運動|うんどう}」が{始|はじ}まってから、{前|まえ}の学校と{同|おな}じ{気持|きもち}になりました。\n{当番|とうばん}で{話|はな}しかけてくるのが{分|わ}かりました。\n「かわいそうな子」になったんだなと{思|おも}いました。』"
        speed: slow

      - type: effect
        name: flash

      - type: narration
        text: "『{机|つくえ}の{手紙|てがみ}は{読|よ}みました。「{来|こ}なくていいよ」って書いてあったけど、ぼくは{怒|おこ}ってません。だって、あの手紙を書いた人は、ぼくが{毎朝|まいあさ}つらそうなのに{気|き}づいてくれた人だから。』"
        speed: slow

      - type: narration
        text: "『ぼくが{本当|ほんとう}にほしかったのは、「{当番|とうばん}」じゃなくて「ふつう」です。{特別|とくべつ}あつかいしないで、ふつうに{話|はな}しかけてほしかった。「{何|なに}してるの？」って、ふつうに{聞|き}いてほしかった。\n\n{明日|あした}は学校に{行|い}きます。\nソラ』"
        speed: slow

  # ========================================
  # 真相 — 4人の善意
  # ========================================
  - id: truth
    bg: classroom
    steps:
      - type: sprite
        character: haruka
        expression: worried
        position: left

      - type: dialog
        character: haruka
        text: "……あの{手紙|てがみ}、{私|わたし}が書いたの。ソラが{毎朝|まいあさ}つらそうだったから、『{無理|むり}しなくていいよ』って{伝|つた}えたかった。でも{直接|ちょくせつ}{言|い}う{勇気|ゆうき}がなくて……。"
        expression: worried

      - type: dialog
        character: haruka
        text: "『{来|こ}なくていいよ』って書いたのは、『{来|く}るな』って{意味|いみ}じゃなかったの。でも、そう{読|よ}めちゃうよね……。{言葉|ことば}って、{難|むずか}しい。"
        expression: thinking

      - type: sprite
        character: haruka
        action: hide

      - type: sprite
        character: yuuma
        expression: thinking
        position: right

      - type: dialog
        character: yuuma
        text: "{僕|ぼく}が{手紙|てがみ}を見つけて先生に{見|み}せたんだ。『いじめだ』と{思|おも}ったから。でも……ハルカの{気持|きもち}を{知|し}らなかった。{確認|かくにん}もしなかった。"
        expression: worried

      - type: sprite
        character: yuuma
        action: hide

      - type: sprite
        character: misaki
        expression: worried
        position: left

      - type: dialog
        character: misaki
        text: "ソラから{聞|き}いていたの。{前|まえ}の学校でいじめられていたって。でも『{誰|だれ}にも{言|い}わないで』って{言|い}われて……{約束|やくそく}を{守|まも}らなきゃって。"
        expression: worried

      - type: dialog
        character: misaki
        text: "でも、{黙|だま}っていたせいで、ソラはもっとつらくなったのかもしれない……。"
        expression: thinking

      - type: sprite
        character: misaki
        action: hide

      - type: sprite
        character: ryou
        expression: worried
        position: right

      - type: dialog
        character: ryou
        text: "『やさしくしよう{運動|うんどう}』、{僕|ぼく}が{始|はじ}めたんだ。ソラが1人でいるのが{心配|しんぱい}で。みんなで{声|こえ}をかければ{楽|らく}になると{思|おも}った。"
        expression: worried

      - type: dialog
        character: ryou
        text: "でもソラにとっては——『{当番|とうばん}で{話|はな}しかけられている』のが{一番|いちばん}つらかった。{僕|ぼく}、ソラに{聞|き}いてなかった。『何してほしい？』って。"
        expression: thinking

      - type: sprite
        character: ryou
        action: hide

      - type: narration
        text: "4人とも、ソラのことを{思|おも}って{行動|こうどう}した。でも4人とも、ソラに『どうしてほしい？』と{聞|き}かなかった。"
        speed: slow

  # ========================================
  # 最後の問い
  # ========================================
  - id: final-question
    steps:
      - type: choice
        id: q4
        question: "ソラが{一番|いちばん}うれしかった{行動|こうどう}は{誰|だれ}の？"
        feedback_default: "ソラは{手紙|てがみ}を書いた人のことを『つらそうなのに{気|き}づいてくれた人』と{言|い}っている。でも、4人それぞれの{行動|こうどう}にも{理由|りゆう}がある。"
        options:
          - text: "ハルカ（{気|き}づいてくれた）"
            value: haruka
          - text: "ユウマ（{大人|おとな}に{伝|つた}えた）"
            value: yuuma
          - text: "ミサキ（{秘密|ひみつ}を{守|まも}った）"
            value: misaki
          - text: "リョウ（みんなを{動|うご}かした）"
            value: ryou
          - text: "{誰|だれ}が一番とは{言|い}えない"
            value: none

      - type: choice
        id: q5
        question: "{相手|あいて}を{分|わ}かろうとするとき、{一番|いちばん}{大事|だいじ}なことは何？"
        feedback_default: "『してあげる』の{前|まえ}に『どうしてほしい？』と{聞|き}く。それが{相手|あいて}を{分|わ}かろうとする{最初|さいしょ}の{一歩|いっぽ}なんだ。"
        options:
          - text: "まず{聞|き}くこと。『どうしてほしい？』と"
            value: listen
          - text: "{行動|こうどう}すること。何かしてあげること"
            value: act
          - text: "見{守|まも}ること。そっとしておくこと"
            value: watch
          - text: "{全部|ぜんぶ}{大事|だいじ}。{相手|あいて}によって{変|か}わる"
            value: all

  # ========================================
  # エピローグ
  # ========================================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: normal
        position: center

      - type: dialog
        character: sensei
        text: "この{事件|じけん}には、{犯人|はんにん}はいません。4人とも、ソラのことを{思|おも}って{行動|こうどう}しました。でも4人とも、ソラに『どうしてほしい？』と{聞|き}かなかった。"
        expression: normal

      - type: dialog
        character: sensei
        text: "『やさしさ』って、{自分|じぶん}が思う『やさしさ』を{押|お}しつけることじゃない。{相手|あいて}が何を{望|のぞ}んでいるか、まず{聞|き}くこと。"
        expression: thinking

      - type: dialog
        character: sensei
        text: "ソラがほしかったのは——『ふつう』だった。{特別|とくべつ}あつかいでも、{当番|とうばん}のやさしさでもなく。ただ、ふつうに{話|はな}しかけてもらうこと。"
        expression: normal

      - type: dialog
        character: sensei
        text: "『{分|わ}かろうとする』の{最初|さいしょ}の{一歩|いっぽ}は——{聞|き}くこと。{相手|あいて}の{言葉|ことば}に、{耳|みみ}を{傾|かたむ}けること。"
        expression: happy

      - type: sprite
        character: sensei
        action: hide

      - type: narration
        text: "ソラは{明日|あした}、{学校|がっこう}に来る。今度こそ——『ふつう』に。"

      - type: narration
        text: "——それが、4つのことばが{教|おし}えてくれたこと。"

      - type: effect
        name: fade-out
