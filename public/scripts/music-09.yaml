scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{音楽祭|おんがくさい}のステージリハーサルが{今日|きょう}の{放課後|ほうかご}に{迫|せま}っている。ハーモニーズは{今回|こんかい}{初|はじ}めて「{指揮者|しきしゃ}」を{立|た}てて{合奏|がっそう}する。{指揮者|しきしゃ}{役|やく}は**カオリ**。"
      - type: narration
        text: "ところがリハーサル30{分|ぷん}{前|まえ}——**カオリの{指揮棒|しきぼう}が{行方|ゆくえ}{不明|ふめい}**に。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "さらに{気|き}になることが。{過去|かこ}3{回|かい}の{練習|れんしゅう}{記録|きろく}を{見返|みかえ}すと、**カオリが{指揮|しき}するたびに{合奏|がっそう}が{悪|わる}くなっている**。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{指揮者|しきしゃ}は{合奏|がっそう}の{司令塔|しれいとう}。テンポを{決|き}め、{入|はい}りの{合図|あいず}を{出|だ}し、{強弱|きょうじゃく}を{指示|しじ}する。{全体|ぜんたい}を{見|み}る{唯一|ゆいいつ}の{人|ひと}よ。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{今日|きょう}の{大事|だいじ}なスキル——{帰納法|きのうほう}。{複数|ふくすう}のデータからパターン（{法則|ほうそく}）を{見|み}つけ{出|だ}す{力|ちから}。3{回|かい}の{練習|れんしゅう}{記録|きろく}を{比|くら}べて、{法則|ほうそく}を{見|み}つけよう。
      - type: effect
        name: fade-out
      - type: title_card
        text: 指揮者の視線
        subtitle: 音楽探偵団 Vol.9

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 3回の練習記録を比較しよう
      - type: narration
        text: "{過去|かこ}3{回|かい}の{練習|れんしゅう}{記録|きろく}——"
      - type: narration
        text: "{第|だい}1{回|かい}（1{週間|しゅうかん}{前|まえ}）: {指揮|しき}カオリ → テンポ△ {入|はい}り△ {強弱|きょうじゃく}○ → **{評価|ひょうか}C**"
      - type: narration
        text: "{第|だい}2{回|かい}（4{日|にち}{前|まえ}）: {指揮|しき}ヒビキ（{代理|だいり}）→ テンポ◎ {入|はい}り◎ {強弱|きょうじゃく}◎ → **{評価|ひょうか}A**"
      - type: narration
        text: "{第|だい}3{回|かい}（{昨日|きのう}）: {指揮|しき}カオリ → テンポ× {入|はい}り× {強弱|きょうじゃく}△ → **{評価|ひょうか}D**"
      - type: narration
        text: "3{回|かい}のデータを{並|なら}べて、パターンを{見|み}つけよう。「{帰納|きのう}」——{複数|ふくすう}のデータから{法則|ほうそく}を{見|み}つける{力|ちから}。"
      - type: narration
        text: "{帰納|きのう}{結果|けっか}1: 「カオリが{指揮|しき}すると{評価|ひょうか}が{低|ひく}い」。{帰納|きのう}{結果|けっか}2: 「{練習|れんしゅう}するほど{上手|うま}くなるはず → なのにカオリの{指揮|しき}は{悪化|あっか}（C→D）」。{不自然|ふしぜん}！

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 指揮棒と出入りノート
      - type: narration
        text: カオリの{指揮棒|しきぼう}——{白|しろ}い{木製|もくせい}。{昨日|きのう}の{第|だい}3{回|かい}{練習|れんしゅう}で{使|つか}った。{練習後|れんしゅうご}、カオリが「{片付|かたづ}ける」と{言|い}った。{今朝|けさ}どこにもない。**{準備室|じゅんびしつ}は{未確認|みかくにん}**。
      - type: narration
        text: "{出入|でい}りノート——16:05ヒビキ・ソウタ{退室|たいしつ}。16:10コトネ{退室|たいしつ}。**16:20カオリ{退室|たいしつ}（{最後|さいご}）**。"
      - type: narration
        text: "{練習|れんしゅう}するほど{悪化|あっか}するのは{不自然|ふしぜん}。「{下手|へた}だから{悪|わる}い」のか「わざと{悪|わる}くしている」のか？
      - type: sprite
        character: hibiki
        expression: thinking
        position: left
      - type: dialog
        character: hibiki
        text: "{第|だい}3{回|かい}でカオリの{指揮|しき}を{見|み}てたんだけど、{入|はい}りの{合図|あいず}が{来|く}るのが{遅|おそ}かった。{僕|ぼく}が{自分|じぶん}で{判断|はんだん}して{入|はい}ったシーンが2〜3{回|かい}。それと{昨日|きのう}、カオリに『{明日|あした}のリハーサル{大丈夫|だいじょうぶ}？』って{聞|き}いたら、{笑顔|えがお}で『{大丈夫|だいじょうぶ}！』って{答|こた}えたけど……**{目|め}が{笑|わら}っていなかった**。"
        expression: worried
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: kotone
        expression: worried
        position: right
      - type: dialog
        character: kotone
        text: "カオリ、{指揮者|しきしゃ}に{選|えら}ばれた{後|あと}、{少|すこ}しずつ{表情|ひょうじょう}が{暗|くら}くなってた。「プレッシャーがすごい」って{小声|こごえ}で{言|い}ってたし、「わたしの{指揮|しき}でみんなに{迷惑|めいわく}かけてないかな？」って{聞|き}いてきたの。"
        expression: worried
      - type: sprite
        character: kotone
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: ソウタの詳細分析
      - type: effect
        name: fade-in
      - type: sprite
        character: souta
        expression: determined
        position: left
      - type: dialog
        character: souta
        text: "3{回|かい}{分|ぶん}のデータを{細|こま}かく{分析|ぶんせき}した。{第|だい}1{回|かい}はテンポのズレ±5%、{入|はい}りの{遅|おく}れ0.2{秒|びょう}。{硬|かた}いけど{一生懸命|いっしょうけんめい}。"
        expression: determined
      - type: dialog
        character: souta
        text: "{第|だい}3{回|かい}はテンポ±15%、{入|はい}り{遅|おく}れ0.8{秒|びょう}。3{倍|ばい}に{悪化|あっか}。しかも{指揮|しき}の{振|ふ}り{方|かた}が**わざと{小|ちい}さくしていた**ように{見|み}える。"
        expression: thinking
      - type: sprite
        character: souta
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "{第|だい}1{回|かい}は「{硬|かた}いが{一生懸命|いっしょうけんめい}」→ {下手|へた}だが{頑張|がんば}っている。{第|だい}3{回|かい}は「わざと{小|ちい}さく{振|ふ}っていた」→ **{意図的|いとてき}に{失敗|しっぱい}させている**。
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "**カオリは{指揮|しき}ができないのではない。わざと{失敗|しっぱい}させている。**"
      - type: narration
        text: "カオリがわざと{指揮|しき}を{悪|わる}くした + {指揮棒|しきぼう}を{隠|かく}した ＝ **カオリは{指揮者|しきしゃ}を{降|お}りたかった**？"
      - type: narration
        text: "なぜ{自分|じぶん}から「やめたい」と{言|い}わなかった？ {指揮者|しきしゃ}の「{責任|せきにん}」が{重|おも}すぎた？ 「やめたい」と{言|い}えない{人|ひと}が{取|と}る{行動|こうどう}は？"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: narration
        text: "{証拠|しょうこ}をまとめよう。3{回|かい}のデータから「カオリ{指揮|しき}＝{悪化|あっか}」のパターン（{帰納|きのう}）。{第|だい}3{回|かい}は「わざと」。{指揮棒|しきぼう}が{消|き}えた。{最後|さいご}に{残|のこ}ったのはカオリ。プレッシャーに{苦|くる}しんでいた。"
      - type: choice
        id: q1
        question: 指揮棒を隠し、練習をわざと悪くした犯人は？
        options:
          - text: カオリ（指揮者自身。プレッシャーで降りたかった）
            value: kaori
            correct: true
            feedback: "{正解|せいかい}！ カオリは{指揮者|しきしゃ}のプレッシャーに{押|お}しつぶされそうだった。{自分|じぶん}から「やめたい」と{言|い}えず、わざと{失敗|しっぱい}して「{交代|こうたい}しよう」と{言|い}ってもらおうとした。"
          - text: ヒビキ（第2回で代理指揮をした人）
            value: hibiki
            feedback: "ヒビキは{代理|だいり}{指揮|しき}でA{評価|ひょうか}だったけど、カオリの{交代|こうたい}を{望|のぞ}んでいたわけじゃない。「{大丈夫|だいじょうぶ}？」と{心配|しんぱい}していた{側|がわ}だよ。"
          - text: ソウタ（データ分析をした人）
            value: souta
            feedback: "ソウタは{分析|ぶんせき}で「わざとだ」と{気|き}づいた{側|がわ}。16:05に{帰|かえ}っていて{指揮棒|しきぼう}を{隠|かく}す{機会|きかい}がないよ。"
          - text: コトネ（カオリのプレッシャーを知っていた人）
            value: kotone
            feedback: "コトネはカオリの{気持|きも}ちに{気|き}づいていた{側|がわ}。16:10に{帰|かえ}っていて{機会|きかい}がないね。"

  # ==================== 真実：カオリ ====================
  - id: truth-kaori
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: カオリの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: kaori
        expression: worried
        position: center
      - type: dialog
        character: kaori
        text: "……ごめんなさい。{指揮棒|しきぼう}を{隠|かく}したのも、わざと{指揮|しき}を{失敗|しっぱい}させたのも、わたしです。"
        expression: worried
      - type: dialog
        character: kaori
        text: "{指揮者|しきしゃ}に{選|えら}ばれたとき、{最初|さいしょ}は{嬉|うれ}しかった。でも{練習|れんしゅう}を{重|かさ}ねるうちにプレッシャーが{大|おお}きくなって。「わたしの{指揮|しき}でみんなの{演奏|えんそう}が{台無|だいな}しになったらどうしよう」って。"
        expression: thinking
      - type: dialog
        character: kaori
        text: "でも「やめたい」とは{言|い}えなかった。{無責任|むせきにん}だって{思|おも}われる。だから……わざと{失敗|しっぱい}して、{誰|だれ}かに「{交代|こうたい}しよう」って{言|い}ってもらいたかった。"
        expression: worried
      - type: dialog
        character: kaori
        text: "{指揮棒|しきぼう}も{準備室|じゅんびしつ}の{棚|たな}の{奥|おく}に{隠|かく}した。{指揮棒|しきぼう}がなければリハーサルできない。{指揮者|しきしゃ}{交代|こうたい}になるかもって……ごめんなさい。"
        expression: worried
      - type: sprite
        character: kaori
        action: hide

  # ==================== 真実：他のメンバー ====================
  - id: truth-others
    bg: classroom
    steps:
      - type: sprite
        character: hibiki
        expression: worried
        position: left
      - type: dialog
        character: hibiki
        text: "カオリ……「{大丈夫|だいじょうぶ}」って{言|い}ったとき、{目|め}が{笑|わら}ってなかった。あのとき{気|き}づくべきだった。"
        expression: worried
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: kotone
        expression: determined
        position: right
      - type: dialog
        character: kotone
        text: "プレッシャーに{苦|くる}しんでたんだね。「{助|たす}けて」って{言|い}ってくれればよかったのに。みんなで{一緒|いっしょ}に{乗|の}り{越|こ}えられたのに。"
        expression: determined
      - type: sprite
        character: kotone
        action: hide
      - type: sprite
        character: souta
        expression: thinking
        position: left
      - type: dialog
        character: souta
        text: "3{回|かい}のデータから「{悪化|あっか}パターン」を{見|み}つけた。でも「{下手|へた}」と「わざと」はデータだけでは{区別|くべつ}できない。「なぜ{悪化|あっか}したか」まで{考|かんが}えて{初|はじ}めて{真実|しんじつ}が{見|み}えた。"
        expression: thinking
      - type: sprite
        character: souta
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "{責任感|せきにんかん}が{強|つよ}い{人|ひと}ほど「{助|たす}けて」と{言|い}えなくなることがあるの。カオリは1{人|り}で{抱|かか}え{込|こ}んでしまった。でもみんながいるから、{一緒|いっしょ}に{乗|の}り{越|こ}えられるのよ。"
        expression: happy
      - type: dialog
        character: yamada
        text: "{今日|きょう}は{帰納法|きのうほう}を{使|つか}ったわね。3{回|かい}のデータから{法則|ほうそく}を{見|み}つけ、さらに{法則|ほうそく}の{裏|うら}にある{真|しん}の{原因|げんいん}まで{突|つ}き{止|と}めた。データが{示|しめ}すパターンと、{本当|ほんとう}の{原因|げんいん}は{同|おな}じとは{限|かぎ}らない。これが{帰納法|きのうほう}の{力|ちから}であり、{限界|げんかい}でもあるわ。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{苦手|にがて}なことを{認|みと}めるのは{恥|はず}ずかしい。「やめたい」と{言|い}うのは{怖|こわ}い。でも、{隠|かく}すよりも「{助|たす}けて」と{言|い}える{方|ほう}が、ずっと{勇気|ゆうき}がいる。
      - type: narration
        text: {帰納法|きのうほう}——{複数|ふくすう}のデータから{法則|ほうそく}を{見|み}つける{力|ちから}。でもパターンだけでなく「なぜ」まで{考|かんが}えることが{大切|たいせつ}。
      - type: effect
        name: fade-out
