scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: library
    bgm: daily-life
    steps:
      - type: narration
        text: "5{年|ねん}2{組|くみ}では{来週|らいしゅう}、「{おすすめの本|おすすめのほん}を{紹介|しょうかい}しよう」プレゼン{大会|たいかい}がある。"
      - type: sprite
        character: rogu
        expression: worried
        position: center
      - type: dialog
        character: rogu
        text: "{学級|がっきゅう}{図書|としょ}のレビューサイトで{星|ほし}5つが{山盛|やまも}りの{本|ほん}を{見|み}つけた。「{みんなが星|みんながほし}5をつけてるから{面白|おもしろ}いはず！」——{意気揚々|いきようよう}と{読|よ}んでみたら……"
        expression: worried
      - type: se
        sound: paper
      - type: dialog
        character: rogu
        text: "……{全然|ぜんぜん}{面白|おもしろ}くない。どのページをめくっても、ピンとこない。{星|ほし}5がいっぱいあるのに、なんで？"
        expression: surprised
      - type: sprite
        character: rogu
        action: hide
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "ログはレビューをもう{一度|いちど}{見直|みなお}した。すると——{星|ほし}5のレビューが、{特定|とくてい}の1{日|にち}に{大量|たいりょう}に{投稿|とうこう}されていた。しかも{文章|ぶんしょう}がどれも{似|に}ている。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "このレビューサイト、{何|なに}かがおかしいわ。{誰|だれ}かが{偽|にせ}レビューを{大量|たいりょう}に{書|か}いたのかもしれない。ネット{探偵団|たんていだん}に{調査|ちょうさ}をお{願|ねが}いしたいの。"
        expression: worried
      - type: dialog
        character: yamada
        text: "レビューを{操作|そうさ}したのは{誰|だれ}なのか——{証拠|しょうこ}を{集|あつ}めて{真相|しんそう}を{解|と}き{明|あか}かしてください。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: netto
            expression: thinking
          - character: pasu
            expression: thinking
          - character: rogu
            expression: worried
          - character: gado
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。「{星|ほし}5＝{良|よ}い{本|ほん}」——その{思|おも}い{込|こ}みが{事件|じけん}のはじまりだった。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 星5つのうそ
        subtitle: ネット探偵団 Vol.8

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: library
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: レビューの正体を調べる
      - type: narration
        text: "{学級|がっきゅう}{図書|としょ}のレビューサイト——{対象|たいしょう}の{本|ほん}のページには{星|ほし}5のレビューが15{件|けん}{並|なら}んでいる。「{面白|おもしろ}い！」「おすすめ！」「{最高|さいこう}！」——{短|みじか}い{文章|ぶんしょう}が{続|つづ}く。"
      - type: evidence
        id: card-1
        title: レビューサイトの画面＋ログの証言
        content: "{対象|たいしょう}の{本|ほん}に{星|ほし}5のレビューが15{件|けん}。ログの{証言|しょうげん}:「{星|ほし}5がたくさんあるから{選|えら}んだのに、{読|よ}んだら{全然|ぜんぜん}{面白|おもしろ}くなかった」。{矛盾|むじゅん}: {高評価|こうひょうか}なのに{面白|おもしろ}くない。{本当|ほんとう}にこのレビューは{本物|ほんもの}なのか？"
      - type: sprite
        character: rogu
        expression: worried
        position: left
      - type: dialog
        character: rogu
        text: "{先生|せんせい}の{言|い}う{通|とお}り……{星|ほし}5がいっぱいあるのに{読|よ}んでみたら{全然|ぜんぜん}ダメだった。レビューって{信用|しんよう}できないの？"
        expression: worried
      - type: sprite
        character: rogu
        action: hide
      - type: narration
        text: "{偽|にせ}レビューには{見分|みわ}け{方|かた}がある——①{投稿日|とうこうび}の{偏|かたよ}り ②{文章|ぶんしょう}の{類似性|るいじせい} ③レビュアーの{投稿歴|とうこうれき} ④{極端|きょくたん}な{評価|ひょうか}の{割合|わりあい}。この4つのチェックポイントを{使|つか}えば{見|み}つけられる。"
      - type: evidence
        id: card-2
        title: 偽レビューの見分け方カード
        content: "①{投稿日|とうこうび}の{偏|かたよ}り——{短|みじか}い{期間|きかん}にレビューが{集中|しゅうちゅう}していないか。②{文章|ぶんしょう}の{類似性|るいじせい}——{同|おな}じような{言葉|ことば}のパターンが{繰|く}り{返|かえ}されていないか。③レビュアーの{投稿歴|とうこうれき}——「この{本|ほん}にしかレビューを{書|か}いていない」アカウントが{多|おお}くないか。④{極端|きょくたん}な{評価|ひょうか}——{星|ほし}5か{星|ほし}1だけで{星|ほし}2〜4がほとんどない。"
      - type: sprite
        character: netto
        expression: thinking
        position: right
      - type: dialog
        character: netto
        text: "チェックポイントが{分|わ}かれば{調|しら}べられる！　まずは{投稿日|とうこうび}の{偏|かたよ}りから{確認|かくにん}してみよう。"
        expression: determined
      - type: sprite
        character: netto
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: library
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 投稿パターンと文章を分析する
      - type: sprite
        character: netto
        expression: surprised
        position: left
      - type: dialog
        character: netto
        text: "見て！　15{件|けん}の{星|ほし}5レビューを{投稿日|とうこうび}ごとに{整理|せいり}したら……1{日|にち}だけ{突出|とっしゅつ}してる。{普通|ふつう}は{月|つき}に2〜3{件|けん}なのに、1{日|にち}に15{件|けん}！　これは{絶対|ぜったい}おかしい！"
        expression: determined
      - type: sprite
        character: netto
        action: hide
      - type: evidence
        id: card-3
        title: 投稿日分析＋レビュアーの投稿歴
        content: "{投稿日|とうこうび}{分析|ぶんせき}: 15{件|けん}の{星|ほし}5レビューが1{日|にち}に{集中|しゅうちゅう}（{通常|つうじょう}は{月|つき}2〜3{件|けん}）。レビュアーの{投稿歴|とうこうれき}: 15{件|けん}中12{件|けん}のアカウントが「この{本|ほん}にしかレビューを{書|か}いていない」。→{投稿日|とうこうび}の{集中|しゅうちゅう}＋ほぼ{新規|しんき}アカウント——{偽|にせ}レビューは{確実|かくじつ}。"
      - type: sprite
        character: pasu
        expression: thinking
        position: right
      - type: dialog
        character: pasu
        text: "{投稿日|とうこうび}はクロ確定。じゃあ{文章|ぶんしょう}はどうだろう？ 12{件|けん}のレビューを{比|くら}べてみると——"
        expression: thinking
      - type: sprite
        character: pasu
        action: hide
      - type: sprite
        character: pasu
        expression: surprised
        position: right
      - type: dialog
        character: pasu
        text: "12{件|けん}が「{面白|おもしろ}かった」「おすすめ」「{最高|さいこう}」の3パターンしか{使|つか}ってない！　{残|のこ}り3{件|けん}だけが{具体的|ぐたいてき}な{内容|ないよう}に{触|ふ}れてる。これは1{人|にん}が{複数|ふくすう}アカウントで{書|か}いた{証拠|しょうこ}だよ！"
        expression: determined
      - type: sprite
        character: pasu
        action: hide
      - type: evidence
        id: card-4
        title: レビュー文章の比較表
        content: "{偽|にせ}レビュー12{件|けん}: 「{面白|おもしろ}かった」「おすすめ」「{最高|さいこう}」の3パターンのみ。{本物|ほんもの}のレビュー3{件|けん}: あらすじや{登場人物|とうじょうじんぶつ}への{具体的|ぐたいてき}なコメントあり。→{文章|ぶんしょう}のパターンが{同|おな}じ＝1{人|にん}が{複数|ふくすう}アカウントを{使|つか}って{書|か}いた{可能性|かのうせい}が{高|たか}い。"

  # ==================== 中間点 ====================
  - id: midpoint
    bg: library
    bgm: thinking-time
    steps:
      - type: narration
        text: "{証拠|しょうこ}が{揃|そろ}ってきた。{偽|にせ}レビューは{確実|かくじつ}——1{日|にち}に15{件|けん}が{集中|しゅうちゅう}し、{文章|ぶんしょう}は3パターンしかない。{誰|だれ}かが{複数|ふくすう}アカウントを{使|つか}い、{意図的|いとてき}に{評価|ひょうか}を{操作|そうさ}した。"
      - type: sprite
        character: gado
        expression: worried
        position: left
      - type: dialog
        character: gado
        text: "{偽|にせ}レビューに{騙|だま}されるのって……{恥|は}ずかしいことなのかな。{星|ほし}5がたくさんあれば{信用|しんよう}するよね、{普通|ふつう}は。ログだけじゃなくて、{誰|だれ}でも{引|ひ}っかかると{思|おも}う。"
        expression: worried
      - type: sprite
        character: gado
        action: hide
      - type: sprite
        character: netto
        expression: thinking
        position: right
      - type: dialog
        character: netto
        text: "でも……{誰|だれ}が{書|か}いたんだろう。{学校|がっこう}の{図書|としょ}サイトだよ？ わざわざそんなことをするメリットって——{本|ほん}の{人気|にんき}を{上|あ}げたい{誰|だれ}か……？"
        expression: thinking
      - type: sprite
        character: netto
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: library
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: ログのタブレットの投稿履歴
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "{関係者|かんけいしゃ}の{端末|たんまつ}を{確認|かくにん}したら……{思|おも}いがけないものが{見|み}つかったわ。ログのタブレットの{投稿履歴|とうこうりれき}に、{別|べつ}のアカウントで{別|べつ}の{本|ほん}に{星|ほし}5レビューを5{件|けん}{書|か}いた{記録|きろく}が{残|のこ}っていたの。"
        expression: surprised
      - type: dialog
        character: yamada
        text: "ログに{聞|き}くと「{好|す}きな{本|ほん}をみんなに{読|よ}んでほしかった。レビューが{少|すく}なかったから、{増|ふ}やせばみんなが{読|よ}むと{思|おも}って……」と{言|い}ったわ。でも——ログが{偽|にせ}レビューを{書|か}いた{本|ほん}と、{今回|こんかい}{星|ほし}5で{信|しん}じて{選|えら}んだ{本|ほん}は、{別|べつ}の{本|ほん}だったの。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: evidence
        id: card-5
        title: ログのタブレットの投稿履歴
        content: "{別|べつ}のアカウントで{別|べつ}の{本|ほん}に{星|ほし}5レビューを5{件|けん}{書|か}いた{記録|きろく}。{先生|せんせい}のメモ:「ログは"好きな本をみんなに読んでほしかった"と言った。ログが偽レビューを書いた本と、信じて選んだ偽レビューの本は別——自分で偽レビューを書く側になりながら、別の偽レビューに騙された」。**{偽|にせ}レビューの{被害者|ひがいしゃ}が、{加害者|かがいしゃ}でもあった。**"
      - type: sprite
        character: netto
        expression: surprised
        position: left
      - type: dialog
        character: netto
        text: "え……ログが{偽|にせ}レビューを{書|か}いてたの？！　でも{自分|じぶん}も{別|べつ}の{偽|にせ}レビューに{騙|だま}された……？　{同|おな}じことをしてた{本人|ほんにん}が、{同|おな}じ{被害|ひがい}にあってたって{意味|いみ}……？"
        expression: surprised
      - type: sprite
        character: netto
        action: hide
      - type: se
        sound: reveal
      - type: narration
        text: "**{偽|にせ}レビューの{加害者|かがいしゃ}と{被害者|ひがいしゃ}が{同一人物|どういつじんぶつ}——「{星|ほし}が{多|おお}い＝{信頼|しんらい}できる」という{認知|にんち}バイアスは、{偽|にせ}レビューを{書|か}いた{本人|ほんにん}すら{騙|だま}す。**"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: library
    bgm: confrontation
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 偽レビューの問題で一番大事な原因を作ったのは誰？
      - type: sprite
        character: pasu
        expression: determined
        position: left
      - type: dialog
        character: pasu
        text: "{証拠|しょうこ}を{整理|せいり}しよう。①{投稿日|とうこうび}が1{日|にち}に15{件|けん}{集中|しゅうちゅう}。②12{件|けん}の{文章|ぶんしょう}が3パターンのみ——{複数|ふくすう}アカウントで{同|おな}じ{人物|じんぶつ}が{書|か}いた。③ログのタブレットに{別|べつ}の{本|ほん}への{偽|にせ}レビュー{投稿|とうこう}{記録|きろく}あり。④ログ{自身|じしん}が「{好|す}きな{本|ほん}をみんなに{読|よ}んでほしかった」と{認|みと}めた。"
        expression: determined
      - type: sprite
        character: pasu
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整|ととの}えよう。①{投稿日|とうこうび}の{集中|しゅうちゅう}（1{日|にち}に15{件|けん}）。②{文章|ぶんしょう}の{類似性|るいじせい}（12{件|けん}が3パターン）。③ログのタブレットに{投稿履歴|とうこうりれき}の{記録|きろく}あり。④ログ{自身|じしん}が{偽|にせ}レビューを{書|か}いたことを{認|みと}めた。⑤しかしログは{別|べつ}の{偽|にせ}レビューにも{騙|だま}されていた——{認知|にんち}バイアスの{二重|にじゅう}{構造|こうぞう}。"
      - type: choice
        id: q1
        question: 偽レビューの問題で一番大事な原因を作ったのは誰？
        options:
          - text: ログ（偽レビューに騙されただけでなく、自分も偽レビューを書いていた）
            value: rogu
            correct: true
            feedback: "{正解|せいかい}！　ログは「{好|す}きな{本|ほん}をみんなに{読|よ}んでほしい」という{善意|ぜんい}で{偽|にせ}レビューを{書|か}いた。でも{同|おな}じ{方法|ほうほう}で{別|べつ}の{人|ひと}が{書|か}いた{偽|にせ}レビューに、ログ{自身|じしん}が{騙|だま}された。**「{星|ほし}が{多|おお}い＝{信頼|しんらい}できる」という{思|おも}い{込|こ}みは、{偽|にせ}レビューを{書|か}いた{本人|ほんにん}すら{騙|だま}す。レビューは{数|かず}ではなく、{投稿日|とうこうび}・{文章|ぶんしょう}・レビュアーの{履歴|りれき}で{質|しつ}を{判断|はんだん}しよう。**"
          - text: ネット（投稿パターンの異常を最初に発見した人）
            value: netto
            feedback: "{ネット|ねっと}は{投稿日|とうこうび}の{集中|しゅうちゅう}という{異常|いじょう}を{最初|さいしょ}に{見|み}つけた{側|がわ}。{偽|にせ}レビューを{暴|あば}く{手助|てだす}けをしたよ。"
          - text: パス（文章の類似性を分析した人）
            value: pasu
            feedback: "{パス|ぱす}は{文章|ぶんしょう}の{類似性|るいじせい}から「1{人|にん}が{複数|ふくすう}アカウントで{書|か}いた」と{結論|けつろん}した{側|がわ}。{分析力|ぶんせきりょく}で{事件|じけん}を{解決|かいけつ}に{導|みちび}いたよ。"
          - text: ガード（騙された人の気持ちに寄り添った人）
            value: gado
            feedback: "{ガード|がーど}は「{騙|だま}されるのは{恥|は}ずかしくない」と{被害者|ひがいしゃ}に{寄|よ}り{添|そ}った{側|がわ}。{感情|かんじょう}のフォローが{場|ば}の{雰囲気|ふんいき}を{守|まも}ったよ。"

  # ==================== 真相：ログの告白 ====================
  - id: truth-rogu
    bg: library
    bgm: emotional
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真相
        subtitle: ログの気持ち
      - type: effect
        name: fade-in
      - type: sprite
        character: rogu
        expression: worried
        position: center
      - type: dialog
        character: rogu
        text: "……{本当|ほんとう}のことを{話|はな}します。わたし、{好|す}きな{本|ほん}があって——でもレビューが{少|すく}なくて、{誰|だれ}も{読|よ}んでくれないのが{悲|かな}しかった。"
        expression: worried
      - type: dialog
        character: rogu
        text: "「{レビューを増|れびゅーをふ}やせばみんなが{読|よ}む{はず}」って{思|おも}って……{別|べつ}の{名前|なまえ}で{星|ほし}5のレビューを5つ{書|か}いた。{悪意|あくい}はなかった。ただ、{好|す}きな{本|ほん}をみんなに{知|し}ってほしかっただけで。"
        expression: thinking
