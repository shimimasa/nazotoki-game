scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "タクミの{粘土|ねんど}{彫刻|ちょうこく}「{飛翔|ひしょう}する{鳥|とり}」が{美術展|びじゅつてん}の{審査|しんさ}で**{最優秀賞|さいゆうしゅうしょう}**を{受|う}けた！"
      - type: narration
        text: "ところが{翌朝|よくあさ}、{作品|さくひん}の{一部|いちぶ}（{翼|つばさ}の{先端|せんたん}）が**{微妙|びみょう}に{形|かたち}が{変|か}わっている**ことにサクラが{気|き}づいた。"
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sakura
        expression: surprised
        position: left
      - type: dialog
        character: sakura
        text: "{昨日|きのう}{撮|と}った{写真|しゃしん}と{比|くら}べると、{翼|つばさ}の{先端|せんたん}が{変|か}わっている。それに、{写真|しゃしん}には{翼|つばさ}に{細|ほそ}いヒビが{写|うつ}っているのに、{今朝|けさ}はヒビが{消|き}えてる！"
        expression: determined
      - type: sprite
        character: sakura
        action: hide
      - type: narration
        text: "{粘土|ねんど}は{乾燥|かんそう}した{後|あと}でも**{水|みず}を{加|くわ}えれば{柔|やわ}らかくなり、{形|かたち}を{変|か}えられる**。{誰|だれ}かが{夜|よる}のうちに{修復|しゅうふく}した。"
      - type: narration
        text: "でも{待|ま}って——{粘土|ねんど}は{作者|さくしゃ}が{何百回|なんびゃっかい}も{触|さわ}って{作|つく}った。{作品|さくひん}の{表面|ひょうめん}は**{作者|さくしゃ}の{指紋|しもん}だらけ**。{新|あたら}しい{指紋|しもん}が{見|み}つかっても、{作者|さくしゃ}のものと{区別|くべつ}がつかない。「{指紋|しもん}＝{犯人|はんにん}は{外部|がいぶ}の{人|ひと}」と{決|き}めつけていい？"
      - type: effect
        name: fade-out
      - type: title_card
        text: 粘土の指紋
        subtitle: 美術探偵団 Vol.8

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 写真との比較と侵入経路
      - type: narration
        text: "{審査日|しんさび}の{写真|しゃしん}——{翼|つばさ}の{先端|せんたん}が{鋭|するど}く{尖|とが}っている。{先端|せんたん}に{細|ほそ}いヒビ。{今朝|けさ}の{実物|じつぶつ}——{翼|つばさ}の{先端|せんたん}が{丸|まる}みを{帯|お}びている。ヒビがない。**ヒビが{消|き}えている＝{加水|かすい}して{修復|しゅうふく}した**。"
      - type: narration
        text: "{図工室|ずこうしつ}は{昨日|きのう}16:00に{施錠|せじょう}。でも{昨日|きのう}20:00ごろ、{図工室|ずこうしつ}の{窓|まど}が{開|あ}いていた（{警備員|けいびいん}{報告|ほうこく}）。{窓|まど}の{鍵|かぎ}は{甘|あま}い（{外|そと}から{開|あ}けられる）。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 指紋と4人の行動
      - type: narration
        text: "{修復|しゅうふく}{箇所|かしょ}（{翼|つばさ}の{先端|せんたん}）に{新|あたら}しい{指紋|しもん}がある。でも{粘土|ねんど}の{表面|ひょうめん}はもともと{大量|たいりょう}の{指紋|しもん}だらけ（{制作時|せいさくじ}に{何百回|なんびゃっかい}も{触|さわ}っている）。{新|あたら}しい{指紋|しもん}と{古|ふる}い{指紋|しもん}の**{区別|くべつ}が{難|むずか}しい**。"
      - type: narration
        text: "4{人|にん}の{昨夜|さくや}の{行動|こうどう}（{証言|しょうげん}）——サクラ「{自宅|じたく}で{読書|どくしょ}」。タクミ「{自宅|じたく}にいた。**{特|とく}に{何|なに}もしていない**」。ニジカ「{自宅|じたく}で{絵|え}を{描|か}いていた」。ユウ「{自宅|じたく}で{音楽|おんがく}を{聴|き}いていた」。"
      - type: narration
        text: "{全員|ぜんいん}が「{行|い}っていない」。でも{窓|まど}が20:00に{開|あ}いていた。{誰|だれ}かが{嘘|うそ}をついている。タクミの「{特|とく}に{何|なに}もしていない」——{具体性|ぐたいせい}がない。{何|なに}をしていたか{語|かた}っていない。"
      - type: sprite
        character: nijika
        expression: thinking
        position: right
      - type: dialog
        character: nijika
        text: "{審査後|しんさご}、タクミが{作品|さくひん}を**じっと{見|み}つめて{眉|まゆ}をひそめていた**{瞬間|しゅんかん}があったんだ。「すごいね！」って{声|こえ}をかけたら「ありがとう。でもちょっと{気|き}になるところが……」って{言|い}いかけてやめた。"
        expression: thinking
      - type: sprite
        character: nijika
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 認知バイアスの転換
      - type: effect
        name: fade-in
      - type: narration
        text: "{最初|さいしょ}の{推理|すいり}: 「{指紋|しもん}がある → {他人|たにん}が{触|さわ}った → {犯人|はんにん}は{外部|がいぶ}の{人|ひと}」"
      - type: narration
        text: "**でも{待|ま}って。**"
      - type: se
        sound: discover
      - type: narration
        text: "{指紋|しもん}は{誰|だれ}のもの？ → **{作者|さくしゃ}（タクミ）のものと{区別|くべつ}がつかない**。"
      - type: narration
        text: "ヒビに{気|き}づけるのは{誰|だれ}？ → **{作者|さくしゃ}（タクミ）が{一番|いちばん}よく{知|し}っている**。"
      - type: narration
        text: "{修復|しゅうふく}する{動機|どうき}があるのは？ → **{最優秀賞|さいゆうしゅうしょう}を{守|まも}りたいタクミ**。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "**「{指紋|しもん}＝{外部|がいぶ}の{犯人|はんにん}」は{思|おも}い{込|こ}み（{認知|にんち}バイアス）だった。{指紋|しもん}は{作者|さくしゃ}{自身|じしん}のもの。タクミが{自分|じぶん}の{作品|さくひん}のヒビを{見|み}つけ、{最優秀賞|さいゆうしゅうしょう}を{守|まも}るために{自分|じぶん}で{修復|しゅうふく}した。**"
      - type: sprite
        character: yuu
        expression: determined
        position: left
      - type: dialog
        character: yuu
        text: "タクミが{帰|かえ}り{道|みち}に「{完璧|かんぺき}じゃないと{意味|いみ}がない」ってつぶやいてた。{完璧|かんぺき}{主義|しゅぎ}。ヒビがあったら{耐|た}えられないんだ。{修復|しゅうふく}する{動機|どうき}が{一番|いちばん}{強|つよ}い{人|ひと}は——{作者|さくしゃ}{自身|じしん}。"
        expression: determined
      - type: sprite
        character: yuu
        action: hide

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: narration
        text: "「{犯人|はんにん}は{外部|がいぶ}の{人|ひと}」という{思|おも}い{込|こ}みを{崩|くず}そう。{指紋|しもん}は{作者|さくしゃ}と{区別|くべつ}できない。ヒビに{気|き}づけるのは{作者|さくしゃ}。{修復|しゅうふく}する{動機|どうき}が{最|もっと}も{強|つよ}いのも{作者|さくしゃ}。「{特|とく}に{何|なに}もしていない」は{曖昧|あいまい}。{窓|まど}が{開|あ}いていた20:00。"
      - type: choice
        id: q1
        question: 彫刻を修復した犯人は？
        options:
          - text: タクミ（作者自身。ヒビを隠すために自分で修復＋完璧主義＋曖昧な証言）
            value: takumi
            correct: true
            feedback: "{正解|せいかい}！ {作者|さくしゃ}タクミ{自身|じしん}が{犯人|はんにん}。{最優秀賞|さいゆうしゅうしょう}の{作品|さくひん}にヒビが{入|はい}っていることに{気|き}づき、{夜|よる}に{窓|まど}から{入|はい}って{加水|かすい}{修復|しゅうふく}した。「{指紋|しもん}＝{外部|がいぶ}{犯人|はんにん}」は{認知|にんち}バイアスだった。"
          - text: サクラ（写真との比較で気づいた人）
            value: sakura
            feedback: "サクラは{写真|しゃしん}でヒビの{消失|しょうしつ}を{発見|はっけん}した{側|がわ}。{修復|しゅうふく}する{動機|どうき}がないよ。"
          - text: ニジカ（タクミの行動を目撃した人）
            value: nijika
            feedback: "ニジカはタクミの「{気|き}になるところ」{発言|はつげん}を{知|し}っている{側|がわ}。{修復|しゅうふく}する{理由|りゆう}がないよ。"
          - text: ユウ（タクミの完璧主義を知っていた人）
            value: yuu
            feedback: "ユウは{動機|どうき}の{情報|じょうほう}を{持|も}っている{側|がわ}。「{犯人|はんにん}は{作者|さくしゃ}かも」と{気|き}づいた{人|ひと}。"

  # ==================== 真実：タクミ ====================
  - id: truth-takumi
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: タクミの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: takumi
        expression: worried
        position: center
      - type: dialog
        character: takumi
        text: "……ごめん。{修復|しゅうふく}したのは{僕|ぼく}だ。"
        expression: worried
      - type: dialog
        character: takumi
        text: "{審査|しんさ}で{最優秀賞|さいゆうしゅうしょう}をもらった{後|あと}、{翼|つばさ}の{先端|せんたん}に{乾燥|かんそう}でヒビが{入|はい}っていることに{気|き}づいた。{審査員|しんさいん}は{見逃|みのが}したけど、{展示|てんじ}が{続|つづ}けば{誰|だれ}かが{気|き}づく。"
        expression: thinking
      - type: dialog
        character: takumi
        text: "「{最優秀賞|さいゆうしゅうしょう}なのにヒビがある」って{思|おも}われたくなかった。{昨夜|さくや}{窓|まど}から{入|はい}って、{翼|つばさ}に{水|みず}を{加|くわ}えてヒビを{埋|う}めた。{修復|しゅうふく}で{翼|つばさ}の{先端|せんたん}が{少|すこ}し{丸|まる}くなっちゃった……ごめんなさい。"
        expression: worried
      - type: sprite
        character: takumi
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: yuu
        expression: normal
        position: center
      - type: dialog
        character: yuu
        text: "{完璧|かんぺき}じゃなくても{価値|かち}がある。ヒビも{粘土|ねんど}が{乾|かわ}く{自然|しぜん}なプロセス。{日本|にほん}には「{金継|きんつ}ぎ」っていう{文化|ぶんか}がある——{壊|こわ}れたものを{金|きん}で{修復|しゅうふく}して、むしろ{美|うつく}しくする。{不完全|ふかんぜん}さの{中|なか}にも{美|び}はあるんだ。"
        expression: happy
      - type: sprite
        character: yuu
        action: hide
      - type: narration
        text: "「{指紋|しもん}＝{犯人|はんにん}は{外部|がいぶ}」は{認知|にんち}バイアスだった。{作者|さくしゃ}{自身|じしん}が{修復|しゅうふく}する{可能性|かのうせい}を{最初|さいしょ}から{考|かんが}えるべきだった。"
      - type: narration
        text: "「〜だから{犯人|はんにん}」と{決|き}めつけず、すべての{可能性|かのうせい}を{考|かんが}えること。それが{認知|にんち}バイアスを{克服|こくふく}する{力|ちから}。
      - type: effect
        name: fade-out
