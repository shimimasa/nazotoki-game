meta:
  id: disaster-01
  title: 避難記録のズレ
  series: 防災探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  souta:
    name: ソウタ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  nana:
    name: ナナ
    color: "#E91E63"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  kei:
    name: ケイ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  ai:
    name: アイ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: schoolyard
    bgm: disaster-01/opening
    steps:
      - type: narration
        text: "X市立みどり小学校——{今日|きょう}は{地震|じしん}を{想定|そうてい}した{避難|ひなん}{訓練|くんれん}。"
      - type: se
        sound: disaster-01/siren
      - type: narration
        text: "{緊急|きんきゅう}{地震|じしん}{速報|そくほう}が鳴った。{机|つくえ}の下に{隠|かく}れ、{揺|ゆ}れがおさまるのを待ち、先生の放送に{従|したが}って校庭へ{移動|いどう}する。"
      - type: narration
        text: "「おかしも」を守ること。{押|お}さない・かけない・しゃべらない・もどらない。"
      - type: narration
        text: "{訓練|くんれん}が終わり、4人が{避難|ひなん}{記録|きろく}シートを先生に{提出|ていしゅつ}した。ところが——"
      - type: bgm
        action: stop
      - type: effect
        name: shake
        duration: 400
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: bgm
        track: disaster-01/investigation
      - type: dialog
        character: sensei
        text: "ケイくんの{記録|きろく}がおかしい。「{経路|けいろ}A（{階段|かいだん}）を通った」と{書|か}いてあるのに、出発{時刻|じこく}と{到着|とうちゃく}{時刻|じこく}の差が合わないわ。"
      - type: dialog
        character: sensei
        text: "{経路|けいろ}Aは{通常|つうじょう}3分。なのにケイくんは5分かかっている。{防災|ぼうさい}{探偵|たんてい}団、この{矛盾|むじゅん}を{調|しら}べて！"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 防災探偵団 Vol.1
        subtitle: 避難記録のズレ

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: classroom
    bgm: disaster-01/investigation
    steps:
      - type: narration
        text: "{訓練|くんれん}に{参加|さんか}した4人に話を聞こう。"
      - type: sprite
        character: souta
        expression: normal
        position: left
      - type: dialog
        character: souta
        text: "ぼくはソウタ。{記録|きろく}の整理が{得意|とくい}。10:03に教室を出て10:06に校庭{到着|とうちゃく}。{所要|しょよう}時間3分、{経路|けいろ}Aの{通常|つうじょう}通り。"
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: nana
        expression: normal
        position: right
      - type: dialog
        character: nana
        text: "わたしはナナ。10:03に出て10:07に{到着|とうちゃく}。4分かかったの……ちょっと{遅|おく}れちゃった。"
        expression: worried
      - type: sprite
        character: nana
        action: hide
      - type: sprite
        character: kei
        expression: normal
        position: left
      - type: dialog
        character: kei
        text: "おれはケイ。{防災|ぼうさい}クラブのメンバーだよ。10:03に出て10:08に{到着|とうちゃく}。{経路|けいろ}Aを通った。"
      - type: dialog
        character: kei
        text: "……5分かかったのは、ちょっと{混|こ}んでたから。"
        expression: thinking
      - type: sprite
        character: kei
        action: hide
      - type: sprite
        character: ai
        expression: normal
        position: right
      - type: dialog
        character: ai
        text: "わたしはアイ。{気象|きしょう}{観測|かんそく}係。10:04に出て10:07に{到着|とうちゃく}。3分で、{通常|つうじょう}通り。"
      - type: sprite
        character: ai
        action: hide

  # ===== 証拠カード1: 避難記録シート =====
  - id: evidence-1
    bg: classroom
    bgm: disaster-01/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: 4人の避難記録を比べよう
      - type: narration
        text: "4人の{避難|ひなん}{記録|きろく}シート——{経路|けいろ}は全員「{経路|けいろ}A（{階段|かいだん}）」と記入。"
      - type: narration
        text: "ソウタ：10:03出発 → 10:06{到着|とうちゃく} → {所要|しょよう}時間3分 → {通常|つうじょう}通り"
      - type: narration
        text: "アイ：10:04出発 → 10:07{到着|とうちゃく} → {所要|しょよう}時間3分 → {通常|つうじょう}通り"
      - type: narration
        text: "ナナ：10:03出発 → 10:07{到着|とうちゃく} → {所要|しょよう}時間4分 → +1分{遅|おそ}い"
      - type: choice
        id: obs-1
        question: "{記録|きろく}だけ見ると、いちばん{不自然|ふしぜん}なのは？"
        options:
          - text: "ソウタの3分"
            value: souta
            reaction:
              character: sensei
              expression: thinking
              text: "{通常|つうじょう}どおりなら{問題|もんだい}ないね。"
          - text: "ナナの+1分"
            value: nana
            reaction:
              character: sensei
              expression: thinking
              text: "{理由|りゆう}を{確|たし}かめればまだ{判断|はんだん}できる。"
          - text: "ケイの+2分"
            value: kei
            reaction:
              character: sensei
              expression: happy
              text: "{差|さ}が{大|おお}きいね。ここが{鍵|かぎ}だよ。"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "ケイ：10:03出発 → 10:08{到着|とうちゃく} → {所要|しょよう}時間5分 → +2分{遅|おそ}い！"
      - type: se
        sound: common/discover
      - type: narration
        text: "ソウタとアイは{通常|つうじょう}通り。でもナナ（+1分）とケイ（+2分）が{遅|おそ}い。2人の「{遅|おく}れた理由」を{調|しら}べよう！"

  # ===== 証拠カード2: 避難経路データ =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 2つの避難経路
      - type: narration
        text: "みどり小学校には2つの{避難|ひなん}{経路|けいろ}がある。"
      - type: narration
        text: "{経路|けいろ}A（{階段|かいだん}{経由|けいゆ}）：教室 → {階段|かいだん} → 1階{廊下|ろうか} → 校庭。{通常|つうじょう}{所要|しょよう}時間は約3分。当日使用OK。"
      - type: narration
        text: "{経路|けいろ}B（スロープ{経由|けいゆ}）：教室 → スロープ → 中庭 → 校庭。{通常|つうじょう}は約2分。"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "ただし当日、{経路|けいろ}Bは工事中のため使用{禁止|きんし}！ 朝のホームルームで先生が「全員{経路|けいろ}Aを使うこと」と{指示|しじ}した。"
      - type: choice
        id: obs-2
        question: "5{分|ふん}かかった{記録|きろく}にいちばん{合|あ}うのは？"
        options:
          - text: "{経路|けいろ}A"
            value: route-a
            reaction:
              character: sensei
              expression: thinking
              text: "{経路|けいろ}Aなら3{分|ぷん}のはずだよ。"
          - text: "{経路|けいろ}B（工事中）"
            value: route-b
            reaction:
              character: sensei
              expression: happy
              text: "{時間|じかん}がぴったり{重|かさ}なるね。"
          - text: "どちらでもない"
            value: neither
            reaction:
              character: sensei
              expression: thinking
              text: "{数字|すうじ}ともう{一度|いちど}{比|くら}べてみよう。"
      - type: narration
        text: "もし{誰|だれ}かが{経路|けいろ}B（工事中）を通ったら？ 工事{資材|しざい}があるため、{通常|つうじょう}2分のところが約5分かかる。"
      - type: narration
        text: "ケイの{所要|しょよう}時間は5分。{経路|けいろ}Aなら{通常|つうじょう}3分。でも{経路|けいろ}B（工事中）なら5分。——ぴったり{一致|いっち}する。"
      - type: choice
        id: timeline-key
        question: "この{時点|じてん}で、{経路|けいろ}Bを{通|とお}った{可能性|かのうせい}が高いのは？"
        options:
          - text: "ソウタ"
            value: souta
            reaction:
              character: sensei
              expression: thinking
              text: "3{分|ぷん}なら{通常|つうじょう}ルートに{見|み}えるね。"
          - text: "ナナ"
            value: nana
            reaction:
              character: sensei
              expression: thinking
              text: "+1{分|ぷん}だけではまだ{決|き}めにくいかな。"
          - text: "ケイ"
            value: kei
            reaction:
              character: sensei
              expression: happy
              text: "5{分|ぷん}がいちばんぴたりと{合|あ}うよ。"
          - text: "アイ"
            value: ai
            reaction:
              character: sensei
              expression: thinking
              text: "アイの{時間|じかん}は{通常|つうじょう}どおりだね。"

  # ===== 証拠カード3: 防災クラブの記録 =====
  - id: evidence-3
    bgm: disaster-01/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: ケイの防災クラブメモ
      - type: narration
        text: "ケイは{防災|ぼうさい}クラブの活動で、先月2つの{経路|けいろ}を{実際|じっさい}に歩いて時間を計っていた。"
      - type: narration
        text: "{経路|けいろ}A（{階段|かいだん}）：2分50秒（約3分）。「{階段|かいだん}が{混|こ}むと{遅|おそ}くなりそう」"
      - type: narration
        text: "{経路|けいろ}B（スロープ）：1分45秒（約2分）。「スロープは速い！ {階段|かいだん}より楽」"
      - type: se
        sound: common/discover
      - type: narration
        text: "ケイは「スロープの方が速い」と知っていた。工事中で使用{禁止|きんし}と聞いても、「使えば速く{到着|とうちゃく}できる」という考えが頭にあったかもしれない。"
      - type: choice
        id: hunch
        question: "{直感|ちょっかん}で、いちばん{怪|あや}しいのは{誰|だれ}？"
        options:
          - text: "ソウタ"
            value: souta
            reaction:
              character: sensei
              expression: thinking
              text: "{記録|きろく}はまだ{自然|しぜん}に{見|み}えるね。"
          - text: "ナナ"
            value: nana
            reaction:
              character: sensei
              expression: thinking
              text: "{遅|おく}れの{理由|りゆう}を{聞|き}きたいね。"
          - text: "ケイ"
            value: kei
            reaction:
              character: sensei
              expression: happy
              text: "{速|はや}さへの{思|おも}い{込|こ}みが{気|き}になるね。"
          - text: "アイ"
            value: ai
            reaction:
              character: sensei
              expression: thinking
              text: "いまのところ{大|おお}きなズレはないかな。"
          - text: "{全員|ぜんいん}{怪|あや}しい"
            value: all
            reaction:
              character: sensei
              expression: thinking
              text: "{次|つぎ}の{証拠|しょうこ}で{絞|しぼ}ろう。"

  # ===== 証拠カード4: 目撃情報 =====
  - id: evidence-4
    bgm: disaster-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: 目撃情報——2人の遅れの理由は？
      - type: narration
        text: "まず、ナナの+1分を{確認|かくにん}しよう。"
      - type: narration
        text: "1年1組の{担任|たんにん}の先生の{証言|しょうげん}——「{階段|かいだん}の{踊|おど}り場で1年生の子が転んで{泣|な}いていました。ナナさんが立ち止まって手を引いて{一緒|いっしょ}に{降|お}りてくれました」"
      - type: sprite
        character: nana
        expression: determined
        position: left
      - type: dialog
        character: nana
        text: "1年生の子が{泣|な}いてたから、{一緒|いっしょ}に{降|お}りてあげたの。それで1分{遅|おそ}くなった。"
      - type: sprite
        character: nana
        action: hide
      - type: narration
        text: "ナナの+1分は「1年生を{助|たす}けた」ため。先生が{確認|かくにん}{済|ず}み。ナナは{経路|けいろ}Aを正しく通っている。——ナナは問題なし。"
      - type: narration
        text: では、ケイの+2分は？
      - type: sprite
        character: ai
        expression: thinking
        position: right
      - type: dialog
        character: ai
        text: "{訓練|くんれん}中に{経路|けいろ}Aを通ったとき、スロープの入り口の近くを通ったの。そこに黄色い{柵|さく}と「工事中・通行{禁止|きんし}」の{看板|かんばん}があった。"
      - type: dialog
        character: ai
        text: "でも……{柵|さく}の足元の{砂|すな}が{乱|みだ}れていて、{柵|さく}の{支柱|しちゅう}が少しずれていた。{誰|だれ}かが通り{抜|ぬ}けたみたい。"
        expression: determined
      - type: sprite
        character: ai
        action: hide
      - type: sprite
        character: nana
        expression: thinking
        position: left
      - type: dialog
        character: nana
        text: わたし、校庭に着いたとき少し後からケイくんが来たの。でも——ケイくんは中庭側から校庭に入ってきた。
      - type: dialog
        character: nana
        text: "{経路|けいろ}Aの出口って{階段|かいだん}側だよね？ 中庭側から来るのは{経路|けいろ}Bを通った場合だと思う。"
        expression: determined
      - type: sprite
        character: nana
        action: hide
      - type: narration
        text: "{柵|さく}が{乱|みだ}れていた（{誰|だれ}かが通り{抜|ぬ}けた）。ケイが中庭側から来た（{経路|けいろ}Bの出口）。——{経路|けいろ}Bを通ったのはケイ？"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: disaster-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}を整理しましょう。{記録|きろく}と{違|ちが}う{経路|けいろ}を通ったのは{誰|だれ}？"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: 経路Aではなく経路B（工事中のスロープ）を通ったのは誰？
        options:
          - text: ソウタ（所要時間3分・通常通り）
            value: souta
            feedback: ソウタは3分で到着。経路Aの通常時間と一致してるから問題ないよ。
          - text: ナナ（+1分だが、1年生を助けたため）
            value: nana
            feedback: ナナの+1分は1年生を助けたため（先生が確認済み）。正当な理由がある遅れだよ。
          - text: ケイ（+2分で、中庭側から到着した）
            value: kei
            feedback: 正解！ ケイの所要時間5分は経路A（3分）と合わない。でも経路B（工事中5分）とぴったり一致する。中庭側からの到着も経路Bの出口と一致！
          - text: アイ（所要時間3分・通常通り）
            value: ai
            feedback: アイは3分で到着。通常通りだから問題ないよ。
      - type: choice
        id: q2
        question: ケイがなぜ経路Bを選んだと思う？
        options:
          - text: スロープの方が速いと知っていたから
            value: faster
            feedback: 正解！ ケイは防災クラブで「スロープは2分で階段より速い」と実測していた。速さへの自信が先走りにつながった。
          - text: 経路Aの階段が怖かったから
            value: scared
            feedback: ケイは防災クラブのメンバーで階段も何度も使ってる。怖さではなく「速さ」への自信が理由だよ。
          - text: 友達に誘われたから
            value: friend
            feedback: 工事業者の証言では「一人だった」。誰かに誘われたのではなく自分の判断だよ。
          - text: 先生の指示を聞いていなかったから
            value: missed
            feedback: 朝のホームルームで「経路Bは禁止」と聞いている。聞いていなかったのではなく、聞いた上で「速いから」と判断した。

  # ===== 証拠カード5: 工事業者の証言 =====
  - id: evidence-5
    bgm: disaster-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: 工事業者の目撃証言
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "工事業者の方に{確認|かくにん}しました。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "工事業者の{証言|しょうげん}——"
      - type: narration
        text: "「10:08ごろ、小学生が{柵|さく}の横を通り{抜|ぬ}けるのを{目撃|もくげき}しました。{体操服|たいそうふく}を着た男の子でした。一人でした」"
      - type: narration
        text: "「工事中で{砂利|じゃり}{袋|ふくろ}や{材木|ざいもく}が{積|つ}んであったので、通りにくかったはずです。{危険|きけん}でした」"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        text: "当日の{経路|けいろ}B——工事{資材|しざい}を{避|さ}けながらで約5分。出口は中庭側。"
      - type: narration
        speed: slow
        text: "ケイの{所要|しょよう}時間5分。中庭側から{到着|とうちゃく}。工事業者の{目撃|もくげき}。——すべてが{一致|いっち}した。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: classroom
    bgm: disaster-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: なぜケイは別の経路を選んだのか
      - type: effect
        name: fade-in
        duration: 600

  # ソウタの秘密
  - id: truth-souta
    bg: classroom
    steps:
      - type: sprite
        character: souta
        expression: thinking
        position: left
      - type: dialog
        character: souta
        text: "ぼくは{記録|きろく}を見てすぐに気づいた。ケイの5分は{経路|けいろ}Aの3分と合わない。でも{経路|けいろ}B（工事中5分）とは合う。"
      - type: dialog
        character: souta
        text: "データは{嘘|うそ}をつかない。でもケイに{直接|ちょくせつ}聞くのは……{迷|まよ}ってた。"
        expression: worried
      - type: sprite
        character: souta
        action: hide

  # アイの秘密
  - id: truth-ai
    steps:
      - type: sprite
        character: ai
        expression: thinking
        position: right
      - type: dialog
        character: ai
        text: "わたしはスロープの{柵|さく}が{乱|みだ}れていたのを見て、「{誰|だれ}かが通り{抜|ぬ}けた」と分かった。"
      - type: dialog
        character: ai
        text: "でも{証拠|しょうこ}を集めてからみんなに話した方がいいと思って、しばらく{黙|だま}ってた。"
        expression: determined
      - type: sprite
        character: ai
        action: hide

  # ナナの秘密
  - id: truth-nana
    steps:
      - type: sprite
        character: nana
        expression: worried
        position: left
      - type: dialog
        character: nana
        text: "わたしは自分の{遅|おく}れが{疑|うたが}われるのが少し怖かった。でも1年生を{助|たす}けたことは正しかったと思う。"
      - type: dialog
        character: nana
        text: "ケイくんの気持ちも分かるけど……{避難|ひなん}{訓練|くんれん}で{経路|けいろ}を変えるのは{危|あぶ}ないよ。"
        expression: determined
      - type: sprite
        character: nana
        action: hide

  # ケイの真実（クライマックス）
  - id: truth-kei
    bgm: disaster-01/truth
    steps:
      - type: sprite
        character: kei
        expression: worried
        position: center
      - type: dialog
        character: kei
        text: "……ごめん。おれ、{経路|けいろ}Bを通った。{記録|きろく}には「{経路|けいろ}A」って{嘘|うそ}を{書|か}いた。"
      - type: narration
        speed: slow
        text: ケイがゆっくりと話し始めた。
      - type: dialog
        character: kei
        text: "{防災|ぼうさい}クラブで先月歩いたとき、スロープは2分で{階段|かいだん}より速かった。「{地震|じしん}のとき、スロープが使えれば一番速く{逃|に}げられる」って思ってた。"
        expression: worried
      - type: dialog
        character: kei
        text: "{今日|きょう}「{経路|けいろ}Bは工事中で{禁止|きんし}」って聞いたけど、「通れるかもしれない、スロープの方が速いし」って先走りで入っちゃったんだ。"
      - type: dialog
        character: kei
        text: "でも{実際|じっさい}は{砂利|じゃり}{袋|ふくろ}や{材木|ざいもく}があって全然進めなくて……{結局|けっきょく}5分もかかった。全部{裏目|うらめ}に出た。"
        expression: worried
      - type: dialog
        character: kei
        text: "{防災|ぼうさい}クラブなのに{訓練|くんれん}のルールを{破|やぶ}っちゃった。{恥|は}ずかしくて{記録|きろく}に「{経路|けいろ}A」って{書|か}いた。"
      - type: dialog
        character: kei
        text: "……ごめん。「速いから良い」じゃなかった。決められた{経路|けいろ}には理由があったんだ。"
        expression: determined
      - type: sprite
        character: kei
        action: hide
      - type: narration
        speed: slow
        text: "ケイは悪い子じゃない。「速く{逃|に}げたい」という気持ちは正しかった。でも——当日の{状況|じょうきょう}は、先月の下見とは{違|ちが}っていた。"

  # ===== エピローグ =====
  - id: epilogue
    bg: schoolyard
    bgm: disaster-01/resolution
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ケイくん、「速く{逃|に}げたい」という気持ちは{間違|まちが}ってない。でも大事なことがあるわ。"
      - type: dialog
        character: sensei
        text: "{避難|ひなん}{経路|けいろ}が指定されるのには理由がある。{建物|たてもの}の安全{確認|かくにん}{済|ず}みルートが{選|えら}ばれていて、当日の{状況|じょうきょう}——工事や{障害物|しょうがいぶつ}——を{考慮|こうりょ}して{変更|へんこう}される。"
        expression: normal
      - type: dialog
        character: sensei
        text: "「自分が知っているルート」でも、当日の{状況|じょうきょう}が変わっていることがある。「速いから良い」ではなく「{確認|かくにん}されたルートを使う」が{正解|せいかい}なの。"
        expression: thinking
      - type: dialog
        character: sensei
        text: "そしてナナさん——1年生を{助|たす}けるために1分{遅|おく}れた。これは{避難|ひなん}{訓練|くんれん}の{精神|せいしん}そのものよ。{助|たす}け合いは「{遅|おく}れ」じゃない。"
        expression: happy
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kei
        expression: determined
        position: left
      - type: dialog
        character: kei
        text: "次の{訓練|くんれん}では、ちゃんと指定{経路|けいろ}を通る。おれは{防災|ぼうさい}クラブだから——みんなの見本にならなきゃいけないんだ。"
      - type: sprite
        character: kei
        action: hide
      - type: sprite_group
        characters:
          - { id: souta, expression: happy }
          - { id: nana, expression: happy }
          - { id: kei, expression: happy }
          - { id: ai, expression: happy }
      - type: narration
        text: "ケイの{避難|ひなん}{記録|きろく}は{修正|しゅうせい}された。「{経路|けいろ}B（スロープ・工事中）」——正直な{記録|きろく}が、次の{訓練|くんれん}をより安全にする。"
      - type: narration
        speed: slow
        text: "{訓練|くんれん}は「{失敗|しっぱい}しても安全に学べる場所」。本番の{地震|じしん}ではやり直しができない。だから{訓練|くんれん}で正直に{振|ふ}り返ることが、命を守る。"
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: nana
        action: hide
      - type: sprite
        character: kei
        action: hide
      - type: sprite
        character: ai
        action: hide
      - type: narration
        text: "{防災|ぼうさい}{探偵|たんてい}団——{避難|ひなん}{記録|きろく}のズレ、{解決|かいけつ}！"
      - type: effect
        name: fade-out
        duration: 1500
