scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "ひまわり{小学校|しょうがっこう}の{玄関|げんかん}ホールには、{美術|びじゅつ}{部|ぶ}の{生徒|せいと}が{作|つく}った「{花|はな}の{陶器|とうき}{作品|さくひん}」が{展示|てんじ}されていた。{大切|たいせつ}に{飾|かざ}られた{自信作|じしんさく}だ。"
      - type: narration
        text: "ところが{今朝|けさ}——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{用務員|ようむいん}さんが{玄関|げんかん}ホールを{掃除|そうじ}していると、{花|はな}の{陶器|とうき}{作品|さくひん}が{台|だい}から{落|お}ちて{床|ゆか}で{割|わ}れているのを{発見|はっけん}した。{監視|かんし}カメラの{映像|えいぞう}には、{昨日|きのう}の{夕方|ゆうがた}に{高齢|こうれい}の{女性|じょせい}が{陶器|とうき}に{手|て}を{触|ふ}れている{場面|ばめん}が{映|うつ}っていた。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{監視|かんし}カメラの{映像|えいぞう}{記録|きろく}に{不審|ふしん}な{痕跡|こんせき}があります。{誰|だれ}かが{映像|えいぞう}を{消|け}そうとした{形跡|けいせき}があるのです。{高齢|こうれい}の{女性|じょせい}は{誰|だれ}か、そして{映像|えいぞう}を{消|け}そうとしたのは{誰|だれ}か——2つの{謎|なぞ}があります。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: ibuki
            expression: surprised
          - character: koharu
            expression: worried
          - character: wakana
            expression: thinking
          - character: yuzuru
            expression: surprised
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{昨日|きのう}の{放課後|ほうかご}、{校内|こうない}に{残|のこ}っていた{仲間|なかま}の{中|なか}に——{何|なに}かを{知|し}っている{人|ひと}がいるのだろうか？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: おばあちゃんの忘れもの
        subtitle: 福祉探偵団 Vol.4

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 用務員さんの報告を確認しよう
      - type: narration
        text: "{山田|やまだ}{先生|せんせい}が{用務員|ようむいん}さんの{報告|ほうこく}と{監視|かんし}カメラの{概要|がいよう}をまとめてくれた。"
      - type: se
        sound: discover
      - type: narration
        text: "{映|うつ}った{時間|じかん}——{昨日|きのう}の16:10〜16:15（{約|やく}5{分間|ふんかん}）。{映|うつ}った{人物|じんぶつ}——{高齢|こうれい}の{女性|じょせい}。{学校|がっこう}{関係者|かんけいしゃ}ではなさそう。"
      - type: narration
        text: "{映|うつ}った{行動|こうどう}——{玄関|げんかん}ホールに{入|はい}り、{展示台|てんじだい}に{近|ちか}づき、{花|はな}の{陶器|とうき}に{手|て}を{触|ふ}れた。"
      - type: narration
        text: "{異常|いじょう}——{映像|えいぞう}{記録|きろく}に**{不審|ふしん}な{操作|そうさ}の{痕跡|こんせき}**あり。16:20ごろ、{職員室|しょくいんしつ}のパソコンで{削除|さくじょ}{操作|そうさ}が{試|こころ}みられた{形跡|けいせき}がある。{削除|さくじょ}は{完了|かんりょう}しておらず、{途中|とちゅう}で{中断|ちゅうだん}されている。"
      - type: narration
        text: "{映像|えいぞう}には2つの{謎|なぞ}がある。「{高齢|こうれい}の{女性|じょせい}は{誰|だれ}で、なぜ{陶器|とうき}に{触|ふ}れたのか」「{映像|えいぞう}を{消|け}そうとしたのは{誰|だれ}か」——{証拠|しょうこ}から{推理|すいり}しよう。"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 4人の放課後の行動を調べよう
      - type: narration
        text: "{山田|やまだ}{先生|せんせい}が{放課後|ほうかご}に{校内|こうない}にいた4{人|にん}に{聞|き}き{取|と}りをした。"
      - type: se
        sound: discover
      - type: narration
        text: "ユズル——{職員室|しょくいんしつ}の{掃除|そうじ}{当番|とうばん}（15:30〜16:00）。その{後|あと}{教室|きょうしつ}に{戻|もど}り、16:15に{下校|げこう}。"
      - type: narration
        text: "イブキ——{玄関|げんかん}ホールの{掃除|そうじ}{当番|とうばん}（15:30〜16:00）。その{後|あと}{校庭|こうてい}に{行|い}き、16:30に{下校|げこう}。"
      - type: narration
        text: "ワカナ——{図書室|としょしつ}の{当番|とうばん}（15:30〜16:00）。16:20ごろまで{校内|こうない}にいて、16:30に{下校|げこう}。"
      - type: narration
        text: "コハル——{保健室|ほけんしつ}の{当番|とうばん}（15:30〜16:00）。{裏口|うらぐち}から16:10に{下校|げこう}。"
      - type: narration
        text: "{映像|えいぞう}が{操作|そうさ}されたのは16:20ごろ。{映像|えいぞう}{記録|きろく}の{操作|そうさ}は{職員室|しょくいんしつ}のパソコンで{行|おこな}う——16:20に{校内|こうない}にいて、{かつ}{職員室|しょくいんしつ}にアクセスできた{人|ひと}は？"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 監視カメラ映像の詳細を確認しよう
      - type: narration
        text: "{山田|やまだ}{先生|せんせい}が{監視|かんし}カメラの{映像|えいぞう}を{詳|くわ}しく{分析|ぶんせき}した。{時系列|じけいれつ}で{確認|かくにん}する。"
      - type: se
        sound: discover
      - type: narration
        text: "16:10——{高齢|こうれい}の{女性|じょせい}が{玄関|げんかん}ホールに{入|はい}る。キョロキョロと{周|まわ}りを{見回|みまわ}している。"
      - type: narration
        text: "16:11——{展示台|てんじだい}に{近|ちか}づく。{花|はな}の{陶器|とうき}をじっと{見|み}つめる。"
      - type: narration
        text: "16:12——{陶器|とうき}に**やさしく{手|て}を{伸|の}ばす**。{持|も}ち{去|さ}ろうとしているのではなく、**{位置|いち}を{直|なお}そうとしている**ように{見|み}える。"
      - type: narration
        text: "16:13——{陶器|とうき}を{台|だい}の{中央|ちゅうおう}に{動|うご}かそうとするが、**{台|だい}が{揺|ゆ}れて**{陶器|とうき}が{端|はし}から{落|お}ちそうになる。16:14——{慌|あわ}てて{陶器|とうき}を{支|ささ}えようとするが{間|ま}に{合|あ}わず、{陶器|とうき}が{台|だい}から{落|お}ちる。{女性|じょせい}は{驚|おどろ}いた{表情|ひょうじょう}。"
      - type: narration
        text: "{高齢|こうれい}の{女性|じょせい}は{陶器|とうき}を「{壊|こわ}そうとした」ように{見|み}えるだろうか？ それとも{別|べつ}のことをしようとしていたのだろうか？"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 展示台の状態と卒業生名簿を調べよう
      - type: narration
        text: "{用務員|ようむいん}さんと{山田|やまだ}{先生|せんせい}が{展示台|てんじだい}を{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "{台|だい}の{状態|じょうたい}——{古|ふる}くて{不安定|ふあんてい}。{脚|あし}の1{本|ほん}が{短|みじか}く、**やや{傾|かたむ}いていた**。{陶器|とうき}の{元|もと}の{位置|いち}——{台|だい}の{端|はし}に{置|お}かれていた。{台|だい}の{傾|かたむ}きで{中央|ちゅうおう}に{置|お}いても{端|はし}にずれやすかった。"
      - type: narration
        text: "{女性|じょせい}の{手|て}の{動|うご}き——{映像|えいぞう}{分析|ぶんせき}では「{持|も}ち{去|さ}ろうとした」{動|うご}きではなく、**「{元|もと}の{位置|いち}に{戻|もど}そうとした」{動|うご}き**。"
      - type: narration
        text: "さらに——{山田|やまだ}{先生|せんせい}が{古|ふる}い{卒業生|そつぎょうせい}{名簿|めいぼ}を{確認|かくにん}した。**50{年前|ねんまえ}の{卒業生|そつぎょうせい}{名簿|めいぼ}に「フミコ」という{名前|なまえ}があった。**"
      - type: narration
        text: "当時の{学校|がっこう}には、{各|かく}{教室|きょうしつ}の{入|い}り{口|ぐち}に{花瓶|かびん}が{置|お}いてあった。{生徒|せいと}が{毎朝|まいあさ}、{花瓶|かびん}の{水|みず}を{替|か}えて、{花|はな}の{位置|いち}を{直|なお}すのが{日課|にっか}だった。"
      - type: narration
        text: "もしこの{高齢|こうれい}の{女性|じょせい}が50{年前|ねんまえ}の{卒業生|そつぎょうせい}だとしたら……「{花|はな}の{陶器|とうき}を{直|なお}そうとした」{行動|こうどう}には、どんな{意味|いみ}があるだろう？"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: フミコさんの真実
      - type: effect
        name: fade-in
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "{映像|えいぞう}に{映|うつ}っていた{女性|じょせい}の{正体|しょうたい}が{分|わ}かりました。**ワカナさんのおばあちゃん・フミコさん（78{歳|さい}）**です。フミコさんはひまわり{小学校|しょうがっこう}の{卒業生|そつぎょうせい}で、{認知症|にんちしょう}があります。"
        expression: determined
      - type: dialog
        character: yamada
        text: "フミコさんは{散歩|さんぽ}の{途中|とちゅう}に{昔|むかし}{通|かよ}っていた{学校|がっこう}に{迷|まよ}い{込|こ}みました。フミコさんの{中|なか}では今でも「{自分|じぶん}の{学校|がっこう}の{花瓶|かびん}を{直|なお}す」という**{昔|むかし}の{日課|にっか}の{記憶|きおく}**が{残|のこ}っています。"
        expression: thinking
      - type: dialog
        character: yamada
        text: "{花|はな}の{陶器|とうき}を{見|み}て、「あら、{花瓶|かびん}がずれている。{直|なお}さなきゃ」と{思|おも}ったのです。これは**{手続|てつづ}き{記憶|きおく}**——{体|からだ}で{覚|おぼ}えた{動作|どうさ}の{記憶|きおく}——が{残|のこ}っているからです。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "{認知症|にんちしょう}の3つの{記憶|きおく}——{短期|たんき}{記憶|きおく}（さっき{起|お}きたこと）は{損|そこ}なわれやすい。{長期|ちょうき}{記憶|きおく}（{昔|むかし}の{思|おも}い{出|で}）は{比較的|ひかくてき}{残|のこ}りやすい。{手続|てつづ}き{記憶|きおく}（{体|からだ}で{覚|おぼ}えた{動作|どうさ}）は{最後|さいご}まで{残|のこ}ることが{多|おお}い。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "フミコさんは{陶器|とうき}を{壊|こわ}そうとしたのではない。**{忘|わす}れたから{壊|こわ}した**のではなく、**{覚|おぼ}えているからこそ{触|さわ}った**のだ。{認知症|にんちしょう}の{人|ひと}の{行動|こうどう}には{意味|いみ}がある——"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 映像を消そうとしたのは誰？
      - type: sprite
        character: yuzuru
        expression: thinking
        position: left
      - type: dialog
        character: yuzuru
        text: "16:20ごろに{職員室|しょくいんしつ}のパソコンで{操作|そうさ}が{行|おこな}われた。16:00に{自分|じぶん}は{下校|げこう}——16:15には{学校|がっこう}を{出|で}ていたから、{自分|じぶん}ではない。データで{見|み}ると——16:20まで{校内|こうない}にいたのは……"
        expression: thinking
      - type: sprite
        character: yuzuru
        action: hide
      - type: sprite
        character: ibuki
        expression: worried
        position: right
      - type: dialog
        character: ibuki
        text: "{校庭|こうてい}にいたから{職員室|しょくいんしつ}には{行|い}ってない。でも……15:50ごろ、{玄関|げんかん}ホールの{外|そと}で{高齢|こうれい}の{女性|じょせい}がうろうろしているのを{見|み}かけてた。あのとき{声|こえ}をかけていれば……"
        expression: worried
      - type: sprite
        character: ibuki
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。ユズルは16:15に{下校|げこう}——16:20の{操作|そうさ}は{不可能|ふかのう}。コハルは16:10に{下校|げこう}——{同様|どうよう}に{不可能|ふかのう}。イブキは{校庭|こうてい}にいた——{職員室|しょくいんしつ}に{行|い}った{記録|きろく}はない。ワカナだけが16:20まで{校内|こうない}にいた。"
      - type: choice
        id: q1
        question: 監視カメラの映像を消そうとしたのは誰？
        options:
          - text: ワカナ（16:20まで校内にいて、職員室にアクセスできた）
            value: wakana
            correct: true
            feedback: "{正解|せいかい}！ ワカナは{祖母|そぼ}フミコさんの{認知症|にんちしょう}を{クラスメイト|くらすめいと}に{知|し}られたくなくて、16:20ごろに{職員室|しょくいんしつ}のパソコンで{映像|えいぞう}{記録|きろく}の{削除|さくじょ}を{試|こころ}みた。{操作|そうさ}は{完了|かんりょう}しなかったが、{痕跡|こんせき}が{残|のこ}った。{祖母|そぼ}を**かばう**ための{行動|こうどう}だった。"
          - text: ユズル（映像記録の操作痕跡を最初に発見した）
            value: yuzuru
            feedback: "ユズルは16:15に{下校|げこう}している。16:20の{操作|そうさ}のとき、すでに{学校|がっこう}を{出|で}ていた。{最初|さいしょ}に{痕跡|こんせき}を{発見|はっけん}したのは、{今朝|けさ}{確認|かくにん}したからだよ。"
          - text: イブキ（玄関ホールで高齢の女性を目撃していた）
            value: ibuki
            feedback: "イブキは{校庭|こうてい}で16:30まで{活動|かつどう}していた。{職員室|しょくいんしつ}に{行|い}った{記録|きろく}はない。{女性|じょせい}を{目撃|もくげき}していたのは、{後|あと}で{証言|しょうげん}した{情報|じょうほう}だよ。"
          - text: コハル（認知症の知識を持っていた）
            value: koharu
            feedback: "コハルは{裏口|うらぐち}から16:10に{下校|げこう}している。16:20の{操作|そうさ}のとき、すでに{学校|がっこう}を{出|で}ていた。{認知症|にんちしょう}の{知識|ちしき}を{持|も}っていることは、{犯行|はんこう}とは{関係|かんけい}ないよ。"

  # ==================== 真実：ワカナの告白 ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ワカナの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: wakana
        expression: worried
        position: center
      - type: dialog
        character: wakana
        text: "……{映像|えいぞう}を{消|け}そうとしたのは、{私|わたし}です。"
        expression: worried
      - type: narration
        text: "ワカナは{震|ふる}える{声|こえ}で{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: wakana
        text: "おばあちゃんは{認知症|にんちしょう}なんです。「{見当識|けんとうしき}{障害|しょうがい}」があって、今がいつか、ここがどこかが{分|わ}からなくなることがある。{昨日|きのう}の{夕方|ゆうがた}、{散歩|さんぽ}の{途中|とちゅう}で{迷|まよ}い{込|こ}んでしまったみたいで……"
        expression: worried
      - type: dialog
        character: wakana
        text: "16:00に{図書室|としょしつ}を{出|で}たとき、{玄関|げんかん}ホールでおばあちゃんを{見|み}かけた。「おばあちゃん、ここは{学校|がっこう}だよ。{帰|かえ}ろう」って、{校門|こうもん}まで{連|つ}れて{行|い}った。"
