scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校|がっこう}で「からだの{権利|けんり}ポスター」を{作|つく}るプロジェクトが{始|はじ}まった。Vol.1〜9で{学|まな}んだことを{全|すべ}てまとめた「{私|わたし}たちのからだの{権利宣言|けんりせんげん}」を{教室|きょうしつ}に{掲示|けいじ}するために、からだ{探偵団|たんていだん}の4{人|にん}が{分担|ぶんたん}してポスターを{作成|さくせい}した。"
      - type: narration
        text: "パーソナルスペース、「いやだ」と{言|い}う{権利|けんり}、{良|よ}い{秘密|ひみつ}と{悪|わる}い{秘密|ひみつ}、{同意|どうい}、オンラインの{境界|きょうかい}、{身体|からだ}の{変化|へんか}の{尊重|そんちょう}、{集団|しゅうだん}{圧力|あつりょく}への{抵抗|ていこう}、{身体|からだ}{情報|じょうほう}の{権利|けんり}——{全|すべ}てが{書|か}かれた{力作|りきさく}だ。"
      - type: narration
        text: "ところが{完成|かんせい}したポスターの{一部|いちぶ}が、{翌朝|よくあさ}には{書|か}き{換|か}えられていた。"
      - type: se
        sound: discover
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "「いやだと{言|い}う{権利|けんり}がある」が「いやだと{言|い}える{場所|ばしょ}がなければ、{権利|けんり}があっても{使|つか}えない」に{変|か}わっていた。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "ポスターが{書|か}き{換|か}えられているの。「いやだと{言|い}う{権利|けんり}がある」——これが「いやだと{言|い}える{場所|ばしょ}がなければ、{権利|けんり}があっても{使|つか}えない」に{変|か}わってた。{誰|だれ}がなぜ、こんなことを？"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: karada
            expression: surprised
          - character: mamoru
            expression: thinking
          - character: kokochi
            expression: worried
          - character: kizuna
            expression: surprised
      - type: narration
        text: "からだ{探偵団|たんていだん}の4{人|にん}は、それぞれに{後|うし}ろめたさを{感|かん}じていた。{誰|だれ}がポスターを{書|か}き{換|か}えたのか——そして、なぜ？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: からだの権利
        subtitle: からだ探偵団 Vol.10

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 書き換えられたポスター
      - type: narration
        text: "【{証拠|しょうこ}カード1】{事実|じじつ}: からだの{権利|けんり}ポスターの{一部|いちぶ}が{書|か}き{換|か}えられていた。"
      - type: narration
        text: "「いやだと{言|い}う{権利|けんり}がある」→「いやだと{言|い}える{場所|ばしょ}がなければ、{権利|けんり}があっても{使|つか}えない」"
      - type: narration
        text: "【{証拠|しょうこ}カード2】ポスターの{全文|ぜんぶん}: Vol.1-9で{学|まな}んだ{身体|からだ}の{権利|けんり}8{項目|こうもく}。{書|か}き{換|か}え{箇所|かしょ}はVol.2「{拒否|きょひ}の{権利|けんり}」パートのみ。"
      - type: sprite
        character: karada
        expression: thinking
        position: left
      - type: dialog
        character: karada
        text: "Vol.2の{拒否|きょひ}の{権利|けんり}——ぼくが{担当|たんとう}したパートだ。でも{書|か}き{換|か}えたのはぼくじゃない。"
        expression: worried
      - type: sprite
        character: karada
        action: hide
      - type: sprite
        character: kizuna
        expression: thinking
        position: right
      - type: dialog
        character: kizuna
        text: "カラダのパートが{書|か}き{換|か}えられてる。でも{筆跡|ひっせき}はカラダじゃないみたい……{誰|だれ}が{書|か}いたんだろう。"
        expression: thinking
      - type: sprite
        character: kizuna
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 担当パートと筆跡
      - type: narration
        text: "【{証拠|しょうこ}カード3】4{人|にん}の{担当|たんとう}パート{表|ひょう}——"
      - type: narration
        text: "カラダ＝Vol.1-2パート（{拒否|きょひ}の{権利|けんり}）。ココチ＝Vol.3-4パート。マモル＝Vol.5-6パート。キズナ＝Vol.7-8パート。"
      - type: narration
        text: "{書|か}き{換|か}え{箇所|かしょ}はカラダの{担当|たんとう}パートだが、{筆跡|ひっせき}がカラダではない。"
      - type: sprite
        character: mamoru
        expression: thinking
        position: left
      - type: dialog
        character: mamoru
        text: "カラダの{担当|たんとう}パートを{別|べつ}の{誰|だれ}かが{書|か}き{換|か}えた。{筆跡|ひっせき}を{調|しら}べれば{分|わ}かるはず。"
        expression: thinking
      - type: sprite
        character: mamoru
        action: hide
      - type: narration
        text: "【{証拠|しょうこ}カード4】{筆跡|ひっせき}{分析|ぶんせき}+{各|かく}キャラの{後|うし}ろめたさの{断片|だんぺん}——"
      - type: narration
        text: "ココチのノートと{書|か}き{換|か}え{箇所|かしょ}の{筆跡|ひっせき}が{類似|るいじ}。"
      - type: sprite
        character: karada
        expression: worried
        position: right
      - type: dialog
        character: karada
        text: "ぼくだって、このポスターで{本当|ほんとう}にいいのか{疑問|ぎもん}だった。{自分|じぶん}でも「いやだ」って{言|い}えるか{不安|ふあん}だったんだ。"
        expression: worried
      - type: sprite
        character: karada
        action: hide
      - type: sprite
        character: mamoru
        expression: worried
        position: left
      - type: dialog
        character: mamoru
        text: "わたしもVol.4で{同意|どうい}を{取|と}らなかった{場面|ばめん}があった。ポスターに「{同意|どうい}を{取|と}ろう」って{書|か}いたけど、{自分|じぶん}ができてなかった……。"
        expression: worried
      - type: sprite
        character: mamoru
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "{筆跡|ひっせき}の{証拠|しょうこ}とポスターへの{疑問|ぎもん}——{全員|ぜんいん}がポスターの{限界|げんかい}に{薄々|うすうす}気づいていた。そしてポスターを{書|か}き{換|か}えたのは……？"

  # ==================== 調査：各キャラの後ろめたさ ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 全員の後ろめたさ
      - type: sprite
        character: kizuna
        expression: worried
        position: right
      - type: dialog
        character: kizuna
        text: "ナツミが「このポスター、{読|よ}んでもどうしたらいいか{分|わ}からない」って{言|い}ってた。でも「ポスターがあるから{大丈夫|だいじょうぶ}」って{思|おも}っちゃったの……。"
        expression: worried
      - type: sprite
        character: kizuna
        action: hide
      - type: sprite
        character: kokochi
        expression: worried
        position: left
      - type: dialog
        character: kokochi
        text: "ナツミが「{分|わ}からない」って{言|い}ってたのを{聞|き}いた。「いやだ」と{言|い}う{権利|けんり}があっても……{言|い}える{場所|ばしょ}がなければ、{意味|いみ}がないんじゃないかって。"
        expression: thinking
      - type: sprite
        character: kokochi
        action: hide
      - type: narration
        text: "{筆跡|ひっせき}はココチに{類似|るいじ}している。ナツミの{言葉|ことば}を{聞|き}いたのはキズナとココチ。{全員|ぜんいん}がポスターへの{不安|ふあん}を{感|かん}じていた——でも{行動|こうどう}したのは{誰|だれ}だ？"

  # ==================== 推理・投票（第1層：犯人特定） ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: ポスターを書き換えた犯人は誰だ？
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "4{人|にん}の{中|なか}でポスターを{書|か}き{換|か}えた{人|ひと}がいる。{証拠|しょうこ}を{整理|せいり}して、{犯人|はんにん}を{見|み}つけよう。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{筆跡|ひっせき}はカラダではなくココチに{類似|るいじ}。ナツミの「{言|い}える{場所|ばしょ}がない」を{知|し}っていたのはキズナとココチ。{書|か}き{換|か}えられたのはカラダの{担当|たんとう}パート。{動機|どうき}と{機会|きかい}を{持|も}つのは？"
      - type: choice
        id: q1
        question: からだの権利ポスターを書き換えたのは誰？
        options:
          - text: ココチ（筆跡が類似＋ナツミをかばう動機＋ポスターへの疑問）
            value: kokochi
            correct: true
            feedback: "{正解|せいかい}！ ココチはナツミの「{言|い}える{場所|ばしょ}がない」をかばいたかった。そしてポスターに「{権利|けんり}がある」と{書|か}くだけでは{不十分|ふじゅうぶん}だと{気|き}づいていた。{勝手|かって}に{書|か}き{換|か}えたのは{問題|もんだい}だけど、ココチの{問|と}いかけは{大事|だいじ}——「{権利|けんり}がある」と「{権利|けんり}を{使|つか}える」は{違|ちが}うんだ。"
          - text: カラダ（担当パートだから）
            value: karada
            feedback: "カラダは{担当|たんとう}パートだが{筆跡|ひっせき}が{違|ちが}う。ポスターへの{疑問|ぎもん}は{感|かん}じていたが{書|か}き{換|か}えてはいない。"
          - text: マモル（同意を取らなかった後ろめたさがある）
            value: mamoru
            feedback: "マモルは{自分|じぶん}の{実践|じっせん}の{後|うし}ろめたさを{感|かん}じていたが、ポスターは{書|か}き{換|か}えていない。{筆跡|ひっせき}も{一致|いっち}しない。"
          - text: キズナ（ナツミの発言を聞いていた）
            value: kizuna
            feedback: "キズナはナツミの{発言|はつげん}を{聞|き}いていたが{深|ふか}く{考|かんが}えなかった{側|がわ}。{筆跡|ひっせき}もポスターを{書|か}き{換|か}えた{証拠|しょうこ}もない。"

  # ==================== 証拠カード5：パラダイムシフト（q1の後） ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: ナツミの言葉とシステムの穴
      - type: effect
        name: fade-in
      - type: sprite
        character: kokochi
        expression: determined
        position: center
      - type: dialog
        character: kokochi
        text: "……{正直|しょうじき}に{話|はな}す。ポスターを{書|か}き{換|か}えたのは、わたしです。"
        expression: worried
      - type: dialog
        character: kokochi
        text: "ナツミが「このポスター、{読|よ}んでもどうしたらいいか{分|わ}からない」って{言|い}ってた。ナツミはもう{一度|いちど}、{友|とも}だちに{嫌|いや}なことをされたとき「いやだ」って{言|い}えなかったんだ。"
        expression: worried
      - type: dialog
        character: kokochi
        text: "ポスターに「いやだと{言|い}う{権利|けんり}がある」って{書|か}いてあっても……ナツミには「{言|い}える{場所|ばしょ}」がなかった。かばいたかった。でもそれだけじゃない——ポスターに「{権利|けんり}がある」って{書|か}いても、「{言|い}える{場所|ばしょ}」がなかったらダメだって{思|おも}ったんだ。"
        expression: determined
      - type: sprite
        character: kokochi
        action: hide
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "【{証拠|しょうこ}カード5】「NO」が{通|とお}る{仕組|しく}みの{現状|げんじょう}——{相談窓口|そうだんまどぐち}（{保健室|ほけんしつ}はあるが{気軽|きがる}に{行|い}けない）。クラスのルール（「{嫌|いや}と{言|い}っていい」は{口約束|くちやくそく}だけ）。{信頼|しんらい}できる{大人|おとな}（{誰|だれ}に{言|い}えばいいか{全員|ぜんいん}が{知|し}っているわけではない）。クラスの{文化|ぶんか}（「{嫌|いや}と{言|い}ったら{空気|くうき}が{壊|こわ}れる」{雰囲気|ふんいき}がまだある）。"
      - type: sprite
        character: karada
        expression: surprised
        position: left
      - type: dialog
        character: karada
        text: "{権利|けんり}を{知|し}ることと、{権利|けんり}を{使|つか}えることは{違|ちが}う——ぼくもそれを{感|かん}じてた。ぼくだってVol.2で「いやだ」って{言|い}えなかったから。"
        expression: worried
      - type: sprite
        character: karada
        action: hide
      - type: sprite
        character: mamoru
        expression: thinking
        position: right
      - type: dialog
        character: mamoru
        text: "ポスターだけじゃ{足|た}りない。{仕組|しく}みがないと{個人|こじん}の{力|ちから}では{限界|げんかい}がある——{相談先|そうだんさき}、ルール、{信頼|しんらい}できる{大人|おとな}、クラスの{文化|ぶんか}、{全部|ぜんぶ}{必要|ひつよう}なんだ。"
        expression: thinking
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: kizuna
        expression: worried
        position: left
      - type: dialog
        character: kizuna
        text: "「ポスターがあるから{大丈夫|だいじょうぶ}」って{思|おも}っちゃってた……{仕組|しく}みを{作|つく}るのもみんなの{力|ちから}。わたしも{気|き}づけてなかった。"
        expression: worried
      - type: sprite
        character: kizuna
        action: hide

  # ==================== 振り返り：第2層投票（正解なし） ====================
  - id: reflection
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 第2の問い
        subtitle: 本当に安全なクラスにするには？
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "みんなはからだの{権利|けんり}ポスターを{作|つく}った。でもポスターに「{権利|けんり}がある」って{書|か}いてあれば{守|まも}られるかな？ {本当|ほんとう}にみんなの「NO」が{安全|あんぜん}に{通|とお}るクラスにするには、{何|なに}が{必要|ひつよう}だろう？"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: choice
        id: q2
        question: 「NO」が安全に通るクラスにするために一番大事なことは何？
        options:
          - text: A：ポスターを正確に作って掲示すること
            value: A
            feedback: "ポスターは{大事|だいじ}。でもポスターだけでは「{権利|けんり}を{使|つか}える{場所|ばしょ}」にはならない。ナツミの{経験|けいけん}がそれを{教|おし}えてくれた。"
          - text: B：1人1人が「NO」と言える勇気を持つこと
            value: B
            feedback: "{勇気|ゆうき}は{大切|たいせつ}。でもVol.2やVol.7で{学|まな}んだように、「{言|い}えない{構造|こうぞう}」があると{勇気|ゆうき}だけでは{足|た}りない{場面|ばめん}がある。"
          - text: C：「NO」が通る仕組み（相談先・ルール・信頼できる大人）を作ること
            value: C
            feedback: "{仕組|しく}みは{重要|じゅうよう}。{相談先|そうだんさき}、ルール、{信頼|しんらい}できる{大人|おとな}、クラスの{文化|ぶんか}——これがあれば「NO」は{届|とど}きやすくなる。"
          - text: D：全部が必要。「個人のNO」と「クラスの仕組み」の両方があって初めて権利が守られる
            value: D
            feedback: "{個人|こじん}の「NO」と、クラスの「{仕組|しく}み」。{両方|りょうほう}があって{初|はじ}めて{身体|からだ}の{権利|けんり}が{守|まも}られる——Vol.1-10で{学|まな}んだことの{全|すべ}てがここにつながっている。"

  # ==================== 真実：ココチの告白 ====================
  - id: truth-kokochi
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ココチの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: kokochi
        expression: worried
        position: center
      - type: dialog
        character: kokochi
        text: "……ポスターを{書|か}き{換|か}えたのは、わたしです。ごめんなさい。"
        expression: worried
      - type: dialog
        character: kokochi
        text: "ナツミが「このポスター、{読|よ}んでもどうしたらいいか{分|わ}からない」って{言|い}っていた。ナツミは{前|まえ}に「いやだ」って{言|い}えなかった{経験|けいけん}がある。ポスターに「{権利|けんり}がある」って{書|か}いてあっても、{現実|げんじつ}には「{言|い}える{場所|ばしょ}」がなかった。"
        expression: thinking
      - type: dialog
        character: kokochi
        text: "かばいたかった。でもそれだけじゃない——「NO」と{言|い}う{権利|けんり}だけでは{足|た}りない。「NO」が{安全|あんぜん}に{通|とお}る{仕組|しく}み——{相談窓口|そうだんまどぐち}・ルール・{信頼|しんらい}できる{大人|おとな}・クラスの{文化|ぶんか}——が{必要|ひつよう}だって{気|き}づいたんだ。"
        expression: determined
      - type: dialog
