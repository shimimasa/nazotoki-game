scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "学級会でお楽しみ会の企画を決めることになった。"
      - type: narration
        text: "Aチームは「スポーツ大会」、Bチームは「工作会」を主張し対立。"
      - type: narration
        text: "先生の提案で「両方やる合体案」を採用したが、なぜか両チームともさらに怒り出した。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: kotoha
        expression: worried
        position: center
      - type: dialog
        character: kotoha
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: kotoha
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: nagi, expression: determined }
          - { id: hibiki, expression: thinking }
          - { id: miwa, expression: thinking }
          - { id: kotoha, expression: worried }
      - type: narration
        text: "「平和探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "平和探偵団"
        subtitle: "Vol.6 全員が勝つには"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: nagi
        expression: thinking
        position: left
      - type: dialog
        character: nagi
        text: "全探索表を完成させ、「合体案が利害を満たしていない」ことを論理的に証明する場面"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        expression: thinking
        position: right
      - type: dialog
        character: hibiki
        text: "Card 5後、「ちゃんと話を聞けばよかった」と気づく場面"
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        expression: thinking
        position: left
      - type: dialog
        character: miwa
        text: "立場」と「利害」の違いを図解し、利害の不一致を可視化する場面"
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        expression: worried
        position: right
      - type: dialog
        character: kotoha
        text: "Win-Win交渉を「全員が楽しい場所を作ること」として感情的に語る場面"
      - type: sprite
        character: kotoha
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「事件のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: nagi, expression: normal }
          - { id: hibiki, expression: normal }
          - { id: miwa, expression: normal }
          - { id: kotoha, expression: worried }
      - type: choice
        id: q1
        text: "事件のきっかけになった行動をしたのは誰？"
        options:
          - text: "ナギ"
            value: nagi
            correct: false
            feedback: "ナギは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "ヒビキ"
            value: hibiki
            correct: false
            feedback: "ヒビキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "ミワ"
            value: miwa
            correct: false
            feedback: "ミワは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - text: "コトハ"
            value: kotoha
            correct: true
            feedback: "コトハの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "動機は、#11 好奇心・楽観（軽率な提案） — ヒビキは「両方やれば両方が満足するはず」という楽観的な発想で合体案を推進した。しかしAチームが本当に欲しかったのは「達成感」（スポーツの勝ち負けのスリル）であり、Bチームが欲しかったのは「没頭時間」（静かに集中する時間）だった。「合体案」は立場（スポーツか工作か）は満たしたが、利害（達成感・没頭時間）は満たしていなかった。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        expression: worried
        position: center
      - type: dialog
        character: kotoha
        text: "Win-Win交渉を「全員が楽しい場所を作ること」として感情的に語る場面"
      - type: sprite
        character: kotoha
        expression: determined
      - type: dialog
        character: kotoha
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: kotoha
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 「立場（Position）」と「利害（Interest）」の違いを理解し、Win-Win交渉では利害の統合が重要であることを説明できる\n・**サブ**: 全探索スキル——AチームとBチームの「本当に必要なもの（利害）」を全て洗い出す"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: nagi, expression: happy }
          - { id: hibiki, expression: happy }
          - { id: miwa, expression: happy }
          - { id: kotoha, expression: happy }
      - type: narration
        text: "平和探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: nagi
        action: hide
      - type: sprite
        character: hibiki
        action: hide
      - type: sprite
        character: miwa
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
