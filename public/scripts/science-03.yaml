scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: science-lab
    bgm: science-03/opening
    steps:
      - type: narration
        text: "{学校|がっこう}の「いきものがかり」の4{人|にん}——ミドリ、タクミ、ヒナタ、アカリ。"
      - type: narration
        text: "4{人|にん}は{理科|りか}の{授業|じゅぎょう}で「モンシロチョウを{卵|たまご}から{成虫|せいちゅう}まで{育|そだ}てよう！」というプロジェクトに{取|と}り{組|く}んでいた。"
      - type: sprite_group
        characters:
          - { id: midori, expression: happy }
          - { id: takumi, expression: happy }
          - { id: hinata, expression: happy }
          - { id: akari, expression: happy }
      - type: narration
        text: "アカリが{花壇|かだん}で{見|み}つけた{卵|たまご}は、{無事|ぶじ}に{幼虫|ようちゅう}になり、さなぎになった。もうすぐ{成虫|せいちゅう}——チョウになるはず！"
      - type: sprite_group
        characters:
          - { id: midori, expression: normal }
          - { id: takumi, expression: normal }
          - { id: hinata, expression: normal }
          - { id: akari, expression: normal }
      - type: bgm
        action: stop
      - type: se
        sound: common/tension
      - type: narration
        speed: slow
        text: "ところが——10{日目|にちめ}の{朝|あさ}、{理科室|りかしつ}に{来|き}てみると……"
      - type: narration
        speed: slow
        text: "さなぎの{殻|から}はからっぽ。チョウの{姿|すがた}は、どこにもない。"
      - type: sprite_group
        characters:
          - { id: midori, expression: surprised }
          - { id: takumi, expression: worried }
          - { id: hinata, expression: surprised }
          - { id: akari, expression: worried }
      - type: narration
        text: "{観察|かんさつ}ケースのふたは{閉|し}まっている。チョウが{出|で}られるすき{間|ま}もない。なのに、チョウだけが{消|き}えた。"
      - type: sprite
        id: midori
        action: hide
      - type: sprite
        id: takumi
        action: hide
      - type: sprite
        id: hinata
        action: hide
      - type: sprite
        id: akari
        action: hide
      - type: sprite
        id: sensei
        position: center
        expression: thinking
      - type: bgm
        track: science-03/tension
      - type: dialog
        character: sensei
        text: "いったい{何|なに}が{起|お}きたのでしょう？ みんなの{力|ちから}で、このなぞを{解|と}き{明|あ}かしてください！"
      - type: sprite
        id: sensei
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "消えたモンシロチョウと4つの観察日記"
        subtitle: "サイエンス捜査班 Vol.3"

  # ===== 証拠カード1: さなぎ観察日記 =====
  - id: evidence-1
    bg: science-lab
    bgm: science-03/investigation
    steps:
      - type: effect
        name: fade-in
      - type: title_card
        text: "ステップ1：調査"
        subtitle: "証拠カード1 — さなぎ観察日記"
      - type: narration
        text: "さなぎになってからの{観察|かんさつ}{日記|にっき}を{表|ひょう}にまとめたものが{配|くば}られた。"
      - type: narration
        text: "1{日目|にちめ}——タクミの{記録|きろく}：「さなぎの{色|いろ}：きれいな{緑色|みどりいろ}」。アカリ：「さなぎになった！ きれいな{緑色|みどりいろ}！」"
      - type: narration
        text: "3{日目|にちめ}——タクミ：「{色|いろ}：{緑色|みどりいろ}。{変化|へんか}なし」。ミドリ：「{葉|は}の{状態|じょうたい}チェック」。"
      - type: narration
        text: "5{日目|にちめ}——タクミ：「{色|いろ}：{緑色|みどりいろ}。{変化|へんか}なし」。ミドリ：「{葉|は}に{少|すこ}し{枯|か}れが{見|み}え{始|はじ}め」。"
      - type: narration
        text: "7{日目|にちめ}、8{日目|にちめ}——タクミ：「{色|いろ}：{緑色|みどりいろ}。{変化|へんか}なし」。ミドリ：「{葉|は}がだいぶ{枯|か}れてきた」。"
      - type: se
        sound: common/discover
      - type: narration
        text: "9{日目|にちめ}——ミドリ：「{新|あたら}しい{葉|は}に{交換|こうかん}した」。タクミの{記録|きろく}は……{記録|きろく}なし。"
      - type: narration
        text: "10{日目|にちめ}（{今日|きょう}）——タクミは、また{記録|きろく}なし。アカリ：「チョウがいない！！」"
      - type: narration
        text: "タクミの9{日目|にちめ}と10{日目|にちめ}に「{記録|きろく}なし」が{続|つづ}いている。さなぎの{観察|かんさつ}{担当|たんとう}なのに、なぜ{記録|きろく}をつけなかったのだろう？"

  # ===== 証拠カード2: 理科室の気温記録 =====
  - id: evidence-2
    bg: science-lab
    steps:
      - type: title_card
        text: "証拠カード2 — 理科室の気温記録"
      - type: narration
        text: "さなぎになってからの10{日間|にちかん}の{気温|きおん}データが{配|くば}られた。"
      - type: narration
        text: "1{日目|にちめ}：24℃、2{日目|にちめ}：26℃、3{日目|にちめ}：26℃、4{日目|にちめ}：24℃、5{日目|にちめ}：24℃。"
      - type: narration
        text: "6{日目|にちめ}：28℃、7{日目|にちめ}：26℃、8{日目|にちめ}：26℃、9{日目|にちめ}：26℃、10{日目|にちめ}：24℃。"
      - type: se
        sound: common/discover
      - type: narration
        text: "さなぎの{期間中|きかんちゅう}、{気温|きおん}はずっと{約|やく}25℃だった。この{気温|きおん}データが、{何|なに}かのヒントになるかもしれない。"

  # ===== 証拠カード3: モンシロチョウの成長カレンダー =====
  - id: evidence-3
    bg: science-lab
    steps:
      - type: title_card
        text: "証拠カード3 — 成長カレンダー"
      - type: narration
        text: "{理科|りか}の{教科書|きょうかしょ}と{図鑑|ずかん}から{調|しら}べた{情報|じょうほう}だ。"
      - type: narration
        text: "モンシロチョウの{成長|せいちょう}は4{段階|だんかい}。{卵|たまご}（3〜5{日|にち}）→{幼虫|ようちゅう}（2〜3{週間|しゅうかん}）→さなぎ→{成虫|せいちゅう}。これを{完全変態|かんぜんへんたい}という。"
      - type: se
        sound: common/discover
      - type: narration
        text: "★{重要|じゅうよう}★ さなぎから{羽化|うか}までの{日数|にっすう}は{気温|きおん}で{変|か}わる。20℃なら{約|やく}14{日|にち}。25℃なら{約|やく}10{日|にち}。30℃なら{約|やく}7{日|にち}。"
      - type: narration
        text: "{気温|きおん}が{高|たか}いほど、{早|はや}く{羽化|うか}する！"
      - type: narration
        text: "★{重要|じゅうよう}★ {羽化|うか}の1〜2{日前|にちまえ}、さなぎの{色|いろ}が{変|か}わる。{緑色|みどりいろ}から{暗|くら}い{色|いろ}へ。{茶色|ちゃいろ}っぽく、{少|すこ}し{透明|とうめい}になる。{中|なか}でチョウの{体|からだ}ができている{証拠|しょうこ}だ。"
      - type: narration
        text: "さなぎになったのは1{日目|にちめ}（10{日前|にちまえ}）。{気温|きおん}は{約|やく}25℃。ということは——{羽化|うか}するのは{約|やく}10{日後|にちご}。つまり{今日|きょう}！"

  # ===== 証拠カード4: 観察ケースの調査メモ =====
  - id: evidence-4
    bg: science-lab
    bgm: science-03/experiment
    steps:
      - type: title_card
        text: "証拠カード4 — 観察ケースの調査メモ"
      - type: narration
        text: "{先生|せんせい}が{今朝|けさ}（10{日目|にちめ}）{調|しら}べた{結果|けっか}だ。"
      - type: narration
        text: "ケースのふたはきちんと{閉|し}まっていた。{側面|そくめん}に{割|わ}れやヒビはない。"
      - type: narration
        text: "{網|あみ}のふたのすき{間|ま}は{約|やく}2mm。チョウの{体幅|たいはば}は{約|やく}10mm。すき{間|ま}からは{絶対|ぜったい}に{出|で}られない。"
      - type: se
        sound: common/discover
      - type: narration
        text: "さなぎの{殻|から}は{上部|じょうぶ}がきれいに{割|わ}れている。{正常|せいじょう}な{羽化|うか}のあとだ。{殻|から}の{色|いろ}は{茶色|ちゃいろ}がかった{透明|とうめい}——{羽化|うか}{直前|ちょくぜん}の{色|いろ}の{変化|へんか}が{起|お}きていた{証拠|しょうこ}。"
      - type: narration
        text: "そして——{窓|まど}が{少|すこ}し{開|あ}いていた（{約|やく}15cm）。{昨日|きのう}の{放課後|ほうかご}、{先生|せんせい}が{確認|かくにん}したときは{閉|し}まっていたはず。"
      - type: narration
        text: "ケースのふたは{閉|し}まっているのに、チョウはいない。つまり——「{誰|だれ}かがふたを{開|あ}けて、また{閉|し}めた」としか{考|かんが}えられない。"

  # ===== 証言パート =====
  - id: testimony
    bg: science-lab
    bgm: science-03/investigation
    steps:
      - type: title_card
        text: "ステップ2：聞き取り"
      - type: narration
        text: "4{人|にん}のいきものがかりに、{話|はなし}を{聞|き}いてみよう。"
      - type: sprite
        id: midori
        position: left
        expression: normal
      - type: dialog
        character: midori
        text: "わたしは{植物|しょくぶつ}と{食草|しょくそう}の{世話|せわ}をしていたの。8{日目|にちめ}にキャベツの{葉|は}が{枯|か}れてきていたから、9{日目|にちめ}の{放課後|ほうかご}に{新|あたら}しい{葉|は}に{交換|こうかん}したわ。"
      - type: dialog
        character: midori
        expression: thinking
        text: "9{日目|にちめ}に{交換|こうかん}したとき、さなぎはまだ{殻|から}の{中|なか}にあった。{色|いろ}が{少|すこ}し{暗|くら}くなっていた{気|き}がするけど……はっきりとは{分|わ}からなかった。"
      - type: sprite
        id: midori
        action: hide
      - type: sprite
        id: takumi
        position: right
        expression: normal
      - type: dialog
        character: takumi
        text: "ぼくはさなぎの{観察|かんさつ}{担当|たんとう}。{毎日|まいにち}{色|いろ}と{形|かたち}を{記録|きろく}してたんだ。8{日目|にちめ}は「{緑色|みどりいろ}。{変化|へんか}なし」って{書|か}いたよ。"
      - type: dialog
        character: takumi
        expression: worried
        text: "9{日目|にちめ}は{記録|きろく}をつけられなかったんだ……。{今朝|けさ}は{早起|はやお}きして{来|き}たけど、ケースを{見|み}たら{殻|から}だけだった。"
      - type: sprite
        id: takumi
        action: hide
      - type: sprite
        id: hinata
        position: left
        expression: normal
      - type: dialog
        character: hinata
        text: "{幼虫|ようちゅう}のエサやりと{成長|せいちょう}{測定|そくてい}をやってたぜ。さなぎになってからは、おれの{仕事|しごと}はほぼ{終|お}わりだけどな。"
      - type: dialog
        character: hinata
        expression: thinking
        text: "{昨日|きのう}の{放課後|ほうかご}はサッカーの{練習|れんしゅう}があったから、{理科室|りかしつ}には{入|はい}ってない。{今朝|けさ}の{登校|とうこう}もいつも{通|どお}りだ。"
      - type: sprite
        id: hinata
        action: hide
      - type: sprite
        id: akari
        position: right
        expression: worried
      - type: dialog
        character: akari
        text: "わたしが{花壇|かだん}で{卵|たまご}を4{個|こ}{見|み}つけたのが{始|はじ}まりだったの。モンちゃんって{名前|なまえ}をつけて、{毎日|まいにち}{様子|ようす}を{見|み}に{来|き}てたんだ。"
      - type: dialog
        character: akari
        expression: worried
        text: "{昨日|きのう}は{午後|ごご}4{時半|じはん}ごろ、ミドリと{一緒|いっしょ}に{理科室|りかしつ}を{出|で}たの。モンちゃんが{無事|ぶじ}かどうか、とにかく{心配|しんぱい}……。"
      - type: sprite
        id: akari
        action: hide

  # ===== 証拠カード5: 正門の登校記録（ゲームチェンジャー） =====
  - id: evidence-5
    bg: school-gate
    bgm: science-03/tension
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "★新事実★"
        subtitle: "証拠カード5 — 正門の登校記録"
      - type: effect
        name: fade-in
      - type: narration
        text: "{学校|がっこう}の{正門|せいもん}にある{登校|とうこう}{記録|きろく}システムのデータが{届|とど}いた。"
      - type: narration
        text: "{今朝|けさ}（10{日目|にちめ}）、いきものがかりの4{人|にん}が{学校|がっこう}に{来|き}た{時刻|じこく}が{分|わ}かる。"
      - type: se
        sound: common/discover
      - type: narration
        text: "1{番|ばん}：タクミ——7:00。2{番|ばん}：ミドリ——7:25。3{番|ばん}：アカリ——7:30。4{番|ばん}：ヒナタ——7:35。"
      - type: se
        sound: common/tension
      - type: narration
        speed: slow
        text: "{先生|せんせい}が{理科室|りかしつ}を{確認|かくにん}したのは8:00。7:00〜7:25の{間|あいだ}、{理科室|りかしつ}のある{校舎|こうしゃ}にはタクミしかいなかった。"
      - type: narration
        text: "しかもタクミの{普段|ふだん}の{登校|とうこう}は7:20〜7:30ごろ。{今日|きょう}はいつもより20{分|ぷん}{以上|いじょう}{早|はや}い。なぜ？"

  # ===== 推理・投票 =====
  - id: questions
    bg: science-lab
    bgm: science-03/tension
    steps:
      - type: title_card
        text: "ステップ3：推理"
      - type: sprite
        id: sensei
        position: center
        expression: normal
      - type: dialog
        character: sensei
        text: "さあ、{証拠|しょうこ}がそろいました。みんなで{考|かんが}えてみましょう。"
      - type: sprite
        id: sensei
        action: hide
      - type: choice
        id: q1
        text: "チョウが{羽化|うか}したのは、いつだと{思|おも}う？"
        options:
          - text: "8日目の夜"
            feedback: "{気温|きおん}25℃でさなぎの{期間|きかん}は{約|やく}10{日|にち}。1{日目|にちめ}にさなぎになったから、{計算|けいさん}すると10{日目|にちめ}の{朝|あさ}がぴったりだね。"
          - text: "9日目の夜"
            feedback: "おしい！ {気温|きおん}25℃だと{約|やく}10{日|にち}。1{日目|にちめ}から{数|かぞ}えると、10{日目|にちめ}の{朝|あさ}が{羽化|うか}のタイミングだよ。"
          - text: "10日目の朝"
            feedback: "そのとおり！ {気温|きおん}25℃で{約|やく}10{日|にち}。1{日目|にちめ}から{数|かぞ}えると、{今日|きょう}の{朝|あさ}に{羽化|うか}するのが{自然|しぜん}なタイミングだね。"
      - type: choice
        id: q2
        text: "チョウを{逃|に}がしてしまったのは、{誰|だれ}だと{思|おも}う？"
        options:
          - text: "ミドリ"
            feedback: "ミドリは9{日目|にちめ}にケースを{開|あ}けたけど、そのときさなぎはまだ{殻|から}の{中|なか}にいたよ。{犯人|はんにん}は{別|べつ}にいるかも？"
          - text: "タクミ"
            feedback: "タクミは{今朝|けさ}7{時|じ}に{登校|とうこう}。いつもより20{分|ぷん}も{早|はや}い。7:00〜7:25の{間|あいだ}、{理科室|りかしつ}に1{人|り}でいられたね……。"
          - text: "ヒナタ"
            feedback: "ヒナタは{昨日|きのう}サッカーの{練習|れんしゅう}で{理科室|りかしつ}には{入|はい}っていないし、{今朝|けさ}は7:35{登校|とうこう}。{可能性|かのうせい}は{低|ひく}いかも。"
          - text: "アカリ"
            feedback: "アカリは{昨日|きのう}4{時半|じはん}にミドリと{一緒|いっしょ}に{出|で}ている。モンちゃんを{一番|いちばん}{大切|たいせつ}にしている{人|ひと}だよ。"

  # ===== 真実: タクミの告白 =====
  - id: truth-takumi
    bg: science-lab
    bgm: science-03/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: sprite
        id: sensei
        position: center
        expression: normal
      - type: dialog
        character: sensei
        text: "みんな、{調査|ちょうさ}おつかれさまでした。モンシロチョウが{消|き}えたなぞの{真相|しんそう}をお{話|はな}しします。"
      - type: sprite
        id: sensei
        action: hide
      - type: narration
        speed: slow
        text: "チョウを{逃|に}がしてしまったのは——タクミだった。"
      - type: sprite
        id: takumi
        position: center
        expression: worried
      - type: narration
        text: "タクミはさなぎの{観察|かんさつ}{担当|たんとう}。8{日目|にちめ}の{夕方|ゆうがた}、さなぎの{色|いろ}が{少|すこ}し{変|か}わり{始|はじ}めていることに{気|き}づいていた。"
      - type: narration
        text: "{図鑑|ずかん}で{調|しら}べると、さなぎの{色|いろ}が{変|か}わるのは{羽化|うか}の1〜2{日前|にちまえ}のサイン。「もうすぐチョウになる！ {羽化|うか}の{瞬間|しゅんかん}を{自分|じぶん}の{目|め}で{見|み}たい！」"
      - type: dialog
        character: takumi
        expression: worried
