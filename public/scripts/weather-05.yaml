meta:
  id: weather-05
  title: "雷のてがかり"
  series: "天気探偵団"
  volume: 5
  estimatedMinutes: 18

characters:
  sora:
    name: "ソラ"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  kazeru:
    name: "カゼル"
    color: "#FF4444"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  kumori:
    name: "クモリ"
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  amene:
    name: "アメネ"
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "林間学校の夜、急に雷が近づいてきた。"
      - type: narration
        text: "「あと何秒で雷が来るか」を4人が手分けして計算した。"
      - type: narration
        text: "ところがクモリが計算した「3秒で3km離れている」という結果を元に作った「避難タイミング表」に誤りが混入していることがわかった。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: kumori
        expression: worried
        position: center
      - type: dialog
        character: kumori
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: kumori
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: sora, expression: determined }
          - { id: kazeru, expression: thinking }
          - { id: kumori, expression: thinking }
          - { id: amene, expression: worried }
      - type: narration
        text: "「天気探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: kazeru
        action: hide
      - type: sprite
        character: kumori
        action: hide
      - type: sprite
        character: amene
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "天気探偵団"
        subtitle: "Vol.5 雷のてがかり"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "避難タイミング表"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、全員ためのヒントはどこにありそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "クモリのメモ"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、クモリのみためのヒントはどこにありそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "気象庁の雷接近基準"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、全員ためのヒントはどこにありそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "音が伝わる速度の参考資料"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、追加HO（全員）ためのヒントはどこにありそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "光と音の速度比較図"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、全員（GM配布）ためのヒントはどこにありそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: sora
        expression: thinking
        position: left
      - type: dialog
        character: sora
        text: "音速の計算式を使って「3秒×340m＝1020m」を示す場面"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: kazeru
        expression: thinking
        position: right
      - type: dialog
        character: kazeru
        text: "追加HOの音速データを全員に共有して仮説検証を促す場面"
      - type: sprite
        character: kazeru
        action: hide
      - type: sprite
        character: kumori
        expression: worried
        position: left
      - type: dialog
        character: kumori
        text: "怖かったから早く計算したかった」と認める場面"
      - type: sprite
        character: kumori
        action: hide
      - type: sprite
        character: amene
        expression: thinking
        position: right
      - type: dialog
        character: amene
        text: "怖いのは当然。でもだからこそ正しい知識が守ってくれる」とクモリに伝える場面"
      - type: sprite
        character: amene
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「事件のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: sora, expression: normal }
          - { id: kazeru, expression: normal }
          - { id: kumori, expression: normal }
          - { id: amene, expression: worried }
      - type: choice
        id: q1
        text: "事件のきっかけになった行動をしたのは誰？"
        options:
          - label: "ソラ"
            value: sora
            correct: false
            feedback: "ソラは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "カゼル"
            value: kazeru
            correct: false
            feedback: "カゼルは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "クモリ"
            value: kumori
            correct: true
            feedback: "クモリの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - label: "アメネ"
            value: amene
            correct: false
            feedback: "アメネは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: kazeru
        action: hide
      - type: sprite
        character: kumori
        action: hide
      - type: sprite
        character: amene
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、クモリ（曇）"
      - type: dialog
        character: sensei
        text: "動機は、#4 自分を守りたかった — 林間学校で雷が怖かったクモリは、「自分がパニックにならないために」計算をして「まだ遠い」と確認しようとした。しかし焦りの中で「秒数＝km数」という間違いを犯した。正しい計算は「音速（340m/秒）×秒数＝距離（m）」。3秒なら340×3＝1020m（約1km）であり、実際には3kmではなく1kmしか離れていなかった。クモリは「3km離れている（＝まだ安全）」という結論を出したかったがために、計算を「3秒→3km」と短絡させてしまった。この計算を根拠に避難を少し遅らせた判断が問題の発端。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kumori
        expression: worried
        position: center
      - type: dialog
        character: kumori
        text: "怖かったから早く計算したかった」と認める場面"
      - type: sprite
        character: kumori
        expression: determined
      - type: dialog
        character: kumori
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: kumori
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・雷が光ってから音が届くまでの時差を使って距離を計算できる（音速340m/秒を使用）。雷の仕組み（放電・大気中の電気の発生）を説明できる\n・「仮説を立てて検証する」スキルを体験する（「3秒＝3km説」vs「3秒×340m＝1020m説」を検証）"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: sora, expression: happy }
          - { id: kazeru, expression: happy }
          - { id: kumori, expression: happy }
          - { id: amene, expression: happy }
      - type: narration
        text: "天気探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: kazeru
        action: hide
      - type: sprite
        character: kumori
        action: hide
      - type: sprite
        character: amene
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
