scenes:
  # ========================================
  # プロローグ
  # ========================================
  - id: prologue
    bg: classroom
    bgm: time-travel-02/opening
    steps:
      - type: narration
        text: "{天正|てんしょう}10{年|ねん}（1582{年|ねん}）、{京都|きょうと}・{本能寺|ほんのうじ}。{天下統一|てんかとういつ}を{目指|めざ}す{最強|さいきょう}の{武将|ぶしょう}ノブナガ{殿|どの}が{泊|と}まっているお{寺|てら}だ。"

      - type: narration
        text: "{昨夜|さくや}は{宴会|えんかい}だった。ノブナガ{殿|どの}が「{天下|てんか}はもうすぐわしのものじゃ！」と{上機嫌|じょうきげん}で{語|かた}り、みんなで{祝|いわ}った。"

      - type: bgm
        action: stop

      - type: se
        sound: common/tension

      - type: effect
        name: shake
        duration: 400

      - type: narration
        speed: slow
        text: "ところが{今朝|けさ}——ノブナガ{殿|どの}が{大激怒|だいげきど}！ {殿|どの}の{部屋|へや}から{巻物|まきもの}「{天下|てんか}の{計|けい}」が{消|き}えた！"

      - type: bgm
        track: time-travel-02/tension

      - type: narration
        text: "この{巻物|まきもの}には、ノブナガ{殿|どの}の{天下統一|てんかとういつ}の{秘密|ひみつ}の{計画|けいかく}がぜんぶ{書|か}いてある。{超|ちょう}{大事|だいじ}なもの。"

      - type: sprite
        character: nobunaga
        expression: normal
        position: center

      - type: dialog
        character: nobunaga
        text: "{今|いま}すぐ{犯人|はんにん}を{見|み}つけ{出|だ}せ！ {見|み}つかるまで{誰|だれ}も{寺|てら}から{出|で}ることは{許|ゆる}さん！"

      - type: sprite
        character: nobunaga
        action: hide

      - type: sprite_group
        characters:
          - { id: ranmaru, expression: worried }
          - { id: mitsuhide, expression: thinking }
          - { id: nou, expression: surprised }
          - { id: enkai, expression: thinking }

      - type: narration
        text: "ランマル、ミツヒデ、ノウ{姫|ひめ}、エンカイ——4{人|にん}の{容疑者|ようぎしゃ}が{集|あつ}められた。"

      - type: sprite
        character: ranmaru
        action: hide
      - type: sprite
        character: mitsuhide
        action: hide
      - type: sprite
        character: nou
        action: hide
      - type: sprite
        character: enkai
        action: hide

      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        text: 本能寺の夜に何が起きた？
        subtitle: タイムトラベル探偵団 Vol.2

  # ========================================
  # 証拠カード1: 本能寺の見取り図
  # ========================================
  - id: evidence-1
    bg: classroom
    bgm: time-travel-02/investigation
    steps:
      - type: effect
        name: fade-in
        duration: 500

      - type: title_card
        text: ステップ1：調査
        subtitle: 巻物の手がかりを探せ

      - type: narration
        text: "{本能寺|ほんのうじ}の{見取|みと}り{図|ず}。ノブナガ{殿|どの}の{部屋|へや}と{鐘楼|しょうろう}は{渡|わた}り{廊下|ろうか}でつながっている。"

      - type: narration
        text: "ミツヒデの{部屋|へや}はノブナガ{殿|どの}の{部屋|へや}に{近|ちか}い。ランマルは{廊下|ろうか}で{警備|けいび}。ノウ{姫|ひめ}の{部屋|へや}はランマルの{反対側|はんたいがわ}。エンカイの{部屋|へや}は{鐘楼|しょうろう}のそば。"

      - type: se
        sound: common/discover

      - type: narration
        speed: slow
        text: "{巻物|まきもの}はノブナガ{殿|どの}の{部屋|へや}から{消|き}えた。{夜中|よなか}に{殿|どの}の{部屋|へや}に{近|ちか}づけたのは{誰|だれ}？"

  # ========================================
  # 証拠カード2: 巻物の目次
  # ========================================
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 巻物「天下の計」の目次

      - type: narration
        text: "ノブナガ{殿|どの}の{書棚|しょだな}から{見|み}つかった{目次|もくじ}のメモ——"

      - type: narration
        text: "一、{東国|とうごく}の{平定|へいてい}。二、{西国|さいごく}の{攻略|こうりゃく}。三、{南蛮|なんばん}{貿易|ぼうえき}の{拡大|かくだい}。四、{城下町|じょうかまち}の{整備|せいび}。"

      - type: effect
        name: flash
        duration: 400

      - type: narration
        speed: slow
        text: "五、{朝廷|ちょうてい}の{今後|こんご}——この{項目|こうもく}が{気|き}になるところ……。六、{天下統一|てんかとういつ}{後|ご}の{新秩序|しんちつじょ}。"

      - type: narration
        text: "「{朝廷|ちょうてい}の{今後|こんご}」——{天皇|てんのう}のまわりの{制度|せいど}をどうするつもりだったのか？ この{中身|なかみ}を{知|し}りたがる{人|ひと}がいるかもしれない。"

  # ========================================
  # 証拠カード3: タイムライン
  # ========================================
  - id: evidence-3
    bgm: time-travel-02/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 昨夜のタイムライン

      - type: narration
        text: "{夕方|ゆうがた}17{時|じ}ごろ——{宴会|えんかい}。ノブナガ{殿|どの}が{天下統一|てんかとういつ}の{決意|けつい}を{語|かた}る。{全員|ぜんいん}{参加|さんか}。"

      - type: narration
        text: "{夜|よる}21{時|じ}ごろ——{宴会|えんかい}{終了|しゅうりょう}。{各自|かくじ}{部屋|へや}に{戻|もど}る。ランマルは{廊下|ろうか}の{警備|けいび}につく。エンカイは{鐘楼|しょうろう}で{夜|よる}の{勤行|ごんぎょう}。"

      - type: narration
        text: "{深夜|しんや}——ランマルが{足音|あしおと}を{聞|き}く。ノブナガ{殿|どの}の{部屋|へや}{方向|ほうこう}に{向|む}かう{音|おと}。ミツヒデの{部屋|へや}がある{側|がわ}から。"

      - type: narration
        text: "{同|おな}じ{深夜|しんや}——エンカイが{渡|わた}り{廊下|ろうか}で{人影|ひとかげ}を{見|み}る。ノブナガ{殿|どの}の{部屋|へや}{方向|ほうこう}から{出|で}てくる{姿|すがた}。{足早|あしばや}に{去|さ}っていった。"

      - type: se
        sound: common/discover

      - type: narration
        speed: slow
        text: "ランマルの「{足音|あしおと}」は{部屋|へや}に{向|む}かう{音|おと}。エンカイの「{人影|ひとかげ}」は{部屋|へや}から{出|で}てくる{姿|すがた}。{同|おな}じ{人|ひと}？ それとも{別|べつ}の{人|ひと}？"

  # ========================================
  # 証拠カード4: 宴会での各人の様子
  # ========================================
  - id: evidence-4
    bgm: time-travel-02/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: 宴会での各人の様子

      - type: sprite
        character: ranmaru
        expression: worried
        position: left

      - type: dialog
        character: ranmaru
        text: "ぼくは{宴会|えんかい}でノブナガ{殿|どの}のそばで{給仕|きゅうじ}をしてました。とても{疲|つか}れていて……{夜|よる}の{警備|けいび}が{控|ひか}えていたので。"

      - type: sprite
        character: ranmaru
        action: hide

      - type: sprite
        character: mitsuhide
        expression: thinking
        position: right

      - type: dialog
        character: mitsuhide
        text: "わたしは{静|しず}かに{参加|さんか}しておりました。ノブナガ{殿|どの}の{天下統一|てんかとういつ}の{話|はなし}を{真剣|しんけん}に{聞|き}いていました。……{途中|とちゅう}で{少|すこ}し{席|せき}を{外|はず}しましたが。"

      - type: sprite
        character: mitsuhide
        action: hide

      - type: sprite
        character: nou
        expression: happy
        position: left

      - type: dialog
        character: nou
        text: "わたくしは{殿|どの}と{楽|たの}しくお{話|はなし}しておりました。{巻物|まきもの}のことを{聞|き}いたら、「{後|あと}で{見|み}せてやろう」とおっしゃっていましたわ。"

      - type: sprite
        character: nou
        action: hide

      - type: sprite
        character: enkai
        expression: thinking
        position: right

      - type: dialog
        character: enkai
        text: "わたしは{宴会|えんかい}の{端|はし}で{静|しず}かに{座|すわ}っておりました。お{酒|さけ}は{飲|の}まず{念仏|ねんぶつ}を。ノブナガ{殿|どの}の「{天下|てんか}」の{話|はなし}には……{複雑|ふくざつ}な{気持|きも}ちがありました。"

      - type: sprite
        character: enkai
        action: hide

      - type: narration
        text: "ミツヒデが「{席|せき}を{外|はず}した」のはなぜ？ ノウ{姫|ひめ}は{巻物|まきもの}に{興味|きょうみ}。エンカイの「{複雑|ふくざつ}な{気持|きも}ち」とは？ ランマルは{疲|つか}れていた——{夜|よる}の{警備|けいび}に{影響|えいきょう}した？"

  # ========================================
  # 投票（犯人投票）
  # ========================================
  - id: questions
    bg: classroom
    bgm: time-travel-02/tension
    steps:
      - type: sprite
        character: nobunaga
        expression: normal
        position: center

      - type: dialog
        character: nobunaga
        text: "{証拠|しょうこ}を{整理|せいり}せよ。{足音|あしおと}、{人影|ひとかげ}、{宴会|えんかい}の{様子|ようす}——{犯人|はんにん}は{誰|だれ}じゃ！"

      - type: sprite
        character: nobunaga
        action: hide

      - type: choice
        id: q1
        question: 巻物「天下の計」を持ち出したのは誰？
        options:
          - text: "ランマル（{廊下|ろうか}で{警備|けいび}していた）"
            value: ranmaru
            feedback: "ランマルはノブナガ{殿|どの}を{守|まも}る{立場|たちば}。{巻物|まきもの}を{盗|ぬす}む{動機|どうき}がない。それに、{足音|あしおと}はランマルの{位置|いち}からではなくミツヒデの{部屋|へや}{側|がわ}から{聞|き}こえたよ。"
          - text: "ミツヒデ（{席|せき}を{外|はず}し、{足音|あしおと}は{彼|かれ}の{部屋|へや}{側|がわ}から）"
            value: mitsuhide
            feedback: "{鋭|するど}い！ ミツヒデは{朝廷|ちょうてい}を{大切|たいせつ}にする{教養人|きょうようじん}。{巻物|まきもの}の「{朝廷|ちょうてい}の{今後|こんご}」に{何|なに}が{書|か}かれていたのか——それが{動機|どうき}のカギ。"
          - text: "ノウ{姫|ひめ}（{巻物|まきもの}に{興味|きょうみ}を{示|しめ}していた）"
            value: nou
            feedback: "ノウ{姫|ひめ}は{巻物|まきもの}に{興味|きょうみ}があった。でもエンカイが{見|み}た「{人影|ひとかげ}」は{部屋|へや}から「{出|で}てくる」{姿|すがた}。{盗|ぬす}んだ{人|ひと}なら{巻物|まきもの}を{持|も}って{別|べつ}の{方向|ほうこう}に{行|い}くはず。"
          - text: "エンカイ（{比叡山|ひえいざん}{焼|やき}き{討|うち}ちの{恨|うら}み）"
            value: enkai
            feedback: "エンカイには{恨|うら}みがある。でもエンカイは{鐘楼|しょうろう}で{勤行|ごんぎょう}していて、「{人影|ひとかげ}を{見|み}た」{側|がわ}。{暴力|ぼうりょく}を{否定|ひてい}する{信念|しんねん}の{持|も}ち{主|ぬし}でもある。"

  # ========================================
  # 証拠カード5: 鐘楼の調査結果
  # ========================================
  - id: evidence-5
    bg: classroom
    bgm: time-travel-02/investigation
    steps:
      - type: effect
        name: fade-out
        duration: 500

      - type: effect
        name: fade-in
        duration: 500

      - type: narration
        text: "ノブナガ{殿|どの}の{命令|めいれい}で{寺|てら}の{中|なか}を{隅|すみ}ずみまで{調査|ちょうさ}した{結果|けっか}——"

      - type: narration
        text: "{鐘楼|しょうろう}の{仏具棚|ぶつぐだな}から、{巻物|まきもの}を{包|つつ}んでいたと{思|おも}われる{布|ぬの}が{見|み}つかった。{布|ぬの}には{墨|すみ}の{跡|あと}がついていた。"

      - type: narration
        text: "{墨|すみ}は{乾|かわ}いていて{最近|さいきん}ついたものではない——{日常的|にちじょうてき}に{墨|すみ}を{使|つか}う{人|ひと}の{手|て}についていた{墨|すみ}が{移|うつ}ったもの。"

      - type: narration
        text: "さらに、ノブナガ{殿|どの}の{部屋|へや}から{鐘楼|しょうろう}へ{向|む}かう{渡|わた}り{廊下|ろうか}に、{点々|てんてん}と{砂|すな}が{落|お}ちていた。{砂|すな}の{跡|あと}はミツヒデの{部屋|へや}の{方角|ほうがく}から{鐘楼|しょうろう}に{向|む}かって{続|つづ}いている。"

      - type: se
        sound: common/discover

      - type: effect
        name: flash
        duration: 400

      - type: narration
        speed: slow
        text: "{墨|すみ}を{日常的|にちじょうてき}に{使|つか}う{人|ひと}は{誰|だれ}？ {書道|しょどう}や{書物|しょもつ}を{扱|あつか}う{教養人|きょうようじん}……。{砂|すな}の{跡|あと}はミツヒデの{部屋|へや}から{鐘楼|しょうろう}へ——。"

  # ========================================
  # 強制イベント: 使者到着！
  # ========================================
  - id: messenger
    bg: classroom
    bgm: time-travel-02/tension
    steps:
      - type: bgm
        action: stop

      - type: se
        sound: common/tension

      - type: effect
        name: shake
        duration: 600

      - type: narration
        speed: slow
        text: "ドンドンドン！——{突然|とつぜん}、{寺|てら}の{正門|せいもん}を{激|はげ}しく{叩|たた}く{音|おと}がした。"

      - type: bgm
        track: time-travel-02/tension

      - type: narration
        text: "{息|いき}を{切|き}らした{使者|ししゃ}が{飛|と}び{込|こ}んできた——"

      - type: narration
        speed: slow
        text: "「{大変|たいへん}です！ ミツヒデ{殿|どの}の{軍勢|ぐんぜい}が、{京都|きょうと}に{向|む}かっています！ {数千|すうせん}の{兵|へい}が、{夜通|よどお}し{行軍|こうぐん}しているとの{情報|じょうほう}です！」"

      - type: effect
        name: shake
        duration: 400

      - type: narration
        text: "ノブナガ{殿|どの}：「……なに？ ミツヒデの{軍|ぐん}が？ {京都|きょうと}に？ なぜじゃ！」"

      - type: wait
        duration: 2000

      - type: narration
        speed: slow
        text: "これが{本能寺|ほんのうじ}の{変|へん}の{始|はじ}まり。{天正|てんしょう}10{年|ねん}6{月|がつ}2{日|か}の{早朝|そうちょう}、{明智光秀|あけちみつひで}の{軍|ぐん}が{本能寺|ほんのうじ}を{取|と}り{囲|かこ}んだ。{歴史|れきし}の{教科書|きょうかしょ}にも{載|の}っている{大事件|だいじけん}の{前夜|ぜんや}に、きみたちはいるんだ。"

      - type: narration
        text: "{巻物|まきもの}の{盗難|とうなん}と、ミツヒデの{軍|ぐん}の{行動|こうどう}——この2つはつながっているのか？"

  # ========================================
  # 動機の質問
  # ========================================
  - id: motive
    bg: classroom
    bgm: time-travel-02/tension
    steps:
      - type: choice
        id: q2
        question: ミツヒデはなぜ巻物を持ち出した？
        options:
          - text: "{巻物|まきもの}に「{朝廷|ちょうてい}を{廃止|はいし}する」と{書|か}かれていたから"
            value: court
            feedback: "{正解|せいかい}！ ミツヒデは{朝廷|ちょうてい}と{天皇|てんのう}を{大切|たいせつ}にする{教養人|きょうようじん}。ノブナガ{殿|どの}が{天皇|てんのう}の{権威|けんい}をなくそうとしていると{知|し}り、{黙|だま}っていられなかった。"
          - text: "ノブナガ{殿|どの}の{秘密|ひみつ}を{敵|てき}に{売|う}ろうとした"
            value: betray
            feedback: "ミツヒデは{裏切|うらぎ}り{者|もの}ではない。{敵|てき}に{情報|じょうほう}を{売|う}るのではなく、「{日本|にほん}の{伝統|でんとう}を{守|まも}りたい」という{信念|しんねん}で{動|うご}いた。"
          - text: "{自分|じぶん}が{天下|てんか}を{取|と}るための{準備|じゅんび}"
            value: ambition
            feedback: "ミツヒデの{目的|もくてき}は{天下|てんか}を{取|と}ることではなかった。{朝廷|ちょうてい}と{天皇|てんのう}を{守|まも}ること——それがミツヒデの「{正義|せいぎ}」だった。"
          - text: "ノブナガ{殿|どの}への{個人的|こじんてき}な{恨|うら}み"
            value: grudge
            feedback: "ミツヒデはノブナガ{殿|どの}を{恨|うら}んでいたわけではない。{忠実|ちゅうじつ}な{家来|けらい}だった。でも「{日本|にほん}の{未来|みらい}」のためにやむを{得|え}ず{行動|こうどう}した。"

  # ========================================
  # 真実 — ランマル
  # ========================================
  - id: truth-ranmaru
    bg: classroom
    bgm: time-travel-02/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800

      - type: title_card
        text: 真実

      - type: effect
        name: fade-in
        duration: 500

      - type: sprite
        character: ranmaru
        expression: worried
        position: left

