scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "ことば探偵団 Vol.8"
        subtitle: "漢字の正体"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: normal
          - id: fumi
            expression: normal
          - id: yomi
            expression: normal
          - id: tsuzuri
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: kotoha
        expression: normal
        position: left
      - type: dialog
        character: kotoha
        text: "辞典には、「愛」の字源として「惜しむ心」「立ち止まって振り返る心」に近い説明が載っている。"
      - type: dialog
        character: kotoha
        text: "辞典には、「愛」の字源として「惜しむ心」「立ち止まって振り返る心」に近い説明が載っている。"
        expression: thinking
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        expression: normal
        position: right
      - type: dialog
        character: fumi
        text: "問題文には、はっきり「成り立ちについて説明しなさい」と書いてある。"
      - type: dialog
        character: fumi
        text: "問題文には、はっきり「成り立ちについて説明しなさい」と書いてある。"
        expression: thinking
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        expression: normal
        position: left
      - type: dialog
        character: yomi
        text: "ツヅリは「愛」という字を見た瞬間、今の意味や自分の感覚を強く思い浮かべていた。"
      - type: dialog
        character: yomi
        text: "ツヅリは「愛」という字を見た瞬間、今の意味や自分の感覚を強く思い浮かべていた。"
        expression: thinking
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        expression: normal
        position: right
      - type: dialog
        character: tsuzuri
        text: "あなたは「愛」と聞いて、やさしい気持ち、大切にする気持ちをすぐに思い浮かべた。"
      - type: dialog
        character: tsuzuri
        text: "あなたは「愛」と聞いて、やさしい気持ち、大切にする気持ちをすぐに思い浮かべた。"
        expression: thinking
      - type: sprite
        character: tsuzuri
        action: hide
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠1"
        subtitle: "### タイトル"
  - id: evidence-2
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠2"
        subtitle: "### タイトル"
      - type: narration
        text: "愛: いとしく思うこと"
      - type: narration
        text: "大切に思うこと"
      - type: narration
        text: "深く思いを寄せること"
  - id: evidence-3
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠3"
        subtitle: "### タイトル"
      - type: narration
        text: "「愛」は、心や手、ゆっくり進む動きに関わる形からできた字とされる"
      - type: narration
        text: "もとのイメージは「立ち止まって振り返る」「惜しむ心」に近い"
      - type: narration
        text: "今使う「愛情」「大切にする」の意味は、そこから広がってきた"
  - id: evidence-4
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠4"
        subtitle: "### タイトル"
      - type: narration
        text: "愛"
      - type: narration
        text: "字源カード: 惜しむ心、立ち止まって振り返る"
      - type: narration
        text: "語義カード: 大切にする、愛情"
      - type: narration
        text: "明"
      - type: narration
        text: "字源カード: 明るさを表す組み合わせ"
  - id: evidence-5
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: "証拠5"
        subtitle: "### タイトル"
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: kotoha
            expression: thinking
          - id: fumi
            expression: thinking
          - id: yomi
            expression: thinking
          - id: tsuzuri
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "コトハ"
            value: kotoha
            correct: false
            feedback: "コトハは手がかりを持っているが、決め手は足りない。"
          - text: "フミ"
            value: fumi
            correct: false
            feedback: "フミは手がかりを持っているが、決め手は足りない。"
          - text: "ヨミ"
            value: yomi
            correct: false
            feedback: "ヨミは手がかりを持っているが、決め手は足りない。"
          - text: "ツヅリ"
            value: tsuzuri
            correct: true
            feedback: "ツヅリの行動が、証拠といちばん一致している。"
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "ツヅリ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: tsuzuri
        expression: worried
        position: center
      - type: dialog
        character: tsuzuri
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: tsuzuri
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: happy
          - id: fumi
            expression: happy
          - id: yomi
            expression: happy
          - id: tsuzuri
            expression: happy
      - type: narration
        text: "ことば探偵団の学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
