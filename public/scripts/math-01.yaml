meta:
  id: math-01
  title: 消えたゴールドスターと4つのアリバイ
  series: 数字の迷宮
  volume: 1
  estimatedMinutes: 20

characters:
  hayaashi:
    name: ハヤアシ
    color: "#E91E63"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  nonbiri:
    name: ノンビリおばちゃん
    color: "#9C27B0"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-thinking.webp
      surprised: teacher-f-normal.webp
      determined: teacher-f-happy.webp
  kakedashi:
    name: カケダシ
    color: "#FF6B35"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  mamoru:
    name: マモル
    color: "#2E8B57"
    sprites:
      normal: boy-c-normal.webp
      happy: boy-c-happy.webp
      thinking: boy-c-thinking.webp
      worried: boy-c-worried.webp
      surprised: boy-c-surprised.webp
      determined: boy-c-determined.webp
  wonder:
    name: ワンダー園長
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: amusement-park
    bgm: math-01/opening
    steps:
      - type: narration
        text: "ワクワク{遊園地|ゆうえんち}——「{探偵|たんてい}フェスティバル」{開催|かいさい}中！"
      - type: narration
        text: "ジェットコースター、{観覧車|かんらんしゃ}、お{化|ば}け{屋敷|やしき}……今日は園内が大にぎわいだ。"
      - type: narration
        text: "そして{遊園地|ゆうえんち}のシンボル、{金色|きんいろ}に{輝|かがや}く「ゴールドスター・トロフィー」が{事務所|じむしょ}に{飾|かざ}られている。"
      - type: narration
        text: "ワンダーじいちゃんが30年前に手作りした、{遊園地|ゆうえんち}の{宝物|たからもの}——"
      - type: bgm
        action: stop
      - type: se
        sound: math-01/alarm
      - type: effect
        name: shake
        duration: 500
      - type: narration
        text: "{突然|とつぜん}、園内{放送|ほうそう}が{流|なが}れた。"
      - type: sprite
        character: wonder
        expression: normal
        position: center
      - type: bgm
        track: math-01/investigation
      - type: dialog
        character: wonder
        text: "大変だ～！ ゴールドスター・トロフィーが{事務所|じむしょ}から{消|き}えた！"
      - type: dialog
        character: wonder
        text: "{最後|さいご}に{確認|かくにん}したのは13時50分。{事務所|じむしょ}の{窓|まど}は{全部|ぜんぶ}しまっていた。{出入口|でいりぐち}から入った人の{犯行|はんこう}だ。"
        expression: thinking
      - type: dialog
        character: wonder
        text: "{探偵|たんてい}フェスティバルのみなさん、これは{本物|ほんもの}の{事件|じけん}です！ {犯人|はんにん}を見つけてください！"
        expression: normal
      - type: sprite
        character: wonder
        action: hide
      - type: narration
        text: "トロフィーが{消|き}えたのは13:50～14:20の{間|あいだ}。{犯行|はんこう}時間は{約|やく}30分——。"
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 数字の迷宮 Vol.1
        subtitle: 消えたゴールドスターと4つのアリバイ

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: amusement-park
    bgm: math-01/investigation
    steps:
      - type: narration
        text: "{事件|じけん}の時間に{遊園地|ゆうえんち}で{働|はたら}いていた4人のスタッフ。{全員|ぜんいん}が「自分は{事務所|じむしょ}にいなかった」と言っている。"
      - type: sprite
        character: hayaashi
        expression: normal
        position: left
      - type: dialog
        character: hayaashi
        text: "{私|わたし}はパークガイドのハヤアシ。ジェットコースター{担当|たんとう}です。"
      - type: dialog
        character: hayaashi
        text: "14:00ごろはジェットコースターのそばにいました。{歩|ある}く{速|はや}さは100m/{分|ぷん}です。"
        expression: thinking
      - type: sprite
        character: hayaashi
        action: hide
      - type: sprite
        character: nonbiri
        expression: normal
        position: right
      - type: dialog
        character: nonbiri
        text: "あたしは{観覧車|かんらんしゃ}のチケット売り場のノンビリだよ～。"
      - type: dialog
        character: nonbiri
        text: "ずっと{座|すわ}ってチケット売ってたさ。{歩|ある}くの{遅|おそ}いよ～、50m/{分|ぷん}くらいかねぇ。"
        expression: happy
      - type: sprite
        character: nonbiri
        action: hide
      - type: sprite
        character: kakedashi
        expression: happy
        position: left
      - type: dialog
        character: kakedashi
        text: "おれはアルバイトのカケダシ！ お{化|ば}け{屋敷|やしき}{担当|たんとう}です。"
      - type: dialog
        character: kakedashi
        text: "14:00ごろはお{化|ば}け{屋敷|やしき}にいたはず。{歩|ある}く{速|はや}さは100m/{分|ぷん}です。"
        expression: normal
      - type: sprite
        character: kakedashi
        action: hide
      - type: sprite
        character: mamoru
        expression: normal
        position: right
      - type: dialog
        character: mamoru
        text: "{私|わたし}は{警備員|けいびいん}のマモルです。フードコート{巡回|じゅんかい}{担当|たんとう}。"
      - type: dialog
        character: mamoru
        text: "時間には{正確|せいかく}です。{歩|ある}く{速|はや}さは100m/{分|ぷん}。{毎日|まいにち}{計測|けいそく}していますので{間違|まちが}いありません。"
        expression: thinking
      - type: sprite
        character: mamoru
        action: hide

  # ===== 証拠カード1: 遊園地の地図 =====
  - id: evidence-1
    bg: amusement-park
    bgm: math-01/experiment
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 計算で犯人を見つけろ！
      - type: sprite
        character: wonder
        expression: normal
        position: center
      - type: dialog
        character: wonder
        text: "まずは{遊園地|ゆうえんち}の地図を{確認|かくにん}しよう。道は{十字|じゅうじ}の形——どこに行くにも{事務所|じむしょ}を通る！"
      - type: sprite
        character: wonder
        action: hide
      - type: narration
        text: "{遊園地|ゆうえんち}の地図——{事務所|じむしょ}を中心に、4つの{施設|しせつ}が{十字|じゅうじ}に{配置|はいち}されている。"
      - type: narration
        text: "{北|きた}：ジェットコースター（ハヤアシ）……{事務所|じむしょ}から300m"
      - type: narration
        text: "{西|にし}：{観覧車|かんらんしゃ}（ノンビリおばちゃん）……{事務所|じむしょ}から200m"
      - type: narration
        text: "{南|みなみ}：お{化|ば}け{屋敷|やしき}（カケダシ）……{事務所|じむしょ}から500m"
      - type: narration
        text: "{東|ひがし}：フードコート（マモル）……{事務所|じむしょ}から400m"
      - type: se
        sound: common/discover
      - type: narration
        text: "この{距離|きょり}と{歩|ある}く{速|はや}さを使えば、{誰|だれ}が{事務所|じむしょ}を{往復|おうふく}できたか{計算|けいさん}できる！"

  # ===== 証拠カード2: 歩く速さデータ =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 歩く速さデータ
      - type: narration
        text: "{遊園地|ゆうえんち}では、スタッフ{全員|ぜんいん}の{歩|ある}く{速|はや}さを{計測|けいそく}している。園内は{走行|そうこう}{禁止|きんし}！"
      - type: narration
        text: "ハヤアシ……100m/{分|ぷん}（パークガイド。{歩|ある}き{慣|な}れている）"
      - type: narration
        text: "ノンビリおばちゃん……50m/{分|ぷん}（{他|ほか}の人の{半分|はんぶん}の{速|はや}さ！）"
      - type: narration
        text: "カケダシ……100m/{分|ぷん}（{元気|げんき}で足が{速|はや}い。でも園内は{走行|そうこう}{禁止|きんし}）"
      - type: narration
        text: "マモル……100m/{分|ぷん}（{毎日|まいにち}{計測|けいそく}。{正確|せいかく}な{数値|すうち}）"
      - type: narration
        text: "使う{公式|こうしき}はこれだ——「時間 ＝ {距離|きょり} ÷ {速|はや}さ」"

  # ===== 証拠カード3: 目撃情報 =====
  - id: evidence-3
    bgm: math-01/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 目撃情報——全員に「空白時間」がある！
      - type: narration
        text: "お客さんやスタッフの{目撃|もくげき}{証言|しょうげん}をまとめた。{全員|ぜんいん}に「いなかった時間」がある——"
      - type: sprite
        character: hayaashi
        expression: normal
        position: left
      - type: dialog
        character: hayaashi
        text: "{私|わたし}は14:00にジェットコースター前にいて、14:10にまた{確認|かくにん}されています。"
      - type: narration
        text: "ハヤアシの{空白|くうはく}時間：14:05～14:10の5{分間|ふんかん}、{姿|すがた}が見えなかった。"
      - type: sprite
        character: hayaashi
        action: hide
      - type: sprite
        character: nonbiri
        expression: normal
        position: right
      - type: dialog
        character: nonbiri
        text: "あたしは14:00にチケット売り場にいて、14:08にまた{確認|かくにん}されてるよ～。"
      - type: narration
        text: "ノンビリおばちゃんの{空白|くうはく}時間：14:02～14:08の6{分間|ふんかん}、{姿|すがた}が見えなかった。"
      - type: sprite
        character: nonbiri
        action: hide
      - type: sprite
        character: kakedashi
        expression: normal
        position: left
      - type: dialog
        character: kakedashi
        text: "おれは13:50にお{化|ば}け{屋敷|やしき}にいて、14:15にまた{確認|かくにん}されてます。"
      - type: narration
        text: "カケダシの{空白|くうはく}時間：13:55～14:15の20{分間|ふんかん}、{姿|すがた}が見えなかった。"
      - type: sprite
        character: kakedashi
        action: hide
      - type: sprite
        character: mamoru
        expression: normal
        position: right
      - type: dialog
        character: mamoru
        text: "{私|わたし}は14:08にフードコートにいて、14:17にまた{確認|かくにん}されています。"
      - type: narration
        text: "マモルの{空白|くうはく}時間：14:10～14:17の7{分間|ふんかん}、{姿|すがた}が見えなかった。"
      - type: sprite
        character: mamoru
        action: hide
      - type: se
        sound: common/discover
      - type: narration
        text: "{全員|ぜんいん}に{空白|くうはく}がある……{全員|ぜんいん}あやしい！ でも{計算|けいさん}すれば、{真実|しんじつ}が分かる。"

  # ===== 証拠カード4: 計算で検証 =====
  - id: evidence-4
    bgm: math-01/experiment
    steps:
      - type: title_card
        text: 証拠④
        subtitle: アリバイを計算で崩せ！
      - type: narration
        text: "{犯人|はんにん}は{空白|くうはく}時間の{間|あいだ}に、持ち場→{事務所|じむしょ}→持ち場を{往復|おうふく}したはず。{本当|ほんとう}にそれが{可能|かのう}だったか？"
      - type: narration
        text: "{計算|けいさん}の手順——"
      - type: narration
        text: "①{往復|おうふく}の{距離|きょり}を出す：{事務所|じむしょ}までの{距離|きょり} × 2"
      - type: narration
        text: "②{往復|おうふく}にかかる時間を出す：{往復|おうふく}の{距離|きょり} ÷ {歩|ある}く{速|はや}さ"
      - type: narration
        text: "③{比|くら}べる：かかる時間 ＞ {空白|くうはく}時間 → 間に合わない（シロ！）"
      - type: narration
        text: "かかる時間 ＜ {空白|くうはく}時間 → 間に合う（クロ！？）"
      - type: narration
        text: "さあ、4人{全員|ぜんいん}を{計算|けいさん}してみよう！"
      - type: narration
        text: "ハヤアシ：300m × 2 ＝ 600m。600 ÷ 100 ＝ 6{分|ぷん}。{空白|くうはく}は5{分|ぷん}。"
      - type: effect
        name: flash
        duration: 200
      - type: narration
        text: "6{分|ぷん} ＞ 5{分|ぷん}——間に合わない！ シロ！"
      - type: narration
        text: "ノンビリおばちゃん：200m × 2 ＝ 400m。400 ÷ 50 ＝ 8{分|ぷん}。{空白|くうはく}は6{分|ぷん}。"
      - type: effect
        name: flash
        duration: 200
      - type: narration
        text: "8{分|ぷん} ＞ 6{分|ぷん}——間に合わない！ シロ！"
      - type: narration
        text: "マモル：400m × 2 ＝ 800m。800 ÷ 100 ＝ 8{分|ぷん}。{空白|くうはく}は7{分|ぷん}。"
      - type: effect
        name: flash
        duration: 200
      - type: narration
        text: "8{分|ぷん} ＞ 7{分|ぷん}——間に合わない！ シロ！"
      - type: narration
        text: "カケダシ：500m × 2 ＝ 1000m。1000 ÷ 100 ＝ 10{分|ぷん}。{空白|くうはく}は20{分|ぷん}。"
      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: narration
        speed: slow
        text: "10{分|ぷん} ＜ 20{分|ぷん}——間に合う！！ {余|あま}り10{分|ぷん}でトロフィーを持ち出す時間もある！"
      - type: narration
        text: "{計算|けいさん}で{犯行|はんこう}が{可能|かのう}だったのは——カケダシだけ！"

  # ===== 投票 =====
  - id: questions
    bg: amusement-park
    bgm: math-01/tension
    steps:
      - type: sprite
        character: wonder
        expression: thinking
        position: center
      - type: dialog
        character: wonder
        text: "さあ{探偵団|たんていだん}、{計算|けいさん}{結果|けっか}が出たね。きみの{推理|すいり}を{聞|き}かせてくれ！"
      - type: sprite
        character: wonder
        action: hide
      - type: choice
        id: q1
        question: ゴールドスターを持ち出した犯人は誰？
        options:
          - text: ハヤアシ（ジェットコースター担当・空白5分）
            value: hayaashi
            feedback: ハヤアシの往復は600m÷100＝6分。でも空白は5分しかない。6分＞5分で間に合わないよ。
          - text: ノンビリおばちゃん（観覧車担当・空白6分）
            value: nonbiri
            feedback: ノンビリおばちゃんの往復は400m÷50＝8分。空白6分では間に合わない。足が遅いから余計にムリだね。
          - text: カケダシ（お化け屋敷担当・空白20分）
            value: kakedashi
            feedback: 正解！ 往復1000m÷100＝10分。空白20分あるから往復+犯行の時間も十分ある。計算で証明できた！
          - text: マモル（フードコート担当・空白7分）
            value: mamoru
            feedback: マモルの往復は800m÷100＝8分。空白は7分。8分＞7分で間に合わないよ。
      - type: narration
        text: "{往復|おうふく}にかかる時間より{空白|くうはく}時間が{長|なが}いのは……{誰|だれ}だった？"
      - type: choice
        id: q2
        question: 犯人だと思う根拠は？
        options:
          - text: 空白時間が一番長いから
            value: longest-gap
            feedback: 空白時間が長いのは事実。でも大事なのは「往復時間と比べて間に合うか」の計算だよ。
          - text: 往復10分 ＜ 空白20分で、唯一犯行が可能だから
            value: calculation
            feedback: 完璧な根拠！ 「距離÷速さ＝時間」の計算で物理的に可能だったのはカケダシだけ。これが算数の力だ。
          - text: 事務所から一番遠い場所にいたから
            value: distance
            feedback: 距離が遠いのは事実だけど、それだけでは根拠にならない。大事なのは「往復時間＜空白時間」の計算だよ。
          - text: 歩く速さが速いから
            value: speed
            feedback: カケダシの速さは100m/分。でもハヤアシとマモルも同じ100m/分だよ。速さだけでは絞れない。

  # ===== 証拠カード5: 決定的証拠 =====
  - id: evidence-5
    bgm: math-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: 歩数計のデータが語る真実
      - type: sprite
        character: wonder
        expression: normal
        position: center
      - type: dialog
        character: wonder
        text: "もう1つ{証拠|しょうこ}がある。スタッフ{全員|ぜんいん}につけている{歩数計|ほすうけい}のデータだ！"
      - type: sprite
        character: wonder
        action: hide
      - type: narration
        text: "13:55～14:15の{歩数|ほすう}データ——"
      - type: narration
        text: "ハヤアシ：400{歩|ほ} × 0.7m ＝ 280m"
      - type: narration
        text: "ノンビリおばちゃん：320{歩|ほ} × 0.5m ＝ 160m"
      - type: narration
        text: "マモル：500{歩|ほ} × 0.8m ＝ 400m"
      - type: narration
        text: "カケダシ：1600{歩|ほ} × 0.7m ＝ ……"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "1120m！"
      - type: narration
        text: "お{化|ば}け{屋敷|やしき}に「ずっといた」なら、20{分間|ふんかん}で1120mも{歩|ある}くはずがない。"
      - type: narration
        text: "お{化|ば}け{屋敷|やしき}と{事務所|じむしょ}の{往復|おうふく}は500m × 2 ＝ 1000m。1120mとほぼ{一致|いっち}！"
      - type: narration
        text: "{残|のこ}りの120mは{事務所|じむしょ}の中を{歩|ある}き回った分……。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "さらに——お{化|ば}け{屋敷|やしき}のステージ{裏|うら}にある{秘密|ひみつ}の{倉庫|そうこ}から、タオルに{包|つつ}まれたゴールドスター・トロフィーが見つかった！"
      - type: narration
        text: "この{倉庫|そうこ}の{場所|ばしょ}を知っているのは、お{化|ば}け{屋敷|やしき}{担当|たんとう}のカケダシだけ。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: amusement-park
    bgm: math-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: みんなの秘密、そしてカケダシの想い
      - type: effect
        name: fade-in
        duration: 600

  # ハヤアシの秘密
  - id: truth-hayaashi
    bg: amusement-park
    steps:
      - type: sprite
        character: hayaashi
        expression: worried
        position: left
      - type: dialog
        character: hayaashi
        text: "……{正直|しょうじき}に言います。5{分間|ふんかん}、ジェットコースターの{裏|うら}でスマホを見てました。"
      - type: dialog
        character: hayaashi
        text: "ちょっとSNSをチェックしてたんです。サボりがバレたら{園長|えんちょう}に{怒|おこ}られるから{黙|だま}ってました。"
        expression: worried
      - type: dialog
        character: hayaashi
