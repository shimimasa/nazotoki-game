            value: karina
            correct: false
            feedback: "カリナは手がかりを持っているが、決め手は足りない。"
          - text: "ミノリ"
            value: minori
            correct: false
            feedback: "ミノリは手がかりを持っているが、決め手は足りない。"
          - text: "タネ"
            value: tane
            correct: false
            feedback: "タネは手がかりを持っているが、決め手は足りない。"
          - text: "ツチ"
            value: tsuchi
            correct: true
            feedback: "ツチの行動が、証拠といちばん一致している。"
      - type: sprite
        character: karina
        action: hide
      - type: sprite
        character: minori
        action: hide
      - type: sprite
        character: tane
        action: hide
      - type: sprite
        character: tsuchi
        action: hide
