      - type: choice
        id: q1
        question: 報告を遅らせたのは誰？
        options:
          - text: イノリ（月曜朝に見つけたのに火曜まで報告を遅らせた）
            value: inori
            correct: true
            feedback: "{正解|せいかい}！ イノリは{月曜|げつよう}{朝|あさ}に{足|あし}あとを{見|み}つけていた。でも{自分|じぶん}で{分析|ぶんせき}を{まとめて|まとめて}から「{最初|さいしょ}に{解決|かいけつ}した{人|ひと}」として{褒|ほ}められたくて、{報告|ほうこく}を{火曜|かよう}まで{遅|おく}らせた。その1{日|にち}で{農園|のうえん}の{被害|ひがい}が{広|ひろ}がってしまった。"
          - text: カケル（被害拡大を気にしていた）
            value: kakeru
            feedback: "カケルは{被害|ひがい}の{広|ひろ}がりを{心配|しんぱい}していた{行動型|こうどうがた}。{月曜|げつよう}{朝|あさ}に{畑|はたけ}で{写真|しゃしん}を{撮|と}っているのを{目撃|もくげき}されたのはイノリだよ。"
          - text: シズク（月曜朝の情報がないことに最初から気づいていた）
            value: shizuku
            feedback: "シズクは「{月曜|げつよう}{朝|あさ}の{情報|じょうほう}がない」という{欠落|けつらく}に{気|き}づいた{観察型|かんさつがた}。{写真|しゃしん}の{地面|じめん}の{矛盾|むじゅん}も{指摘|してき}した。{報告|ほうこく}を{遅|おく}らせたのはシズクではないよ。"
          - text: ミコト（イノリを責めたくなくて目撃を隠していた）
            value: mikoto
            feedback: "ミコトは{月曜|げつよう}{朝|あさ}にイノリを{目撃|もくげき}した{感情型|かんじょうがた}。{目撃|もくげき}を{話|はな}すのを{躊躇|ちゅうちょ}していたけど、{報告|ほうこく}を{遅|おく}らせたのはイノリだよ。"

