      - type: narration
        text: "イノリの{報告|ほうこく}——「{火曜日|かようび}{朝|あさ}に{足|あし}あとを{見|み}つけた。すぐ{写真|しゃしん}を{撮|と}った。」"
      - type: narration
        text: "{写真|しゃしん}には{足|あし}あとが{詳|くわ}しく{撮|と}られている。{角度|かくど}を{変|か}えた3{枚|まい}の{写真|しゃしん}。{分析|ぶんせき}メモも{添付|てんぷ}されていて、タヌキと{断定|だんてい}する{根拠|こんきょ}が{丁寧|ていねい}に{書|か}かれている。"
      - type: sprite
        character: shizuku
        expression: thinking
        position: right
      - type: dialog
        character: shizuku
        text: "これだけ{詳|くわ}しい{分析|ぶんせき}メモを{火曜|かよう}{朝|あさ}だけで{書|か}けるの？ {少|すこ}しおかしい。それに——「{火曜|かよう}{朝|あさ}に{見|み}つけた」なら、{月曜|げつよう}{朝|あさ}の{情報|じょうほう}がないのはなぜ？"
        expression: thinking
      - type: sprite
        character: shizuku
        action: hide
      - type: narration
        text: "シズクが{核心|かくしん}をついた。{月曜日|げつようび}{朝|あさ}には{既|すで}に{足|あし}あとがあったはず——なのに{月曜|げつよう}{朝|あさ}の{情報|じょうほう}が{完全|かんぜん}に{欠|か}けている。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
