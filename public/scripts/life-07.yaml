        text: "イノリの{分析|ぶんせき}は{正|ただ}しかった。タヌキと{特定|とくてい}できた。でも{月曜|げつよう}{朝|あさ}に{見|み}つけていたなら、なぜ1{日|にち}{遅|おく}らせた？ その1{日|にち}で{被害|ひがい}が{広|ひろ}がったのに。"
