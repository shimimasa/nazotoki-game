      - type: narration
        text: "{月曜|げつよう}{朝|あさ}、イノリは{畑|はたけ}にいた。そして{写真|しゃしん}を{撮|と}っていた——「{火曜|かよう}{朝|あさ}に{気|き}づいた」という{報告|ほうこく}と{全|まった}く{一致|いっち}しない！"
      - type: sprite
        character: mikoto
        expression: worried
        position: left
      - type: dialog
        character: mikoto
        text: "……{実|じつ}は、{月曜|げつよう}{朝|あさ}にイノリが{農園|のうえん}で{しゃがんで|しゃがんで}いるのを{見|み}た。{声|こえ}はかけなかったけど——{写真|しゃしん}を{撮|と}っているように{見|み}えた。"
