        text: "{写真|しゃしん}の{地面|じめん}は{湿|しめ}っている。{火曜|かよう}{朝|あさ}の{晴|は}れた{状態|じょうたい}とは{全然|ぜんぜん}{違|ちが}う！ これは{月曜|げつよう}{朝|あさ}の{雨上|あめあ}がりの{地面|じめん}だ。{写真|しゃしん}は{月曜日|げつようび}に{撮|と}られたのに、「{火曜|かよう}{朝|あさ}に{見|み}つけた」と{言|い}っている！"
        expression: determined
      - type: sprite
        character: shizuku
        action: hide
      - type: narration
        text: "{決定的|けっていてき}な{矛盾|むじゅん}が{見|み}えた。{写真|しゃしん}の{地面|じめん}は{月曜|げつよう}{朝|あさ}の{状態|じょうたい}を{示|しめ}している。イノリは{月曜|げつよう}{朝|あさ}に{既|すで}に{足|あし}あとを{見|み}つけて{写真|しゃしん}を{撮|と}っていた——のに{報告|ほうこく}しなかった。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 目撃メモ
      - type: effect
        name: fade-in
      - type: narration
        text: "GMが{新|あたら}しい{手|て}がかりを{発表|はっぴょう}した。{決定的|けっていてき}な{目撃情報|もくげきじょうほう}が{明|あ}らかになる——。"
      - type: se
        sound: discover
      - type: narration
        text: "{月曜日|げつようび}{朝|あさ}、{畑|はたけ}でイノリを{見|み}た{人|ひと}がいる。そのとき{写真|しゃしん}を{撮|と}っていたように{見|み}えた。"
