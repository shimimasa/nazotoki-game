        text: "{月曜|げつよう}{朝|あさ}に{分|わ}かっていれば、{柵|さく}を{追加|ついか}したりネットを{張|は}ったりして{被害|ひがい}を{止|と}められたかもしれない。1{日|にち}{遅|おく}れただけで、これだけ{被害|ひがい}が{広|ひろ}がった。"
        expression: worried
      - type: sprite
        character: kakeru
        action: hide
      - type: narration
        text: "{報告|ほうこく}が1{日|にち}{遅|おく}れたことで{被害|ひがい}が{広|ひろ}がった——この{事実|じじつ}は{重要|じゅうよう}だ。では{誰|だれ}が、{なぜ|なぜ}{報告|ほうこく}を{遅|おく}らせたのか？"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
