    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "{学校|がっこう}{農園|のうえん}でみんなが{育|そだ}てているミニトマトが{荒|あ}らされた。{月曜日|げつようび}の{朝|あさ}、{畑|はたけ}の{泥|どろ}の{上|うえ}に{動物|どうぶつ}の{足|あし}あとが{残|のこ}っていた。"
      - type: narration
        text: "「{何|なん}の{動物|どうぶつ}だろう？」{全員|ぜんいん}の{視線|しせん}が{足|あし}あとに{集|あつ}まる。でも——"
      - type: narration
        text: "ところが——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "「{火曜日|かようび}の{朝|あさ}に{気|き}づいた」というイノリの{報告|ほうこく}を{聞|き}いて、シズクの{眉|まゆ}がひそまった。{月曜|げつよう}{朝|あさ}の{情報|じょうほう}がない——なぜ？"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "ミニトマトが{荒|あ}らされた{足|あし}あとが{見|み}つかりました。{月曜日|げつようび}の{朝|あさ}から{足|あし}あとはあったはずなのに、{報告|ほうこく}があったのは{火曜日|かようび}。その{間|あいだ}、{畑|はたけ}では{何|なに}が{起|お}きていたのでしょう？"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: inori
            expression: worried
          - character: kakeru
            expression: surprised
          - character: shizuku
            expression: thinking
          - character: mikoto
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{足|あし}あとの{正体|しょうたい}を{探|さぐ}るだけでなく、「{報告|ほうこく}が{遅|おく}れた{理由|りゆう}」にも{謎|なぞ}が{潜|ひそ}んでいる——。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 足あとの謎
        subtitle: 生命探偵団 Vol.7

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 足あとメモを調べよう
      - type: narration
        text: "{畑|はたけ}の{泥|どろ}に{残|のこ}っていた{足|あし}あとを{詳|くわ}しく{観察|かんさつ}した。"
      - type: se
        sound: discover
      - type: narration
        text: "{足|あし}あとの{特徴|とくちょう}——4{本指|ほんゆび}。{前足|まえあし}と{後足|うしろあし}の{形|かたち}が{少|すこ}し{違|ちが}う。{爪|つめ}の{跡|あと}がはっきり{残|のこ}っている。"
      - type: narration
        text: "{足|あし}あとの{大|おお}きさは{約|やく}4センチメートル。{歩|ある}き{方|かた}は{交互|こうご}ではなく、{左右|さゆう}{対|たい}になっている。"
      - type: sprite
        character: inori
        expression: thinking
        position: left
      - type: dialog
        character: inori
        text: "4{本指|ほんゆび}で{前後|ぜんご}の{足|あし}の{形|かたち}が{違|ちが}って、{爪|つめ}の{跡|あと}がある。これはタヌキの{特徴|とくちょう}にとても{近|ちか}い。タヌキが{農園|のうえん}に{入|はい}ってミニトマトを{食|た}べたんだと{思|おも}う。"
        expression: determined
      - type: sprite
        character: inori
        action: hide
      - type: narration
        text: "イノリの{分析|ぶんせき}は{鋭|するど}い。{足|あし}あとの{特徴|とくちょう}からタヌキと{特定|とくてい}できそうだ。でも——「この{足|あし}あと、いつから{あった|あった}のだろう？」"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 被害メモを調べよう
      - type: narration
        text: "{月曜日|げつようび}と{火曜日|かようび}の{農園|のうえん}の{被害|ひがい}を{比|くら}べてみた。"
      - type: se
        sound: discover
      - type: narration
        text: "{月曜日|げつようび}{朝|あさ} —— ミニトマトが{数個|すうこ}{食|た}べられた{跡|あと}あり。{足|あし}あとが{泥|どろ}に{残|のこ}っている。"
      - type: narration
        text: "{火曜日|かようび}{朝|あさ} —— {月曜日|げつようび}より{多|おお}くの{実|み}が{食|た}べられていた。{被害|ひがい}が1{日|にち}で{広|ひろ}がった。"
      - type: sprite
        character: kakeru
        expression: worried
        position: right
      - type: dialog
