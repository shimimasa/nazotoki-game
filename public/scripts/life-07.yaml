      - type: narration
        text: "{月曜日|げつようび}の{朝|あさ}は{雨上|あめあ}がりで{地面|じめん}が{湿|しめ}っていた。{火曜日|かようび}の{朝|あさ}は{晴|は}れていて{地面|じめん}が{乾|かわ}いていた。"
