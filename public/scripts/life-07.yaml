      - type: sprite
        character: mikoto
        action: hide
      - type: narration
        text: "{証拠|しょうこ}が{揃|そろ}った。{写真|しゃしん}の{地面|じめん}は{月曜|げつよう}{朝|あさ}。{目撃情報|もくげきじょうほう}も{月曜|げつよう}{朝|あさ}。{発見|はっけん}から{報告|ほうこく}まで、1{日|にち}の{空白|くうはく}がある——。"

