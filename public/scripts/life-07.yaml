        character: inori
        text: "{写真|しゃしん}を{撮|と}って、メモを{書|か}いて、{証拠|しょうこ}を{揃|そろ}えた。でも……その{間|あいだ}に{被害|ひがい}が{広|ひろ}がってしまった。{知|し}っていたのに{伝|つた}えなかったのは、{僕|ぼく}が{悪|わる}かった。"
