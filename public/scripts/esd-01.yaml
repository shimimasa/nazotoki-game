meta:
  id: esd-01
  title: 川の汚れの謎
  series: ESD探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  haruki:
    name: ハルキ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  ibuki:
    name: イブキ
    color: "#E91E63"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  souta:
    name: ソウタ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  kana:
    name: カナ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: park
    bgm: esd-01/opening
    steps:
      - type: narration
        text: "あおば小学校の「川の{環境|かんきょう}{調査|ちょうさ}プロジェクト」。4人のチームがあおば川の{水質|すいしつ}を{調|しら}べている。"
      - type: narration
        text: "先週までは3{地点|ちてん}ともきれいな川だった。ところが——"
      - type: bgm
        action: stop
      - type: se
        sound: esd-01/river
      - type: effect
        name: shake
        duration: 400
      - type: sprite
        character: ibuki
        expression: worried
        position: left
      - type: dialog
        character: ibuki
        text: "大変！ {下流|かりゅう}の{地点|ちてん}Cの水がすごく{濁|にご}ってる！ 白っぽくて、{肥料|ひりょう}みたいな{臭|にお}いもする！"
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kana
        expression: surprised
        position: right
      - type: dialog
        character: kana
        text: "月曜・火曜は{正常|せいじょう}だったのに、水曜の午後から{急|きゅう}に変わった。メダカもオタマジャクシも{見当|みあ}たらない……。"
      - type: sprite
        character: kana
        action: hide
      - type: bgm
        track: esd-01/investigation
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "先週まで{正常|せいじょう}だった川が{急|きゅう}に{汚|よご}れた。どの{地点|ちてん}から{汚|よご}れが入ったか{突|つ}き{止|と}めよう。"
      - type: dialog
        character: sensei
        text: "{覚|おぼ}えておいて——水は{必|かなら}ず{上流|じょうりゅう}から{下流|かりゅう}に{流|なが}れる。{汚|よご}れは{発生|はっせい}{地点|ちてん}より{下流|かりゅう}だけに{広|ひろ}がる。"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: ESD探偵団 Vol.1
        subtitle: 川の汚れの謎

  # ===== 担当紹介 =====
  - id: suspects
    bg: park
    bgm: esd-01/investigation
    steps:
      - type: narration
        text: "あおば川の3{地点|ちてん}を{担当|たんとう}した4人に{報告|ほうこく}を{聞|き}こう。"
      - type: sprite
        character: haruki
        expression: normal
        position: left
      - type: dialog
        character: haruki
        text: "ぼくはハルキ。{地点|ちてん}A（{上流|じょうりゅう}）を{担当|たんとう}。pH 7.2、にごり{度|ど}2。{上流|じょうりゅう}は{正常|せいじょう}だった。"
      - type: sprite
        character: haruki
        action: hide
      - type: sprite
        character: souta
        expression: normal
        position: right
      - type: dialog
        character: souta
        text: "おれはソウタ。{地点|ちてん}B（{中流|ちゅうりゅう}）{担当|たんとう}。pH 6.3、にごり{度|ど}8。……ちょっと{悪|わる}かったかも。川{沿|ぞ}いに{野菜|やさい}{畑|ばたけ}があるよ。"
        expression: thinking
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: ibuki
        expression: worried
        position: left
      - type: dialog
        character: ibuki
        text: "わたしはイブキ。{地点|ちてん}C（{下流|かりゅう}）{担当|たんとう}。pH 5.8、にごり{度|ど}12。すごく{汚|よご}れてて、生き物がいなくなってた……。"
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kana
        expression: normal
        position: right
      - type: dialog
        character: kana
        text: "わたしはカナ。イブキと{一緒|いっしょ}に{地点|ちてん}Cの{記録|きろく}を{担当|たんとう}。月曜・火曜は{正常|せいじょう}だったのに水曜午後から{急変|きゅうへん}した。"
      - type: sprite
        character: kana
        action: hide

  # ===== 証拠カード1: 水質データ =====
  - id: evidence-1
    bg: park
    bgm: esd-01/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: 3地点の水質データ
      - type: narration
        text: "あおば川の木曜{測定|そくてい}データ——{正常|せいじょう}{範囲|はんい}はpH 6.5～8.5、にごり{度|ど}0～5。"
      - type: narration
        text: "{地点|ちてん}A（{上流|じょうりゅう}・ハルキ）：pH 7.2、にごり{度|ど}2 → {正常|せいじょう}"
      - type: narration
        text: "{地点|ちてん}B（{中流|ちゅうりゅう}・ソウタ）：pH 6.3、にごり{度|ど}8 → {異常|いじょう}！"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "{地点|ちてん}C（{下流|かりゅう}・イブキ/カナ）：pH 5.8、にごり{度|ど}12 → {深刻|しんこく}な{汚染|おせん}！"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "{地点|ちてん}Aは{正常|せいじょう}。{地点|ちてん}Bで{悪化|あっか}が{始|はじ}まり、{地点|ちてん}Cで{深刻化|しんこくか}。{汚染源|おせんげん}は{地点|ちてん}A～Bの{間|あいだ}にある！"

  # ===== 証拠カード2: 川周辺マップ =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 地点A～B間の施設
      - type: narration
        text: "{地点|ちてん}A～Bの{間|あいだ}にある3つの{施設|しせつ}——"
      - type: narration
        text: "❶{公園|こうえん}の{水洗|すいせん}トイレ（川から50m）→ {下水道|げすいどう}に{接続|せつぞく}{済|ず}み。川には{直接|ちょくせつ}{流|なが}れない"
      - type: narration
        text: "❷{農家|のうか}の{野菜|やさい}{畑|ばたけ}（川から5m！）→ フェンスで{仕切|しき}り。大雨で{浸水|しんすい}あり"
      - type: narration
        text: "❸小さな{工場|こうじょう}（川から30m）→ {排水|はいすい}は{処理|しょり}{施設|しせつ}を{通|とお}している。{検査|けんさ}{合格|ごうかく}{済|ず}み"
      - type: se
        sound: common/discover
      - type: narration
        text: "pHが下がって{肥料|ひりょう}のにおいがする——トイレや{工場|こうじょう}では{説明|せつめい}できない。"
      - type: narration
        speed: slow
        text: "川からわずか5mの{畑|はたけ}。大雨で{浸水|しんすい}することがある。ここが{最|もっと}も{怪|あや}しい。"

  # ===== 証拠カード3: 気象・現地記録 =====
  - id: evidence-3
    bgm: esd-01/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 大雨と水質悪化の時系列
      - type: narration
        text: "今週の{記録|きろく}——"
      - type: narration
        text: "月曜：{全|ぜん}{地点|ちてん}で{水質|すいしつ}{正常|せいじょう}"
      - type: narration
        text: "火曜午後：ソウタが{地点|ちてん}B・{畑|はたけ}{周辺|しゅうへん}を{調査|ちょうさ}。「雨が{降|ふ}りそうだった」"
      - type: narration
        text: "水曜 9:00～11:00：{記録|きろく}{的|てき}な大雨！ 2時間で68mm。川の{水位|すいい}が+20cm{上昇|じょうしょう}"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "水曜14:30：{地点|ちてん}Cで白い{濁|にご}りと{肥料|ひりょう}{臭|しゅう}を{確認|かくにん}"
      - type: narration
        text: "木曜：{全|ぜん}{地点|ちてん}を{再|さい}{測定|そくてい} → {地点|ちてん}B・Cに{異常|いじょう}"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "水曜朝の大雨の{後|あと}に{水質|すいしつ}が{悪化|あっか}した。「大雨 → 何かが川に{流|なが}れ{込|こ}んだ → {水質|すいしつ}{悪化|あっか}」の{順番|じゅんばん}。"

  # ===== 証拠カード4: 行動記録 =====
  - id: evidence-4
    bgm: esd-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: 火曜に畑にいたのは誰？
      - type: narration
        text: "4人の火曜～水曜の{行動|こうどう}——"
      - type: narration
        text: "ハルキ：火曜は{地点|ちてん}Aで{測定|そくてい}{後|ご}、{塾|じゅく}へ。水曜は大雨で家にいた。"
      - type: narration
        text: "イブキ：火曜は{地点|ちてん}Cで生き物{観察|かんさつ}。水曜午後に{地点|ちてん}Cで{異変|いへん}を{発見|はっけん}。"
      - type: narration
        text: "カナ：火曜はイブキと{地点|ちてん}Cで{記録|きろく}。水曜午後に「{上流|じょうりゅう}から{泡|あわ}が来てた」と{報告|ほうこく}。"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        speed: slow
        text: "ソウタ：火曜午後に{地点|ちてん}B・{畑|はたけ}{周辺|しゅうへん}を{調査|ちょうさ}。水曜は「大雨で{外出|がいしゅつ}しなかった」。"
      - type: sprite
        character: ibuki
        expression: thinking
        position: left
      - type: dialog
        character: ibuki
        text: "水曜14:30ごろ、{地点|ちてん}Cで{急|きゅう}に白っぽい{濁|にご}りが{上流|じょうりゅう}{方向|ほうこう}から{流|なが}れてきた。{肥料|ひりょう}みたいな{臭|にお}いがしたの。"
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: kana
        expression: determined
        position: right
      - type: dialog
        character: kana
        text: "{泡|あわ}の{発生源|はっせいげん}は{地点|ちてん}B{方向|ほうこう}（北）からだった。わたしの{記録|きろく}ノートにも書いてある。"
      - type: sprite
        character: kana
        action: hide
      - type: narration
        text: "大雨の{前日|ぜんじつ}に{地点|ちてん}B（{畑|はたけ}{周辺|しゅうへん}）にいたのはソウタだけ。ソウタは{畑|はたけ}で何をしていた？"

  # ===== 投票 =====
  - id: questions
    bg: park
    bgm: esd-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "データと{行動|こうどう}{記録|きろく}を{整理|せいり}しよう。{汚染源|おせんげん}はどこ？ {誰|だれ}が{関|かか}わっている？"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: 川の汚れの原因はどの施設から？
        options:
          - text: 公園のトイレ（下水道に接続済み）
            value: toilet
            feedback: 公園のトイレは下水道に接続済み。川に直接流れないから、水質悪化の原因にはならないよ。
          - text: 農家の畑（川から5m・肥料あり）
            value: farm
            feedback: 正解！ 川からわずか5m。大雨で浸水することがある。pHが下がって肥料の臭い——畑の肥料が流れた可能性が最も高い。
          - text: 小さな工場（排水処理済み）
            value: factory
            feedback: 工場の排水は処理施設を通してから川へ流している。検査にも合格済み。原因としては考えにくいよ。
          - text: 原因は分からない
            value: unknown
            feedback: データを見てみよう。地点A（正常）→地点B（異常）→地点C（深刻）。A～Bの間に原因があるはず。
      - type: choice
        id: q2
        question: 汚染に関わっているのは誰？
        options:
          - text: ハルキ（上流担当・データ正常）
            value: haruki
            feedback: ハルキの地点A（上流）は正常。汚染は地点Bから始まっている。ハルキの担当エリアは問題ないよ。
          - text: イブキ（下流担当・異変を発見）
            value: ibuki
            feedback: イブキは汚染を「発見した人」であって「原因を作った人」ではないよ。汚れは上流から流れてきた。
          - text: ソウタ（中流担当・火曜に畑にいた）
            value: souta
            feedback: 正解！ 大雨の前日に地点B（畑周辺）にいたのはソウタだけ。畑で何かをした可能性がある。
          - text: カナ（下流担当・記録係）
            value: kana
            feedback: カナはイブキと一緒に地点Cで記録していただけ。汚染源の地点Bには行っていないよ。

  # ===== 証拠カード5: 農業委員の証言 =====
  - id: evidence-5
    bgm: esd-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: 農業委員さんの証言
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "{農業|のうぎょう}{委員|いいん}の田中さんに{確認|かくにん}しました。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "田中さんの{証言|しょうげん}——"
      - type: narration
        text: "「木曜の朝、山田さんの{畑|はたけ}に行ったら川のフェンスが{傾|かたむ}いて、{化成|かせい}{肥料|ひりょう}の{袋|ふくろ}が1{袋|ふくろ}なくなっていた」"
      - type: narration
        text: "「フェンスの外（川{側|がわ}）に{肥料|ひりょう}{袋|ふくろ}の{破|やぶ}れたかけらが{残|のこ}っていた」"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        text: "「20kgの{化成|かせい}{肥料|ひりょう}が川に{落|お}ちたら、pHが下がるし水が白く{濁|にご}ることもある」"
      - type: narration
        speed: slow
        text: "「月曜には{袋|ふくろ}は3{袋|ふくろ}あった。火曜に{誰|だれ}かが1{袋|ふくろ}をフェンスの{近|ちか}くに{移動|いどう}させた{痕跡|こんせき}がある」"
      - type: narration
        text: "火曜に{畑|はたけ}にいて、{肥料|ひりょう}{袋|ふくろ}を動かせたのは——ソウタだけ。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: park
    bgm: esd-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: 「守ろうとした」のに川を汚した
      - type: effect
        name: fade-in
        duration: 600

  # ハルキの秘密
  - id: truth-haruki
    bg: park
    steps:
      - type: sprite
        character: haruki
        expression: thinking
        position: left
      - type: dialog
        character: haruki
        text: "ぼくはデータを見てすぐ「{地点|ちてん}A～Bの{間|あいだ}に{原因|げんいん}がある」と分かった。"
      - type: dialog
        character: haruki
        text: "でもそれをもっと早くみんなに{共有|きょうゆう}すべきだった。データは{持|も}っているだけじゃ{意味|いみ}がない。"
        expression: determined
      - type: sprite
        character: haruki
        action: hide

  # イブキの秘密
  - id: truth-ibuki
    steps:
      - type: sprite
        character: ibuki
        expression: worried
        position: right
      - type: dialog
        character: ibuki
        text: "水曜に川が{濁|にご}り{始|はじ}めたとき、すぐに先生に{報告|ほうこく}すべきだった。"
      - type: dialog
        character: ibuki
        text: "メダカもオタマジャクシもいなくなってた。生き物が{住|す}めなくなる前に気づけていれば……。"
        expression: determined
      - type: sprite
        character: ibuki
        action: hide

  # カナの秘密
  - id: truth-kana
    steps:
      - type: sprite
        character: kana
        expression: thinking
        position: left
      - type: dialog
        character: kana
        text: "わたしの{記録|きろく}には「{泡|あわ}が北（{地点|ちてん}B{方向|ほうこう}）から来ている」と書いてあった。"
      - type: dialog
        character: kana
        text: "もっと早くこの{記録|きろく}を{共有|きょうゆう}していれば、{原因|げんいん}の{特定|とくてい}が{速|はや}かったはず。"
        expression: determined
      - type: sprite
        character: kana
        action: hide

  # ソウタの真実（クライマックス）
  - id: truth-souta
    bgm: esd-01/truth
    steps:
      - type: sprite
        character: souta
        expression: surprised
        position: center
      - type: dialog
        character: souta
        text: "え……おれが{原因|げんいん}？ {肥料|ひりょう}{袋|ふくろ}を動かしたのが？"
      - type: narration
        speed: slow
        text: "ソウタは{本当|ほんとう}に気づいていなかった。"
      - type: dialog
        character: souta
        text: "火曜の{調査|ちょうさ}中に、雨が{降|ふ}りそうだったから{肥料|ひりょう}{袋|ふくろ}が{濡|ぬ}れないよう川{沿|ぞ}いのフェンスに{寄|よ}せたんだ。石を{重|おも}しに{置|お}いた。"
        expression: worried
      - type: dialog
        character: souta
        text: "「ちゃんとおさえたから{大丈夫|だいじょうぶ}」って思ってた。まさか{翌朝|よくあさ}の大雨で{袋|ふくろ}が川に{落|お}ちるなんて……。"
      - type: dialog
        character: souta
        text: "{守|まも}ろうとしたつもりだったのに、川を{汚|よご}してしまった。"
        expression: worried
      - type: dialog
        character: souta
        text: "……ごめん。{悪気|わるぎ}はなかった。でも{結果|けっか}は{変|か}えられない。おれがやったことが{原因|げんいん}だ。"
        expression: determined
      - type: sprite
        character: souta
        action: hide
      - type: narration
        speed: slow
        text: "ソウタには{悪意|あくい}がなかった。{肥料|ひりょう}を「{守|まも}ろうとした」{行動|こうどう}が、{結果的|けっかてき}に川を{汚|よご}した。これが「うっかり{型|がた}」の{環境問題|かんきょうもんだい}だ。"

