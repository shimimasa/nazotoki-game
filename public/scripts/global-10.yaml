scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{国際理解探偵団|こくさいりかいたんていだん}の4{人|にん}は、{国際理解|こくさいりかい}フェスティバルに{向|む}けてSDGs（{持続可能|じぞくかのう}な{開発目標|かいはつもくひょう}）の{紹介|しょうかい}パネルをそれぞれ{作|つく}った。これが{探偵団|たんていだん}として{最後|さいご}の{活動|かつどう}だ。"
      - type: narration
        text: "ところが——{翌朝|よくあさ}、ヒロムが{書|か}いた**「{目標|もくひょう}10: {不平等|ふびょうどう}をなくそう」のパネルが{改ざん|かいざん}されていた**。"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "たいへん！ ヒロムくんのパネルが{書|か}き{換|か}えられているわ！ **「{支援|しえん}してあげよう」が「{一緒|いっしょ}に{考|かんが}えよう」**に{変|か}わっている！"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: hiromu
            expression: surprised
          - character: manabu
            expression: thinking
          - character: koeru
            expression: surprised
          - character: tsumugi
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。パネルを{改ざん|かいざん}したのは{誰|だれ}か——そして{改ざん|かいざん}した{人|ひと}の{言|い}い{分|ぶん}は、{正|ただ}しかったのか？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 誰も残さない
        subtitle: 国際理解探偵団 Vol.10

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: パネルの状況を調べよう
      - type: narration
        text: "ヒロムの「{目標|もくひょう}10: {不平等|ふびょうどう}をなくそう」パネルを{調|しら}べてみた。"
      - type: se
        sound: discover
      - type: narration
        text: "{結論部分|けつろんぶぶん}が{改ざん|かいざん}されている。{元|もと}の{文字|もじ}（{黒|くろ}ペン）は**「{途上国|とじょうこく}の{子|こ}どもたちを{支援|しえん}してあげよう」**だ。"
      - type: narration
        text: "それが**{緑|みどり}ペン**で{線|せん}を{引|ひ}かれ、**「{途上国|とじょうこく}の{子|こ}どもたちと{一緒|いっしょ}に{考|かんが}えよう」**と{書|か}き{直|なお}してある。"
      - type: narration
        text: "さらに{緑|みどり}ペンで「**\"{かわいそう}\"と{決|き}めつけないで。{対等|たいとう}なパートナーとして。**」と{書|か}き{足|た}されている。{他|ほか}の3{枚|まい}のパネルは{変|か}わっていない。"
      - type: narration
        text: "{改ざん|かいざん}の{内容|ないよう}をよく{読|よ}んでみて。「{支援|しえん}してあげよう」と「{一緒|いっしょ}に{考|かんが}えよう」——どちらがSDGsの{合言葉|あいことば}「{誰|だれ}一人{取|と}り{残|のこ}さない」に{近|ちか}い？"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: SDGsの本質を確認しよう
      - type: narration
        text: "{先生|せんせい}が{作|つく}った「SDGsの{本当|ほんとう}の{意味|いみ}」カードを{調|しら}べてみた。"
      - type: se
        sound: discover
      - type: narration
        text: "SDGs {目標|もくひょう}10: {人|ひと}や{国|くに}の{不平等|ふびょうどう}をなくそう。"
      - type: narration
        text: "{上|うえ}から{目線|めせん}の{支援|しえん}——「{助|たす}けてあげる」「{かわいそうだから}」「{先進国|せんしんこく}が{教|おし}える」"
      - type: narration
        text: "SDGsの{本質|ほんしつ}——「{一緒|いっしょ}に{考|かんが}える」「{対等|たいとう}なパートナーとして」「お{互|たが}いから{学|まな}ぶ」"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "{現地|げんち}NGOの{声|こえ}：「\"{助|たす}けてあげる\"と{言|い}われると{悲|かな}しい。{私|わたし}たちは{かわいそうではない}。**{一緒|いっしょ}に{考|かんが}えてほしい。**」"
      - type: narration
        text: "SDGsの{合言葉|あいことば}：「**{誰|だれ}一人{取|と}り{残|のこ}さない（Leave No One Behind）**」= {全員|ぜんいん}が{対等|たいとう}なパートナーとして、{一緒|いっしょ}に{問題|もんだい}を{解決|かいけつ}すること。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 放課後の行動を確認しよう
      - type: narration
        text: "4{人|にん}の{放課後|ほうかご}の{行動|こうどう}を{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "ヒロム —— {15時30分|じゅうごじさんじゅっぷん}から{職員室|しょくいんしつ}で{委員会|いいんかい}。{担任|たんにん}の{先生|せんせい}が{確認|かくにん}。"
      - type: narration
        text: "マナブ —— {15時25分|じゅうごじにじゅうごふん}ごろから{図書室|としょしつ}で{調|しら}べ{物|もの}。{図書|としょ}の{先生|せんせい}が{確認|かくにん}。"
      - type: narration
        text: "コエル —— {15時20分|じゅうごじにじゅっぷん}に{下校|げこう}。{正門|せいもん}の{先生|せんせい}が{確認|かくにん}。"
      - type: narration
        text: "ツムギ —— {15時30分|じゅうごじさんじゅっぷん}から{音楽室|おんがくしつ}でリコーダー{練習|れんしゅう}。{音楽|おんがく}の{先生|せんせい}が{確認|かくにん}。"
      - type: narration
        text: "{15時15分|じゅうごじじゅうごふん}に{全員|ぜんいん}でパネルを{確認|かくにん}したとき、{正常|せいじょう}だった。{全員|ぜんいん}にアリバイがある……。「{15時25分|じゅうごじにじゅうごふん}ごろ」は{正確|せいかく}に{何時|なんじ}？"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: マナブの「正義」発言を調べよう
      - type: narration
        text: "{月曜|げつようび}{12時30分|じゅうにじさんじゅっぷん}ごろの{会話|かいわ}{記録|きろく}が{見|み}つかった。"
      - type: se
        sound: discover
      - type: sprite
        character: manabu
        expression: determined
        position: left
      - type: dialog
        character: manabu
        text: "SDGsを{調|しら}べて{分|わ}かったんだけど、**「{助|たす}けてあげる」ってSDGsじゃないんだよ**。"
        expression: determined
      - type: sprite
        character: manabu
        action: hide
      - type: sprite
        character: hiromu
        expression: surprised
        position: right
      - type: dialog
        character: hiromu
        text: "え？ でも{助|たす}けるのはいいことじゃない？"
        expression: surprised
      - type: sprite
        character: hiromu
        action: hide
      - type: sprite
        character: manabu
        expression: thinking
        position: left
      - type: dialog
        character: manabu
        text: "{現地|げんち}の{人|ひと}は「{かわいそう}」って{言|い}われるのが{嫌|いや}なんだって。**{対等|たいとう}に{一緒|いっしょ}に{考|かんが}えてほしい**って。"
        expression: thinking
      - type: sprite
        character: manabu
        action: hide
      - type: sprite
        character: koeru
        expression: thinking
        position: right
      - type: dialog
        character: koeru
        text: "ふーん。「あげる」って{確|たし}かに{上|うえ}から{目線|めせん}かも。"
        expression: thinking
      - type: sprite
        character: koeru
        action: hide
      - type: sprite
        character: manabu
        expression: determined
        position: left
      - type: dialog
        character: manabu
        text: "**このフェスティバルで、{本当|ほんとう}のSDGsを{伝|つた}えなきゃ。{間違|まちが}った{情報|じょうほう}を{出|だ}すわけにはいかない。**"
        expression: determined
      - type: sprite
        character: manabu
        action: hide
      - type: narration
        text: "マナブはSDGsの{本質|ほんしつ}を{知|し}っている。そして「{間違|まちが}った{情報|じょうほう}を{出|だ}すわけにはいかない」と{強|つよ}い{信念|しんねん}を{持|も}っている——{改ざん|かいざん}の{動機|どうき}が{見|み}えてきた？"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 図書の先生の証言
      - type: effect
        name: fade-in
      - type: narration
        text: "{図書|としょ}の{先生|せんせい}に{直接|ちょくせつ}{聞|き}いてみた。"
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "{図書|としょ}の{先生|せんせい}のお{話|はなし}を{読|よ}むわね。"
        expression: determined
      - type: dialog
        character: yamada
        text: "「マナブくんが{図書室|としょしつ}に{来|き}たのは**{15時35分|じゅうごじさんじゅうごふん}**です。{15時25分|じゅうごじにじゅうごふん}ではありません。『SDGsの{本|ほん}をもう1{冊|さつ}{読|よ}みたい』と{言|い}って{来|き}ました。」"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "マナブは{15時25分|じゅうごじにじゅうごふん}〜{15時33分|じゅうごじさんじゅうさんぷん}に{教室|きょうしつ}にいた{可能性|かのうせい}がある——アリバイが{崩|くず}れた。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "そして{改ざん|かいざん}の**「{内容|ないよう}」**はどうだった？ 「{支援|しえん}してあげよう」と「{一緒|いっしょ}に{考|かんが}えよう」——SDGsの{本質|ほんしつ}に{近|ちか}いのは……**{改ざん後|かいざんご}の「{一緒|いっしょ}に{考|かんが}えよう」だった**。"
      - type: narration
        text: "{改ざん|かいざん}の「{方法|ほうほう}」は{間違|まちが}い。でも「{内容|ないよう}」は{実|じつ}はSDGsの{本質|ほんしつ}に{合|あ}っていた——これがVol.10の{核心|かくしん}だ。"

  # ==================== 推理タイム（1回目投票：犯人特定） ====================
  - id: deduction-1
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？（1回目の投票）
      - type: sprite
        character: tsumugi
        expression: worried
        position: left
      - type: dialog
        character: tsumugi
        text: "{15時25分|じゅうごじにじゅうごふん}ごろ、{音楽室|おんがくしつ}に{向|む}かう{途中|とちゅう}で……**マナブが{怒|おこ}った{顔|かお}で{教室|きょうしつ}{方向|ほうこう}に{急|いそ}いで{歩|ある}いている**のを{見|み}た。{図書室|としょしつ}は{反対方向|はんたいほうこう}なのに……"
        expression: worried
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: koeru
        expression: thinking
        position: right
      - type: dialog
        character: koeru
        text: "マナブは{昼休|ひるやす}みに「{間違|まちが}った{情報|じょうほう}を{出|だ}すわけにはいかない」って{言|い}ってた。それに……{改ざん|かいざん}に{使|つか}われた{緑|みどり}ペンって、マナブがいつも{持|も}ってるやつじゃない？"
        expression: thinking
      - type: sprite
        character: koeru
        action: hide
      - type: sprite
        character: hiromu
        expression: worried
        position: left
      - type: dialog
        character: hiromu
        text: "……「{支援|しえん}してあげよう」は{善意|ぜんい}で{書|か}いた。でも{改ざん後|かいざんご}の「{一緒|いっしょ}に{考|かんが}えよう」を{読|よ}んで、「あげよう」って{上|うえ}から{目線|めせん}だったかも……と{少|すこ}し{思|おも}い{始|はじ}めてる。"
        expression: worried
      - type: sprite
        character: hiromu
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。ヒロム・コエル・ツムギは{先生|せんせい}が{確認|かくにん}ずみのアリバイあり。マナブだけ「{15時25分|じゅうごじにじゅうごふん}ごろ{図書室|としょしつ}」と{言|い}っていたが、{実際|じっさい}は{15時35分着|じゅうごじさんじゅうごふんちゃく}。{動機|どうき}も{機会|きかい}も——"
      - type: choice
        id: q1
        question: パネルを改ざんしたのは誰？（1回目の投票）
        options:
          - text: マナブ（15:25〜15:33のアリバイがなく、動機と緑ペンが一致する）
            value: manabu
            correct: true
            feedback: "{正解|せいかい}！ マナブは「{15時25分|じゅうごじにじゅうごふん}から{図書室|としょしつ}」と{言|い}っていたが、{図書|としょ}の{先生|せんせい}は「{15時35分着|じゅうごじさんじゅうごふんちゃく}」と{証言|しょうげん}。{15時25分|じゅうごじにじゅうごふん}〜{15時33分|じゅうごじさんじゅうさんぷん}に{教室|きょうしつ}で{改ざん|かいざん}し、{15時35分|じゅうごじさんじゅうごふん}に{図書室|としょしつ}に{着|つ}いた。「{間違|まちが}った{情報|じょうほう}を{出|だ}すわけにはいかない」——{正義感|せいぎかん}が{爆発|ばくはつ}した。"
          - text: ヒロム（自分のパネルを書き直したかった可能性）
            value: hiromu
            feedback: "ヒロムは{15時30分|じゅうごじさんじゅっぷん}から{職員室|しょくいんしつ}にいたことを{担任|たんにん}の{先生|せんせい}が{確認|かくにん}している。{自分|じぶん}のパネルを{改ざん|かいざん}する{理由|りゆう}も{薄|うす}いよ。"
          - text: コエル（「上から目線」に最初から違和感を持っていた）
            value: koeru
            feedback: "コエルは{15時20分|じゅうごじにじゅっぷん}に{下校|げこう}し、{正門|せいもん}の{先生|せんせい}が{確認|かくにん}している。{改ざん|かいざん}を{行|おこな}う{時間|じかん}も{場所|ばしょ}もなかったよ。"
          - text: ツムギ（マナブが怒った顔で歩くのを目撃した）
            value: tsumugi
            feedback: "ツムギは{15時28分|じゅうごじにじゅうはちふん}に{音楽室|おんがくしつ}に{着|つ}いており、{音楽|おんがく}の{先生|せんせい}が{確認|かくにん}している。{目撃|もくげき}したのはツムギ{自身|じしん}ではなく{教室|きょうしつ}に{向|む}かったマナブだよ。"

  # ==================== 議論フェーズ（第2層） ====================
  - id: discussion
    bg: classroom-blackboard
    bgm: exploration
    steps:
      - type: title_card
        text: 第2層の謎
        subtitle: 誰一人取り残さないために大切なことは？
      - type: narration
        text: "{犯人|はんにん}は{分|わ}かった。でもここからが**{本当|ほんとう}の{謎|なぞ}**だ。"
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "{改ざん|かいざん}の「{方法|ほうほう}」は{間違|まちが}い。でも——**{改ざん|かいざん}の「{内容|ないよう}」はどうだった？**"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "ヒロムの「{支援|しえん}してあげよう」は{善意|ぜんい}だった。でも「あげよう」は{上|うえ}から{目線|めせん}。{途上国|とじょうこく}を「{助|たす}けられる{側|がわ}」に{固定|こてい}する{言葉|ことば}だった。"
      - type: narration
        text: "マナブが{書|か}いた「{一緒|いっしょ}に{考|かんが}えよう」は、**実|じつはSDGsの{本質|ほんしつ}に{合|あ}っていた**。{方法|ほうほう}は{間違|まちが}い。でも{内容|ないよう}は{正|ただ}しかった。"
      - type: sprite
        character: hiromu
        expression: thinking
        position: left
      - type: dialog
        character: hiromu
        text: "……{自分|じぶん}が{書|か}いた「{支援|しえん}してあげよう」が{上|うえ}から{目線|めせん}だったなんて、{気|き}づかなかった。{善意|ぜんい}だったのに。"
        expression: thinking
      - type: sprite
        character: hiromu
        action: hide
      - type: sprite
        character: koeru
        expression: determined
        position: right
      - type: dialog
        character: koeru
        text: "「{内容|ないよう}は{正|ただ}しい。でも{方法|ほうほう}が{間違|まちが}い」——この2つは{矛盾|むじゅん}しない。{勝手|かって}に{書|か}き{換|か}えるんじゃなくて、{話|はな}し{合|あ}いで{伝|つた}えるべきだったよ。"
        expression: determined
      - type: sprite
        character: koeru
        action: hide
      - type: sprite
        character: tsumugi
        expression: worried
        position: left
