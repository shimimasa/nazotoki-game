scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "理科室の体験コーナーに「長い棒と支点を使うと重い石が持ち上がる」という実験セットが用意されていた。"
      - type: narration
        text: "オモリが「力を入れていないのに石が持ち上がった！"
      - type: narration
        text: "誰かが軽い石にすり替えた！"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: omori
        expression: worried
        position: center
      - type: dialog
        character: omori
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: omori
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: chikara, expression: determined }
          - { id: nami, expression: thinking }
          - { id: hikaru, expression: thinking }
          - { id: omori, expression: worried }
      - type: narration
        text: "「物理探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "物理探偵団"
        subtitle: "Vol.1 てこの秘密"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: chikara
        expression: thinking
        position: left
      - type: dialog
        character: chikara
        text: "支点から遠い場所を押すと軽くなる。距離が変わると力が変わる"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        expression: thinking
        position: right
      - type: dialog
        character: nami
        text: "この設計図に書いてある。支点・力点・作用点——これがてこの仕組み"
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        expression: thinking
        position: left
      - type: dialog
        character: hikaru
        text: "石に傷はない。棒も台も変えられた形跡がない。すり替えはなかった"
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        expression: worried
        position: right
      - type: dialog
        character: omori
        text: "重い石が軽く感じたから……てこってそういう仕組みなんだ。知らなかった"
      - type: sprite
        character: omori
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「石のすり替えを疑って記録ノートに書き込み、騒ぎを起こしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: chikara, expression: normal }
          - { id: nami, expression: normal }
          - { id: hikaru, expression: normal }
          - { id: omori, expression: worried }
      - type: choice
        id: q1
        text: "石のすり替えを疑って記録ノートに書き込み、騒ぎを起こしたのは誰？"
        options:
          - text: "チカラ"
            value: chikara
            correct: false
            feedback: "チカラは実際に実験を繰り返して距離と力の関係を調べた側"
          - text: "ナミ"
            value: nami
            correct: false
            feedback: "ナミは設計図を分析しててこの仕組みを解説した側"
          - text: "ヒカル"
            value: hikaru
            correct: false
            feedback: "ヒカルは石・棒・台を観察して変化の痕跡がないことを確認した側"
          - text: "オモリ"
            value: omori
            correct: true
            feedback: "オモリは石が軽く持ち上がったことに驚いて、誰かが石をすり替えたと思い込んだ。でも石はちゃんと2kgのまま。これがてこの原理——支点から力点を遠ざけると、小さな力で重いものを動かせる。棒1本と支点があれば、体の小さな人でも重い荷物を動かせるんだ"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "オモリは理科体験コーナーで「重い石（2kg）が指1本で持ち上がった」体験をした。"
      - type: dialog
        character: sensei
        text: "「こんなに軽く上がるのはおかしい。"
      - type: dialog
        character: sensei
        text: "誰かが軽い石にすり替えたに違いない」と思い込み、体験コーナーの記録ノートに「石がすり替えられた可能性あり」と書き込み、担当の当番に疑いをかけた。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: omori
        expression: worried
        position: center
      - type: dialog
        character: omori
        text: "重い石が軽く感じたから……てこってそういう仕組みなんだ。知らなかった"
      - type: sprite
        character: omori
        expression: determined
      - type: dialog
        character: omori
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: omori
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・てこの原理: 支点・力点・作用点の位置関係によって、小さな力で重いものを動かせることを理解する\n・消去法: 条件に合わない仮説（石のすり替え・棒の加工・台の細工）を順番に除外して真因に到達する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: chikara, expression: happy }
          - { id: nami, expression: happy }
          - { id: hikaru, expression: happy }
          - { id: omori, expression: happy }
      - type: narration
        text: "物理探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
