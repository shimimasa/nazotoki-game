meta:
  id: physics-01
  title: "てこの秘密"
  series: "物理探偵団"
  volume: 1
  estimatedMinutes: 18

characters:
  chikara:
    name: "チカラ"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  nami:
    name: "ナミ"
    color: "#FF4444"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  hikaru:
    name: "ヒカル"
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  omori:
    name: "オモリ"
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "理科室の体験コーナーに「長い棒と支点を使うと重い石が持ち上がる」という実験セットが用意されていた。"
      - type: narration
        text: "オモリが「力を入れていないのに石が持ち上がった！"
      - type: narration
        text: "誰かが軽い石にすり替えた！"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: omori
        expression: worried
        position: center
      - type: dialog
        character: omori
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: omori
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: chikara, expression: determined }
          - { id: nami, expression: thinking }
          - { id: hikaru, expression: thinking }
          - { id: omori, expression: worried }
      - type: narration
        text: "「物理探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "物理探偵団"
        subtitle: "Vol.1 てこの秘密"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    evidence:
      title: "石の重さの証言"
      description: "石は2kgのままなのに軽く感じたという証言があった"
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: narration
        text: "2kgの{石|いし}はそのままなのに、{持|も}ち{上|あ}げると{軽|かる}く{感|かん}じたという{証言|しょうげん}がある。"
      - type: choice
        id: obs-1
        question: "まず{確|たし}かめたいのはどれ？"
        options:
          - text: "{石|いし}の{重|おも}さが{変|か}わったか"
            value: stone
            reaction:
              character: sensei
              expression: happy
              text: "{原因|げんいん}が{物|もの}か{仕組|しく}みかを{分|わ}けよう。"
          - text: "{教室|きょうしつ}の{気温|きおん}"
            value: temp
            reaction:
              character: sensei
              expression: thinking
              text: "{力|ちから}の{問題|もんだい}から{見|み}たいね。"
          - text: "{壁|かべ}の{色|いろ}"
            value: wall
            reaction:
              character: sensei
              expression: thinking
              text: "{今回|こんかい}の{手|て}がかりとは{遠|とお}そうだね。"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    evidence:
      title: "思い込みの発言"
      description: "石のすり替えだと強く言ったのはオモリだけだった"
    steps:
      - type: narration
        text: "証拠カード2"
      - type: narration
        text: "{体験|たいけん}した4人のうち、{強|つよ}く「すり{替|か}えだ」と{言|い}ったのはオモリだけだった。"
      - type: choice
        id: timeline-key
        question: "この{時点|じてん}で、いちばん{思|おも}い{込|こ}みが{強|つよ}そうなのは{誰|だれ}？"
        options:
          - text: "チカラ"
            value: chikara
            reaction:
              character: sensei
              expression: thinking
              text: "{実験|じっけん}で{確|たし}かめる{側|がわ}だね。"
          - text: "ナミ"
            value: nami
            reaction:
              character: sensei
              expression: thinking
              text: "{設計図|せっけいず}を{読|よ}んでいた{側|がわ}だったよ。"
          - text: "ヒカル"
            value: hikaru
            reaction:
              character: sensei
              expression: thinking
              text: "{観察|かんさつ}で{冷静|れいせい}に{見|み}ていたね。"
          - text: "オモリ"
            value: omori
            reaction:
              character: sensei
              expression: happy
              text: "{驚|おどろ}きがそのまま{疑|うたが}いになったかも。"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    evidence:
      title: "てこの性質"
      description: "支点から遠くを押すほど少ない力で石が動く仕組み"
    steps:
      - type: narration
        text: "証拠カード3"
      - type: narration
        text: "{支点|してん}から{遠|とお}くを{押|お}すほど、{少|すく}ない{力|ちから}で{石|いし}が{動|うご}く。これがてこの{性質|せいしつ}だ。"
      - type: choice
        id: hunch
        question: "{直感|ちょっかん}で、いちばん{怪|あや}しいのは{誰|だれ}？"
        options:
          - text: "チカラ"
            value: chikara
            reaction:
              character: sensei
              expression: thinking
              text: "{仕組|しく}みを{調|しら}べていた{側|がわ}かな。"
          - text: "ナミ"
            value: nami
            reaction:
              character: sensei
              expression: thinking
              text: "{説明役|せつめいやく}として{動|うご}いていたね。"
          - text: "ヒカル"
            value: hikaru
            reaction:
              character: sensei
              expression: thinking
              text: "{痕跡|こんせき}を{見|み}ていた{人|ひと}だったよ。"
          - text: "オモリ"
            value: omori
            reaction:
              character: sensei
              expression: happy
              text: "{驚|おどろ}きが{疑|うたが}いに{変|か}わったのかもね。"
          - text: "{全員|ぜんいん}{怪|あや}しい"
            value: all
            reaction:
              character: sensei
              expression: thinking
              text: "{最後|さいご}は{理由|りゆう}で{比|くら}べよう。"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    evidence:
      title: "追加証拠の検討"
      description: "ここまでの手がかりを基に次に確かめる点を整理する"
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    evidence:
      title: "証拠整理の反転"
      description: "ここまでの証拠を整理し思い込みの原因を見直す"
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: chikara
        expression: thinking
        position: left
      - type: dialog
        character: chikara
        text: "支点から遠い場所を押すと軽くなる。距離が変わると力が変わる"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        expression: thinking
        position: right
      - type: dialog
        character: nami
        text: "この設計図に書いてある。支点・力点・作用点——これがてこの仕組み"
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        expression: thinking
        position: left
      - type: dialog
        character: hikaru
        text: "石に傷はない。棒も台も変えられた形跡がない。すり替えはなかった"
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        expression: worried
        position: right
      - type: dialog
        character: omori
        text: "重い石が軽く感じたから……てこってそういう仕組みなんだ。知らなかった"
      - type: sprite
        character: omori
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「石のすり替えを疑って記録ノートに書き込み、騒ぎを起こしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: chikara, expression: normal }
          - { id: nami, expression: normal }
          - { id: hikaru, expression: normal }
          - { id: omori, expression: worried }
      - type: choice
        id: q1
        text: "石のすり替えを疑って記録ノートに書き込み、騒ぎを起こしたのは誰？"
        options:
          - text: "チカラ"
            value: chikara
            correct: false
            feedback: "チカラは実際に実験を繰り返して距離と力の関係を調べた側"
            reaction:
              character: sensei
              expression: thinking
              text: "{実験|じっけん}で{確|たし}かめていた{側|がわ}だね。"
          - text: "ナミ"
            value: nami
            correct: false
            feedback: "ナミは設計図を分析しててこの仕組みを解説した側"
            reaction:
              character: sensei
              expression: thinking
              text: "{疑|うたが}いより{説明|せつめい}をしていたよ。"
          - text: "ヒカル"
            value: hikaru
            correct: false
            feedback: "ヒカルは石・棒・台を観察して変化の痕跡がないことを確認した側"
            reaction:
              character: sensei
              expression: thinking
              text: "{観察|かんさつ}{結果|けっか}からは{外|はず}れそうだね。"
          - text: "オモリ"
            value: omori
            correct: true
            feedback: "オモリは石が軽く持ち上がったことに驚いて、誰かが石をすり替えたと思い込んだ。でも石はちゃんと2kgのまま。これがてこの原理——支点から力点を遠ざけると、小さな力で重いものを動かせる。棒1本と支点があれば、体の小さな人でも重い荷物を動かせるんだ"
            reaction:
              character: sensei
              expression: happy
              text: "{思|おも}い{込|こ}みの{原因|げんいん}まで{追|お}えたね。"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "オモリは理科体験コーナーで「重い石（2kg）が指1本で持ち上がった」体験をした。"
      - type: dialog
        character: sensei
        text: "「こんなに軽く上がるのはおかしい。"
      - type: dialog
        character: sensei
        text: "誰かが軽い石にすり替えたに違いない」と思い込み、体験コーナーの記録ノートに「石がすり替えられた可能性あり」と書き込み、担当の当番に疑いをかけた。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: omori
        expression: worried
        position: center
      - type: dialog
        character: omori
        text: "重い石が軽く感じたから……てこってそういう仕組みなんだ。知らなかった"
      - type: sprite
        character: omori
        expression: determined
      - type: dialog
        character: omori
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: omori
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・てこの原理: 支点・力点・作用点の位置関係によって、小さな力で重いものを動かせることを理解する\n・消去法: 条件に合わない仮説（石のすり替え・棒の加工・台の細工）を順番に除外して真因に到達する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: chikara, expression: happy }
          - { id: nami, expression: happy }
          - { id: hikaru, expression: happy }
          - { id: omori, expression: happy }
      - type: narration
        text: "物理探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
