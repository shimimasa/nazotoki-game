scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{校外|こうがい}{学習|がくしゅう}で{美術館|びじゅつかん}を{訪問|ほうもん}。{課題|かだい}は「3{枚|まい}の{絵|え}を{選|えら}んで{鑑賞|かんしょう}レポートを{書|か}く」。"
      - type: narration
        text: "{提出後|ていしゅつご}、先生がニジカのレポートを{見|み}て{気|き}づいた——
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "「ニジカの3{枚目|まいめ}（{抽象画|ちゅうしょうが}）の{感想|かんそう}だけ、{他|ほか}の2{枚|まい}と**{鑑賞|かんしょう}の{仕方|しかた}が{全然|ぜんぜん}{違|ちが}う**。まるで{別人|べつじん}が{書|か}いたみたい」"
      - type: narration
        text: "{大事|だいじ}な{知識|ちしき}——{人|ひと}にはそれぞれ「{鑑賞|かんしょう}の{癖|くせ}」がある。ニジカは「{感覚|かんかく}{視点|してん}」（インパクト{重視|じゅうし}）。ユウは「{感情|かんじょう}{視点|してん}」（{物語性|ものがたりせい}{重視|じゅうし}）。1{人|り}のレポートの{中|なか}で{突然|とつぜん}{視点|してん}が{変|か}わったら{不自然|ふしぜん}。"
      - type: effect
        name: fade-out
      - type: title_card
        text: 美術館の視線
        subtitle: 美術探偵団 Vol.9

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: ニジカのレポート3本を比較
      - type: narration
        text: "ニジカのレポート3{本|ぽん}を{並|なら}べて{比較|ひかく}——"
      - type: narration
        text: "1{枚目|まいめ}（{風景画|ふうけいが}）: 「{色|いろ}の{力|ちから}がすごい！ エネルギーを{感|かん}じる」→ **{感覚|かんかく}{視点|してん}** ✅ ニジカらしい"
      - type: narration
        text: "2{枚目|まいめ}（{人物画|じんぶつが}）: 「{表情|ひょうじょう}のインパクトが{強|つよ}い！ {力強|ちからづよ}い{線|せん}」→ **{感覚|かんかく}{視点|してん}** ✅ ニジカらしい"
      - type: narration
        text: "3{枚目|まいめ}（{抽象画|ちゅうしょうが}）: 「{深|ふか}い{悲|かな}しみが{伝|つた}わってくる。{色|いろ}の{奥|おく}に{物語|ものがたり}が{見|み}える」→ **{感情|かんじょう}{視点|してん}** ❓ ニジカらしくない"
      - type: narration
        text: "1{枚目|まいめ}と2{枚目|まいめ}は「{感覚|かんかく}{視点|してん}」。3{枚目|まいめ}だけ「{悲|かな}しみ・{物語|ものがたり}・{心|こころ}に{響|ひび}く」——**{視点|してん}が{変|か}わっている**。"

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 作成状況とデータ比較
      - type: narration
        text: "{美術館|びじゅつかん}でのニジカの{様子|ようす}——1{枚目|まいめ}・2{枚目|まいめ}は{順調|じゅんちょう}。**3{枚目|まいめ}（{抽象画|ちゅうしょうが}）で{止|と}まった**。{提出|ていしゅつ}{直前|ちょくぜん}にギリギリで{完成|かんせい}。{苦戦|くせん}していたのに{急|きゅう}に{書|か}けた？"
      - type: narration
        text: "データ{比較|ひかく}シート——{視点|してん}: {感覚|かんかく}→{感覚|かんかく}→**{感情|かんじょう}** ❌{不一致|ふいっち}。キーワード: エネルギー→インパクト→**{悲|かな}しみ・{物語|ものがたり}** ❌{不一致|ふいっち}。{文体|ぶんたい}: {短文|たんぶん}→{短文|たんぶん}→**{長文|ちょうぶん}・{丁寧|ていねい}** ❌{不一致|ふいっち}。"
      - type: narration
        text: "{帰納|きのう}——1{枚目|まいめ}と2{枚目|まいめ}は**{同|おな}じパターン**。3{枚目|まいめ}だけ**{全|ぜん}{項目|こうもく}で{不一致|ふいっち}**。**{別|べつ}の{人|ひと}の{視点|してん}が{混|ま}じっている**。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 帰納分析と照合
      - type: effect
        name: fade-in
      - type: sprite
        character: takumi
        expression: determined
        position: left
      - type: dialog
        character: takumi
        text: "3{枚目|まいめ}の{不一致|ふいっち}パターンを4{人|にん}のスタイルと{照合|しょうごう}した。「{悲|かな}しみが{伝|つた}わる」「{物語|ものがたり}が{見|み}える」「{心|こころ}に{響|ひび}く」——{全部|ぜんぶ}**ユウのスタイルと{完全|かんぜん}{一致|いっち}**。"
        expression: determined
      - type: sprite
        character: takumi
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "さらに、ユウの3{枚目|まいめ}（{抽象画|ちゅうしょうが}）とニジカの3{枚目|まいめ}を{比|くら}べると——**ほぼ{同|おな}じ{内容|ないよう}**。"
      - type: narration
        text: "ユウ: 「{深|ふか}い{悲|かな}しみが{伝|つた}わってくる。{色|いろ}の{奥|おく}に{物語|ものがたり}が{見|み}える。{作者|さくしゃ}の{心|こころ}の{叫|さけ}びが{聞|き}こえるようだ」"
      - type: narration
        text: "ニジカ: 「{深|ふか}い{悲|かな}しみが{伝|つた}わってくる。{色|いろ}の{奥|おく}に{物語|ものがたり}が{見|み}える。{心|こころ}に{響|ひび}く{作品|さくひん}だ」"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "**ほぼ{同|おな}じ{文章|ぶんしょう}**。ニジカがユウの{感想|かんそう}を{写|うつ}した{可能性|かのうせい}が{極|きわ}めて{高|たか}い。"
      - type: sprite
        character: yuu
        expression: worried
        position: right
      - type: dialog
        character: yuu
        text: "……{実|じつ}は、{美術館|びじゅつかん}でニジカが「3{枚目|まいめ}の{抽象画|ちゅうしょうが}、{何|なに}を{書|か}けばいいか{分|わ}からない」って{困|こま}ってたの。{善意|ぜんい}で「わたしのレポート{見|み}せてあげるよ」って3{枚目|まいめ}を{見|み}せた。まさか{写|うつ}すとは{思|おも}わなかったけど……"
        expression: worried
      - type: sprite
        character: yuu
        action: hide

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: narration
        text: "{帰納法|きのうほう}の{結果|けっか}——3{本|ぽん}のレポートのうち3{枚目|まいめ}だけ{全|ぜん}{項目|こうもく}で{不一致|ふいっち}。3{枚目|まいめ}のスタイルがユウと{完全|かんぜん}{一致|いっち}。ユウのレポートとほぼ{同|おな}じ{文章|ぶんしょう}。ニジカは3{枚目|まいめ}で{苦戦|くせん}→{提出|ていしゅつ}{直前|ちょくぜん}に{急|きゅう}に{完成|かんせい}。ユウが{善意|ぜんい}でレポートを{見|み}せた。"
      - type: choice
        id: q1
        question: レポートを写した犯人は？
        options:
          - text: ニジカ（3枚目だけ視点が変化＋ユウと同じ文章＋抽象画で苦戦＋ユウの親切を守りたかった）
            value: nijika
            correct: true
            feedback: "{正解|せいかい}！ ニジカは{抽象画|ちゅうしょうが}の{感想|かんそう}が{書|か}けず、ユウが{善意|ぜんい}で{見|み}せてくれたレポートを{写|うつ}した。{帰納法|きのうほう}で3{本|ぽん}のパターンを{比較|ひかく}し、3{枚目|まいめ}だけの{不一致|ふいっち}を{検出|けんしゅつ}できた。"
          - text: サクラ（鑑賞視点の分析をした人）
            value: sakura
            feedback: "サクラは{鑑賞|かんしょう}{視点|してん}の{分析|ぶんせき}で{矛盾|むじゅん}を{発見|はっけん}した{側|がわ}。{色彩|しきさい}{視点|してん}は{一貫|いっかん}しているよ。"
          - text: タクミ（帰納分析をした人）
            value: takumi
            feedback: "タクミは{帰納|きのう}{分析|ぶんせき}で{不一致|ふいっち}を{数値的|すうちてき}に{証明|しょうめい}した{側|がわ}。"
          - text: ユウ（レポートを見せた人）
            value: yuu
            feedback: "ユウは{善意|ぜんい}で{見|み}せた。「{見|み}せる」と「{写|うつ}す」は{違|ちが}う。ユウは{写|うつ}されたとは{思|おも}っていなかった。"

  # ==================== 真実：ニジカ ====================
  - id: truth-nijika
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ニジカの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: nijika
        expression: worried
        position: center
      - type: dialog
        character: nijika
        text: "……ごめんなさい。3{枚目|まいめ}はユウのレポートを{写|うつ}しました。"
        expression: worried
      - type: dialog
        character: nijika
        text: "{抽象画|ちゅうしょうが}が{全然|ぜんぜん}{分|わ}からなくて。「{何|なに}が{描|か}いてあるの？ どう{感|かん}じればいいの？」って。{提出|ていしゅつ}{期限|きげん}が{迫|せま}ったとき、ユウが「わたしのレポート{見|み}せてあげるよ」って。"
        expression: thinking
      - type: dialog
        character: nijika
        text: "ユウの{親切|しんせつ}を{無駄|むだ}にしたくなかった。「{書|か}けませんでした」って{言|い}ったらユウに{悪|わる}いって。でも{写|うつ}すのは{正直|しょうじき}じゃなかった……ごめんなさい。"
        expression: worried
      - type: sprite
        character: nijika
        action: hide
      - type: sprite
        character: yuu
        expression: thinking
        position: right
      - type: dialog
        character: yuu
        text: "{善意|ぜんい}で{見|み}せたのは{本当|ほんとう}。でも「{見|み}せる」と「{写|うつ}させる」は{違|ちが}うよね。{一緒|いっしょ}に{考|かんが}えればよかった。"
        expression: thinking
      - type: sprite
        character: yuu
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: narration
        text: "{帰納法|きのうほう}——{複数|ふくすう}のデータを{並|なら}べてパターンを{発見|はっけん}。{不一致|ふいっち}を{見|み}つけることで{異常|いじょう}を{検出|けんしゅつ}する。3{本|ぽん}のレポートから「{同|おな}じ{人|ひと}のパターン」を{帰納|きのう}し、3{枚目|まいめ}の{不一致|ふいっち}を{検出|けんしゅつ}した。"
      - type: narration
        text: "{抽象画|ちゅうしょうが}が{分|わ}からなくていい。「{分|わ}からない」も{立派|りっぱ}な{感想|かんそう}。「{分|わ}からないけどこの{色|いろ}が{好|す}き」——それがニジカの{言葉|ことば}。{写|うつ}すより、{自分|じぶん}の{言葉|ことば}で{挑戦|ちょうせん}する{方|ほう}がずっと{価値|かち}がある。"
      - type: narration
        text: "{鑑賞|かんしょう}の4つの{視点|してん}——{色彩|しきさい}・{構図|こうず}・{感覚|かんかく}・{感情|かんじょう}。{人|ひと}にはそれぞれ「{見方|みかた}の{癖|くせ}」がある。レポートの{文章|ぶんしょう}にはその{人|ひと}の「{見方|みかた}」が{表|あらわ}れる。{筆触|ひっしょく}のように、{鑑賞|かんしょう}スタイルも「{個人|こじん}の{指紋|しもん}」なんだ。
      - type: effect
        name: fade-out
