        text: "証拠カード4 — アリバイと証言"
      - type: narration
        text: "{当日|とうじつ}の{朝|あさ}。タケル：6:30に{来|き}た。{水草|みずくさ}はすでに{抜|ぬ}かれていた。カエルの{卵|たまご}を{救出|きゅうしゅつ}していた。ミサキ：7:00に{来|き}た。{水草|みずくさ}がないことに{気|き}づいた。ノゾミ：7:10に{来|き}た。{卵|たまご}が{散乱|さんらん}しているのを{発見|はっけん}。"
      - type: se
        sound: common/discover
      - type: narration
        text: "カエデ：7:15に{来|き}たと{言|い}う。「{花|はな}がきれいだね」と{言|い}った。{水草|みずくさ}には{触|さわ}っていないと{主張|しゅちょう}。でも——{犯行|はんこう}は6:00〜6:30の{間|あいだ}。タケルが6:30に{来|き}たときすでに{被害|ひがい}は{起|お}きていた。カエデの6:00〜6:30は{空白|くうはく}。"

  - id: testimony
    bg: schoolyard
    bgm: science-18/investigation
    steps:
      - type: title_card
        text: "ステップ2：聞き取り"
      - type: sprite
        id: takeru
        position: left
        expression: worried
      - type: dialog
        character: takeru
        text: "ぼくが6:30に{来|き}たときには、もう{水草|みずくさ}は{抜|ぬ}かれてた。カエルの{卵|たまご}が{底|そこ}に{散|ち}らばってて、{急|いそ}いで{網|あみ}で{救出|きゅうしゅつ}したんだ。バケツに{水|みず}を{入|い}れて{卵|たまご}を{移|うつ}した。{先生|せんせい}と{口論|くちろん}したのは「{水草|みずくさ}をもっと{増|ふ}やすべき」って{提案|ていあん}したから。ぼくは{水草|みずくさ}を{守|まも}りたい{側|がわ}だ。"
      - type: sprite
        id: takeru
        action: hide
      - type: sprite
        id: misaki
        position: right
        expression: determined
      - type: dialog
        character: misaki
        text: "7:00に{来|き}て{水草|みずくさ}がないことに{気|き}づいた。ゴミ{捨|す}て{場|ば}にピンクのリボンで{結|むす}ばれたゴミ{袋|ぶくろ}を{見|み}つけた。{中|なか}に{水草|みずくさ}が{入|はい}ってた。{先週|せんしゅう}、カエデが「ビオトープは{汚|きたな}い。{花|はな}を{植|う}えたほうがきれい」って{言|い}ってたのを{覚|おぼ}えてる。"
      - type: sprite
        id: misaki
        action: hide
      - type: sprite
        id: kaede
        position: left
        expression: normal
      - type: dialog
        character: kaede
        text: "7:15に{来|き}たよ。{花|はな}がきれいだなって{思|おも}った。{水草|みずくさ}なんて{触|さわ}ってない。わたしはビオトープをきれいにしたいだけ。"
      - type: sprite
        id: kaede
        action: hide
      - type: sprite
        id: nozomi
        position: right
        expression: worried
      - type: dialog
        character: nozomi
        text: "7:10に{来|き}た。カエルの{卵|たまご}が{散|ち}らばってて{悲|かな}しい……。{実|じつ}は、6:10に{裏門|うらもん}の{近|ちか}くでカエデを{見|み}たって{友|とも}だちが{言|い}ってた。カエデは7:15に{来|き}たって{言|い}ってるけど……。それと、{花|はな}の{鉢植|はちう}えに「カエデの{花|はな}だん」ってプレートが{付|つ}いてるの。"
      - type: sprite
        id: nozomi
        action: hide

  - id: evidence-5
    bg: schoolyard
    bgm: science-18/tension
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "★新事実★"
        subtitle: "証拠カード5 — 複合推理でフレーミングを見抜け"
      - type: effect
        name: fade-in
      - type: narration
        text: "{複合推理|ふくごうすいり}——3つの{推理|すいり}を{組|く}み{合|あ}わせる。{推理|すいり}①フレーミング{分析|ぶんせき}：タケルは{本当|ほんとう}に{犯人|はんにん}？ バケツの{中身|なかみ}は{水|みず}サンプルと{卵|たまご}の{救出|きゅうしゅつ}。{口論|くちろん}は「{水草|みずくさ}を{増|ふ}やすべき」——{守|まも}る{側|がわ}。タケルは{無実|むじつ}！"
      - type: se
        sound: common/discover
      - type: narration
        text: "{推理|すいり}②{生態学的|せいたいがくてき}{証拠|しょうこ}：{水草|みずくさ}{除去|じょきょ}→{酸素|さんそ}{不足|ぶそく}・{隠|かく}れ{場所|ばしょ}{消失|しょうしつ}・{藻|も}の{異常|いじょう}{繁殖|はんしょく}→{生態系|せいたいけい}{全体|ぜんたい}が{崩壊|ほうかい}の{危機|きき}。{犯人|はんにん}は「{水草|みずくさ}を{抜|ぬ}いただけ」と{思|おも}ったかもしれない。でも{水草|みずくさ}は{生態系|せいたいけい}の{土台|どだい}。"
      - type: narration
        text: "{推理|すいり}③{動機|どうき}{分析|ぶんせき}：ゴミ{袋|ぶくろ}にピンクのリボン→{丁寧|ていねい}な{処理|しょり}→「{良|よ}いことをした」つもり。{花|はな}の{鉢植|はちう}えに「カエデの{花|はな}だん」プレート。{先週|せんしゅう}の{発言|はつげん}「{汚|きたな}い、{花|はな}を{植|う}えたほうがきれい」。6:10に{裏門|うらもん}で{目撃|もくげき}——7:15{登校|とうこう}は{嘘|うそ}。"
      - type: se
        sound: common/tension
      - type: narration
        speed: slow
        text: "3つの{推理|すいり}を{統合|とうごう}——タケルは{無実|むじつ}。{水草|みずくさ}{除去|じょきょ}が{生態系|せいたいけい}を{壊|こわ}した。そしてカエデが{善意|ぜんい}で{水草|みずくさ}を{抜|ぬ}いて{花|はな}を{植|う}えた。{悪意|あくい}はなかった。「{正|ただ}しいこと」をしたと{信|しん}じていた。でもその「{正義|せいぎ}」が{生|い}き{物|もの}を{苦|くる}しめた。"

  - id: questions
    bg: schoolyard
    bgm: science-18/tension
    steps:
      - type: title_card
        text: "ステップ3：推理と判決"
      - type: choice
        id: q1
        text: "{水草|みずくさ}を{全部|ぜんぶ}{抜|ぬ}くと{何|なに}が{起|お}きる？"
        options:
          - text: "特に何も起きない"
            value: a
            feedback: "{水草|みずくさ}は{生態系|せいたいけい}の{土台|どだい}！ {酸素|さんそ}{供給|きょうきゅう}・{隠|かく}れ{場所|ばしょ}・{水質|すいしつ}{浄化|じょうか}の3つの{役割|やくわり}がなくなって{生態系|せいたいけい}{全体|ぜんたい}が{崩|くず}れる。"
          - text: "生態系全体が崩壊の危機に陥る"
            value: b
            feedback: "そのとおり！ {酸素|さんそ}{不足|ぶそく}でメダカが{苦|くる}しむ。{産卵|さんらん}{場所|ばしょ}がなくなってカエルの{卵|たまご}が{死|し}ぬ。{藻|も}が{異常|いじょう}{繁殖|はんしょく}して{水質|すいしつ}{悪化|あっか}。{水草|みずくさ}は{土台|どだい}だった。"
          - text: "きれいになる"
            value: c
            feedback: "{見|み}た{目|め}はきれいになったかもしれない。でも{生|い}き{物|もの}が{苦|くる}しんでいる。「きれい」と「{健康|けんこう}な{生態系|せいたいけい}」は{違|ちが}う。"
      - type: choice
        id: q2
        text: "ビオトープの{水草|みずくさ}を{抜|ぬ}いたのは{誰|だれ}？"
        options:
          - text: "タケル"
            value: a
            feedback: "タケルは6:30に{来|き}たとき{被害|ひがい}を{発見|はっけん}し、カエルの{卵|たまご}を{救出|きゅうしゅつ}していた。「{水草|みずくさ}を{増|ふ}やすべき」と{主張|しゅちょう}した{守|まも}る{側|がわ}。{無実|むじつ}。"
          - text: "ミサキ"
            value: b
            feedback: "ミサキは7:00に{来|き}て{被害|ひがい}に{気|き}づいた{第|だい}一{発見者|はっけんしゃ}。ゴミ{袋|ぶくろ}やカエデの{発言|はつげん}を{報告|ほうこく}した{証人|しょうにん}。"
          - text: "カエデ"
            value: c
            feedback: "6:10に{裏門|うらもん}で{目撃|もくげき}（7:15{登校|とうこう}は{嘘|うそ}）。「カエデの{花|はな}だん」プレート。{先週|せんしゅう}の{発言|はつげん}。ゴミ{袋|ぶくろ}のピンクリボン。すべてがカエデを{指|さ}している。"
          - text: "ノゾミ"
            value: d
            feedback: "ノゾミはカエルの{世話|せわ}{係|がかり}で{生|い}き{物|もの}が{大好|だいす}き。{水草|みずくさ}を{抜|ぬ}く{動機|どうき}がまったくない。6:10の{目撃|もくげき}{情報|じょうほう}を{提供|ていきょう}した{証人|しょうにん}。"

  - id: truth-kaede
    bg: schoolyard
    bgm: science-18/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: narration
        speed: slow
        text: "ビオトープの{水草|みずくさ}を{抜|ぬ}いたのは——カエデだった。"
      - type: sprite
        id: kaede
        position: center
        expression: worried
      - type: dialog
        character: kaede
        text: "……わたしがやりました。でも——{悪|わる}いことだとは{思|おも}わなかった。"
      - type: dialog
        character: kaede
        expression: worried
        text: "{緑色|みどりいろ}の{水|みず}、ぬるぬるの{水草|みずくさ}、{泥|どろ}だらけの{底|そこ}。きれいじゃない。{学校|がっこう}の{恥|は}ずかしい{場所|ばしょ}だと{思|おも}った。だから{今朝|けさ}6{時|じ}に{来|き}て{水草|みずくさ}を{全部|ぜんぶ}{抜|ぬ}いた。{家|いえ}から{花|はな}の{鉢植|はちう}えを{持|も}ってきて{並|なら}べた。「これでビオトープがきれいになった！ みんな{喜|よろこ}ぶはず！」って。"
      - type: dialog
        character: kaede
        text: "でも……メダカが{苦|くる}しそう。{卵|たまご}が{散|ち}らばってる。{水|みず}が{濁|にご}ってる。{水草|みずくさ}は{雑草|ざっそう}だと{思|おも}ってた。でも{違|ちが}った。{酸素|さんそ}を{作|つく}って、{生|い}き{物|もの}の{家|いえ}になって、{水|みず}をきれいにしてた。わたしの「{正義|せいぎ}」が{生|い}き{物|もの}を{苦|くる}しめた。{知|し}らないことは{怖|こわ}い。ごめんなさい。"
      - type: sprite
        id: kaede
        action: hide

  - id: truth-others
    bg: schoolyard
    steps:
      - type: narration
        text: "タケルの{無実|むじつ}が{証明|しょうめい}された。"
      - type: sprite
        id: takeru
        position: left
        expression: determined
