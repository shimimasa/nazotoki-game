        text: "{学校|がっこう}の{裏庭|うらにわ}にあるビオトープ。みんなで1{年|ねん}かけて{育|そだ}ててきた{小|ちい}さな{生態系|せいたいけい}の{池|いけ}。メダカ、カエル、ヤゴ、{水草|みずくさ}……たくさんの{生|い}き{物|もの}が{暮|く}らしている。"
