        text: "ある{朝|あさ}——{水草|みずくさ}がすべて{引|ひ}き{抜|ぬ}かれていた。{代|か}わりにカラフルな{花|はな}の{鉢植|はちう}えが{並|なら}んでいる。メダカが{水面|すいめん}でパクパク{苦|くる}しそう。カエルの{卵|たまご}が{底|そこ}に{散|ち}らばっている。{水|みず}が{薄|うす}い{緑色|みどりいろ}に{濁|にご}り{始|はじ}めている。"
      - type: narration
        text: "{最初|さいしょ}に{疑|うたが}われたのはタケル。{早朝|そうちょう}6:30にビオトープの{前|まえ}で{網|あみ}とバケツを{持|も}っていた。でも——{本当|ほんとう}に{犯人|はんにん}？"
      - type: sprite
        id: takeru
        action: hide
      - type: sprite
        id: misaki
        action: hide
      - type: sprite
        id: kaede
        action: hide
      - type: sprite
        id: nozomi
        action: hide
      - type: sprite
        id: sensei
        position: center
        expression: thinking
      - type: bgm
        track: science-18/tension
      - type: dialog
        character: sensei
        text: "「{生物|せいぶつ}と{環境|かんきょう}」の{知識|ちしき}で{真相|しんそう}を{解|と}き{明|あ}かし、そして——その{行動|こうどう}をどう{判断|はんだん}するか{考|かんが}えてください。これが{最後|さいご}の{事件|じけん}です。"
      - type: sprite
        id: sensei
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "ビオトープの危機と4人の正義"
        subtitle: "サイエンス捜査班 Vol.18 — 最終話"

  - id: evidence-1
    bg: schoolyard
    bgm: science-18/investigation
    steps:
      - type: effect
        name: fade-in
      - type: title_card
        text: "ステップ1：調査"
        subtitle: "証拠カード1 — 生態系のしくみ"
      - type: narration
        text: "{生態系|せいたいけい}＝{生|い}き{物|もの}＋{環境|かんきょう}。{生産者|せいさんしゃ}（{植物|しょくぶつ}・{水草|みずくさ}）が{光合成|こうごうせい}で{酸素|さんそ}と{栄養|えいよう}を{作|つく}る。{消費者|しょうひしゃ}（{動物|どうぶつ}）が{食|た}べる。{分解者|ぶんかいしゃ}（{菌類|きんるい}）が{分解|ぶんかい}する。"
      - type: narration
        text: "{食物連鎖|しょくもつれんさ}——{水草|みずくさ}→ミジンコ→メダカ→カエル→トンボ・{鳥|とり}。{土台|どだい}（{生産者|せいさんしゃ}）が{消|き}えたら、{食物連鎖|しょくもつれんさ}が{根本|こんぽん}から{崩|くず}れる！"

  - id: evidence-2
    bg: schoolyard
    steps:
      - type: title_card
        text: "証拠カード2 — ビオトープの被害"
      - type: narration
        text: "{水草|みずくさ}がなくなった{被害|ひがい}——①{酸素|さんそ}{不足|ぶそく}：{水草|みずくさ}の{光合成|こうごうせい}が{止|と}まった→メダカが{呼吸|こきゅう}できない。②{隠|かく}れ{場所|ばしょ}の{消失|しょうしつ}：カエルの{卵|たまご}が{産卵|さんらん}できない。ヤゴが{隠|かく}れられない。"
      - type: se
        sound: common/discover
      - type: narration
        text: "③{藻|も}の{異常|いじょう}{繁殖|はんしょく}：{水草|みずくさ}が{栄養|えいよう}を{吸収|きゅうしゅう}しなくなった→{藻|も}が{増|ふ}える→{水|みず}が{緑|みどり}に。ゴミ{捨|す}て{場|ば}に{水草|みずくさ}入りのゴミ{袋|ぶくろ}（ピンクのリボンで{結|むす}ばれている）。{花|はな}の{鉢植|はちう}えの{底|そこ}に{園芸用|えんげいよう}の{黒|くろ}い{土|つち}。"

  - id: evidence-3
    bg: schoolyard
    steps:
      - type: title_card
        text: "証拠カード3 — 水草の3つの役割"
      - type: narration
        text: "{水草|みずくさ}は「{雑草|ざっそう}」じゃない！ {役割|やくわり}①：{酸素|さんそ}{工場|こうじょう}——{光合成|こうごうせい}で{水中|すいちゅう}に{酸素|さんそ}を{供給|きょうきゅう}。メダカが{呼吸|こきゅう}する。"
      - type: narration
        text: "{役割|やくわり}②：{生|い}き{物|もの}の{家|いえ}——カエルが{卵|たまご}を{産|う}みつける。ヤゴが{隠|かく}れる。{稚魚|ちぎょ}が{育|そだ}つ。{役割|やくわり}③：{水|みず}の{浄化|じょうか}——{余分|よぶん}な{栄養|えいよう}を{吸収|きゅうしゅう}して{藻|も}の{異常|いじょう}{繁殖|はんしょく}を{防|ふせ}ぐ。"
      - type: se
        sound: common/discover
      - type: narration
        text: "{見|み}た{目|め}は{地味|じみ}でも、{水草|みずくさ}は{酸素|さんそ}・{住|す}みか・{浄化|じょうか}の3つの{役割|やくわり}を{持|も}つ{生態系|せいたいけい}の{土台|どだい}。{土台|どだい}を{取|と}り{除|のぞ}くと{全体|ぜんたい}が{崩壊|ほうかい}する。"

  - id: evidence-4
