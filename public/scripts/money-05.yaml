scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: money-05/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}の「お{買|か}い{物|もの}{調査|ちょうさ}」の{授業|じゅぎょう}。4{人|にん}がそれぞれ{学校|がっこう}{近|ちか}くのお{店|みせ}のセール{情報|じょうほう}を{調|しら}べて、「{本当|ほんとう}にお{得|とく}かどうか」を{報告|ほうこく}する{課題|かだい}。"
      - type: sprite
        character: kaito
        expression: happy
        position: left
      - type: dialog
        character: kaito
        text: "あおば{雑貨|ざっか}店で、{定価|ていか}1000{円|えん}の{筆箱|ふでばこ}が{半額|はんがく}500{円|えん}だったぜ！ 500{円|えん}も{安|やす}い！ めっちゃお{得|とく}！"
      - type: sprite
        character: kaito
        action: hide
      - type: bgm
        action: stop
      - type: sprite
        character: nanoha
        expression: thinking
        position: right
      - type: dialog
        character: nanoha
        text: "その{筆箱|ふでばこ}、あおば{文具|ぶんぐ}では{普段|ふだん}から480{円|えん}で{売|う}ってるよ。{半額|はんがく}500{円|えん}より{安|やす}くない？"
      - type: sprite
        character: nanoha
        action: hide
      - type: bgm
        file: money-05/tension
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{半額|はんがく}なのに{他|ほか}のお{店|みせ}より{高|たか}い？ 「{定価|ていか}1000{円|えん}」は{本物|ほんもの}でしょうか。{仮説|かせつ}{検証|けんしょう}で{確|たし}かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - character: yuta
            expression: thinking
          - character: sakura
            expression: surprised
          - character: kaito
            expression: worried
          - character: nanoha
            expression: determined
      - type: narration
        text: "{半額|はんがく}セールの{裏|うら}に{隠|かく}された{嘘|うそ}を、{仮説|かせつ}{検証|けんしょう}で{暴|あば}く{調査|ちょうさ}が{始|はじ}まった。"
      - type: sprite
        character: yuta
        action: hide
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: kaito
        action: hide
      - type: sprite
        character: nanoha
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "お金の探偵団 Vol.5"
        subtitle: "半額セールの嘘"

  # ===== 証拠カード1: カイトの報告 =====
  - id: evidence-1
    bg: classroom
    bgm: money-05/investigation
    steps:
      - type: title_card
        text: "ステップ1：調査"
      - type: narration
        text: "カイトの{調査|ちょうさ}{報告|ほうこく}——あおば{雑貨|ざっか}店で{筆箱|ふでばこ}「スターケース」を{発見|はっけん}。{定価|ていか}1000{円|えん}が{半額|はんがく}500{円|えん}。"
      - type: narration
        text: "ナノハの{指摘|してき}——「その{筆箱|ふでばこ}、あおば{文具|ぶんぐ}で{普段|ふだん}から480{円|えん}で{売|う}ってるよ。{半額|はんがく}500{円|えん}より{安|やす}い」"
      - type: narration
        text: "{疑問|ぎもん}——{半額|はんがく}500{円|えん}なのに、{別|べつ}のお{店|みせ}の{通常|つうじょう}{価格|かかく}（480{円|えん}）より{高|たか}い？"
      - type: se
        file: common/discover
      - type: narration
        text: "{仮説|かせつ}{検証|けんしょう}してみよう。「もし{定価|ていか}1000{円|えん}が{本当|ほんとう}なら、{他|ほか}のお{店|みせ}でも1000{円|えん}{前後|ぜんご}で{売|う}っているはず」——ナノハの{情報|じょうほう}（480{円|えん}）と{矛盾|むじゅん}する？"

  # ===== 証拠カード2: 4人の調査比較 =====
  - id: evidence-2
    bg: classroom
    bgm: money-05/investigation
    steps:
      - type: narration
        text: "4{人|にん}の{調査|ちょうさ}{結果|けっか}を{表|ひょう}にまとめて{比較|ひかく}しよう。"
      - type: narration
        text: "ユウタ——あおば{文具|ぶんぐ}で{消|け}しゴム{定価|ていか}120{円|えん}→96{円|えん}（20%オフ）。✅ {確実|かくじつ}にお{得|とく}。"
      - type: narration
        text: "サクラ——スーパーでジュース3{本|ぼん}セット{定価|ていか}450{円|えん}→350{円|えん}（22%オフ）。✅ お{得|とく}。"
      - type: narration
        text: "カイト——あおば{雑貨|ざっか}店で{筆箱|ふでばこ}{定価|ていか}1000{円|えん}→500{円|えん}（50%オフ）。❓ {疑問|ぎもん}。"
      - type: narration
        text: "ナノハ——あおば{文具|ぶんぐ}で{同|おな}じ{筆箱|ふでばこ}の{通常|つうじょう}{価格|かかく}は480{円|えん}。"
      - type: se
        file: common/discover
      - type: narration
        text: "{仮説|かせつ}：「{定価|ていか}1000{円|えん}が{本当|ほんとう}なら、{他|ほか}のお{店|みせ}でも1000{円|えん}{前後|ぜんご}」→ {事実|じじつ}：あおば{文具|ぶんぐ}で480{円|えん}。→ {矛盾|むじゅん}！ {定価|ていか}1000{円|えん}は{嘘|うそ}の{可能性|かのうせい}が{高|たか}い。"

  # ===== 証拠カード3: メーカー価格とカイトの調査過程 =====
  - id: evidence-3
    bg: classroom
    bgm: money-05/experiment
    steps:
      - type: sprite
        character: yuta
        expression: determined
        position: left
      - type: dialog
        character: yuta
        text: "メーカー{公式|こうしき}サイトで{調|しら}べた。{筆箱|ふでばこ}「スターケース」のメーカー{希望|きぼう}{小売|こうり}{価格|かかく}は——600{円|えん}。"
      - type: sprite
        character: yuta
        expression: thinking
      - type: dialog
        character: yuta
        text: "メーカーが『600{円|えん}で{売|う}ってね』って{言|い}ってる{商品|しょうひん}を、あおば{雑貨|ざっか}店は『{定価|ていか}1000{円|えん}』って{書|か}いてる。400{円|えん}もつり{上|あ}げてる。"
      - type: dialog
        character: yuta
        text: "{本当|ほんとう}の{割引|わりびき}{率|りつ}は500÷600＝{約|やく}83%——つまり{約|やく}17%オフにすぎない。{半額|はんがく}（50%オフ）なんかじゃない。"
      - type: sprite
        character: yuta
        action: hide
      - type: narration
        text: "カイトの{調査|ちょうさ}{状況|じょうきょう}——{月曜|げつよう}に{課題|かだい}が{出|で}たが、{火|か}〜{水曜|すいよう}はサッカーの{練習|れんしゅう}で{調査|ちょうさ}せず。{木曜|もくよう}{放課後|ほうかご}に「やばい、{明日|あした}{提出|ていしゅつ}！」と{焦|あせ}り、{帰|かえ}り{道|みち}であおば{雑貨|ざっか}店の{張|は}り{紙|がみ}を見つけた。{他|ほか}のお{店|みせ}は{確認|かくにん}していない。"
      - type: se
        file: common/discover
      - type: narration
        text: "{報告書|ほうこくしょ}を{書|か}くとき「ちょっとおかしいかも」と{感|かん}じたが、「{半額|はんがく}って{書|か}いてあるし、すごいレポートになる」と{考|かんが}えてそのまま{提出|ていしゅつ}した。"

  # ===== 証拠カード4: 張り紙の観察と3店舗比較 =====
  - id: evidence-4
    bg: classroom
    bgm: money-05/experiment
    steps:
      - type: sprite
        character: sakura
        expression: surprised
        position: right
      - type: dialog
        character: sakura
        text: "{木曜|もくよう}の{帰|かえ}り、あおば{雑貨|ざっか}店の{前|まえ}を{通|とお}った。{半額|はんがく}セールの{張|は}り{紙|がみ}があったけど、『1000{円|えん}』の{部分|ぶぶん}が{手書|てが}きで{上|うえ}から{貼|は}り{直|なお}されてたの。{元|もと}の{数字|すうじ}は{消|け}されてた。"
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: nanoha
        expression: determined
        position: left
      - type: dialog
        character: nanoha
        text: "3つのお{店|みせ}の{値段|ねだん}を{比|くら}べたよ。あおば{文具|ぶんぐ}480{円|えん}、スーパー520{円|えん}、あおば{雑貨|ざっか}店500{円|えん}。『{半額|はんがく}セール』のお{店|みせ}が{真|ま}ん{中|なか}。お{得|とく}でも{何|なん}でもない。"
      - type: sprite
        character: nanoha
        expression: thinking
      - type: dialog
        character: nanoha
        text: "しかもあおば{雑貨|ざっか}店は{先月|せんげつ}まで{同|おな}じ{筆箱|ふでばこ}を550{円|えん}で{売|う}ってた。550{円|えん}→『{定価|ていか}1000{円|えん}』に{変|か}えてから{半額|はんがく}500{円|えん}。{実質|じっしつ}50{円|えん}の{値下|ねさ}げにすぎない。"
      - type: sprite
        character: nanoha
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "さらにカイトは{発表後|はっぴょうご}、サクラとユウタに『{半額|はんがく}だよ！ {買|か}いに{行|い}こうよ』と{勧|すす}めていた。{騙|だま}された{人|ひと}が、{知|し}らずに{友達|ともだち}にも{勧|すす}める——{被害|ひがい}の{連鎖|れんさ}になりかけていた。"

  # ===== 証拠カード5: カイトの3段階 =====
  - id: card-5
    bg: classroom
    bgm: money-05/tension
    steps:
      - type: effect
        name: fade-out
      - type: effect
        name: fade-in
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "あおば{雑貨|ざっか}店に{確認|かくにん}しました。お{店|みせ}の{人|ひと}は『{定価|ていか}はうちが{決|き}めた{値段|ねだん}で、メーカーの{値段|ねだん}とは{違|ちが}います。セールのために{高|たか}めに{設定|せってい}しました』と。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "これを『{二重|にじゅう}{価格|かかく}{表示|ひょうじ}』と{言|い}います。{消費者|しょうひしゃ}を{誤解|ごかい}させる{表示|ひょうじ}として、{法律|ほうりつ}で{問題|もんだい}になることもあります。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "カイトの{立場|たちば}を3{段階|だんかい}で{考|かんが}えてみよう。"
      - type: narration
        text: "{段階|だんかい}1：{被害者|ひがいしゃ}。お{店|みせ}のトリックに{騙|だま}された。『{半額|はんがく}』を{信|しん}じたのは{自然|しぜん}な{反応|はんのう}。"
      - type: narration
        text: "{段階|だんかい}2：{調査|ちょうさ}{不足|ぶそく}の{報告者|ほうこくしゃ}。{他|ほか}のお{店|みせ}を{確認|かくにん}しなかった。『おかしいかも』と{気|き}づきつつ{調査|ちょうさ}を{続|つづ}けなかった。"
      - type: narration
        text: "{段階|だんかい}3：（{意図|いと}しない）{加担者|かたんしゃ}。{友達|ともだち}にも『{半額|はんがく}だよ！ {買|か}いに{行|い}こう』と{勧|すす}め、{被害|ひがい}を{広|ひろ}げかけた。"
      - type: narration
        text: "{騙|だま}されただけなら{被害者|ひがいしゃ}。でも{騙|だま}されたまま{友達|ともだち}に{勧|すす}めたら、その{責任|せきにん}はカイトにもある。{仮説|かせつ}{検証|けんしょう}は「{自分|じぶん}を{守|まも}る{力|ちから}」であり「{友達|ともだち}を{守|まも}る{力|ちから}」でもある。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: money-05/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}が{出|で}そろいました。{考|かんが}えてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        text: "嘘のセール情報を報告したのは誰？"
        options:
          - text: "カイト（調査不足で嘘のセールに飛びついた）"
            feedback: "カイトは{嘘|うそ}をついたのではなく、{嘘|うそ}のセールに{騙|だま}された。でも{調査|ちょうさ}をサボって{最初|さいしょ}のセールに{飛|と}びつき、『おかしいかも』と{思|おも}いつつ{確認|かくにん}しなかった。"
          - text: "お店（定価をつり上げた）"
            feedback: "あおば{雑貨|ざっか}店が{定価|ていか}を1000{円|えん}につり{上|あ}げたのは{事実|じじつ}。でも「{報告|ほうこく}した{人|ひと}」はカイト。お{店|みせ}のトリックとカイトの{調査|ちょうさ}{不足|ぶそく}、{両方|りょうほう}{問題|もんだい}がある。"
          - text: "ユウタ（メーカー価格を先に調べていたのに黙っていた）"
            feedback: "ユウタがメーカー{価格|かかく}を{調|しら}べたのはカイトの{発表後|はっぴょうご}。{先|さき}に{知|し}っていたわけではないよ。"
          - text: "ナノハ（480円の情報を先に出さなかった）"
            feedback: "ナノハは{金曜|きんよう}の{発表|はっぴょう}で{指摘|してき}した。{先|さき}に{出|だ}さなかったことは{問題|もんだい}ではなく、{課題|かだい}の{流|なが}れとして{自然|しぜん}。"
      - type: choice
        id: q2
        text: "カイトは被害者？ それとも問題あり？"
        options:
          - text: "被害者。お店のトリックに騙されただけ"
            feedback: "お{店|みせ}の{二重|にじゅう}{価格|かかく}{表示|ひょうじ}に{騙|だま}されたのは{事実|じじつ}。でも{他|ほか}のお{店|みせ}を{確認|かくにん}しなかったのも{事実|じじつ}。「{騙|だま}された」と「{調査|ちょうさ}{不足|ぶそく}」は{別|べつ}の{問題|もんだい}。"
          - text: "問題あり。調査をサボって確認しなかった"
            feedback: "{仮説|かせつ}{検証|けんしょう}——『{他|ほか}のお{店|みせ}でも{同|おな}じ{値段|ねだん}？』と{確認|かくにん}するだけで{嘘|うそ}に{気|き}づけた。{調査|ちょうさ}{不足|ぶそく}が{騙|だま}された{原因|げんいん}。"
          - text: "両方。騙されたけど友達にも勧めた責任がある"
            feedback: "{被害者|ひがいしゃ}であると{同時|どうじ}に、{友達|ともだち}に{勧|すす}めて{被害|ひがい}を{広|ひろ}げかけた{加担者|かたんしゃ}でもある。{調査|ちょうさ}していれば{自分|じぶん}も{友達|ともだち}も{守|まも}れた。"
          - text: "お店が一番悪い。消費者を騙すのは法律違反"
            feedback: "{二重|にじゅう}{価格|かかく}{表示|ひょうじ}は{法律|ほうりつ}で{問題|もんだい}になることがある。お{店|みせ}の{責任|せきにん}は{大|おお}きい。でも{買|か}う{側|がわ}も{自分|じぶん}で{確認|かくにん}する{力|ちから}が{必要|ひつよう}。"
      - type: choice
        id: q3
        text: "セールで「お得！」を見たらどうする？"
        options:
          - text: "他のお店の値段と比較する"
            feedback: "{仮説|かせつ}{検証|けんしょう}の{基本|きほん}。「{同|おな}じ{商品|しょうひん}が{他|ほか}のお{店|みせ}でいくらか」を{調|しら}べれば、{定価|ていか}が{本物|ほんもの}か{分|わ}かる。"
          - text: "メーカーの価格を調べる"
            feedback: "メーカー{希望|きぼう}{小売|こうり}{価格|かかく}がセールの{定価|ていか}と{大|おお}きく{違|ちが}えば、{定価|ていか}のつり{上|あ}げ。ネットで{簡単|かんたん}に{調|しら}べられる。"
          - text: "1日待ってから決める"
            feedback: "「{半額|はんがく}！」に{飛|と}びつかず、{冷静|れいせい}になる{時間|じかん}を{取|と}る。1{日|にち}{待|ま}つと「やっぱりいらないかも」と{気|き}づくことも{多|おお}い。"
          - text: "全部やる（比較＋メーカー確認＋待つ）"
            feedback: "{完璧|かんぺき}。{比較|ひかく}・{確認|かくにん}・{冷静|れいせい}の3つで「{本当|ほんとう}のお{得|とく}」が{分|わ}かる。{仮説|かせつ}{検証|けんしょう}は{自分|じぶん}と{友達|ともだち}を{守|まも}る{力|ちから}。"

  # ===== 真実: ユウタ =====
  - id: truth-yuta
    bg: classroom
    bgm: money-05/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: sprite
        character: yuta
        expression: normal
        position: left
      - type: dialog
        character: yuta
        text: "メーカー{希望|きぼう}{小売|こうり}{価格|かかく}は600{円|えん}。あおば{雑貨|ざっか}店の『{定価|ていか}1000{円|えん}』は400{円|えん}のつり{上|あ}げ。"
