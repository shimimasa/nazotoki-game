meta:
  id: philosophy-01
  title: 同じほうき
  series: 哲学探偵団
  volume: 1
  estimatedMinutes: 18

characters:
  tetsu:
    name: テツ
    color: "#4169E1"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  sokura:
    name: ソクラ
    color: "#FF4444"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  rojika:
    name: ロジカ
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  moya:
    name: モヤ
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  yamada:
    name: 山田先生
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "教室のほうきには、「はなこ」という名前の名札がついていました。"
      - type: narration
        text: "でも最近、ほうきの{柄|え}が折れて新しいものにかわり、そのあと{穂先|ほさき}もいたんで新しくなりました。元の部品はもう1つもありません。"
      - type: narration
        text: "それなのに、名札だけはずっと「はなこ」のままでした。ところがある日、だれかが名札を「しんこ」にかえてしまいます。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: moya
        expression: worried
        position: center
      - type: dialog
        character: moya
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: moya
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "{{落|お}}ち{{着|つ}}いて。みんなで{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみよう。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: tetsu, expression: determined }
          - { id: sokura, expression: thinking }
          - { id: rojika, expression: thinking }
          - { id: moya, expression: worried }
      - type: narration
        text: "「哲学探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: tetsu
        action: hide
      - type: sprite
        character: sokura
        action: hide
      - type: sprite
        character: rojika
        action: hide
      - type: sprite
        character: moya
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: 哲学探偵団
        subtitle: Vol.1 同じほうき

  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: ステップ1
        subtitle: 調査
      - type: narration
        text: "ほうきの写真と交換記録"
      - type: se
        sound: discover

  - id: evidence-2
    steps:
      - type: narration
        text: "「全部入れかわったら同じ？」カード"
      - type: se
        sound: discover

  - id: evidence-3
    steps:
      - type: narration
        text: "そうじ当番表と行動メモ"
      - type: se
        sound: discover

  - id: evidence-4
    steps:
      - type: narration
        text: "筆跡くらべメモ"
      - type: se
        sound: discover

  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: ステップ2
        subtitle: 反転
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "先生の聞きとりメモ"
      - type: se
        sound: discover
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: yamada
        action: hide

  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: tetsu
        expression: thinking
        position: left
      - type: dialog
        character: tetsu
        text: "テツの考えを述べる"
      - type: sprite
        character: tetsu
        action: hide
      - type: sprite
        character: sokura
        expression: thinking
        position: right
      - type: dialog
        character: sokura
        text: "ソクラの考えを述べる"
      - type: sprite
        character: sokura
        action: hide
      - type: sprite
        character: rojika
        expression: thinking
        position: left
      - type: dialog
        character: rojika
        text: "ロジカの考えを述べる"
      - type: sprite
        character: rojika
        action: hide
      - type: sprite
        character: moya
        expression: worried
        position: right
      - type: dialog
        character: moya
        text: "モヤの考えを述べる"
      - type: sprite
        character: moya
        action: hide

  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票
      - type: narration
        text: "「ほうきの名札を変えたのは誰？」"
      - type: sprite_group
        characters:
          - { id: tetsu, expression: normal }
          - { id: sokura, expression: normal }
          - { id: rojika, expression: normal }
          - { id: moya, expression: worried }
      - type: choice
        id: q1
        text: "ほうきの名札を変えたのは誰？"
        options:
          - text: テツ
            value: tetsu
            correct: false
            feedback: "テツは交換記録を整理した側"
          - text: ソクラ
            value: sokura
            correct: false
            feedback: "ソクラは名札に触っていないとアリバイがある"
          - text: ロジカ
            value: rojika
            correct: false
            feedback: "ロジカは筆跡を分析した側"
          - text: モヤ
            value: moya
            correct: true
            feedback: "モヤは\"全部入れ替わったのに同じ名前はおかしい\"と本気で考えた。勝手に変えたのは問題だけど、モヤの問いは面白い。\"全部変わっても同じもの？\"——これはテセウスの船という有名な哲学の問いなんだ。答えは1つじゃない"
      - type: sprite
        character: tetsu
        action: hide
      - type: sprite
        character: sokura
        action: hide
      - type: sprite
        character: rojika
        action: hide
      - type: sprite
        character: moya
        action: hide

  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: 真相
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "真相が明かされた。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite
        character: moya
        expression: worried
        position: center
      - type: dialog
        character: moya
        text: "ごめんなさい。"
      - type: sprite
        character: moya
        expression: determined
      - type: dialog
        character: moya
        text: "ごめんなさい。"
      - type: sprite
        character: moya
        action: hide

  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: yamada
        expression: thinking
      - type: dialog
        character: yamada
        text: "・証拠カード1で、柄も穂先も全部かわっており、名札だけが問題として残っていたと分かる。\n・証拠カード3で、名札の近くに行けたのはモヤとソクラの2人だけだと分かる。\n・同じカード3で、ソクラはその時間に先生に呼ばれており、名札を書きかえる時間がなかったと分かる。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: tetsu, expression: happy }
          - { id: sokura, expression: happy }
          - { id: rojika, expression: happy }
          - { id: moya, expression: happy }
      - type: narration
        text: "哲学探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: tetsu
        action: hide
      - type: sprite
        character: sokura
        action: hide
      - type: sprite
        character: rojika
        action: hide
      - type: sprite
        character: moya
        action: hide
      - type: effect
        name: fade-out
        duration: 1000
