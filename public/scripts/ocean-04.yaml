meta:
  id: ocean-04
  title: "サンゴの証言"
  series: "海洋探偵団"
  volume: 4
  estimatedMinutes: 18

characters:
  shioru:
    name: "シオル"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  minato:
    name: "ミナト"
    color: "#FF4444"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  nami:
    name: "ナミ"
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  kai:
    name: "カイ"
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "沖縄研修旅行の海の観察会で、サンゴが真っ白に変わっているのをミナトが発見した。"
      - type: narration
        text: "ミナトは「誰かが触って傷つけた」と主張し、前日の海を泳いでいた仲間を次々と責め始めた。"
      - type: narration
        text: "しかし「サンゴの白化」は人が触ることで起きる現象ではない——白化の原因は海水温の上昇による共生藻類の排出という、全く別のメカニズムだった。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: minato
        expression: worried
        position: center
      - type: dialog
        character: minato
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: minato
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: shioru, expression: determined }
          - { id: minato, expression: thinking }
          - { id: nami, expression: thinking }
          - { id: kai, expression: worried }
      - type: narration
        text: "「海洋探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "海洋探偵団"
        subtitle: "Vol.4 サンゴの証言"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: shioru
        expression: thinking
        position: left
      - type: dialog
        character: shioru
        text: "白化してるのはここだけじゃない。あの岩の向こうも、全部白い。人が触ったとしたら何百人も必要"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        expression: worried
        position: right
      - type: dialog
        character: minato
        text: "Card 5後「白化は4日前から始まってた。触ったのが原因じゃなかった。ごめんなさい"
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        expression: thinking
        position: left
      - type: dialog
        character: nami
        text: "4日前から高水温が続いてる。しかも私たちが来た日より前。白化は自然に起きた"
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        expression: thinking
        position: right
      - type: dialog
        character: kai
        text: "ミナトはサンゴが大好きだから怒った。その気持ちは分かる。でも間違えたら正直に言えるよね"
      - type: sprite
        character: kai
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「サンゴが白化した本当の原因は何？」"
      - type: sprite_group
        characters:
          - { id: shioru, expression: normal }
          - { id: minato, expression: normal }
          - { id: nami, expression: normal }
          - { id: kai, expression: worried }
      - type: choice
        id: q1
        text: "サンゴが白化した本当の原因は何？"
        options:
          - label: "シオル"
            value: shioru
            correct: false
            feedback: "シオルは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "ミナト"
            value: minato
            correct: true
            feedback: "ミナトの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - label: "ナミ"
            value: nami
            correct: false
            feedback: "ナミは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "カイ"
            value: kai
            correct: false
            feedback: "カイは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、ミナト"
      - type: dialog
        character: sensei
        text: "動機は、#15 正義感の暴走 — ミナトは生き物が大好きで、サンゴが傷ついたことへの怒りが先走り、「誰かが触った＝白化した」という間違った因果関係で仲間を責めた。白化のメカニズムを知っていれば、人が触ることと白化は無関係だと分かる。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: minato
        expression: worried
        position: center
      - type: dialog
        character: minato
        text: "Card 5後「白化は4日前から始まってた。触ったのが原因じゃなかった。ごめんなさい"
      - type: sprite
        character: minato
        expression: determined
      - type: dialog
        character: minato
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: minato
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・サンゴ礁の生態系と白化のメカニズム（共生藻類・水温・白化の条件）を理解する\n・タイムラインスキル — 白化の原因を時系列で整理し、「いつから白化が始まったか」を白化と水温の対応で追う"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: shioru, expression: happy }
          - { id: minato, expression: happy }
          - { id: nami, expression: happy }
          - { id: kai, expression: happy }
      - type: narration
        text: "海洋探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
