meta:
  id: health-01
  title: けがの記録の謎
  series: 保健探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  haruki:
    name: ハルキ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  mio:
    name: ミオ
    color: "#FF6B9D"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  kenta:
    name: ケンタ
    color: "#E67E22"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  sayaka:
    name: サヤカ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: gym
    bgm: health-01/opening
    steps:
      - type: narration
        text: "あおば小学校3年1組、体育の{授業|じゅぎょう}。{今日|きょう}はバスケットボール。"
      - type: narration
        text: "みんなが体育館でシュート練習をしている——"
      - type: se
        sound: health-01/whistle
      - type: narration
        text: "「いたっ！」"
      - type: effect
        name: shake
        duration: 400
      - type: narration
        text: "ケンタがけがをした。先生に{付|つ}き{添|そ}われて{保健室|ほけんしつ}へ。"
      - type: bgm
        action: stop
      - type: narration
        text: "{保健室|ほけんしつ}のけがの{記録|きろく}シートには「ねんざ（足首）」と{記録|きろく}された。"
      - type: narration
        text: "{授業|じゅぎょう}が終わった後、クラスにこんな話が広まった——"
      - type: bgm
        track: health-01/investigation
      - type: narration
        text: "「ケンタ、{廊下|ろうか}を走って転んだらしいよ」"
      - type: narration
        speed: slow
        text: "でも——{廊下|ろうか}を走って転んだだけで、「ねんざ」になる？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "けがの{記録|きろく}と{目撃|もくげき}{情報|じょうほう}が合わない。ケンタは本当にどこでけがをしたのか？"
      - type: dialog
        character: sensei
        text: "{保健|ほけん}{探偵|たんてい}団、けがの{種類|しゅるい}から真実を{突|つ}き止めよう！"
        expression: normal
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 保健探偵団 Vol.1
        subtitle: けがの記録の謎

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: classroom
    bgm: health-01/investigation
    steps:
      - type: narration
        text: 4人のクラスメートに話を聞こう。
      - type: sprite
        character: haruki
        expression: normal
        position: left
      - type: dialog
        character: haruki
        text: "ぼくはハルキ。毎日の体調や気温を{記録|きろく}するのが{習慣|しゅうかん}。{保健室|ほけんしつ}のけがの{記録|きろく}シートも少し見たよ。"
      - type: sprite
        character: haruki
        action: hide
      - type: sprite
        character: mio
        expression: worried
        position: right
      - type: dialog
        character: mio
        text: "わたしはミオ。ケンタが「いたっ」って声をあげた{瞬間|しゅんかん}、5メートルくらいのところにいたの。"
      - type: dialog
        character: mio
        text: ケンタのこと心配……。
        expression: normal
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: kenta
        expression: normal
        position: left
      - type: dialog
        character: kenta
        text: "おれはケンタ。体を動かすのが大好き。来週バスケの大事な{試合|しあい}があるんだ。"
      - type: dialog
        character: kenta
        text: "足首をねんざしちゃったけど……{廊下|ろうか}で転んだんだよ、うん。"
        expression: thinking
      - type: sprite
        character: kenta
        action: hide
      - type: sprite
        character: sayaka
        expression: normal
        position: right
      - type: dialog
        character: sayaka
        text: "わたしはサヤカ。{今日|きょう}は体調が悪くて体育はベンチで見学してた。体育館全体がよく見えたよ。"
      - type: sprite
        character: sayaka
        action: hide

  # ===== 証拠カード1: けがの種類ルール =====
  - id: evidence-1
    bg: classroom
    bgm: health-01/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: けがの種類と発生状況のルール
      - type: narration
        text: "{保健室|ほけんしつ}のポスターを{確認|かくにん}しよう。けがの{種類|しゅるい}によって、よく起きる{状況|じょうきょう}が決まっている。"
      - type: narration
        text: "すり{傷|きず} → {廊下|ろうか}や地面で転んで、{床|ゆか}に{滑|すべ}ったとき"
      - type: narration
        text: "{打撲|だぼく}（打ち身）→ 机や{壁|かべ}にぶつかったとき"
      - type: narration
        text: "ねんざ → ジャンプして着地したとき・{段差|だんさ}を{踏|ふ}み外したとき"
      - type: choice
        id: obs-1
        question: "{廊下|ろうか}で{転|ころ}んだときに{多|おお}いのは？"
        options:
          - text: "すり{傷|きず}や{打撲|だぼく}"
            value: scrape
            reaction:
              character: sensei
              expression: happy
              text: "{保健室|ほけんしつ}の{基本|きほん}だね。"
          - text: "ねんざ"
            value: sprain
            reaction:
              character: sensei
              expression: thinking
              text: "ねんざは{別|べつ}の{動|うご}きで{起|お}きやすいよ。"
          - text: "{全部|ぜんぶ}おなじ"
            value: same
            reaction:
              character: sensei
              expression: thinking
              text: "{種類|しゅるい}ごとに{特徴|とくちょう}があるんだ。"
      - type: se
        sound: common/discover
      - type: narration
        speed: slow
        text: "「{廊下|ろうか}を走って転んだ」なら、すり{傷|きず}や{打撲|だぼく}が多い。ねんざになるには、{関節|かんせつ}に{異常|いじょう}な力がかかるジャンプ着地や{段差|だんさ}が{必要|ひつよう}——"
      - type: narration
        text: "ケンタのけがは「ねんざ（足首）」。{廊下|ろうか}を走って転んだだけでねんざになる？"

  # ===== 証拠カード2: 2人の記録シート比較 =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 2人のけがの記録を比べよう
      - type: narration
        text: "{今日|きょう}、{保健室|ほけんしつ}に来たのは2人。"
      - type: narration
        text: "サヤカのけが——{打撲|だぼく}（{肩|かた}）。1F{廊下|ろうか}で柱にぶつかった。{担任|たんにん}が{確認|かくにん}{済|ず}み。"
      - type: narration
        text: "ケンタのけが——ねんざ（足首）。{廊下|ろうか}で転んだ。本人{申告|しんこく}のみ。"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "2つの{記録|きろく}を{比|くら}べると——"
      - type: narration
        text: "サヤカの「{打撲|だぼく}」は{廊下|ろうか}で{説明|せつめい}がつく。柱にぶつかった→{打撲|だぼく}。ルール通り。"
      - type: choice
        id: obs-2
        question: "もっと{詳|くわ}しく{調|しら}べるべきなのはどっち？"
        options:
          - text: "サヤカの{打撲|だぼく}"
            value: sayaka
            reaction:
              character: sensei
              expression: thinking
              text: "{説明|せつめい}とけがが{合|あ}っているね。"
          - text: "ケンタのねんざ"
            value: kenta
            reaction:
              character: sensei
              expression: happy
              text: "{場所|ばしょ}とけがが{合|あ}わないのが{気|き}になる。"
          - text: "{両方|りょうほう}おなじくらい"
            value: both
            reaction:
              character: sensei
              expression: thinking
              text: "まずはズレの{大|おお}きい{方|ほう}からだね。"
      - type: narration
        speed: slow
        text: "でもケンタの「ねんざ」は{廊下|ろうか}で{説明|せつめい}がつかない。ねんざはジャンプ着地や{段差|だんさ}で起きるけが。"
      - type: narration
        text: "そしてもう1つ——サヤカのけがは「{担任|たんにん}が{確認|かくにん}」。ケンタのけがは「本人{申告|しんこく}のみ」。{誰|だれ}も{確認|かくにん}していない。"

  # ===== 証拠カード3: 体育授業の記録 =====
  - id: evidence-3
    bgm: health-01/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 体育の時間割と校内ルール
      - type: narration
        text: "3時間目の体育{記録|きろく}——"
      - type: narration
        text: "10:00～10:15 {準備|じゅんび}{体操|たいそう}・ランニング（体育館）"
      - type: narration
        text: 10:15～10:30 バスケットボール シュート練習（体育館）
      - type: narration
        text: "10:30にケンタがけが → 練習{中断|ちゅうだん}"
      - type: narration
        text: "ケンタがけがをした10:30は、バスケのシュート練習中の{時間帯|じかんたい}。"
      - type: narration
        text: "体育館から{廊下|ろうか}に出るには{渡|わた}り{廊下|ろうか}を通る{必要|ひつよう}がある——体育中に{廊下|ろうか}でけがをする{状況|じょうきょう}は？"
      - type: se
        sound: common/discover
      - type: narration
        text: "校内ルール——「体育中のけが」は{保護者|ほごしゃ}に電話{連絡|れんらく}。「{廊下|ろうか}でのけが」は本人{申告|しんこく}で{済|す}む。"
      - type: narration
        speed: slow
        text: "もしケンタが「{保護者|ほごしゃ}に{連絡|れんらく}されたくない」理由があったなら……わざと「{廊下|ろうか}」と{申告|しんこく}した{可能性|かのうせい}がある。"

  # ===== 証拠カード4: 目撃証言 =====
  - id: evidence-4
    bgm: health-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: 3人の目撃証言
      - type: sprite
        character: haruki
        expression: thinking
        position: left
      - type: dialog
        character: haruki
        text: "{授業|じゅぎょう}の前、ケンタが「{今日|きょう}の{試合|しあい}、{絶対|ぜったい}出たい。けがしたら終わりだ」って言ってた。"
      - type: dialog
        character: haruki
        text: "それと……{保健室|ほけんしつ}のシートに「ジャンプ着地時」って{書|か}いてあった気がする。"
        expression: determined
      - type: sprite
        character: haruki
        action: hide
      - type: sprite
        character: sayaka
        expression: determined
        position: right
      - type: dialog
        character: sayaka
        text: "わたしはベンチから全体を見てた。10:30ごろ、ケンタはゴール下でシュート練習してたよ。"
      - type: dialog
        character: sayaka
        text: "{廊下|ろうか}の方向には向かってなかった。ジャンプして着地したとき、急に転んで足首を{押|お}さえてた。"
        expression: thinking
      - type: sprite
        character: sayaka
        action: hide
      - type: sprite
        character: mio
        expression: worried
        position: left
      - type: dialog
        character: mio
        text: わたし、ケンタのそばにいたの。シュートを打ったあとの着地で転んだのを見た。
      - type: dialog
        character: mio
        text: "{保健室|ほけんしつ}に行くとき、ケンタに小声で言われたの……「先生には{廊下|ろうか}で転んだって言って」って。"
        expression: determined
      - type: sprite
        character: mio
        action: hide
      - type: narration
        text: "3人の{証言|しょうげん}が{一致|いっち}している。ケンタは10:30に体育館のゴール下でジャンプ着地時にねんざした。{廊下|ろうか}ではない。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: health-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "けがの{種類|しゅるい}と{証言|しょうげん}を合わせると、真実が見えてくるね。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: ケンタが本当にけがをした場所はどこ？
        options:
          - text: 廊下（ケンタの申告通り）
            value: hallway
            feedback: 廊下で転んだら「すり傷」や「打撲」が典型的。「ねんざ」は廊下転倒では起きにくいよ。けがの種類と合わない。
          - text: 体育館（バスケのシュート練習中）
            value: gym
            feedback: 正解！ ねんざはジャンプ着地で起きるけが。10:30のバスケ練習中のシュート着地——けがの種類と完全に一致する。
          - text: 校庭
            value: schoolyard
            feedback: 10:30は体育の授業中で、体育館にいたはず。校庭に出る理由がないよ。
          - text: 教室
            value: classroom
            feedback: 10:30はバスケの授業中。教室にいたという証拠は誰からも出ていないよ。
      - type: choice
        id: q2
        question: ケンタが「廊下で転んだ」と嘘をついた理由は？
        options:
          - text: 恥ずかしかったから
            value: embarrassed
            feedback: 恥ずかしさもあるかもしれないけど、ケンタは「今日の試合、絶対出たい」と言っていたよね。
          - text: 来週の試合に出場できなくなるのが怖かったから
            value: match
            feedback: その通り！ 「体育中のけが」は保護者に連絡が行く。「休みなさい」と言われて試合に出られなくなるのを恐れた。
          - text: 体育の授業が嫌いだったから
            value: dislike-pe
            feedback: ケンタはバスケが大好きで試合にも出たがってた。体育が嫌いではなさそうだよ。
          - text: 特に理由はなく、とっさに言ってしまった
            value: impulse
            feedback: 「とっさに」は近いけど、理由がないわけではない。試合への焦りが背景にあったんだ。

  # ===== 証拠カード5: 映像記録 =====
  - id: evidence-5
    bgm: health-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: 体育館の記録映像
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "体育館の安全カメラの{記録|きろく}{映像|えいぞう}を{確認|かくにん}しました。"
      - type: sprite
        character: sensei
        action: hide
      - type: narration
        text: "{映像|えいぞう}{記録|きろく}——"
      - type: narration
        text: 10:28 ケンタがゴール下でシュート練習を開始
      - type: narration
        text: 10:30 ケンタがジャンプシュートを打つ
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "着地時に右足首をひねってバランスを{崩|くず}し{転倒|てんとう}。"
      - type: narration
        text: "10:30～10:32 ケンタが足首を{押|お}さえて{座|すわ}り{込|こ}む。ミオが声をかける。"
      - type: narration
        text: "10:32 {担任|たんにん}の先生がケンタを{保健室|ほけんしつ}へ。"
      - type: narration
        speed: slow
        text: "けがが起きた場所は体育館のゴール下。{廊下|ろうか}ではない。——{映像|えいぞう}が全てを{証明|しょうめい}した。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: classroom
    bgm: health-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: なぜケンタは嘘をついたのか
      - type: effect
        name: fade-in
        duration: 600

  # ハルキの秘密
  - id: truth-haruki
    bg: classroom
    steps:
      - type: sprite
        character: haruki
        expression: worried
        position: left
      - type: dialog
        character: haruki
        text: "ぼくも正直に言います。{保健室|ほけんしつ}のシートに「ジャンプ着地時に足首をひねった」って{書|か}いてあるのを読んでた。"
      - type: dialog
        character: haruki
        text: "ケンタが「{廊下|ろうか}で転んだ」と言ってたから、「{記録|きろく}の書き方が{違|ちが}うのかな？」と思って{黙|だま}ってた。{矛盾|むじゅん}に気づいてたのに。"
        expression: determined
      - type: sprite
        character: haruki
        action: hide

  # ミオの秘密
  - id: truth-mio
    steps:
      - type: sprite
        character: mio
        expression: worried
        position: right
      - type: dialog
        character: mio
        text: わたし、全部見てた。ケンタは体育館でジャンプ着地のときに足首をひねったの。
      - type: dialog
        character: mio
        text: "{保健室|ほけんしつ}に行くとき、ケンタに「{廊下|ろうか}で転んだって言って」って{頼|たの}まれて……友達だから{断|ことわ}れなかった。"
        expression: worried
      - type: dialog
        character: mio
        text: "でも{嘘|うそ}をつかせるのはやっぱり{嫌|いや}だった。正直に話してよかった。"
        expression: determined
      - type: sprite
        character: mio
        action: hide

  # サヤカの秘密
  - id: truth-sayaka
    steps:
      - type: sprite
        character: sayaka
        expression: thinking
        position: left
      - type: dialog
        character: sayaka
        text: "わたしはベンチから全部見えてた。ケンタがゴール下でジャンプして、着地のときにバランス{崩|くず}して転んだのを。"
      - type: dialog
        character: sayaka
        text: "「{廊下|ろうか}で転んだ」って聞いたとき「おかしい」と思ったけど、なぜ{嘘|うそ}をついてるのか分からなくて{黙|だま}ってた。"
        expression: worried
      - type: sprite
        character: sayaka
        action: hide

  # ケンタの真実（クライマックス）
  - id: truth-kenta
    bgm: health-01/truth
    steps:
      - type: sprite
        character: kenta
        expression: worried
        position: center
      - type: dialog
        character: kenta
        text: "……ごめん。本当は体育館でけがしたんだ。{廊下|ろうか}じゃない。"
      - type: narration
        speed: slow
        text: ケンタがゆっくりと話し始めた。
      - type: dialog
        character: kenta
        text: バスケのシュート練習でジャンプしたとき、着地で足首をひねっちゃったんだ。
        expression: worried
      - type: dialog
        character: kenta
        text: "でも「体育中のけが」って{報告|ほうこく}したら、お母さんに電話が行くだろ？ そうしたら来週の{試合|しあい}に「休みなさい」って言われちゃうかもしれない。"
      - type: dialog
        character: kenta
        text: "「{廊下|ろうか}で転んだ」って言えば、本人{申告|しんこく}で{済|す}む。{保護者|ほごしゃ}に{連絡|れんらく}されない。だからとっさに……。"
        expression: worried
      - type: dialog
        character: kenta
