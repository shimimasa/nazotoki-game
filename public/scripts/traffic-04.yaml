      - type: sprite
        character: michika
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。{犬|いぬ}がこわくてユイちゃんが{止|と}まった。トワが{手|て}を{引|ひ}いて{渡|わた}らせた。{死角|しかく}の{方向|ほうこう}を{確認|かくにん}しなかった——"
      - type: choice
        id: q1
        question: ヒヤリハットのきっかけを作ったのは誰？
        options:
          - text: トワ（犬から守ろうとして死角を見落とした）
            value: towa
            correct: true
            feedback: "{正解|せいかい}！ トワは{犬|いぬ}がこわがるユイちゃんを{守|まも}ろうとして「{早|はや}く{渡|わた}ろう」と{手|て}を{引|ひ}いた。でも{犬|いぬ}だけに{集中|しゅうちゅう}して、{死角|しかく}の{方向|ほうこう}から{来|く}る{自転車|じてんしゃ}を{確認|かくにん}しなかった。{善意|ぜんい}の{行動|こうどう}でも、{安全|あんぜん}{確認|かくにん}をしないと{別|べつ}の{危険|きけん}を{生|う}むことがある。"
          - text: ヒカル（死角の構造に詳しくて怪しい）
            value: hikaru
            feedback: "ヒカルは{交差点|こうさてん}の{構造|こうぞう}を{分析|ぶんせき}した{情報型|じょうほうがた}。{死角|しかく}を{図|ず}で{説明|せつめい}できる{立場|たちば}。きっかけを{作|つく}ったのはヒカルではないよ。"
          - text: ハシル（飛び出しの原因を追った）
            value: hashiru
            feedback: "ハシルは{高校生|こうこうせい}の{証言|しょうげん}と{合|あ}わせて{考|かんが}えた{行動型|こうどうがた}。{真相|しんそう}に{気|き}づく{役割|やくわり}。きっかけを{作|つく}ったのはハシルではないよ。"
          - text: ミチカ（目撃情報を分析していた）
            value: michika
            feedback: "ミチカは{犬|いぬ}の{存在|そんざい}と{守|まも}ろうとした{可能性|かのうせい}を{考|かんが}えた{観察型|かんさつがた}。きっかけを{作|つく}ったのはミチカではないよ。"

  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: トワの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: towa
        expression: worried
        position: center
      - type: dialog
        character: towa
        text: "……ヒヤリハットのきっかけを{作|つく}ったのは、わたしです。"
        expression: worried
      - type: narration
        text: "トワは{小|ちい}さな{声|こえ}で{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: towa
        text: "{犬|いぬ}がほえて、ユイちゃんが{固|かた}まっちゃったの。こわがってて、とにかく{早|はや}く{渡|わた}らせてあげたくて、{手|て}を{引|ひ}いたの。"
        expression: thinking
      - type: dialog
        character: towa
        text: "でもそのとき、{反対側|はんたいがわ}の{死角|しかく}から{来|く}る{自転車|じてんしゃ}を{全然|ぜんぜん}{見|み}ていなかった。{守|まも}ろうとしたのに、{別|べつ}の{危険|きけん}を{作|つく}ってしまった。ごめんなさい。"
        expression: determined
      - type: sprite
        character: towa
        action: hide

  - id: truth-others
    bg: classroom-blackboard
    steps:
      - type: sprite
        character: hikaru
        expression: worried
        position: left
      - type: dialog
        character: hikaru
        text: "{最初|さいしょ}は{高校生|こうこうせい}が{悪|わる}いと{思|おも}い{込|こ}んでいた。でも{図|ず}にしたら、{両方|りょうほう}に{死角|しかく}があった。{見|み}え{方|かた}が{違|ちが}うのは、{立場|たちば}によって{見|み}えるものが{違|ちが}うからだ。"
        expression: worried
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: hashiru
        expression: worried
        position: right
      - type: dialog
        character: hashiru
        text: "「{飛|と}び{出|だ}した」だけでは{説明|せつめい}が{足|た}りないと{感|かん}じてた。{目|め}の{前|まえ}の{危険|きけん}に{気|き}を{取|と}られると、{別|べつ}の{方向|ほうこう}を{見落|みお}とす——おれも{気|き}をつけなきゃ。"
        expression: worried
      - type: sprite
        character: hashiru
        action: hide
      - type: sprite
        character: michika
        expression: thinking
        position: right
      - type: dialog
        character: michika
        text: "{犬|いぬ}の{存在|そんざい}が{大|おお}きいと{思|おも}ってた。トワは「{守|まも}ろうとした」んだ。でも{理由|りゆう}が{分|わ}かっても、{安全|あんぜん}{確認|かくにん}をしなかったのは{事実|じじつ}。{気持|きも}ちと{行動|こうどう}、{両方|りょうほう}{大事|だいじ}。"
        expression: thinking
      - type: sprite
        character: michika
        action: hide

  - id: epilogue
    bg: hallway-sunset
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "トワはユイちゃんを{守|まも}ろうとしました。その{気持|きも}ちはとても{大切|たいせつ}。でも「{守|まも}ること」と「{安全|あんぜん}{確認|かくにん}すること」は{両方|りょうほう}{必要|ひつよう}です。"
        expression: happy
      - type: dialog
        character: yamada
        text: "{死角|しかく}がある{交差点|こうさてん}では「{止|と}まる・{見|み}る・{待|ま}つ」。{目|め}の{前|まえ}の{危険|きけん}があるときほど、{別|べつ}の{方向|ほうこう}も{確認|かくにん}しましょう。"
