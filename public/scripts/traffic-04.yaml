      - type: sprite
        character: hashiru
        action: hide
      - type: sprite
        character: michika
        expression: thinking
        position: left
      - type: dialog
        character: michika
        text: "トワは{守|まも}ろうとしたんだ。でも「{守|まも}ること」と「{安全|あんぜん}{確認|かくにん}すること」は{両方|りょうほう}{必要|ひつよう}。{犬|いぬ}だけに{気|き}を{取|と}られて、{死角|しかく}の{方向|ほうこう}を{見落|みお}としてしまった。"
