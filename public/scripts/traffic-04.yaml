      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{死角|しかく}とは、{建物|たてもの}や{車|くるま}で{見|み}えなくなる{場所|ばしょ}。{歩|ある}く{人|ひと}にも{自転車|じてんしゃ}にも{見|み}えない{場所|ばしょ}がある。"
      - type: narration
        text: "1つの{危険|きけん}だけを{見|み}ていると、{別|べつ}の{死角|しかく}から{来|く}る{危険|きけん}に{気|き}づけない。{善意|ぜんい}の{行動|こうどう}でも、{安全|あんぜん}{確認|かくにん}をしないと{新|あたら}たな{危険|きけん}を{生|う}む。"
      - type: narration
        text: "{小|ちい}さい{子|こ}といっしょに{交差点|こうさてん}を{渡|わた}るとき——まず{止|と}まる。{全|すべ}ての{方向|ほうこう}を{見|み}る。{安全|あんぜん}を{確認|かくにん}してから{渡|わた}る。それが{本当|ほんとう}に{守|まも}るということだ。"
      - type: effect
        name: fade-out
