meta:
  id: data-08
  title: 残った声だけ
  series: データ探偵団
  volume: 8
  estimatedMinutes: 18

characters:
  hyou:
    name: ヒョウ
    color: "#4169E1"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  suu:
    name: スウ
    color: "#FF4444"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  graph:
    name: グラフ
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  matome:
    name: マトメ
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  yamada:
    name: 山田先生
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "物語が始まる。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: graph
        expression: worried
        position: center
      - type: dialog
        character: graph
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: graph
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "{{落|お}}ち{{着|つ}}いて。みんなで{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみよう。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: determined }
          - { id: suu, expression: thinking }
          - { id: graph, expression: thinking }
          - { id: matome, expression: worried }
      - type: narration
        text: "「データ探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: データ探偵団
        subtitle: Vol.8 残った声だけ

  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: ステップ1
        subtitle: 調査
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover

  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover

  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover

  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover

  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: ステップ2
        subtitle: 反転
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: sprite
        character: yamada
        expression: thinking
        position: center
      - type: dialog
        character: yamada
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: yamada
        action: hide

  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: ステップ3
        subtitle: 議論
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: hyou
        expression: thinking
        position: left
      - type: dialog
        character: hyou
        text: "ヒョウの考えを述べる"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        expression: thinking
        position: right
      - type: dialog
        character: suu
        text: "スウの考えを述べる"
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: matome
        expression: thinking
        position: left
      - type: dialog
        character: matome
        text: "マトメの考えを述べる"
      - type: sprite
        character: matome
        action: hide
      - type: sprite
        character: graph
        expression: worried
        position: right
      - type: dialog
        character: graph
        text: "グラフの考えを述べる"
      - type: sprite
        character: graph
        action: hide

  - id: vote
    steps:
      - type: title_card
        title: ステップ4
        subtitle: 投票
      - type: narration
        text: "「アンケート結果が全体を代表しなかった原因を作ったのは誰？」"
      - type: sprite_group
        characters:
          - { id: hyou, expression: normal }
          - { id: suu, expression: normal }
          - { id: graph, expression: normal }
          - { id: matome, expression: worried }
      - type: choice
        id: q1
        text: "アンケート結果が全体を代表しなかった原因を作ったのは誰？"
        options:
          - label: ヒョウ
            value: hyou
            correct: false
            feedback: "ヒョウは{調査|ちょうさ}をした{側|がわ}だよ。"
          - label: スウ
            value: suu
            correct: false
            feedback: "スウは{調査|ちょうさ}をした{側|がわ}だよ。"
          - label: グラフ
            value: graph
            correct: true
            feedback: "回答した120人のデータは正しい。でも帰った80人の声が入っていない。"答えた人だけ"で全体を判断すると偏る——これを生存者バイアスという"
          - label: マトメ
            value: matome
            correct: false
            feedback: "マトメは{調査|ちょうさ}をした{側|がわ}だよ。"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide

  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: 真相
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "真相が明かされた。"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite
        character: graph
        expression: worried
        position: center
      - type: dialog
        character: graph
        text: "ごめんなさい。"
      - type: sprite
        character: graph
        expression: determined
      - type: dialog
        character: graph
        text: "ごめんなさい。"
      - type: sprite
        character: graph
        action: hide

  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: happy
        position: center
      - type: dialog
        character: yamada
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: yamada
        expression: thinking
      - type: dialog
        character: yamada
        text: "今日の学び"
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - { id: hyou, expression: happy }
          - { id: suu, expression: happy }
          - { id: graph, expression: happy }
          - { id: matome, expression: happy }
      - type: narration
        text: "データ探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: hyou
        action: hide
      - type: sprite
        character: suu
        action: hide
      - type: sprite
        character: graph
        action: hide
      - type: sprite
        character: matome
        action: hide
      - type: effect
        name: fade-out
        duration: 1000
