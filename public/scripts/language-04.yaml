scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "ことば探偵団 Vol.4"
        subtitle: "方言はまちがい？"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: normal
          - id: fumi
            expression: normal
          - id: yomi
            expression: normal
          - id: tsuzuri
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: kotoha
        expression: normal
        position: left
      - type: dialog
        character: kotoha
        text: "フミは地域の人が自然に「なおす」と言っていたと話していた。"
      - type: dialog
        character: kotoha
        text: "フミは地域の人が自然に「なおす」と言っていたと話していた。"
        expression: thinking
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        expression: normal
        position: right
      - type: dialog
        character: fumi
        text: "方言は、その地域で通じる意味がある。"
      - type: dialog
        character: fumi
        text: "方言は、その地域で通じる意味がある。"
        expression: thinking
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        expression: normal
        position: left
      - type: dialog
        character: yomi
        text: "言葉の意味は、場面といっしょに見ると分かりやすい。"
      - type: dialog
        character: yomi
        text: "言葉の意味は、場面といっしょに見ると分かりやすい。"
        expression: thinking
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        expression: normal
        position: right
      - type: dialog
        character: tsuzuri
        text: "方言は、標準語とのちがいを比べることで、かえって意味がよく分かる。"
      - type: dialog
        character: tsuzuri
        text: "方言は、標準語とのちがいを比べることで、かえって意味がよく分かる。"
        expression: thinking
      - type: sprite
        character: tsuzuri
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: kotoha
            expression: thinking
          - id: fumi
            expression: thinking
          - id: yomi
            expression: thinking
          - id: tsuzuri
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "コトハ"
            value: kotoha
            correct: false
            feedback: "コトハは手がかりを持っているが、決め手は足りない。"
          - text: "フミ"
            value: fumi
            correct: false
            feedback: "フミは手がかりを持っているが、決め手は足りない。"
          - text: "ヨミ"
            value: yomi
            correct: false
            feedback: "ヨミは手がかりを持っているが、決め手は足りない。"
          - text: "ツヅリ"
            value: tsuzuri
            correct: true
            feedback: "ツヅリの行動が、証拠といちばん一致している。"
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "ツヅリ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: tsuzuri
        expression: worried
        position: center
      - type: dialog
        character: tsuzuri
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: tsuzuri
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: sprite_group
        characters:
          - id: kotoha
            expression: happy
          - id: fumi
            expression: happy
          - id: yomi
            expression: happy
          - id: tsuzuri
            expression: happy
      - type: narration
        text: "ことば探偵団の学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kotoha
        action: hide
      - type: sprite
        character: fumi
        action: hide
      - type: sprite
        character: yomi
        action: hide
      - type: sprite
        character: tsuzuri
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
