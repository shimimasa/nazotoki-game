meta:
  id: security-05
  title: "うそのともだち"
  series: "防犯探偵団"
  volume: 5
  estimatedMinutes: 18

characters:
  mamori:
    name: "マモリ"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  kagiru:
    name: "カギル"
    color: "#FF4444"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  mihari:
    name: "ミハリ"
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  anzen:
    name: "アンゼン"
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "カギルがオンラインゲームで仲良くなった「ユウキ」は「同い年の5年生でサッカーが好き」と言っていた。"
      - type: narration
        text: "カギルは「同じ趣味で同い年だから」と信頼し、ユウキの指示でゲーム内アイテムを交換していた。"
      - type: narration
        text: "ところがある日、ユウキから「今度の土曜日、○○公園で一緒にサッカーしよう。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: kagiru
        expression: worried
        position: center
      - type: dialog
        character: kagiru
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: kagiru
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: mamori, expression: determined }
          - { id: kagiru, expression: thinking }
          - { id: mihari, expression: thinking }
          - { id: anzen, expression: worried }
      - type: narration
        text: "「防犯探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: mamori
        action: hide
      - type: sprite
        character: kagiru
        action: hide
      - type: sprite
        character: mihari
        action: hide
      - type: sprite
        character: anzen
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "防犯探偵団"
        subtitle: "Vol.5 うそのともだち"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "カギルのゲーム画面スクリーンショット: ユウキからのメッセージ「土曜日、○○公園でサッカーしよう。ボール持ってくよ」"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、①導入ためのヒントはどこにありそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "「なりすましチェックリスト」: ①プロフィールの矛盾 ②年齢にそぐわない知識や言動 ③活動時間の不自然さ ④「会おう」への誘導"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、①導入ためのヒントはどこにありそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "ユウキのプロフィール画面: 「5年生/サッカー好き/好きなチーム: ○○"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、②探索ためのヒントはどこにありそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "マモリの調査メモ: 「サッカーチーム○○は今年4月に△△に改名。5年生なら知っているはず」「この地域の小学校の運動会は全て9-10月」"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、②探索ためのヒントはどこにありそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "カギルの追加HO: ゲームのログイン履歴でユウキの活動時間が平日13時〜14時。学校にいるはずの時間にゲーム"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、③反転ためのヒントはどこにありそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: mamori
        expression: thinking
        position: left
      - type: dialog
        character: mamori
        text: "チーム名が古い。運動会の時期が違う。この人、プロフィールが嘘だよ」と3つの矛盾を整理"
      - type: sprite
        character: mamori
        action: hide
      - type: sprite
        character: kagiru
        expression: worried
        position: right
      - type: dialog
        character: kagiru
        text: "追加HO公開後、「平日の昼にゲームしてるの、おかしいよね…。本当に同い年じゃないかも」と認める"
      - type: sprite
        character: kagiru
        action: hide
      - type: sprite
        character: mihari
        expression: thinking
        position: left
      - type: dialog
        character: mihari
        text: "運動会が6月\"は嘘。うちの学校だけじゃなくてこの地域の小学校は全部10月」と断定"
      - type: sprite
        character: mihari
        action: hide
      - type: sprite
        character: anzen
        expression: thinking
        position: right
      - type: dialog
        character: anzen
        text: "楽しかった気持ちは本当。でも\"会おう\"は危険。ネットの友だちは画面の中だけにしよう」と寄り添う"
      - type: sprite
        character: anzen
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「オンラインのなりすましに会おうとしていたのは誰？」"
      - type: sprite_group
        characters:
          - { id: mamori, expression: normal }
          - { id: kagiru, expression: normal }
          - { id: mihari, expression: normal }
          - { id: anzen, expression: worried }
      - type: choice
        id: q1
        text: "オンラインのなりすましに会おうとしていたのは誰？"
        options:
          - label: "マモリ"
            value: mamori
            correct: false
            feedback: "マモリはユウキのプロフィール矛盾を調査した側"
          - label: "カギル"
            value: kagiru
            correct: true
            feedback: "カギルはユウキを\"同い年の友だち\"だと信じた。でもチーム名が古い・運動会の時期が違う・平日昼にゲーム——3つも矛盾があった。オンラインのプロフィールは誰でも嘘を書ける。矛盾に気づいたら、絶対に会わず、大人に相談しよう"
          - label: "ミハリ"
            value: mihari
            correct: false
            feedback: "ミハリは会話ログの不自然さを指摘した側"
          - label: "アンゼン"
            value: anzen
            correct: false
            feedback: "アンゼンはカギルの気持ちに寄り添った側"
      - type: sprite
        character: mamori
        action: hide
      - type: sprite
        character: kagiru
        action: hide
      - type: sprite
        character: mihari
        action: hide
      - type: sprite
        character: anzen
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、カギル（鍵）"
      - type: dialog
        character: sensei
        text: "動機は、#11 好奇心 — カギルはオンラインで「同い年」の友だちができたのが嬉しく、会ってみたいという好奇心があった。ユウキのプロフィールに矛盾があることは薄々感じていたが、「同じゲームが好き」「サッカーの話で盛り上がる」という共通点に目がくらんで、矛盾を無視していた。「会ったらもっと楽しい」と思い、危険性を考えなかった。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: kagiru
        expression: worried
        position: center
      - type: dialog
        character: kagiru
        text: "追加HO公開後、「平日の昼にゲームしてるの、おかしいよね…。本当に同い年じゃないかも」と認める"
      - type: sprite
        character: kagiru
        expression: determined
      - type: dialog
        character: kagiru
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: kagiru
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・なりすましの見破り方: オンラインのプロフィールは嘘をつける。会話やプロフィールの矛盾から「本当の年齢・正体」を疑う力\n・仮説検証: 「この人は本当に同い年か？」に対して複数の仮説を立て、証拠で検証するスキル"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: mamori, expression: happy }
          - { id: kagiru, expression: happy }
          - { id: mihari, expression: happy }
          - { id: anzen, expression: happy }
      - type: narration
        text: "防犯探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: mamori
        action: hide
      - type: sprite
        character: kagiru
        action: hide
      - type: sprite
        character: mihari
        action: hide
      - type: sprite
        character: anzen
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
