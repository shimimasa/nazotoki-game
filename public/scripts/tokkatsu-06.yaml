scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: schoolyard-morning
    bgm: daily-life
    steps:
      - type: narration
        text: "{運動会|うんどうかい}の{前日|ぜんじつ}の{放課後|ほうかご}。{応援団|おうえんだん}の{倉庫|そうこ}から、{赤組|あかぐみ}の{応援旗|おうえんばた}がなくなった。"
      - type: narration
        text: "{倉庫|そうこ}のルールは3つ。{旗|はた}やはちまきは{色|いろ}ごとに{分|わ}けて{置|お}く。{整理|せいり}は{担当者|たんとうしゃ}が{行|おこな}う。{別|べつ}の{場所|ばしょ}へ{動|うご}かすときは{記録|きろく}する。"
      - type: narration
        text: "ところが——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "{月曜日|げつようび}の{朝|あさ}8{時|じ}。{赤組|あかぐみ}の{応援旗|おうえんばた}が{見|み}つからないと{分|わ}かった。「{白組|しろぐみ}のじゃまだ！」という{声|こえ}が{上|あ}がっている。"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "{倉庫|そうこ}から{赤組|あかぐみ}の{応援旗|おうえんばた}がなくなっています。{金曜日|きんようび}の{放課後|ほうかご}に{倉庫|そうこ}の{整理|せいり}をした{人|ひと}がいました。{整理記録|せいりきろく}は{空欄|くうらん}になっています。"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: tsumugi
            expression: thinking
          - character: mamoru
            expression: surprised
          - character: nozomi
            expression: worried
          - character: ayumu
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{旗|はた}はどこへ？ そして{誰|だれ}が{動|うご}かしたのか——"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: なくなった応援旗
        subtitle: 特別活動探偵団 Vol.6

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 倉庫の鍵メモを確認しよう
      - type: narration
        text: "{金曜日|きんようび}の{放課後|ほうかご}、{倉庫|そうこ}の{鍵|かぎ}{使用記録|しようきろく}を{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "15:30 — アユムが{倉庫整理|そうこせいり}のため{入庫|にゅうこ}。"
      - type: narration
        text: "15:31 — ツムギが{物品表|ぶっぴんひょう}{確認|かくにん}のため{入庫|にゅうこ}。"
      - type: narration
        text: "それ{以外|いがい}の{時間|じかん}は{使用記録|しようきろく}なし。{鍵|かぎ}を{使|つか}って{倉庫|そうこ}の{中|なか}を{動|うご}かせた{人物|じんぶつ}は、アユムとツムギの2{人|にん}に{絞|しぼ}られる。"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 倉庫の置き場所表を見よう
      - type: narration
        text: "{倉庫|そうこ}のいつもの{置|お}き{場所|ばしょ}ルールを{確認|かくにん}した。"
      - type: se
        sound: discover
      - type: narration
        text: "{赤組|あかぐみ}: {旗|はた}・はちまき・リボン。{白組|しろぐみ}: {旗|はた}・はちまき・リボン。{色|いろ}ごとに{左右対称|さゆうたいしょう}に{置|お}く{決|き}まりだ。"
      - type: narration
        text: "もしどちらか{一方|いっぽう}だけが{動|うご}いていたなら、それは{偶然|ぐうぜん}ではなく、{意図的|いとてき}か{偏|かたよ}りのある{行動|こうどう}だといえる。"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 整理記録メモを読もう
      - type: narration
        text: "{金曜日|きんようび}の{整理|せいり}メモを{調|しら}べた。{担当|たんとう}: アユム。"
      - type: se
        sound: discover
      - type: narration
        text: "「{布|ぬの}の{物|もの}をまとめた」「{使|つか}いやすい{場所|ばしょ}へ{動|うご}かした」と{書|か}かれている。"
      - type: narration
        text: "{移動先|いどうさき}の{記録|きろく}は——{空欄|くうらん}。ルールでは{別|べつ}の{場所|ばしょ}へ{動|うご}かすときは{記録|きろく}する{決|き}まりだ。「{使|つか}いやすい{場所|ばしょ}」とは、{誰|だれ}にとって{使|つか}いやすい{場所|ばしょ}なのだろう？"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 金曜日の会話メモを確認しよう
      - type: narration
        text: "{金曜日|きんようび}の{片|かた}づけ{前|まえ}、マモルが{聞|き}いていた{会話|かいわ}のメモが{見|み}つかった。"
      - type: se
        sound: discover
      - type: sprite
        character: mamoru
        expression: thinking
        position: right
      - type: dialog
        character: mamoru
        text: "アユムが「{赤組|あかぐみ}って{去年|きょねん}{優勝|ゆうしょう}だし、{今年|ことし}も{強|つよ}そうだよな」って{言|い}った。そのあとすぐ「{先|さき}に{整理|せいり}しておく」って{倉庫|そうこ}へ{向|む}かったんだ。"
        expression: thinking
      - type: sprite
        character: mamoru
        action: hide
      - type: narration
        text: "この{言葉|ことば}は、ただの{感想|かんそう}だったのだろうか？ それとも、その{後|あと}の{行動|こうどう}に{影響|えいきょう}したのだろうか——"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 全物品点検表
      - type: effect
        name: fade-in
      - type: sprite
        character: tsumugi
        expression: surprised
        position: center
      - type: dialog
        character: tsumugi
        text: "{月曜日|げつようび}の{朝|あさ}、{体育館|たいいくかん}{用具室|ようぐしつ}で{見|み}つかった{物|もの}のリストです。{旗|はた}だけじゃない——{赤組|あかぐみ}の{応援旗|おうえんばた}・はちまき・リボン、{赤組|あかぐみ}の{物|もの}がぜんぶ{動|うご}いていました！"
        expression: surprised
      - type: sprite
        character: tsumugi
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "{体育館|たいいくかん}{用具室|ようぐしつ}で{見|み}つかった{物|もの}: {赤組|あかぐみ}の{応援旗|おうえんばた}・はちまき・リボン。{倉庫|そうこ}に{残|のこ}っていた{物|もの}: {白組|しろぐみ}の{旗|はた}・はちまき・リボン。"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "{旗|はた}1{本|ほん}だけではなく、{赤組|あかぐみ}の{物|もの}がまとめて{動|うご}いていた。{白組|しろぐみ}の{物|もの}はそのまま。これは{偶然|ぐうぜん}ではない——{赤組|あかぐみ}だけを{選|えら}んで{動|うご}かした「{偏|かたよ}り」がある。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 旗を動かしたのは誰だ？
      - type: sprite
        character: nozomi
        expression: thinking
        position: left
      - type: dialog
        character: nozomi
        text: "{金曜日|きんようび}、{体育館|たいいくかん}{用具室|ようぐしつ}の{前|まえ}を{通|とお}ったとき、{赤|あか}いはちまきが{見|み}えた{気|き}がした。あのときは「{片|かた}づけ{中|ちゅう}かな」と{思|おも}ったけど……"
        expression: thinking
      - type: sprite
        character: nozomi
        action: hide
      - type: sprite
        character: mamoru
        expression: worried
        position: right
      - type: dialog
        character: mamoru
        text: "ぼくも{最初|さいしょ}は「{白組|しろぐみ}の{妨害|ぼうがい}だ」と{思|おも}ってた。でも、{整理|せいり}の{担当|たんとう}をしたのはアユムで、{白組|しろぐみ}の{物|もの}はそのまま。{考|かんが}えてみると、ぼく{自身|じしん}も「{赤組|あかぐみ}は{強|つよ}い」って{思|おも}いこんでた……"
        expression: worried
      - type: sprite
        character: mamoru
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。{倉庫|そうこ}の{整理|せいり}{担当|たんとう}はアユム（Card 1）。{赤組|あかぐみ}の{物|もの}だけがまとめて{体育館|たいいくかん}{用具室|ようぐしつ}へ（Card 5）。アユムは「{赤組|あかぐみ}は{強|つよ}そう」と{言|い}ってから{倉庫|そうこ}へ{向|む}かった（Card 4）。{整理|せいり}メモの{移動先|いどうさき}は{空欄|くうらん}（Card 3）。"
      - type: choice
        id: q1
        question: 赤組の旗を動かしたのは誰？
        options:
          - text: アユム（整理担当で、赤組の物だけをまとめて動かした）
            value: ayumu
            correct: true
            feedback: "{正解|せいかい}！ アユムは{倉庫整理|そうこせいり}の{担当|たんとう}として{赤組|あかぐみ}の{物|もの}をまとめて{体育館|たいいくかん}{用具室|ようぐしつ}へ{運|はこ}んだ。「{整理|せいり}のつもり」だったが、{赤組|あかぐみ}の{物|もの}だけを{遠|とお}くへ{置|お}いたのは、「{赤組|あかぐみ}は{強|つよ}い」という{思|おも}いこみが{無意識|むいしき}に{行動|こうどう}に{入|はい}りこんでいたからだ。"
          - text: ツムギ（倉庫の物品表を確認していた）
            value: tsumugi
            feedback: "ツムギは{物品表|ぶっぴんひょう}を{確認|かくにん}しただけ。{整理記録|せいりきろく}メモの{担当|たんとう}には「アユム」と{書|か}かれているよ。"
          - text: マモル（金曜日の会話を聞いていた）
            value: mamoru
            feedback: "マモルはアユムの{言葉|ことば}を{聞|き}いていただけ。{倉庫|そうこ}の{鍵|かぎ}{記録|きろく}にマモルの{名前|なまえ}はないよ。"
          - text: ノゾミ（体育館の近くを通った）
            value: nozomi
            feedback: "ノゾミは{体育館|たいいくかん}{用具室|ようぐしつ}の{前|まえ}を{通|とお}っただけ。{倉庫|そうこ}の{整理|せいり}{担当|たんとう}はアユムだよ。"

  # ==================== 真実：アユムの告白 ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: アユムの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: ayumu
        expression: worried
        position: center
      - type: dialog
        character: ayumu
        text: "……{赤組|あかぐみ}の{物|もの}を{体育館|たいいくかん}{用具室|ようぐしつ}へ{運|はこ}んだのは、ぼくです。{整理|せいり}のつもりだった。でも——"
        expression: worried
      - type: narration
        text: "アユムは{下|した}を{向|む}きながら、{続|つづ}けた。"
      - type: dialog
        character: ayumu
        text: "{倉庫|そうこ}の{整理|せいり}をしながら、{心|こころ}のどこかで「{赤組|あかぐみ}は{去年|きょねん}{優勝|ゆうしょう}したから{強|つよ}い」「{白組|しろぐみ}は{不利|ふり}かもしれない」って{思|おも}ってた。"
        expression: thinking
      - type: dialog
        character: ayumu
        text: "{気|き}がついたら、{赤組|あかぐみ}の{旗|はた}もはちまきもリボンも、ぜんぶ{遠|とお}い{場所|ばしょ}へ{持|も}っていってた。{白組|しろぐみ}の{物|もの}はそのままなのに……{整理|せいり}したつもりが、{偏|かたよ}った{整理|せいり}になってた。"
        expression: worried
      - type: sprite
        character: ayumu
        action: hide

  # ==================== 真実：ほかのメンバー ====================
  - id: truth-others
    bg: classroom-blackboard
    steps:
      - type: sprite
        character: tsumugi
        expression: thinking
        position: left
      - type: dialog
        character: tsumugi
        text: "{月曜日|げつようび}の{朝|あさ}、{倉庫|そうこ}の{棚|たな}を{見|み}て{赤組|あかぐみ}{側|がわ}だけ{空|あ}きが{多|おお}いと{気|き}がついた。{旗|はた}1{本|ほん}だけじゃなくて、{全部|ぜんぶ}がなかった。これは{整理|せいり}の{結果|けっか}なのかもって……{早|はや}く{言|い}えばよかった。"
        expression: thinking
      - type: sprite
        character: tsumugi
        action: hide
      - type: sprite
        character: mamoru
        expression: worried
        position: right
      - type: dialog
        character: mamoru
        text: "{実|じつ}は……ぼくも「{赤組|あかぐみ}は{強|つよ}い」って{思|おも}ってた。それが{白組|しろぐみ}の{妨害|ぼうがい}だと{思|おも}いこんだ{理由|りゆう}のひとつだった。アユムのことを{悪者|わるもの}にしたかったわけじゃないのに、{思|おも}いこみが{判断|はんだん}を{狂|くる}わせてた。"
        expression: worried
      - type: sprite
        character: mamoru
        action: hide
      - type: sprite
        character: nozomi
        expression: worried
        position: left
      - type: dialog
        character: nozomi
        text: "{金曜日|きんようび}に{赤|あか}いはちまきが{体育館|たいいくかん}にあるの{見|み}たとき、{言|い}えばよかった。{運動会|うんどうかい}はみんなで{楽|たの}しむものなのに、{勝|か}ちたい{気持|きも}ちがこんな{形|かたち}で{出|で}てしまうなんて……"
        expression: worried
      - type: sprite
        character: nozomi
        action: hide

  # ==================== エピローグ ====================
  - id: epilogue
    bg: schoolyard-morning
    bgm: hope
    steps:
      - type: sprite
        character: yamada
        expression: normal
        position: center
      - type: dialog
        character: yamada
        text: "アユムが{整理|せいり}のつもりで{動|うご}かしたのは、{本当|ほんとう}のことです。でも「{整理|せいり}」なのに、どうして{赤組|あかぐみ}の{物|もの}だけが{遠|とお}くへ{行|い}ったのかしら？"
        expression: thinking
      - type: dialog
        character: yamada
        text: "{勝|か}ちたい{気持|きも}ちは{悪|わる}いものじゃありません。でも、その{気持|きも}ちが{強|つよ}くなると、{自分|じぶん}では{気|き}づかないうちに{行動|こうどう}に{偏|かたよ}りが{生|う}まれることがある。それが「{先入観|せんにゅうかん}」や「バイアス」と{呼|よ}ばれるものです。"
        expression: normal
      - type: sprite
        character: yamada
        action: hide
      - type: narration
        text: "{整理|せいり}をするつもりが、{赤組|あかぐみ}の{物|もの}だけを{遠|とお}くへ{動|うご}かしていた。{白組|しろぐみ}の{物|もの}はそのまま。{気|き}づかないうちに{心|こころ}の{偏|かたよ}りが{手|て}を{動|うご}かしていたのだ。"
      - type: narration
        text: "{全探索|ぜんたんさく}——{旗|はた}1{本|ほん}だけでなく、{倉庫|そうこ}の{全|すべ}ての{物|もの}を{調|しら}べることで、「{赤組|あかぐみ}だけが{動|うご}いている」というパターンが{見|み}えてきた。{思|おも}いこみに{気|き}づくには、{全体|ぜんたい}を{見|み}ることが{大切|たいせつ}だ。"
      - type: narration
        text: "{運動会|うんどうかい}は{勝|か}つことだけが{目的|もくてき}ではない。{赤組|あかぐみ}も{白組|しろぐみ}も、{全員|ぜんいん}が{気持|きも}ちよく{参加|さんか}できることが{本当|ほんとう}の{目的|もくてき}だ。「{勝|か}ちたい」という{気持|きも}ちをうまく{使|つか}うには、{自分|じぶん}の{行動|こうどう}をふり{返|かえ}る{習慣|しゅうかん}が{必要|ひつよう}だ。"
      - type: effect
        name: fade-out
