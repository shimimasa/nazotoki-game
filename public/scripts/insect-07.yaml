      - type: dialog
        character: mushi
        text: "かくれる虫もいれば、においで守る虫もいる"
      - type: dialog
        character: mushi
        text: "かくれる虫もいれば、においで守る虫もいる"
        expression: thinking
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        expression: normal
        position: right
      - type: dialog
        character: hane
        text: "あなたの分類表では、守り方は 強い・弱いではなく 方法で分けていた"
      - type: dialog
        character: hane
        text: "あなたの分類表では、守り方は 強い・弱いではなく 方法で分けていた"
        expression: thinking
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        expression: normal
        position: left
      - type: dialog
        character: mitsu
        text: "もとの説明カードには 「守り方はいろいろある」と書かれていた"
      - type: dialog
        character: mitsu
        text: "もとの説明カードには 「守り方はいろいろある」と書かれていた"
        expression: thinking
      - type: sprite
