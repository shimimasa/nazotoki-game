      - type: sprite
        character: sanagi
        expression: normal
        position: right
      - type: dialog
        character: sanagi
        text: "派手な色は 「食べないで」の合図になることがある"
      - type: dialog
        character: sanagi
        text: "派手な色は 「食べないで」の合図になることがある"
        expression: thinking
      - type: sprite
