        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "虫の防御には 擬態、警告色、におい、毒など いろいろある"
      - type: narration
        text: "防御は 強い・弱いでなく、どう守るかで考える"
      - type: narration
        text: "印象だけで分類すると、大事な仕組みが見えなくなる"
      - type: sprite_group
        characters:
          - id: mushi
            expression: happy
          - id: hane
            expression: happy
          - id: mitsu
            expression: happy
          - id: sanagi
            expression: happy
      - type: narration
        text: "昆虫ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
