        text: "真相"
        subtitle: "サナギ"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: sanagi
        expression: worried
        position: center
      - type: dialog
        character: sanagi
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: sanagi
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
