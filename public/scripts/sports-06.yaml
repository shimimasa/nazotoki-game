scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: hallway-sunset
    bgm: daily-life
    steps:
      - type: narration
        text: "{学年|がくねん}のダンス{発表会|はっぴょうかい}まで、あと2{日|にち}。4{人|にん}グループで「8カウント×4パート」のダンスを{練習|れんしゅう}していた。"
      - type: narration
        text: "{先生|せんせい}が{作|つく}った{振付|ふりつけ}カードを{見|み}ながら{練習|れんしゅう}する、はずだった——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "リハーサルで{踊|おど}ったとき、{先生|せんせい}が{気|き}づいた。**パート3の{動|うご}きがお{手本|てほん}と{違|ちが}う！** {振付|ふりつけ}カードを{確認|かくにん}すると——"
      - type: narration
        text: "パート3の{振付|ふりつけ}が{書|か}き{換|か}えられていた！ {動|うご}きの{順序|じゅんじょ}が{入|い}れ{替|か}わっている！"
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "パート3のカウント2と3の{動|うご}きが{入|い}れ{替|か}わっています。{月曜|げつよう}の{練習|れんしゅう}{後|あと}、{振付|ふりつけ}カードは{体育館|たいいくかん}のロッカーに{保管|ほかん}しました。{誰|だれ}が{書|か}き{換|か}えたのか——"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: hayate
            expression: surprised
          - character: tsubasa
            expression: thinking
          - character: kakeru
            expression: surprised
          - character: minori
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。{全員|ぜんいん}が{月曜|げつよう}の{放課後|ほうかご}、{体育館|たいいくかん}に{残|のこ}っていた。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: 表現ダンスの秘密
        subtitle: 体育探偵団 Vol.6

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 振付カードの変更点を調べよう
      - type: narration
        text: "パート3の{振付|ふりつけ}カードを{詳|くわ}しく{調|しら}べた。{変更|へんこう}されたのはパート3だけだ。"
      - type: se
        sound: discover
      - type: narration
        text: "カウント2と3の{動|うご}きが{入|い}れ{替|か}わっている。"
      - type: narration
        text: "{変更前|へんこうまえ}: カウント2＝つなぎステップ → カウント3＝{左|ひだり}に{全回転|ぜんかいてん}ターン"
      - type: narration
        text: "{変更後|へんこうご}: カウント2＝{左|ひだり}に{全回転|ぜんかいてん}ターン → カウント3＝つなぎステップ"
      - type: narration
        text: "{書|か}き{換|か}えは{鉛筆|えんぴつ}で{消|け}して{書|か}き{直|なお}し。パート1・2・4は{変更|へんこう}なし。パート3のみ。"
      - type: narration
        text: "{動|うご}きを「{追加|ついか}」したのではなく「{入|い}れ{替|か}えた」。{入|い}れ{替|か}えた{結果|けっか}、カウント2（{弱拍|じゃくはく}）に{大|おお}きな{動|うご}き（{全回転|ぜんかいてん}ターン）が{来|き}ている——ランダムな{変更|へんこう}？ それとも{理由|りゆう}がある？"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 4パートのリズムを全探索しよう
      - type: narration
        text: "{先生|せんせい}の{振付|ふりつけ}を{全|ぜん}4パート{分析|ぶんせき}した。{強拍|きょうはく}（1・3・5・7）に{大|おお}きい{動|うご}き、{弱拍|じゃくはく}（2・4・6・8）に{小|ちい}さい{動|うご}きが{基本|きほん}。"
      - type: se
        sound: discover
      - type: narration
        text: "パート1: {強拍|きょうはく}に{大|おお}きい{歩|ある}き、{弱拍|じゃくはく}に{小|ちい}さいつなぎ → リズム: ◎ ぴったり"
      - type: narration
        text: "パート2: {強拍|きょうはく}にジャンプ、{弱拍|じゃくはく}に{着地|ちゃくち}・つなぎ → リズム: ◎ ぴったり"
      - type: narration
        text: "パート3（{変更前|へんこうまえ}）: {強拍|きょうはく}1・3・5・7に{回転|かいてん}ターン → リズム: ○ {基本|きほん}OK。ただしカウント1から2・3への{体|からだ}の{向|む}きの{切替|きりかえ}が{不自然|ふしぜん}"
      - type: narration
        text: "パート4: {強拍|きょうはく}にポーズ{決|き}め → リズム: ◎ ぴったり"
      - type: narration
        text: "パート3（{変更後|へんこうご}）: カウント2に{全回転|ぜんかいてん}ターン = {弱拍|じゃくはく}に{大|おお}きい{動|うご}き → リズムの{基本|きほん}ルールとは{外|はず}れる。でも1の{半回転|はんかいてん}から2の{全回転|ぜんかいてん}への{体|からだ}の{向|む}きのつながりは{自然|しぜん}になっている。"
      - type: narration
        text: "{変更前|へんこうまえ}も{変更後|へんこうご}も{完璧|かんぺき}ではない。でも{変更後|へんこうご}のほうが「{体|からだ}の{動|うご}きの{流|なが}れ（フロー）」は{自然|しぜん}——リズムだけでなくフローも{考|かんが}えた{人|ひと}が{書|か}き{換|か}えた？"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 振付カードへのアクセスを確認しよう
      - type: narration
        text: "{振付|ふりつけ}カードはいつ{書|か}き{換|か}えられた？ ロッカーには{鍵|かぎ}がない。{誰|だれ}でも{開|あ}けられる。"
      - type: se
        sound: discover
      - type: narration
        text: "{月曜|げつよう}15{時|じ}30{分|ぷん}に{練習|れんしゅう}{終了|しゅうりょう}。{振付|ふりつけ}カードをロッカーに{保管|ほかん}。{翌日|よくじつ}{火曜|かよう}15{時|じ}00{分|ぷん}のリハーサルで{書|か}き{換|か}えに{気|き}づいた。"
      - type: narration
        text: "{月曜|げつよう}15{時|じ}30{分|ぷん}{以降|いこう}の{行動|こうどう}:"
      - type: narration
        text: "ハヤテ —— 15{時|じ}35{分|ぷん}に{教室|きょうしつ}へ。ノートをまとめていた"
      - type: narration
        text: "ツバサ —— **15{時|じ}40{分|ぷん}まで{体育館|たいいくかん}に{残|のこ}っていた**（「フォームの{復習|ふくしゅう}」）"
      - type: narration
        text: "カケル —— 15{時|じ}32{分|ぷん}に{下校|げこう}"
      - type: narration
        text: "ミノリ —— 15{時|じ}33{分|ぷん}に{教室|きょうしつ}へ"
      - type: narration
        text: "ツバサだけが15{時|じ}40{分|ぷん}まで{体育館|たいいくかん}に{残|のこ}っていた。{振付|ふりつけ}カードのあるロッカーに{アクセス|あくせす}できる{時間|じかん}が{最|もっと}も{長|なが}い。"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: 練習中の発言を確認しよう
      - type: narration
        text: "{月曜|げつよう}の{練習|れんしゅう}{中|ちゅう}（15{時|じ}15{分|ぷん}ごろ）の{会話|かいわ}だ。"
      - type: se
        sound: discover
      - type: sprite
        character: tsubasa
        expression: thinking
        position: left
      - type: dialog
        character: tsubasa
        text: "パート3のカウント2から3の{流|なが}れ、なんか**{体|からだ}の{向|む}きが{不自然|ふしぜん}**じゃない？ {半回転|はんかいてん}してからつなぎステップして{全回転|ぜんかいてん}だと、{向|む}きの{切|き}り{替|か}えが{急|きゅう}だよ。"
        expression: thinking
      - type: sprite
        character: tsubasa
        action: hide
      - type: sprite
        character: hayate
        expression: normal
        position: right
      - type: dialog
        character: hayate
        text: "データ{的|てき}には{先生|せんせい}の{お手本|おてほん}{通|どお}りだけど……たしかに{踊|おど}りにくい。"
        expression: normal
      - type: sprite
        character: hayate
        action: hide
      - type: sprite
        character: kakeru
        expression: happy
        position: left
      - type: dialog
        character: kakeru
        text: "わたしは{勢|いきお}いで{踊|おど}っちゃうから{気|き}にならないけど。"
        expression: happy
      - type: sprite
        character: kakeru
        action: hide
      - type: sprite
        character: tsubasa
        expression: determined
        position: right
      - type: dialog
        character: tsubasa
        text: "**2と3を{入|い}れ{替|か}えれば{流|なが}れが{自然|しぜん}になる**んだけどな……"
        expression: determined
      - type: sprite
        character: tsubasa
        action: hide
      - type: sprite
        character: minori
        expression: normal
        position: left
      - type: dialog
        character: minori
        text: "{先生|せんせい}に{相談|そうだん}してみたら？"
        expression: normal
      - type: sprite
        character: minori
        action: hide
      - type: sprite
        character: tsubasa
        expression: worried
        position: right
      - type: dialog
        character: tsubasa
        text: "でも{発表会|はっぴょうかい}まであと**2{日|にち}**しかないよ。{先生|せんせい}{忙|いそが}しそうだし……"
        expression: worried
      - type: sprite
        character: tsubasa
        action: hide
      - type: narration
        text: "ツバサは「2と3を{入|い}れ{替|か}えれば{自然|しぜん}」と**{自分|じぶん}で{言|い}っていた**。そして{振付|ふりつけ}カードの{変更|へんこう}はまさに**カウント2と3の{入|い}れ{替|か}え**。さらに「{発表会|はっぴょうかい}まで2{日|にち}」という{時間|じかん}{焦|あせ}り——"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: ツバサの「もう1つの振付メモ」
      - type: effect
        name: fade-in
      - type: narration
        text: "{体育館|たいいくかん}のロッカーの{横|よこ}に、{小|ちい}さなメモが{落|お}ちていた。"
      - type: se
        sound: discover
      - type: sprite
        character: tsubasa
        expression: worried
        position: center
      - type: dialog
        character: tsubasa
        text: "パート3 フロー{改善|かいぜん}{案|あん}——{問題|もんだい}: カウント1（{半回転|はんかいてん}）→ 2（つなぎ）→ 3（{全回転|ぜんかいてん}）の{向|む}き{切替|きりかえ}が{不自然|ふしぜん}。"
        expression: worried
      - type: dialog
        character: tsubasa
        text: "{改善|かいぜん}: **2と3を{入替|いれかえ}**。→ {半回転|はんかいてん}の{勢|いきお}いで{全回転|ぜんかいてん}に{入|はい}れる。フローが{自然|しぜん}に。"
        expression: thinking
      - type: dialog
        character: tsubasa
        text: "リズムは{弱拍|じゃくはく}に{大|おお}きい{動|うご}きが{来|き}るが、フローの{自然|しぜん}さのほうが{発表|はっぴょう}では{大事|だいじ}。**{先生|せんせい}に{言|い}う{時間|じかん}がない。{発表会|はっぴょうかい}は{水曜|すいよう}。もう{直|なお}すしかない**——"
        expression: determined
      - type: sprite
        character: tsubasa
        action: hide
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "ツバサのメモが「{改善|かいぜん}{案|あん}」を{記録|きろく}している。そして{振付|ふりつけ}カードの{変更|へんこう}はメモの{改善|かいぜん}{案|あん}と**まったく{同|おな}じ**。「{直|なお}すしかない」と{判断|はんだん}した——"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: sprite
        character: hayate
        expression: thinking
        position: left
      - type: dialog
        character: hayate
        text: "{証拠|しょうこ}カード①を{見|み}て。{変更|へんこう}されたのはパート3だけ。パート1・2・4は{全部|ぜんぶ}{先生|せんせい}のお{手本|てほん}{通|どお}り。ランダムじゃない——{意図|いと}がある{変更|へんこう}だ。"
        expression: thinking
      - type: sprite
        character: hayate
        action: hide
      - type: sprite
        character: minori
        expression: worried
        position: right
      - type: dialog
        character: minori
        text: "{月曜|げつよう}の{練習|れんしゅう}{中|ちゅう}、ツバサくんが**すごく{焦|あせ}った{顔|かお}**してたよね。『{時間|じかん}がない』って。わたしが『{先生|せんせい}に{相談|そうだん}してみたら？』って{言|い}ったのに、{答|こた}えなかった。"
        expression: worried
      - type: sprite
        character: minori
        action: hide
      - type: sprite
        character: kakeru
        expression: surprised
        position: left
      - type: dialog
        character: kakeru
        text: "{火曜|かよう}の{練習|れんしゅう}でパート3を{踊|おど}ったとき……{前|まえ}より{踊|おど}りやすいって{感|かん}じた。{体|からだ}の{向|む}きの{切|き}り{替|か}えがスムーズで。でも{変|か}わったって{言|い}われるまで{気|き}づかなかった。"
        expression: surprised
      - type: sprite
        character: kakeru
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。カード①②で{変更|へんこう}の「{質|しつ}」が{分|わ}かった。カード③でアクセス{時間|じかん}が{分|わ}かった。カード④でツバサの{発言|はつげん}と{変更|へんこう}が{一致|いっち}した。そしてカード⑤のメモが{変更|へんこう}と**{完全|かんぜん}に{一致|いっち}**する——"
      - type: choice
        id: q1
        question: 振付カードを書き換えたのは誰？
        options:
          - text: ツバサ（「2と3を入れ替えれば自然」と発言し、15:40まで体育館に残った）
            value: tsubasa
            correct: true
            feedback: "{正解|せいかい}！ カード④の{発言|はつげん}・カード③のアクセス・カード⑤のメモがすべて{一致|いっち}する。「{直|なお}すしかない」は{時間|じかん}{焦|あせ}りの{動機|どうき}。ツバサは**チームの{発表|はっぴょう}を{良|よ}くしたかった**——でも1{人|り}で{決|き}めたことが{問題|もんだい}だった。"
          - text: ハヤテ（振付カードのデータを正確に覚えている人）
            value: hayate
            feedback: "ハヤテは15{時|じ}35{分|ぷん}に{教室|きょうしつ}へ{戻|もど}っている。{体育館|たいいくかん}のロッカーに{触|さわ}れる{時間|じかん}は{短|みじか}かった。また{振付|ふりつけ}の「フロー{改善|かいぜん}」に{気|き}づく{観察力|かんさつりょく}は、ハヤテよりツバサの{得意分野|とくいぶんや}だよ。"
          - text: カケル（火曜に「踊りやすい」と感じた人）
            value: kakeru
            feedback: "カケルは15{時|じ}32{分|ぷん}に{下校|げこう}している。{振付|ふりつけ}カードに{触|さわ}れる{時間|じかん}はほぼなかった。「{踊|おど}りやすかった」のは{変更|へんこう}を{体感|たいかん}しただけで、{書|か}き{換|か}えた{証拠|しょうこ}にはならないよ。"
          - text: ミノリ（ツバサの焦りに気づいていた人）
            value: minori
            feedback: "ミノリは15{時|じ}33{分|ぷん}に{教室|きょうしつ}へ{戻|もど}っている。それにミノリが「{先生|せんせい}に{相談|そうだん}してみたら？」と{言|い}った{立場|たちば}で{振付|ふりつけ}を{無断|むだん}で{変|か}えるのは{矛盾|むじゅん}しているよ。"

  # ==================== 真実：ツバサの告白 ====================
  - id: truth
    bg: classroom-blackboard
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ツバサの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: tsubasa
        expression: worried
        position: center
      - type: dialog
        character: tsubasa
        text: "……{振付|ふりつけ}カードを{書|か}き{換|か}えたのは、{僕|ぼく}です。"
        expression: worried
      - type: narration
        text: ツバサは{下|した}を{向|む}きながら、{小|ちい}さな{声|こえ}で{話|はな}し{始|はじ}めた。
      - type: dialog
        character: tsubasa
        text: "パート3のカウント1から2・3への{流|なが}れ——{体|からだ}の{向|む}きの{切|き}り{替|か}えがずっと{気|き}になってた。{先生|せんせい}に{相談|そうだん}しようと{思|おも}ったけど、{発表会|はっぴょうかい}まで2{日|にち}しかない。"
        expression: thinking
      - type: dialog
        character: tsubasa
