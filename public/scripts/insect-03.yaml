    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "**保護色** は、まわりの色やもように近づくこと"
      - type: narration
        text: "**擬態** は、葉っぱや枝のように 形まで似せること"
      - type: narration
        text: "見分けにくいものほど、細かく くらべることが大切"
      - type: sprite_group
        characters:
          - id: mushi
            expression: happy
          - id: hane
            expression: happy
          - id: mitsu
            expression: happy
          - id: sanagi
            expression: happy
      - type: narration
        text: "昆虫ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
