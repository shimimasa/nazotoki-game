        expression: normal
        position: right
      - type: dialog
        character: hane
        text: "あなたは、葉っぱに似る虫を 見分けるには 練習が必要だと思っていた"
      - type: dialog
        character: hane
        text: "あなたは、葉っぱに似る虫を 見分けるには 練習が必要だと思っていた"
        expression: thinking
