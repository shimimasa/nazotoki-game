            expression: thinking
          - id: hane
            expression: thinking
          - id: mitsu
            expression: thinking
          - id: sanagi
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ムシ"
            value: mushi
            correct: false
            feedback: "ムシは手がかりを持っているが、決め手は足りない。"
          - text: "ハネ"
            value: hane
            correct: false
            feedback: "ハネは手がかりを持っているが、決め手は足りない。"
          - text: "ミツ"
            value: mitsu
            correct: false
            feedback: "ミツは手がかりを持っているが、決め手は足りない。"
          - text: "サナギ"
            value: sanagi
            correct: true
            feedback: "サナギの行動が、証拠といちばん一致している。"
      - type: sprite
        character: mushi
        action: hide
      - type: sprite
        character: hane
        action: hide
      - type: sprite
        character: mitsu
        action: hide
      - type: sprite
        character: sanagi
        action: hide
  - id: truth
