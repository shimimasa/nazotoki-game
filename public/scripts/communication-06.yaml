scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{放課後|ほうかご}、クラスで{話|はな}し{合|あ}いが{終|お}わったあと——「{結局|けっきょく}、Aの{案|あん}に{全員|ぜんいん}{賛成|さんせい}して{決|き}まったね」。"
      - type: narration
        text: "でも{後|あと}になって、コトバは{気|き}になりはじめた。「{私|わたし}、{実際|じっさい}にAがいいって{誰|だれ}かに{聞|き}いたっけ？　ツタエが『{みんな}がそう{言|い}ってたよ』と{言|い}ってたけど——」"
      - type: se
        sound: whisper
      - type: bgm
        track: tension-quiet
      - type: narration
        text: "**「{みんな}がそう{言|い}ってた」——でも、その「{みんな}」とは{一体|いったい}{誰|だれ}のことだろう？**"
      - type: sprite
        character: kotoba
        expression: worried
        position: center
      - type: dialog
        character: kotoba
        text: "ちょっと{待|ま}って……ツタエは「{みんな}がAって{言|い}ってた」と{言|い}った。でも{私|わたし}は{誰|だれ}にも{直接|ちょくせつ}「Aがいい」って{聞|き}いていない。「{みんな}」って{誰|だれ}のことだったんだろう？"
        expression: worried
      - type: sprite
        character: kotoba
        action: hide
      - type: sprite_group
        characters:
          - character: kiku
            expression: worried
          - character: kotoba
            expression: surprised
          - character: tsutae
            expression: worried
          - character: manabu
            expression: thinking
      - type: narration
        text: "「{みんな}がそう{言|い}ってた」という{情報|じょうほう}が、どのようにグループ{内|ない}を{広|ひろ}まったのか——コミュニケーション{探偵団|たんていだん}の{調査|ちょうさ}が{始|はじ}まった。"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: みんなそう言ってた
        subtitle: コミュニケーション探偵団 Vol.6

  # ==================== 調査：証拠カード1+2 ====================
  - id: evidence-1
    bg: classroom
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ1
        subtitle: 意思決定の記録とバンドワゴン効果
      - type: narration
        text: "{意思決定|いしけってい}の{記録|きろく}——「{今日|きょう}のグループ{話|はな}し{合|あ}い：Aの{案|あん}に{全員|ぜんいん}{合意|ごうい}」。しかし{全員|ぜんいん}が「{みんな}がAに{賛成|さんせい}と{聞|き}いた」と{言|い}うのに、{直接|ちょくせつ}「Aがいい」と{言|い}った{人|ひと}が{見当|みあ}たらない。"
      - type: evidence
        id: card-1
        title: 意思決定の記録と各人の発言
        content: "【{意思決定|いしけってい}{記録|きろく}】Aの{案|あん}に{全員|ぜんいん}{合意|ごうい}。【コトバの{発言|はつげん}】「ツタエが『{みんな}がAって{言|い}ってた』と{言|い}っていた」。【マナブの{発言|はつげん}】「コトバが『{みんな}がAって{言|い}ってた』と{言|い}っていた」。【ツタエの{発言|はつげん}】「マナブが『{みんな}がAって{言|い}ってた』と{言|い}っていた」。【キクの{発言|はつげん}】「{話|はな}し{合|あ}いの{前|まえ}に、Aがいいって{話|はな}していた{気|き}がする」。"
      - type: sprite
        character: kotoba
        expression: thinking
        position: left
      - type: dialog
        character: kotoba
        text: "これ、おかしくない？ {全員|ぜんいん}が「{誰|だれ}かが{言|い}ってた」って{言|い}ってるだけで、{実際|じっさい}に{自分|じぶん}で「Aがいい」と{思|おも}った{人|ひと}が{誰|だれ}もいない。「{みんな}」の{出所|でどころ}って、いったいどこなんだろう。"
        expression: thinking
      - type: sprite
        character: kotoba
        action: hide
      - type: narration
        text: "{同調|どうちょう}{圧力|あつりょく}と{バンドワゴン{効果|こうか}}——「{多数|たすう}が{選|えら}んでいる→{自分|じぶん}も{選|えら}ぶべき」という{思|おも}い{込|こ}みのメカニズム。「{みんな}がそう{言|い}っているなら{正|ただ}しいはず」と{判断|はんだん}を{止|や}めてしまうことがある。"
      - type: evidence
        id: card-2
        title: バンドワゴン効果の説明
        content: "【{バンドワゴン{効果|こうか}}】「{多数|たすう}が{選|えら}んでいる→{自分|じぶん}も{選|えら}ぶべき」という{思|おも}い{込|こ}みのメカニズム。{情報|じょうほう}の{出所|でどころ}を{確認|かくにん}せずに「{みんな}がそう{言|い}っているなら{正|ただ}しいはず」と{従|したが}ってしまうことがある。【{重要|じゅうよう}{ポイント}】{情報|じょうほう}を{受|う}け{取|と}ったとき、「{誰|だれ}が・{何|なに}を・{確認|かくにん}したか」を{問|と}い{直|なお}すことが{大切|たいせつ}。"
      - type: sprite
        character: manabu
        expression: thinking
        position: right
      - type: dialog
        character: manabu
        text: "{バンドワゴン{効果|こうか}}……「{みんな}がそう{言|い}ってる」は、{実|じつ}は{誰|だれ}か1{人|ひと}の{言葉|ことば}が{伝言|でんごん}で{広|ひろ}まっただけかもしれない。{全員|ぜんいん}の{情報|じょうほう}{入手|にゅうしゅ}ルートを{逆方向|ぎゃくほうこう}に{辿|たど}ると、{起点|きてん}が{分|わ}かるはずだ。"
        expression: thinking
      - type: sprite
        character: manabu
        action: hide

  # ==================== 調査：証拠カード3+4 ====================
  - id: evidence-2
    bg: hallway
    bgm: investigation
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 情報連鎖の循環とキクの行動記録
      - type: narration
        text: "{各自|かくじ}の「{誰|だれ}から{聞|き}いたか」{記録|きろく}——{情報|じょうほう}{連鎖|れんさ}を{逆|ぎゃく}に{辿|たど}ると、{何|なに}かが{見|み}えてくる。"
      - type: evidence
        id: card-3
        title: 各自の情報入手ルート記録
        content: "【コトバ】「ツタエから{聞|き}いた」→【マナブ】「コトバから{聞|き}いた」→【ツタエ】「マナブから{聞|き}いた」→{逆|ぎゃく}に{辿|たど}ると：コトバ←ツタエ←マナブ←コトバ……{循環|じゅんかん}している！　{誰|だれ}も「{直接|ちょくせつ}Aがいいと{聞|き}いた」{人|ひと}がいない。{起点|きてん}はこの{輪|わ}の{外|そと}にある。"
      - type: sprite
        character: tsutae
        expression: surprised
        position: right
      - type: dialog
        character: tsutae
        text: "え……{私|わたし}はマナブから{聞|き}いたと{思|おも}ってた。でも{図|ず}を{見|み}ると、マナブもコトバから{聞|き}いて、コトバは{私|わたし}から{聞|き}いて……{循環|じゅんかん}してる！　{誰|だれ}かが{輪|わ}の{外|そと}にいるはずで、それは——"
        expression: surprised
      - type: sprite
        character: tsutae
        action: hide
      - type: sprite
        character: manabu
        expression: determined
        position: right
      - type: dialog
        character: manabu
        text: "3{人|にん}（コトバ・マナブ・ツタエ）の{情報|じょうほう}ルートは{循環|じゅんかん}している。つまり、この{輪|わ}に{入|はい}っていない{人物|じんぶつ}が{起点|きてん}だ。{残|のこ}るのは——キク。"
        expression: determined
      - type: sprite
        character: manabu
        action: hide
      - type: narration
        text: "{意思決定|いしけってい}の{直前|ちょくぜん}10{分|ぷん}の{行動|こうどう}{記録|きろく}——{各自|かくじ}の{位置|いち}・{会話|かいわ}{記録|きろく}と、キクの{行動|こうどう}{記録|きろく}。"
      - type: evidence
        id: card-4
        title: 直前10分の行動記録タイムライン
        content: "【{話|はな}し{合|あ}い{直前|ちょくぜん}10{分間|ふんかん}の{記録|きろく}】キク：{全員|ぜんいん}が{集|あつ}まる{前|まえ}に{複数|ふくすう}{人|にん}に「Aがいいって{話|はな}してたよ」と{伝|つた}えた。ツタエ：キクから「Aがいいって{話|はな}してたよ」と{聞|き}いた。マナブ・コトバ：ツタエを{通|とお}して{情報|じょうほう}を{受|う}け{取|と}った。【{結論|けつろん}】{話|はな}し{合|あ}いが{始|はじ}まる{前|まえ}に、キクが{複数|ふくすう}{人|ひと}に「Aがいいって{話|はな}が{出|で}てた」と{伝|つた}えていた。"
      - type: sprite
        character: kiku
        expression: worried
        position: left
      - type: dialog
        character: kiku
        text: "ぼく……{話|はな}し{合|あ}いの{前|まえ}にそう{言|い}ったのは{確|たし}かで……でも、{本当|ほんとう}に「{みんな}がそう{言|い}ってた」かどうかは、{確認|かくにん}してなかった。ちょっと{試|ため}してみたくて——"
        expression: worried
      - type: sprite
        character: kiku
        action: hide

  # ==================== 中間点 ====================
  - id: midpoint
    bg: classroom
    bgm: thinking-time
    steps:
      - type: narration
        text: "{証拠|しょうこ}が{揃|そろ}ってきた。コトバ・マナブ・ツタエの{情報|じょうほう}ルートは{循環|じゅんかん}しており、{起点|きてん}は{輪|わ}の{外|そと}にある。キクは{話|はな}し{合|あ}い{前|まえ}に{複数|ふくすう}{人|ひと}へ{情報|じょうほう}を{伝|つた}えていた——しかし「{試|ため}してみた」とは、いったいどういう{意味|いみ}なのか。"
      - type: sprite
        character: kotoba
        expression: thinking
        position: left
      - type: dialog
        character: kotoba
        text: "{情報|じょうほう}{連鎖|れんさ}を{図|ず}にすると——キクが{複数|ふくすう}{人|ひと}に「Aがいいって{話|はな}してたよ」と{伝|つた}え、ツタエが{受|う}け{取|と}り、それが{私|わたし}とマナブへ。「{みんな}がそう{言|い}ってた」の{出所|でどころ}はキクの1つの{発言|はつげん}だったかもしれない。"
        expression: thinking
      - type: sprite
        character: kotoba
        action: hide
      - type: sprite
        character: tsutae
        expression: worried
        position: right
      - type: dialog
        character: tsutae
        text: "「{みんな}が{言|い}ってたなら{正|ただ}しいはず」って{思|おも}って、{私|わたし}も{疑|うたが}わずに{広|ひろ}めてしまった。{自分|じぶん}も{情報|じょうほう}{拡散|かくさん}の{一員|いちいん}だったんだ……"
        expression: worried
      - type: sprite
        character: tsutae
        action: hide

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: キクのメモ
      - type: effect
        name: fade-in
      - type: narration
        text: "キクのメモが{発見|はっけん}された——そこには、すべての{真相|しんそう}が{書|か}かれていた。"
      - type: evidence
        id: card-5
        title: キクのメモ（決定的証拠）
        content: "「Aの{方|ほう}がいいかなと{思|おも}っていた。『{みんな}が{言|い}ってた』って{言|い}ったら、{みんな}そう{言|い}うようになった。{試|ため}してみたかっただけなのに……」——キクのメモより"
      - type: se
        sound: reveal
      - type: narration
        text: "**「{みんな}が{賛成|さんせい}している」という{情報|じょうほう}の{起点|きてん}は、キクの「{試|ため}してみたかっただけ」という{軽|かる}い{気持|きも}ちだった。**　{誰|だれ}も{確認|かくにん}していなかった「{みんな}の{賛成|さんせい}」が、{情報|じょうほう}{連鎖|れんさ}によって{本当|ほんとう}のことのように{広|ひろ}まった。"
      - type: sprite
        character: kiku
        expression: worried
        position: center
      - type: dialog
        character: kiku
        text: "「もしAって{言|い}ったらどうなるだろう」って……{話|はな}し{合|あ}いが{始|はじ}まる{前|まえ}に、まだ{決|き}まっていないのに「{みんな}Aがいいって{言|い}ってたよ」って{言|い}っちゃったんだ。{実際|じっさい}には{誰|だれ}にも{確認|かくにん}してなかったのに。"
        expression: worried
      - type: dialog
        character: kiku
        text: "{みんな}が「そうなんだ」って{信|しん}じてくれて……{本当|ほんとう}に「{みんな}がそう{言|い}ってた」{状況|じょうきょう}になってしまった。こんなに{広|ひろ}まるとは{思|おも}わなかった。"
        expression: worried
      - type: sprite
        character: kiku
        action: hide
      - type: sprite
        character: manabu
        expression: surprised
        position: right
      - type: dialog
        character: manabu
        text: "4{人|にん}{全員|ぜんいん}の{情報|じょうほう}{入手|にゅうしゅ}ルートを{逆方向|ぎゃくほうこう}に{追|お}うと——{起点|きてん}はキクの1{人|ひと}だ。キクの「{試|ため}してみた」{一言|ひとこと}が、{確認|かくにん}されないまま{全員|ぜんいん}の「{みんながそう言ってた}」になった。これが{バンドワゴン{効果|こうか}}の{仕組|しく}みだ。"
        expression: determined
      - type: sprite
        character: manabu
        action: hide

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom
    bgm: confrontation
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: "「みんながAに賛成」という情報の最初の発信者は誰？"
      - type: sprite
        character: manabu
        expression: determined
        position: right
      - type: dialog
        character: manabu
        text: "{証拠|しょうこ}を{整理|せいり}すると——①コトバ・マナブ・ツタエの{情報|じょうほう}ルートは{循環|じゅんかん}（Card 3）。②{起点|きてん}は{輪|わ}の{外|そと}の1{人|ひと}。③キクが{話|はな}し{合|あ}い{前|まえ}に{複数|ふくすう}{人|ひと}へ「Aがいいって{話|はな}してたよ」と{伝|つた}えていた（Card 4）。④キク{自身|じしん}が「{誰|だれ}にも{確認|かくにん}してなかった」と{認|みと}めた（Card 5）。"
        expression: determined
      - type: sprite
        character: manabu
        action: hide
      - type: narration
        text: "{全探索|ぜんたんさく}——{情報|じょうほう}{連鎖|れんさ}の{全|すべ}てのパターンを{網羅的|もうらてき}に{辿|たど}り、{見落|みおと}としなく{起点|きてん}を{特定|とくてい}する{推理|すいり}スキル。コトバ・マナブ・ツタエのルートを{逆方向|ぎゃくほうこう}に{追|お}うと、{循環|じゅんかん}が{確認|かくにん}でき、{起点|きてん}はキクに{絞|しぼ}られる。"
      - type: choice
        id: q1
        question: "「みんながAに賛成」という情報の最初の発信者は誰？"
        options:
          - text: コトバ
            value: kotoba
            correct: false
            feedback: "コトバは{情報|じょうほう}を{最後|さいご}に{受|う}け{取|と}った{側|がわ}。Card 3でコトバは「ツタエから{聞|き}いた」と{言|い}っており、{起点|きてん}ではないよ。{情報|じょうほう}{連鎖|れんさ}の{図|ず}をもう{一度|いちど}{確認|かくにん}しよう。"
          - text: マナブ
            value: manabu
            correct: false
            feedback: "マナブは「コトバから{聞|き}いた」と{言|い}い、{情報|じょうほう}{連鎖|れんさ}の{中継|ちゅうけい}にいた。{起点|きてん}ではなく、{循環|じゅんかん}の{輪|わ}の{内側|うちがわ}にいる。Card 4と5を{見直|みなお}してみよう。"
          - text: ツタエ
            value: tsutae
            correct: false
            feedback: "ツタエはキクから{情報|じょうほう}を{受|う}け{取|と}り、それを{広|ひろ}めた{中継者|ちゅうけいしゃ}。{情報|じょうほう}を{広|ひろ}めた{責任|せきにん}はあるけど、{最初|さいしょ}の{発信者|はっしんしゃ}ではないよ。Card 4の{行動|こうどう}{記録|きろく}をもう{一度|いちど}。"
          - text: キク（確認せずに「みんなが言ってた」と言った）
            value: kiku
            correct: true
            feedback: "{正解|せいかい}！　キクは「もしAって{言|い}ったらどうなるだろう」という{軽|かる}い{好奇心|こうきしん}で、{誰|だれ}にも{確認|かくにん}せずに「{みんな}Aがいいって{言|い}ってたよ」と{言|い}った。それが{伝言|でんごん}で{広|ひろ}まり、{本当|ほんとう}に「{みんな}がそう{言|い}ってた」{状況|じょうきょう}が{作|つく}られてしまった。**「{みんな}」という{言葉|ことば}には{強|つよ}い{力|ちから}がある——でもその「{みんな}」が{実際|じっさい}には1{人|ひと}の{確認|かくにん}されていない{発言|はつげん}だったことがある。グループで{決|き}めるとき、「{誰|だれ}が{言|い}ったか・{確認|かくにん}されたか」を{確|たし}かめることが、{同調|どうちょう}{圧力|あつりょく}に{流|なが}されないための{第一歩|だいいっぽ}なんだ。**"

  # ==================== 真相：キクの告白 ====================
  - id: truth-kiku
    bg: classroom
    bgm: emotional
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真相
        subtitle: キクの軽い好奇心
      - type: effect
        name: fade-in
      - type: sprite
        character: kiku
        expression: worried
        position: center
      - type: dialog
        character: kiku
