meta:
  id: weather-10
  title: "未来の空"
  series: "天気探偵団"
  volume: 10
  estimatedMinutes: 18

characters:
  sora:
    name: "ソラ"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  kazeru:
    name: "カゼル"
    color: "#FF4444"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  kumori:
    name: "クモリ"
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  amene:
    name: "アメネ"
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "「100年後の天気を予測しよう」という理科の総まとめ発表で、ソラが提出したレポートに「2124年には平均気温が必ず○℃上昇する」という断言が含まれていた。"
      - type: narration
        text: "他の3人が気になったのは、「必ず」という言葉だ。"
      - type: narration
        text: "ソラの参照した論文には「2.0〜4.5℃の幅で上昇する可能性が高い」とあったはずなのに、レポートでは「必ず4.5℃上昇する」と書かれていた。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: sora
        expression: worried
        position: center
      - type: dialog
        character: sora
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: sora
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: sora, expression: determined }
          - { id: kazeru, expression: thinking }
          - { id: kumori, expression: thinking }
          - { id: amene, expression: worried }
      - type: narration
        text: "「天気探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: kazeru
        action: hide
      - type: sprite
        character: kumori
        action: hide
      - type: sprite
        character: amene
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "天気探偵団"
        subtitle: "Vol.10 未来の空"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "ソラのレポート"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、全員ためのヒントはどこにありそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "ソラが参照した論文プリント"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、カゼルのみためのヒントはどこにありそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "他の気候変動資料3件"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、クモリのみためのヒントはどこにありそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "ソラの授業ノート"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、アメネのみためのヒントはどこにありそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "IPCC第6次報告書の要約"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、全員（GM配布）ためのヒントはどこにありそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: sora
        expression: worried
        position: left
      - type: dialog
        character: sora
        text: "確かに論文の\"幅\"を\"必ず最悪の数値\"に変えた。伝わってほしかった」と認める場面"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: kazeru
        expression: thinking
        position: right
      - type: dialog
        character: kazeru
        text: "元論文とレポートの差を並べて「どこが変わったか」を示す場面"
      - type: sprite
        character: kazeru
        action: hide
      - type: sprite
        character: kumori
        expression: thinking
        position: left
      - type: dialog
        character: kumori
        text: "科学者は不確実性を正直に書く。それが信頼の証明」という第2層の核心を引き出す場面"
      - type: sprite
        character: kumori
        action: hide
      - type: sprite
        character: amene
        expression: thinking
        position: right
      - type: dialog
        character: amene
        text: "地球をかばいたい気持ちと、正直に伝える誠実さは一致する」とソラに伝える場面"
      - type: sprite
        character: amene
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「事件のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: sora, expression: normal }
          - { id: kazeru, expression: normal }
          - { id: kumori, expression: normal }
          - { id: amene, expression: worried }
      - type: choice
        id: q1
        text: "事件のきっかけになった行動をしたのは誰？"
        options:
          - label: "ソラ"
            value: sora
            correct: true
            feedback: "ソラの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - label: "カゼル"
            value: kazeru
            correct: false
            feedback: "カゼルは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "クモリ"
            value: kumori
            correct: false
            feedback: "クモリは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "アメネ"
            value: amene
            correct: false
            feedback: "アメネは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: kazeru
        action: hide
      - type: sprite
        character: kumori
        action: hide
      - type: sprite
        character: amene
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、ソラ（空）"
      - type: dialog
        character: sensei
        text: "動機は、#20 かばう罪悪感 — ソラは気候変動の深刻さを誰よりも知っていた。「このままでは地球が大変なことになる」という思いを伝えたくて、論文の「2.0〜4.5℃の幅」を「最悪の場合の4.5℃」に絞り、「可能性が高い」を「必ず」に変えて書いた。「正確な不確実性を伝えたら、みんな真剣に受け止めてくれないかもしれない」というかばう罪悪感——地球をかばうために真実を誇張した。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: sora
        expression: worried
        position: center
      - type: dialog
        character: sora
        text: "確かに論文の\"幅\"を\"必ず最悪の数値\"に変えた。伝わってほしかった」と認める場面"
      - type: sprite
        character: sora
        expression: determined
      - type: dialog
        character: sora
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: sora
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・気候変動の科学的予測は「幅」と「確率」で表現されることを理解し、科学的不確実性を正直に伝えることの大切さを説明できる\n・「複合推理+メタ認知」スキルを体験する。第1層（事実の推理）と第2層（意味の推理）の2段階で考える"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: sora, expression: happy }
          - { id: kazeru, expression: happy }
          - { id: kumori, expression: happy }
          - { id: amene, expression: happy }
      - type: narration
        text: "天気探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: sora
        action: hide
      - type: sprite
        character: kazeru
        action: hide
      - type: sprite
        character: kumori
        action: hide
      - type: sprite
        character: amene
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
