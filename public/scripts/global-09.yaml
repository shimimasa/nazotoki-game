scenes:
  # ==================== プロローグ ====================
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "{国際理解探偵団|こくさいりかいたんていだん}の4{人|にん}は「{多文化共生|たぶんかきょうせい}フェスティバル」の{発表|はっぴょう}パネルを{作|つく}った。それぞれが「{外国人|がいこくじん}と{日本人|にほんじん}が{一緒|いっしょ}に{活動|かつどう}して{成功|せいこう}した{事例|じれい}」を{調|しら}べ、4{枚|まい}のパネルが{完成|かんせい}した。"
      - type: narration
        text: "コエルは{地域|ちいき}のゴミ{拾|ひろ}い{活動|かつどう}を{取材|しゅざい}した。{外国人|がいこくじん}の{住民|じゅうみん}アリさんは「{一緒|いっしょ}にゴミを{拾|ひろ}うから{楽|たの}しい」と{笑顔|えがお}で{話|はな}してくれた。"
      - type: narration
        text: "ところが、{翌朝|よくあさ}——"
      - type: se
        sound: crash
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: yamada
        expression: worried
        position: center
      - type: dialog
        character: yamada
        text: "たいへん！ コエルさんが{作|つく}った「{地域|ちいき}のゴミ{拾|ひろ}い」パネルの{結論|けつろん}が{書|か}き{換|か}えられているわ！ **「{一緒|いっしょ}に」が「{別々|べつべつ}に」に**なってる！"
        expression: worried
      - type: sprite
        character: yamada
        action: hide
      - type: sprite_group
        characters:
          - character: koeru
            expression: surprised
          - character: hiromu
            expression: surprised
          - character: manabu
            expression: thinking
          - character: tsumugi
            expression: worried
      - type: narration
        text: "4{人|にん}は{顔|かお}を{見合|みあ}わせた。4{枚|まい}のパネルのうち、コエルのものだけが{変|か}わっている。「{一緒|いっしょ}に」を「{別々|べつべつ}に」に{書|か}き{換|か}えたのは、{誰|だれ}なのか……？"
      - type: sprite_group
        characters: []
      - type: effect
        name: fade-out
      - type: title_card
        text: いっしょ？ べつべつ？
        subtitle: 国際理解探偵団 Vol.9

  # ==================== 調査：証拠カード1 ====================
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: title_card
        text: ステップ1
        subtitle: パネルの状況を調べよう
      - type: narration
        text: "コエルの「{地域|ちいき}の{共生|きょうせい}{事例|じれい}」パネルを{調|しら}べてみた。"
      - type: se
        sound: discover
      - type: narration
        text: "{結論|けつろん}{部分|ぶぶん}が{書|か}き{換|か}えられている。{元|もと}の{文字|もじ}（{黒|くろ}ペン）は**「{外国人|がいこくじん}と{日本人|にほんじん}が{一緒|いっしょ}にゴミ{拾|ひろ}いをしている。{助|たす}け{合|あ}いが{大切|たいせつ}」**だ。"
      - type: narration
        text: "それが{青|あお}ペンで{線|せん}を{引|ひ}かれ、**「{外国人|がいこくじん}と{日本人|にほんじん}が{別々|べつべつ}にゴミ{拾|ひろ}いをしている。それぞれのやり{方|かた}で」**と{書|か}き{直|なお}してある。"
      - type: narration
        text: "ほかの3{枚|まい}のパネル（{学校|がっこう}/{行事|ぎょうじ}/{スポーツ}）は{変|か}わっていない。「{一緒|いっしょ}に」を「{別々|べつべつ}に」に{変|か}えた{人|ひと}は、「{別々|べつべつ}のほうがいい」と{思|おも}っていた？"

  # ==================== 調査：証拠カード2 ====================
  - id: evidence-2
    bg: classroom
    steps:
      - type: title_card
        text: ステップ2
        subtitle: 4つの共生事例を比べよう
      - type: narration
        text: "4{枚|まい}のパネルの{内容|ないよう}を{全部|ぜんぶ}{並|なら}べて{比|くら}べてみた。"
      - type: se
        sound: discover
      - type: narration
        text: "{学校|がっこう}（マナブ）：{外国人|がいこくじん}と{日本人|にほんじん}の{子|こ}が**{一緒|いっしょ}に**{給食|きゅうしょく}を{食|た}べる → {友達|ともだち}になった"
      - type: narration
        text: "{地域|ちいき}（コエル）：{外国人|がいこくじん}と{日本人|にほんじん}が**{別々|べつべつ}に**ゴミ{拾|ひろ}い ← {書|か}き{換|か}え！"
      - type: narration
        text: "{行事|ぎょうじ}（ツムギ）：{外国人|がいこくじん}と{日本人|にほんじん}が**{一緒|いっしょ}に**{盆踊|ぼんおど}りをする → {文化|ぶんか}を{体験|たいけん}できた"
      - type: narration
        text: "{スポーツ}（ヒロム）：{外国人|がいこくじん}と{日本人|にほんじん}が**{一緒|いっしょ}に**サッカーチームを{作|つく}る → チームワークが{生|う}まれた"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "3つは「{一緒|いっしょ}に → {成功|せいこう}」。1つだけ「{別々|べつべつ}に」。**{帰納法|きのうほう}（★{新|あたら}しいスキル）**: {複数|ふくすう}のデータを{比|くら}べてパターンを{見|み}つけ、{合|あ}わないものを{発見|はっけん}する。このパターンの{不一致|ふいっち}は、{元|もと}からそうだった？ {誰|だれ}かが{変|か}えた？"

  # ==================== 調査：証拠カード3 ====================
  - id: evidence-3
    bg: classroom
    steps:
      - type: title_card
        text: ステップ3
        subtitle: 放課後の行動を確認しよう
      - type: narration
        text: "4{人|にん}の{放課後|ほうかご}の{行動|こうどう}を{調|しら}べた。"
      - type: se
        sound: discover
      - type: narration
        text: "ヒロム —— {15時25分|じゅうごじにじゅうごふん}ごろから{職員室|しょくいんしつ}で{委員会|いいんかい}{打|う}ち{合|あ}わせ。{担任|たんにん}の{先生|せんせい}が{確認|かくにん}。"
      - type: narration
        text: "マナブ —— {15時30分|じゅうごじさんじゅっぷん}から{図書室|としょしつ}で{追加調査|ついかちょうさ}。{図書|としょ}の{先生|せんせい}が{確認|かくにん}。"
      - type: narration
        text: "コエル —— {15時20分|じゅうごじにじゅっぷん}に{下校|げこう}。{正門|せいもん}の{先生|せんせい}が{確認|かくにん}。"
      - type: narration
        text: "ツムギ —— {15時30分|じゅうごじさんじゅっぷん}から{音楽室|おんがくしつ}でリコーダー{練習|れんしゅう}。{音楽|おんがく}の{先生|せんせい}が{確認|かくにん}。"
      - type: narration
        text: "また、{15時15分|じゅうごじじゅうごふん}に{全員|ぜんいん}でパネルを{確認|かくにん}したとき、4{枚|まい}とも「{一緒|いっしょ}に」で{正常|せいじょう}だった。{全員|ぜんいん}にアリバイがある……。「{15時25分|じゅうごじにじゅうごふん}ごろ」って{正確|せいかく}に{何時|なんじ}？"

  # ==================== 調査：証拠カード4 ====================
  - id: evidence-4
    bg: classroom
    steps:
      - type: title_card
        text: ステップ4
        subtitle: ヒロムの「押し付け」発言を調べよう
      - type: narration
        text: "{月曜|げつようび}{14時00分|じゅうよじ}ごろ（パネル{作成前|さくせいまえ}）の{会話|かいわ}{記録|きろく}が{見|み}つかった。"
      - type: se
        sound: discover
      - type: sprite
        character: hiromu
        expression: determined
        position: left
      - type: dialog
        character: hiromu
        text: "{共生|きょうせい}{委員長|いいんちょう}として{言|い}うけど、**{外国人|がいこくじん}に{無理|むり}に{一緒|いっしょ}にやらせるのは{押|お}し{付|つ}けだと{思|おも}う**。{別々|べつべつ}にやるほうが{相手|あいて}を{尊重|そんちょう}していると{思|おも}う。"
        expression: determined
      - type: sprite
        character: hiromu
        action: hide
      - type: sprite
        character: koeru
        expression: surprised
        position: right
      - type: dialog
        character: koeru
        text: "でも{取材|しゅざい}したら、{外国人|がいこくじん}の{人|ひと}が「{一緒|いっしょ}にやりたい」って{言|い}ってたよ？"
        expression: surprised
      - type: sprite
        character: koeru
        action: hide
      - type: sprite
        character: hiromu
        expression: thinking
        position: left
      - type: dialog
        character: hiromu
        text: "それは……たまたまかもしれない。{一般的|いっぱんてき}には、{別々|べつべつ}にやるほうが{安全|あんぜん}だと{思|おも}う。"
        expression: thinking
      - type: sprite
        character: hiromu
        action: hide
      - type: narration
        text: "ヒロムは「{別々|べつべつ}がいい」と{主張|しゅちょう}していた。{動機|どうき}がある？ でもヒロムのアリバイは{15時25分|じゅうごじにじゅうごふん}から{職員室|しょくいんしつ}……。"

  # ==================== 反転：証拠カード5 ====================
  - id: evidence-5
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 決定的証拠
        subtitle: 担任の先生の証言とコエルの取材メモ
      - type: effect
        name: fade-in
      - type: narration
        text: "{担任|たんにん}の{先生|せんせい}に{直接|ちょくせつ}{聞|き}いてみた。"
      - type: sprite
        character: yamada
        expression: determined
        position: center
      - type: dialog
        character: yamada
        text: "{担任|たんにん}の{先生|せんせい}のお{話|はなし}を{読|よ}むわね。"
        expression: determined
      - type: dialog
        character: yamada
        text: "「ヒロムくんが{職員室|しょくいんしつ}に{来|き}たのは**{15時35分|じゅうごじさんじゅうごふん}**です。{15時25分|じゅうごじにじゅうごふん}ではありません。10{分|ぷん}{遅刻|ちこく}でした。『{教室|きょうしつ}に{忘|わす}れ{物|もの}を{取|と}りに{行|い}きました』と{言|い}っていました。」"
        expression: normal
      - type: dialog
        character: yamada
        text: "そして、コエルのノートに{元|もと}の{取材|しゅざい}メモが{残|のこ}っていたわ。"
        expression: thinking
      - type: sprite
        character: yamada
        action: hide
      - type: se
        sound: discover
      - type: narration
        text: "コエルの{取材|しゅざい}メモより——{外国人|がいこくじん}{住民|じゅうみん}アリさんの{言葉|ことば}："
      - type: narration
        text: "「**{一緒|いっしょ}にゴミ{拾|ひろ}いをするから{楽|たの}しい。{別々|べつべつ}だったら{参加|さんか}しない。** ゴミ{拾|ひろ}いを{通|とお}じて{日本語|にほんご}も{上手|じょうず}になった。{友達|ともだち}もできた。{一緒|いっしょ}にやることが{大切|たいせつ}。」"
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "つまり{元|もと}の{事例|じれい}は「{一緒|いっしょ}に」が{正|ただ}しかった！ **{帰納法|きのうほう}の{結果|けっか}**: 4つとも{本当|ほんとう}は「{一緒|いっしょ}に → {成功|せいこう}」。{地域|ちいき}{事例|じれい}だけ「{別々|べつべつ}に」は{書|か}き{換|か}えだ。{書|か}き{換|か}えた{人|ひと}は「{別々|べつべつ}がいい」と{思|おも}っていて、{15時25分|じゅうごじにじゅうごふん}〜{15時35分|じゅうごじさんじゅうごふん}にアリバイがない——。"

  # ==================== 推理・投票 ====================
  - id: deduction
    bg: classroom-blackboard
    bgm: tension-quiet
    steps:
      - type: title_card
        text: 推理タイム
        subtitle: 犯人は誰だ？
      - type: sprite
        character: manabu
        expression: thinking
        position: left
      - type: dialog
        character: manabu
        text: "{帰納法|きのうほう}で{見|み}えてきた。4{枚|まい}のパネルを{並|なら}べると、3つは「{一緒|いっしょ}に → {成功|せいこう}」のパターン。1つだけ「{別々|べつべつ}に」——{元|もと}の{取材|しゅざい}メモを{見|み}ると、{本当|ほんとう}は「{一緒|いっしょ}に」だった。{誰|だれ}かが「{別々|べつべつ}がいい」と{思|おも}って{書|か}き{換|か}えた。"
        expression: thinking
      - type: sprite
        character: manabu
        action: hide
      - type: sprite
        character: koeru
        expression: determined
        position: right
      - type: dialog
        character: koeru
        text: "わたしのパネルが{書|か}き{換|か}えられた。アリさんは「{一緒|いっしょ}にやりたい」って{自分|じぶん}の{意思|いし}で{言|い}っていたのに！ {相手|あいて}の{気持|きも}ちを{聞|き}かずに「{別々|べつべつ}がいい」と{決|き}めた{人|ひと}がいる。"
        expression: determined
      - type: sprite
        character: koeru
        action: hide
      - type: sprite
        character: tsumugi
        expression: worried
        position: left
      - type: dialog
        character: tsumugi
        text: "{15時25分|じゅうごじにじゅうごふん}ごろ、{音楽室|おんがくしつ}に{向|む}かう{途中|とちゅう}で……ヒロムが{教室|きょうしつ}の{方向|ほうこう}に{急|いそ}いで{歩|ある}いているのを{見|み}た。{職員室|しょくいんしつ}は{反対方向|はんたいほうこう}なのに……"
        expression: worried
      - type: sprite
        character: tsumugi
        action: hide
      - type: narration
        text: "{証拠|しょうこ}を{整理|せいり}しよう。マナブ・コエル・ツムギはアリバイあり。ヒロムは「{15時25分|じゅうごじにじゅうごふん}から{職員室|しょくいんしつ}」と{言|い}っていたが、{実際|じっさい}は**{15時35分着|じゅうごじさんじゅうごふんちゃく}**。しかも「{別々|べつべつ}がいい」と{主張|しゅちょう}していた——"
      - type: choice
        id: q1
        question: パネルを書き換えたのは誰？
        options:
          - text: ヒロム（15:25〜15:35のアリバイがなく、「別々がいい」と発言していた）
            value: hiromu
            correct: true
            feedback: "{正解|せいかい}！ ヒロムは「{15時25分|じゅうごじにじゅうごふん}から{職員室|しょくいんしつ}」と{言|い}っていたが、{実際|じっさい}は{15時35分着|じゅうごじさんじゅうごふんちゃく}。{15時25分|じゅうごじにじゅうごふん}〜{15時35分|じゅうごじさんじゅうごふん}に{教室|きょうしつ}にいた。さらに「{別々|べつべつ}がいい」と{発言|はつげん}していた——{動機|どうき}と{機会|きかい}が{一致|いっち}する。"
          - text: マナブ（帰納法でパターン不一致にすぐ気づいた）
            value: manabu
            feedback: "マナブは{15時30分|じゅうごじさんじゅっぷん}から{図書室|としょしつ}で{図書|としょ}の{先生|せんせい}が{確認|かくにん}ずみ。{帰納法|きのうほう}で{不一致|ふいっち}に{気|き}づいたのは、{書|か}き{換|か}えた{人|ひと}ではなく{発見|はっけん}した{人|ひと}だよ。"
          - text: コエル（自分のパネルを書き換えた可能性）
            value: koeru
            feedback: "コエルは{15時20分|じゅうごじにじゅっぷん}に{正門|せいもん}を{通|とお}って{下校|げこう}し、{先生|せんせい}が{確認|かくにん}している。{自分|じぶん}の{取材|しゅざい}を{否定|ひてい}する{理由|りゆう}もないよ。"
          - text: ツムギ（ヒロムが教室方向に歩くのを目撃した）
            value: tsumugi
            feedback: "ツムギは{15時28分|じゅうごじにじゅうはちふん}に{音楽室|おんがくしつ}に{着|つ}いており、{音楽|おんがく}の{先生|せんせい}が{確認|かくにん}している。{目撃|もくげき}したのはツムギ{自身|じしん}ではなく、{教室|きょうしつ}に{向|む}かったヒロムだよ。"

  # ==================== 真相：ヒロムの告白 ====================
  - id: truth-hiromu
    bg: hallway-sunset
    bgm: confession
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: 真実
        subtitle: ヒロムの告白
      - type: effect
        name: fade-in
      - type: sprite
        character: hiromu
        expression: worried
        position: center
      - type: dialog
        character: hiromu
        text: "……ごめんなさい。パネルを{書|か}き{換|か}えたのは、{僕|ぼく}です。"
        expression: worried
      - type: narration
        text: "ヒロムはうつむきながら、{小|ちい}さな{声|こえ}で{話|はな}し{始|はじ}めた。"
      - type: dialog
        character: hiromu
        text: "{共生|きょうせい}{委員長|いいんちょう}として、{校長|こうちょう}{先生|せんせい}から「{外国人|がいこくじん}の{人|ひと}が{嫌|いや}な{思|おも}いをしないように{管理|かんり}してね」と{言|い}われていた。ずっとプレッシャーだった。"
        expression: worried
      - type: dialog
        character: hiromu
        text: "コエルのパネル「{一緒|いっしょ}にゴミ{拾|ひろ}い」を{見|み}て……「{一緒|いっしょ}にやらせるのは{押|お}し{付|つ}けだ。{別々|べつべつ}にやるほうが{相手|あいて}を{尊重|そんちょう}している」って{思|おも}い{込|こ}んだんだ。"
        expression: thinking
