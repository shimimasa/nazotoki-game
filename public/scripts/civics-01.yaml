meta:
  id: civics-01
  title: 消えた賛成票
  series: 公民探偵団
  volume: 1
  estimatedMinutes: 20

characters:
  haruki:
    name: ハルキ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  mio:
    name: ミオ
    color: "#E91E63"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  kenta:
    name: ケンタ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  sora:
    name: ソラ
    color: "#2E8B57"
    sprites:
      normal: boy-c-normal.webp
      happy: boy-c-happy.webp
      thinking: boy-c-thinking.webp
      worried: boy-c-worried.webp
      surprised: boy-c-surprised.webp
      determined: boy-c-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: gym
    bgm: civics-01/opening
    steps:
      - type: narration
        text: "みどり市立さくら小学校「第2回{児童議会|じどうぎかい}」。体育館のステージで、クラス{代表|だいひょう}11人が集まっている。"
      - type: narration
        text: "{議題|ぎだい}は「校庭に{花壇|かだん}を作ること」。{賛成|さんせい}か{反対|はんたい}か、{投票|とうひょう}用紙に{書|か}いて{投票箱|とうひょうばこ}に入れる。"
      - type: sprite
        character: haruki
        expression: normal
        position: center
      - type: dialog
        character: haruki
        text: "{集計|しゅうけい}{結果|けっか}を発表します。{賛成|さんせい}7{票|ひょう}、{反対|はんたい}3票、{白票|はくひょう}1票。{提案|ていあん}は{可決|かけつ}されました！"
      - type: sprite
        character: haruki
        action: hide
      - type: bgm
        action: stop
      - type: sprite
        character: sora
        expression: determined
        position: center
      - type: dialog
        character: sora
        text: ちょっと待ってください。
      - type: effect
        name: shake
        duration: 400
      - type: dialog
        character: sora
        text: "{今日|きょう}の{出席者|しゅっせきしゃ}は11人。{議長|ぎちょう}は{投票|とうひょう}に{参加|さんか}できないルールがあります。だから{投票|とうひょう}できるのは10人のはず。"
        expression: thinking
      - type: dialog
        character: sora
        text: "でも 7 + 3 + 1 = 11{票|ひょう}。……1{票|ひょう}多いのはなぜですか？"
        expression: determined
      - type: sprite
        character: sora
        action: hide
      - type: bgm
        track: civics-01/investigation
      - type: narration
        text: 会場がざわめく。
      - type: narration
        speed: slow
        text: "{誰|だれ}かが{投票|とうひょう}用紙を2{枚|まい}入れた。——{公民|こうみん}{探偵|たんてい}団、正しい{手続|てつづ}きを守るために事実を{調|しら}べろ！"
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: 公民探偵団 Vol.1
        subtitle: 消えた賛成票

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: gym
    bgm: civics-01/investigation
    steps:
      - type: narration
        text: "4人の{代表|だいひょう}委員に話を聞こう。"
      - type: sprite
        character: haruki
        expression: worried
        position: left
      - type: dialog
        character: haruki
        text: "ぼくは{議長|ぎちょう}のハルキ。{議事録|ぎじろく}と数字の{管理|かんり}を{担当|たんとう}してた。{議長|ぎちょう}は{投票|とうひょう}に{参加|さんか}できないから、ぼくは用紙を持っていない。"
      - type: dialog
        character: haruki
        text: "11{票|ひょう}……なぜだ？ ぼくの{集計|しゅうけい}ミスじゃない。本当に11{枚|まい}あるんだ。"
        expression: thinking
      - type: sprite
        character: haruki
        action: hide
      - type: sprite
        character: mio
        expression: normal
        position: right
      - type: dialog
        character: mio
        text: "わたしはミオ。正直に言うと……{花壇|かだん}じゃなくて{休憩|きゅうけい}スペースがいいなと思ってた。{投票|とうひょう}用紙は1{枚|まい}だけもらって、{投票箱|とうひょうばこ}にすっと入れたよ。"
      - type: sprite
        character: mio
        action: hide
      - type: sprite
        character: kenta
        expression: happy
        position: left
      - type: dialog
        character: kenta
        text: "おれはケンタ。{花壇|かだん}プロジェクトの{提案|ていあん}者で、{投票|とうひょう}用紙の{配布|はいふ}係もやった。{絶対|ぜったい}に{可決|かけつ}させたかった！"
      - type: dialog
        character: kenta
        text: "配った{枚数|まいすう}？ えーと……ちゃんと10{枚|まい}配ったはず、だよ。"
        expression: thinking
      - type: sprite
        character: kenta
        action: hide
      - type: sprite
        character: sora
        expression: determined
        position: right
      - type: dialog
        character: sora
        text: "おれはソラ。ルールや{手続|てつづ}きの{矛盾|むじゅん}が{許|ゆる}せないタイプ。11{票|ひょう}はおかしい。{絶対|ぜったい}に{原因|げんいん}を{突|つ}き止める。"
      - type: sprite
        character: sora
        action: hide

  # ===== 証拠カード1: 児童議会規約 =====
  - id: evidence-1
    bg: gym
    bgm: civics-01/experiment
    steps:
      - type: title_card
        text: 証拠①
        subtitle: 児童議会規約と投票結果
      - type: narration
        text: "さくら小学校 {児童議会|じどうぎかい}{規約|きやく}（{抜粋|ばっすい}）——"
      - type: narration
        text: "「{投票|とうひょう}用紙は{議長|ぎちょう}の{確認|かくにん}のもと、{配布|はいふ}係が{出席者|しゅっせきしゃ}（{議長|ぎちょう}を{除|のぞ}く）に1{枚|まい}ずつ{配布|はいふ}する」"
      - type: narration
        text: "「{投票|とうひょう}は一人1{票|ひょう}とする」"
      - type: narration
        text: "「{議長|ぎちょう}は{採決|さいけつ}に{参加|さんか}しない（{議長|ぎちょう}{不投票|ふとうひょう}の{原則|げんそく}）」"
      - type: se
        sound: common/discover
      - type: narration
        text: "{出席者|しゅっせきしゃ}11人 − {議長|ぎちょう}1人 = {投票|とうひょう}できるのは10人。"
      - type: narration
        text: "{投票|とうひょう}{結果|けっか}：{賛成|さんせい}7 + {反対|はんたい}3 + {白票|はくひょう}1 = 合計11{票|ひょう}。"
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "10人しか{投票|とうひょう}できないのに11{票|ひょう}——{誰|だれ}かが2{枚|まい}入れた！"
      - type: narration
        text: "ちなみに{白票|はくひょう}（何も{書|か}いていない用紙）も{正当|せいとう}な{投票|とうひょう}の1つ。{白票|はくひょう}を引いても7+3=10。でも{白票|はくひょう}を{含|ふく}めると11{枚|まい}。まだ1{枚|まい}多い。"

  # ===== 証拠カード2: 行動記録 =====
  - id: evidence-2
    steps:
      - type: title_card
        text: 証拠②
        subtitle: 投票当日の行動記録
      - type: narration
        text: "{投票|とうひょう}の{手順|てじゅん}——"
      - type: narration
        text: "13:25 ハルキが「これより{投票|とうひょう}を{行|おこな}います」と{宣言|せんげん}"
      - type: narration
        text: "13:25～13:28 ケンタが{投票|とうひょう}用紙を{配布|はいふ}"
      - type: narration
        text: "{投票箱|とうひょうばこ}への投入{順|じゅん}：①ソラ → ②ミオ → ③ケンタ → ④～⑩他の{代表|だいひょう}委員"
      - type: narration
        text: "13:35 ハルキが{集計|しゅうけい}・発表"
      - type: se
        sound: common/discover
      - type: narration
        text: "{配布|はいふ}係はケンタ。2{枚|まい}目の用紙を入手できたのは？"
      - type: narration
        text: "ハルキ → {議長|ぎちょう}で用紙を持っていない → {除外|じょがい}"
      - type: narration
        text: "ミオ → {配布|はいふ}された1{枚|まい}のみ → 2{枚|まい}目の入手方法がない"
      - type: narration
        text: "ソラ → {配布|はいふ}された1{枚|まい}のみ → 2{枚|まい}目の入手方法がない"
      - type: narration
        speed: slow
        text: "ケンタ → {配布|はいふ}係として用紙を手元に1{枚|まい}多く{確保|かくほ}できた{可能性|かのうせい}がある！"

  # ===== 証拠カード3: 投票用紙調査 =====
  - id: evidence-3
    bgm: civics-01/investigation
    steps:
      - type: title_card
        text: 証拠③
        subtitle: 投票用紙の調査
      - type: narration
        text: "11{枚|まい}の{投票|とうひょう}用紙を{並|なら}べて{調査|ちょうさ}した。{賛成|さんせい}{票|ひょう}7{枚|まい}の書き方——"
      - type: narration
        text: 用紙A：「さんせい」（ひらがな・小さい文字）
      - type: narration
        text: "用紙B：「{賛成|さんせい}○」（○印つき）"
      - type: narration
        text: "用紙C：「{賛成|さんせい}○」（○印つき）——用紙Bとよく{似|に}た書き方！"
      - type: narration
        text: "用紙D～G：それぞれ{異|こと}なる書き方"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "用紙Bと用紙C——「{賛成|さんせい}○」というまったく同じ書き方。文字の大きさもほぼ同じ。同じ人が2{枚|まい}{書|か}いた？"

  # ===== 証拠カード4: 目撃証言 =====
  - id: evidence-4
    bgm: civics-01/tension
    steps:
      - type: title_card
        text: 証拠④
        subtitle: 投票箱周辺の目撃証言
      - type: narration
        text: "{代表|だいひょう}委員の{証言|しょうげん}——"
      - type: narration
        text: "「ケンタが{投票箱|とうひょうばこ}に用紙を入れるとき、少し時間がかかっていた。紙をたたむのに手間取ってるのかと思った」"
      - type: narration
        text: "別の委員——「ソラが入れた後、ミオが入れた。ミオは1{枚|まい}をすっと入れてた。その次のケンタは、手を箱に{突|つ}っ{込|こ}んでいたような気がした」"
      - type: sprite
        character: mio
        expression: thinking
        position: left
      - type: dialog
        character: mio
        text: "わたしの後ろがケンタだった。ケンタが{投票箱|とうひょうばこ}に用紙を入れるとき、少し時間がかかってたのは覚えてる。"
      - type: sprite
        character: mio
        action: hide
      - type: narration
        text: "1{枚|まい}を普通に入れるより時間がかかった——2{枚|まい}同時に入れようとしたから？"

  # ===== 投票 =====
  - id: questions
    bg: gym
    bgm: civics-01/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}を整理しよう。{投票|とうひょう}用紙を2{枚|まい}入れたのは{誰|だれ}だと思う？"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        question: 投票用紙を2枚入れたのは誰？
        options:
          - text: ハルキ（議長で用紙を持っていなかった）
            value: haruki
            feedback: ハルキは議長。議長不投票ルールで用紙を持っていないから、2枚入れるのは不可能だよ。
          - text: ミオ（1枚配られて、すっと入れた）
            value: mio
            feedback: ミオは配られた1枚だけ。2枚目を入手する方法がないし、投票箱にも「すっと」入れていた。
          - text: ケンタ（配布係で、投票箱で時間がかかっていた）
            value: kenta
            feedback: 正解！ ケンタは配布係として用紙を手元に1枚多く確保できた。投票箱で時間がかかっていたのも2枚入れたからだ。
          - text: ソラ（1枚配られて、最初に入れた）
            value: sora
            feedback: ソラは配られた1枚だけで、投票順も1番目。2枚目を入手する方法がないよ。
      - type: choice
        id: q2
        question: ケンタが2枚入れたとしたら、その理由は？
        options:
          - text: 花壇プロジェクトを絶対に成功させたかったから
            value: passion
            feedback: その通り！ ケンタは提案者として花壇への熱意が強すぎた。「1票差で否決されたら」という不安が先走った。
          - text: 誰かに頼まれたから
            value: asked
            feedback: 証拠にそのような情報はないよ。ケンタ自身の判断で行動した。
          - text: ルールを知らなかったから
            value: ignorance
            feedback: ケンタは「ルール違反だと分かっていた」。知らなかったのではなく、熱意が勝ってしまった。
          - text: いたずらがしたかったから
            value: prank
            feedback: ケンタに悪意はない。「みんなのため」と思っての行動だった。ただし手続きを破ったことは問題だよ。

  # ===== 証拠カード5: 筆跡再調査 =====
  - id: evidence-5
    bgm: civics-01/tension
    steps:
      - type: title_card
        text: 決定的証拠
        subtitle: 筆跡の再調査
      - type: sprite
        character: sora
        expression: determined
        position: center
      - type: dialog
        character: sora
        text: "{投票|とうひょう}用紙をもっと{詳|くわ}しく{調|しら}べた。用紙Bと用紙Cを{比較|ひかく}する。"
      - type: sprite
        character: sora
        action: hide
      - type: narration
        text: "用紙Bと用紙Cの{詳細|しょうさい}{比較|ひかく}——"
      - type: narration
        text: "「{賛成|さんせい}」の「成」の最後のはらい：2{枚|まい}とも右にはらう{独特|どくとく}な書き方。"
      - type: narration
        text: 「○」の書き始めが両方とも右上から。
      - type: narration
        text: 用紙の折り方も同じ（左から1/3折り）。
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        speed: slow
        text: "同一人物が{書|か}いた{可能性|かのうせい}が{極|きわ}めて高い。"
      - type: narration
        text: "さらに——{配布|はいふ}係のケンタが{配布|はいふ}後に「{予備|よび}の紙がある」と言っていたという{証言|しょうげん}が{複数|ふくすう}ある。"
      - type: narration
        text: "ケンタが{配布|はいふ}時に1{枚|まい}多く手元に{残|のこ}し、{賛成|さんせい}{票|ひょう}として2{枚|まい}投入した。"

  # ===== 真実パート =====
  - id: truth-intro
    bg: gym
    bgm: civics-01/truth
    steps:
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        text: 真実
        subtitle: 良い目的でも、手続きは守る
      - type: effect
        name: fade-in
        duration: 600

  # ハルキの秘密
  - id: truth-haruki
    bg: gym
    steps:
      - type: sprite
        character: haruki
        expression: worried
        position: left
      - type: dialog
        character: haruki
        text: "ぼくも{反省|はんせい}しなきゃいけない。{議長|ぎちょう}として、{投票|とうひょう}前に{配布|はいふ}{枚数|まいすう}を{確認|かくにん}する{義務|ぎむ}があった。"
      - type: dialog
        character: haruki
        text: "ケンタが「{予備|よび}を持っておく」って言ってたのも聞いてた。でも{見逃|みのが}した。"
        expression: determined
      - type: sprite
        character: haruki
        action: hide

  # ミオの秘密
  - id: truth-mio
    steps:
      - type: sprite
        character: mio
        expression: worried
        position: right
      - type: dialog
        character: mio
        text: "実は、わたし……{投票|とうひょう}用紙に何も{書|か}かなかったの。{白票|はくひょう}を入れた。"
      - type: dialog
        character: mio
        text: "{花壇|かだん}にも{休憩|きゅうけい}スペースにも決めきれなくて。{白票|はくひょう}は{正当|せいとう}な{投票|とうひょう}だから、ルール{違反|いはん}じゃないよ。"
        expression: thinking
      - type: dialog
        character: mio
        text: "でも、ケンタが「用紙が1{枚|まい}多く手元にある」ってつぶやいてたのを聞いてたのに、気にしなかった。"
        expression: determined
      - type: sprite
        character: mio
        action: hide

  # ソラの秘密
  - id: truth-sora
    steps:
      - type: sprite
        character: sora
        expression: worried
        position: left
      - type: dialog
        character: sora
        text: "おれも言わなきゃいけないことがある。{配布|はいふ}係の人数{確認|かくにん}を{任|まか}されてたのに、忘れてた。"
      - type: dialog
        character: sora
        text: "ケンタが{投票箱|とうひょうばこ}に入れるとき「2{枚|まい}{一緒|いっしょ}に入った気がした」{感覚|かんかく}もあった。でも{確認|かくにん}しなかった。"
        expression: worried
      - type: dialog
        character: sora
        text: "気づいたのに行動しなかった。ルールを守れと言うなら、まず自分の{役割|やくわり}を{果|は}たすべきだった。"
        expression: determined
      - type: sprite
        character: sora
        action: hide

  # ケンタの真実（クライマックス）
  - id: truth-kenta
    bgm: civics-01/truth
    steps:
      - type: sprite
        character: kenta
        expression: worried
        position: center
      - type: dialog
        character: kenta
        text: "……おれがやりました。{投票|とうひょう}用紙を2{枚|まい}入れたのは、おれです。"
      - type: narration
        speed: slow
        text: ケンタがゆっくりと話し始めた。
      - type: dialog
        character: kenta
        text: "{花壇|かだん}プロジェクトを{絶対|ぜったい}に{成功|せいこう}させたかった。みんなのためだと思ってた。"
        expression: worried
      - type: dialog
        character: kenta
        text: "{投票|とうひょう}用紙を配るとき、「もし用紙が足りなかったら」って言い{訳|わけ}して1{枚|まい}多く手元に{残|のこ}した。"
      - type: dialog
        character: kenta
        text: "そして{投票|とうひょう}のとき、「1{票|ひょう}差で{否決|ひけつ}されたら{悔|くや}しすぎる」って思いが止められなくて……{予備|よび}の用紙に「{賛成|さんせい}」って{書|か}いて、自分の{票|ひょう}と{一緒|いっしょ}に2{枚|まい}入れちゃった。"
        expression: worried
      - type: dialog
