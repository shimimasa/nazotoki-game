meta:
  id: esd-09
  title: 森のデータが語ること
  series: ESD探偵団
  volume: 9
  estimatedMinutes: 20

characters:
  haruki:
    name: ハルキ
    color: "#4A90D9"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  ibuki:
    name: イブキ
    color: "#E91E63"
    sprites:
      normal: girl-a-normal.webp
      happy: girl-a-happy.webp
      thinking: girl-a-thinking.webp
      worried: girl-a-worried.webp
      surprised: girl-a-surprised.webp
      determined: girl-a-determined.webp
  souta:
    name: ソウタ
    color: "#FF8C00"
    sprites:
      normal: boy-d-normal.webp
      happy: boy-d-happy.webp
      thinking: boy-d-thinking.webp
      worried: boy-d-worried.webp
      surprised: boy-d-surprised.webp
      determined: boy-d-determined.webp
  kana:
    name: カナ
    color: "#9C27B0"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  sensei:
    name: 先生
    color: "#4169E1"
    sprites:
      normal: teacher-m-normal.webp
      happy: teacher-m-happy.webp
      thinking: teacher-m-thinking.webp

scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: esd-09/opening
    steps:
      - type: narration
        text: "あおば小学校の『{裏山|うらやま}{保全|ほぜん}プロジェクト』。{毎年|まいとし}{記録|きろく}している{森|もり}の{生物|せいぶつ}{調査|ちょうさ}データが、{今年|ことし}は{大|おお}きく{変|か}わった。"
      - type: sprite
        character: haruki
        expression: worried
        position: center
      - type: dialog
        character: haruki
        text: "カブトムシが{激減|げきげん}した。{去年|きょねん}11{匹|ぴき}いたC{区画|くかく}が{今年|ことし}はたった1{匹|ぴき}。クワガタは{全滅|ぜんめつ}。{他|ほか}の{区画|くかく}は{増|ふ}えてるのに。"
      - type: sprite
        character: haruki
        action: hide
      - type: bgm
        action: stop
      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "5{区画|くかく}のデータを{並|なら}べてパターンを{探|さが}そう。{帰納法|きのうほう}で{原因|げんいん}を{突|つ}き{止|と}める。ESD{探偵団|たんていだん}、{出動|しゅつどう}！"
      - type: sprite
        character: sensei
        action: hide
      - type: effect
        name: fade-out

  # ===== 探索パート =====
  - id: investigation
    bg: classroom
    bgm: esd-09/investigation
    steps:
      - type: title_card
        title: 探索パート
        subtitle: 5区画のデータでパターンを探せ

      # --- データ比較 ---
      - type: narration
        text: "5{区画|くかく}のカブトムシ{調査|ちょうさ}。A{区画|くかく}（{間伐|かんばつ}{実施|じっし}）：9→12{匹|ぴき}（+3）。B{区画|くかく}（{間伐|かんばつ}{実施|じっし}）：7→9{匹|ぴき}（+2）。"
      - type: narration
        text: "C{区画|くかく}（{間伐|かんばつ}{実施|じっし}{済|ず}み{記録|きろく}）：11→1{匹|ぴき}（-10！）。D{区画|くかく}（{対象外|たいしょうがい}）：6→7{匹|ぴき}（+1）。E{区画|くかく}（{対象外|たいしょうがい}）：8→8{匹|ぴき}（±0）。"
      - type: sprite
        character: haruki
        expression: thinking
        position: center
      - type: dialog
        character: haruki
        text: "{帰納法|きのうほう}で{整理|せいり}。{間伐|かんばつ}{実施|じっし}のA・Bは{増加|ぞうか}。{対象外|たいしょうがい}のD・Eは{維持|いじ}。パターンは明確。でもC{区画|くかく}だけが『{間伐|かんばつ}{記録|きろく}あり』なのに{激減|げきげん}。パターンから{外|はず}れている。"
      - type: sprite
        character: haruki
        action: hide

      # --- 間伐の仕組み ---
      - type: narration
        text: "{間伐|かんばつ}の{仕組|しく}み。{間伐|かんばつ}あり→{光|ひかり}が入る→{下草|したくさ}が{育|そだ}つ→{腐葉土|ふようど}が{増|ふ}える→{幼虫|ようちゅう}が{増|ふ}える→{成虫|せいちゅう}{増加|ぞうか}。{間伐|かんばつ}なし→{光|ひかり}が入らない→{下草|したくさ}が{枯|か}れる→{腐葉土|ふようど}がなくなる→{幼虫|ようちゅう}が{育|そだ}てない。"

      # --- C区画の異常データ ---
      - type: sprite
        character: ibuki
        expression: surprised
        position: center
      - type: dialog
        character: ibuki
        text: "C{区画|くかく}の{植生|しょくせい}データが{異常|いじょう}。{下草|したくさ}{被覆率|ひふくりつ}たった2%（{他|ほか}は40〜65%）。{腐葉土|ふようど}の{深|ふか}さ1cm（{他|ほか}は5〜7cm）。{光量|こうりょう}ほぼゼロ（{他|ほか}は{普通|ふつう}〜{多|おお}い）。"
      - type: dialog
        character: ibuki
        text: "{間伐|かんばつ}が{実施|じっし}されていれば、こうはならないはず！"
        expression: determined
      - type: sprite
        character: ibuki
        action: hide

      # --- 写真比較 ---
      - type: sprite
        character: kana
        expression: thinking
        position: center
      - type: dialog
        character: kana
        text: "C{区画|くかく}{中央|ちゅうおう}の{写真|しゃしん}{比較|ひかく}。{去年|きょねん}6月（{間伐|かんばつ}後）：{地面|じめん}まで{光|ひかり}が{差|さ}し{込|こ}み、{緑|みどり}の{草|くさ}が見える。{今年|ことし}6月（{間伐|かんばつ}『後』）：{地面|じめん}が{暗|くら}い。{草|くさ}がない。{去年|きょねん}の{間伐|かんばつ}前より{暗|くら}い。"
      - type: dialog
        character: kana
        text: "{間伐|かんばつ}したはずなのに{去年|きょねん}より{暗|くら}い——{矛盾|むじゅん}してる。"
        expression: surprised
      - type: sprite
        character: kana
        action: hide
      - type: effect
        name: fade-out

  # ===== 反転パート =====
  - id: turning-point
    bg: classroom
    bgm: esd-09/tension
    steps:
      - type: title_card
        title: 反転パート
        subtitle: 木を切らない方が自然に優しい？

      - type: se
        sound: common/discover
      - type: effect
        name: shake
        duration: 400
      - type: sprite
        character: souta
        expression: worried
        position: center
      - type: dialog
        character: souta
        text: "{正直|しょうじき}に{言|い}う。C{区画|くかく}に{太|ふと}い{木|き}があって、{切|き}るのがかわいそうで……{間伐|かんばつ}をしなかった。"
      - type: dialog
        character: souta
        text: "でも{記録|きろく}には『{実施|じっし}{済|ず}み』と書いた。{木|き}を{守|まも}った方が{自然|しぜん}に{優|やさ}しいと{思|おも}ってた。でも{違|ちが}った。"
        expression: determined
      - type: sprite
        character: souta
        action: hide
      - type: narration
        text: "{前提|ぜんてい}{破壊|はかい}——『{木|き}を{切|き}らない ＝ {自然|しぜん}に{優|やさ}しい』は{誤解|ごかい}。{間伐|かんばつ}で{光|ひかり}が入り、{生態系|せいたいけい}{全体|ぜんたい}が{豊|ゆた}かになる。{木|き}を{守|まも}ることで{逆|ぎゃく}に{多|おお}くの{生|い}き物を{失|うしな}った。"
      - type: effect
        name: fade-out

  # ===== 推理パート =====
  - id: deduction
    bg: classroom
    bgm: esd-09/investigation
    steps:
      - type: title_card
        title: 推理パート
        subtitle: 間伐をしなかったのは

      - type: sprite
        character: haruki
        expression: thinking
        position: left
      - type: sprite
        character: kana
        expression: thinking
        position: right
      - type: dialog
        character: haruki
        text: "{帰納法|きのうほう}の{完成|かんせい}。A・B（{間伐|かんばつ}{実施|じっし}）＝{増加|ぞうか}。D・E（{対象外|たいしょうがい}）＝{維持|いじ}。C（{記録|きろく}あり・{激減|げきげん}）＝パターン{外|はず}れ。{物理的|ぶつりてき}{証拠|しょうこ}（{写真|しゃしん}・{植生|しょくせい}データ）が{間伐|かんばつ}{未実施|みじっし}を{証明|しょうめい}。"
      - type: dialog
        character: kana
        text: "C{区画|くかく}の{間伐|かんばつ}{担当|たんとう}はソウタ。ソウタ{本人|ほんにん}が{認|みと}めた。"
      - type: sprite
        character: haruki
        action: hide
      - type: sprite
        character: kana
        action: hide

      # --- 犯人投票 ---
      - type: narration
        text: "C{区画|くかく}の{間伐|かんばつ}を{実施|じっし}せず、{記録|きろく}に{虚偽|きょぎ}{記入|きにゅう}したのは{誰|だれ}？"
      - type: choice
        id: q1
        question: "間伐をしなかったのは？"
        options:
          - text: ハルキ
            value: haruki
            correct: false
            feedback: "ハルキは{生物|せいぶつ}{調査|ちょうさ}{係|がかり}。C{区画|くかく}の{異常|いじょう}パターンを{最初|さいしょ}に{発見|はっけん}した{側|がわ}。"
          - text: イブキ
            value: ibuki
            correct: false
            feedback: "イブキは{植生|しょくせい}{調査|ちょうさ}{係|がかり}。C{区画|くかく}の{下草|したくさ}・{腐葉土|ふようど}の{異常|いじょう}データを{確認|かくにん}した{側|がわ}。"
          - text: ソウタ
            value: souta
            correct: true
            feedback: "正解。ソウタは『{木|き}がかわいそう』で{間伐|かんばつ}をしなかった。しかし{間伐|かんばつ}なしで{光|ひかり}が入らず、{下草|したくさ}→{腐葉土|ふようど}→{幼虫|ようちゅう}が{消|き}えた。{感情的|かんじょうてき}{判断|はんだん}が{科学的|かがくてき}{行動|こうどう}を{妨|さまた}げた。"
          - text: カナ
            value: kana
            correct: false
            feedback: "カナは{写真|しゃしん}{記録|きろく}・{区画|くかく}マップ{担当|たんとう}。{去年|きょねん}と{今年|ことし}の{写真|しゃしん}{比較|ひかく}で{矛盾|むじゅん}を{確認|かくにん}した{側|がわ}。"
      - type: effect
        name: fade-out

  # ===== 真相パート =====
  - id: truth
    bg: classroom
    bgm: esd-09/truth
    steps:
      - type: title_card
        title: 真相パート
        subtitle: かわいそうと正しいは違う

      - type: sprite
        character: souta
        expression: worried
        position: center
      - type: dialog
        character: souta
        text: "{木|き}を{守|まも}ることが{生|い}き物を{守|まも}ることだと{思|おも}ってた。でも{間伐|かんばつ}しないことで{光|ひかり}が入らなくなって、{草|くさ}も{虫|むし}も{減|へ}った。"
      - type: dialog
        character: souta
        text: "『かわいそう』って{気持|きも}ちは{大切|たいせつ}。でも{正|ただ}しい{知識|ちしき}がないと、{正反対|せいはんたい}の{結果|けっか}になる。{間伐|かんばつ}することが{生|い}き物を{助|たす}けることだった。"
        expression: determined
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: ibuki
        expression: normal
        position: center
      - type: dialog
        character: ibuki
        text: "{感情|かんじょう}は{大切|たいせつ}な{出発点|しゅっぱつてん}。でも{正|ただ}しい{情報|じょうほう}と{組|く}み{合|あ}わせないと、{間違|まちが}った{行動|こうどう}になる。『かわいそう』＋『{間伐|かんばつ}の{知識|ちしき}』＝ 『{間伐|かんばつ}することが{生|い}き物を{助|たす}ける』。"
      - type: sprite
        character: ibuki
        action: hide
      - type: effect
        name: fade-out

  # ===== エピローグ =====
  - id: epilogue
    bg: classroom
    bgm: esd-09/resolution
    steps:
      - type: effect
        name: fade-in
        duration: 800
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{間伐|かんばつ}は{自然|しぜん}{破壊|はかい}ではなく{生態系|せいたいけい}のバランスを{守|まも}る{管理|かんり}{行為|こうい}。『{木|き}が{多|おお}い方が{良|よ}い』も{誤解|ごかい}。『{適切|てきせつ}な{密度|みつど}』が{最|もっと}も{生物|せいぶつ}{多様性|たようせい}を{高|たか}める。"
      - type: dialog
        character: sensei
        text: "そして{帰納法|きのうほう}。{複数|ふくすう}のデータからパターンを見つけ、{例外|れいがい}の1つが{全体|ぜんたい}を{崩|くず}す{手|て}がかりになる。"
        expression: happy
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: souta
        expression: determined
        position: center
      - type: dialog
        character: souta
        text: "C{区画|くかく}の{間伐|かんばつ}をやり{直|なお}す。{来年|らいねん}までに{光|ひかり}を入れて、{下草|したくさ}と{腐葉土|ふようど}を{復活|ふっかつ}させる。カブトムシが{戻|もど}ってくる{森|もり}にする。"
      - type: sprite
        character: souta
        action: hide
      - type: sprite_group
        characters:
          - { id: haruki, expression: happy }
          - { id: ibuki, expression: happy }
          - { id: souta, expression: determined }
          - { id: kana, expression: happy }
      - type: narration
        text: "{森|もり}は{放|ほう}っておけば{豊|ゆた}かになるわけではない。{人|ひと}の{手|て}が入ることで、{生態系|せいたいけい}のバランスが{保|たも}たれる。"
      - type: narration
        speed: slow
        text: "{帰納法|きのうほう}——{複数|ふくすう}のデータからパターンを見つけ、たった1つの{例外|れいがい}が{真実|しんじつ}を{語|かた}る。データは{感情|かんじょう}よりも{正直|しょうじき}だ。"
      - type: sprite
        character: haruki
        action: hide
      - type: sprite
        character: ibuki
        action: hide
      - type: sprite
        character: souta
        action: hide
      - type: sprite
        character: kana
        action: hide
      - type: narration
        text: "ESD{探偵団|たんていだん}——{森|もり}のデータ{事件|じけん}、{解決|かいけつ}！"
      - type: effect
        name: fade-out
        duration: 1500
