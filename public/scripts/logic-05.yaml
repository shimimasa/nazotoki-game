scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: title_card
        text: "論理ミステリー Vol.5"
        subtitle: "正しいから正しい"
      - type: sprite_group
        characters:
          - id: ron
            expression: normal
          - id: rika
            expression: normal
          - id: koto
            expression: normal
          - id: kana
            expression: normal
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "これから証拠を集めて、何が起きたのかを確かめましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: suspects
    bg: classroom
    bgm: exploration
    steps:
      - type: sprite
        character: ron
        expression: normal
        position: left
      - type: dialog
        character: ron
        text: "自分の中では「好きだからおすすめ」が強くある"
      - type: dialog
        character: ron
        text: "自分の中では「好きだからおすすめ」が強くある"
        expression: thinking
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        expression: normal
        position: right
      - type: dialog
        character: rika
        text: "ロンのカードには「名作だから読むべき」とほぼ同じ意味の文が重なっていた"
      - type: dialog
        character: rika
        text: "ロンのカードには「名作だから読むべき」とほぼ同じ意味の文が重なっていた"
        expression: thinking
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        expression: normal
        position: left
      - type: dialog
        character: koto
        text: "「読むべき本」と「名作」は、ロンの中ではほぼ同じ意味で使われている"
      - type: dialog
        character: koto
        text: "「読むべき本」と「名作」は、ロンの中ではほぼ同じ意味で使われている"
        expression: thinking
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        expression: normal
        position: right
      - type: dialog
        character: kana
        text: "ロンの説明は、好きな人には通じても、知らない人には伝わりにくい"
      - type: dialog
        character: kana
        text: "ロンの説明は、好きな人には通じても、知らない人には伝わりにくい"
        expression: thinking
      - type: sprite
        character: kana
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ここまでの証拠をもとに、今回の原因を作った人物を選びましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - id: ron
            expression: thinking
          - id: rika
            expression: thinking
          - id: koto
            expression: thinking
          - id: kana
            expression: thinking
      - type: choice
        id: culprit
        question: "今回の原因を作ったのはだれ?"
        options:
          - text: "ロン"
            value: ron
            correct: true
            feedback: "ロンの行動が、証拠といちばん一致している。"
          - text: "リカ"
            value: rika
            correct: false
            feedback: "リカは手がかりを持っているが、決め手は足りない。"
          - text: "コト"
            value: koto
            correct: false
            feedback: "コトは手がかりを持っているが、決め手は足りない。"
          - text: "カナ"
            value: kana
            correct: false
            feedback: "カナは手がかりを持っているが、決め手は足りない。"
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: title_card
        text: "真相"
        subtitle: "ロン"
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        expression: worried
        position: center
      - type: dialog
        character: ron
        text: "わたしの行動が原因だった。"
      - type: sprite
        character: ron
        action: hide
  - id: epilogue
    bg: classroom
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "最後に、この事件から学べることを整理しましょう。"
      - type: narration
        text: "「正しいのは正しいから」のような説明は、理由になっていない"
      - type: narration
        text: "理由には、結論と別の新しい情報が必要である"
      - type: narration
        text: "強い言葉や有名そうな言い方だけでは、論理は強くならない"
      - type: sprite_group
        characters:
          - id: ron
            expression: happy
          - id: rika
            expression: happy
          - id: koto
            expression: happy
          - id: kana
            expression: happy
      - type: narration
        text: "論理ミステリーの学びを、次の事件でも使ってみよう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: ron
        action: hide
      - type: sprite
        character: rika
        action: hide
      - type: sprite
        character: koto
        action: hide
      - type: sprite
        character: kana
        action: hide

      - type: effect
        name: fade-out
        duration: 1500
