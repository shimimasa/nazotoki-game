scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: classroom
    bgm: money-09/opening
    steps:
      - type: narration
        text: "あおば小学校4年1{組|くみ}の「ポイントカード{研究|けんきゅう}」の{授業|じゅぎょう}。4{人|にん}がそれぞれ{架空|かくう}のお{店|みせ}のポイントカードを{調|しら}べて「{一番|いちばん}お{得|とく}なお{店|みせ}」を{発表|はっぴょう}する。"
      - type: sprite
        character: kaito
        expression: happy
        position: left
      - type: dialog
        character: kaito
        text: "あおばマートは100{円|えん}で5ポイント！ {還元率|かんげんりつ}5%で3つのお{店|みせ}の{中|なか}で{一番|いちばん}！ お{得|とく}だぜ！"
      - type: sprite
        character: kaito
        action: hide
      - type: bgm
        action: stop
      - type: sprite
        character: nanoha
        expression: thinking
        position: right
      - type: dialog
        character: nanoha
        text: "ちょっと{待|ま}って。あおばマートの{牛乳|ぎゅうにゅう}は180{円|えん}だけど、スーパーマルシェでは150{円|えん}だよ。30{円|えん}も{高|たか}い。5%のポイント（9{円|えん}{分|ぶん}）をもらっても、まだ21{円|えん}{損|そん}してない？"
      - type: sprite
        character: nanoha
        action: hide
      - type: bgm
        file: money-09/tension
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "ナノハさんの{指摘|してき}は{大事|だいじ}です。ポイント{還元率|かんげんりつ}が{高|たか}ければ{本当|ほんとう}にお{得|とく}でしょうか。3つのお{店|みせ}を{帰納法|きのうほう}で{比較|ひかく}しましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - character: yuta
            expression: thinking
          - character: sakura
            expression: surprised
          - character: kaito
            expression: worried
          - character: nanoha
            expression: determined
      - type: narration
        text: "3つのお{店|みせ}のポイント{還元率|かんげんりつ}と{商品|しょうひん}{価格|かかく}を{帰納法|きのうほう}で{比較|ひかく}し、「{本当|ほんとう}にお{得|とく}なお{店|みせ}」を{見|み}つける{調査|ちょうさ}が{始|はじ}まった。"
      - type: sprite
        character: yuta
        action: hide
      - type: sprite
        character: sakura
        action: hide
      - type: sprite
        character: kaito
        action: hide
      - type: sprite
        character: nanoha
        action: hide
      - type: effect
        name: fade-out
      - type: title_card
        text: "お金の探偵団 Vol.9"
        subtitle: "ポイントの正体"

  # ===== 証拠カード1: 4人の報告 =====
  - id: evidence-1
    bg: classroom
    bgm: money-09/investigation
    steps:
      - type: title_card
        text: "ステップ1：調査"
      - type: narration
        text: "4{人|にん}のポイントカード{研究|けんきゅう}の{発表|はっぴょう}を{確認|かくにん}しよう。"
      - type: narration
        text: "ユウタ——スーパーマルシェ、{還元率|かんげんりつ}2%。「{還元率|かんげんりつ}は{低|ひく}いけど{商品|しょうひん}が{安|やす}い」"
      - type: narration
        text: "サクラ——コンビニあおば、{還元率|かんげんりつ}1%。「{便利|べんり}だけどポイントは{少|すく}ない」"
      - type: narration
        text: "カイト——あおばマート、{還元率|かんげんりつ}5%。「{還元率|かんげんりつ}ダントツ！ {一番|いちばん}お{得|とく}！」"
      - type: narration
        text: "ナノハ——3{店舗|てんぽ}{比較|ひかく}。「{還元率|かんげんりつ}だけでは『お{得|とく}』とは{言|い}えない」"
      - type: se
        file: common/discover
      - type: narration
        text: "ナノハの{反論|はんろん}——「あおばマートの{牛乳|ぎゅうにゅう}は180{円|えん}。スーパーでは150{円|えん}。30{円|えん}{高|たか}い。5%のポイント（9{円|えん}）をもらっても、まだ21{円|えん}{損|そん}してる」"

  # ===== 証拠カード2: 3店舗の価格比較 =====
  - id: evidence-2
    bg: classroom
    bgm: money-09/investigation
    steps:
      - type: narration
        text: "{同|おな}じ{商品|しょうひん}を3つのお{店|みせ}で{比較|ひかく}しよう。{帰納法|きのうほう}でパターンを見つけるのだ。"
      - type: narration
        text: "{牛乳|ぎゅうにゅう}——あおばマート180{円|えん}、スーパー150{円|えん}、コンビニ170{円|えん}。{一番|いちばん}{高|たか}い：あおばマート。"
      - type: narration
        text: "パン——あおばマート200{円|えん}、スーパー160{円|えん}、コンビニ180{円|えん}。{一番|いちばん}{高|たか}い：あおばマート。"
      - type: narration
        text: "ジュース——あおばマート150{円|えん}、スーパー120{円|えん}、コンビニ140{円|えん}。{一番|いちばん}{高|たか}い：あおばマート。"
      - type: se
        file: common/discover
      - type: narration
        text: "{帰納法|きのうほう}で見つけた{法則|ほうそく}——3{商品|しょうひん}ともあおばマート（{還元率|かんげんりつ}5%）が{一番|いちばん}{高|たか}い。スーパー（{還元率|かんげんりつ}2%）が{一番|いちばん}{安|やす}い。「{還元率|かんげんりつ}が{高|たか}いお{店|みせ}は{値段|ねだん}も{高|たか}い」。"

  # ===== 証拠カード3: トータルコスト計算 =====
  - id: evidence-3
    bg: classroom
    bgm: money-09/experiment
    steps:
      - type: sprite
        character: yuta
        expression: determined
        position: left
      - type: dialog
        character: yuta
        text: "トータルコストを{計算|けいさん}した。{商品|しょうひん}{代|だい}からポイント{還元|かんげん}{分|ぶん}を{引|ひ}いた「{本当|ほんとう}に{払|はら}った{金額|きんがく}」。"
      - type: dialog
        character: yuta
        text: "{牛乳|ぎゅうにゅう}——あおばマート：180−9＝171{円|えん}。スーパー：150−3＝147{円|えん}。コンビニ：170−2≒168{円|えん}。"
      - type: sprite
        character: yuta
        expression: thinking
      - type: dialog
        character: yuta
        text: "ポイント{込|こ}みでもあおばマートが{一番|いちばん}{高|たか}い。3{商品|しょうひん}{合計|ごうけい}のトータル——あおばマート約504{円|えん}、スーパー約421{円|えん}。83{円|えん}の{差|さ}。5%のポイントでは{埋|う}められない。"
      - type: sprite
        character: yuta
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "{還元率|かんげんりつ}{一番|いちばん}のあおばマート（5%）が、トータルコストでは{一番|いちばん}{高|たか}い。{一番|いちばん}{安|やす}いのはスーパー（2%）。ポイントの「お{得|とく}{感|かん}」は{数字|すうじ}のトリックだった。"

  # ===== 証拠カード4: カイトの調査過程 =====
  - id: evidence-4
    bg: classroom
    bgm: money-09/experiment
    steps:
      - type: narration
        text: "カイトの{調査|ちょうさ}に{問題|もんだい}がなかったか{確認|かくにん}しよう。"
      - type: narration
        text: "あおばマートの{還元率|かんげんりつ}を{調|しら}べたか——✅。{商品|しょうひん}{価格|かかく}を{調|しら}べたか——❌。{他|ほか}のお{店|みせ}の{還元率|かんげんりつ}を{調|しら}べたか——❌。{他|ほか}のお{店|みせ}の{商品|しょうひん}{価格|かかく}を{調|しら}べたか——❌。"
      - type: sprite
        character: nanoha
        expression: thinking
        position: right
      - type: dialog
        character: nanoha
        text: "{火曜|かよう}にカイトがあおばマートで{買|か}い{物|もの}してたのを見たの。でもお{母|かあ}さんのポイントカードを{出|だ}してた。「お{母|かあ}さんのカードにポイント{貯|た}めてるんだ」って。"
      - type: sprite
        character: nanoha
        expression: determined
      - type: dialog
        character: nanoha
        text: "{自分|じぶん}のお{小遣|こづか}いじゃなくて、お{母|かあ}さんの{買|か}い{物|もの}のポイントを{報告|ほうこく}したの？ {調査|ちょうさ}として{成立|せいりつ}してる？"
      - type: sprite
        character: nanoha
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "カイトは{還元率|かんげんりつ}5%だけ見て「{一番|いちばん}！」と{報告|ほうこく}。{他|ほか}のお{店|みせ}を{調|しら}べず、しかもお{母|かあ}さんのカードを{勝手|かって}に{使用|しよう}。"

  # ===== 証拠カード5: ポイントの正体 =====
  - id: card-5
    bg: classroom
    bgm: money-09/tension
    steps:
      - type: effect
        name: fade-out
      - type: effect
        name: fade-in
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "ポイントカードの{仕組|しく}みを{教|おし}えましょう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "お{店|みせ}は{商品|しょうひん}を{高|たか}く{売|う}る{代|か}わりに、ポイントで「お{得|とく}{感|かん}」を{演出|えんしゅつ}しています。ポイントは「お{客|きゃく}さんに{来|き}てもらうための{広告費|こうこくひ}」なのです。"
      - type: dialog
        character: sensei
        text: "あおばマートの{牛乳|ぎゅうにゅう}180{円|えん}は、5%のポイント（9{円|えん}）を{出|だ}しても171{円|えん}の{利益|りえき}がある。スーパーは150{円|えん}で2%のポイント（3{円|えん}）を{出|だ}して147{円|えん}。{値段|ねだん}が{高|たか}いからポイントを{出|だ}す{余裕|よゆう}がある——それだけのことです。"
      - type: sprite
        character: sensei
        action: hide
      - type: se
        file: common/discover
      - type: narration
        text: "{前提|ぜんてい}{破壊|はかい}——「ポイント5%＝{一番|いちばん}お{得|とく}」→「{値段|ねだん}が{高|たか}いからポイントが{多|おお}いだけ。トータルで{損|そん}」。ポイントは「お{得|とく}」ではなく「お{店|みせ}の{広告費|こうこくひ}」。"
      - type: narration
        text: "{帰納法|きのうほう}のまとめ——{法則|ほうそく}：「{還元率|かんげんりつ}が{高|たか}いお{店|みせ}は{値段|ねだん}が{高|たか}い」。{結論|けつろん}：「ポイント{込|こ}みのトータルコストで{比較|ひかく}しないと『お{得|とく}』は{分|わ}からない」。"

  # ===== 投票 =====
  - id: questions
    bg: classroom
    bgm: money-09/tension
    steps:
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "{証拠|しょうこ}が{出|で}そろいました。{考|かんが}えてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: choice
        id: q1
        text: "偏った報告をしたのは誰？"
        options:
          - text: "カイト（還元率だけ見て他の店を調べなかった）"
            value: kaito
            feedback: "{還元率|かんげんりつ}5%だけ見て「{一番|いちばん}！」と{報告|ほうこく}。{商品|しょうひん}{価格|かかく}も{他|ほか}のお{店|みせ}も{調|しら}べていない。しかもお{母|かあ}さんのカードを{勝手|かって}に{使用|しよう}。{調査|ちょうさ}として{不完全|ふかんぜん}。"
          - text: "ユウタ（トータルコストを計算して有利な結果を出した？）"
            value: yuta
            feedback: "ユウタの{計算|けいさん}は{正確|せいかく}。3{店舗|てんぽ}の{値段|ねだん}を{調|しら}べてトータルコストを{算出|さんしゅつ}——{偏|かたよ}りのない{分析|ぶんせき}。"
          - text: "サクラ（ポイント好きだから偏ったのでは）"
            value: sakura
            feedback: "サクラはコンビニの{還元率|かんげんりつ}1%を{正直|しょうじき}に{報告|ほうこく}。「ポイント{好|す}き」は{性格|せいかく}であって{偏|かたよ}りではない。"
          - text: "ナノハ（最初から結論を決めて反論した？）"
            value: nanoha
            feedback: "ナノハは3{店舗|てんぽ}のデータを{全部|ぜんぶ}{調|しら}べて{帰納法|きのうほう}で{法則|ほうそく}を{導|みちび}いた。{結論|けつろん}ありきではなくデータから{導出|どうしゅつ}。"
      - type: choice
        id: q2
        text: "帰納法で見つけた法則は？"
        options:
          - text: "還元率が高いお店ほど商品が安い"
            value: higher_cheaper
            feedback: "{逆|ぎゃく}。{還元率|かんげんりつ}が{高|たか}いお{店|みせ}ほど{商品|しょうひん}が{高|たか}い。3{商品|しょうひん}ともあおばマート（5%）が{一番|いちばん}{高|たか}かった。"
          - text: "還元率が高いお店ほど商品が高い"
            value: higher_pricier
            feedback: "{正解|せいかい}。3{商品|しょうひん}を{比較|ひかく}して{全|すべ}て{同|おな}じパターン——{還元率|かんげんりつ}5%のマートが{最|もっと}も{高|たか}く、2%のスーパーが{最|もっと}も{安|やす}い。{帰納法|きのうほう}で{法則|ほうそく}を{発見|はっけん}。"
          - text: "ポイントが多いお店が一番お得"
            value: more_points_better
            feedback: "トータルコストで{計算|けいさん}すると、ポイント{込|こ}みでもあおばマートが{一番|いちばん}{高|たか}い。「ポイントが{多|おお}い＝お{得|とく}」は{思|おも}い{込|こ}み。"
          - text: "コンビニが一番バランスが良い"
            value: convenience_balanced
            feedback: "コンビニは{値段|ねだん}もポイントも{中間|ちゅうかん}。「バランスが{良|い}い」とも{言|い}えるけど、トータルコストではスーパーが{一番|いちばん}{安|やす}い。"
      - type: choice
        id: q3
        text: "ポイントに騙されないために大事なことは？"
        options:
          - text: "商品の値段を複数のお店で比較する"
            value: compare_prices
            feedback: "ポイントの{前|まえ}にまず{値段|ねだん}。{同|おな}じ{商品|しょうひん}を3{店舗|てんぽ}で{比|くら}べれば、「{高|たか}い{値段|ねだん}＋{高|たか}いポイント」の{罠|わな}が見える。"
          - text: "トータルコスト（値段−ポイント）で判断する"
            value: total_cost
            feedback: "{値段|ねだん}からポイント{還元|かんげん}{分|ぶん}を{引|ひ}いた「{本当|ほんとう}のコスト」で{比較|ひかく}。これが{最|もっと}も{正確|せいかく}な{判断|はんだん}{方法|ほうほう}。"
          - text: "ポイントはお店の広告費だと知っておく"
            value: ad_cost_aware
            feedback: "ポイントは「お{得|とく}」ではなく「お{客|きゃく}さんを{呼|よ}ぶための{広告費|こうこくひ}」。この{仕組|しく}みを{知|し}っていれば、ポイントの{数字|すうじ}に{惑|まど}わされない。"
          - text: "全部やる（値段比較＋トータルコスト＋仕組み理解）"
            value: all_three
            feedback: "{完璧|かんぺき}。{値段|ねだん}を{比|くら}べ、トータルコストで{計算|けいさん}し、ポイントの{仕組|しく}みを{理解|りかい}する。{帰納法|きのうほう}で{法則|ほうそく}を見つけるのが{賢|かしこ}い{消費者|しょうひしゃ}。"

  # ===== 真実: ユウタ =====
  - id: truth-yuta
    bg: classroom
    bgm: money-09/truth
    steps:
      - type: effect
        name: fade-out
      - type: title_card
        text: "真実"
      - type: effect
        name: fade-in
      - type: sprite
        character: yuta
        expression: normal
        position: left
      - type: dialog
        character: yuta
        text: "3{商品|しょうひん}×3{店舗|てんぽ}のトータルコストを{計算|けいさん}した。あおばマートが{一番|いちばん}{高|たか}くてスーパーが{一番|いちばん}{安|やす}い。83{円|えん}の{差|さ}。5%のポイントでは{埋|う}められない。"
      - type: sprite
        character: yuta
        expression: determined
      - type: dialog
        character: yuta
        text: "{数字|すうじ}は{嘘|うそ}をつかない。「{還元率|かんげんりつ}が{高|たか}い＝お{得|とく}」は{思|おも}い{込|こ}み。トータルコストで{比|くら}べるのが{正|ただ}しい。"
      - type: sprite
        character: yuta
        action: hide

  # ===== 真実: サクラ =====
  - id: truth-sakura
    bg: classroom
    steps:
      - type: sprite
        character: sakura
        expression: thinking
        position: right
      - type: dialog
        character: sakura
        text: "わたし、ポイントがたくさんもらえるお{店|みせ}が{大好|だいす}きだった。でもお{母|かあ}さんが「ポイントは{多|おお}いけど{値段|ねだん}が{高|たか}いのよね」って{言|い}ってたの{思|おも}い{出|だ}した。"
      - type: sprite
        character: sakura
        expression: determined
      - type: dialog
        character: sakura
        text: "「ポイント{多|おお}い＝お{得|とく}」は{思|おも}い{込|こ}みだった。これからは{値段|ねだん}も{見|み}てからポイントを{気|き}にする。"
      - type: sprite
        character: sakura
        action: hide

  # ===== 真実: ナノハ =====
  - id: truth-nanoha
    bg: classroom
    steps:
      - type: sprite
        character: nanoha
