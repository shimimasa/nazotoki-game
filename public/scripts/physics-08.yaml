scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "科学部の振り子実験で、記録係のヒカルが「実験中に振り子が途中で止まった」という報告書を提出した。"
      - type: narration
        text: "しかし振り子の周期は糸の長さだけで決まり（等時性）、振れ幅が大きくなっても小さくなっても周期は変わらない。"
      - type: narration
        text: "「振れ幅が小さくなれば止まる」という考えは誤り——振り子が完全に止まるのは空気抵抗で徐々にエネルギーが失われるためで、途中で突然止まることはない。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: omori
        expression: worried
        position: center
      - type: dialog
        character: omori
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: omori
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: chikara, expression: determined }
          - { id: nami, expression: thinking }
          - { id: hikaru, expression: thinking }
          - { id: omori, expression: worried }
      - type: narration
        text: "「物理探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "物理探偵団"
        subtitle: "Vol.8 振り子の証言"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: chikara
        expression: thinking
        position: left
      - type: dialog
        character: chikara
        text: "振れ幅を半分にしても、周期は変わらなかった。これって……止まらないってこと？"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        expression: thinking
        position: right
      - type: dialog
        character: nami
        text: "振り子の周期は糸の長さだけで決まる。ヒカルの報告書に書かれた\"突然止まった\"は物理的にあり得ない"
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        expression: thinking
        position: left
      - type: dialog
        character: hikaru
        text: "振り子が乱れたのは……私が触ってしまったから。止まったわけじゃなかった"
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        expression: worried
        position: right
      - type: dialog
        character: omori
        text: "大きく振れると速いって思ってた。でも周期が変わらないって……不思議！"
      - type: sprite
        character: omori
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「虚偽の実験報告を提出したのは誰？」"
      - type: sprite_group
        characters:
          - { id: chikara, expression: normal }
          - { id: nami, expression: normal }
          - { id: hikaru, expression: normal }
          - { id: omori, expression: worried }
      - type: choice
        id: q1
        text: "虚偽の実験報告を提出したのは誰？"
        options:
          - label: "チカラ"
            value: chikara
            correct: false
            feedback: "チカラは再現実験で等時性を確認した側"
          - label: "ナミ"
            value: nami
            correct: false
            feedback: "ナミは法則で報告書の矛盾を分析した側"
          - label: "ヒカル"
            value: hikaru
            correct: false
            feedback: "ヒカルは振り子に誤って触れてしまった。でも\"振れ幅が小さくなれば止まる\"という思い込みから、\"止まった\"という報告をした。実際は等時性——振り子の周期は糸の長さだけで決まり、振れ幅が変わっても止まりはしない。直感と法則が違うとき、法則を信頼して確認することが科学的な思考"
          - label: "オモリ"
            value: omori
            correct: true
            feedback: "オモリは直感を持ちながら法則に驚いた側"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "ヒカルは実験中、うっかり振り子の糸に触れてしまい、振れ方が大きく乱れた。"
      - type: dialog
        character: sensei
        text: "それを元に戻そうとしてさらに触れ、最終的に振り子の運動が記録通りにならなくなった。"
      - type: dialog
        character: sensei
        text: "自己防衛から「振り子が止まった」という報告を提出したが、この報告には矛盾がある——振り子の等時性の法則から、「途中で突然止まる」ことはあり得ない。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: omori
        expression: worried
        position: center
      - type: dialog
        character: omori
        text: "大きく振れると速いって思ってた。でも周期が変わらないって……不思議！"
      - type: sprite
        character: omori
        expression: determined
      - type: dialog
        character: omori
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: omori
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・振り子の法則（等時性）: 振り子の周期は糸の長さで決まる。振れ幅を変えても周期は変わらない（ガリレオの発見）\n・認知バイアス: 「大きく振れると速い、小さく振れると遅い」という直感的な思い込みに気づき、データで確認する推理スキル"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: chikara, expression: happy }
          - { id: nami, expression: happy }
          - { id: hikaru, expression: happy }
          - { id: omori, expression: happy }
      - type: narration
        text: "物理探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: chikara
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: hikaru
        action: hide
      - type: sprite
        character: omori
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
