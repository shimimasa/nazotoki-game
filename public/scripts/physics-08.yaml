meta:
  id: physics-08
  title: "振り子の証言"
  series: "物理探偵団"
  volume: 8
  estimatedMinutes: 18

characters:
  chikara:
    name: "チカラ"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
