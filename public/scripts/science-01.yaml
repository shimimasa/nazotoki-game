scenes:
  # ===== プロローグ =====
  - id: prologue
    bg: science-lab
    bgm: science-01/festival
    steps:
      - type: narration
        text: "今日は待ちに待った{理科|りか}フェスティバル！"
      - type: narration
        text: "{理科室|りかしつ}には4つの{実験|じっけん}ブースが{並|なら}び、{真|ま}ん{中|なか}には{特別展示|とくべつてんじ}の「{虹色|にじいろ}の{結晶|けっしょう}」がキラキラ{輝|かがや}いている。"
      - type: sprite_group
        characters:
          - { id: shiori, expression: normal }
          - { id: ame, expression: happy }
          - { id: awako, expression: happy }
          - { id: toromi, expression: happy }
      - type: narration
        text: "4人の{生徒|せいと}がそれぞれの{実験|じっけん}を{発表|はっぴょう}していた。みんな{楽|たの}しそうだ。"
      - type: sprite_group
        characters:
          - { id: shiori, expression: normal }
          - { id: ame, expression: normal }
          - { id: awako, expression: normal }
          - { id: toromi, expression: normal }
      - type: narration
        text: "ところが、{休憩|きゅうけい}時間が{終|お}わって{理科室|りかしつ}に{戻|もど}ると——"
      - type: bgm
        action: stop
      - type: se
        sound: science-01/alarm
      - type: effect
        name: shake
        duration: 500
      - type: narration
        text: "{虹色|にじいろ}の{結晶|けっしょう}が{消|き}えていた！"
      - type: narration
        text: "そして{展示台|てんじだい}の上には……{白|しろ}い{粉|こな}が{残|のこ}されていた。"
      - type: sprite_group
        characters:
          - { id: shiori, expression: surprised }
          - { id: ame, expression: surprised }
          - { id: awako, expression: surprised }
          - { id: toromi, expression: surprised }
      - type: sprite
        character: shiori
        action: hide
      - type: sprite
        character: ame
        action: hide
      - type: sprite
        character: awako
        action: hide
      - type: sprite
        character: toromi
        action: hide
      - type: sprite
        character: hakase
        expression: normal
        position: center
      - type: bgm
        track: science-01/investigation
      - type: dialog
        character: hakase
        text: "大変だ！ {虹色|にじいろ}の{結晶|けっしょう}が{消|き}えた！"
        expression: normal
      - type: dialog
        character: hakase
        text: "{展示台|てんじだい}の上に{白|しろ}い{粉|こな}が{残|のこ}されている。これが{犯人|はんにん}の手がかりだ。"
        expression: thinking
      - type: dialog
        character: hakase
        text: "4人とも{白|しろ}い{粉|こな}を使う{実験|じっけん}をしているから、見た目では{区別|くべつ}できない。"
      - type: dialog
        character: hakase
        text: "だから——{実験|じっけん}で{調|しら}べる。サイエンス{捜査班|そうさはん}、{科学|かがく}の力で{犯人|はんにん}を見つけてくれ！"
        expression: normal
      - type: sprite
        character: hakase
        action: hide
      - type: effect
        name: fade-out
        duration: 800

  # ===== タイトルカード =====
  - id: title
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        text: "サイエンス{捜査班|そうさはん} Vol.1"
        subtitle: "{消|き}えた{虹色|にじいろ}の{結晶|けっしょう}と{謎|なぞ}の{白|しろ}い{粉|こな}"

  # ===== 容疑者紹介 =====
  - id: suspects
    bg: science-lab
    bgm: science-01/investigation
    steps:
      - type: narration
        text: "まずは{容疑者|ようぎしゃ}の4人を{確認|かくにん}しよう。{全員|ぜんいん}が{白|しろ}い{粉|こな}を使った{実験|じっけん}をしていた。"
      - type: sprite
        character: shiori
        expression: normal
        position: left
      - type: dialog
        character: shiori
        text: "わたしは{食塩水|しょくえんすい}の{蒸発|じょうはつ}{実験|じっけん}をしています。キレイな四角い{結晶|けっしょう}ができるんです。"
      - type: dialog
        character: shiori
        text: "{休憩|きゅうけい}時間は……{廊下|ろうか}のベンチで本を読んでいました。"
        expression: thinking
      - type: sprite
        character: shiori
        action: hide
      - type: sprite
        character: ame
        expression: happy
        position: right
      - type: dialog
        character: ame
        text: "わたしは{砂糖|さとう}のカラメル{実験|じっけん}！ おいしそうでしょ？"
      - type: dialog
        character: ame
        text: "{休憩|きゅうけい}時間は友だちとおしゃべりしてたよ～。"
        expression: normal
      - type: sprite
        character: ame
        action: hide
      - type: sprite
        character: awako
        expression: happy
        position: left
      - type: dialog
        character: awako
        text: "わたしは{重曹|じゅうそう}の{発泡|はっぽう}{実験|じっけん}！ シュワシュワ{楽|たの}しいよ！"
      - type: dialog
        character: awako
        text: "{虹色|にじいろ}の{結晶|けっしょう}、すっっっごくキレイだった！ あんな{結晶|けっしょう}、自分でも作ってみたいなぁ。"
      - type: dialog
        character: awako
        text: "{休憩|きゅうけい}時間は……えっと、トイレに行ってました。"
        expression: normal
      - type: sprite
        character: awako
        action: hide
      - type: sprite
        character: toromi
        expression: happy
        position: right
      - type: dialog
        character: toromi
        text: "ぼくは{片栗粉|かたくりこ}のとろみ{実験|じっけん}！ {触|さわ}ると{面白|おもしろ}いよ！"
      - type: dialog
        character: toromi
        text: "{休憩|きゅうけい}時間は{家庭科室|かていかしつ}で{料理部|りょうりぶ}の友だちとおしゃべりしてたよ。"
        expression: normal
      - type: sprite
        character: toromi
        action: hide
      - type: narration
        text: "4人とも手や{服|ふく}に{白|しろ}い{粉|こな}がついている。見た目だけでは{犯人|はんにん}は分からない。"

  # ===== 証拠カード1: 現場調査 =====
  - id: evidence-1
    bg: science-lab
    steps:
      - type: title_card
        text: ステップ1
        subtitle: "{科学|かがく}{捜査|そうさ}{開始|かいし}！"
      - type: sprite
        character: hakase
        expression: normal
        position: center
      - type: dialog
        character: hakase
        text: "まずは{現場|げんば}の{状況|じょうきょう}を{報告|ほうこく}する。"
      - type: sprite
        character: hakase
        action: hide
      - type: narration
        text: "{展示台|てんじだい}の{状態|じょうたい}——{虹色|にじいろ}の{結晶|けっしょう}があった{場所|ばしょ}はからっぽ。"
      - type: narration
        text: "台の上に{白|しろ}い{粉|こな}が{少量|しょうりょう}{残|のこ}されている。{指|ゆび}でさわるとサラサラだ。"
      - type: narration
        text: "{窓|まど}は{全部|ぜんぶ}しまっていた。外からの{侵入|しんにゅう}はない。ドアは{休憩|きゅうけい}時間、カギをかけていなかった。"
      - type: narration
        text: "{結晶|けっしょう}は小さいので、ポケットやカバンに入れて持ち出せるサイズ。"
      - type: sprite
        character: hakase
        expression: thinking
        position: center
      - type: dialog
        character: hakase
        text: "この{白|しろ}い{粉|こな}が{犯人|はんにん}の手がかりだ。でも見た目では{区別|くべつ}がつかない。"
      - type: dialog
        character: hakase
        text: "だから——{実験|じっけん}で{調|しら}べる！ {結果|けっか}を{証拠|しょうこ}カードにまとめたぞ。"
        expression: normal
      - type: sprite
        character: hakase
        action: hide

  # ===== 証拠カード2: 実験①水に溶かす =====
  - id: evidence-2
    bg: science-lab
    bgm: science-01/experiment
    steps:
      - type: title_card
        text: "{実験|じっけん}①"
        subtitle: "水に{溶|と}かす"
      - type: sprite
        character: hakase
        expression: normal
        position: center
      - type: dialog
        character: hakase
        text: "{謎|なぞ}の{白|しろ}い{粉|こな}を水に入れてかき{混|ま}ぜてみた。"
      - type: sprite
        character: hakase
        action: hide
      - type: se
        sound: science-01/water
      - type: narration
        text: "{結果|けっか}——{謎|なぞ}の{白|しろ}い{粉|こな}は水に{溶|と}けた！ {透明|とうめい}になった。"
      - type: narration
        text: "4つの{物質|ぶっしつ}を同じ方法で{調|しら}べると……"
      - type: narration
        text: "{食塩|しょくえん} → {溶|と}ける（{透明|とうめい}）"
      - type: narration
        text: "{砂糖|さとう} → {溶|と}ける（{透明|とうめい}）"
      - type: narration
        text: "{重曹|じゅうそう} → {溶|と}ける（{透明|とうめい}）"
      - type: narration
        text: "{片栗粉|かたくりこ} → {溶|と}けない！ {白|しろ}く{濁|にご}る！"
      - type: se
        sound: common/discover
      - type: narration
        text: "{謎|なぞ}の{白|しろ}い{粉|こな}は水に{溶|と}けた。つまり——{片栗粉|かたくりこ}ではない！"
      - type: sprite
        character: toromi
        expression: happy
        position: center
      - type: dialog
        character: toromi
        text: "ぼくの{片栗粉|かたくりこ}は水に{溶|と}けないから……ぼくじゃないってこと？"
        expression: surprised
      - type: sprite
        character: toromi
        action: hide
      - type: narration
        text: "トロミの{容疑|ようぎ}が{晴|は}れた。{残|のこ}りは3人——シオリ、アメちゃん、アワコ。"

  # ===== 証拠カード3: 実験②リトマス紙 =====
  - id: evidence-3
    steps:
      - type: title_card
        text: "{実験|じっけん}②"
        subtitle: リトマス紙テスト
      - type: sprite
        character: hakase
        expression: normal
        position: center
      - type: dialog
        character: hakase
        text: "次は、{謎|なぞ}の{白|しろ}い{粉|こな}を水に{溶|と}かした{液体|えきたい}にリトマス紙をつけてみた。"
      - type: sprite
        character: hakase
        action: hide
      - type: narration
        text: "赤いリトマス紙を{液体|えきたい}につけると——"
      - type: se
        sound: common/discover
      - type: narration
        text: "青に変わった！"
      - type: narration
        text: "青いリトマス紙は{変化|へんか}なし。"
      - type: narration
        text: "つまり——{謎|なぞ}の{白|しろ}い{粉|こな}の{水溶液|すいようえき}はアルカリ{性|せい}だ！"
      - type: narration
        text: "4つの{物質|ぶっしつ}はどうだろう？"
      - type: narration
        text: "{食塩水|しょくえんすい} → {中性|ちゅうせい}（リトマス紙は{変化|へんか}しない）"
      - type: narration
        text: "{砂糖水|さとうすい} → {中性|ちゅうせい}（リトマス紙は{変化|へんか}しない）"
      - type: narration
        text: "{重曹|じゅうそう}水 → アルカリ{性|せい}！ 赤リトマスが青に変わる！"
      - type: effect
        name: flash
        duration: 300
      - type: narration
        text: "{食塩|しょくえん}も{砂糖|さとう}も{中性|ちゅうせい}。アルカリ{性|せい}の{粉|こな}は——{重曹|じゅうそう}だけ！"
      - type: sprite
        character: shiori
        expression: surprised
        position: left
      - type: dialog
        character: shiori
        text: "わたしの{食塩|しょくえん}は{中性|ちゅうせい}……わたしじゃないってこと、ですよね？"
      - type: sprite
        character: shiori
        action: hide
      - type: sprite
        character: ame
        expression: surprised
        position: right
      - type: dialog
        character: ame
        text: "わたしの{砂糖|さとう}も{中性|ちゅうせい}！ わたしも{関係|かんけい}ないってことだよね！？"
      - type: sprite
        character: ame
        action: hide
      - type: narration
        text: "シオリとアメちゃんの{容疑|ようぎ}も{晴|は}れた。{残|のこ}るは——アワコだけ。"

  # ===== 証拠カード4: 実験③加熱 =====
  - id: evidence-4
    bgm: science-01/tension
    steps:
      - type: title_card
        text: "{実験|じっけん}③"
        subtitle: "{加熱|かねつ}する"
      - type: sprite
        character: hakase
        expression: normal
        position: center
      - type: dialog
        character: hakase
        text: "{最後|さいご}の{確認|かくにん}だ。{謎|なぞ}の{白|しろ}い{粉|こな}を{蒸発皿|じょうはつざら}に入れて、ガスバーナーで{加熱|かねつ}した。"
      - type: sprite
        character: hakase
        action: hide
      - type: narration
        text: "{加熱|かねつ}すると——"
      - type: se
        sound: science-01/bubbles
      - type: effect
        name: shake
        duration: 300
      - type: narration
        text: "{泡|あわ}が出た！ シュワシュワと{気体|きたい}が{発生|はっせい}した！"
      - type: narration
        text: "{焦|こ}げたり、色が変わったりはしなかった。"
      - type: narration
        text: "4つの{物質|ぶっしつ}を{加熱|かねつ}するとどうなる？"
      - type: narration
        text: "{食塩|しょくえん} → {変化|へんか}なし（{融点|ゆうてん}が{高|たか}すぎて{普通|ふつう}のバーナーでは変わらない）"
      - type: narration
        text: "{砂糖|さとう} → {焦|こ}げる！（{茶色|ちゃいろ}→{黒|くろ}に変わる。カラメル化）"
      - type: narration
        text: "{重曹|じゅうそう} → {泡|あわ}が出る！（{二酸化炭素|にさんかたんそ}CO₂が{発生|はっせい}する）"
      - type: narration
        text: "{片栗粉|かたくりこ} → {焦|こ}げる！（デンプンが{炭化|たんか}する）"
      - type: se
        sound: common/discover
      - type: effect
        name: flash
        duration: 400
      - type: narration
        text: "{加熱|かねつ}して{泡|あわ}が出るのは——{重曹|じゅうそう}だけ！"
      - type: narration
        speed: slow
        text: "{謎|なぞ}の{白|しろ}い{粉|こな}は{重曹|じゅうそう}。{重曹|じゅうそう}を使った{実験|じっけん}をしていたのは——アワコ！"

  # ===== 投票 =====
  - id: questions
    bg: science-lab
    bgm: science-01/tension
    steps:
      - type: sprite
        character: hakase
        expression: thinking
        position: center
      - type: dialog
        character: hakase
        text: "3つの{実験|じっけん}の{結果|けっか}が出そろった。さあ、きみの{推理|すいり}を{聞|き}かせてくれ。"
      - type: sprite
        character: hakase
        action: hide
      - type: choice
        id: q1
        question: "{謎|なぞ}の{白|しろ}い{粉|こな}の{正体|しょうたい}は何だと思う？"
        options:
          - text: "{食塩|しょくえん}（シオリの{実験|じっけん}で使っていた）"
            value: salt
            feedback: "{食塩|しょくえん}は「{中性|ちゅうせい}」だったよね。でも{謎|なぞ}の{白|しろ}い{粉|こな}はアルカリ{性|せい}——{食塩|しょくえん}ではなさそうだ。"
          - text: "{砂糖|さとう}（アメちゃんの{実験|じっけん}で使っていた）"
            value: sugar
            feedback: "{砂糖|さとう}も「{中性|ちゅうせい}」。{加熱|かねつ}すると{焦|こ}げるけど、{謎|なぞ}の{白|しろ}い{粉|こな}は{泡|あわ}が出た——{砂糖|さとう}ではなさそうだ。"
          - text: "{重曹|じゅうそう}（アワコの{実験|じっけん}で使っていた）"
            value: baking-soda
            feedback: "{正解|せいかい}！ 水に{溶|と}ける・アルカリ{性|せい}・{加熱|かねつ}で{泡|あわ}が出る——3つの{実験|じっけん}が{全|すべ}て{重曹|じゅうそう}を{指|さ}している！"
          - text: "{片栗粉|かたくりこ}（トロミの{実験|じっけん}で使っていた）"
            value: starch
            feedback: "{片栗粉|かたくりこ}は水に{溶|と}けないよね。{実験|じっけん}①で{最初|さいしょ}に{除外|じょがい}されたはず——もう一度データを見てみよう。"
      - type: narration
        text: "{実験|じっけん}の{結果|けっか}を{振|ふ}り{返|かえ}ろう。水に{溶|と}ける、アルカリ{性|せい}、{加熱|かねつ}で{泡|あわ}が出る——これに当てはまるのは？"
      - type: choice
        id: q2
        question: "{虹色|にじいろ}の{結晶|けっしょう}を持ち出した{犯人|はんにん}は{誰|だれ}だと思う？"
        options:
          - text: "シオリ（{食塩|しょくえん}の{実験|じっけん}をしていた）"
            value: shiori
            feedback: "シオリの{食塩|しょくえん}は{中性|ちゅうせい}。{謎|なぞ}の{白|しろ}い{粉|こな}はアルカリ{性|せい}だったから、シオリの{可能性|かのうせい}は{低|ひく}いよ。"
          - text: "アメちゃん（{砂糖|さとう}の{実験|じっけん}をしていた）"
            value: ame
            feedback: "アメちゃんの{砂糖|さとう}も{中性|ちゅうせい}。リトマス紙の{結果|けっか}を思い出して——アルカリ{性|せい}の{物質|ぶっしつ}を使っていたのは？"
          - text: "アワコ（{重曹|じゅうそう}の{実験|じっけん}をしていた）"
            value: awako
            feedback: "{鋭|するど}い{推理|すいり}！ {重曹|じゅうそう}を使っていたのはアワコだけ。3つの{実験|じっけん}が{全|すべ}てアワコを{指|さ}している！"
          - text: "トロミ（{片栗粉|かたくりこ}の{実験|じっけん}をしていた）"
            value: toromi
            feedback: "トロミの{片栗粉|かたくりこ}は{実験|じっけん}①で「水に{溶|と}けない」と{判明|はんめい}して{除外|じょがい}されたよね。{犯人|はんにん}は{別|べつ}にいる。"

  # ===== 証拠カード5: 決定的証拠 =====
  - id: evidence-5
    bgm: science-01/tension
    steps:
