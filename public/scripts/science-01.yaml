meta:
  id: science-01
  title: "{消|き}えた{虹色|にじいろ}の{結晶|けっしょう}と{謎|なぞ}の{白|しろ}い{粉|こな}"
  series: サイエンス{捜査班|そうさはん}
  volume: 1
  estimatedMinutes: 18

characters:
  shiori:
