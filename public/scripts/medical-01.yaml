meta:
  id: medical-01
  title: "よごれた手"
  series: "医療探偵団"
  volume: 1
  estimatedMinutes: 18

characters:
  naoru:
    name: "ナオル"
    color: "#4169E1"
    sprites:
      normal: boy-a-normal.webp
      happy: boy-a-happy.webp
      thinking: boy-a-thinking.webp
      worried: boy-a-worried.webp
      surprised: boy-a-surprised.webp
      determined: boy-a-determined.webp
  mibuki:
    name: "ミブキ"
    color: "#FF4444"
    sprites:
      normal: boy-b-normal.webp
      happy: boy-b-happy.webp
      thinking: boy-b-thinking.webp
      worried: boy-b-worried.webp
      surprised: boy-b-surprised.webp
      determined: boy-b-determined.webp
  iyashi:
    name: "イヤシ"
    color: "#9370DB"
    sprites:
      normal: girl-b-normal.webp
      happy: girl-b-happy.webp
      thinking: girl-b-thinking.webp
      worried: girl-b-worried.webp
      surprised: girl-b-surprised.webp
      determined: girl-b-determined.webp
  genki:
    name: "ゲンキ"
    color: "#CD853F"
    sprites:
      normal: girl-c-normal.webp
      happy: girl-c-happy.webp
      thinking: girl-c-thinking.webp
      worried: girl-c-worried.webp
      surprised: girl-c-surprised.webp
      determined: girl-c-determined.webp
  sensei:
    name: "山田先生"
    color: "#2E8B57"
    sprites:
      normal: teacher-f-normal.webp
      happy: teacher-f-happy.webp
      thinking: teacher-f-thinking.webp
      worried: teacher-f-worried.webp
      surprised: teacher-f-surprised.webp
      determined: teacher-f-determined.webp

scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "5年2組で調理実習が行われた。"
      - type: narration
        text: "同じグループの4人が全員同じシチューを食べたのに、翌日だけ「おなかが痛くなった」と言っている。"
      - type: narration
        text: "山田先生（保健室の先生）は「食中毒の可能性がある」と言うが、「全員同じものを食べたのに、なぜ1人だけ？"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: mibuki
        expression: worried
        position: center
      - type: dialog
        character: mibuki
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: mibuki
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: naoru, expression: determined }
          - { id: mibuki, expression: thinking }
          - { id: iyashi, expression: thinking }
          - { id: genki, expression: worried }
      - type: narration
        text: "「医療探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "医療探偵団"
        subtitle: "Vol.1 よごれた手"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "調理実習の写真"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、誰が何を触ったかの基礎情報ためのヒントはどこにありそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "手洗い記録"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、時刻の順序を確認できるためのヒントはどこにありそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "グループの証言4本"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、証言の食い違いを発見できるためのヒントはどこにありそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "食材の配布記録"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、食材接触者を絞れるためのヒントはどこにありそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "ドアノブの細菌検査結果"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠を手がかりにすると、感染経路の完全解明。情報追加ためのヒントはどこにありそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: naoru
        expression: thinking
        position: left
      - type: dialog
        character: naoru
        text: "ドアノブの使用状況を確認し、「ここが感染ポイントかも」と気づく場面"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        expression: worried
        position: right
      - type: dialog
        character: mibuki
        text: "Card 5後、「ドアノブを触った後に食材を触ったことを思い出す」場面"
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        expression: thinking
        position: left
      - type: dialog
        character: iyashi
        text: "調理の手順と時刻を整理し、「接触の可能性がある瞬間」を絞る場面"
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        expression: thinking
        position: right
      - type: dialog
        character: genki
        text: "真相後、「手を洗った後に何を触るかも考えなきゃ」と学びを言葉にする場面"
      - type: sprite
        character: genki
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「感染のきっかけになった行動をしたのは誰？」"
      - type: sprite_group
        characters:
          - { id: naoru, expression: normal }
          - { id: mibuki, expression: normal }
          - { id: iyashi, expression: normal }
          - { id: genki, expression: worried }
      - type: choice
        id: q1
        text: "感染のきっかけになった行動をしたのは誰？"
        options:
          - label: "ナオル"
            value: naoru
            correct: false
            feedback: "ナオルは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "ミブキ"
            value: mibuki
            correct: true
            feedback: "ミブキの行動が証拠と一番つながっている。悪意ではなくても、学びを知らないと同じことが起こりうる。"
          - label: "イヤシ"
            value: iyashi
            correct: false
            feedback: "イヤシは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
          - label: "ゲンキ"
            value: genki
            correct: false
            feedback: "ゲンキは大事な手がかりを持っていたけれど、決め手になった行動とは一致しない。"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人行動は、ミブキ（息）が引き起こした接触感染"
      - type: dialog
        character: sensei
        text: "動機は、#10 誤解・勘違い — ミブキは調理前に手を洗ったが、その後ドアノブを触り（前のグループが使った後でまだ汚染されていた）、石けんを洗い流す前に食材を触ってしまった。「手を洗った＝清潔」と思い込み、その後ドアノブを触ったことを「関係ない」と判断してしまった。ミブキに悪意はなく、「一度洗えば安全」という誤解が原因。"
      - type: dialog
        character: sensei
        text: "感染の仕組みは、石けんによる手洗いは「細菌を除去」するが、洗い流す前や洗った後に汚染されたものを触ると意味がない。ドアノブ→手→食材→食べた1人だけが感染した（他の3人は食材を触らなかった）。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: mibuki
        expression: worried
        position: center
      - type: dialog
        character: mibuki
        text: "Card 5後、「ドアノブを触った後に食材を触ったことを思い出す」場面"
      - type: sprite
        character: mibuki
        expression: determined
      - type: dialog
        character: mibuki
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: mibuki
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・**メイン**: 石けんによる手洗いの効果（細菌の脂質膜を溶かす界面活性剤の働き）と、「いつ洗うか」の重要性（調理前・食事前・トイレ後・外から帰った後）を理解する\n・**サブ**: 消去法を使い、感染経路の可能性を一つずつ除外する推理スキルを体験する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: naoru, expression: happy }
          - { id: mibuki, expression: happy }
          - { id: iyashi, expression: happy }
          - { id: genki, expression: happy }
      - type: narration
        text: "医療探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: naoru
        action: hide
      - type: sprite
        character: mibuki
        action: hide
      - type: sprite
        character: iyashi
        action: hide
      - type: sprite
        character: genki
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
