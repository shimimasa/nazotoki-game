scenes:
  - id: prologue
    bg: classroom
    bgm: daily-life
    steps:
      - type: narration
        text: "漁港の見学で、ナミが漁獲記録の不審な数字に気づいた。"
      - type: narration
        text: "「禁漁区（きんりょうく）のエリアで漁をしていた記録がある！"
      - type: narration
        text: "」と主張した。"
      - type: se
        sound: crash
      - type: effect
        name: shake
        duration: 400
      - type: bgm
        action: stop
      - type: sprite
        character: nami
        expression: worried
        position: center
      - type: dialog
        character: nami
        text: "大変だ！ みんな来て！"
      - type: sprite
        character: nami
        action: hide
      - type: bgm
        track: tension-quiet
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、{{証拠|しょうこ}}を{{集|あつ}}めて{{調|しら}}べてみましょう。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: shioru, expression: determined }
          - { id: minato, expression: thinking }
          - { id: nami, expression: thinking }
          - { id: kai, expression: worried }
      - type: narration
        text: "「海洋探偵団」として{調査|ちょうさ}を{始|はじ}める。"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
      - type: effect
        name: fade-out
        duration: 800
      - type: title_card
        title: "海洋探偵団"
        subtitle: "Vol.7 漁師の決断"
  - id: evidence-1
    bg: classroom
    bgm: exploration
    steps:
      - type: effect
        name: fade-in
        duration: 600
      - type: title_card
        title: "ステップ1"
        subtitle: "調査"
      - type: narration
        text: "証拠カード1"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-2
    steps:
      - type: narration
        text: "証拠カード2"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-3
    steps:
      - type: narration
        text: "証拠カード3"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-4
    steps:
      - type: narration
        text: "証拠カード4"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
  - id: evidence-5
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "ステップ2"
        subtitle: "反転"
      - type: effect
        name: fade-in
        duration: 600
      - type: narration
        text: "証拠カード5"
      - type: se
        sound: discover
      - type: narration
        text: "この証拠から、次に何を確かめるとよさそうかな？"
      - type: sprite
        character: sensei
        expression: thinking
        position: center
      - type: dialog
        character: sensei
        text: "みんな、ここまでの{{証拠|しょうこ}}を{{整理|せいり}}してみましょう。"
      - type: sprite
        character: sensei
        action: hide
  - id: deduction
    bg: classroom
    bgm: tension-quiet
    steps:
      - type: title_card
        title: "ステップ3"
        subtitle: "議論"
      - type: narration
        text: "ここまでの{{証拠|しょうこ}}を{{整理|せいり}}して、みんなの{{考|かんが}}えを{{聞|き}}いてみよう。"
      - type: sprite
        character: shioru
        expression: thinking
        position: left
      - type: dialog
        character: shioru
        text: "漁師さんは毎年禁漁区を地図で確認してから漁に出ると言ってた。プロが間違えるだろうか"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        expression: thinking
        position: right
      - type: dialog
        character: minato
        text: "この貼り紙、3ヶ月前の告示。境界がここまで変わってる。ナミのマップと全然違う"
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        expression: worried
        position: left
      - type: dialog
        character: nami
        text: "3ヶ月前に境界が変わっていたなんて知らなかった。最新を確認すればよかった"
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        expression: thinking
        position: right
      - type: dialog
        character: kai
        text: "漁師さんは\"海は自分の畑だ。ルールを破ったら自分の畑を壊すことになる\"って言ってた。そんな人が違反するかな"
      - type: sprite
        character: kai
        action: hide
  - id: vote
    steps:
      - type: title_card
        title: "ステップ4"
        subtitle: "投票"
      - type: narration
        text: "「漁師さんへの誤告発の原因を作ったのは誰？」"
      - type: sprite_group
        characters:
          - { id: shioru, expression: normal }
          - { id: minato, expression: normal }
          - { id: nami, expression: normal }
          - { id: kai, expression: worried }
      - type: choice
        id: q1
        text: "漁師さんへの誤告発の原因を作ったのは誰？"
        options:
          - label: "シオル"
            value: shioru
            correct: false
            feedback: "シオルは漁師さんへの聞き取りで事実を探った調査側だよ"
          - label: "ミナト"
            value: minato
            correct: false
            feedback: "ミナトは最新マップを発見した調査側だよ"
          - label: "ナミ"
            value: nami
            correct: true
            feedback: "ナミは海を守りたいという正しい気持ちから行動しました。でも情報には\"鮮度\"があります——禁漁区のルールは魚の状態に合わせて定期的に改正されます。最新の情報を確認せずに判断することは、正しい動機でも間違いを生みます。漁業と海の資源管理は、漁師さん・研究者・行政が協力して、持続可能な形で海の恵みを守るための仕組みです。ナミの疑問は正しかった。ただ、確認が一歩足りなかった"
          - label: "カイ"
            value: kai
            correct: false
            feedback: "カイは漁師さんの言葉を伝えた調査側だよ"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
  - id: truth
    bg: classroom
    bgm: confession
    steps:
      - type: effect
        name: fade-out
        duration: 600
      - type: title_card
        title: "真相"
      - type: effect
        name: fade-in
        duration: 600
      - type: sprite
        character: sensei
        expression: normal
        position: center
      - type: dialog
        character: sensei
        text: "犯人は、ナミ"
      - type: dialog
        character: sensei
        text: "動機は、#7 守る — ナミは海の資源を守りたいという正しい気持ちから、「禁漁区違反」を疑った。しかし参照したルールマップが古く、境界変更を知らなかった。正しい動機による誤判断。"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite
        character: nami
        expression: worried
        position: center
      - type: dialog
        character: nami
        text: "3ヶ月前に境界が変わっていたなんて知らなかった。最新を確認すればよかった"
      - type: sprite
        character: nami
        expression: determined
      - type: dialog
        character: nami
        text: "次からは思いこみで決めつけず、確かめてから行動するよ。"
      - type: sprite
        character: nami
        action: hide
  - id: epilogue
    bgm: hope
    steps:
      - type: sprite
        character: sensei
        expression: happy
        position: center
      - type: dialog
        character: sensei
        text: "みんな、よく{{調|しら}}べたね。今日の{{学|まな}}びを{{振|ふ}}り{{返|かえ}}ろう。"
      - type: sprite
        character: sensei
        expression: thinking
      - type: dialog
        character: sensei
        text: "・漁業と海の資源管理の仕組み（禁漁区・禁漁期間・漁獲制限・TAC制度）を理解する\n・情報欠落スキル — 「情報が古い」「情報が足りない」という欠落を発見し、正しい情報を補って判断する"
      - type: sprite
        character: sensei
        action: hide
      - type: sprite_group
        characters:
          - { id: shioru, expression: happy }
          - { id: minato, expression: happy }
          - { id: nami, expression: happy }
          - { id: kai, expression: happy }
      - type: narration
        text: "海洋探偵団の{冒険|ぼうけん}はつづく——"
      - type: sprite
        character: shioru
        action: hide
      - type: sprite
        character: minato
        action: hide
      - type: sprite
        character: nami
        action: hide
      - type: sprite
        character: kai
        action: hide
      - type: effect
        name: fade-out
        duration: 1500
